<!doctype html>
<html lang="fr">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Outils Mathématiques | Bourgault Gwenaël</title>
    <style>
        :root {
            --primary: #1e1b4b;
            --accent: #4338ca;
            --bg-page: #fdfcf9;
            --text-muted: #64748b;
        }

        body {
            background-color: var(--bg-page);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 3.5rem 2.5rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
            border: 1px solid #e2e8f0;
            max-width: 460px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .emoji-header {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: wave 2.5s infinite;
            display: inline-block;
            transform-origin: 70% 70%;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg) }
            20% { transform: rotate(12deg) }
            40% { transform: rotate(-8deg) }
            60% { transform: rotate(10deg) }
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 800;
            color: var(--primary);
            margin: 0;
            letter-spacing: -1px;
        }

        p.subtitle {
            color: #475569;
            font-size: 1.15rem;
            line-height: 1.6;
            margin: 1.5rem 0 2.5rem;
        }

        .btn-start {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #ffffff;
            color: var(--primary);
            border: 2px solid var(--primary);
            padding: 14px 35px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .btn-start:hover {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0 10px 20px rgba(30, 27, 75, 0.2);
        }

        /* Fenêtre de Contact */
        #contact-modal {
            display: none;
            position: fixed;
            z-index: 100;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            width: 90%;
            max-width: 400px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            cursor: pointer;
            font-size: 28px;
            color: #94a3b8;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            font-family: inherit;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-send {
            background: var(--primary);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 700;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-send:hover {
            background: var(--accent);
        }

        footer {
            margin-top: 3rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-align: center;
        }

        .contact-btn {
            color: var(--primary);
            text-decoration: underline;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="emoji-header">👋</div>
        <h1>Bienvenue</h1>
        <p class="subtitle">Outils numériques à l'usage des enseignants et des élèves en mathématiques.</p>
        <a href="outils/" class="btn-start">
            <span>Accéder aux outils</span>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </a>
    </div>

    <footer>
        Site pédagogique — Bourgault Gwenaël<br>
        <span class="contact-btn" onclick="document.getElementById('contact-modal').style.display='flex'">Me contacter</span>
    </footer>

    <div id="contact-modal">
        <div class="modal-content">
            <span class="close-modal" onclick="document.getElementById('contact-modal').style.display='none'">&times;</span>
            <h2 style="margin:0 0 10px 0; color: var(--primary)">Me contacter</h2>
            <p style="margin: 0 0 20px 0; color: var(--text-muted); font-size: 0.9rem; line-height: 1.4;">
                N'hésitez pas pour toute remarque, question ou bug rencontré sur le site.
            </p>
            
            <form action="https://formspree.io/f/xvzwqwdl" method="POST">
                <input type="email" name="email" placeholder="Votre adresse e-mail" required>
                <textarea name="message" rows="5" placeholder="Votre message..." required></textarea>
                <button type="submit" class="btn-send">Envoyer le message</button>
            </form>
        </div>
    </div>

    <script>
        window.onclick = function(event) {
            let modal = document.getElementById('contact-modal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

</body>
</html>
