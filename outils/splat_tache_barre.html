<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Petit Splat!</title>
  <style>
    :root {
      --ink: #111827;
      --bg: #f8fafc;
      --panel: #ffffff;
      --accent: #2563eb;
      --splat: #000000;
      --border: #cbd5e1;
      --grid-line: #94a3b8; 
      --page-w: 210mm;
      --page-h: 297mm;
      --page-margin: 10mm;
      --cols: 3; 
      --rows: 4;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--ink); display: flex; height: 100vh; overflow: hidden; }
    
    /* SIDEBAR */
    aside { width: 320px; background: var(--panel); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
    .sb-header { padding: 12px 16px; border-bottom: 1px solid var(--border); background: #fff; }
    .sb-title { font-size: 17px; font-weight: 800; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: -0.5px; }
    .sb-scroll { flex: 1; overflow-y: auto; padding: 12px 14px 10px 14px; display: flex; flex-direction: column; gap: 9px; }
    .section { border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; }
    .sec-title { font-size: 10px; text-transform: uppercase; color: #64748b; font-weight: 800; margin-bottom: 6px; }
    
    select, input[type="number"], input[type="text"] { padding: 7px 8px; border: 1px solid var(--border); border-radius: 6px; font-size: 13px; font-weight: 600; width: 100%; outline: none; background: #fff; }

    .support-section { background: #eff6ff; padding: 9px; border-radius: 8px; border: 1px solid #bfdbfe; }
    .support-section .sec-title { color: #1e3a8a; }
    .compact-options { display: flex; flex-direction: column; gap: 6px; }
    .control { margin-bottom: 7px; }
    .control:last-child { margin-bottom: 0; }
    .control label { display: block; font-size: 11px; font-weight: 700; color: #334155; margin-bottom: 4px; }
    .control-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .seed-section { padding-bottom: 4px; }

    .seed-row { display: grid; grid-template-columns: 1fr 38px; gap: 6px; align-items: center; }
    .seed-btn { height: 32px; border: 1px solid #e2e8f0; border-radius: 8px; background: #f1f5f9; cursor: pointer; font-size: 16px; font-weight: 800; }
    .seed-btn:hover { background: #e2e8f0; }
    #seedInput.seed-auto { color: #94a3b8; font-style: italic; border-color: #e2e8f0; }
    #seedInput.seed-manual { color: #1e40af; font-style: normal; border-color: #93c5fd; background: #eff6ff; }
    .seed-status { margin-top: 3px; font-size: 11px; font-weight: 700; color: #94a3b8; }
    .seed-status.manual { color: #1e40af; }
    
    .flags { display: flex; gap: 10px; margin-bottom: 10px; }
    .flag-btn { font-size: 12px; font-weight: 800; cursor: pointer; opacity: 0.5; padding: 4px 10px; border-radius: 6px; background:#f1f5f9; border: 1px solid #e2e8f0; }
    .flag-btn.active { opacity: 1; background: var(--accent); color: white; border-color: var(--accent); }
    
    .corr-group { display: flex; gap: 7px; align-items: stretch; margin-bottom: 6px; }
    .check-control { flex: 1; display: flex; align-items: center; gap: 8px; background: #f1f5f9; padding: 7px 8px; border-radius: 8px; border: 1px solid #e2e8f0; cursor: pointer; margin-bottom: 0; min-height: 34px; }
    .check-control input { width: 16px; height: 16px; cursor: pointer; flex-shrink: 0; }
    .check-text { font-size: 11.5px; font-weight: 700; color: #334155; }
    
    .rv-btn { 
        display: flex; align-items: center; justify-content: center; 
        font-size: 12px; font-weight: 800; cursor: pointer; 
        padding: 0 12px; border-radius: 8px; 
        background: #f1f5f9; border: 1px solid #e2e8f0; color: #64748b;
        transition: all 0.2s;
    }
    .rv-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .rv-btn.disabled { opacity: 0.3; pointer-events: none; }
    
    .print-title-control {
        border-bottom: 1px solid #f1f5f9;
        padding-bottom: 12px;
    }
    .print-title-control label {
        display: block;
        font-size: 11px;
        font-weight: 800;
        color: #64748b;
        text-transform: uppercase;
        margin-bottom: 5px;
    }
    .print-title-control input {
        width: 100%;
        height: 34px;
        padding: 7px 9px;
        border: 1px solid var(--border);
        border-radius: 7px;
        font-size: 13px;
        font-weight: 700;
        outline: none;
        background: #fff;
    }
    .print-title-control input::placeholder { color: #94a3b8; font-weight: 600; }
    .actions { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-top: 2px; padding-bottom: 6px; }
    .btn { padding: 11px; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; color: white; font-size: 13px; }
    .btn-new { background: var(--accent); }
    .btn-print { background: #10b981; }

    /* MAIN PREVIEW */
    main { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; background: #e2e8f0; }
    .page { width: var(--page-w); height: var(--page-h); background: white; box-shadow: 0 10px 30px rgba(0,0,0,0.15); position: relative; flex-shrink: 0; page-break-after: always; }
    .page-inner { position: absolute; top: var(--page-margin); bottom: var(--page-margin); left: var(--page-margin); right: var(--page-margin); display: flex; flex-direction: column; }
    
    .grid { flex: 1; display: grid; grid-template-columns: repeat(var(--cols), 1fr); grid-template-rows: repeat(var(--rows), 1fr); border: 2px solid var(--ink); min-height: 0; }
    .cell {
      border: none;
      border-right: 1px solid var(--grid-line);
      border-bottom: 1px solid var(--grid-line);
      display: flex;
      flex-direction: column;
      padding: 4px;
      position: relative;
      overflow: hidden;
      background: white;
    }
    .grid-3x4 .cell:nth-child(3n),
    .grid-3x3 .cell:nth-child(3n),
    .grid-2x4 .cell:nth-child(2n),
    .grid-2x3 .cell:nth-child(2n) { border-right: none; }
    .grid-3x4 .cell:nth-child(n+10),
    .grid-3x3 .cell:nth-child(n+7),
    .grid-2x4 .cell:nth-child(n+7),
    .grid-2x3 .cell:nth-child(n+5) { border-bottom: none; }
    
    /* ANIMATIONS TBI MODE */
    .tbi-mode { cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease; }
    .tbi-mode:hover { transform: scale(1.01); box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 5; border-color: var(--accent); }
    .splat-path { transition: opacity 0.6s ease; }
    .tbi-mode.revealed .splat-path { opacity: 0.15; }
    .hidden-val { opacity: 0; transition: opacity 0.6s ease; }
    .tbi-mode.revealed .hidden-val { opacity: 1; }
    .solution-dot { opacity: 1; transition: opacity 0.6s ease; }
    .tbi-mode .solution-dot { opacity: 0; }
    .tbi-mode.revealed .solution-dot { opacity: 1; }

    .part-splat { flex: 1; position: relative; border-bottom: 1px dashed #cbd5e1; margin-bottom: 5px; overflow: hidden; min-height: 0; }
    .splat-svg { width: 100%; height: 100%; display: block; }

    .total-badge {
        position: absolute; top: 5px; right: 5px; width: 38px; height: 38px;
        background: white; border: 2px solid #334155; display: flex; align-items: center; justify-content: center;
        font-size: 18px; font-weight: 900; color: #111827; z-index: 10; box-shadow: 2px 2px 5px rgba(0,0,0,0.05);
    }

    /* DIAGRAMME */
    .diagram-container { flex: 0 0 70px; display: flex; flex-direction: column; width: 90%; margin: 0 auto 5px auto; }
    .diagram-inner { display: flex; flex-direction: column; flex: 1; border: 2px solid #111827; border-radius: 0; overflow: hidden; background: white; }
    .row-top { flex: 1; border-bottom: 2px solid #111827; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #fff; min-height: 25px; }
    .row-bottom { flex: 1; display: flex; min-height: 25px; }
    .part-box { display: flex; align-items: center; justify-content: center; font-weight: 900; border-right: 2px solid #111827; overflow: hidden; }
    .part-box:last-child { border-right: none; }


    /* MODULE RELATION ENTRE 2 TACHES */
    .module-hint {
      margin-top: 5px;
      padding: 6px 7px;
      border-radius: 7px;
      background: #fff7ed;
      border: 1px solid #fed7aa;
      color: #9a3412;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.2;
    }
    .relation-clue {
      flex: 0 0 auto;
      margin: 0 auto 5px auto;
      width: 92%;
      padding: 4px 6px;
      border: 1.5px solid #111827;
      border-radius: 7px;
      background: #fff7ed;
      color: #111827;
      font-size: 11.5px;
      font-weight: 800;
      line-height: 1.12;
      text-align: center;
    }
    .relation-diagram { flex: 0 0 92px; width: 94%; }
    .relation-diagram .diagram-inner {
      border-width: 2px;
      flex: 0 0 72px;
      height: 72px;
      min-height: 0;
      width: 100%;
    }
    .relation-diagram .row-top {
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      box-sizing: border-box;
    }
    .relation-row-bottom {
      flex: 1 1 0;
      display: grid;
      grid-template-columns: var(--rel-cols);
      column-gap: 2px;
      min-height: 0;
      width: 100%;
      box-sizing: border-box;
      background: #111827; /* traits verticaux robustes, même à l'impression */
    }
    .relation-part-box {
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: none;
      overflow: hidden;
      min-width: 0;
      box-sizing: border-box;
      background: #fff;
    }
    .relation-part-box.relation-visible { background: #fff; }
    .relation-part-box.relation-a { background: #e5e7eb; }
    .relation-part-box.relation-b { background: #ffedd5; }
    .relation-part-box.relation-c { background: #fee2e2; }
    .relation-part-value {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      font-size: 17px;
      font-weight: 950;
      line-height: 1;
      background: transparent;
    }
    .relation-visible .relation-part-value { color: #2563eb; }
    .relation-label-row {
      flex: 0 0 16px;
      display: grid;
      grid-template-columns: var(--rel-cols);
      width: calc(100% - 4px);
      margin-left: 2px;
      margin-right: 2px;
      align-items: center;
      justify-content: stretch;
      column-gap: 2px;
      padding-top: 2px;
      font-size: 11px;
      font-weight: 950;
      text-transform: uppercase;
      line-height: 1;
      box-sizing: border-box;
    }
    .relation-label {
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: clip;
      box-sizing: border-box;
    }
    .relation-label-visible { color: #2563eb; }
    .relation-label-a { color: #111827; }
    .relation-label-b { color: #ea580c; }
    .relation-label-c { color: #dc2626; }
    .relation-given-part .relation-part-value { font-weight: 950; }
    .relation-clue-3 { font-size: 10.4px; line-height: 1.05; padding: 3px 5px; }
    .relation3-cell { padding: 5px; }
    .relation3-cell .part-splat { flex: 1.55 1 0; margin-bottom: 5px; }
    .relation3-cell .relation-clue { width: 94%; font-size: 11.5px; line-height: 1.08; padding: 5px 7px; margin-bottom: 6px; }
    .relation3-cell .relation-diagram { flex-basis: 100px; width: 94%; }
    .relation3-cell .relation-diagram .diagram-inner { flex-basis: 80px; height: 80px; }

    .sums3-cell .relation-clue {
      width: 94%;
      font-size: 15px;
      line-height: 1.12;
      padding: 5px 7px;
      margin-bottom: 6px;
      font-weight: 900;
      text-align: center;
    }
    .relation-controls { margin-top: 3px; }
    .option-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .option-pair .check-control { min-height: 32px; padding: 6px 7px; }
    .option-pair .check-text { font-size: 10.5px; }
    #relationHintOption { margin-bottom: 0; }
    #relationHintOption .check-control { min-height: 32px; padding: 6px 7px; }

    .grid-mirror { direction: rtl; } 
    .grid-mirror .cell { direction: ltr; }

    /* Label de page : URL en minuscules et positionné tout en bas */
    .page-label { position: absolute; bottom: -25px; left: 0; right: 0; text-align: center; font-size: 10px; font-weight: bold; color: #64748b; text-transform: none; }
    .print-logo { position: absolute; bottom: -34px; left: 0; width: 45mm; height: auto; display: block; }



    /* FICHE D'ACTIVITÉ - uniquement pour le mode impression */
    .activity-print-page .page-inner { top: 8mm; bottom: 8mm; left: 8mm; right: 8mm; }
    .activity-header {
        flex: 0 0 16mm;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 2.5mm 4mm;
        margin-bottom: 3mm;
        background: linear-gradient(90deg, #ff9815 0%, #ffc46d 58%, #fff4dc 100%);
        border-radius: 0;
        overflow: hidden;
    }
    .activity-title-block { display: flex; flex-direction: column; justify-content: center; line-height: 1.02; min-width: 65mm; }
    .activity-title { font-size: 20px; font-weight: 950; color: #063b7a; text-transform: uppercase; letter-spacing: -0.7px; }
    .activity-subtitle { font-size: 15px; font-weight: 900; color: #000; margin-top: 1mm; }
    .activity-logos { display: flex; align-items: center; justify-content: flex-end; gap: 4mm; height: 100%; }
    .activity-logo-irem { height: 14mm; width: auto; object-fit: contain; display: block; }
    .activity-logo-maths { height: 12mm; width: auto; object-fit: contain; display: block; }
    .activity-instruction {
        flex: 0 0 auto;
        margin-bottom: 3mm;
        padding: 3mm 4mm;
        border: 1.4px solid #5b6574;
        border-radius: 6px;
        background: #fff;
        font-size: 14.5px;
        line-height: 1.22;
        color: #111827;
    }
    .activity-instruction-title { font-weight: 900; margin-bottom: 0.6mm; }
    .activity-instruction-line { padding-left: 6mm; text-indent: -4mm; }
    .activity-instruction-note {
        margin-top: 1.6mm;
        font-size: 13.2px;
        font-weight: 700;
        color: #334155;
    }
    .activity-print-page .grid { width: 100%; }
    .activity-print-page .diagram-container { flex-basis: 64px; }
    .activity-footer {
        position: absolute;
        bottom: -4.5mm;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 8.5px;
        font-weight: 700;
        color: #94a3b8;
    }

    @media print { 
      @page { size: A4; margin: 0; } 
      body { display: block; background: white; height: auto; overflow: visible; } 
      aside { display: none !important; } 
      main { padding: 0; margin: 0; display: block; overflow: visible; height: auto; } 
      .page { margin: 0 auto; box-shadow: none; border: none; width: 210mm; height: 297mm; overflow: hidden; page-break-after: always; } 
      .page:last-child { page-break-after: auto; } 
      .grid { border: 2px solid #000; } 
      .diagram-inner, .part-box, .total-badge, .activity-header, .activity-instruction, .relation-clue, .relation-part-box, .relation-part-label, .relation-part-value { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<aside>
  <div class="sb-header"><h2 class="sb-title" data-i18n="title">Petit Splat!</h2></div>
  <div class="sb-scroll">
    
    <div class="section support-section">
        <div class="sec-title">Support d'utilisation</div>
        <select id="supportMode" onchange="toggleMode()" style="background: white; border-color: #93c5fd; font-weight: 800; color: #1e40af;">
            <option value="print" selected>📄 Fiche (Impression PDF)</option>
            <option value="tbi">💻 Interactif : clic pour révéler</option>
        </select>
    </div>

    <div class="section" id="printOptionsSection">
      <div class="sec-title" data-i18n="options">Options</div>
      <div class="compact-options">
        <div class="corr-group">
            <label class="check-control">
                <input type="checkbox" id="showCorr" onchange="toggleCorr()">
                <span class="check-text" data-i18n="opt_corr">Correction + Énoncé</span>
            </label>
            <div id="btnRV" class="rv-btn disabled" onclick="toggleRV(this)" title="Recto-Verso (Miroir auto)">RV</div>
        </div>
        <div class="option-pair">
            <label class="check-control">
                <input type="checkbox" id="hideDiagram" onchange="renderPages()">
                <span class="check-text" data-i18n="opt_hide_diag">Schéma à tracer</span>
            </label>
            <label class="check-control">
                <input type="checkbox" id="nonPropDiagram" onchange="renderPages()">
                <span class="check-text" data-i18n="opt_non_prop">Non proportionnel</span>
            </label>
        </div>
        <div class="corr-group" id="relationHintOption" style="display:none;">
            <label class="check-control">
                <input type="checkbox" id="giveOnePart" onchange="startGen()">
                <span class="check-text">Une tache donnée</span>
            </label>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title" data-i18n="layout">Mise en page</div>
      <select id="gridSize" onchange="startGen()">
          <option value="3x4" selected data-i18n="grid_12">12 cases (3x4)</option>
          <option value="3x3" data-i18n="grid_9">9 cases (3x3)</option>
          <option value="2x4" data-i18n="grid_8">8 cases (Grosses)</option>
          <option value="2x3" data-i18n="grid_6">6 cases (Enquête)</option>
      </select>
    </div>

    <div class="section">
      <div class="sec-title" data-i18n="content">Contenu</div>
      <div class="control">
        <label for="problemType">Type de problème</label>
        <select id="problemType" onchange="updateProblemTypeUI(); startGen()">
          <option value="classic" selected>Petit Splat classique</option>
          <option value="relation2">Relation entre 2 taches</option>
          <option value="relation3">Enquête avec 3 taches</option>
          <option value="sums3">Défi : sommes de taches</option>
        </select>
      </div>
      <div class="control-grid">
        <div id="relationControls" class="control" style="display:none;">
          <label>Niveau</label>
          <select id="relationLevel" onchange="startGen()">
            <option value="simple" selected>Simple</option>
            <option value="advanced">Avancé</option>
            <option value="expert">Expert</option>
          </select>
        </div>
        <div class="control" id="targetControl">
            <label data-i18n="target">Cible max</label>
            <select id="targetVal" onchange="startGen()">
              <option value="20" selected>20 (Standard)</option>
              <option value="50">50 (Avancé)</option>
              <option value="100">100 (Expert)</option>
            </select>
        </div>
        <div class="control" id="splatCountControl">
            <label data-i18n="splat_count">Taches</label>
            <select id="splatMode" onchange="startGen()">
              <option value="1" selected>1 tache</option>
              <option value="2">2 taches</option>
              <option value="3">3 taches</option>
              <option value="mix">Mélange Expert (2 à 6)</option>
            </select>
        </div>
      </div>
      <div class="control" id="exerciseControl">
        <label data-i18n="exercise">Exercice</label>
        <select id="gameMode" onchange="startGen()">
          <option value="find_hidden" selected data-i18n="mode_hidden">Compléter le schéma en barres</option>
          <option value="construct" data-i18n="mode_draw">Dessiner les jetons</option>
          <option value="mix" data-i18n="mode_mix">Mélange</option>
        </select>
      </div>
    </div>

    <div class="section seed-section">
      <div class="sec-title" data-i18n="seed_section">Graine</div>
      <div class="seed-row">
        <input type="text" id="seedInput" class="seed-auto" inputmode="text" autocomplete="off" oninput="onSeedInput()" onfocus="this.select()" onkeydown="if(event.key==='Enter') startGen()">
        <button type="button" class="seed-btn" onclick="newAutoSeed()" title="Nouvelle graine" aria-label="Nouvelle graine">🎲</button>
      </div>
      <div id="seedStatus" class="seed-status" data-i18n="seed_status_auto">graine automatique</div>
    </div>

    <div class="section print-title-control">
      <label for="activityLabel">Titre imprimé</label>
      <input id="activityLabel" type="text" placeholder="ex. Activité 1" oninput="renderPages()">
    </div>

    <div class="actions">
      <button class="btn btn-new" onclick="startGen()" data-i18n="btn_mix">GÉNÉRER</button>
      <button class="btn btn-print" id="printBtn" onclick="window.print()" data-i18n="btn_print">IMPRIMER</button>
    </div>
  </div>


</aside>

<main id="mainArea"></main>

<script>
const i18n = {
    fr: {
        title: "Petit Splat!", lang: "Langue", options: "Options", opt_corr: "Correction + Énoncé", opt_hide_diag: "Schéma à tracer",
        opt_non_prop: "Non proportionnel",
        layout: "Mise en page", grid_12: "12 cases (3x4)", grid_9: "9 cases (3x3)", grid_8: "8 cases (Grosses)", grid_6: "6 cases (Enquête)",
        content: "Contenu", target: "Cible max", splat_count: "Taches",
        problem_type: "Type de problème", module_classic: "Petit Splat classique", module_relation2: "Relation entre 2 taches", module_relation3: "Enquête avec 3 taches", module_sums3: "Défi : sommes de taches",
        exercise: "Exercice", mode_hidden: "Compléter le schéma en barres", mode_draw: "Dessiner les jetons", mode_mix: "Mélange",
        seed_section: "Graine", seed_label: "Graine", seed_status_auto: "graine automatique", seed_status_manual: "graine fixée",
        btn_mix: "GÉNÉRER", btn_print: "IMPRIMER"
    },
    en: {
        title: "Petit Splat!", lang: "Language", options: "Options", opt_corr: "Key + Problem", opt_hide_diag: "Draw Diagram",

let currentLang = 'fr';
let state = [];
let isRVMode = false; 
let isTBI = false;
let seedMode = 'auto';
let activeSeed = '';
let currentRand = Math.random;

function hashSeed(seed) {
    let h = 2166136261 >>> 0;
    const str = String(seed);
    for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 16777619);
    }
    return h >>> 0;
}

function mulberry32(seed) {
    return function() {
        let t = seed += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
}

function rand() {
    return currentRand();
}

function makeAutoSeed() {
    return String(Math.floor(100000 + Math.random() * 900000));
}

function updateSeedUI() {
    const input = document.getElementById('seedInput');
    const status = document.getElementById('seedStatus');
    if (!input || !status) return;

    const dict = i18n[currentLang] || i18n.fr;
    input.classList.toggle('seed-auto', seedMode === 'auto');
    input.classList.toggle('seed-manual', seedMode === 'manual');
    status.classList.toggle('manual', seedMode === 'manual');
    status.innerText = seedMode === 'manual' ? dict.seed_status_manual : dict.seed_status_auto;
}

function prepareSeedForGeneration() {
    const input = document.getElementById('seedInput');
    if (!input) {
        activeSeed = makeAutoSeed();
    } else if (seedMode === 'manual') {
        activeSeed = input.value.trim();
        if (!activeSeed) {
            seedMode = 'auto';
            activeSeed = makeAutoSeed();
        }
    } else {
        activeSeed = makeAutoSeed();
    }

    if (input) input.value = activeSeed;
    currentRand = mulberry32(hashSeed(activeSeed));
    updateSeedUI();
    return activeSeed;
}

function onSeedInput() {
    const input = document.getElementById('seedInput');
    if (!input || input.value.trim() === '') {
        seedMode = 'auto';
    } else {
        seedMode = 'manual';
        activeSeed = input.value.trim();
    }
    updateSeedUI();
}

function newAutoSeed() {
    seedMode = 'auto';
    startGen();
}

function setLang(l, el) { 
    currentLang = l; 
    document.querySelectorAll('.flag-btn').forEach(b => b.classList.remove('active')); 
    el.classList.add('active'); 
    updateUI(); 
    renderPages(); 
}

function updateUI() {
    const dict = i18n[currentLang];
    document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if(dict[key]) el.innerText = dict[key];
    });
    updateSeedUI();
}


function getProblemType() {
    const el = document.getElementById('problemType');
    return el ? el.value : 'classic';
}

function updateProblemTypeUI() {
    const problemType = getProblemType();
    const isClassic = problemType === 'classic';
    const isRelation2 = problemType === 'relation2';
    const isRelation3 = problemType === 'relation3';
    const isSums3 = problemType === 'sums3';
    const splatCountControl = document.getElementById('splatCountControl');
    const exerciseControl = document.getElementById('exerciseControl');
    const relationControls = document.getElementById('relationControls');
    const relationHintOption = document.getElementById('relationHintOption');
    const gridSelect = document.getElementById('gridSize');
    const opt3x4 = gridSelect ? gridSelect.querySelector('option[value="3x4"]') : null;
    const opt3x3 = gridSelect ? gridSelect.querySelector('option[value="3x3"]') : null;
    const opt2x4 = gridSelect ? gridSelect.querySelector('option[value="2x4"]') : null;
    const opt2x3 = gridSelect ? gridSelect.querySelector('option[value="2x3"]') : null;

    if (splatCountControl) splatCountControl.style.display = isClassic ? '' : 'none';
    if (exerciseControl) exerciseControl.style.display = isClassic ? '' : 'none';
    if (relationControls) relationControls.style.display = isClassic ? 'none' : '';
    if (relationHintOption) relationHintOption.style.display = isClassic ? 'none' : 'flex';

    // Chaque module garde sa mise en page lisible :
    // - classique : choix habituel 12 / 9 / 8 ;
    // - relation 2 : 9 cases ;
    // - enquête 3 et sommes : 6 cases (2 colonnes × 3 lignes), sans modifier le classique.
    if (gridSelect) {
        if (isClassic) {
            if (opt3x4) opt3x4.disabled = false;
            if (opt3x3) opt3x3.disabled = false;
            if (opt2x4) opt2x4.disabled = false;
            if (opt2x3) opt2x3.disabled = true;
            if (gridSelect.value === '2x3') gridSelect.value = '3x4';
        } else if (isRelation2) {
            if (opt3x4) opt3x4.disabled = true;
            if (opt3x3) opt3x3.disabled = false;
            if (opt2x4) opt2x4.disabled = true;
            if (opt2x3) opt2x3.disabled = true;
            if (gridSelect.value !== '3x3') gridSelect.value = '3x3';
        } else if (isRelation3 || isSums3) {
            if (opt3x4) opt3x4.disabled = true;
            if (opt3x3) opt3x3.disabled = true;
            if (opt2x4) opt2x4.disabled = true;
            if (opt2x3) opt2x3.disabled = false;
            if (gridSelect.value !== '2x3') gridSelect.value = '2x3';
        }
    }
}

function toggleMode() {
    isTBI = document.getElementById('supportMode').value === 'tbi';
    const printSection = document.getElementById('printOptionsSection');
    const printBtn = document.getElementById('printBtn');
    
    if (isTBI) {
        printSection.style.display = 'none';
        printBtn.style.display = 'none';
    } else {
        printSection.style.display = 'block';
        printBtn.style.display = 'block';
    }
    updateProblemTypeUI();
    renderPages();
}

function toggleCorr() {
    const isCorr = document.getElementById('showCorr').checked;
    const rvBtn = document.getElementById('btnRV');
    if(isCorr) { rvBtn.classList.remove('disabled'); } 
    else { rvBtn.classList.add('disabled'); rvBtn.classList.remove('active'); isRVMode = false; }
    renderPages();
}

function toggleRV(btn) {
    if(btn.classList.contains('disabled')) return;
    isRVMode = !isRVMode;
    if(isRVMode) btn.classList.add('active');
    else btn.classList.remove('active');
    renderPages();
}

function startGen() {
  prepareSeedForGeneration();
  updateProblemTypeUI();

  const sizeSelect = document.getElementById('gridSize').value;
  const [cols, rows] = sizeSelect.split('x').map(Number);
  document.documentElement.style.setProperty('--cols', cols);
  document.documentElement.style.setProperty('--rows', rows);
  
  const targetMax = parseInt(document.getElementById('targetVal').value);
  const gameMode = document.getElementById('gameMode').value;
  const splatMode = document.getElementById('splatMode').value;
  const problemType = getProblemType();
  
  state = [];
  const totalItems = cols * rows;

  for(let i=0; i<totalItems; i++) {
      if (problemType === 'relation2') {
          state.push(createRelation2Item(targetMax));
      } else if (problemType === 'relation3') {
          state.push(createRelation3Item(targetMax));
      } else if (problemType === 'sums3') {
          state.push(createSums3Item(targetMax));
      } else {
          state.push(createItem(gameMode, targetMax, splatMode));
      }
  }
  
  renderPages();
}


function generateHiddenDotsBySplat(splats, counts, splatShape, maxTarget) {
    const W = 300, H = 200;
    let dotR = (maxTarget > 50) ? 5 : 8;
    let ctx = null;

    try {
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        ctx = canvas.getContext('2d');
    } catch (e) { return []; }

    const allHiddenDots = [];

    for (let idx = 0; idx < splats.length; idx++) {
        const s = splats[idx];
        const count = counts[idx] || 0;
        const shapeIndex = (s.pathIndex !== undefined ? s.pathIndex : splatShape) % SPLAT_SHAPES.length;
        const splatPath = new Path2D(SPLAT_SHAPES[shapeIndex]);
        ctx.lineWidth = ((dotR * 2) + 6) / s.scale;
        const placed = [];

        for (let k = 0; k < count; k++) {
            let safe = false;
            let bestDX = undefined, bestDY = undefined;
            let attempts = 0;

            while (!safe && attempts < 300) {
                attempts++;
                let localX = 150 + (rand() - 0.5) * 160;
                let localY = 100 + (rand() - 0.5) * 160;

                if (!ctx.isPointInPath(splatPath, localX, localY)) continue;
                if (ctx.isPointInStroke(splatPath, localX, localY)) continue;

                let rad = s.rot * Math.PI / 180;
                let cos = Math.cos(rad), sin = Math.sin(rad);
                let scaledX = (localX - 150) * s.scale;
                let scaledY = (localY - 100) * s.scale;
                let currentDX = (scaledX * cos - scaledY * sin) + s.cx;
                let currentDY = (scaledX * sin + scaledY * cos) + s.cy;

                bestDX = currentDX;
                bestDY = currentDY;

                let overlap = false;
                let minReqDist = dotR * 2.2;
                if (attempts > 100) minReqDist = dotR * 1.2;
                if (attempts > 200) minReqDist = 0;

                for (let p of placed) {
                    if (Math.sqrt((currentDX - p.x)**2 + (currentDY - p.y)**2) < minReqDist) { overlap = true; break; }
                }
                if (!overlap) safe = true;
            }

            if (bestDX !== undefined) {
                placed.push({x: bestDX, y: bestDY});
                allHiddenDots.push({x: bestDX, y: bestDY, r: dotR, color: s.dotColor || '#2563eb'});
            }
        }
    }
    return allHiddenDots;
}

function getRelation2Settings() {
    const levelEl = document.getElementById('relationLevel');
    return {
        // Le menu reste simple : le générateur mélange en interne les écarts et les relations multiplicatives.
        kind: 'mix',
        level: levelEl ? levelEl.value : 'simple'
    };
}

function shouldGiveOnePart() {
    const el = document.getElementById('giveOnePart');
    return !!(el && el.checked);
}

function chooseGivenPartId(parts) {
    if (!shouldGiveOnePart() || !parts || !parts.length) return null;
    return parts[Math.floor(rand() * parts.length)].id;
}

function pluralJetons(n) {
    return `jeton${n > 1 ? 's' : ''}`;
}

function fractionWord(factor) {
    if (factor === 2) return 'la moitié';
    if (factor === 3) return 'le tiers';
    if (factor === 4) return 'le quart';
    return `1/${factor}`;
}


function getRelationFactors(level) {
    if (level === 'expert') return [2, 3, 4];
    if (level === 'advanced') return [2, 3];
    return [2];
}

function getRelationFamilies(level) {
    // Simple contient déjà le double / la moitié ; avancé ajoute le triple ; expert ajoute le quadruple.
    return ['add', 'mult'];
}

function chooseRelationFamily(level, forcedFamily = null) {
    if (forcedFamily) return forcedFamily;
    const families = getRelationFamilies(level);
    return families[Math.floor(rand() * families.length)];
}

function makeRelationToReference(baseValue, otherLabel, refLabel, level, maxTarget, forcedFamily = null) {
    const family = chooseRelationFamily(level, forcedFamily);
    const cap = Math.max(12, maxTarget);

    if (family === 'mult') {
        const factors = getRelationFactors(level);
        const factor = factors[Math.floor(rand() * factors.length)];
        let otherValue;
        let otherIsBig = rand() > 0.35;

        if (otherIsBig) {
            otherValue = baseValue * factor;
        } else if (baseValue % factor === 0 && baseValue / factor >= 1) {
            otherValue = baseValue / factor;
        } else {
            otherIsBig = true;
            otherValue = baseValue * factor;
        }

        const bigger = otherValue > baseValue ? otherLabel : refLabel;
        const smaller = otherValue > baseValue ? refLabel : otherLabel;
        const styles = [
            `La tache ${bigger} cache ${factor} fois plus de jetons que la tache ${smaller}.`,
            `La tache ${smaller} cache ${factor} fois moins de jetons que la tache ${bigger}.`,
            `La tache ${smaller} cache ${fractionWord(factor)} de ce que cache la tache ${bigger}.`
        ];
        return {
            value: otherValue,
            text: styles[Math.floor(rand() * styles.length)],
            family: 'mult',
            factor,
            from: otherLabel,
            ref: refLabel
        };
    }

    const deltaLimit = level === 'expert' ? 12 : (level === 'advanced' ? 10 : 6);
    const deltaMax = Math.max(1, Math.min(deltaLimit, cap - 3));
    let delta = Math.floor(rand() * deltaMax) + 1;
    let otherIsBig = rand() > 0.45;

    if (!otherIsBig && baseValue - delta < 1) otherIsBig = true;
    const otherValue = otherIsBig ? baseValue + delta : baseValue - delta;
    const bigger = otherValue > baseValue ? otherLabel : refLabel;
    const smaller = otherValue > baseValue ? refLabel : otherLabel;
    const styles = [
        `La tache ${bigger} cache ${delta} ${pluralJetons(delta)} de plus que la tache ${smaller}.`,
        `La tache ${smaller} cache ${delta} ${pluralJetons(delta)} de moins que la tache ${bigger}.`
    ];
    return {
        value: otherValue,
        text: styles[Math.floor(rand() * styles.length)],
        family: 'add',
        delta,
        from: otherLabel,
        ref: refLabel
    };
}

function relationSignature(rel) {
    return rel.family === 'mult' ? `${rel.family}:${rel.factor}` : `${rel.family}:${rel.delta}`;
}

function chooseBaseValueForRelation3(level, cap) {
    const divisor = level === 'expert' ? 7 : (level === 'advanced' ? 6 : 5);
    const baseMax = Math.max(3, Math.floor(cap / divisor) + 2);
    return Math.floor(rand() * baseMax) + 2;
}

function createRelation2Item(maxTarget) {
    // Génération pensée pour le primaire : on choisit d'abord les valeurs cachées,
    // puis on calcule le total. Ainsi le problème est toujours soluble proprement.
    const settings = getRelation2Settings();
    const families = settings.kind === 'mix' ? ['add', 'mult'] : [settings.kind];
    const family = families[Math.floor(rand() * families.length)];
    const cap = Math.max(12, maxTarget);

    const shapeA = Math.floor(rand() * SPLAT_SHAPES.length);
    const shapeB = (shapeA + 1 + Math.floor(rand() * (SPLAT_SHAPES.length - 1))) % SPLAT_SHAPES.length;
    const rotA = Math.floor(rand() * 360);
    const rotB = (rotA + 35 + Math.floor(rand() * 120)) % 360;

    let a = 1, b = 2, visible = 0, total = 0;
    let relationText = '';
    let relationMeta = {};

    const labels = { A: 'noire', B: 'orange' };

    if (family === 'mult') {
        const factors = settings.level === 'expert' ? [2, 3, 4] : (settings.level === 'advanced' ? [2, 3] : [2]);
        const factor = factors[Math.floor(rand() * factors.length)];
        const smallMax = Math.max(1, Math.floor((cap - 1) / (factor + 1)));
        const small = Math.floor(rand() * smallMax) + 1;
        const big = small * factor;
        const orangeIsBig = rand() > 0.5;
        a = orangeIsBig ? small : big;
        b = orangeIsBig ? big : small;

        const maxVisibleAllowed = Math.max(0, Math.min(20, cap - a - b));
        visible = maxVisibleAllowed >= 1 ? Math.floor(rand() * maxVisibleAllowed) + 1 : 0;
        total = a + b + visible;

        const bigger = a > b ? labels.A : labels.B;
        const smaller = a > b ? labels.B : labels.A;
        const styles = [
            `La tache ${bigger} cache ${factor} fois plus de jetons que la tache ${smaller}.`,
            `La tache ${smaller} cache ${factor} fois moins de jetons que la tache ${bigger}.`,
            `La tache ${smaller} cache ${fractionWord(factor)} de ce que cache la tache ${bigger}.`
        ];
        relationText = styles[Math.floor(rand() * styles.length)];
        relationMeta = { family: 'mult', factor };
    } else {
        const deltaLimit = settings.level === 'expert' ? 12 : (settings.level === 'advanced' ? 10 : 6);
        const deltaMax = Math.max(1, Math.min(deltaLimit, cap - 3));
        const delta = Math.floor(rand() * deltaMax) + 1;
        const smallMax = Math.max(1, Math.floor((cap - delta - 1) / 2));
        const small = Math.floor(rand() * smallMax) + 1;
        const big = small + delta;
        const orangeIsBig = rand() > 0.5;
        a = orangeIsBig ? small : big;
        b = orangeIsBig ? big : small;

        const maxVisibleAllowed = Math.max(0, Math.min(20, cap - a - b));
        visible = maxVisibleAllowed >= 1 ? Math.floor(rand() * maxVisibleAllowed) + 1 : 0;
        total = a + b + visible;

        const bigger = a > b ? labels.A : labels.B;
        const smaller = a > b ? labels.B : labels.A;
        const styles = [
            `La tache ${bigger} cache ${delta} ${pluralJetons(delta)} de plus que la tache ${smaller}.`,
            `La tache ${smaller} cache ${delta} ${pluralJetons(delta)} de moins que la tache ${bigger}.`
        ];
        relationText = styles[Math.floor(rand() * styles.length)];
        relationMeta = { family: 'add', delta };
    }

    const splats = [
        { cx: 75, y: 115, cy: 115, scale: 0.62, rot: rotA, color: '#111827', dotColor: '#2563eb', label: 'noire', pathIndex: shapeA },
        { cx: 185, y: 115, cy: 115, scale: 0.62, rot: rotB, color: '#f97316', dotColor: '#2563eb', label: 'orange', pathIndex: shapeB }
    ];

    const dotsPositions = generateDotPositions(visible, maxTarget, shapeA, splats);
    const hiddenDots = generateHiddenDotsBySplat(splats, [a, b], shapeA, maxTarget);

    const parts = [
        { id: 'A', short: 'N', label: 'noire', value: a, color: '#111827' },
        { id: 'B', short: 'O', label: 'orange', value: b, color: '#ea580c' }
    ];
    const givenPartId = chooseGivenPartId(parts);

    return {
        kind: 'relation2',
        mode: 'relation2',
        total,
        visible,
        hidden: a + b,
        splatShape: shapeA,
        splats,
        dots: dotsPositions,
        hiddenDots,
        maxTargetContext: maxTarget,
        parts,
        givenPartId,
        clues: [relationText],
        relationText,
        ...relationMeta
    };
}


function createRelation3Item(maxTarget) {
    // Enquête avec 3 taches.
    // Simple : pivot commun = noire.
    // Avancé : pivot commun variable.
    // Expert : pivot commun variable ou chaîne.
    const settings = getRelation2Settings();
    const level = settings.level || 'simple';
    const cap = Math.max(18, maxTarget);
    const labels = { A: 'noire', B: 'orange', C: 'rouge' };
    const ids = ['A', 'B', 'C'];

    let values = { A: 3, B: 5, C: 6 };
    let visible = 2, total = 16;
    let clues = [];
    let structure = 'pivot-fixed';
    let pivotId = 'A';

    for (let attempt = 0; attempt < 1200; attempt++) {
        const candidateValues = {};
        const candidateClues = [];
        let candidateStructure = 'pivot-fixed';
        let candidatePivot = 'A';

        const useChain = level === 'expert' && rand() < 0.38;

        if (useChain) {
            candidateStructure = 'chain';
            const order = ids.slice();
            // Mélange déterministe via rand() pour respecter la graine.
            for (let i = order.length - 1; i > 0; i--) {
                const j = Math.floor(rand() * (i + 1));
                const tmp = order[i]; order[i] = order[j]; order[j] = tmp;
            }

            const first = order[0], second = order[1], third = order[2];
            const firstValue = chooseBaseValueForRelation3(level, cap);
            const relSecond = makeRelationToReference(firstValue, labels[second], labels[first], level, maxTarget);
            const relThird = makeRelationToReference(relSecond.value, labels[third], labels[second], level, maxTarget);

            candidateValues[first] = firstValue;
            candidateValues[second] = relSecond.value;
            candidateValues[third] = relThird.value;
            candidateClues.push(relSecond.text, relThird.text);
            candidatePivot = first;
        } else {
            candidateStructure = level === 'simple' ? 'pivot-fixed' : 'pivot-variable';
            candidatePivot = level === 'simple' ? 'A' : ids[Math.floor(rand() * ids.length)];
            const others = ids.filter(id => id !== candidatePivot);
            const pivotValue = chooseBaseValueForRelation3(level, cap);
            const rel1 = makeRelationToReference(pivotValue, labels[others[0]], labels[candidatePivot], level, maxTarget);
            const rel2 = makeRelationToReference(pivotValue, labels[others[1]], labels[candidatePivot], level, maxTarget);

            candidateValues[candidatePivot] = pivotValue;
            candidateValues[others[0]] = rel1.value;
            candidateValues[others[1]] = rel2.value;
            candidateClues.push(rel1.text, rel2.text);

            // On évite deux indices exactement du même type numérique sur la même carte.
            if (relationSignature(rel1) === relationSignature(rel2)) continue;
        }

        const valueList = ids.map(id => candidateValues[id]);
        if (valueList.some(v => !Number.isFinite(v) || v < 2 || v > cap)) continue;
        if (new Set(valueList).size < 3) continue;

        const sumHidden = valueList.reduce((x, y) => x + y, 0);
        if (sumHidden >= cap) continue;

        const maxVisibleAllowed = Math.max(1, Math.min(18, cap - sumHidden));
        const vis = Math.floor(rand() * maxVisibleAllowed) + 1;
        if (sumHidden + vis > cap) continue;

        values = candidateValues;
        visible = vis;
        total = sumHidden + visible;
        clues = candidateClues;
        structure = candidateStructure;
        pivotId = candidatePivot;
        break;
    }

    if (!clues.length) {
        values = { A: 4, B: 8, C: 6 };
        visible = 2; total = 20;
        clues = [
            'La tache orange cache 2 fois plus de jetons que la tache noire.',
            'La tache rouge cache 2 jetons de plus que la tache noire.'
        ];
        structure = 'pivot-fixed';
        pivotId = 'A';
    }

    const shapeA = Math.floor(rand() * SPLAT_SHAPES.length);
    const shapeB = (shapeA + 1 + Math.floor(rand() * (SPLAT_SHAPES.length - 1))) % SPLAT_SHAPES.length;
    let shapeC = (shapeB + 1 + Math.floor(rand() * (SPLAT_SHAPES.length - 1))) % SPLAT_SHAPES.length;
    if (shapeC === shapeA) shapeC = (shapeC + 1) % SPLAT_SHAPES.length;

    const rotA = Math.floor(rand() * 360);
    const rotB = (rotA + 35 + Math.floor(rand() * 120)) % 360;
    const rotC = (rotB + 35 + Math.floor(rand() * 120)) % 360;

    // Disposition spéciale 6 cases : triangle plus ouvert, taches plus grandes et plus espacées.
    const splats = [
        // Taches plus étalées sur la largeur ; rouge remontée pour éviter la zone d'indice.
        { cx: 44,  y: 88,  cy: 88,  scale: 0.65, rot: rotA, color: '#111827', dotColor: '#2563eb', label: labels.A, pathIndex: shapeA },
        { cx: 236, y: 90,  cy: 90,  scale: 0.65, rot: rotB, color: '#f97316', dotColor: '#2563eb', label: labels.B, pathIndex: shapeB },
        { cx: 140, y: 138, cy: 138, scale: 0.59, rot: rotC, color: '#dc2626', dotColor: '#2563eb', label: labels.C, pathIndex: shapeC }
    ];

    const dotsPositions = generateDotPositions(visible, maxTarget, shapeA, splats);
    const hiddenDots = generateHiddenDotsBySplat(splats, [values.A, values.B, values.C], shapeA, maxTarget);

    const parts = [
        { id: 'A', short: 'N', label: labels.A, value: values.A, color: '#111827' },
        { id: 'B', short: 'O', label: labels.B, value: values.B, color: '#ea580c' },
        { id: 'C', short: 'R', label: labels.C, value: values.C, color: '#dc2626' }
    ];
    const givenPartId = chooseGivenPartId(parts);

    return {
        kind: 'relation3',
        mode: 'relation3',
        total,
        visible,
        hidden: values.A + values.B + values.C,
        splatShape: shapeA,
        splats,
        dots: dotsPositions,
        hiddenDots,
        maxTargetContext: maxTarget,
        structure,
        pivotId,
        parts,
        givenPartId,
        clues,
        relationText: clues.join('\n')
    };
}

function chooseValueRangeForSums(level, cap) {
    const maxByCap = Math.max(5, Math.floor((cap - 2) / 3));
    if (level === 'expert') return { min: 3, max: Math.max(6, Math.min(28, maxByCap + 10)) };
    if (level === 'advanced') return { min: 2, max: Math.max(6, Math.min(20, maxByCap + 6)) };
    return { min: 2, max: Math.max(5, Math.min(12, maxByCap + 3)) };
}

function createSums3Item(maxTarget) {
    // Défi : trois taches, indices donnés sous forme de sommes de deux taches.
    // Exemple : N + O = 15 ; O + R = 17 ; N + R = 14.
    const settings = getRelation2Settings();
    const level = settings.level || 'simple';
    const cap = Math.max(20, maxTarget);
    const labels = { A: 'noire', B: 'orange', C: 'rouge' };
    const shorts = { A: 'N', B: 'O', C: 'R' };

    let values = { A: 4, B: 6, C: 8 };
    let visible = 2;
    let total = 20;

    const range = chooseValueRangeForSums(level, cap);

    for (let attempt = 0; attempt < 900; attempt++) {
        const a = range.min + Math.floor(rand() * (range.max - range.min + 1));
        const b = range.min + Math.floor(rand() * (range.max - range.min + 1));
        const c = range.min + Math.floor(rand() * (range.max - range.min + 1));
        if (new Set([a, b, c]).size < 3) continue;

        const hidden = a + b + c;
        if (hidden >= cap) continue;

        const maxVisibleAllowed = Math.max(1, Math.min(18, cap - hidden));
        const vis = Math.floor(rand() * maxVisibleAllowed) + 1;
        if (hidden + vis > cap) continue;

        values = { A: a, B: b, C: c };
        visible = vis;
        total = hidden + visible;
        break;
    }

    const shapeA = Math.floor(rand() * SPLAT_SHAPES.length);
    const shapeB = (shapeA + 1 + Math.floor(rand() * (SPLAT_SHAPES.length - 1))) % SPLAT_SHAPES.length;
    let shapeC = (shapeB + 1 + Math.floor(rand() * (SPLAT_SHAPES.length - 1))) % SPLAT_SHAPES.length;
    if (shapeC === shapeA) shapeC = (shapeC + 1) % SPLAT_SHAPES.length;

    const rotA = Math.floor(rand() * 360);
    const rotB = (rotA + 35 + Math.floor(rand() * 120)) % 360;
    const rotC = (rotB + 35 + Math.floor(rand() * 120)) % 360;

    const splats = [
        { cx: 44,  y: 88,  cy: 88,  scale: 0.65, rot: rotA, color: '#111827', dotColor: '#2563eb', label: labels.A, pathIndex: shapeA },
        { cx: 236, y: 90,  cy: 90,  scale: 0.65, rot: rotB, color: '#f97316', dotColor: '#2563eb', label: labels.B, pathIndex: shapeB },
        { cx: 140, y: 138, cy: 138, scale: 0.59, rot: rotC, color: '#dc2626', dotColor: '#2563eb', label: labels.C, pathIndex: shapeC }
    ];

    const pairClues = [
        { text: `${shorts.A} + ${shorts.B} = ${values.A + values.B}`, order: rand() },
        { text: `${shorts.B} + ${shorts.C} = ${values.B + values.C}`, order: rand() },
        { text: `${shorts.A} + ${shorts.C} = ${values.A + values.C}`, order: rand() }
    ].sort((x, y) => x.order - y.order).map(x => x.text);

    const dotsPositions = generateDotPositions(visible, maxTarget, shapeA, splats);
    const hiddenDots = generateHiddenDotsBySplat(splats, [values.A, values.B, values.C], shapeA, maxTarget);

    const parts = [
        { id: 'A', short: 'N', label: labels.A, value: values.A, color: '#111827' },
        { id: 'B', short: 'O', label: labels.B, value: values.B, color: '#ea580c' },
        { id: 'C', short: 'R', label: labels.C, value: values.C, color: '#dc2626' }
    ];
    const givenPartId = chooseGivenPartId(parts);

    return {
        kind: 'sums3',
        mode: 'sums3',
        total,
        visible,
        hidden: values.A + values.B + values.C,
        splatShape: shapeA,
        splats,
        dots: dotsPositions,
        hiddenDots,
        maxTargetContext: maxTarget,
        structure: 'pair-sums',
        parts,
        givenPartId,
        clues: pairClues,
        relationText: pairClues.join('\n')
    };
}

function createItem(mode, maxTarget, splatMode) {
    let actualMode = mode === 'mix' ? (rand() > 0.5 ? 'find_hidden' : 'construct') : mode;
    let clueGiven = rand() > 0.5 ? 'visible' : 'hidden';

    let numSplats = 1;
    if (splatMode === 'mix') {
        numSplats = Math.floor(rand() * 5) + 2; 
    } else {
        numSplats = parseInt(splatMode);
    }

    let maxHiddenPerSplat = Math.max(1, Math.floor(maxTarget / numSplats));
    let hiddenPerSplat = Math.floor(rand() * maxHiddenPerSplat) + 1;
    let hidden = hiddenPerSplat * numSplats;

    let maxVisibleAllowed = Math.min(maxTarget - hidden, 20);
    if (maxVisibleAllowed < 0) maxVisibleAllowed = 0;
    let visible = Math.floor(rand() * (maxVisibleAllowed + 1));
    
    let total = hidden + visible;

    const splatShape = Math.floor(rand() * SPLAT_SHAPES.length);
    const splatRot = Math.floor(rand() * 360);

    const layouts = {
        1: [{x: 135, y: 110, s: 0.85}],
        2: [{x: 75, y: 115, s: 0.6}, {x: 185, y: 115, s: 0.6}],
        3: [{x: 55, y: 125, s: 0.45}, {x: 135, y: 125, s: 0.45}, {x: 215, y: 125, s: 0.45}],
        4: [{x: 75, y: 85, s: 0.4}, {x: 185, y: 85, s: 0.4}, {x: 75, y: 155, s: 0.4}, {x: 185, y: 155, s: 0.4}],
        5: [{x: 55, y: 85, s: 0.35}, {x: 195, y: 85, s: 0.35}, {x: 125, y: 120, s: 0.35}, {x: 55, y: 160, s: 0.35}, {x: 195, y: 160, s: 0.35}],
        6: [{x: 55, y: 90, s: 0.35}, {x: 125, y: 90, s: 0.35}, {x: 195, y: 90, s: 0.35}, {x: 55, y: 160, s: 0.35}, {x: 125, y: 160, s: 0.35}, {x: 195, y: 160, s: 0.35}]
    };
    
    let splats = layouts[numSplats].map(l => ({ cx: l.x, cy: l.y, scale: l.s, rot: splatRot }));
    const dotsPositions = generateDotPositions(visible, maxTarget, splatShape, splats);
    const hiddenDots = generateHiddenDots(splats, hiddenPerSplat, splatShape, maxTarget);

    return {

        mode: actualMode, clueGiven, splatShape, splats,
        dots: dotsPositions, hiddenDots: hiddenDots, maxTargetContext: maxTarget
    };
}

function generateHiddenDots(splats, countPerSplat, splatShape, maxTarget) {
    const W = 300, H = 200;
    let dotR = (maxTarget > 50) ? 5 : 8;
    let ctx = null, splatPath = null;

    try {
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        ctx = canvas.getContext('2d');
        splatPath = new Path2D(SPLAT_SHAPES[splatShape % SPLAT_SHAPES.length]);
    } catch (e) { return []; }

    const allHiddenDots = [];
    
    for (let s of splats) {
        // CORRECTION ICI : La ligne virtuelle qui repousse les jetons s'adapte à l'échelle de la tache
        // pour garantir qu'aucune bille ne dépasse, même si la tache est très petite !
        ctx.lineWidth = ((dotR * 2) + 6) / s.scale; 

        const placed = [];
        for (let k = 0; k < countPerSplat; k++) {
            let safe = false;
            let bestDX = undefined, bestDY = undefined;
            let attempts = 0;
            
            while (!safe && attempts < 300) {
                attempts++;
                let localX = 150 + (rand() - 0.5) * 160;
                let localY = 100 + (rand() - 0.5) * 160;
                
                if (!ctx.isPointInPath(splatPath, localX, localY)) continue;
                if (ctx.isPointInStroke(splatPath, localX, localY)) continue;
                
                let rad = s.rot * Math.PI / 180;
                let cos = Math.cos(rad), sin = Math.sin(rad);
                let scaledX = (localX - 150) * s.scale;
                let scaledY = (localY - 100) * s.scale;
                let currentDX = (scaledX * cos - scaledY * sin) + s.cx;
                let currentDY = (scaledX * sin + scaledY * cos) + s.cy;

                bestDX = currentDX;
                bestDY = currentDY;

                let overlap = false;
                let minReqDist = dotR * 2.2; 
                if (attempts > 100) minReqDist = dotR * 1.2; 
                if (attempts > 200) minReqDist = 0; 

                for (let p of placed) {
                    if (Math.sqrt((currentDX - p.x)**2 + (currentDY - p.y)**2) < minReqDist) { overlap = true; break; }
                }
                if (!overlap) safe = true;
            }
            
            if (bestDX !== undefined) {
                placed.push({x: bestDX, y: bestDY});
                allHiddenDots.push({x: bestDX, y: bestDY, r: dotR});
            }
        }
    }
    return allHiddenDots;
}


function generateDotPositions(count, maxTarget, splatShape, splats) {
    const W = 300, H = 200;
    let dotR = (maxTarget > 50) ? 5 : 8;
    let canTestSplat = false, ctx = null, splatPath = null;

    function inverseTransform(px, py, cx, cy, rot, scale) {
        let dx = px - cx, dy = py - cy;
        let rad = -rot * Math.PI / 180;
        let cos = Math.cos(rad), sin = Math.sin(rad);
        let rx = dx * cos - dy * sin;
        let ry = dx * sin + dy * cos;
        return { x: (rx / scale) + 150, y: (ry / scale) + 100 };
    }

    try {
        const canvas = document.createElement('canvas');
        canvas.width = W; canvas.height = H;
        ctx = canvas.getContext('2d');
        splatPath = new Path2D(SPLAT_SHAPES[splatShape % SPLAT_SHAPES.length]);
        canTestSplat = !!ctx && !!splatPath;
    } catch (e) { canTestSplat = false; }

    const placed = [];
    
    for (let k = 0; k < count; k++) {
        let bestCand = null;
        let maxMinDist = -1;
        
        for (let c = 0; c < 40; c++) {
            let dX = 15 + rand() * (W - 30);
            let dY = 15 + rand() * (H - 30);

            if (dX > 220 && dY < 80) continue;

            let touchSplat = false;
            if (canTestSplat) {
                for(let s of splats) {
                    let p = inverseTransform(dX, dY, s.cx, s.cy, s.rot, s.scale);
                    const shapeIndex = (s.pathIndex !== undefined ? s.pathIndex : splatShape) % SPLAT_SHAPES.length;
                    const testPath = new Path2D(SPLAT_SHAPES[shapeIndex]);
                    ctx.lineWidth = ((dotR * 2) + 12) / s.scale; 
                    if (ctx.isPointInPath(testPath, p.x, p.y) || ctx.isPointInStroke(testPath, p.x, p.y)) { touchSplat = true; break; }
                }
            } else {
                for(let s of splats) {
                    let dist = Math.sqrt((dX - s.cx)**2 + (dY - s.cy)**2);
                    if (dist < 90 * s.scale) { touchSplat = true; break; }
                }
            }
            if (touchSplat) continue;

            if (placed.length === 0) {
                bestCand = {x: dX, y: dY};
                break;
            }

            let minDist = 9999;
            for (let p of placed) {
                let distP = Math.sqrt((dX - p.x)**2 + (dY - p.y)**2);
                if (distP < minDist) minDist = distP;
            }

            if (minDist > maxMinDist) {
                maxMinDist = minDist;
                bestCand = {x: dX, y: dY};
            }
        }
        
        if (bestCand) placed.push(bestCand);
    }
    return { arr: placed, r: dotR };
}

function getInstructionHtml() {
    const problemType = getProblemType();
    if (problemType === 'relation2') {
        return `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- observe le total, les jetons visibles et l'indice,</div>
                <div class="activity-instruction-line">- complète le schéma en barres,</div>
                <div class="activity-instruction-line">- trouve combien de jetons cache chaque tache.</div>`;
    }
    if (problemType === 'relation3') {
        return `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- observe le total, les jetons visibles et les deux indices,</div>
                <div class="activity-instruction-line">- complète le schéma en barres,</div>
                <div class="activity-instruction-line">- trouve combien de jetons cache chaque tache.</div>`;
    }
    if (problemType === 'sums3') {
        return `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- utilise les sommes de deux taches,</div>
                <div class="activity-instruction-line">- complète le schéma en barres,</div>
                <div class="activity-instruction-line">- trouve combien de jetons cache chaque tache.</div>`;
    }

    const modeEl = document.getElementById('gameMode');
    const mode = modeEl ? modeEl.value : 'find_hidden';
    const splatModeEl = document.getElementById('splatMode');
    const splatMode = splatModeEl ? splatModeEl.value : '1';
    const hasSeveralSplats = splatMode !== '1';

    let html = '';

    if (mode === 'construct') {
        html = `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- observe le schéma en barres,</div>
                <div class="activity-instruction-line">- complète le dessin et le schéma.</div>`;
    } else if (mode === 'mix') {
        html = `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- observe les informations données,</div>
                <div class="activity-instruction-line">- complète ce qui manque dans le dessin ou le schéma en barres.</div>`;
    } else {
        html = `<div class="activity-instruction-title">Pour chaque carte :</div>
                <div class="activity-instruction-line">- complète le schéma en barres,</div>
                <div class="activity-instruction-line">- trouve le nombre de jetons cachés derrière chaque tache.</div>`;
    }

    if (hasSeveralSplats) {
        html += `<div class="activity-instruction-note">Si plusieurs taches apparaissent, elles cachent le même nombre de jetons.</div>`;
    }

    return html;
}

function getPrintedActivityLabel(isCorrectionPage) {
    const input = document.getElementById('activityLabel');
    const label = input ? input.value.trim() : '';
    if (isCorrectionPage) {
        return label ? `${label} — Correction` : 'Correction';
    }
    return label;
}


function getRelationValueDisplay(value, shouldReveal) {
    if (shouldReveal && value !== '') return `<span class="hidden-val">${value}</span>`;
    return value;
}

function renderRelationCell(cell, item, isCorrectionPage, hideDiagram, isNonProp) {
    let showVisualDots = true;
    let hideVisualDotsUntilReveal = false;
    let showHiddenDots = false;

    if (isCorrectionPage) {
        showHiddenDots = true;
    } else if (isTBI) {
        showHiddenDots = true;
        hideVisualDotsUntilReveal = false;
    }

    const splatPart = document.createElement('div');
    splatPart.className = 'part-splat';
    let htmlContent = getSplatSvg(item, showVisualDots, hideVisualDotsUntilReveal, showHiddenDots);
    htmlContent += `<div class="total-badge">${item.total}</div>`;
    splatPart.innerHTML = htmlContent;
    cell.appendChild(splatPart);

    const clues = item.clues || (item.relationText ? [item.relationText] : []);
    const clue = document.createElement('div');
    clue.className = 'relation-clue' + (item.kind === 'relation3' ? ' relation-clue-3' : '');
    clue.innerHTML = clues.map(t => `<div>${t}</div>`).join('');
    cell.appendChild(clue);

    const diag = document.createElement('div');
    diag.className = 'diagram-container relation-diagram';

    if (hideDiagram && !isCorrectionPage && !isTBI) {
        diag.innerHTML = ``;
        cell.appendChild(diag);
        return;
    }

    // Sur la fiche élève, le total du schéma est à compléter :
    // il est déjà donné sur le plateau, dans le badge. On ne le remplit qu'en correction.
    const displayTotal = isCorrectionPage ? item.total : '';
    const displayVis = isCorrectionPage ? item.visible : '';
    const revealParts = false;

    const minCol = item.parts.length >= 3 ? 27 : 34;
    const flexVis = isNonProp ? 1 : Math.max(item.visible, item.total * 0.05, 1);
    const partFlexes = item.parts.map(p => isNonProp ? 1 : Math.max(p.value, item.total * 0.05, 1));
    const relationCols = `${item.visible > 0 ? `minmax(${minCol}px, ${flexVis}fr) ` : ''}${partFlexes.map(f => `minmax(${minCol}px, ${f}fr)`).join(' ')}`;

    const partBoxes = item.parts.map((p, idx) => {
        const isGivenPart = item.givenPartId === p.id;
        const display = isCorrectionPage ? p.value : (isGivenPart ? p.value : (isTBI ? p.value : ''));
        const givenClass = isGivenPart && !isCorrectionPage ? ' relation-given-part' : '';
        return `<div class="relation-part-box relation-${p.id.toLowerCase()}${givenClass}"><div class="relation-part-value">${getRelationValueDisplay(display, revealParts)}</div></div>`;
    }).join('');

    const partLabels = item.parts.map(p => {
        const short = p.short || (p.id === 'A' ? 'N' : (p.id === 'B' ? 'O' : p.id));
        return `<div class="relation-label relation-label-${p.id.toLowerCase()}">${short}</div>`;
    }).join('');

    diag.innerHTML = `
        <div class="diagram-inner" style="--rel-cols:${relationCols};">
            <div class="row-top" style="font-size: 18px;">${displayTotal}</div>
            <div class="relation-row-bottom">
                ${item.visible > 0 ? `<div class="relation-part-box relation-visible"><div class="relation-part-value">${displayVis}</div></div>` : ''}
                ${partBoxes}
            </div>
        </div>
        <div class="relation-label-row" style="--rel-cols:${relationCols};">
            ${item.visible > 0 ? `<div class="relation-label relation-label-visible">V</div>` : ''}
            ${partLabels}
        </div>`;

    cell.appendChild(diag);
}

function createPageElement(chunk, isCorrectionPage, mirror) {
    const page = document.createElement('div'); page.className = isTBI ? 'page' : 'page activity-print-page';
    const inner = document.createElement('div'); inner.className = 'page-inner';
    const grid = document.createElement('div'); 
    
    grid.className = mirror ? 'grid grid-mirror' : 'grid';
    const [renderCols, renderRows] = document.getElementById('gridSize').value.split('x').map(Number);
    grid.classList.add(`grid-${renderCols}x${renderRows}`);
    const hideDiagram = document.getElementById('hideDiagram').checked;
    const isNonProp = document.getElementById('nonPropDiagram').checked; 

    chunk.forEach(item => {
        const cell = document.createElement('div'); 
        cell.className = 'cell';
        
        if (isTBI) {
            cell.className += ' tbi-mode';
            cell.onclick = function() { this.classList.toggle('revealed'); };
        }

        if (item.kind === 'relation2' || item.kind === 'relation3' || item.kind === 'sums3') {
            cell.className += item.kind === 'relation2' ? ' relation-cell relation2-cell' : (item.kind === 'sums3' ? ' relation-cell relation3-cell sums3-cell' : ' relation-cell relation3-cell');
            renderRelationCell(cell, item, isCorrectionPage, hideDiagram, isNonProp);
            grid.appendChild(cell);
            return;
        }
        
        let showVisualTotal = false, showVisualDots = false, hideVisualDotsUntilReveal = false;
        let textTotal = "", textVis = "", textHid = "";
        let revealTotal = false, revealVis = false, revealHid = false;

        if (item.mode === 'find_hidden') {
            showVisualTotal = true;
            showVisualDots = true;

            if (isCorrectionPage) {
                textTotal = item.total;
                textVis = item.visible;
                textHid = item.hiddenPerSplat;
            } else if (isTBI) {
                textTotal = item.total;
                textVis = item.visible;
                textHid = item.hiddenPerSplat;
                revealTotal = true;
                revealVis = true;
                revealHid = true;
            } else {
                textTotal = "";
                textVis = "";
                textHid = "";
            }
        } else if (item.mode === 'construct') {
            if (isCorrectionPage) {
                showVisualTotal = true;
                showVisualDots = true;
                textTotal = item.total;
                textVis = item.visible;
                textHid = item.hiddenPerSplat;
            } else if (isTBI) {
                showVisualTotal = false;
                showVisualDots = true;
                hideVisualDotsUntilReveal = true;
                textTotal = item.total;

                if (item.clueGiven === 'visible') {
                    textVis = item.visible;
                    textHid = item.hiddenPerSplat;
                    revealHid = true;
                } else {
                    textVis = item.visible;
                    textHid = item.hiddenPerSplat;
                    revealVis = true;
                }
            } else {
                textTotal = item.total; 
                if (item.clueGiven === 'visible') {
                    textVis = item.visible; textHid = "";
                } else {
                    textVis = ""; textHid = item.hiddenPerSplat;
                }
            }
        }

        const splatPart = document.createElement('div'); splatPart.className = 'part-splat';

        let htmlContent = getSplatSvg(item, showVisualDots, hideVisualDotsUntilReveal);

        let displayBadge = showVisualTotal ? item.total : "";
        htmlContent += `<div class="total-badge">${displayBadge}</div>`;
        
        splatPart.innerHTML = htmlContent;
        cell.appendChild(splatPart);

        const diag = document.createElement('div'); diag.className = 'diagram-container';
        
        if (hideDiagram && !isCorrectionPage && !isTBI) {
            diag.innerHTML = ``;
        } else {
            let flexVis = isNonProp ? 1 : Math.max(item.visible, item.total * 0.05, 1);
            let flexHid = isNonProp ? 1 : Math.max(item.hiddenPerSplat, item.total * 0.05, 1);

            let minW = item.numSplats >= 4 ? "25px" : "40px";
            let fSize = item.numSplats >= 4 ? "14px" : "18px"; 

            let displayTotal = (isTBI && revealTotal && textTotal !== "") ? `<span class="hidden-val">${textTotal}</span>` : textTotal;
            let displayVis   = (isTBI && revealVis && textVis !== "")     ? `<span class="hidden-val">${textVis}</span>`   : textVis;
            let displayHid   = (isTBI && revealHid && textHid !== "")     ? `<span class="hidden-val">${textHid}</span>`   : textHid;

            let bottomRowHTML = `<div class="row-bottom">`;
            
            if (item.visible > 0) {
                bottomRowHTML += `<div class="part-box" style="flex-grow: ${flexVis}; flex-basis: 0; background: white; color: #2563eb; min-width: ${minW}; font-size: ${fSize};">${displayVis}</div>`;
            }

            for(let i = 0; i < item.numSplats; i++) {
                bottomRowHTML += `<div class="part-box" style="flex-grow: ${flexHid}; flex-basis: 0; background: #e2e8f0; color: #111827; min-width: ${minW}; font-size: ${fSize};">${displayHid}</div>`;
            }
            bottomRowHTML += `</div>`;

            diag.innerHTML = `
                <div class="diagram-inner">
                    <div class="row-top" style="font-size: ${fSize};">${displayTotal}</div>
                    ${bottomRowHTML}
                </div>`;
        }
        
        cell.appendChild(diag); 
        grid.appendChild(cell);
    });

    if (!isTBI) {
        const header = document.createElement('div');
        header.className = 'activity-header';
        const printedActivityLabel = getPrintedActivityLabel(isCorrectionPage);
        header.innerHTML = `
            <div class="activity-title-block">
                <div class="activity-title">Petit Splat!</div>
                ${printedActivityLabel ? `<div class="activity-subtitle">${printedActivityLabel}</div>` : ''}
            </div>
            <div class="activity-logos">
                <img class="activity-logo-irem" src="${PRINT_IREM_LOGO_SRC}" alt="IREM La Réunion">
                <img class="activity-logo-maths" src="${PRINT_MATHS_GO_LOGO_SRC}" alt="Maths&amp;go">
            </div>`;
        inner.appendChild(header);

        const instruction = document.createElement('div');
        instruction.className = 'activity-instruction';
        instruction.innerHTML = getInstructionHtml();
        inner.appendChild(instruction);
    }

    inner.appendChild(grid);
    
    if (!isTBI) {
        const footer = document.createElement('div');
        footer.className = 'activity-footer';
        footer.innerText = isCorrectionPage ? (mirror ? "correction · miroir verso" : "correction") : "aca.re/maths/splat";
        inner.appendChild(footer);
    }
    
    page.appendChild(inner); 
    return page;
}

function renderPages() {
  const main = document.getElementById('mainArea');
  const isCorr = document.getElementById('showCorr').checked;
  main.innerHTML = ''; 
  const [cols, rows] = document.getElementById('gridSize').value.split('x').map(Number);
  const itemsPerPage = cols * rows;

  for (let i = 0; i < state.length; i += itemsPerPage) {
      const chunk = state.slice(i, i + itemsPerPage);
      
      if (isTBI) {
          main.appendChild(createPageElement(chunk, false, false));
      } else {
          if (!isCorr) { 
              main.appendChild(createPageElement(chunk, false, false)); 
          } else {
              main.appendChild(createPageElement(chunk, false, false));
              main.appendChild(createPageElement(chunk, true, isRVMode));
          }
      }
  }
}

function getSplatSvg(item, drawDots, hideVisibleDotsUntilReveal = false, forceHiddenDots = false) {
    const W = 300, H = 200;
    const defaultPathData = SPLAT_SHAPES[item.splatShape % SPLAT_SHAPES.length];
    
    let svg = `<svg class="splat-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet">`;
    
    if ((isTBI || forceHiddenDots) && item.hiddenDots && item.hiddenDots.length > 0) {
        const hiddenClass = (isTBI && forceHiddenDots && !document.body.classList.contains('print-only')) ? ' class="solution-dot"' : '';
        for(let p of item.hiddenDots) {
             const dotFill = p.color || '#2563eb';
             svg += `<circle${hiddenClass} cx="${p.x}" cy="${p.y}" r="${p.r}" fill="${dotFill}" stroke="#1e40af" stroke-width="0.5"/>`;
        }
    }

    if (drawDots && item.visible > 0) {
        const dotClass = hideVisibleDotsUntilReveal ? ' class="solution-dot"' : '';
        for(let p of item.dots.arr) {
             svg += `<circle${dotClass} cx="${p.x}" cy="${p.y}" r="${item.dots.r}" fill="#2563eb" stroke="#1e40af" stroke-width="0.5"/>`;
        }
    }
    
    for(let s of item.splats) {
        const splatFill = s.color || getComputedStyle(document.documentElement).getPropertyValue('--splat').trim();
        const shapeIndex = s.pathIndex !== undefined ? s.pathIndex : item.splatShape;
        const pathData = SPLAT_SHAPES[shapeIndex % SPLAT_SHAPES.length] || defaultPathData;
        svg += `<g transform="translate(${s.cx}, ${s.cy}) scale(${s.scale}) rotate(${s.rot}) translate(-150, -100)">`;
        svg += `<path class="splat-path" d="${pathData}" fill="${splatFill}" filter="drop-shadow(3px 3px 2px rgba(0,0,0,0.3))" />`;
        svg += `</g>`;
    }

    svg += `</svg>`;
    return svg;
}

window.onload = () => { updateUI(); updateProblemTypeUI(); startGen(); toggleMode(); };
