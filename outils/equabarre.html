<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Équabarre — schémas en barres</title>
<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d8dee9;
    --blue:#3b82f6;
    --blue-soft:#dbeafe;
    --green:#16a34a;
    --green-soft:#dcfce7;
    --orange:#f97316;
    --orange-soft:#ffedd5;
    --red:#ef4444;
    --shadow:0 18px 50px rgba(15,23,42,.10);
    --radius:22px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.13), transparent 34rem),
      radial-gradient(circle at bottom right, rgba(22,163,74,.10), transparent 34rem),
      var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }

  header{
    padding:22px clamp(16px,3vw,36px) 12px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
    text-align:center;
  }

  .titleBlock h1{
    margin:0;
    font-size:clamp(30px,4vw,52px);
    line-height:.95;
    letter-spacing:-.06em;
    font-weight:950;
  }

  .titleBlock .subtitle{
    margin-top:8px;
    color:var(--muted);
    font-size:16px;
    font-weight:600;
  }

  .badge{
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border:1px solid rgba(59,130,246,.20);
    background:rgba(255,255,255,.72);
    border-radius:999px;
    color:#1d4ed8;
    font-size:13px;
    font-weight:800;
    box-shadow:0 8px 24px rgba(15,23,42,.06);
  }

  main{
    width:min(1240px, calc(100vw - 28px));
    margin:18px auto 32px;
    display:grid;
    grid-template-columns:310px minmax(0,1fr);
    gap:18px;
    align-items:start;
  }

  
  /* PATCH 34 — historique d'équations : vrais alignements communs */
  .equationHistory{
    width:min(880px,100%);
    margin:8px auto 0;
    font-size:clamp(24px,2.6vw,38px);
    font-weight:950;
    line-height:1.18;
    display:grid;
    grid-template-columns:max-content 1.5ch max-content;
    column-gap:14px;
    justify-content:center;
    align-items:baseline;
  }

  .stepRow{
    display:contents;
  }

  .lhs{
    grid-column:1;
    text-align:right;
    white-space:nowrap;
  }

  .eq{
    grid-column:2;
    text-align:center;
    color:#64748b;
    white-space:nowrap;
  }

  .rhs{
    grid-column:3;
    text-align:left;
    white-space:nowrap;
  }

@media (max-width:900px){
    main{grid-template-columns:1fr}
  }

  .panel,.stage{
    background:rgba(255,255,255,.88);
    border:1px solid rgba(15,23,42,.08);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }

  .panel{
    padding:16px;
    position:sticky;
    top:14px;
  }

  .appTitle{
    text-align:center;
    font-size:34px;
    line-height:1;
    letter-spacing:-.055em;
    font-weight:950;
    margin:2px 0 16px;
  }

  .fullscreenBtn{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    padding:0;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:18px;
    z-index:5;
  }

  .stage{
    position:relative;
  }

  .stage:fullscreen{
    background:var(--bg);
    border-radius:0;
    width:100vw;
    height:100vh;
    padding:22px;
    display:flex;
    flex-direction:column;
  }

  .stage:fullscreen .board{
    flex:1;
    min-height:0;
  }

  .stage:fullscreen .piece{
    height:128px;
  }

  .stage:fullscreen .barLine{
    min-height:128px;
  }

  /* PATCH 4 — option plein écran compact : ne modifie que le rendu en plein écran. */
  .stage.fullscreenCompact:fullscreen{
    align-items:center;
  }

  .stage.fullscreenCompact:fullscreen .topbar,
  .stage.fullscreenCompact:fullscreen .instructionZone,
  .stage.fullscreenCompact:fullscreen .board,
  .stage.fullscreenCompact:fullscreen .toolBar,
  .stage.fullscreenCompact:fullscreen .actionZone,
  .stage.fullscreenCompact:fullscreen .solution{
    width:min(1180px, calc(100vw - 44px));
  }

  .stage.fullscreenCompact:fullscreen .board{
    flex:0 0 auto;
    width:min(1280px, calc(100vw - 44px));
    min-height:430px;
    max-height:58vh;
    padding:34px clamp(42px,5vw,86px);
    background:rgba(255,255,255,.34);
    border:1px solid rgba(15,23,42,.045);
    box-shadow:0 3px 10px rgba(15,23,42,.025);
  }

  .stage.fullscreenCompact:fullscreen .barLine{
    background:rgba(255,255,255,.96);
  }

  .stage.fullscreenCompact:fullscreen .piece.number{
    background:#ffffff;
  }

  .stage.fullscreenCompact:fullscreen .piece.x{
    background:#eff6ff;
  }

  .stage.fullscreenCompact:fullscreen .piece{
    height:108px;
  }

  .stage.fullscreenCompact:fullscreen .barLine{
    min-height:108px;
  }

  @media (max-width:900px){
    .panel{position:static}
  }

  label{
    display:block;
    margin:12px 0 5px;
    font-size:12px;
    color:var(--muted);
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .modeSwitch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin:12px 0 14px;
  }

  .modeBtn{
    padding:10px 8px;
    border-radius:14px;
    border:1px solid rgba(15,23,42,.12);
    background:#f8fafc;
    color:#334155;
    font-weight:950;
  }

  .modeBtn.active{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:#fff;
    border-color:rgba(37,99,235,.30);
    box-shadow:0 10px 24px rgba(59,130,246,.16);
  }

  .studentPanel{
    display:none;
  }

  .studentPanel.open{
    display:block;
  }

  .profPanel.hidden{
    display:none;
  }

  .studentProgress{
    margin:10px 0 0;
    padding:10px 12px;
    border-radius:14px;
    background:#f8fafc;
    border:1px solid rgba(15,23,42,.08);
    color:#334155;
    font-size:14px;
    font-weight:850;
    text-align:center;
  }

  .studentProgress strong{
    font-weight:950;
  }

  .worldGrid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin:10px 0 12px;
  }

  .worldCard{
    position:relative;
    width:100%;
    text-align:left;
    padding:12px 12px;
    border-radius:18px;
    border:1px solid rgba(15,23,42,.12);
    background:linear-gradient(180deg,#ffffff,#f8fafc);
    color:#0f172a;
    box-shadow:0 8px 20px rgba(15,23,42,.06);
    cursor:pointer;
  }

  .worldCard:hover{
    filter:brightness(.99);
    transform:translateY(-1px);
  }

  .worldCard.active{
    border-color:rgba(59,130,246,.52);
    box-shadow:0 12px 26px rgba(59,130,246,.14);
    background:linear-gradient(180deg,#eff6ff,#ffffff);
  }

  .worldCard.done{
    border-color:rgba(22,163,74,.42);
    background:linear-gradient(180deg,#dcfce7,#ffffff);
  }

  .worldTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:4px;
  }

  .worldName{
    font-size:15px;
    font-weight:950;
    letter-spacing:-.02em;
  }

  .worldBadge{
    flex:0 0 auto;
    min-width:30px;
    height:30px;
    padding:0 8px;
    display:inline-grid;
    place-items:center;
    border-radius:999px;
    background:#e2e8f0;
    color:#334155;
    font-size:13px;
    font-weight:950;
  }

  .worldCard.done .worldBadge{
    background:#16a34a;
    color:#fff;
  }

  .worldExample{
    font-size:13px;
    color:#64748b;
    font-weight:850;
  }

  .worldCard.done::after{
    content:"✓";
    position:absolute;
    right:12px;
    bottom:9px;
    width:24px;
    height:24px;
    border-radius:999px;
    display:grid;
    place-items:center;
    background:#16a34a;
    color:white;
    font-weight:950;
    font-size:15px;
  }

  input,select{
    width:100%;
    border:1px solid rgba(15,23,42,.14);
    border-radius:14px;
    padding:11px 12px;
    background:white;
    color:var(--ink);
    font-size:15px;
    font-weight:700;
    outline:none;
  }

  input:focus,select:focus{
    border-color:rgba(59,130,246,.55);
    box-shadow:0 0 0 4px rgba(59,130,246,.12);
  }


  /* PATCH v7 — menu prof : mots en capitales, lettres mathématiques en minuscules */
  .mathParamLabel{
    text-transform:uppercase;
  }

  .teacherParamGrid .mathParamLabel{
    text-align:center;
  }

  .teacherParamGrid .mathParamLabel .mathLetter{
    display:block;
    margin-top:2px;
    text-align:center;
    font-size:18px;
  }

  .mathParamLabel .mathLetter{
    text-transform:none;
    letter-spacing:0;
    font-weight:950;
  }

  .randomQuickBtn{
    font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",system-ui,sans-serif;
    font-style:normal;
    font-weight:400;
    color:#1d4ed8;
    line-height:1;
    transform:none;
  }

  .randomQuickBtn{
    display:grid;
    place-items:center;
  }

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .teacherParamGrid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    align-items:end;
  }

  .teacherParamGrid.three{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }

  .teacherParamGrid input{
    padding-left:10px;
    padding-right:10px;
    text-align:center;
    font-weight:850;
  }

  .teacherParamGrid .hiddenParam{
    display:none;
  }

  .btnrow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  button{
    border:none;
    border-radius:14px;
    padding:11px 13px;
    font-size:14px;
    font-weight:900;
    color:var(--ink);
    background:#eef2f7;
    cursor:pointer;
    transition:transform .08s ease, filter .12s ease, opacity .12s ease;
  }

  button:hover{filter:brightness(.98)}
  button:active{transform:translateY(1px)}
  button.primary{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:white;
  }

  /* PATCH 1 — bouton Construire : bleu principal adouci sans modifier les autres boutons */
  #btnBuild.primary{
    background:linear-gradient(180deg,#93c5fd,#60a5fa);
    color:white;
  }
  button.green{
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
  }
  button.orange{
    background:linear-gradient(180deg,#fb923c,#f97316);
    color:white;
  }
  button.ghost{
    background:transparent;
    border:1px solid rgba(15,23,42,.12);
  }
  button:disabled{
    opacity:.42;
    cursor:not-allowed;
    transform:none;
  }

  .mini{
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
    margin-top:10px;
  }

  .stage{
    padding:16px;
    min-height:660px;
  }

  .stage{
    padding:16px;
    min-height:660px;
    position:relative;
  }

  .stageQuickActions{
    position:absolute;
    top:14px;
    right:14px;
    z-index:5;
    display:flex;
    gap:8px;
    align-items:center;
  }

  .stageStudentHud{
    position:absolute;
    top:14px;
    left:14px;
    z-index:5;
    display:none;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius:16px;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.12);
    box-shadow:0 10px 24px rgba(15,23,42,.12);
    backdrop-filter:blur(8px);
    font-size:15px;
    font-weight:900;
    color:#334155;
  }

  .stageStudentHud.open{
    display:flex;
  }

  .studentWaitingStage{
    display:none;
    min-height:520px;
    border-radius:24px;
    border:1px dashed rgba(15,23,42,.18);
    background:rgba(255,255,255,.55);
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:32px;
  }

  .studentWaitingStage.open{
    display:flex;
  }

  .waitingTitle{
    font-size:clamp(34px,4vw,56px);
    font-weight:950;
    letter-spacing:-.05em;
    color:#0f172a;
  }

  .waitingText{
    margin-top:8px;
    font-size:17px;
    line-height:1.35;
    font-weight:750;
    color:#64748b;
  }

  .stageStudentHud strong{
    color:#0f172a;
    font-weight:950;
  }

  .stageNextBtn{
    padding:8px 10px;
    border-radius:12px;
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:#fff;
    font-size:13px;
    font-weight:950;
    display:none;
  }

  .stageNextBtn.show{
    display:inline-flex;
  }

  .quickBtn{
    width:44px;
    height:44px;
    padding:0;
    display:grid;
    place-items:center;
    border-radius:14px;
    font-size:23px;
    line-height:1;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.14);
    box-shadow:0 10px 24px rgba(15,23,42,.14);
    backdrop-filter:blur(8px);
  }

  .equationEyeBtn svg{
    width:23px;
    height:23px;
    display:block;
    opacity:.78;
  }

  .equationEyeBtn:hover svg{
    opacity:.95;
  }

  .quickBtn:hover{
    background:#eef2f7;
  }

  .equationEyeBtn{
    font-size:22px;
  }

  .equationEyeBtn.is-hidden{
    opacity:.72;
    background:#f8fafc;
  }

  .topbar{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    padding:4px 4px 18px;
    text-align:center;
  }

  .equationText{
    display:none;
  }

  .equationHistory{
    width:min(760px, 100%);
    display:grid;
    justify-content:center;
    gap:2px;
    color:#64748b;
    font-size:clamp(18px, 2vw, 26px);
    font-weight:900;
    line-height:1.15;
    font-variant-numeric:tabular-nums;
  }

  .equationHistory .stepRow{
    display:grid;
    grid-template-columns:minmax(80px, auto) 30px minmax(80px, auto);
    align-items:baseline;
    column-gap:8px;
    padding:1px 8px;
  }

  .equationHistory .lhs{
    text-align:right;
    white-space:nowrap;
  }

  .equationHistory .eq{
    text-align:center;
    color:#94a3b8;
    font-weight:950;
  }

  .equationHistory .rhs{
    text-align:left;
    white-space:nowrap;
  }

  .equationHistory .stepRow:last-child{
    color:#0f172a;
  }

  .equationHistory .stepRow:last-child .eq{
    color:#3b82f6;
  }


  .equationHistory{
    width:min(980px,100%);
    margin:6px auto 0;
    font-size:clamp(30px,3.2vw,46px);
    font-weight:950;
    line-height:1.18;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stepRow{
    display:grid;
    grid-template-columns: var(--eqLeftW, 12ch) 1.4ch var(--eqRightW, 12ch);
    column-gap:16px;
    align-items:baseline;
    justify-content:center;
    width:max-content;
    max-width:100%;
  }

  .lhs{text-align:right;white-space:nowrap}
  .eq{text-align:center;color:#64748b;white-space:nowrap}
  .rhs{text-align:left;white-space:nowrap}

  .status{
    display:none;
    padding:8px 11px;
    border-radius:999px;
    background:#f1f5f9;
    color:#475569;
    font-size:13px;
    font-weight:850;
  }

  .status.good{
    background:var(--green-soft);
    color:#166534;
  }

  .instructionZone{
    margin:0 auto 12px;
    width:min(820px,100%);
    min-height:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#334155;
    font-size:15px;
    font-weight:750;
    line-height:1.35;
  }

  .instructionZone strong{
    font-weight:950;
  }

  .board{
    background:
      linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.36));
    border:1px solid rgba(15,23,42,.08);
    border-radius:24px;
    padding:34px clamp(18px,4vw,58px);
    min-height:475px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:0;
  }

  .sideRow{
    display:grid;
    grid-template-columns:minmax(0,1fr);
    gap:0;
    align-items:center;
  }

  .sideLabel{
    display:none;
    color:var(--muted);
    font-weight:950;
    text-align:right;
    font-size:16px;
  }

  .barLine{
    --table-border: rgba(15,23,42,.36);
    display:grid;
    grid-auto-flow:column;
    grid-template-columns:var(--cols, 1fr);
    align-items:stretch;
    justify-content:start;
    width:var(--lineWidth, 100%);
    min-height:104px;
    border-radius:0;
    position:relative;
    gap:0;
    background:#fff;
    box-sizing:border-box;
  }

  /* Construction façon vrai tableau :
     - la ligne du haut porte le contour haut + gauche + droite + trait central ;
     - la ligne du bas porte seulement gauche + droite + bas ;
     - pas de marge négative, donc pas de trait qui disparaît. */
  #topLine{
    border-top:2px solid var(--table-border);
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  #bottomLine{
    margin-top:0;
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  .piece{
    min-width:0;
    width:100%;
    height:104px;
    border-radius:0;
    border:0;
    border-right:2px solid var(--table-border);
    display:grid;
    place-items:center;
    position:relative;
    overflow:hidden;
    user-select:none;
    cursor:pointer;
    transition:background .12s ease, filter .12s ease;
    box-sizing:border-box;
  }

  .piece:last-child{border-right:0;}

  .piece:hover{
    filter:brightness(.985);
  }

  .piece.number{
    background:linear-gradient(180deg,#fff,#f8fafc);
  }

  .piece.x{
    background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  }

  .piece.match{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.20) 0 8px, rgba(255,255,255,.54) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
  }

  .piece.selectedForDelete{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.22) 0 8px, rgba(255,255,255,.52) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
    box-shadow: inset 0 0 0 3px rgba(249,115,22,.42);
  }

  /* PATCH REGROUPER — sélection des nombres à fusionner dans un même membre. */
  .piece.selectedForAdd{
    background:
      repeating-linear-gradient(135deg, rgba(22,163,74,.16) 0 8px, rgba(255,255,255,.62) 8px 15px),
      linear-gradient(180deg,#dcfce7,#f0fdf4);
    box-shadow: inset 0 0 0 3px rgba(22,163,74,.42);
  }


  .piece.removed{
    opacity:.26;
    background:
      repeating-linear-gradient(135deg, rgba(15,23,42,.30) 0 7px, rgba(255,255,255,.1) 7px 14px),
      #e5e7eb;
    pointer-events:none;
  }

  .pieceContent{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }

  .pieceValue{
    font-size:clamp(28px,3.2vw,42px);
    font-weight:950;
    letter-spacing:-.04em;
  }

  .piece.x .pieceValue{
    font-family:Georgia, 'Times New Roman', serif;
    font-style:italic;
    color:#1d4ed8;
  }

  .piece.x .pieceValue.splatValue{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-style:normal;
    color:inherit;
  }

  .splatIcon{
    width:clamp(52px,5.6vw,78px);
    height:clamp(52px,5.6vw,78px);
    display:block;
    filter:drop-shadow(0 4px 7px rgba(15,23,42,.16));
  }

  .splatIcon svg{
    display:block;
    width:100%;
    height:100%;
  }

  .piece.removed .splatIcon{
    filter:grayscale(1) opacity(.65);
  }

  .pieceKind{
    display:none;

  function currentVar(){

  }

  function unknownDisplayKind(){
    const el = appMode === "student" ? unknownDisplayModeStudentEl : unknownDisplayModeEl;

  }

  function displayedUnknown(){
    const kind = unknownDisplayKind();
    return (kind === "question" || kind === "splat") ? "?" : currentVar();
  }

  function unknownTerm(count){
    const kind = unknownDisplayKind();
    const v = displayedUnknown();
    if(v === "?"){
      return count === 1 ? "?" : `${count} × ?`;
    }
    if(count === 1) return v;
    return kind === "letterTimes" ? `${count} × ${v}` : `${count}${v}`;
  }

  /* Splat : même logique de dessin que l’outil Splat!
     (forme générée par lobes sinusoïdaux + lissage Catmull-Rom -> Bézier). */
  function blobPath(cx, cy, r){
    const n = 40;
    const lobes = 5;
    const pts = [];
    for(let i=0;i<n;i++){
      const a = (Math.PI * 2 * i) / n;
      const k = 0.90 + 0.16 * Math.sin(lobes*a) + 0.04 * Math.sin(2*lobes*a);
      const rr = r * k;
      pts.push([cx + Math.cos(a)*rr, cy + Math.sin(a)*rr]);
    }
    function cr2bz(p0,p1,p2,p3){
      const t = 1/6;
      const c1x = p1[0] + (p2[0]-p0[0]) * t;
      const c1y = p1[1] + (p2[1]-p0[1]) * t;
      const c2x = p2[0] - (p3[0]-p1[0]) * t;
      const c2y = p2[1] - (p3[1]-p1[1]) * t;
      return [c1x,c1y,c2x,c2y,p2[0],p2[1]];
    }
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for(let i=0;i<n;i++){
      const p0 = pts[(i-1+n)%n];
      const p1 = pts[i];
      const p2 = pts[(i+1)%n];
      const p3 = pts[(i+2)%n];
      const [c1x,c1y,c2x,c2y,x,y] = cr2bz(p0,p1,p2,p3);
      d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x} ${y}`;
    }
    d += " Z";
    return d;
  }

  function splatSvg(){
    const d = blobPath(60, 60, 44);
    return `<span class="splatIcon" aria-label="Splat" role="img"><svg viewBox="0 0 120 120" aria-hidden="true" focusable="false">
      <path d="${d}" fill="#050505" stroke="rgba(0,0,0,.18)" stroke-width="2"/>
    </svg></span>`;
  }

  function equationDisplayEnabled(){
    const el = appMode === "student" ? equationDisplayModeStudentEl : equationDisplayModeEl;
    return !el || el.value !== "hide";
  }


  function eyeIconSvg(hidden=false){
    if(hidden){
      return `<svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M10.7 5.2A9.4 9.4 0 0 1 12 5c5.2 0 8.7 4.5 9.7 6.1.2.3.2.7 0 1.1a16 16 0 0 1-2.6 3.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 6.7A15.8 15.8 0 0 0 2.3 11c-.2.3-.2.7 0 1.1C3.3 13.7 6.8 18 12 18c1.3 0 2.5-.3 3.6-.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.8 9.8a3.1 3.1 0 0 0 4.4 4.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>`;
    }
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2.3 11.1C3.3 9.5 6.8 5 12 5s8.7 4.5 9.7 6.1c.2.3.2.7 0 1.1C20.7 13.8 17.2 18 12 18S3.3 13.8 2.3 12.2c-.2-.3-.2-.7 0-1.1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="11.7" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>`;
  }

  function syncEquationToggleButton(){
    if(!btnToggleEquation) return;
    const visible = equationDisplayEnabled();
    btnToggleEquation.innerHTML = eyeIconSvg(!visible);
    btnToggleEquation.title = visible ? "Masquer l’équation" : "Afficher l’équation";
    btnToggleEquation.classList.toggle("is-hidden", !visible);
  }

  function toggleEquationDisplay(){
    const el = appMode === "student" ? equationDisplayModeStudentEl : equationDisplayModeEl;
    if(!el) return;
    el.value = el.value === "hide" ? "show" : "hide";
    render();
  }

  function getWorldName(path){
    const names = {
      axc:"Monde 1",
      xpb:"Monde 2",
      mix12:"Monde 3",
      both:"Monde 4",
      mix:"Monde 5"
    };
    return names[path] || "Monde";
  }

  function getWorldFullName(path){
    const names = {
      axc:"Monde 1 — Partage équitable",
      xpb:"Monde 2 — Une quantité à enlever",
      mix12:"Monde 3 — Mélange de 1 et 2",
      both:"Monde 4 — Lettre inconnue des deux côtés",
      mix:"Monde 5 — Défis mélange"
    };
    return names[path] || "Monde";
  }

  function renderProgressDots(index, total){
    const safeTotal = Math.max(1, Number(total) || 1);
    const safeIndex = Math.max(0, Number(index) || 0);
    return `<span class="miniDots" aria-label="Progression">${Array.from({length:safeTotal}, (_, i) => {
      const rank = i + 1;
      const cls = rank < safeIndex ? "done" : (rank === safeIndex ? "current" : "");
      return `<span class="miniDot ${cls}"></span>`;
    }).join("")}</span>`;
  }

  function setStudentPath(path){
    if(!studentPathEl) return;
    studentPathEl.value = path;
    worldCards.forEach(card => {
      const isActive = card.dataset.path === path;
      card.classList.toggle("active", isActive);
    });
    if(studentSession.active){
      studentSession.active = false;
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    }
    syncWorldCards();
    updateStudentProgress();
    syncStudentStageVisibility();
    syncEquationToggleButton();
  }

  function syncWorldCards(){
    worldCards.forEach(card => {
      const path = card.dataset.path;
      card.classList.toggle("done", completedWorlds.has(path));
      card.classList.toggle("active", studentPathEl && studentPathEl.value === path);
    });
  }

  function syncStudentStageVisibility(){
    const waiting = appMode === "student" && !studentSession.active;
    if(studentWaitingStage) studentWaitingStage.classList.toggle("open", waiting);

    const selectors = [".topbar", ".instructionZone", ".board", ".toolBar", ".actionZone", ".solution", ".footerNote"];
    selectors.forEach(sel => {
      const el = stageEl ? stageEl.querySelector(sel) : null;
      if(el) el.style.display = waiting ? "none" : "";
    });
  }

  function syncAppModeUI(){
    if(btnTeacherMode) btnTeacherMode.classList.toggle("active", appMode === "teacher");
    if(btnStudentMode) btnStudentMode.classList.toggle("active", appMode === "student");
    if(profPanel) profPanel.classList.toggle("hidden", appMode !== "teacher");
    if(studentPanel) studentPanel.classList.toggle("open", appMode === "student");
    if(btnStageRandom) btnStageRandom.style.display = appMode === "teacher" ? "grid" : "none";
    updateStudentProgress();
    syncStudentStageVisibility();
  }

  function setAppMode(mode){
    appMode = mode === "student" ? "student" : "teacher";
    syncTeacherEquationControls();
    syncAppModeUI();
    render();
  }

  function updateStudentProgress(){
    const isStudent = appMode === "student";

    if(stageStudentHud){
      stageStudentHud.classList.toggle("open", isStudent && studentSession.active);
    }

    if(!isStudent){
      if(studentProgressEl) studentProgressEl.textContent = "";
      if(stageStudentProgress) stageStudentProgress.textContent = "";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      return;
    }

    if(!studentSession.active){
      if(studentProgressEl){
        studentProgressEl.innerHTML = `<span class="progressTitle">Choisis un monde</span><span class="progressLine">Sélectionne un niveau puis clique sur <strong>Commencer</strong>.</span>`;
      }
      if(stageStudentProgress) stageStudentProgress.textContent = "";
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      return;
    }

    const dots = renderProgressDots(studentSession.index, studentSession.total);
    const world = getWorldFullName(studentSession.path);

    if(studentProgressEl){
      studentProgressEl.innerHTML = `<span class="progressTitle">${world}</span><span class="progressLine">Exercice <strong>${studentSession.index}</strong> / ${studentSession.total} ${dots} <span>✓ <strong>${studentSession.solved}</strong></span></span>`;
    }
    if(stageStudentProgress){
      stageStudentProgress.innerHTML = `<span class="stageStudentProgressContent"><span class="hudWorld">${getWorldName(studentSession.path)}</span><span class="hudPill">Exercice ${studentSession.index} / ${studentSession.total}</span><span class="hudPill hudSuccess">✓ ${studentSession.solved}</span>${dots}</span>`;
    }
  }

  function startStudentSession(){
    const path = studentPathEl ? studentPathEl.value : "axc";
    const total = studentTotalEl ? Number(studentTotalEl.value) || 5 : 5;
    studentSession = {
      active:true,
      path,
      total,
      index:0,
      solved:0,
      currentCounted:false
    };
    nextStudentExercise();
    syncStudentStageVisibility();
  }

  function nextStudentExercise(){
    if(!studentSession.active) return;
    if(studentSession.index >= studentSession.total){
      completedWorlds.add(studentSession.path);
      syncWorldCards();
      if(studentProgressEl){
        studentProgressEl.innerHTML = `<strong>${getWorldName(studentSession.path)} validé</strong> · Réussites : <strong>${studentSession.solved}</strong> / ${studentSession.total}`;
      }
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      setInstruction(`${getWorldName(studentSession.path)} validé.`);
      return;
    }

    studentSession.index += 1;
    studentSession.currentCounted = false;

    let exercisePath = studentSession.path;
    if(exercisePath === "mix12"){
      exercisePath = Math.random() < 0.5 ? "axc" : "xpb";
    }

    if(modeEl){
      modeEl.value = exercisePath;
    }
    randomExercise();

    if(btnNextStudent) btnNextStudent.style.display = "none";
    if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    updateStudentProgress();
    syncStudentStageVisibility();
  }

  function onStudentSolved(){
    if(appMode !== "student" || !studentSession.active || studentSession.currentCounted) return;
    studentSession.currentCounted = true;
    studentSession.solved += 1;
    updateStudentProgress();

    if(studentSession.index >= studentSession.total){
      completedWorlds.add(studentSession.path);
      syncWorldCards();
      if(studentProgressEl){
        studentProgressEl.innerHTML = `<span class="progressTitle">${getWorldName(studentSession.path)} validé</span><span class="progressLine">Parcours terminé · ✓ <strong>${studentSession.solved}</strong> / ${studentSession.total}</span>`;

      setInstruction(`<strong>✓ Parcours terminé !</strong>`);
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    }else{
      if(btnNextStudent) btnNextStudent.style.display = "";
      if(btnStageNextStudent) btnStageNextStudent.classList.add("show");
    }
  }

  function uid(){
    return Math.random().toString(36).slice(2, 9);
  }

  function clone(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function pushHistory(){
    history.push(clone(state));
    if(history.length > 60) history.shift();
  }

  function setStatus(text, good=false){
    statusEl.textContent = text;
    statusEl.className = good ? "status good" : "status";
  }

  function numberOr(value, fallback){
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function clamp(n,a,b){
    return Math.max(a, Math.min(b,n));
  }

  function makeNumber(value){
    return { id:uid(), type:"number", value:Number(value), removed:false };
  }

  function makeX(){
    const v = state && state.original && state.original.varChar ? state.original.varChar : "𝑥";
    return { id:uid(), type:"x", value:v, removed:false };
  }

  function sideExpression(side){
    const pieces = activePieces(side);
    const v = displayedUnknown();
    const terms = [];
    let i = 0;

    while(i < pieces.length){
      const p = pieces[i];
      if(p.type === "x"){
        let count = 0;
        while(i < pieces.length && pieces[i].type === "x"){
          count++;
          i++;
        }
        terms.push(unknownTerm(count));
      }else{
        terms.push(String(p.value));
        i++;
      }
    }

    return terms.length ? terms.join(" + ") : "0";
  }

  function currentEquationString(){
    const solved = getSolvedValue();
    if(solved !== null){
      return `${displayedUnknown()} = ${solved}`;
    }
    // On écrit l'équation dans le sens algébrique : ligne du bas = ligne du haut.
    return `${sideExpression("bottom")} = ${sideExpression("top")}`;
  }

  function recordEquationStep(){
    if(!state) return;
    const eq = currentEquationString();
    if(!state.steps) state.steps = [];
    if(state.steps[state.steps.length - 1] !== eq) state.steps.push(eq);
  }

  function refreshStepsForUnknownDisplay(){
    if(!state) return;
    state.steps = [currentEquationString()];
    render();
  }

  function getSelectedMode(){
    const raw = modeEl ? modeEl.value : "axb";
    if(raw === "mix"){
      const modes = ["xpb", "axc", "axb", "both"];
      return modes[Math.floor(Math.random() * modes.length)];
    }
    return raw;
  }

  function getModeLabel(mode){
    if(mode === "xpb") return "x + b = c";
    if(mode === "axc") return "ax = c";
    if(mode === "both") return "ax + b = cx + d";
    return "ax + b = c";
  }

  function syncTeacherEquationControls(){
    if(!modeEl) return;
    const mode = modeEl.value;

    const show = (wrap, visible) => { if(wrap) wrap.classList.toggle("hiddenParam", !visible); };

    show(coefAWrap, mode === "axc" || mode === "axb" || mode === "both");
    show(constBWrap, mode === "xpb" || mode === "axb" || mode === "both");
    show(coefCWrap, mode === "both");
    show(constCWrap, mode === "xpb" || mode === "axc" || mode === "axb");
    show(constDWrap, mode === "both");

    if(teacherParamGrid){
      teacherParamGrid.classList.toggle("three", mode === "axb");
    }

    updateProfEquationInfo();
  }

  function updateProfEquationInfo(){
    if(!profEquationInfo) return;
    profEquationInfo.style.display = "none";
    profEquationInfo.innerHTML = "";
  }

  function readRounded(el, fallback, min=0, max=999){
    const n = Math.round(numberOr(el && el.value, fallback));
    return clamp(n, min, max);
  }

  function showBuildError(extra=""){
    const text = extra || "Impossible avec ce schéma : la solution doit être un entier positif.";
    setInstruction(`<strong>${text}</strong>`);
    setStatus(text);
  }

  function resetAfterNewEquation(){
    recordEquationStep();
    history = [];
    selectedPieceRef = null;
    selectedShareRef = null;
    pendingAddInfo = null;
    deleteSelection = [];
    addSelection = [];
    actionMode = "decompose";
    if(toolDecompose) toolDecompose.classList.add("active");
    if(toolAdd) toolAdd.classList.remove("active");
    if(toolShare) toolShare.classList.remove("active");
    if(toolDelete) toolDelete.classList.remove("active");
    render();
    setStatus("");
  }

  function createEquationState(selectedMode, a, b, rightA, d, x, c, rng=Math.random){
    const varChar = variableChars[Math.floor(rng() * variableChars.length)];
    state = {
      original:{mode:selectedMode, modeLabel:getModeLabel(selectedMode), a,b,rightA,d,x,c,varChar},
      top:[],
      bottom:[],
      hintCount:0,
      steps:[]
    };

    if(selectedMode === "both"){
      // Convention : le bas représente ax+b, le haut représente cx+d.
      // L'équation affichée reste donc : bas = haut.
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
      state.top = [...Array(rightA)].map(makeX).concat(d > 0 ? [makeNumber(d)] : []);
    }else{
      state.top = [makeNumber(c)];
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
    }

    resetAfterNewEquation();
  }

  function buildFromInputs(){
    if(modeEl && modeEl.value === "mix"){
      randomExercise();
      return;
    }

    const selectedMode = getSelectedMode();
    let a = 1;
    let b = 0;
    let rightA = 0;
    let d = 0;
    let c = 0;
    let x = null;

    if(selectedMode === "xpb"){
      b = readRounded(constBEl, 4, 0, 999);
      c = readRounded(constCEl, 28, 0, 999);
      x = c - b;
    }else if(selectedMode === "axc"){
      a = readRounded(coefAEl, 2, 1, 20);
      b = 0;
      c = readRounded(constCEl, 24, 0, 999);
      if(a === 0) return showBuildError();
      x = c / a;
    }else if(selectedMode === "axb"){
      a = readRounded(coefAEl, 2, 1, 20);
      b = readRounded(constBEl, 4, 0, 999);
      c = readRounded(constCEl, 28, 0, 999);
      x = (c - b) / a;
    }else if(selectedMode === "both"){
      a = readRounded(coefAEl, 3, 1, 20);
      b = readRounded(constBEl, 4, 0, 999);
      rightA = readRounded(coefCEl, 1, 1, 20);
      d = readRounded(constDEl, 28, 0, 999);
      const denom = a - rightA;
      if(denom === 0){
        return showBuildError("Impossible avec ce schéma : les coefficients des inconnues ne doivent pas être égaux.");
      }
      x = (d - b) / denom;
      c = a * x + b;
    }

    if(!Number.isInteger(x) || x <= 0 || !Number.isFinite(x)){
      return showBuildError();
    }

    if(selectedMode !== "both"){
      c = Math.round(c);
    }else{
      c = Math.round(c);
    }

    if(c <= 0){
      return showBuildError();
    }

    if(coefAEl) coefAEl.value = a;
    if(constBEl) constBEl.value = b;
    if(coefCEl) coefCEl.value = rightA || 1;
    if(constCEl && selectedMode !== "both") constCEl.value = c;
    if(constDEl) constDEl.value = d;
    updateProfEquationInfo();

    createEquationState(selectedMode, a, b, rightA, d, x, c);
  }

  function mulberry32(a){
    return function(){
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function randomInt(rng,a,b){
    return a + Math.floor(rng()*(b-a+1));
  }

  function randomExercise(){
    const rng = Math.random;

    let selectedMode = modeEl ? modeEl.value : "axb";
    if(selectedMode === "mix"){
      const modes = ["xpb", "axc", "axb", "both"];
      selectedMode = modes[randomInt(rng,0,modes.length-1)];
    }

    let a = selectedMode === "xpb" ? 1 : randomInt(rng,2,5);
    const x = randomInt(rng,3,15);
    let b = selectedMode === "axc" ? 0 : randomInt(rng,2,18);
    let rightA = 0;
    let d = 0;
    let c = a*x + b;

    if(selectedMode === "both"){
      a = randomInt(rng,3,5);
      rightA = randomInt(rng,1,a-1);
      b = randomInt(rng,2,14);
      d = (a - rightA) * x + b;
      c = a*x + b;
    }

    if(coefAEl) coefAEl.value = Math.max(1, a);
    if(constBEl) constBEl.value = Math.max(0, b);
    if(coefCEl) coefCEl.value = rightA || 1;
    if(constCEl) constCEl.value = selectedMode === "both" ? c : c;
    if(constDEl) constDEl.value = d || Math.max(0, c);
    updateProfEquationInfo();

    // Construction directe pour éviter qu'un mode Mélange soit tiré une deuxième fois.
    createEquationState(selectedMode, a, b, rightA, d, x, c, rng);
  }

  function activePieces(side){
    return state[side].filter(p => !p.removed);
  }

  function getPieceBySideAndId(ref){
    if(!ref || !state || !state[ref.side]) return null;
    return state[ref.side].find(p => p.id === ref.id) || null;
  }

  function selectedDeleteIds(){
    return new Set(deleteSelection.map(ref => ref.id));
  }

  function selectedDeletePiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of deleteSelection){
      const p = getPieceBySideAndId(ref);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }

  function selectedAddIds(){
    return new Set(addSelection.map(ref => ref.id));
  }

  function selectedAddPiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of addSelection){
      const p = getPieceBySideAndId(ref);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }


  function additionGroupInfo(){
    const {top, bottom} = selectedAddPiecesBySide();
    if(top.length && bottom.length) return {ok:false, reason:"oneSide", side:null, pieces:top.concat(bottom)};

    const side = top.length ? "top" : (bottom.length ? "bottom" : null);
    const pieces = side === "top" ? top : bottom;
    if(!side || pieces.length < 2) return {ok:false, reason:"needMore", side, pieces};
    if(pieces.some(p => p.type !== "number")) return {ok:false, reason:"numbersOnly", side, pieces};

    const sum = pieces.reduce((total,p) => total + Number(p.value || 0), 0);
    const expr = pieces.map(p => p.value).join(" + ");
    return {ok:true, side, pieces, sum, expr};
  }

  function selectForAdd(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    const alreadyIndex = addSelection.findIndex(ref => ref.side === side && ref.id === id);
    if(alreadyIndex >= 0){
      addSelection.splice(alreadyIndex, 1);
      render();
      return;
    }

    if(piece.type !== "number"){
      addSelection = [];
      setStatus("On regroupe seulement des nombres connus.");
      render();
      return;
    }

    if(addSelection.length && addSelection[0].side !== side){
      addSelection = [];
    }

    addSelection.push({side, id});
    render();
  }

  function deletionGroupInfo(){
    const {top, bottom} = selectedDeletePiecesBySide();
    if(top.length === 0 || bottom.length === 0){
      return {ok:false, reason:"needBoth", top, bottom};
    }

    const all = top.concat(bottom);
    const firstType = all[0].type;

    if(all.some(p => p.type !== firstType)){
      return {ok:false, reason:"mixedTypes", top, bottom};
    }

    if(firstType === "x"){
      if(top.length !== bottom.length){
        return {ok:false, reason:"differentCounts", top, bottom};
      }
      return {
        ok:true,
        type:"x",
        count:top.length,
        label: unknownTerm(top.length),
        top,
        bottom
      };
    }

    if(firstType === "number"){
      const topSum = top.reduce((s,p)=>s + Number(p.value || 0), 0);
      const bottomSum = bottom.reduce((s,p)=>s + Number(p.value || 0), 0);
      if(topSum !== bottomSum){
        return {ok:false, reason:"differentSums", top, bottom, topSum, bottomSum};
      }
      return {
        ok:true,
        type:"number",
        count:top.length + bottom.length,
        value:topSum,
        label:String(topSum),
        top,
        bottom
      };
    }

    return {ok:false, reason:"unknown", top, bottom};
  }

  function canDeleteMatchingNumbers(){
    return deletionGroupInfo().ok;
  }

  function selectForDeletion(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    const alreadyIndex = deleteSelection.findIndex(ref => ref.side === side && ref.id === id);
    if(alreadyIndex >= 0){
      deleteSelection.splice(alreadyIndex, 1);
      render();
      return;
    }

    // Suppression groupée :
    // on autorise plusieurs cases, mais on évite les mélanges inutilisables.
    const currentPieces = deleteSelection.map(getPieceBySideAndId).filter(Boolean);
    if(currentPieces.length){
      const firstType = currentPieces[0].type;
      if(piece.type !== firstType){
        deleteSelection = [];
      }
    }

    deleteSelection.push({side, id});
    render();
  }

  function deleteMatchingNumbers(){
    const info = deletionGroupInfo();
    if(!info.ok) return;

    pushHistory();
    const ids = selectedDeleteIds();
    for(const side of ["top","bottom"]){
      for(const p of state[side]){
        if(ids.has(p.id)) p.removed = true;
      }
    }
    deleteSelection = [];
    recordEquationStep();
    render();
    setStatus("Même quantité supprimée des deux côtés", true);
  }

  function getShareOpportunity(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    const topNumbers = top.filter(p => p.type === "number");
    const bottomNumbers = bottom.filter(p => p.type === "number");
    const topX = top.filter(p => p.type === "x");
    const bottomX = bottom.filter(p => p.type === "x");

    if(topNumbers.length === 1 && topX.length === 0 && bottomNumbers.length === 0 && bottomX.length >= 2){
      const value = topNumbers[0].value;
      if(value % bottomX.length === 0){
        return { numberSide:"top", xSide:"bottom", numberPiece:topNumbers[0], count:bottomX.length, result:value / bottomX.length };
      }
    }

    if(bottomNumbers.length === 1 && bottomX.length === 0 && topNumbers.length === 0 && topX.length >= 2){
      const value = bottomNumbers[0].value;
      if(value % topX.length === 0){
        return { numberSide:"bottom", xSide:"top", numberPiece:bottomNumbers[0], count:topX.length, result:value / topX.length };
      }
    }

    return null;
  }

  function shareNumber(){
    const opp = getShareOpportunity();
    if(!opp) return;
    pushHistory();

    const parts = Array.from({length:opp.count}, () => makeNumber(opp.result));
    const sideArr = state[opp.numberSide];
    const idx = sideArr.findIndex(p => p.id === opp.numberPiece.id);
    sideArr.splice(idx, 1, ...parts);
    recordEquationStep();

    render();
    setStatus(`La quantité est partagée en ${opp.count} parts égales`, true);
  }

  function getSolvedValue(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    if(top.length === 0 || bottom.length === 0) return null;

    const isAllNumbers = arr => arr.every(p => p.type === "number");
    const isAllX = arr => arr.every(p => p.type === "x");
    const allSameNumber = arr => isAllNumbers(arr) && arr.every(p => p.value === arr[0].value);

    if(allSameNumber(top) && isAllX(bottom) && top.length === bottom.length){
      return top[0].value;
    }
    if(allSameNumber(bottom) && isAllX(top) && top.length === bottom.length){
      return bottom[0].value;
    }
    return null;
  }

  function getPieceMeasure(piece){
    if(piece.type === "x"){
      return Math.max(1, state.original.x);
    }
    return Math.max(1, Math.abs(piece.value));
  }

  function getPieceWidthPercent(piece){
    const total = Math.max(1, state.original.c);
    return (getPieceMeasure(piece) / total) * 100;
  }

  function renderLine(side, host, selectedIds, commonLineWidth=null){
    host.innerHTML = "";
    const pieces = shouldKeepRemovedPieces() ? state[side] : state[side].filter(p => !p.removed);
    const widths = pieces.map(piece => getPieceWidthPercent(piece));
    const naturalLineWidth = widths.reduce((sum, w) => sum + w, 0);
    const lineWidth = commonLineWidth == null ? naturalLineWidth : commonLineWidth;

    // Important :
    // La largeur totale de la ligne diminue quand on enlève une partie.
    // Mais les cases restantes ne doivent pas être réduites une deuxième fois.
    // Donc on normalise les colonnes à l'intérieur de la largeur restante.
    const safeLineWidth = Math.max(0.0001, lineWidth);
    const cols = widths.map(w => `${(w / safeLineWidth) * 100}%`).join(" ") || "1fr";

    host.style.setProperty("--cols", cols);
    host.style.setProperty("--lineWidth", `${Math.max(0, Math.min(100, lineWidth))}%`);
    selectedIds = selectedIds || new Set();
    const addIds = selectedAddIds();
    for(const piece of pieces){
      const el = document.createElement("div");
      el.className = `piece ${piece.type}`;
      if(piece.removed) el.classList.add("removed");
      if(selectedIds.has(piece.id)) el.classList.add("selectedForDelete");
      if(addIds.has(piece.id)){
        el.classList.add("selectedForAdd");
      }

      const isSplatUnknown = piece.type === "x" && unknownDisplayKind() === "splat";
      const value = piece.type === "x" ? displayedUnknown() : String(piece.value);
      el.innerHTML = `
        <div class="pieceContent">
          <div class="pieceValue${isSplatUnknown ? ' splatValue' : ''}">${isSplatUnknown ? splatSvg() : value}</div>
        </div>
      `;

      el.addEventListener("click", () => {
        if(piece.removed) return;

        if(actionMode === "decompose"){
          if(piece.type === "number"){
            openDecomposeDialog(side, piece.id);
          }else{
            setStatus(`En mode Décomposer, clique sur un nombre.`);
          }
          return;
        }

        if(actionMode === "add"){
          selectForAdd(side, piece.id);
          return;
        }

        if(actionMode === "share"){
          if(piece.type !== "number"){
            setStatus(`En mode Partager, clique sur un nombre à couper en parts égales.`);
            return;
          }
          openShareDialog(side, piece.id);
          return;
        }

        if(actionMode === "delete"){
          selectForDeletion(side, piece.id);
          return;
        }
      });

      host.appendChild(el);
    }
  }

  function setInstruction(htmlText){

    instructionZone.innerHTML = htmlText || "";

      if(top.length === 0 && bottom.length === 0){

          setInstruction(`Sélectionne la même quantité des deux côtés.`);
        }else{
          setInstruction("Sélectionne la même quantité des deux côtés.");
        }

      }

      if(top.length === 0 || bottom.length === 0){
        const sideName = top.length ? "haut" : "bas";

        btn.className = "ghost";

        btn.addEventListener("click", () => {
          deleteSelection = [];
          render();

        actionZone.appendChild(btn);
        return;

      if(info.ok){
        setInstruction(`Même quantité sélectionnée :&nbsp;<strong>${info.label}</strong>.`);
        const btn = document.createElement("button");

        btn.addEventListener("click", deleteMatchingNumbers);

      }else{

        if(info.reason === "differentCounts"){

        setInstruction(reason);
        const btn = document.createElement("button");
        btn.className = "ghost";

  function message(html){
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = html;
    return div;
  }

  function splitEquation(eq){
    const parts = String(eq).split("=");
    if(parts.length < 2) return {lhs:String(eq), rhs:""};
    return {lhs:parts[0].trim(), rhs:parts.slice(1).join("=").trim()};
  }

  function renderEquationHistory(){
    if(!equationHistory) return;
    if(!equationDisplayEnabled()){
      equationHistory.innerHTML = "";
      syncEquationToggleButton();
      return;
    }
    const steps = state.steps || [];
    const shown = steps.slice(-6);

    if(!shown.length){
      equationHistory.innerHTML = "";
      syncEquationToggleButton();
      return;
    }

    const rows = shown.map((eq, i) => {
      const {lhs, rhs} = splitEquation(eq);
      const cls = i === shown.length - 1 ? "currentStep" : "historyStep";
      return `<tr class="${cls}"><td class="lhs">${lhs}</td><td class="eq">=</td><td class="rhs">${rhs}</td></tr>`;
    }).join("");

    equationHistory.innerHTML = `<table class="equationTable" aria-label="Étapes de résolution"><tbody>${rows}</tbody></table>`;
    syncEquationToggleButton();
  }

  function syncFullscreenSizeMode(){
    if(!stageEl) return;
    const el = appMode === "student" ? fullscreenSizeModeStudentEl : fullscreenSizeModeEl;
    const compact = el && el.value === "compact";
    stageEl.classList.toggle("fullscreenCompact", compact);
  }

  function render(){
    syncFullscreenSizeMode();
    if(!state) return;
    const selectedIds = selectedDeleteIds();
    equationText.textContent = "";
    renderEquationHistory();
    const widthPieces = side => shouldKeepRemovedPieces() ? state[side] : activePieces(side);
    const topWidth = widthPieces("top").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const bottomWidth = widthPieces("bottom").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const commonWidth = Math.max(topWidth, bottomWidth);
    renderLine("top", topLine, selectedIds, commonWidth);
    renderLine("bottom", bottomLine, selectedIds, commonWidth);
    renderActions();
  }

  function getOppositeSide(side){
    return side === "top" ? "bottom" : "top";
  }

  function countActiveX(side){
    return activePieces(side).filter(p => p.type === "x").length;
  }

  function shuffleArray(arr){
    for(let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getPossibleShareCounts(value, side){
    const maxParts = 12;
    const out = [];

    // Choix pédagogique prioritaire : si le nombre est en face de 5 lettres,
    // on propose d'abord 5 parts, car c'est l'action attendue.
    const oppositeX = countActiveX(getOppositeSide(side));
    if(oppositeX >= 2 && oppositeX <= maxParts && value % oppositeX === 0){
      out.push(oppositeX);
    }

    // Puis on ajoute les autres diviseurs raisonnables.
    for(let n=2; n<=maxParts; n++){
      if(value % n === 0 && !out.includes(n)){
        out.push(n);
      }
    }
    return out;
  }

  function openShareDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number" || piece.removed) return;

    const choices = shuffleArray(getPossibleShareCounts(piece.value, side));
    selectedShareRef = {side, id, value:piece.value};

    if(shareDialogText){
      shareDialogText.innerHTML = `Tu vas partager&nbsp;<strong>${piece.value}</strong>&nbsp;en parts égales.`;
    }
    if(shareChoices){
      shareChoices.innerHTML = "";
      shareChoices.classList.add("open");
      if(choices.length === 0){
        const div = document.createElement("div");
        div.className = "message";
        div.textContent = "Aucun partage entier n’est possible pour ce nombre.";
        shareChoices.appendChild(div);
      }else{
        for(const n of choices){
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.type = "button";
          chip.textContent = `${n} parts de ${piece.value / n}`;
          chip.addEventListener("click", () => applyShareChoice(n));
          shareChoices.appendChild(chip);
        }
      }
    }
    if(shareDialog) shareDialog.showModal();
  }

  function applyShareChoice(count){
    if(!selectedShareRef) return;
    const arr = state[selectedShareRef.side];
    const idx = arr.findIndex(p => p.id === selectedShareRef.id);
    if(idx < 0) return;

    const value = selectedShareRef.value;
    if(value % count !== 0){
      setStatus("Ce partage ne donne pas des parts entières.");
      return;
    }

    pushHistory();
    const part = value / count;
    arr.splice(idx, 1, ...Array.from({length:count}, () => makeNumber(part)));
    selectedShareRef = null;
    if(shareDialog) shareDialog.close();
    recordEquationStep();
    render();
    setStatus("Nombre partagé en parts égales", true);
  }

  function buildAddSuggestions(info){
    const correct = info.sum;
    const candidates = [
      correct,
      correct + 1,
      Math.max(1, correct - 1),
      correct + 10,
      Math.max(1, correct - 10)
    ].filter((value, index, arr) => Number.isFinite(value) && value > 0 && arr.indexOf(value) === index);
    return shuffle(candidates).slice(0, 4);
  }

  function renderAddSuggestions(info){
    if(!addSuggestions) return;
    addSuggestions.innerHTML = "";
    addSuggestions.classList.remove("open");
    if(btnShowAddSuggestions){
      btnShowAddSuggestions.style.display = "inline-flex";
      btnShowAddSuggestions.innerHTML = "Aide&nbsp;?";
    }

    for(const value of buildAddSuggestions(info)){
      const chip = document.createElement("button");
      chip.className = "chip mathChip";
      chip.type = "button";
      chip.dataset.value = String(value);
      chip.textContent = String(value);
      chip.addEventListener("click", () => {
        addInput.value = chip.dataset.value || String(value);
        addInput.focus();
      });
      addSuggestions.appendChild(chip);
    }
  }

  function openAddDialog(){
    const info = additionGroupInfo();
    if(!info.ok){
      render();
      return;
    }

    pendingAddInfo = info;
    if(addDialogText){
      addDialogText.innerHTML = `Tu vas regrouper&nbsp;<strong>${info.expr}</strong>.`;
    }
    if(addInput) addInput.value = "";
    renderAddSuggestions(info);
    if(addDialog) addDialog.showModal();
    setTimeout(() => addInput && addInput.focus(), 80);
  }

  function applyAdd(){
    if(!pendingAddInfo) return;
    const value = Number(String(addInput ? addInput.value : "").trim().replace(/,/g,"."));
    if(!Number.isFinite(value) || value !== pendingAddInfo.sum){
      setStatus("La somme proposée ne correspond pas aux nombres sélectionnés.");
      return;
    }

    pushHistory();
    const arr = state[pendingAddInfo.side];
    const ids = new Set(pendingAddInfo.pieces.map(p => p.id));
    const indexes = arr.map((p, index) => ids.has(p.id) ? index : -1).filter(index => index >= 0);
    const firstIndex = Math.min(...indexes);
    const replacement = makeNumber(pendingAddInfo.sum);
    const next = [];

    for(let i = 0; i < arr.length; i++){
      if(i === firstIndex) next.push(replacement);
      if(!ids.has(arr[i].id)) next.push(arr[i]);
    }

    state[pendingAddInfo.side] = next;
    addSelection = [];
    pendingAddInfo = null;
    if(addDialog) addDialog.close();
    recordEquationStep();
    render();
    setStatus("Nombres regroupés", true);
  }

  function openDecomposeDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number") return;

    selectedPieceRef = {side,id,value:piece.value};
    dialogText.innerHTML = `Remplace <strong>${piece.value}</strong> par une somme équivalente.`;
    decomposeInput.value = "";
    presetChips.innerHTML = "";
    presetChips.classList.remove("open");
    if(btnShowSuggestions){ btnShowSuggestions.style.display = "inline-flex"; btnShowSuggestions.innerHTML = "Aide&nbsp;?"; }

    const suggestions = buildSuggestions(piece.value);
    for(const s of suggestions){
      const chip = document.createElement("button");
      chip.className = "chip mathChip";
      chip.type = "button";
      chip.dataset.value = s;
      chip.innerHTML = formatSuggestionLabel(s);
      chip.addEventListener("click", () => {
        decomposeInput.value = chip.dataset.value || s;
        decomposeInput.focus();
      });
      presetChips.appendChild(chip);
    }

    if(divideBlock) divideBlock.style.display = "none";

    dialog.showModal();
    setTimeout(() => decomposeInput.focus(), 80);
  }

  function formatSuggestionLabel(raw){
    const safe = String(raw || "").replace(/[^0-9+\s]/g, "");
    return safe.replace(/\s*\+\s*/g, '<span class="mathPlus">+</span>');
  }

  function splitAsSum(value, parts){
    const each = value / parts;
    return Array.from({length:parts}, () => String(each)).join(" + ");
  }

  function buildDivideButtons(value){
    divideButtons.innerHTML = "";
    const divisors = [];
    for(let k=2; k<=8; k++){
      if(value % k === 0) divisors.push(k);
    }

    // On met en premier le partage qui correspond au nombre d'inconnues restantes,
    // s'il existe, parce que c'est souvent l'action utile en fin de résolution.
    const topX = activePieces("top").filter(p => p.type === "x").length;
    const bottomX = activePieces("bottom").filter(p => p.type === "x").length;
    const usefulK = Math.max(topX, bottomX);
    divisors.sort((a,b) => (a === usefulK ? -1 : b === usefulK ? 1 : a-b));

    for(const k of divisors.slice(0,5)){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ghost";
      btn.textContent = `Diviser en ${k}`;
      btn.addEventListener("click", () => {
        decomposeInput.value = splitAsSum(value, k);
        applyDecompose();
      });
      divideButtons.appendChild(btn);
    }

    divideBlock.style.display = divisors.length ? "block" : "none";
  }

  function buildSuggestions(value){
    const b = state.original.b;
    const a = state.original.a;
    const x = state.original.x;
    const suggestions = [];

    // Proposition vraiment utile : faire apparaître la constante à supprimer.
    // Toutes les propositions affichées doivent rester des décompositions valides
    // du nombre choisi : aucun bouton ne doit sembler « cassé ».
    if(b > 0 && value > b){
      const useful = value - b;
      suggestions.push(`${useful} + ${b}`);
    }

    // Autres propositions équivalentes, mais pas forcément optimales.
    const candidates = [];
    for(let left=1; left<=value-1; left++){
      const right = value - left;
      if(left === right) candidates.push(`${left} + ${right}`);
      if(left === 10 || right === 10) candidates.push(`${left} + ${right}`);
      if(left === x || right === x) candidates.push(`${left} + ${right}`);
      if(left === a || right === a) candidates.push(`${left} + ${right}`);
    }

    // Quelques découpages simples, toujours valides, pour garantir plusieurs choix si possible.
    const simpleSplits = [
      [1, value-1],
      [2, value-2],
      [Math.floor(value/2), value-Math.floor(value/2)],
      [Math.max(1, value-5), value-Math.max(1, value-5)],
      [Math.max(1, value-10), value-Math.max(1, value-10)]
    ];
    for(const [u,v] of simpleSplits){
      if(u > 0 && v > 0 && u + v === value) candidates.push(`${u} + ${v}`);
    }

    for(const c of shuffleUnique(candidates)){
      if(!suggestions.includes(c)) suggestions.push(c);
      if(suggestions.length >= 4) break;
    }

    return shuffle(suggestions.slice(0,4));
  }

  function shuffleUnique(arr){
    return shuffle([...new Set(arr)]);
  }

  function shuffle(arr){
    const out = arr.slice();
    for(let i=out.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  function parseSum(raw){
    const cleaned = String(raw || "").replace(/\s+/g,"");
    if(!cleaned) return null;
    if(!/^\d+(\+\d+)*$/.test(cleaned)) return null;
    const parts = cleaned.split("+").map(Number);
    if(parts.some(n => !Number.isFinite(n) || n <= 0)) return null;
    return parts;
  }

  function applyDecompose(){
    if(!selectedPieceRef) return;
    const parts = parseSum(decomposeInput.value);
    if(!parts){
      setStatus("Décomposition invalide");
      return;
    }

    const total = parts.reduce((a,b)=>a+b,0);
    if(total !== selectedPieceRef.value){
      setStatus(`Attention : la somme doit faire ${selectedPieceRef.value}`);
      return;
    }

    const arr = state[selectedPieceRef.side];
    const idx = arr.findIndex(p => p.id === selectedPieceRef.id);
    if(idx < 0) return;

    pushHistory();
    arr.splice(idx, 1, ...parts.map(makeNumber));
    recordEquationStep();
    selectedPieceRef = null;
    dialog.close();
    render();
    setStatus("Nombre décomposé", true);
  }

  function undo(){
    if(history.length === 0){
      setStatus("Rien à annuler");
      return;
    }
    state = history.pop();
    selectedPieceRef = null;
    selectedShareRef = null;
    pendingAddInfo = null;
    deleteSelection = [];
    addSelection = [];
    render();
    setStatus("Étape annulée");
  }

  function hint(){
    if(canDeleteMatchingNumbers()){
      setStatus("Indice : tu peux supprimer les quantités hachurées des deux côtés.");
      return;
    }
    const opp = getShareOpportunity();
    if(opp){
      setStatus(`Indice : ${opp.numberPiece.value} peut être partagé en ${opp.count} parts égales.`);
      return;
    }

    const topNums = activePieces("top").filter(p => p.type === "number");
    if(topNums.length === 1){
      const target = state.original.b;
      if(target > 0 && topNums[0].value > target){
        setStatus(`Indice : essaie de décomposer ${topNums[0].value} pour faire apparaître ${target}.`);
        return;
      }
    }
    setStatus("Indice : cherche si tu peux décomposer le nombre, ou le diviser en parts égales.");
  }

  if(toolDecompose) toolDecompose.addEventListener("click", () => setActionMode("decompose"));
  if(toolAdd) toolAdd.addEventListener("click", () => setActionMode("add"));
  if(toolShare) toolShare.addEventListener("click", () => setActionMode("share"));
  if(toolDelete) toolDelete.addEventListener("click", () => setActionMode("delete"));
  if(toolUndo) toolUndo.addEventListener("click", undo);
  if(removedDisplayModeEl) removedDisplayModeEl.addEventListener("change", render);
  if(unknownDisplayModeEl) unknownDisplayModeEl.addEventListener("change", refreshStepsForUnknownDisplay);
  if(unknownDisplayModeStudentEl) unknownDisplayModeStudentEl.addEventListener("change", refreshStepsForUnknownDisplay);
  if(equationDisplayModeEl) equationDisplayModeEl.addEventListener("change", render);
  if(equationDisplayModeStudentEl) equationDisplayModeStudentEl.addEventListener("change", render);
  if(fullscreenSizeModeEl) fullscreenSizeModeEl.addEventListener("change", syncFullscreenSizeMode);
  if(fullscreenSizeModeStudentEl) fullscreenSizeModeStudentEl.addEventListener("change", syncFullscreenSizeMode);

  if(btnStageRandom) btnStageRandom.addEventListener("click", randomExercise);
  if(btnToggleEquation) btnToggleEquation.addEventListener("click", toggleEquationDisplay);
  if(btnStageUndo) btnStageUndo.addEventListener("click", undo);
  if(btnTeacherMode) btnTeacherMode.addEventListener("click", () => setAppMode("teacher"));
  if(btnStudentMode) btnStudentMode.addEventListener("click", () => setAppMode("student"));
  worldCards.forEach(card => {
    card.addEventListener("click", () => setStudentPath(card.dataset.path));
  });
  if(btnStartStudent) btnStartStudent.addEventListener("click", startStudentSession);
  if(btnNextStudent) btnNextStudent.addEventListener("click", nextStudentExercise);
  if(btnStageNextStudent) btnStageNextStudent.addEventListener("click", nextStudentExercise);
  if(modeEl) modeEl.addEventListener("change", syncTeacherEquationControls);
  [coefAEl, constBEl, coefCEl, constCEl, constDEl].forEach(el => {
    if(el) {
      el.addEventListener("input", updateProfEquationInfo);
      el.addEventListener("change", updateProfEquationInfo);
    }
  });

  document.getElementById("btnBuild").addEventListener("click", buildFromInputs);
  document.getElementById("btnRandom").addEventListener("click", randomExercise);
  const btnUndoMenu = document.getElementById("btnUndo");
  if(btnUndoMenu) btnUndoMenu.addEventListener("click", undo);
  document.getElementById("btnReset").addEventListener("click", buildFromInputs);
  const btnHintMenu = document.getElementById("btnHint");
  if(btnHintMenu) btnHintMenu.addEventListener("click", hint);
  if(btnShowSuggestions){
    btnShowSuggestions.addEventListener("click", () => {
      presetChips.classList.toggle("open");
      btnShowSuggestions.innerHTML = presetChips.classList.contains("open") ? "Fermer" : "Aide&nbsp;?";
    });
  }
  document.getElementById("btnApplyDecompose").addEventListener("click", applyDecompose);
  document.getElementById("btnCancelDialog").addEventListener("click", () => dialog.close());
  const btnCancelShareDialog = document.getElementById("btnCancelShareDialog");
  if(btnCancelShareDialog) btnCancelShareDialog.addEventListener("click", () => {
    selectedShareRef = null;
    if(shareDialog) shareDialog.close();
  });

  const btnCancelAddDialog = document.getElementById("btnCancelAddDialog");
  if(btnCancelAddDialog) btnCancelAddDialog.addEventListener("click", () => {
    pendingAddInfo = null;
    if(addDialog) addDialog.close();
  });
  const btnApplyAdd = document.getElementById("btnApplyAdd");
  if(btnApplyAdd) btnApplyAdd.addEventListener("click", applyAdd);
  if(btnShowAddSuggestions && addSuggestions){
    btnShowAddSuggestions.addEventListener("click", () => {
      addSuggestions.classList.toggle("open");
      btnShowAddSuggestions.innerHTML = addSuggestions.classList.contains("open") ? "Fermer" : "Aide&nbsp;?";
    });
  }
  if(addInput){
    addInput.addEventListener("keydown", e => {
      if(e.key === "Enter") applyAdd();
      if(e.key === "Escape" && addDialog) addDialog.close();
    });
  }

  decomposeInput.addEventListener("keydown", e => {
    if(e.key === "Enter") applyDecompose();
    if(e.key === "Escape") dialog.close();
  });

  if(modeEl){
    modeEl.addEventListener("change", randomExercise);
  }

  if(btnFullscreen && stageEl){
    btnFullscreen.addEventListener("click", () => {
      if(document.fullscreenElement){
        document.exitFullscreen();
      }else{
        stageEl.requestFullscreen();
      }
    });
  }

  [coefAEl,constBEl,coefCEl,constCEl,constDEl].forEach(el => {
    if(!el) return;
    el.addEventListener("change", () => {
      el.value = String(Math.round(numberOr(el.value, Number(el.min) || 0)));
    });
  });

  randomExercise();
  syncTeacherEquationControls();
  syncAppModeUI();
})();
</script>
