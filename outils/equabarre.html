<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Équabarre — constructeur d’équations v1.4</title>
<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d8dee9;
    --blue:#3b82f6;
    --blue-soft:#dbeafe;
    --green:#16a34a;
    --green-soft:#dcfce7;
    --orange:#f97316;
    --orange-soft:#ffedd5;
    --red:#ef4444;
    --shadow:0 18px 50px rgba(15,23,42,.10);
    --radius:22px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.13), transparent 34rem),
      radial-gradient(circle at bottom right, rgba(22,163,74,.10), transparent 34rem),
      var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }

  header{
    padding:22px clamp(16px,3vw,36px) 12px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
    text-align:center;
  }

  .titleBlock h1{
    margin:0;
    font-size:clamp(30px,4vw,52px);
    line-height:.95;
    letter-spacing:-.06em;
    font-weight:950;
  }

  .titleBlock .subtitle{
    margin-top:8px;
    color:var(--muted);
    font-size:16px;
    font-weight:600;
  }

  .badge{
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border:1px solid rgba(59,130,246,.20);
    background:rgba(255,255,255,.72);
    border-radius:999px;
    color:#1d4ed8;
    font-size:13px;
    font-weight:800;
    box-shadow:0 8px 24px rgba(15,23,42,.06);
  }

  main{
    width:min(1240px, calc(100vw - 28px));
    margin:18px auto 32px;
    display:grid;
    grid-template-columns:310px minmax(0,1fr);
    gap:18px;
    align-items:start;
  }

  
  /* PATCH 34 — historique d'équations : vrais alignements communs */
  .equationHistory{
    width:min(880px,100%);
    margin:8px auto 0;
    font-size:clamp(24px,2.6vw,38px);
    font-weight:950;
    line-height:1.18;
    display:grid;
    grid-template-columns:max-content 1.5ch max-content;
    column-gap:14px;
    justify-content:center;
    align-items:baseline;
  }

  .stepRow{
    display:contents;
  }

  .lhs{
    grid-column:1;
    text-align:right;
    white-space:nowrap;
  }

  .eq{
    grid-column:2;
    text-align:center;
    color:#64748b;
    white-space:nowrap;
  }

  .rhs{
    grid-column:3;
    text-align:left;
    white-space:nowrap;
  }

@media (max-width:900px){
    main{grid-template-columns:1fr}
  }

  .panel,.stage{
    background:rgba(255,255,255,.88);
    border:1px solid rgba(15,23,42,.08);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }

  .panel{
    padding:16px;
    position:sticky;
    top:14px;
  }

  .appTitle{
    text-align:center;
    font-size:34px;
    line-height:1;
    letter-spacing:-.055em;
    font-weight:950;
    margin:2px 0 16px;
  }

  .fullscreenBtn{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    padding:0;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:18px;
    z-index:5;
  }

  .stage{
    position:relative;
  }

  .stage:fullscreen{
    background:var(--bg);
    border-radius:0;
    width:100vw;
    height:100vh;
    padding:22px;
    display:flex;
    flex-direction:column;
  }

  .stage:fullscreen .board{
    flex:1;
    min-height:0;
  }

  .stage:fullscreen .piece{
    height:128px;
  }

  .stage:fullscreen .barLine{
    min-height:128px;
  }

  /* PATCH 4 — option plein écran compact : ne modifie que le rendu en plein écran. */
  .stage.fullscreenCompact:fullscreen{
    align-items:center;
  }

  .stage.fullscreenCompact:fullscreen .topbar,
  .stage.fullscreenCompact:fullscreen .instructionZone,
  .stage.fullscreenCompact:fullscreen .board,
  .stage.fullscreenCompact:fullscreen .toolBar,
  .stage.fullscreenCompact:fullscreen .actionZone,
  .stage.fullscreenCompact:fullscreen .solution{
    width:min(1180px, calc(100vw - 44px));
  }

  .stage.fullscreenCompact:fullscreen .board{
    flex:0 0 auto;
    width:min(1280px, calc(100vw - 44px));
    min-height:430px;
    max-height:58vh;
    padding:34px clamp(42px,5vw,86px);
    background:rgba(255,255,255,.34);
    border:1px solid rgba(15,23,42,.045);
    box-shadow:0 3px 10px rgba(15,23,42,.025);
  }

  .stage.fullscreenCompact:fullscreen .barLine{
    background:rgba(255,255,255,.96);
  }

  .stage.fullscreenCompact:fullscreen .piece.number{
    background:#ffffff;
  }

  .stage.fullscreenCompact:fullscreen .piece.x{
    background:#eff6ff;
  }

  .stage.fullscreenCompact:fullscreen .piece{
    height:108px;
  }

  .stage.fullscreenCompact:fullscreen .barLine{
    min-height:108px;
  }


  /* PATCH v5b — plein écran : conserver les hachures et sélections.
     Les règles .piece.number / .piece.x du mode compact écrasaient les backgrounds
     des états selectedForDelete / selectedForAdd / removed. */
  .stage.fullscreenCompact:fullscreen .piece.selectedForDelete{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.22) 0 8px, rgba(255,255,255,.52) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
    box-shadow: inset 0 0 0 3px rgba(249,115,22,.42);
  }

  .stage.fullscreenCompact:fullscreen .piece.selectedForAdd{
    background:
      repeating-linear-gradient(135deg, rgba(22,163,74,.16) 0 8px, rgba(255,255,255,.62) 8px 15px),
      linear-gradient(180deg,#dcfce7,#f0fdf4);
    box-shadow: inset 0 0 0 3px rgba(22,163,74,.42);
  }

  .stage.fullscreenCompact:fullscreen .piece.removed{
    opacity:.26;
    background:
      repeating-linear-gradient(135deg, rgba(15,23,42,.30) 0 7px, rgba(255,255,255,.1) 7px 14px),
      #e5e7eb;
    pointer-events:none;
  }

  @media (max-width:900px){
    .panel{position:static}
  }

  label{
    display:block;
    margin:12px 0 5px;
    font-size:12px;
    color:var(--muted);
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .profPanel.hidden{
    display:none;
  }

  input,select{
    width:100%;
    border:1px solid rgba(15,23,42,.14);
    border-radius:14px;
    padding:11px 12px;
    background:white;
    color:var(--ink);
    font-size:15px;
    font-weight:700;
    outline:none;
  }

  input:focus,select:focus{
    border-color:rgba(59,130,246,.55);
    box-shadow:0 0 0 4px rgba(59,130,246,.12);
  }


  /* PATCH v7 — menu prof : mots en capitales, lettres mathématiques en minuscules */
  .mathParamLabel{
    text-transform:uppercase;
  }

  .mathParamLabel .mathLetter{
    text-transform:none;
    letter-spacing:0;
    font-weight:950;
  }

  .randomQuickBtn{
    font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",system-ui,sans-serif;
    font-style:normal;
    font-weight:400;
    color:#1d4ed8;
    line-height:1;
    transform:none;
  }

  .randomQuickBtn{
    display:grid;
    place-items:center;
  }

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .btnrow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  button{
    border:none;
    border-radius:14px;
    padding:11px 13px;
    font-size:14px;
    font-weight:900;
    color:var(--ink);
    background:#eef2f7;
    cursor:pointer;
    transition:transform .08s ease, filter .12s ease, opacity .12s ease;
  }

  button:hover{filter:brightness(.98)}
  button:active{transform:translateY(1px)}
  button.primary{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:white;
  }

  /* PATCH 1 — bouton Construire : bleu principal adouci sans modifier les autres boutons */
  button.green{
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
  }
  button.orange{
    background:linear-gradient(180deg,#fb923c,#f97316);
    color:white;
  }
  button.ghost{
    background:transparent;
    border:1px solid rgba(15,23,42,.12);
  }
  button:disabled{
    opacity:.42;
    cursor:not-allowed;
    transform:none;
  }

  .mini{
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
    margin-top:10px;
  }

  .stage{
    padding:16px;
    min-height:660px;
  }

  .stage{
    padding:16px;
    min-height:660px;
    position:relative;
  }

  .stageQuickActions{
    position:absolute;
    top:14px;
    right:14px;
    z-index:5;
    display:flex;
    gap:8px;
    align-items:center;
  }


  .stageNextBtn{
    padding:8px 10px;
    border-radius:12px;
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:#fff;
    font-size:13px;
    font-weight:950;
    display:none;
  }

  .stageNextBtn.show{
    display:inline-flex;
  }

  .quickBtn{
    width:44px;
    height:44px;
    padding:0;
    display:grid;
    place-items:center;
    border-radius:14px;
    font-size:23px;
    line-height:1;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.14);
    box-shadow:0 10px 24px rgba(15,23,42,.14);
    backdrop-filter:blur(8px);
  }

  .equationEyeBtn svg{
    width:23px;
    height:23px;
    display:block;
    opacity:.78;
  }

  .equationEyeBtn:hover svg{
    opacity:.95;
  }

  .quickBtn:hover{
    background:#eef2f7;
  }

  .equationEyeBtn{
    font-size:22px;
  }

  .equationEyeBtn.is-hidden{
    opacity:.72;
    background:#f8fafc;
  }

  .topbar{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    padding:4px 4px 18px;
    text-align:center;
  }

  .equationText{
    display:none;
  }

  .equationHistory{
    width:min(760px, 100%);
    display:grid;
    justify-content:center;
    gap:2px;
    color:#64748b;
    font-size:clamp(18px, 2vw, 26px);
    font-weight:900;
    line-height:1.15;
    font-variant-numeric:tabular-nums;
  }

  .equationHistory .stepRow{
    display:grid;
    grid-template-columns:minmax(80px, auto) 30px minmax(80px, auto);
    align-items:baseline;
    column-gap:8px;
    padding:1px 8px;
  }

  .equationHistory .lhs{
    text-align:right;
    white-space:nowrap;
  }

  .equationHistory .eq{
    text-align:center;
    color:#94a3b8;
    font-weight:950;
  }

  .equationHistory .rhs{
    text-align:left;
    white-space:nowrap;
  }

  .equationHistory .stepRow:last-child{
    color:#0f172a;
  }

  .equationHistory .stepRow:last-child .eq{
    color:#3b82f6;
  }


  .equationHistory{
    width:min(980px,100%);
    margin:6px auto 0;
    font-size:clamp(30px,3.2vw,46px);
    font-weight:950;
    line-height:1.18;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stepRow{
    display:grid;
    grid-template-columns: var(--eqLeftW, 12ch) 1.4ch var(--eqRightW, 12ch);
    column-gap:16px;
    align-items:baseline;
    justify-content:center;
    width:max-content;
    max-width:100%;
  }

  .lhs{text-align:right;white-space:nowrap}
  .eq{text-align:center;color:#64748b;white-space:nowrap}
  .rhs{text-align:left;white-space:nowrap}

  .status{
    display:none;
    padding:8px 11px;
    border-radius:999px;
    background:#f1f5f9;
    color:#475569;
    font-size:13px;
    font-weight:850;
  }

  .status.good{
    background:var(--green-soft);
    color:#166534;
  }

  .instructionZone{
    margin:0 auto 12px;
    width:min(820px,100%);
    min-height:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#334155;
    font-size:15px;
    font-weight:750;
    line-height:1.35;
  }

  .instructionZone strong{
    font-weight:950;
  }

  .board{
    background:
      linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.36));
    border:1px solid rgba(15,23,42,.08);
    border-radius:24px;
    padding:34px clamp(18px,4vw,58px);
    min-height:475px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:0;
  }

  .sideRow{
    display:grid;
    grid-template-columns:minmax(0,1fr);
    gap:0;
    align-items:center;
  }

  .sideLabel{
    display:none;
    color:var(--muted);
    font-weight:950;
    text-align:right;
    font-size:16px;
  }

  .barLine{
    --table-border: rgba(15,23,42,.36);
    display:grid;
    grid-auto-flow:column;
    grid-template-columns:var(--cols, 1fr);
    align-items:stretch;
    justify-content:start;
    width:var(--lineWidth, 100%);
    min-height:104px;
    border-radius:0;
    position:relative;
    gap:0;
    background:#fff;
    box-sizing:border-box;
  }

  /* Construction façon vrai tableau :
     - la ligne du haut porte le contour haut + gauche + droite + trait central ;
     - la ligne du bas porte seulement gauche + droite + bas ;
     - pas de marge négative, donc pas de trait qui disparaît. */
  #topLine{
    border-top:2px solid var(--table-border);
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  #bottomLine{
    margin-top:0;
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  .piece{
    min-width:0;
    width:100%;
    height:104px;
    border-radius:0;
    border:0;
    border-right:2px solid var(--table-border);
    display:grid;
    place-items:center;
    position:relative;
    overflow:hidden;
    user-select:none;
    cursor:pointer;
    transition:background .12s ease, filter .12s ease;
    box-sizing:border-box;
  }

  .piece:last-child{border-right:0;}

  .piece:hover{
    filter:brightness(.985);
  }

  .piece.number{
    background:linear-gradient(180deg,#fff,#f8fafc);
  }

  .piece.x{
    background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  }

  .piece.match{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.20) 0 8px, rgba(255,255,255,.54) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
  }

  .piece.selectedForDelete{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.22) 0 8px, rgba(255,255,255,.52) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
    box-shadow: inset 0 0 0 3px rgba(249,115,22,.42);
  }

  /* PATCH REGROUPER — sélection des nombres à fusionner dans un même membre. */
  .piece.selectedForAdd{
    background:
      repeating-linear-gradient(135deg, rgba(22,163,74,.16) 0 8px, rgba(255,255,255,.62) 8px 15px),
      linear-gradient(180deg,#dcfce7,#f0fdf4);
    box-shadow: inset 0 0 0 3px rgba(22,163,74,.42);
  }


  .piece.removed{
    opacity:.26;
    background:
      repeating-linear-gradient(135deg, rgba(15,23,42,.30) 0 7px, rgba(255,255,255,.1) 7px 14px),
      #e5e7eb;
    pointer-events:none;
  }

  .pieceContent{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }

  .pieceValue{
    font-size:clamp(28px,3.2vw,42px);
    font-weight:950;
    letter-spacing:-.04em;
  }

  .piece.x .pieceValue{
    font-family:Georgia, 'Times New Roman', serif;
    font-style:italic;
    color:#1d4ed8;
  }

  .piece.x .pieceValue.splatValue{
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    font-style:normal;
    color:inherit;
  }

  .splatIcon{
    width:clamp(52px,5.6vw,78px);
    height:clamp(52px,5.6vw,78px);
    display:block;
    filter:drop-shadow(0 4px 7px rgba(15,23,42,.16));
  }

  .splatIcon svg{
    display:block;
    width:100%;
    height:100%;
  }

  .piece.removed .splatIcon{
    filter:grayscale(1) opacity(.65);
  }

  .pieceKind{
    display:none;
  }

  .equalSep{
    display:none;
    grid-template-columns:76px minmax(0,1fr);
    gap:16px;
    align-items:center;
    margin:-7px 0;
  }

  .equalSep .eqSign{
    text-align:right;
    color:#94a3b8;
    font-size:26px;
    font-weight:950;
  }

  .equalLine{
    height:2px;
    background:linear-gradient(90deg,rgba(15,23,42,.18),rgba(15,23,42,.04));
    border-radius:999px;
  }

  .actionZone{
    margin-top:8px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    min-height:52px;
  }

  .toolBar{
    margin:14px 0 4px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .toolBtn{
    border:1px solid rgba(15,23,42,.12);
    background:#f8fafc;
    color:#334155;
  }

  .toolBtn.active{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:#fff;
    border-color:rgba(37,99,235,.30);
    box-shadow:0 10px 24px rgba(59,130,246,.18);
  }

  .undoToolBtn{
    background:#fff7ed;
    border-color:rgba(249,115,22,.28);
    color:#9a3412;
  }

  .undoToolBtn:hover{
    background:#ffedd5;
  }

  .message{
    padding:12px 14px;
    border-radius:16px;
    background:#f8fafc;
    border:1px solid rgba(15,23,42,.08);
    color:#334155;
    font-size:14px;
    font-weight:700;
    line-height:1.35;
  }

  .message strong{font-weight:950}

  .solution{
    text-align:center;
    font-size:clamp(30px,4vw,54px);
    font-weight:950;
    letter-spacing:-.05em;
    margin-top:4px;
    color:#166534;
  }

  dialog{
    width:min(560px, calc(100vw - 28px));
    border:1px solid rgba(15,23,42,.10);
    border-radius:24px;
    padding:0;
    box-shadow:0 30px 100px rgba(15,23,42,.24);
  }

  dialog::backdrop{
    background:rgba(15,23,42,.35);
    backdrop-filter:blur(4px);
  }

  .dialogInner{
    padding:30px 34px 28px;
    text-align:center;
  }

  .dialogTitle{
    font-size:30px;
    font-weight:950;
    letter-spacing:-.04em;
    margin:0 0 10px;
    text-align:center;
  }

  .dialogText{
    color:var(--muted);
    font-size:18px;
    font-weight:700;

    margin-bottom:18px;
    text-align:center;

  dialog label{
    text-align:center;

  }

  #decomposeInput{
    text-align:center;
    font-size:26px;
    font-weight:950;

  }

  .presetChips{
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:12px 0 16px;
  }

  .presetChips.open{
    display:flex;
  }

  .helpMiniBtn{
    min-width:84px;
    width:auto;
    height:38px;
    border-radius:999px;
    padding:0;
    display:inline-grid;
    place-items:center;
    margin:12px auto 2px;
    font-size:16px;
    font-weight:950;
    padding:0 16px;
    background:#eef2f7;
    border:1px solid rgba(15,23,42,.10);
  }

  .divideBlock{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(15,23,42,.08);
  }

  .divideTitle{
    color:var(--muted);
    font-size:13px;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:8px;
  }

  .divideButtons{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }

  dialog .btnrow{

<script>
(() => {
  const topLine = document.getElementById("topLine");
  const bottomLine = document.getElementById("bottomLine");
  const actionZone = document.getElementById("actionZone");
  const instructionZone = document.getElementById("instructionZone");
  const solutionEl = document.getElementById("solution");
  const equationText = document.getElementById("equationText");
  const equationHistory = document.getElementById("equationHistory");
  const statusEl = document.getElementById("status");
  const appMain = document.getElementById("appMain");
  const stageEl = document.getElementById("stage");
  const btnFullscreen = document.getElementById("btnFullscreen");
  const btnToggleEquation = document.getElementById("btnToggleEquation");
  const btnBackToMenu = document.getElementById("btnBackToMenu");
  const toolDecompose = document.getElementById("toolDecompose");
  const toolAdd = document.getElementById("toolAdd");
  const toolShare = document.getElementById("toolShare");
  const toolMove = document.getElementById("toolMove");
  const toolDelete = document.getElementById("toolDelete");
  const toolUndo = document.getElementById("toolUndo");
  const toolRestart = document.getElementById("toolRestart");
  const equationInput = document.getElementById("equationInput");
  const unknownDisplayInput = document.getElementById("unknownDisplayInput");
  const btnBuildEquation = document.getElementById("btnBuildEquation");
  const btnRandomEquation = document.getElementById("btnRandomEquation");
  const btnNewEquation = document.getElementById("btnNewEquation");
  const buildError = document.getElementById("buildError");
  const removedDisplayModeEl = document.getElementById("removedDisplayMode");
  // Mémoire interne de l'affichage de l'inconnue : alimentée par l'import Splat ou par le constructeur.
  let importedUnknownDisplayMode = "letter";
  const equationDisplayModeEl = document.getElementById("equationDisplayMode");


  const dialog = document.getElementById("decomposeDialog");
  const dialogText = document.getElementById("dialogText");
  const decomposeInput = document.getElementById("decomposeInput");
  const presetChips = document.getElementById("presetChips");

  const shareDialog = document.getElementById("shareDialog");
  const shareDialogText = document.getElementById("shareDialogText");
  const shareChoices = document.getElementById("shareChoices");
  const addDialog = document.getElementById("addDialog");
  const addDialogText = document.getElementById("addDialogText");
  const addInput = document.getElementById("addInput");
  const addSuggestions = document.getElementById("addSuggestions");
  const btnShowAddSuggestions = document.getElementById("btnShowAddSuggestions");
  const btnShowSuggestions = document.getElementById("btnShowSuggestions");
  const divideBlock = document.getElementById("divideBlock");
  const divideButtons = document.getElementById("divideButtons");

  const variableChars = ["𝑥", "𝑎", "𝑏", "𝑐", "𝑚", "𝑛", "𝑡"];

  let state = null;
  let history = [];
  let initialImportState = null;
  let selectedPieceRef = null;
  let selectedShareRef = null;
  let pendingAddInfo = null;
  let deleteSelection = [];
  let addSelection = [];
  let moveSelection = null;
  let actionMode = "decompose"; // decompose | add | share | delete | move

  function setActionMode(mode){
    actionMode = mode;
    deleteSelection = [];
    addSelection = [];
    moveSelection = null;
    pendingAddInfo = null;
    [toolDecompose, toolAdd, toolShare, toolMove, toolDelete].forEach(btn => btn && btn.classList.remove("active"));
    if(mode === "decompose" && toolDecompose) toolDecompose.classList.add("active");
    if(mode === "add" && toolAdd) toolAdd.classList.add("active");
    if(mode === "share" && toolShare) toolShare.classList.add("active");
    if(mode === "move" && toolMove) toolMove.classList.add("active");
    if(mode === "delete" && toolDelete) toolDelete.classList.add("active");
    render();
  }

  function currentVar(){
    return state && state.original && state.original.varChar ? state.original.varChar : "𝑥";
  }

  function shouldKeepRemovedPieces(){
    return !removedDisplayModeEl || removedDisplayModeEl.value !== "hide";
  }

  function currentMode(){
    return state && state.original ? state.original.mode : "";
  }

  function unknownDisplayKind(){
    return importedUnknownDisplayMode;
  }

  function displayedUnknown(){
    const kind = unknownDisplayKind();
    return (kind === "question" || kind === "splat") ? "?" : currentVar();
  }

  function unknownTerm(count){
    const v = displayedUnknown();
    if(v === "?"){
      return count === 1 ? "?" : `${count} × ?`;
    }
    return count === 1 ? v : `${count}${v}`;
  }

  /* Splat : même logique de dessin que l’outil Splat!
     (forme générée par lobes sinusoïdaux + lissage Catmull-Rom -> Bézier). */
  function blobPath(cx, cy, r){
    const n = 40;
    const lobes = 5;
    const pts = [];
    for(let i=0;i<n;i++){
      const a = (Math.PI * 2 * i) / n;
      const k = 0.90 + 0.16 * Math.sin(lobes*a) + 0.04 * Math.sin(2*lobes*a);
      const rr = r * k;
      pts.push([cx + Math.cos(a)*rr, cy + Math.sin(a)*rr]);
    }
    function cr2bz(p0,p1,p2,p3){
      const t = 1/6;
      const c1x = p1[0] + (p2[0]-p0[0]) * t;
      const c1y = p1[1] + (p2[1]-p0[1]) * t;
      const c2x = p2[0] - (p3[0]-p1[0]) * t;
      const c2y = p2[1] - (p3[1]-p1[1]) * t;
      return [c1x,c1y,c2x,c2y,p2[0],p2[1]];
    }
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for(let i=0;i<n;i++){
      const p0 = pts[(i-1+n)%n];
      const p1 = pts[i];
      const p2 = pts[(i+1)%n];
      const p3 = pts[(i+2)%n];
      const [c1x,c1y,c2x,c2y,x,y] = cr2bz(p0,p1,p2,p3);
      d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x} ${y}`;
    }
    d += " Z";
    return d;
  }

  function splatSvg(){
    const d = blobPath(60, 60, 44);
    return `<span class="splatIcon" aria-label="Splat" role="img"><svg viewBox="0 0 120 120" aria-hidden="true" focusable="false">
      <path d="${d}" fill="#050505" stroke="rgba(0,0,0,.18)" stroke-width="2"/>
    </svg></span>`;
  }

  function equationDisplayEnabled(){
    return !equationDisplayModeEl || equationDisplayModeEl.value !== "hide";
  }


  function eyeIconSvg(hidden=false){
    if(hidden){
      return `<svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M10.7 5.2A9.4 9.4 0 0 1 12 5c5.2 0 8.7 4.5 9.7 6.1.2.3.2.7 0 1.1a16 16 0 0 1-2.6 3.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 6.7A15.8 15.8 0 0 0 2.3 11c-.2.3-.2.7 0 1.1C3.3 13.7 6.8 18 12 18c1.3 0 2.5-.3 3.6-.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.8 9.8a3.1 3.1 0 0 0 4.4 4.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>`;
    }
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2.3 11.1C3.3 9.5 6.8 5 12 5s8.7 4.5 9.7 6.1c.2.3.2.7 0 1.1C20.7 13.8 17.2 18 12 18S3.3 13.8 2.3 12.2c-.2-.3-.2-.7 0-1.1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="11.7" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>`;
  }

  function syncEquationToggleButton(){
    if(!btnToggleEquation) return;
    const visible = equationDisplayEnabled();
    btnToggleEquation.innerHTML = eyeIconSvg(!visible);
    btnToggleEquation.title = visible ? "Masquer l’équation" : "Afficher l’équation";
    btnToggleEquation.classList.toggle("is-hidden", !visible);
  }

  function toggleEquationDisplay(){
    if(!equationDisplayModeEl) return;
    equationDisplayModeEl.value = equationDisplayModeEl.value === "hide" ? "show" : "hide";
    render();
  }

  function uid(){
    return Math.random().toString(36).slice(2, 9);
  }

  function clone(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function pushHistory(){
    history.push(clone(state));
    if(history.length > 60) history.shift();
  }

  function setStatus(text, good=false){
    statusEl.textContent = text;
    statusEl.className = good ? "status good" : "status";
  }

  function numberOr(value, fallback){
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function clamp(n,a,b){
    return Math.max(a, Math.min(b,n));
  }

  function makeNumber(value){
    return { id:uid(), type:"number", value:Number(value), removed:false };
  }

  function makeX(){
    const v = state && state.original && state.original.varChar ? state.original.varChar : "𝑥";
    return { id:uid(), type:"x", value:v, removed:false };
  }

  function sideExpression(side){
    const pieces = activePieces(side);
    const v = displayedUnknown();
    const terms = [];
    let i = 0;

    while(i < pieces.length){
      const p = pieces[i];
      if(p.type === "x"){
        let count = 0;
        while(i < pieces.length && pieces[i].type === "x"){
          count++;
          i++;
        }
        terms.push(unknownTerm(count));
      }else{
        terms.push(String(p.value));
        i++;
      }
    }

    return terms.length ? terms.join(" + ") : "0";
  }

  function solvedEquationStringPreservingSides(solved){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    const isAllNumbers = arr => arr.every(p => p.type === "number");
    const isAllX = arr => arr.every(p => p.type === "x");
    const allSameNumber = arr => isAllNumbers(arr) && arr.length > 0 && arr.every(p => p.value === arr[0].value);

    let numberSide = null;
    let xSide = null;
    let value = solved;

    if(allSameNumber(top) && isAllX(bottom) && top.length === bottom.length){
      numberSide = "top";
      xSide = "bottom";
      value = top[0].value;
    }else if(allSameNumber(bottom) && isAllX(top) && bottom.length === top.length){
      numberSide = "bottom";
      xSide = "top";
      value = bottom[0].value;
    }

    if(numberSide && xSide){
      const lhsSide = state && state.original ? state.original.lhsSide : "";
      const left = lhsSide === xSide ? displayedUnknown() : String(value);
      const right = lhsSide === xSide ? String(value) : displayedUnknown();
      return `${left} = ${right}`;
    }

    return `${displayedUnknown()} = ${solved}`;
  }

  function currentEquationString(){
    const solved = getSolvedValue();
    if(solved !== null){
      return solvedEquationStringPreservingSides(solved);
    }

    // En import Splat, le sens de lecture doit venir de Splat lui-même.
    // lhsSide indique quel plateau doit être écrit à gauche du signe égal.
    const lhsSide = state && state.original ? state.original.lhsSide : "";
    if(lhsSide === "top"){
      return `${sideExpression("top")} = ${sideExpression("bottom")}`;
    }
    if(lhsSide === "bottom"){
      return `${sideExpression("bottom")} = ${sideExpression("top")}`;
    }

    // Fallback si un ancien lien ne fournit pas lhsSide.
    return `${sideExpression("bottom")} = ${sideExpression("top")}`;
  }

  function recordEquationStep(){
    if(!state) return;
    const eq = currentEquationString();
    if(!state.steps) state.steps = [];
    if(state.steps[state.steps.length - 1] !== eq) state.steps.push(eq);
  }

  function refreshStepsForUnknownDisplay(){
    if(!state) return;
    state.steps = [currentEquationString()];
    render();
  }

  function activePieces(side){
    return state[side].filter(p => !p.removed);
  }

  function getPieceBySideAndId(ref){
    if(!ref || !state || !state[ref.side]) return null;
    return state[ref.side].find(p => p.id === ref.id) || null;
  }

  function selectedDeleteIds(){
    return new Set(deleteSelection.map(ref => ref.id));
  }

  function selectedDeletePiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of deleteSelection){
      const p = getPieceBySideAndId(ref);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }

  function selectedAddIds(){
    return new Set(addSelection.map(ref => ref.id));
  }

  function selectedAddPiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of addSelection){
      const p = getPieceBySideAndId(ref);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }

  function selectedMoveIds(){
    return new Set(moveSelection ? [moveSelection.id] : []);
  }

  function updateCurrentEquationStep(){
    if(!state) return;
    const eq = currentEquationString();
    if(!state.steps) state.steps = [];
    if(state.steps.length === 0){
      state.steps.push(eq);
    }else{
      state.steps[state.steps.length - 1] = eq;
    }
  }

  function selectForMove(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    if(moveSelection && moveSelection.side === side && moveSelection.id === id){
      moveSelection = null;
      render();
      return;
    }

    if(!moveSelection){
      moveSelection = {side, id};
      render();
      return;
    }

    if(moveSelection.side !== side){
      setStatus("On déplace seulement à l’intérieur d’un même membre.");
      render();
      return;
    }

    const arr = state[side];
    const firstIndex = arr.findIndex(p => p.id === moveSelection.id);
    const secondIndex = arr.findIndex(p => p.id === id);
    if(firstIndex < 0 || secondIndex < 0) {
      moveSelection = null;
      render();
      return;
    }

    pushHistory();
    [arr[firstIndex], arr[secondIndex]] = [arr[secondIndex], arr[firstIndex]];
    moveSelection = null;
    recordEquationStep();
    render();
    setStatus("Cases échangées", true);
  }


  function additionGroupInfo(){
    const {top, bottom} = selectedAddPiecesBySide();
    if(top.length && bottom.length) return {ok:false, reason:"oneSide", side:null, pieces:top.concat(bottom)};

    const side = top.length ? "top" : (bottom.length ? "bottom" : null);
    const pieces = side === "top" ? top : bottom;
    if(!side || pieces.length < 2) return {ok:false, reason:"needMore", side, pieces};
    if(pieces.some(p => p.type !== "number")) return {ok:false, reason:"numbersOnly", side, pieces};

    const sum = pieces.reduce((total,p) => total + Number(p.value || 0), 0);
    const expr = pieces.map(p => p.value).join(" + ");
    return {ok:true, side, pieces, sum, expr};
  }

  function selectForAdd(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    const alreadyIndex = addSelection.findIndex(ref => ref.side === side && ref.id === id);
    if(alreadyIndex >= 0){
      addSelection.splice(alreadyIndex, 1);
      render();
      return;
    }

    if(piece.type !== "number"){
      addSelection = [];
      setStatus("On regroupe seulement des nombres connus.");
      render();
      return;
    }

    if(addSelection.length && addSelection[0].side !== side){
      addSelection = [];
    }

    addSelection.push({side, id});
    render();
  }

  function deletionGroupInfo(){
    const {top, bottom} = selectedDeletePiecesBySide();
    if(top.length === 0 || bottom.length === 0){
      return {ok:false, reason:"needBoth", top, bottom};
    }

    const all = top.concat(bottom);
    const firstType = all[0].type;

    if(all.some(p => p.type !== firstType)){
      return {ok:false, reason:"mixedTypes", top, bottom};
    }

    if(firstType === "x"){
      if(top.length !== bottom.length){
        return {ok:false, reason:"differentCounts", top, bottom};
      }
      return {
        ok:true,
        type:"x",
        count:top.length,
        label: unknownTerm(top.length),
        top,
        bottom
      };
    }

    if(firstType === "number"){
      const topSum = top.reduce((s,p)=>s + Number(p.value || 0), 0);
      const bottomSum = bottom.reduce((s,p)=>s + Number(p.value || 0), 0);
      if(topSum !== bottomSum){
        return {ok:false, reason:"differentSums", top, bottom, topSum, bottomSum};
      }
      return {
        ok:true,
        type:"number",
        count:top.length + bottom.length,
        value:topSum,
        label:String(topSum),
        top,
        bottom
      };
    }

    return {ok:false, reason:"unknown", top, bottom};
  }

  function canDeleteMatchingNumbers(){
    return deletionGroupInfo().ok;
  }

  function selectForDeletion(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    const alreadyIndex = deleteSelection.findIndex(ref => ref.side === side && ref.id === id);
    if(alreadyIndex >= 0){
      deleteSelection.splice(alreadyIndex, 1);
      render();
      return;
    }

    // Suppression groupée :
    // on autorise plusieurs cases, mais on évite les mélanges inutilisables.
    const currentPieces = deleteSelection.map(getPieceBySideAndId).filter(Boolean);
    if(currentPieces.length){
      const firstType = currentPieces[0].type;
      if(piece.type !== firstType){
        deleteSelection = [];
      }
    }

    deleteSelection.push({side, id});
    render();
  }

  function deleteMatchingNumbers(){
    const info = deletionGroupInfo();
    if(!info.ok) return;

    pushHistory();
    const ids = selectedDeleteIds();
    for(const side of ["top","bottom"]){
      for(const p of state[side]){
        if(ids.has(p.id)) p.removed = true;
      }
    }
    deleteSelection = [];
    recordEquationStep();
    render();
    setStatus("Même quantité supprimée des deux côtés", true);
  }

  function getShareOpportunity(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    const topNumbers = top.filter(p => p.type === "number");
    const bottomNumbers = bottom.filter(p => p.type === "number");
    const topX = top.filter(p => p.type === "x");
    const bottomX = bottom.filter(p => p.type === "x");

    if(topNumbers.length === 1 && topX.length === 0 && bottomNumbers.length === 0 && bottomX.length >= 2){
      const value = topNumbers[0].value;
      if(value % bottomX.length === 0){
        return { numberSide:"top", xSide:"bottom", numberPiece:topNumbers[0], count:bottomX.length, result:value / bottomX.length };
      }
    }

    if(bottomNumbers.length === 1 && bottomX.length === 0 && topNumbers.length === 0 && topX.length >= 2){
      const value = bottomNumbers[0].value;
      if(value % topX.length === 0){
        return { numberSide:"bottom", xSide:"top", numberPiece:bottomNumbers[0], count:topX.length, result:value / topX.length };
      }
    }

    return null;
  }

  function shareNumber(){
    const opp = getShareOpportunity();
    if(!opp) return;
    pushHistory();

    const parts = Array.from({length:opp.count}, () => makeNumber(opp.result));
    const sideArr = state[opp.numberSide];
    const idx = sideArr.findIndex(p => p.id === opp.numberPiece.id);
    sideArr.splice(idx, 1, ...parts);
    recordEquationStep();

    render();
    setStatus(`La quantité est partagée en ${opp.count} parts égales`, true);
  }

  function getSolvedValue(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    if(top.length === 0 || bottom.length === 0) return null;

    const isAllNumbers = arr => arr.every(p => p.type === "number");
    const isAllX = arr => arr.every(p => p.type === "x");
    const allSameNumber = arr => isAllNumbers(arr) && arr.every(p => p.value === arr[0].value);

    if(allSameNumber(top) && isAllX(bottom) && top.length === bottom.length){
      return top[0].value;
    }
    if(allSameNumber(bottom) && isAllX(top) && top.length === bottom.length){
      return bottom[0].value;
    }
    return null;
  }

  function getPieceMeasure(piece){
    if(piece.type === "x"){
      return Math.max(1, state.original.x);
    }
    return Math.max(1, Math.abs(piece.value));
  }

  function getPieceWidthPercent(piece){
    const total = Math.max(1, state.original.c);
    return (getPieceMeasure(piece) / total) * 100;
  }

  function renderLine(side, host, selectedIds, commonLineWidth=null){
    host.innerHTML = "";
    const pieces = shouldKeepRemovedPieces() ? state[side] : state[side].filter(p => !p.removed);
    const widths = pieces.map(piece => getPieceWidthPercent(piece));
    const naturalLineWidth = widths.reduce((sum, w) => sum + w, 0);
    const lineWidth = commonLineWidth == null ? naturalLineWidth : commonLineWidth;

    // Important :
    // La largeur totale de la ligne diminue quand on enlève une partie.
    // Mais les cases restantes ne doivent pas être réduites une deuxième fois.
    // Donc on normalise les colonnes à l'intérieur de la largeur restante.
    const safeLineWidth = Math.max(0.0001, lineWidth);
    const safeNaturalWidth = Math.max(0.0001, naturalLineWidth);
    // Les colonnes doivent être normalisées sur la largeur naturelle de la ligne,
    // pas sur la largeur commune. Sinon, une ligne avec une seule case (ex. 92)
    // n'occupe qu'une partie de la largeur commune et laisse une zone blanche vide.
    const cols = widths.map(w => `${(w / safeNaturalWidth) * 100}%`).join(" ") || "1fr";

    host.style.setProperty("--cols", cols);
    host.style.setProperty("--lineWidth", `${Math.max(0, Math.min(100, lineWidth))}%`);
    selectedIds = selectedIds || new Set();
    const addIds = selectedAddIds();
    const moveIds = selectedMoveIds();
    for(const piece of pieces){
      const el = document.createElement("div");
      el.className = `piece ${piece.type}`;
      if(piece.removed) el.classList.add("removed");
      if(selectedIds.has(piece.id)) el.classList.add("selectedForDelete");
      if(addIds.has(piece.id)){
        el.classList.add("selectedForAdd");
      }
      if(moveIds.has(piece.id)){
        el.classList.add("selectedForMove");
      }

      const isSplatUnknown = piece.type === "x" && unknownDisplayKind() === "splat";
      const value = piece.type === "x" ? displayedUnknown() : String(piece.value);
      el.innerHTML = `
        <div class="pieceContent">
          <div class="pieceValue${isSplatUnknown ? ' splatValue' : ''}">${isSplatUnknown ? splatSvg() : value}</div>
        </div>
      `;

      el.addEventListener("click", () => {
        if(piece.removed) return;

        if(actionMode === "decompose"){
          if(piece.type === "number"){
            openDecomposeDialog(side, piece.id);
          }else{
            setStatus(`En mode Décomposer, clique sur un nombre.`);
          }
          return;
        }

        if(actionMode === "add"){
          selectForAdd(side, piece.id);
          return;
        }

        if(actionMode === "share"){
          if(piece.type !== "number"){
            setStatus(`En mode Partager, clique sur un nombre à couper en parts égales.`);
            return;
          }
          openShareDialog(side, piece.id);
          return;
        }

        if(actionMode === "move"){
          selectForMove(side, piece.id);
          return;
        }

        if(actionMode === "delete"){
          selectForDeletion(side, piece.id);
          return;
        }
      });

      host.appendChild(el);
    }
  }

  function setInstruction(htmlText){
    if(!instructionZone) return;
    instructionZone.innerHTML = htmlText || "";
  }

          setInstruction(`Sélectionne la même quantité des deux côtés.`);
        }else{
          setInstruction("Sélectionne la même quantité des deux côtés.");

        btn.className = "ghost";

        btn.addEventListener("click", () => {
          deleteSelection = [];
          render();

      if(info.ok){
        setInstruction(`Même quantité sélectionnée :&nbsp;<strong>${info.label}</strong>.`);

  function message(html){
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = html;
    return div;
  }

  function splitEquation(eq){
    const parts = String(eq).split("=");
    if(parts.length < 2) return {lhs:String(eq), rhs:""};
    return {lhs:parts[0].trim(), rhs:parts.slice(1).join("=").trim()};
  }

  function renderEquationHistory(){
    if(!equationHistory) return;
    if(!equationDisplayEnabled()){
      equationHistory.innerHTML = "";
      syncEquationToggleButton();
      return;
    }
    const steps = state.steps || [];

    if(!steps.length){
      equationHistory.innerHTML = "";
      syncEquationToggleButton();
      return;
    }

    const rows = steps.map((eq, i) => {
      const {lhs, rhs} = splitEquation(eq);
      const cls = i === steps.length - 1 ? "currentStep" : "historyStep";
      return `<tr class="${cls}"><td class="lhs">${lhs}</td><td class="eq">=</td><td class="rhs">${rhs}</td></tr>`;
    }).join("");

    equationHistory.innerHTML = `<table class="equationTable" aria-label="Étapes de résolution"><tbody>${rows}</tbody></table>`;
    equationHistory.scrollTop = equationHistory.scrollHeight;
    syncEquationToggleButton();
  }

  function syncFullscreenSizeMode(){
    if(!stageEl) return;
    // Version import : le plein écran est toujours compact.
    stageEl.classList.add("fullscreenCompact");
  }

  function render(){
    syncFullscreenSizeMode();
    if(!state) return;
    const selectedIds = selectedDeleteIds();
    equationText.textContent = "";
    renderEquationHistory();
    const widthPieces = side => shouldKeepRemovedPieces() ? state[side] : activePieces(side);
    const topWidth = widthPieces("top").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const bottomWidth = widthPieces("bottom").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const commonWidth = Math.max(topWidth, bottomWidth);
    renderLine("top", topLine, selectedIds, commonWidth);
    renderLine("bottom", bottomLine, selectedIds, commonWidth);
    renderActions();
  }

  function getOppositeSide(side){
    return side === "top" ? "bottom" : "top";
  }

  function countActiveX(side){
    return activePieces(side).filter(p => p.type === "x").length;
  }

  function shuffleArray(arr){
    for(let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getPossibleShareCounts(value, side){
    const maxParts = 12;
    const out = [];

    // Choix pédagogique prioritaire : si le nombre est en face de 5 lettres,
    // on propose d'abord 5 parts, car c'est l'action attendue.
    const oppositeX = countActiveX(getOppositeSide(side));
    if(oppositeX >= 2 && oppositeX <= maxParts && value % oppositeX === 0){
      out.push(oppositeX);
    }

    // Puis on ajoute les autres diviseurs raisonnables.
    for(let n=2; n<=maxParts; n++){
      if(value % n === 0 && !out.includes(n)){
        out.push(n);
      }
    }
    return out;
  }

  function openShareDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number" || piece.removed) return;

    const choices = shuffleArray(getPossibleShareCounts(piece.value, side));
    selectedShareRef = {side, id, value:piece.value};

    if(shareDialogText){
      shareDialogText.innerHTML = `Tu vas partager&nbsp;<strong>${piece.value}</strong>&nbsp;en parts égales.`;
    }
    if(shareChoices){
      shareChoices.innerHTML = "";
      shareChoices.classList.add("open");
      if(choices.length === 0){
        const div = document.createElement("div");
        div.className = "message";
        div.textContent = "Aucun partage entier n’est possible pour ce nombre.";
        shareChoices.appendChild(div);
      }else{
        for(const n of choices){
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.type = "button";
          chip.textContent = `${n} parts de ${piece.value / n}`;
          chip.addEventListener("click", () => applyShareChoice(n));
          shareChoices.appendChild(chip);
        }
      }
    }
    if(shareDialog) shareDialog.showModal();
  }

  function applyShareChoice(count){
    if(!selectedShareRef) return;
    const arr = state[selectedShareRef.side];
    const idx = arr.findIndex(p => p.id === selectedShareRef.id);
    if(idx < 0) return;

    const value = selectedShareRef.value;
    if(value % count !== 0){
      setStatus("Ce partage ne donne pas des parts entières.");
      return;
    }

    pushHistory();
    const part = value / count;
    arr.splice(idx, 1, ...Array.from({length:count}, () => makeNumber(part)));
    selectedShareRef = null;
    if(shareDialog) shareDialog.close();
    recordEquationStep();
    render();
    setStatus("Nombre partagé en parts égales", true);
  }

  function buildAddSuggestions(info){
    const correct = info.sum;
    const distractors = [
      correct + 1,
      Math.max(1, correct - 1),
      correct + 10,
      Math.max(1, correct - 10),
      correct * 2
    ].filter((value, index, arr) => Number.isFinite(value) && value > 0 && value !== correct && arr.indexOf(value) === index);

    // La bonne réponse doit toujours être présente dans l'aide.
    const selected = [correct, ...shuffle(distractors).slice(0, 3)];
    return shuffle(selected);
  }

  function renderAddSuggestions(info){
    if(!addSuggestions) return;
    addSuggestions.innerHTML = "";
    addSuggestions.classList.remove("open");
    if(btnShowAddSuggestions){
      btnShowAddSuggestions.style.display = "inline-flex";
      btnShowAddSuggestions.innerHTML = "Aide&nbsp;?";
    }

    for(const value of buildAddSuggestions(info)){
      const chip = document.createElement("button");
      chip.className = "chip mathChip";
      chip.type = "button";
      chip.dataset.value = String(value);
      chip.textContent = String(value);
      chip.addEventListener("click", () => {
        addInput.value = chip.dataset.value || String(value);
        addInput.focus();
      });
      addSuggestions.appendChild(chip);
    }
  }

  function openAddDialog(){
    const info = additionGroupInfo();
    if(!info.ok){
      render();
      return;
    }

    pendingAddInfo = info;
    if(addDialogText){
      addDialogText.innerHTML = `Tu vas regrouper&nbsp;<strong>${info.expr}</strong>.`;
    }
    if(addInput) addInput.value = "";
    renderAddSuggestions(info);
    if(addDialog) addDialog.showModal();
    setTimeout(() => addInput && addInput.focus(), 80);
  }

  function applyAdd(){
    if(!pendingAddInfo) return;
    const value = Number(String(addInput ? addInput.value : "").trim().replace(/,/g,"."));
    if(!Number.isFinite(value) || value !== pendingAddInfo.sum){
      setStatus("La somme proposée ne correspond pas aux nombres sélectionnés.");
      return;
    }

    pushHistory();
    const arr = state[pendingAddInfo.side];
    const ids = new Set(pendingAddInfo.pieces.map(p => p.id));
    const indexes = arr.map((p, index) => ids.has(p.id) ? index : -1).filter(index => index >= 0);
    const firstIndex = Math.min(...indexes);
    const replacement = makeNumber(pendingAddInfo.sum);
    const next = [];

    for(let i = 0; i < arr.length; i++){
      if(i === firstIndex) next.push(replacement);
      if(!ids.has(arr[i].id)) next.push(arr[i]);
    }

    state[pendingAddInfo.side] = next;
    addSelection = [];
    pendingAddInfo = null;
    if(addDialog) addDialog.close();
    recordEquationStep();
    render();
    setStatus("Nombres regroupés", true);
  }

  function openDecomposeDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number") return;

    selectedPieceRef = {side,id,value:piece.value};
    dialogText.innerHTML = `Remplace <strong>${piece.value}</strong> par une somme équivalente.`;
    decomposeInput.value = "";
    presetChips.innerHTML = "";
    presetChips.classList.remove("open");
    if(btnShowSuggestions){ btnShowSuggestions.style.display = "inline-flex"; btnShowSuggestions.innerHTML = "Aide&nbsp;?"; }

    const suggestions = buildSuggestions(piece.value);
    for(const s of suggestions){
      const chip = document.createElement("button");
      chip.className = "chip mathChip";
      chip.type = "button";
      chip.dataset.value = s;
      chip.innerHTML = formatSuggestionLabel(s);
      chip.addEventListener("click", () => {
        decomposeInput.value = chip.dataset.value || s;
        decomposeInput.focus();
      });
      presetChips.appendChild(chip);
    }

    if(divideBlock) divideBlock.style.display = "none";

    dialog.showModal();
    setTimeout(() => decomposeInput.focus(), 80);
  }

  function formatSuggestionLabel(raw){
    const safe = String(raw || "").replace(/[^0-9+\s]/g, "");
    return safe.replace(/\s*\+\s*/g, '<span class="mathPlus">+</span>');
  }

  function splitAsSum(value, parts){
    const each = value / parts;
    return Array.from({length:parts}, () => String(each)).join(" + ");
  }

  function buildDivideButtons(value){
    divideButtons.innerHTML = "";
    const divisors = [];
    for(let k=2; k<=8; k++){
      if(value % k === 0) divisors.push(k);
    }

    // On met en premier le partage qui correspond au nombre d'inconnues restantes,
    // s'il existe, parce que c'est souvent l'action utile en fin de résolution.
    const topX = activePieces("top").filter(p => p.type === "x").length;
    const bottomX = activePieces("bottom").filter(p => p.type === "x").length;
    const usefulK = Math.max(topX, bottomX);
    divisors.sort((a,b) => (a === usefulK ? -1 : b === usefulK ? 1 : a-b));

    for(const k of divisors.slice(0,5)){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ghost";
      btn.textContent = `Diviser en ${k}`;
      btn.addEventListener("click", () => {
        decomposeInput.value = splitAsSum(value, k);
        applyDecompose();
      });
      divideButtons.appendChild(btn);
    }

    divideBlock.style.display = divisors.length ? "block" : "none";
  }

  function buildSuggestions(value){
    const b = state.original.b;
    const a = state.original.a;
    const x = state.original.x;
    const suggestions = [];

    // Proposition vraiment utile : faire apparaître la constante à supprimer.
    // Toutes les propositions affichées doivent rester des décompositions valides
    // du nombre choisi : aucun bouton ne doit sembler « cassé ».
    if(b > 0 && value > b){
      const useful = value - b;
      suggestions.push(`${useful} + ${b}`);
    }

    // Autres propositions équivalentes, mais pas forcément optimales.
    const candidates = [];
    for(let left=1; left<=value-1; left++){
      const right = value - left;
      if(left === right) candidates.push(`${left} + ${right}`);
      if(left === 10 || right === 10) candidates.push(`${left} + ${right}`);
      if(left === x || right === x) candidates.push(`${left} + ${right}`);
      if(left === a || right === a) candidates.push(`${left} + ${right}`);
    }

    // Quelques découpages simples, toujours valides, pour garantir plusieurs choix si possible.
    const simpleSplits = [
      [1, value-1],
      [2, value-2],
      [Math.floor(value/2), value-Math.floor(value/2)],
      [Math.max(1, value-5), value-Math.max(1, value-5)],
      [Math.max(1, value-10), value-Math.max(1, value-10)]
    ];
    for(const [u,v] of simpleSplits){
      if(u > 0 && v > 0 && u + v === value) candidates.push(`${u} + ${v}`);
    }

    for(const c of shuffleUnique(candidates)){
      if(!suggestions.includes(c)) suggestions.push(c);
      if(suggestions.length >= 4) break;
    }

    return shuffle(suggestions.slice(0,4));
  }

  function shuffleUnique(arr){
    return shuffle([...new Set(arr)]);
  }

  function shuffle(arr){
    const out = arr.slice();
    for(let i=out.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  function parseSum(raw){
    const cleaned = String(raw || "").replace(/\s+/g,"");
    if(!cleaned) return null;
    if(!/^\d+(\+\d+)*$/.test(cleaned)) return null;
    const parts = cleaned.split("+").map(Number);
    if(parts.some(n => !Number.isFinite(n) || n <= 0)) return null;
    return parts;
  }

  function applyDecompose(){
    if(!selectedPieceRef) return;
    const parts = parseSum(decomposeInput.value);
    if(!parts){
      setStatus("Décomposition invalide");
      return;
    }

    const total = parts.reduce((a,b)=>a+b,0);
    if(total !== selectedPieceRef.value){
      setStatus(`Attention : la somme doit faire ${selectedPieceRef.value}`);
      return;
    }

    const arr = state[selectedPieceRef.side];
    const idx = arr.findIndex(p => p.id === selectedPieceRef.id);
    if(idx < 0) return;

    pushHistory();
    arr.splice(idx, 1, ...parts.map(makeNumber));
    recordEquationStep();
    selectedPieceRef = null;
    dialog.close();
    render();
    setStatus("Nombre décomposé", true);
  }

  function undo(){
    if(history.length === 0){
      setStatus("Rien à annuler");
      return;
    }
    state = history.pop();
    selectedPieceRef = null;
    selectedShareRef = null;
    pendingAddInfo = null;
    deleteSelection = [];
    addSelection = [];
    render();
    setStatus("Étape annulée");
  }

  function restartImportedEquation(){
    if(!initialImportState){
      setStatus("Aucun tableau importé à recommencer");
      return;
    }

    if(toolDecompose) toolDecompose.classList.add("active");

  /* CONSTRUCTEUR D'ÉQUATION V1.4
     Objectif : écrire directement une équation additive à entiers positifs,
     puis construire le tableau dans la même page.
     Règle validée : on respecte l'ordre tapé par le professeur. */
  function setBuildError(text){
    if(!buildError) return;
    buildError.textContent = text || "";
    buildError.classList.toggle("show", Boolean(text));
  }

  function normalizeMathLetters(str){
    const map = {
      "𝑎":"a", "𝑏":"b", "𝑐":"c", "𝑑":"d", "𝑒":"e", "𝑓":"f", "𝑔":"g", "ℎ":"h", "𝑖":"i", "𝑗":"j", "𝑘":"k", "𝑙":"l", "𝑚":"m",
      "𝑛":"n", "𝑜":"o", "𝑝":"p", "𝑞":"q", "𝑟":"r", "𝑠":"s", "𝑡":"t", "𝑢":"u", "𝑣":"v", "𝑤":"w", "𝑥":"x", "𝑦":"y", "𝑧":"z",
      "𝐴":"a", "𝐵":"b", "𝐶":"c", "𝐷":"d", "𝐸":"e", "𝐹":"f", "𝐺":"g", "𝐻":"h", "𝐼":"i", "𝐽":"j", "𝐾":"k", "𝐿":"l", "𝑀":"m",
      "𝑁":"n", "𝑂":"o", "𝑃":"p", "𝑄":"q", "𝑅":"r", "𝑆":"s", "𝑇":"t", "𝑈":"u", "𝑉":"v", "𝑊":"w", "𝑋":"x", "𝑌":"y", "𝑍":"z"
    };
    return String(str || "").replace(/[𝑎𝑏𝑐𝑑𝑒𝑓𝑔ℎ𝑖𝑗𝑘𝑙𝑚𝑛𝑜𝑝𝑞𝑟𝑠𝑡𝑢𝑣𝑤𝑥𝑦𝑧𝐴𝐵𝐶𝐷𝐸𝐹𝐺𝐻𝐼𝐽𝐾𝐿𝑀𝑁𝑂𝑃𝑄𝑅𝑆𝑇𝑈𝑉𝑊𝑋𝑌𝑍]/g, ch => map[ch] || ch);
  }

  function toMathItalicLetter(letter){
    const map = {
      a:"𝑎", b:"𝑏", c:"𝑐", d:"𝑑", e:"𝑒", f:"𝑓", g:"𝑔", h:"ℎ", i:"𝑖", j:"𝑗", k:"𝑘", l:"𝑙", m:"𝑚",
      n:"𝑛", o:"𝑜", p:"𝑝", q:"𝑞", r:"𝑟", s:"𝑠", t:"𝑡", u:"𝑢", v:"𝑣", w:"𝑤", x:"𝑥", y:"𝑦", z:"𝑧"
    };
    const ch = String(letter || "").trim().toLowerCase();
    return map[ch] || String(letter || "𝑥");
  }

  function parseEquationTerm(term, sideName, ctx){
    const t = String(term || "").trim();
    if(!t){
      throw new Error(`Il manque un terme dans le membre ${sideName}.`);
    }

    if(/^\d+$/.test(t)){
      const n = Number(t);
      if(!Number.isSafeInteger(n) || n <= 0){
        throw new Error("Les nombres doivent être des entiers strictement positifs.");
      }
      return {kind:"number", value:n, coef:0, constant:n};
    }

    let match = t.match(/^(\d+)?([a-zA-Z])$/);
    if(!match){
      match = t.match(/^(\d+)(?:\*|×)([a-zA-Z])$/);
    }
    if(!match){
      match = t.match(/^([a-zA-Z])(?:\*|×)(\d+)$/);
      if(match){
        match = [match[0], match[2], match[1]];
      }
    }

    if(match){
      const coef = match[1] ? Number(match[1]) : 1;
      const letter = String(match[2]).toLowerCase();
      if(!Number.isSafeInteger(coef) || coef <= 0){
        throw new Error("Les coefficients devant la lettre doivent être des entiers strictement positifs.");
      }
      if(!ctx.variable){
        ctx.variable = letter;
      }else if(ctx.variable !== letter){
        throw new Error(`Une seule lettre est acceptée. Ici, il y a ${ctx.variable} et ${letter}.`);
      }
      return {kind:"x", value:letter, coef, constant:0};
    }

    throw new Error(`Je ne sais pas lire le terme « ${t} ». Pour l’instant : nombres, x, 2x ou 2*x.`);
  }

  function parseEquationSide(rawSide, sideName, ctx){
    const raw = String(rawSide || "").trim();
    if(!raw){
      throw new Error(`Le membre ${sideName} est vide.`);
    }
    const compact = normalizeMathLetters(raw)
      .replace(/\s+/g, "")
      .replace(/[·]/g, "*")
      .replace(/[X]/g, "x");

    if(!compact){
      throw new Error(`Le membre ${sideName} est vide.`);
    }

    const terms = compact.split("+");
    const pieces = [];
    let coef = 0;
    let constant = 0;

    for(const rawTerm of terms){
      const term = parseEquationTerm(rawTerm, sideName, ctx);
      coef += term.coef;
      constant += term.constant;
      if(term.kind === "number"){
        pieces.push({type:"number", value:term.value});
      }else{
        for(let i=0; i<term.coef; i++) pieces.push({type:"x"});
      }
    }

    return {pieces, coef, constant};
  }

  function parseEquationToPayload(rawEquation){
    const original = String(rawEquation || "").trim();
    if(!original){
      throw new Error("Écris une équation à construire.");
    }

    if(/[\-–—−]/.test(original)){
      throw new Error("Pour cette première version, les soustractions et les nombres négatifs ne sont pas encore acceptés.");
    }
    if(/[()\[\]{}]/.test(original)){
      throw new Error("Les parenthèses ne sont pas encore acceptées dans cette version.");
    }
    if(/[\/]/.test(original)){
      throw new Error("Les fractions ne sont pas encore acceptées dans cette version.");
    }
    if(/[.,;]/.test(original)){
      throw new Error("Les décimaux ne sont pas acceptés ici : utilise seulement des entiers positifs.");
    }

    const normalized = normalizeMathLetters(original).replace(/=/g, "=");
    if(!/^[0-9a-zA-Z+*=×·\s]+$/.test(normalized)){
      throw new Error("Caractère non reconnu. Utilise seulement des nombres, une lettre, + et =.");
    }

    const sides = normalized.split("=");
    if(sides.length !== 2){
      throw new Error("Il faut exactement un signe égal.");
    }

    const ctx = {variable:null};
    const left = parseEquationSide(sides[0], "de gauche", ctx);
    const right = parseEquationSide(sides[1], "de droite", ctx);

    if(!ctx.variable){
      throw new Error("Il faut une inconnue : par exemple x, n ou a.");
    }

    const denom = left.coef - right.coef;
    const numerator = right.constant - left.constant;
    if(denom === 0){
      throw new Error("Cette équation ne permet pas d’obtenir une solution unique avec ce modèle.");
    }

    const solution = numerator / denom;
    if(!Number.isFinite(solution) || !Number.isInteger(solution) || solution <= 0){
      throw new Error("La solution doit être un entier strictement positif pour être représentée correctement en barres.");
    }

    const leftMeasure = left.coef * solution + left.constant;
    const rightMeasure = right.coef * solution + right.constant;
    if(leftMeasure <= 0 || rightMeasure <= 0 || leftMeasure !== rightMeasure){
      throw new Error("Impossible de construire un tableau cohérent avec cette équation.");
    }

    const displayChoice = unknownDisplayInput ? unknownDisplayInput.value : "letter";
    const unknownDisplay = (displayChoice === "question" || displayChoice === "splat") ? displayChoice : "letter";

    return {
      source:"equabarre-builder-v1",
      variable:toMathItalicLetter(ctx.variable),
      unknownDisplay,
      x:solution,
      c:leftMeasure,
      lhsSide:"bottom",
      bottom:left.pieces,
      top:right.pieces
    };
  }

  function encodeBase64Url(str){
    const bytes = new TextEncoder().encode(String(str || ""));
    let binary = "";
    for(const b of bytes) binary += String.fromCharCode(b);
    return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function randomInt(min, max){
    return min + Math.floor(Math.random() * (max - min + 1));
  }

  function splitPositiveConstant(n){
    if(n <= 9 || Math.random() < 0.45) return [n];
    const a = randomInt(1, n - 1);
    return [a, n - a];
  }

  function shuffleTerms(terms){
    const arr = terms.slice();
    for(let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function coefTerm(coef, variable){
    return coef === 1 ? variable : `${coef}${variable}`;
  }

  function makeRandomEquationText(){
    const letters = ["x", "n", "a", "t", "m"];
    for(let tries=0; tries<200; tries++){
      const variable = letters[randomInt(0, letters.length - 1)];
      const solution = randomInt(2, 12);
      const leftCoef = randomInt(1, 5);
      let rightCoef = randomInt(1, 5);
      if(rightCoef === leftCoef) rightCoef = rightCoef === 5 ? 4 : rightCoef + 1;

      const leftConst = randomInt(2, 24);
      const rightConst = leftCoef * solution + leftConst - rightCoef * solution;
      if(!Number.isSafeInteger(rightConst) || rightConst <= 0 || rightConst > 32) continue;

      const leftTerms = [coefTerm(leftCoef, variable), ...splitPositiveConstant(leftConst).map(String)];
      const rightTerms = [coefTerm(rightCoef, variable), ...splitPositiveConstant(rightConst).map(String)];
      return `${shuffleTerms(leftTerms).join(" + ")} = ${shuffleTerms(rightTerms).join(" + ")}`;
    }
    return "2x + 7 = 15";
  }

  /* IMPORT SPLAT -> ÉQUABARRE
     Cette version peut recevoir un tableau réduit dans l'URL.
     Format conseillé, encodé en base64url dans ?data=... ou #data=... :
     {
       "source":"splat",
       "variable":"𝑥",
       "unknownDisplay":"letter", // "letter", "question" ou "splat"
       "fullscreenSize":"compact",
       "x":20,
       "top":[{"type":"number","value":50}],
       "bottom":[{"type":"x"},{"type":"x"},{"type":"number","value":10}]
     }
  */
  function decodeBase64Url(str){
    const clean = String(str || "").trim().replace(/-/g, "+").replace(/_/g, "/");
    const pad = clean.length % 4 ? "=".repeat(4 - (clean.length % 4)) : "";
    return decodeURIComponent(escape(atob(clean + pad)));
  }

  function readImportRawPayload(){
    const search = new URLSearchParams(window.location.search || "");
    if(search.has("data")) return search.get("data");
    if(search.has("eqb")) return search.get("eqb");

    const hash = String(window.location.hash || "").replace(/^#/, "");
    if(!hash) return "";
    const hashParams = new URLSearchParams(hash);
    if(hashParams.has("data")) return hashParams.get("data");
    if(hashParams.has("eqb")) return hashParams.get("eqb");
    return hash;
  }

  function parseImportedPayload(){
    const raw = readImportRawPayload();
    if(!raw) return null;

    const candidates = [];
    try{ candidates.push(decodeURIComponent(raw)); }catch(e){}
    try{ candidates.push(decodeBase64Url(raw)); }catch(e){}
    candidates.push(raw);

    for(const candidate of candidates){
      try{
        const parsed = JSON.parse(candidate);
        if(parsed && typeof parsed === "object") return parsed;
      }catch(e){}
    }
    return null;
  }

  function normalizeImportedPiece(piece){
    if(piece == null) return null;
    if(typeof piece === "number") return makeNumber(piece);
    if(typeof piece === "string"){
      const s = piece.trim().toLowerCase();
      if(s === "x" || s === "𝑥" || s === "?") return makeX();
      const n = Number(s.replace(",", "."));
      return Number.isFinite(n) ? makeNumber(n) : null;
    }
    if(typeof piece === "object"){
      const type = String(piece.type || "").toLowerCase();
      if(type === "x" || type === "unknown" || type === "variable") return makeX();
      if(type === "number" || type === "const" || type === "constant"){
        const n = Number(piece.value);
        return Number.isFinite(n) ? makeNumber(n) : null;
      }
    }
    return null;
  }

  function normalizeImportedSide(arr){
    if(!Array.isArray(arr)) return [];
    return arr.map(normalizeImportedPiece).filter(Boolean);
  }

  function importedSideMeasure(pieces, xValue){
    return pieces.reduce((sum, p) => {
      if(p.type === "x") return sum + Math.max(1, Number(xValue) || 1);
      return sum + Math.max(1, Math.abs(Number(p.value) || 0));
    }, 0);
  }

  function inferImportedX(topPieces, bottomPieces){
    const countX = side => side.filter(p => p.type === "x").length;
    const sumN = side => side.filter(p => p.type === "number").reduce((s,p)=>s + Number(p.value || 0), 0);
    const aTop = countX(topPieces);
    const aBottom = countX(bottomPieces);
    const nTop = sumN(topPieces);
    const nBottom = sumN(bottomPieces);
    const denom = aBottom - aTop;
    if(denom !== 0){
      const x = (nTop - nBottom) / denom;
      if(Number.isFinite(x) && x > 0) return x;
    }
    return 1;
  }

  function createImportedEquationState(payload){
    if(!payload || typeof payload !== "object") return false;

    const rawWantedVar = typeof payload.variable === "string" && payload.variable.trim() ? payload.variable.trim() : "𝑥";
    const normalizedWantedVar = normalizeMathLetters(rawWantedVar);
    const wantedVar = /^[a-zA-Z]$/.test(normalizedWantedVar) ? toMathItalicLetter(normalizedWantedVar) : rawWantedVar;
    const rawDisplay = String(payload.unknownDisplay || payload.display || "letter").toLowerCase();
    const wantedDisplay = (rawDisplay === "question" || rawDisplay === "?" || rawDisplay === "interrogation")
      ? "question"
      : (rawDisplay === "splat" ? "splat" : "letter");

    state = {
      original:{
        mode:"import",
        modeLabel:"Import Splat",
        a:0,
        b:0,
        rightA:0,
        d:0,
        x:1,
        c:1,
        varChar:wantedVar,
        lhsSide:"bottom"
      },
      top:[],
      bottom:[],
      hintCount:0,
      steps:[]
    };

    const rawLhsSide = String(payload.lhsSide || payload.equationLhsSide || "").toLowerCase();
    const wantedLhsSide = (rawLhsSide === "top" || rawLhsSide === "haut")
      ? "top"
      : ((rawLhsSide === "bottom" || rawLhsSide === "bas") ? "bottom" : "bottom");

    const topPieces = normalizeImportedSide(payload.top || payload.haut || []);
    const bottomPieces = normalizeImportedSide(payload.bottom || payload.bas || []);
    if(!topPieces.length || !bottomPieces.length){
      state = null;
      return false;
    }

    const importedX = Number(payload.x);
    const xValue = Number.isFinite(importedX) && importedX > 0 ? importedX : inferImportedX(topPieces, bottomPieces);
    const totalMeasure = Math.max(
      importedSideMeasure(topPieces, xValue),
      importedSideMeasure(bottomPieces, xValue),
      Number(payload.total) || 0,
      Number(payload.c) || 0,
      1
    );

    state.original.x = xValue;
    state.original.lhsSide = wantedLhsSide;
    state.original.c = totalMeasure;
    state.original.a = bottomPieces.filter(p => p.type === "x").length;
    state.original.b = bottomPieces.filter(p => p.type === "number").reduce((s,p)=>s + Number(p.value || 0), 0);
    state.original.rightA = topPieces.filter(p => p.type === "x").length;
    state.original.d = topPieces.filter(p => p.type === "number").reduce((s,p)=>s + Number(p.value || 0), 0);
    state.top = topPieces;
    state.bottom = bottomPieces;

    importedUnknownDisplayMode = wantedDisplay;
    if(unknownDisplayInput) unknownDisplayInput.value = wantedDisplay;
    if(stageEl) stageEl.classList.remove("emptyState");
    setBuilderLayout("active");

    recordEquationStep();
    initialImportState = clone(state);
    history = [];
    selectedPieceRef = null;
    selectedShareRef = null;
    pendingAddInfo = null;
    deleteSelection = [];
    addSelection = [];
    moveSelection = null;
    actionMode = "decompose";
    if(toolDecompose) toolDecompose.classList.add("active");
    if(toolAdd) toolAdd.classList.remove("active");
    if(toolShare) toolShare.classList.remove("active");
    if(toolMove) toolMove.classList.remove("active");
    if(toolDelete) toolDelete.classList.remove("active");

    render();
    setInstruction("");
    setStatus("Tableau prêt", true);
    return true;
  }

  function tryImportFromUrl(){
    const payload = parseImportedPayload();
    if(!payload) return false;
    const ok = createImportedEquationState(payload);
    if(!ok){
      setInstruction(`<strong>Impossible de lire le tableau importé.</strong>`);
      setStatus("Import invalide");
    }
    return ok;
  }


  if(!tryImportFromUrl()){
    setBuilderLayout("start");
    if(stageEl) stageEl.classList.add("emptyState");
    setInstruction("<strong>Écris une équation à gauche, puis construis le tableau.</strong>");
