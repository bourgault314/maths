<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Équabarre — schémas en barres</title>
<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d8dee9;
    --blue:#3b82f6;
    --blue-soft:#dbeafe;
    --green:#16a34a;
    --green-soft:#dcfce7;
    --orange:#f97316;
    --orange-soft:#ffedd5;
    --red:#ef4444;
    --shadow:0 18px 50px rgba(15,23,42,.10);
    --radius:22px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.13), transparent 34rem),
      radial-gradient(circle at bottom right, rgba(22,163,74,.10), transparent 34rem),
      var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }

  header{
    padding:22px clamp(16px,3vw,36px) 12px;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:16px;
    flex-wrap:wrap;
    text-align:center;
  }

  .titleBlock h1{
    margin:0;
    font-size:clamp(30px,4vw,52px);
    line-height:.95;
    letter-spacing:-.06em;
    font-weight:950;
  }

  .titleBlock .subtitle{
    margin-top:8px;
    color:var(--muted);
    font-size:16px;
    font-weight:600;
  }

  .badge{
    display:none;
    align-items:center;
    gap:8px;
    padding:8px 12px;
    border:1px solid rgba(59,130,246,.20);
    background:rgba(255,255,255,.72);
    border-radius:999px;
    color:#1d4ed8;
    font-size:13px;
    font-weight:800;
    box-shadow:0 8px 24px rgba(15,23,42,.06);
  }

  main{
    width:min(1240px, calc(100vw - 28px));
    margin:18px auto 32px;
    display:grid;
    grid-template-columns:310px minmax(0,1fr);
    gap:18px;
    align-items:start;
  }

  
  /* PATCH 34 — historique d'équations : vrais alignements communs */
  .equationHistory{
    width:min(880px,100%);
    margin:8px auto 0;
    font-size:clamp(24px,2.6vw,38px);
    font-weight:950;
    line-height:1.18;
    display:grid;
    grid-template-columns:max-content 1.5ch max-content;
    column-gap:14px;
    justify-content:center;
    align-items:baseline;
  }

  .stepRow{
    display:contents;
  }

  .lhs{
    grid-column:1;
    text-align:right;
    white-space:nowrap;
  }

  .eq{
    grid-column:2;
    text-align:center;
    color:#64748b;
    white-space:nowrap;
  }

  .rhs{
    grid-column:3;
    text-align:left;
    white-space:nowrap;
  }

@media (max-width:900px){
    main{grid-template-columns:1fr}
  }

  .panel,.stage{
    background:rgba(255,255,255,.88);
    border:1px solid rgba(15,23,42,.08);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }

  .panel{
    padding:16px;
    position:sticky;
    top:14px;
  }

  .appTitle{
    text-align:center;
    font-size:34px;
    line-height:1;
    letter-spacing:-.055em;
    font-weight:950;
    margin:2px 0 16px;
  }

  .fullscreenBtn{
    position:absolute;
    top:14px;
    right:14px;
    width:42px;
    height:42px;
    padding:0;
    border-radius:14px;
    display:grid;
    place-items:center;
    font-size:18px;
    z-index:5;
  }

  .stage{
    position:relative;
  }

  .stage:fullscreen{
    background:var(--bg);
    border-radius:0;
    width:100vw;
    height:100vh;
    padding:22px;
    display:flex;
    flex-direction:column;
  }

  .stage:fullscreen .board{
    flex:1;
    min-height:0;
  }

  .stage:fullscreen .piece{
    height:128px;
  }

  .stage:fullscreen .barLine{
    min-height:128px;
  }

  @media (max-width:900px){
    .panel{position:static}
  }

  label{
    display:block;
    margin:12px 0 5px;
    font-size:12px;
    color:var(--muted);
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  .modeSwitch{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin:12px 0 14px;
  }

  .modeBtn{
    padding:10px 8px;
    border-radius:14px;
    border:1px solid rgba(15,23,42,.12);
    background:#f8fafc;
    color:#334155;
    font-weight:950;
  }

  .modeBtn.active{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:#fff;
    border-color:rgba(37,99,235,.30);
    box-shadow:0 10px 24px rgba(59,130,246,.16);
  }

  .studentPanel{
    display:none;
  }

  .studentPanel.open{
    display:block;
  }

  .profPanel.hidden{
    display:none;
  }

  .studentProgress{
    margin:10px 0 0;
    padding:10px 12px;
    border-radius:14px;
    background:#f8fafc;
    border:1px solid rgba(15,23,42,.08);
    color:#334155;
    font-size:14px;
    font-weight:850;
    text-align:center;
  }

  .studentProgress strong{
    font-weight:950;
  }

  .worldGrid{
    display:grid;
    grid-template-columns:1fr;
    gap:10px;
    margin:10px 0 12px;
  }

  .worldCard{
    position:relative;
    width:100%;
    text-align:left;
    padding:12px 12px;
    border-radius:18px;
    border:1px solid rgba(15,23,42,.12);
    background:linear-gradient(180deg,#ffffff,#f8fafc);
    color:#0f172a;
    box-shadow:0 8px 20px rgba(15,23,42,.06);
    cursor:pointer;
  }

  .worldCard:hover{
    filter:brightness(.99);
    transform:translateY(-1px);
  }

  .worldCard.active{
    border-color:rgba(59,130,246,.52);
    box-shadow:0 12px 26px rgba(59,130,246,.14);
    background:linear-gradient(180deg,#eff6ff,#ffffff);
  }

  .worldCard.done{
    border-color:rgba(22,163,74,.42);
    background:linear-gradient(180deg,#dcfce7,#ffffff);
  }

  .worldTop{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:4px;
  }

  .worldName{
    font-size:15px;
    font-weight:950;
    letter-spacing:-.02em;
  }

  .worldBadge{
    flex:0 0 auto;
    min-width:30px;
    height:30px;
    padding:0 8px;
    display:inline-grid;
    place-items:center;
    border-radius:999px;
    background:#e2e8f0;
    color:#334155;
    font-size:13px;
    font-weight:950;
  }

  .worldCard.done .worldBadge{
    background:#16a34a;
    color:#fff;
  }

  .worldExample{
    font-size:13px;
    color:#64748b;
    font-weight:850;
  }

  .worldCard.done::after{
    content:"✓";
    position:absolute;
    right:12px;
    bottom:9px;
    width:24px;
    height:24px;
    border-radius:999px;
    display:grid;
    place-items:center;
    background:#16a34a;
    color:white;
    font-weight:950;
    font-size:15px;
  }

  input,select{
    width:100%;
    border:1px solid rgba(15,23,42,.14);
    border-radius:14px;
    padding:11px 12px;
    background:white;
    color:var(--ink);
    font-size:15px;
    font-weight:700;
    outline:none;
  }

  input:focus,select:focus{
    border-color:rgba(59,130,246,.55);
    box-shadow:0 0 0 4px rgba(59,130,246,.12);
  }

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .btnrow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  button{
    border:none;
    border-radius:14px;
    padding:11px 13px;
    font-size:14px;
    font-weight:900;
    color:var(--ink);
    background:#eef2f7;
    cursor:pointer;
    transition:transform .08s ease, filter .12s ease, opacity .12s ease;
  }

  button:hover{filter:brightness(.98)}
  button:active{transform:translateY(1px)}
  button.primary{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:white;
  }
  button.green{
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
  }
  button.orange{
    background:linear-gradient(180deg,#fb923c,#f97316);
    color:white;
  }
  button.ghost{
    background:transparent;
    border:1px solid rgba(15,23,42,.12);
  }
  button:disabled{
    opacity:.42;
    cursor:not-allowed;
    transform:none;
  }

  .mini{
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
    margin-top:10px;
  }

  .stage{
    padding:16px;
    min-height:660px;
  }

  .stage{
    padding:16px;
    min-height:660px;
    position:relative;
  }

  .stageQuickActions{
    position:absolute;
    top:14px;
    right:14px;
    z-index:5;
    display:flex;
    gap:8px;
    align-items:center;
  }

  .stageStudentHud{
    position:absolute;
    top:14px;
    left:14px;
    z-index:5;
    display:none;
    align-items:center;
    gap:10px;
    padding:8px 10px;
    border-radius:16px;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.12);
    box-shadow:0 10px 24px rgba(15,23,42,.12);
    backdrop-filter:blur(8px);
    font-size:15px;
    font-weight:900;
    color:#334155;
  }

  .stageStudentHud.open{
    display:flex;
  }

  .studentWaitingStage{
    display:none;
    min-height:520px;
    border-radius:24px;
    border:1px dashed rgba(15,23,42,.18);
    background:rgba(255,255,255,.55);
    align-items:center;
    justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:32px;
  }

  .studentWaitingStage.open{
    display:flex;
  }

  .waitingTitle{
    font-size:clamp(34px,4vw,56px);
    font-weight:950;
    letter-spacing:-.05em;
    color:#0f172a;
  }

  .waitingText{
    margin-top:8px;
    font-size:17px;
    line-height:1.35;
    font-weight:750;
    color:#64748b;
  }

  .stageStudentHud strong{
    color:#0f172a;
    font-weight:950;
  }

  .stageNextBtn{
    padding:8px 10px;
    border-radius:12px;
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:#fff;
    font-size:13px;
    font-weight:950;
    display:none;
  }

  .stageNextBtn.show{
    display:inline-flex;
  }

  .quickBtn{
    width:44px;
    height:44px;
    padding:0;
    display:grid;
    place-items:center;
    border-radius:14px;
    font-size:23px;
    line-height:1;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.14);
    box-shadow:0 10px 24px rgba(15,23,42,.14);
    backdrop-filter:blur(8px);
  }

  .quickBtn:hover{
    background:#eef2f7;
  }

  .topbar{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    padding:4px 4px 18px;
    text-align:center;
  }

  .equationText{
    display:none;
  }

  .equationHistory{
    width:min(760px, 100%);
    display:grid;
    justify-content:center;
    gap:2px;
    color:#64748b;
    font-size:clamp(18px, 2vw, 26px);
    font-weight:900;
    line-height:1.15;
    font-variant-numeric:tabular-nums;
  }

  .equationHistory .stepRow{
    display:grid;
    grid-template-columns:minmax(80px, auto) 30px minmax(80px, auto);
    align-items:baseline;
    column-gap:8px;
    padding:1px 8px;
  }

  .equationHistory .lhs{
    text-align:right;
    white-space:nowrap;
  }

  .equationHistory .eq{
    text-align:center;
    color:#94a3b8;
    font-weight:950;
  }

  .equationHistory .rhs{
    text-align:left;
    white-space:nowrap;
  }

  .equationHistory .stepRow:last-child{
    color:#0f172a;
  }

  .equationHistory .stepRow:last-child .eq{
    color:#3b82f6;
  }


  .equationHistory{
    width:min(980px,100%);
    margin:6px auto 0;
    font-size:clamp(30px,3.2vw,46px);
    font-weight:950;
    line-height:1.18;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .stepRow{
    display:grid;
    grid-template-columns: var(--eqLeftW, 12ch) 1.4ch var(--eqRightW, 12ch);
    column-gap:16px;
    align-items:baseline;
    justify-content:center;
    width:max-content;
    max-width:100%;
  }

  .lhs{text-align:right;white-space:nowrap}
  .eq{text-align:center;color:#64748b;white-space:nowrap}
  .rhs{text-align:left;white-space:nowrap}

  .status{
    display:none;
    padding:8px 11px;
    border-radius:999px;
    background:#f1f5f9;
    color:#475569;
    font-size:13px;
    font-weight:850;
  }

  .status.good{
    background:var(--green-soft);
    color:#166534;
  }

  .instructionZone{
    margin:0 auto 12px;
    width:min(820px,100%);
    min-height:42px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#334155;
    font-size:15px;
    font-weight:750;
    line-height:1.35;
  }

  .instructionZone strong{
    font-weight:950;
  }

  .board{
    background:
      linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.36));
    border:1px solid rgba(15,23,42,.08);
    border-radius:24px;
    padding:34px clamp(18px,4vw,58px);
    min-height:475px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:0;
  }

  .sideRow{
    display:grid;
    grid-template-columns:minmax(0,1fr);
    gap:0;
    align-items:center;
  }

  .sideLabel{
    display:none;
    color:var(--muted);
    font-weight:950;
    text-align:right;
    font-size:16px;
  }

  .barLine{
    --table-border: rgba(15,23,42,.36);
    display:grid;
    grid-auto-flow:column;
    grid-template-columns:var(--cols, 1fr);
    align-items:stretch;
    justify-content:start;
    width:var(--lineWidth, 100%);
    min-height:104px;
    border-radius:0;
    position:relative;
    gap:0;
    background:#fff;
    box-sizing:border-box;
  }

  /* Construction façon vrai tableau :
     - la ligne du haut porte le contour haut + gauche + droite + trait central ;
     - la ligne du bas porte seulement gauche + droite + bas ;
     - pas de marge négative, donc pas de trait qui disparaît. */
  #topLine{
    border-top:2px solid var(--table-border);
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  #bottomLine{
    margin-top:0;
    border-left:2px solid var(--table-border);
    border-right:2px solid var(--table-border);
    border-bottom:2px solid var(--table-border);
  }

  .piece{
    min-width:0;
    width:100%;
    height:104px;
    border-radius:0;
    border:0;
    border-right:2px solid var(--table-border);
    display:grid;
    place-items:center;
    position:relative;
    overflow:hidden;
    user-select:none;
    cursor:pointer;
    transition:background .12s ease, filter .12s ease;
    box-sizing:border-box;
  }

  .piece:last-child{border-right:0;}

  .piece:hover{
    filter:brightness(.985);
  }

  .piece.number{
    background:linear-gradient(180deg,#fff,#f8fafc);
  }

  .piece.x{
    background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  }

  .piece.match{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.20) 0 8px, rgba(255,255,255,.54) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
  }

  .piece.selectedForDelete{
    background:
      repeating-linear-gradient(135deg, rgba(249,115,22,.22) 0 8px, rgba(255,255,255,.52) 8px 15px),
      linear-gradient(180deg,var(--orange-soft),#fff7ed);
    box-shadow: inset 0 0 0 3px rgba(249,115,22,.42);
  }

  .piece.removed{
    opacity:.26;
    background:
      repeating-linear-gradient(135deg, rgba(15,23,42,.30) 0 7px, rgba(255,255,255,.1) 7px 14px),
      #e5e7eb;
    pointer-events:none;
  }

  .pieceContent{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:0;
  }

  .pieceValue{
    font-size:clamp(28px,3.2vw,42px);
    font-weight:950;
    letter-spacing:-.04em;
  }

  .piece.x .pieceValue{
    font-family:Georgia, 'Times New Roman', serif;
    font-style:italic;
    color:#1d4ed8;
  }

  .pieceKind{
    display:none;
  }

  .equalSep{
    display:none;
    grid-template-columns:76px minmax(0,1fr);
    gap:16px;
    align-items:center;
    margin:-7px 0;
  }

  .equalSep .eqSign{
    text-align:right;
    color:#94a3b8;
    font-size:26px;
    font-weight:950;
  }

  .equalLine{
    height:2px;
    background:linear-gradient(90deg,rgba(15,23,42,.18),rgba(15,23,42,.04));
    border-radius:999px;
  }

  .actionZone{
    margin-top:8px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    min-height:52px;
  }

  .toolBar{
    margin:14px 0 4px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .toolBtn{
    border:1px solid rgba(15,23,42,.12);
    background:#f8fafc;
    color:#334155;
  }

  .toolBtn.active{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:#fff;
    border-color:rgba(37,99,235,.30);
    box-shadow:0 10px 24px rgba(59,130,246,.18);
  }

  .undoToolBtn{
    background:#fff7ed;
    border-color:rgba(249,115,22,.28);
    color:#9a3412;
  }

  .undoToolBtn:hover{
    background:#ffedd5;
  }

  .message{
    padding:12px 14px;
    border-radius:16px;
    background:#f8fafc;
    border:1px solid rgba(15,23,42,.08);
    color:#334155;
    font-size:14px;
    font-weight:700;
    line-height:1.35;
  }

  .message strong{font-weight:950}

  .solution{
    text-align:center;
    font-size:clamp(30px,4vw,54px);
    font-weight:950;
    letter-spacing:-.05em;
    margin-top:4px;
    color:#166534;
  }

  dialog{
    width:min(560px, calc(100vw - 28px));
    border:1px solid rgba(15,23,42,.10);
    border-radius:24px;
    padding:0;
    box-shadow:0 30px 100px rgba(15,23,42,.24);
  }

  dialog::backdrop{
    background:rgba(15,23,42,.35);
    backdrop-filter:blur(4px);
  }

  .dialogInner{
    padding:30px 34px 28px;
    text-align:center;
  }

  .dialogTitle{
    font-size:30px;
    font-weight:950;
    letter-spacing:-.04em;
    margin:0 0 10px;
    text-align:center;
  }

  .dialogText{
    color:var(--muted);
    font-size:18px;
    font-weight:700;
    line-height:1.42;
    margin-bottom:18px;
    text-align:center;
  }

  dialog label{
    text-align:center;
    margin-top:0;
    font-size:13px;
  }

  #decomposeInput{
    text-align:center;
    font-size:26px;
    font-weight:950;
    padding:16px 14px;
    margin-top:8px;
  }

  .presetChips{
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    gap:8px;
    margin:12px 0 16px;
  }

  .presetChips.open{
    display:flex;
  }

  .helpMiniBtn{
    width:38px;
    height:38px;
    border-radius:999px;
    padding:0;
    display:inline-grid;
    place-items:center;
    margin:12px auto 2px;
    font-size:20px;
    background:#eef2f7;
    border:1px solid rgba(15,23,42,.10);
  }

  .divideBlock{
    margin-top:14px;
    padding-top:14px;
    border-top:1px solid rgba(15,23,42,.08);
  }

  .divideTitle{
    color:var(--muted);
    font-size:13px;
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
    margin-bottom:8px;
  }

  .divideButtons{
    display:flex;
    justify-content:center;
    gap:8px;
    flex-wrap:wrap;
  }

  dialog .btnrow{
    justify-content:center;
  }

  .chip{
    padding:8px 10px;
    border-radius:999px;
    background:#f1f5f9;
    border:1px solid rgba(15,23,42,.08);
    font-size:13px;
    font-weight:900;
    cursor:pointer;
  }

  .chip:hover{background:#e2e8f0}

  .footerNote{
    display:none;
    color:#94a3b8;

    text-align:center;
    margin-top:14px;
    font-weight:700;
  }

  /* PATCH 35 — historique d'équations en vrai tableau */
  .equationHistory{
    width:min(900px,100%);
    margin:8px auto 0;
    display:flex;
    justify-content:center;
    align-items:center;
  }

  .equationTable{
    border-collapse:collapse;
    margin:0 auto;
    font-size:clamp(24px,2.55vw,38px);
    font-weight:950;
    line-height:1.18;
  }

  .equationTable td{
    padding:0 8px;
    white-space:nowrap;

  .equationTable .lhs{

  .equationTable .eq{

    padding-right:14px;

  /* PATCH 36 — hiérarchie visuelle dans l'historique */

  }

  .equationTable tr.currentStep{
    color:#0f172a;
    opacity:1;
  }

  .equationTable tr.currentStep .eq{
    color:#3b82f6;
  }

</style>
</head>

<script>
(() => {
  const topLine = document.getElementById("topLine");
  const bottomLine = document.getElementById("bottomLine");
  const actionZone = document.getElementById("actionZone");
  const instructionZone = document.getElementById("instructionZone");
  const solutionEl = document.getElementById("solution");
  const equationText = document.getElementById("equationText");
  const equationHistory = document.getElementById("equationHistory");
  const statusEl = document.getElementById("status");
  const stageEl = document.getElementById("stage");
  const btnFullscreen = document.getElementById("btnFullscreen");
  const btnStageUndo = document.getElementById("btnStageUndo");
  const toolDecompose = document.getElementById("toolDecompose");
  const toolShare = document.getElementById("toolShare");
  const toolDelete = document.getElementById("toolDelete");
  const toolUndo = document.getElementById("toolUndo");
  const removedDisplayModeEl = document.getElementById("removedDisplayMode");
  const unknownDisplayModeEl = document.getElementById("unknownDisplayMode");
  const unknownDisplayModeStudentEl = document.getElementById("unknownDisplayModeStudent");

  const modeEl = document.getElementById("mode");

  const btnTeacherMode = document.getElementById("btnTeacherMode");
  const btnStudentMode = document.getElementById("btnStudentMode");
  const profPanel = document.getElementById("profPanel");
  const studentPanel = document.getElementById("studentPanel");
  const studentPathEl = document.getElementById("studentPath");
  const worldCards = Array.from(document.querySelectorAll(".worldCard"));
  const studentTotalEl = document.getElementById("studentTotal");
  const btnStartStudent = document.getElementById("btnStartStudent");
  const btnNextStudent = document.getElementById("btnNextStudent");
  const studentProgressEl = document.getElementById("studentProgress");
  const stageStudentHud = document.getElementById("stageStudentHud");
  const stageStudentProgress = document.getElementById("stageStudentProgress");
  const btnStageNextStudent = document.getElementById("btnStageNextStudent");
  const studentWaitingStage = document.getElementById("studentWaitingStage");
  const coefAEl = document.getElementById("coefA");
  const constBEl = document.getElementById("constB");
  const coefCEl = document.getElementById("coefC");
  const coefCWrap = document.getElementById("coefCWrap");
  const solXEl = document.getElementById("solX");
  const seedEl = document.getElementById("seed");
  const profEquationInfo = document.getElementById("profEquationInfo");

  const dialog = document.getElementById("decomposeDialog");
  const dialogText = document.getElementById("dialogText");
  const decomposeInput = document.getElementById("decomposeInput");
  const presetChips = document.getElementById("presetChips");

  const shareDialog = document.getElementById("shareDialog");
  const shareDialogText = document.getElementById("shareDialogText");
  const shareChoices = document.getElementById("shareChoices");
  const btnShowSuggestions = document.getElementById("btnShowSuggestions");
  const divideBlock = document.getElementById("divideBlock");
  const divideButtons = document.getElementById("divideButtons");

  const variableChars = ["𝑥", "𝑎", "𝑏", "𝑐", "𝑚", "𝑛", "𝑡"];

  let state = null;
  let history = [];
  let selectedPieceRef = null;
  let selectedShareRef = null;
  let deleteSelection = [];
  let actionMode = "decompose"; // decompose | share | delete
  let appMode = "teacher";
  let studentSession = {
    active:false,
    path:"axc",
    total:5,
    index:0,
    solved:0,
    currentCounted:false
  };
  const completedWorlds = new Set();

  function setActionMode(mode){
    actionMode = mode;
    deleteSelection = [];
    [toolDecompose, toolShare, toolDelete].forEach(btn => btn && btn.classList.remove("active"));
    if(mode === "decompose" && toolDecompose) toolDecompose.classList.add("active");
    if(mode === "share" && toolShare) toolShare.classList.add("active");
    if(mode === "delete" && toolDelete) toolDelete.classList.add("active");
    render();
  }

  function currentVar(){
    return state && state.original && state.original.varChar ? state.original.varChar : "𝑥";
  }

  function shouldKeepRemovedPieces(){
    return !removedDisplayModeEl || removedDisplayModeEl.value !== "hide";
  }

  function currentMode(){
    return state && state.original ? state.original.mode : "";
  }

  function displayedUnknown(){
    const el = appMode === "student" ? unknownDisplayModeStudentEl : unknownDisplayModeEl;
    return el && el.value === "question" ? "?" : currentVar();
  }

  function getWorldName(path){
    const names = {
      axc:"Monde 1",
      xpb:"Monde 2",
      mix12:"Monde 3",
      both:"Monde 4",
      mix:"Monde 5"
    };
    return names[path] || "Monde";
  }

  function setStudentPath(path){
    if(!studentPathEl) return;
    studentPathEl.value = path;
    worldCards.forEach(card => {
      const isActive = card.dataset.path === path;
      card.classList.toggle("active", isActive);
    });
    if(studentSession.active){
      studentSession.active = false;
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    }
    syncWorldCards();
    updateStudentProgress();
    syncStudentStageVisibility();
  }

  function syncWorldCards(){
    worldCards.forEach(card => {
      const path = card.dataset.path;
      card.classList.toggle("done", completedWorlds.has(path));
      card.classList.toggle("active", studentPathEl && studentPathEl.value === path);
    });
  }

  function syncStudentStageVisibility(){
    const waiting = appMode === "student" && !studentSession.active;
    if(studentWaitingStage) studentWaitingStage.classList.toggle("open", waiting);

    const selectors = [".topbar", ".instructionZone", ".board", ".toolBar", ".actionZone", ".solution", ".footerNote"];
    selectors.forEach(sel => {
      const el = stageEl ? stageEl.querySelector(sel) : null;
      if(el) el.style.display = waiting ? "none" : "";
    });
  }

  function syncAppModeUI(){
    if(btnTeacherMode) btnTeacherMode.classList.toggle("active", appMode === "teacher");
    if(btnStudentMode) btnStudentMode.classList.toggle("active", appMode === "student");
    if(profPanel) profPanel.classList.toggle("hidden", appMode !== "teacher");
    if(studentPanel) studentPanel.classList.toggle("open", appMode === "student");
    updateStudentProgress();
    syncStudentStageVisibility();
  }

  function setAppMode(mode){
    appMode = mode === "student" ? "student" : "teacher";
    syncTeacherEquationControls();
    syncAppModeUI();
    render();
  }

  function updateStudentProgress(){
    const isStudent = appMode === "student";

    if(stageStudentHud){
      stageStudentHud.classList.toggle("open", isStudent && studentSession.active);
    }

    if(!isStudent){
      if(studentProgressEl) studentProgressEl.textContent = "";
      if(stageStudentProgress) stageStudentProgress.textContent = "";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      return;
    }

    if(!studentSession.active){
      if(studentProgressEl) studentProgressEl.textContent = "Choisis un monde.";
      if(stageStudentProgress) stageStudentProgress.textContent = "";
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      return;
    }

    const text = `${getWorldName(studentSession.path)} · Exercice ${studentSession.index} / ${studentSession.total} · Réussites : ${studentSession.solved}`;
    if(studentProgressEl){
      studentProgressEl.innerHTML = `<strong>${getWorldName(studentSession.path)}</strong> · Exercice <strong>${studentSession.index}</strong> / ${studentSession.total} · Réussites : <strong>${studentSession.solved}</strong>`;
    }
    if(stageStudentProgress){
      stageStudentProgress.textContent = text;
    }
  }

  function startStudentSession(){
    const path = studentPathEl ? studentPathEl.value : "axc";
    const total = studentTotalEl ? Number(studentTotalEl.value) || 5 : 5;
    studentSession = {
      active:true,
      path,
      total,
      index:0,
      solved:0,
      currentCounted:false
    };
    nextStudentExercise();
    syncStudentStageVisibility();
  }

  function nextStudentExercise(){
    if(!studentSession.active) return;
    if(studentSession.index >= studentSession.total){
      completedWorlds.add(studentSession.path);
      syncWorldCards();
      if(studentProgressEl){
        studentProgressEl.innerHTML = `<strong>${getWorldName(studentSession.path)} validé</strong> · Réussites : <strong>${studentSession.solved}</strong> / ${studentSession.total}`;
      }
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
      setInstruction(`${getWorldName(studentSession.path)} validé.`);
      return;
    }

    studentSession.index += 1;
    studentSession.currentCounted = false;

    let exercisePath = studentSession.path;
    if(exercisePath === "mix12"){
      exercisePath = Math.random() < 0.5 ? "axc" : "xpb";
    }

    if(modeEl){
      modeEl.value = exercisePath;
    }
    randomExercise();

    if(btnNextStudent) btnNextStudent.style.display = "none";
    if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    updateStudentProgress();
    syncStudentStageVisibility();
  }

  function onStudentSolved(){
    if(appMode !== "student" || !studentSession.active || studentSession.currentCounted) return;
    studentSession.currentCounted = true;
    studentSession.solved += 1;
    updateStudentProgress();

    if(studentSession.index >= studentSession.total){
      if(studentProgressEl){
        studentProgressEl.innerHTML = `Parcours terminé · Réussites : <strong>${studentSession.solved}</strong> / ${studentSession.total}`;
      }
      setInstruction("Parcours terminé.");
      if(btnNextStudent) btnNextStudent.style.display = "none";
      if(btnStageNextStudent) btnStageNextStudent.classList.remove("show");
    }else{
      if(btnNextStudent) btnNextStudent.style.display = "";
      if(btnStageNextStudent) btnStageNextStudent.classList.add("show");
    }
  }

  function uid(){
    return Math.random().toString(36).slice(2, 9);
  }

  function clone(obj){
    return JSON.parse(JSON.stringify(obj));
  }

  function pushHistory(){
    history.push(clone(state));
    if(history.length > 60) history.shift();
  }

  function setStatus(text, good=false){
    statusEl.textContent = text;
    statusEl.className = good ? "status good" : "status";
  }

  function numberOr(value, fallback){
    const n = Number(value);
    return Number.isFinite(n) ? n : fallback;
  }

  function clamp(n,a,b){
    return Math.max(a, Math.min(b,n));
  }

  function makeNumber(value){
    return { id:uid(), type:"number", value:Number(value), removed:false };
  }

  function makeX(){
    const v = state && state.original && state.original.varChar ? state.original.varChar : "𝑥";
    return { id:uid(), type:"x", value:v, removed:false };
  }

  function sideExpression(side){
    const pieces = activePieces(side);
    const v = displayedUnknown();
    const terms = [];
    let i = 0;

    while(i < pieces.length){
      const p = pieces[i];
      if(p.type === "x"){
        let count = 0;
        while(i < pieces.length && pieces[i].type === "x"){
          count++;
          i++;
        }
        terms.push(count === 1 ? v : `${count}${v}`);
      }else{
        terms.push(String(p.value));
        i++;
      }
    }

    return terms.length ? terms.join(" + ") : "0";
  }

  function currentEquationString(){
    const solved = getSolvedValue();
    if(solved !== null){
      return `${displayedUnknown()} = ${solved}`;
    }
    // On écrit l'équation dans le sens algébrique : ligne du bas = ligne du haut.
    return `${sideExpression("bottom")} = ${sideExpression("top")}`;
  }

  function recordEquationStep(){
    if(!state) return;
    const eq = currentEquationString();
    if(!state.steps) state.steps = [];
    if(state.steps[state.steps.length - 1] !== eq) state.steps.push(eq);
  }

  function refreshStepsForUnknownDisplay(){
    if(!state) return;
    state.steps = [currentEquationString()];
    render();
  }

  function getSelectedMode(){
    const raw = modeEl ? modeEl.value : "axb";
    if(raw === "mix"){
      const modes = ["xpb", "axc", "axb", "both"];
      return modes[Math.floor(Math.random() * modes.length)];
    }
    return raw;
  }

  function getModeLabel(mode){
    if(mode === "xpb") return "x + b = c";
    if(mode === "axc") return "ax = c";
    if(mode === "both") return "ax + b = cx + d";
    return "ax + b = c";
  }

  function syncTeacherEquationControls(){
    if(!modeEl) return;
    const isBoth = modeEl.value === "both";
    if(coefCWrap) coefCWrap.style.display = isBoth ? "" : "none";
    updateProfEquationInfo();
  }

  function updateProfEquationInfo(){
    if(!profEquationInfo || !modeEl) return;
    if(modeEl.value !== "both"){
      profEquationInfo.style.display = "none";
      profEquationInfo.innerHTML = "";
      return;
    }

    const aRaw = Math.round(numberOr(coefAEl.value, 2));
    const cRaw = Math.round(numberOr(coefCEl ? coefCEl.value : 1, 1));
    const b = Math.max(0, Math.round(numberOr(constBEl.value, 4)));
    const x = Math.max(1, Math.round(numberOr(solXEl.value, 12)));
    const a = Math.max(2, aRaw);
    const c = Math.max(1, Math.min(cRaw, a - 1));
    const d = (a - c) * x + b;

    profEquationInfo.style.display = "";
    profEquationInfo.innerHTML = `Calcul automatique : <strong>d = ${d}</strong>`;
  }

  function buildFromInputs(){
    const selectedMode = getSelectedMode();
    const rawA = clamp(Math.round(numberOr(coefAEl.value,2)),2,8);
    const bInput = clamp(Math.round(numberOr(constBEl.value,4)),1,40);
    const x = clamp(Math.round(numberOr(solXEl.value,12)),2,20);

    let a = selectedMode === "xpb" ? 1 : rawA;
    let b = selectedMode === "axc" ? 0 : bInput;
    let rightA = 0;
    let d = 0;
    let c = a*x + b;

    if(selectedMode === "both"){
      // Mode prof guidé : on choisit a, b, c et la solution.
      // Le logiciel calcule d pour garantir une équation positive et résoluble :
      // ax + b = cx + d, donc d = (a-c)x + b.
      a = Math.max(2, rawA);
      rightA = Math.max(1, Math.min(Math.round(numberOr(coefCEl ? coefCEl.value : 1, 1)), a - 1));
      b = bInput;
      d = (a - rightA) * x + b;
      c = a*x + b;
    }

    coefAEl.value = a;
    constBEl.value = b;
    if(coefCEl) coefCEl.value = rightA || 1;
    solXEl.value = x;
    updateProfEquationInfo();

    const varChar = variableChars[Math.floor(Math.random() * variableChars.length)];
    state = {
      original:{mode:selectedMode, modeLabel:getModeLabel(selectedMode), a,b,rightA,d,x,c,varChar},
      top:[],
      bottom:[],
      hintCount:0,
      steps:[]
    };

    if(selectedMode === "both"){
      // Convention : le bas représente ax+b, le haut représente cx+d.
      // L'équation affichée reste donc : bas = haut.
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
      state.top = [...Array(rightA)].map(makeX).concat(d > 0 ? [makeNumber(d)] : []);
    }else{
      state.top = [makeNumber(c)];
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
    }

    recordEquationStep();
    history = [];
    selectedPieceRef = null;
    selectedShareRef = null;
    deleteSelection = [];
    actionMode = "decompose";
    if(toolDecompose) toolDecompose.classList.add("active");
    if(toolShare) toolShare.classList.remove("active");
    if(toolDelete) toolDelete.classList.remove("active");
    render();
    setStatus("");
  }

  function mulberry32(a){
    return function(){
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  function randomInt(rng,a,b){
    return a + Math.floor(rng()*(b-a+1));
  }

  function randomExercise(){
    const rawSeed = String(seedEl.value || "").trim();
    const rng = rawSeed === "" ? Math.random : mulberry32(Number(rawSeed)|0);

    let selectedMode = modeEl ? modeEl.value : "axb";
    if(selectedMode === "mix"){
      const modes = ["xpb", "axc", "axb", "both"];
      selectedMode = modes[randomInt(rng,0,modes.length-1)];
    }

    let a = selectedMode === "xpb" ? 1 : randomInt(rng,2,5);
    const x = randomInt(rng,3,15);
    let b = selectedMode === "axc" ? 0 : randomInt(rng,2,18);
    let rightA = 0;
    let d = 0;
    let c = a*x + b;

    if(selectedMode === "both"){
      a = randomInt(rng,3,5);
      rightA = randomInt(rng,1,a-1);
      b = randomInt(rng,2,14);
      d = (a - rightA) * x + b;
      c = a*x + b;
    }

    coefAEl.value = Math.max(2, a);
    constBEl.value = Math.max(1, b || randomInt(rng,2,18));
    if(coefCEl) coefCEl.value = rightA || 1;
    solXEl.value = x;
    updateProfEquationInfo();

    // Construction directe pour éviter qu'un mode Mélange soit tiré une deuxième fois.
    const varChar = variableChars[Math.floor(rng() * variableChars.length)];
    state = {
      original:{mode:selectedMode, modeLabel:getModeLabel(selectedMode), a,b,rightA,d,x,c,varChar},
      top:[],
      bottom:[],
      hintCount:0,
      steps:[]
    };

    if(selectedMode === "both"){
      // Convention : le bas représente ax+b, le haut représente cx+d.
      // L'équation affichée reste donc : bas = haut.
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
      state.top = [...Array(rightA)].map(makeX).concat(d > 0 ? [makeNumber(d)] : []);
    }else{
      state.top = [makeNumber(c)];
      state.bottom = [...Array(a)].map(makeX).concat(b > 0 ? [makeNumber(b)] : []);
    }

    recordEquationStep();
    history = [];
    selectedPieceRef = null;
    selectedShareRef = null;
    deleteSelection = [];
    actionMode = "decompose";
    if(toolDecompose) toolDecompose.classList.add("active");
    if(toolShare) toolShare.classList.remove("active");
    if(toolDelete) toolDelete.classList.remove("active");
    render();
    setStatus("");
  }

  function activePieces(side){
    return state[side].filter(p => !p.removed);
  }

  function getPieceBySideAndId(ref){
    if(!ref || !state || !state[ref.side]) return null;
    return state[ref.side].find(p => p.id === ref.id) || null;
  }

  function selectedDeleteIds(){
    return new Set(deleteSelection.map(ref => ref.id));
  }

  function selectedDeletePiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of deleteSelection){
      const p = getPieceBySideAndId(ref);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }

  function deletionGroupInfo(){
    const {top, bottom} = selectedDeletePiecesBySide();
    if(top.length === 0 || bottom.length === 0){
      return {ok:false, reason:"needBoth", top, bottom};
    }

    const all = top.concat(bottom);
    const firstType = all[0].type;

    if(all.some(p => p.type !== firstType)){
      return {ok:false, reason:"mixedTypes", top, bottom};
    }

    if(firstType === "x"){
      if(top.length !== bottom.length){
        return {ok:false, reason:"differentCounts", top, bottom};
      }
      return {
        ok:true,
        type:"x",
        count:top.length,
        label: top.length === 1 ? displayedUnknown() : `${top.length}${displayedUnknown()}`,
        top,
        bottom
      };
    }

    if(firstType === "number"){
      const topSum = top.reduce((s,p)=>s + Number(p.value || 0), 0);
      const bottomSum = bottom.reduce((s,p)=>s + Number(p.value || 0), 0);
      if(topSum !== bottomSum){
        return {ok:false, reason:"differentSums", top, bottom, topSum, bottomSum};
      }
      return {
        ok:true,
        type:"number",
        count:top.length + bottom.length,
        value:topSum,
        label:String(topSum),
        top,
        bottom
      };
    }

    return {ok:false, reason:"unknown", top, bottom};
  }

  function canDeleteMatchingNumbers(){
    return deletionGroupInfo().ok;
  }

  function selectForDeletion(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.removed) return;

    const alreadyIndex = deleteSelection.findIndex(ref => ref.side === side && ref.id === id);
    if(alreadyIndex >= 0){
      deleteSelection.splice(alreadyIndex, 1);
      render();
      return;
    }

    // Suppression groupée :
    // on autorise plusieurs cases, mais on évite les mélanges inutilisables.
    const currentPieces = deleteSelection.map(getPieceBySideAndId).filter(Boolean);
    if(currentPieces.length){
      const firstType = currentPieces[0].type;
      if(piece.type !== firstType){
        deleteSelection = [];
      }
    }

    deleteSelection.push({side, id});
    render();
  }

  function deleteMatchingNumbers(){
    const info = deletionGroupInfo();
    if(!info.ok) return;

    pushHistory();
    const ids = selectedDeleteIds();
    for(const side of ["top","bottom"]){
      for(const p of state[side]){
        if(ids.has(p.id)) p.removed = true;
      }
    }
    deleteSelection = [];
    recordEquationStep();
    render();
    setStatus("Même quantité supprimée des deux côtés", true);
  }

  function getShareOpportunity(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    const topNumbers = top.filter(p => p.type === "number");
    const bottomNumbers = bottom.filter(p => p.type === "number");
    const topX = top.filter(p => p.type === "x");
    const bottomX = bottom.filter(p => p.type === "x");

    if(topNumbers.length === 1 && topX.length === 0 && bottomNumbers.length === 0 && bottomX.length >= 2){
      const value = topNumbers[0].value;
      if(value % bottomX.length === 0){
        return { numberSide:"top", xSide:"bottom", numberPiece:topNumbers[0], count:bottomX.length, result:value / bottomX.length };
      }
    }

    if(bottomNumbers.length === 1 && bottomX.length === 0 && topNumbers.length === 0 && topX.length >= 2){
      const value = bottomNumbers[0].value;
      if(value % topX.length === 0){
        return { numberSide:"bottom", xSide:"top", numberPiece:bottomNumbers[0], count:topX.length, result:value / topX.length };
      }
    }

    return null;
  }

  function shareNumber(){
    const opp = getShareOpportunity();
    if(!opp) return;
    pushHistory();

    const parts = Array.from({length:opp.count}, () => makeNumber(opp.result));
    const sideArr = state[opp.numberSide];
    const idx = sideArr.findIndex(p => p.id === opp.numberPiece.id);
    sideArr.splice(idx, 1, ...parts);
    recordEquationStep();

    render();
    setStatus(`La quantité est partagée en ${opp.count} parts égales`, true);
  }

  function getSolvedValue(){
    const top = activePieces("top");
    const bottom = activePieces("bottom");
    if(top.length === 0 || bottom.length === 0) return null;

    const isAllNumbers = arr => arr.every(p => p.type === "number");
    const isAllX = arr => arr.every(p => p.type === "x");
    const allSameNumber = arr => isAllNumbers(arr) && arr.every(p => p.value === arr[0].value);

    if(allSameNumber(top) && isAllX(bottom) && top.length === bottom.length){
      return top[0].value;
    }
    if(allSameNumber(bottom) && isAllX(top) && top.length === bottom.length){
      return bottom[0].value;
    }
    return null;
  }

  function getPieceMeasure(piece){
    if(piece.type === "x"){
      return Math.max(1, state.original.x);
    }
    return Math.max(1, Math.abs(piece.value));
  }

  function getPieceWidthPercent(piece){
    const total = Math.max(1, state.original.c);
    return (getPieceMeasure(piece) / total) * 100;
  }

  function renderLine(side, host, selectedIds, commonLineWidth=null){
    host.innerHTML = "";
    const pieces = shouldKeepRemovedPieces() ? state[side] : state[side].filter(p => !p.removed);
    const widths = pieces.map(piece => getPieceWidthPercent(piece));
    const naturalLineWidth = widths.reduce((sum, w) => sum + w, 0);
    const lineWidth = commonLineWidth == null ? naturalLineWidth : commonLineWidth;

    // Important :
    // La largeur totale de la ligne diminue quand on enlève une partie.
    // Mais les cases restantes ne doivent pas être réduites une deuxième fois.
    // Donc on normalise les colonnes à l'intérieur de la largeur restante.
    const safeLineWidth = Math.max(0.0001, lineWidth);
    const cols = widths.map(w => `${(w / safeLineWidth) * 100}%`).join(" ") || "1fr";

    host.style.setProperty("--cols", cols);
    host.style.setProperty("--lineWidth", `${Math.max(0, Math.min(100, lineWidth))}%`);
    selectedIds = selectedIds || new Set();
    for(const piece of pieces){
      const el = document.createElement("div");
      el.className = `piece ${piece.type}`;
      if(piece.removed) el.classList.add("removed");
      if(selectedIds.has(piece.id)) el.classList.add("selectedForDelete");

      const value = piece.type === "x" ? displayedUnknown() : String(piece.value);
      el.innerHTML = `
        <div class="pieceContent">
          <div class="pieceValue">${value}</div>
        </div>
      `;

      el.addEventListener("click", () => {
        if(piece.removed) return;

        if(actionMode === "decompose"){
          if(piece.type === "number"){
            openDecomposeDialog(side, piece.id);
          }else{
            setStatus(`En mode Décomposer, clique sur un nombre.`);
          }
          return;
        }

        if(actionMode === "share"){
          if(piece.type !== "number"){
            setStatus(`En mode Partager, clique sur un nombre à couper en parts égales.`);
            return;
          }
          openShareDialog(side, piece.id);
          return;
        }

        if(actionMode === "delete"){
          selectForDeletion(side, piece.id);
          return;
        }
      });

      host.appendChild(el);
    }
  }

  function setInstruction(htmlText){
    if(!instructionZone) return;
    instructionZone.innerHTML = htmlText || "";
  }

  function renderActions(){
    actionZone.innerHTML = "";
    solutionEl.textContent = "";
    const v = currentVar();

    const solved = getSolvedValue();
    if(solved !== null){
      solutionEl.textContent = `${displayedUnknown()} = ${solved}`;
      setStatus("Résolution terminée", true);
      setInstruction(`Bravo :&nbsp;<strong>${displayedUnknown()}</strong>&nbsp;est trouvé.`);
      actionZone.innerHTML = "";
      onStudentSolved();
      return;
    }

    if(actionMode === "decompose"){
      setInstruction("Décompose un nombre.");
      actionZone.innerHTML = "";
      return;
    }

    if(actionMode === "share"){
      const suggested = getShareOpportunity();
      if(suggested){
        setInstruction(`Partage&nbsp;<strong>${suggested.numberPiece.value}</strong>&nbsp;en parts égales.`);
      }else{
        setInstruction("Partage un nombre en parts égales.");
      }
      actionZone.innerHTML = "";
      return;
    }

    if(actionMode === "delete"){
      const info = deletionGroupInfo();
      const {top, bottom} = selectedDeletePiecesBySide();

      if(top.length === 0 && bottom.length === 0){
        if(currentMode() === "both"){
          setInstruction(`Sélectionne la même quantité des deux côtés.`);
        }else{
          setInstruction("Sélectionne la même quantité des deux côtés.");
        }
        return;
      }

      if(top.length === 0 || bottom.length === 0){
        const sideName = top.length ? "haut" : "bas";
        setInstruction(`Sélectionne maintenant l’autre côté.`);
        const btn = document.createElement("button");
        btn.className = "ghost";
        btn.textContent = "Effacer la sélection";
        btn.addEventListener("click", () => {
          deleteSelection = [];
          render();
        });
        actionZone.appendChild(btn);
        return;
      }

      if(info.ok){
        setInstruction(`Même quantité sélectionnée :&nbsp;<strong>${info.label}</strong>.`);
        const btn = document.createElement("button");
        btn.className = "orange";
        btn.textContent = "Valider la suppression";
        btn.addEventListener("click", deleteMatchingNumbers);
        actionZone.appendChild(btn);

        const clear = document.createElement("button");
        clear.className = "ghost";
        clear.textContent = "Effacer la sélection";
        clear.addEventListener("click", () => {
          deleteSelection = [];
          render();
        });
        actionZone.appendChild(clear);
      }else{
        let reason = "Les deux quantités sélectionnées ne sont pas identiques.";
        if(info.reason === "differentCounts"){
          reason = `Il faut le même nombre de lettres de chaque côté.`;
        }else if(info.reason === "differentSums"){
          reason = `Les nombres sélectionnés ne font pas la même somme.`;
        }else if(info.reason === "mixedTypes"){
          reason = "Ne mélange pas lettres et nombres.";
        }
        setInstruction(reason);
        const btn = document.createElement("button");
        btn.className = "ghost";
        btn.textContent = "Effacer la sélection";
        btn.addEventListener("click", () => {
          deleteSelection = [];
          render();
        });
        actionZone.appendChild(btn);
      }
      return;
    }
  }

  function message(html){
    const div = document.createElement("div");
    div.className = "message";
    div.innerHTML = html;
    return div;
  }

  function splitEquation(eq){
    const parts = String(eq).split("=");
    if(parts.length < 2) return {lhs:String(eq), rhs:""};
    return {lhs:parts[0].trim(), rhs:parts.slice(1).join("=").trim()};
  }

  function renderEquationHistory(){
    if(!equationHistory) return;
    const steps = state.steps || [];
    const shown = steps.slice(-6);

    if(!shown.length){
      equationHistory.innerHTML = "";
      return;
    }

    const rows = shown.map((eq, i) => {
      const {lhs, rhs} = splitEquation(eq);
      const cls = i === shown.length - 1 ? "currentStep" : "historyStep";
      return `<tr class="${cls}"><td class="lhs">${lhs}</td><td class="eq">=</td><td class="rhs">${rhs}</td></tr>`;
    }).join("");

    equationHistory.innerHTML = `<table class="equationTable" aria-label="Étapes de résolution"><tbody>${rows}</tbody></table>`;
  }

  function render(){
    if(!state) return;
    const selectedIds = selectedDeleteIds();
    equationText.textContent = "";
    renderEquationHistory();
    const widthPieces = side => shouldKeepRemovedPieces() ? state[side] : activePieces(side);
    const topWidth = widthPieces("top").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const bottomWidth = widthPieces("bottom").reduce((sum,p)=>sum + getPieceWidthPercent(p), 0);
    const commonWidth = Math.max(topWidth, bottomWidth);
    renderLine("top", topLine, selectedIds, commonWidth);
    renderLine("bottom", bottomLine, selectedIds, commonWidth);
    renderActions();
  }

  function getOppositeSide(side){
    return side === "top" ? "bottom" : "top";
  }

  function countActiveX(side){
    return activePieces(side).filter(p => p.type === "x").length;
  }

  function shuffleArray(arr){
    for(let i=arr.length-1; i>0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function getPossibleShareCounts(value, side){
    const maxParts = 12;
    const out = [];

    // Choix pédagogique prioritaire : si le nombre est en face de 5 lettres,
    // on propose d'abord 5 parts, car c'est l'action attendue.
    const oppositeX = countActiveX(getOppositeSide(side));
    if(oppositeX >= 2 && oppositeX <= maxParts && value % oppositeX === 0){
      out.push(oppositeX);
    }

    // Puis on ajoute les autres diviseurs raisonnables.
    for(let n=2; n<=maxParts; n++){
      if(value % n === 0 && !out.includes(n)){
        out.push(n);
      }
    }
    return out;
  }

  function openShareDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number" || piece.removed) return;

    const choices = shuffleArray(getPossibleShareCounts(piece.value, side));
    selectedShareRef = {side, id, value:piece.value};

    if(shareDialogText){
      shareDialogText.innerHTML = `Tu vas partager&nbsp;<strong>${piece.value}</strong>&nbsp;en parts égales.`;
    }
    if(shareChoices){
      shareChoices.innerHTML = "";
      shareChoices.classList.add("open");
      if(choices.length === 0){
        const div = document.createElement("div");
        div.className = "message";
        div.textContent = "Aucun partage entier n’est possible pour ce nombre.";
        shareChoices.appendChild(div);
      }else{
        for(const n of choices){
          const chip = document.createElement("button");
          chip.className = "chip";
          chip.type = "button";
          chip.textContent = `${n} parts de ${piece.value / n}`;
          chip.addEventListener("click", () => applyShareChoice(n));
          shareChoices.appendChild(chip);
        }
      }
    }
    if(shareDialog) shareDialog.showModal();
  }

  function applyShareChoice(count){
    if(!selectedShareRef) return;
    const arr = state[selectedShareRef.side];
    const idx = arr.findIndex(p => p.id === selectedShareRef.id);
    if(idx < 0) return;

    const value = selectedShareRef.value;
    if(value % count !== 0){
      setStatus("Ce partage ne donne pas des parts entières.");
      return;
    }

    pushHistory();
    const part = value / count;
    arr.splice(idx, 1, ...Array.from({length:count}, () => makeNumber(part)));
    selectedShareRef = null;
    if(shareDialog) shareDialog.close();
    recordEquationStep();
    render();
    setStatus("Nombre partagé en parts égales", true);
  }

  function openDecomposeDialog(side, id){
    const piece = state[side].find(p => p.id === id);
    if(!piece || piece.type !== "number") return;

    selectedPieceRef = {side,id,value:piece.value};
    dialogText.innerHTML = `Remplace <strong>${piece.value}</strong> par une somme équivalente.`;
    decomposeInput.value = "";
    presetChips.innerHTML = "";
    presetChips.classList.remove("open");
    if(btnShowSuggestions){ btnShowSuggestions.style.display = "inline-grid"; btnShowSuggestions.textContent = "?"; }

    const suggestions = buildSuggestions(piece.value);
    for(const s of suggestions){
      const chip = document.createElement("button");
      chip.className = "chip";
      chip.type = "button";
      chip.textContent = s;
      chip.addEventListener("click", () => {
        decomposeInput.value = s;
        decomposeInput.focus();
      });
      presetChips.appendChild(chip);
    }

    if(divideBlock) divideBlock.style.display = "none";

    dialog.showModal();
    setTimeout(() => decomposeInput.focus(), 80);
  }

  function splitAsSum(value, parts){
    const each = value / parts;
    return Array.from({length:parts}, () => String(each)).join(" + ");
  }

  function buildDivideButtons(value){
    divideButtons.innerHTML = "";
    const divisors = [];
    for(let k=2; k<=8; k++){
      if(value % k === 0) divisors.push(k);
    }

    // On met en premier le partage qui correspond au nombre d'inconnues restantes,
    // s'il existe, parce que c'est souvent l'action utile en fin de résolution.
    const topX = activePieces("top").filter(p => p.type === "x").length;
    const bottomX = activePieces("bottom").filter(p => p.type === "x").length;
    const usefulK = Math.max(topX, bottomX);
    divisors.sort((a,b) => (a === usefulK ? -1 : b === usefulK ? 1 : a-b));

    for(const k of divisors.slice(0,5)){
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "ghost";
      btn.textContent = `Diviser en ${k}`;
      btn.addEventListener("click", () => {
        decomposeInput.value = splitAsSum(value, k);
        applyDecompose();
      });
      divideButtons.appendChild(btn);
    }

    divideBlock.style.display = divisors.length ? "block" : "none";
  }

  function buildSuggestions(value){
    const b = state.original.b;
    const a = state.original.a;
    const x = state.original.x;
    const suggestions = [];

    // La proposition vraiment utile : faire apparaître la constante à supprimer.
    if(b > 0 && value > b) suggestions.push(`${value-b} + ${b}`);

    // Autres propositions équivalentes, mais pas forcément optimales.
    const candidates = [];
    for(let left=1; left<=value-1; left++){
      const right = value - left;
      if(left === right) candidates.push(`${left} + ${right}`);
      if(left === 10 || right === 10) candidates.push(`${left} + ${right}`);
      if(left === x || right === x) candidates.push(`${left} + ${right}`);
      if(left === a || right === a) candidates.push(`${left} + ${right}`);
    }

    // Quelques découpages simples, valides, pour garantir 4 choix si possible.
    const simpleSplits = [
      [1, value-1],
      [2, value-2],
      [Math.floor(value/2), value-Math.floor(value/2)],
      [Math.max(1, value-5), Math.min(5, value-1)],
      [Math.max(1, value-10), Math.min(10, value-1)]
    ];
    for(const [u,v] of simpleSplits){
      if(u > 0 && v > 0 && u + v === value) candidates.push(`${u} + ${v}`);
    }

    for(const c of shuffleUnique(candidates)){
      if(!suggestions.includes(c)) suggestions.push(c);
      if(suggestions.length >= 4) break;
    }

    return shuffle(suggestions.slice(0,4));
  }

  function shuffleUnique(arr){
    return shuffle([...new Set(arr)]);
  }

  function shuffle(arr){
    const out = arr.slice();
    for(let i=out.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  function parseSum(raw){
    const cleaned = String(raw || "").replace(/\s+/g,"");
    if(!cleaned) return null;
    if(!/^\d+(\+\d+)*$/.test(cleaned)) return null;
    const parts = cleaned.split("+").map(Number);
    if(parts.some(n => !Number.isFinite(n) || n <= 0)) return null;
    return parts;
  }

  function applyDecompose(){
    if(!selectedPieceRef) return;
    const parts = parseSum(decomposeInput.value);
    if(!parts){
      setStatus("Décomposition invalide");
      return;
    }

    const total = parts.reduce((a,b)=>a+b,0);
    if(total !== selectedPieceRef.value){
      setStatus(`Attention : la somme doit faire ${selectedPieceRef.value}`);
      return;
    }

    const arr = state[selectedPieceRef.side];
    const idx = arr.findIndex(p => p.id === selectedPieceRef.id);
    if(idx < 0) return;

    pushHistory();
    arr.splice(idx, 1, ...parts.map(makeNumber));
    recordEquationStep();
    selectedPieceRef = null;
    dialog.close();
    render();
    setStatus("Nombre décomposé", true);
  }

  function undo(){
    if(history.length === 0){
      setStatus("Rien à annuler");
      return;
    }
    state = history.pop();
    selectedPieceRef = null;
    selectedShareRef = null;
    deleteSelection = [];
    render();
    setStatus("Étape annulée");
  }

  function hint(){
    if(canDeleteMatchingNumbers()){
      setStatus("Indice : tu peux supprimer les quantités hachurées des deux côtés.");
      return;
    }
    const opp = getShareOpportunity();
    if(opp){
      setStatus(`Indice : ${opp.numberPiece.value} peut être partagé en ${opp.count} parts égales.`);
      return;
    }

    const topNums = activePieces("top").filter(p => p.type === "number");
    if(topNums.length === 1){
      const target = state.original.b;
      if(target > 0 && topNums[0].value > target){
        setStatus(`Indice : essaie de décomposer ${topNums[0].value} pour faire apparaître ${target}.`);
        return;
      }
    }
    setStatus("Indice : cherche si tu peux décomposer le nombre, ou le diviser en parts égales.");
  }

  if(toolDecompose) toolDecompose.addEventListener("click", () => setActionMode("decompose"));
  if(toolShare) toolShare.addEventListener("click", () => setActionMode("share"));
  if(toolDelete) toolDelete.addEventListener("click", () => setActionMode("delete"));
  if(toolUndo) toolUndo.addEventListener("click", undo);
  if(removedDisplayModeEl) removedDisplayModeEl.addEventListener("change", render);
  if(unknownDisplayModeEl) unknownDisplayModeEl.addEventListener("change", refreshStepsForUnknownDisplay);
  if(unknownDisplayModeStudentEl) unknownDisplayModeStudentEl.addEventListener("change", refreshStepsForUnknownDisplay);

  if(btnStageUndo) btnStageUndo.addEventListener("click", undo);
  if(btnTeacherMode) btnTeacherMode.addEventListener("click", () => setAppMode("teacher"));
  if(btnStudentMode) btnStudentMode.addEventListener("click", () => setAppMode("student"));
  worldCards.forEach(card => {
    card.addEventListener("click", () => setStudentPath(card.dataset.path));
  });
  if(btnStartStudent) btnStartStudent.addEventListener("click", startStudentSession);
  if(btnNextStudent) btnNextStudent.addEventListener("click", nextStudentExercise);
  if(btnStageNextStudent) btnStageNextStudent.addEventListener("click", nextStudentExercise);
  if(modeEl) modeEl.addEventListener("change", syncTeacherEquationControls);
  [coefAEl, constBEl, coefCEl, solXEl].forEach(el => {
    if(el) {
      el.addEventListener("input", updateProfEquationInfo);
      el.addEventListener("change", updateProfEquationInfo);
    }
  });

  document.getElementById("btnBuild").addEventListener("click", buildFromInputs);
  document.getElementById("btnRandom").addEventListener("click", randomExercise);
  const btnUndoMenu = document.getElementById("btnUndo");
  if(btnUndoMenu) btnUndoMenu.addEventListener("click", undo);
  document.getElementById("btnReset").addEventListener("click", buildFromInputs);
  const btnHintMenu = document.getElementById("btnHint");
  if(btnHintMenu) btnHintMenu.addEventListener("click", hint);
  if(btnShowSuggestions){
    btnShowSuggestions.addEventListener("click", () => {
      presetChips.classList.toggle("open");
      btnShowSuggestions.textContent = presetChips.classList.contains("open") ? "×" : "?";
    });
  }
  document.getElementById("btnApplyDecompose").addEventListener("click", applyDecompose);
  document.getElementById("btnCancelDialog").addEventListener("click", () => dialog.close());
  const btnCancelShareDialog = document.getElementById("btnCancelShareDialog");
  if(btnCancelShareDialog) btnCancelShareDialog.addEventListener("click", () => {
    selectedShareRef = null;
    if(shareDialog) shareDialog.close();
  });

  decomposeInput.addEventListener("keydown", e => {
    if(e.key === "Enter") applyDecompose();
    if(e.key === "Escape") dialog.close();
  });

  if(modeEl){
    modeEl.addEventListener("change", randomExercise);
  }

  if(btnFullscreen && stageEl){
    btnFullscreen.addEventListener("click", () => {
      if(document.fullscreenElement){
        document.exitFullscreen();
      }else{
        stageEl.requestFullscreen();
      }
    });
  }

  [coefAEl,constBEl,solXEl].forEach(el => {
    el.addEventListener("change", () => {
      el.value = String(Math.round(numberOr(el.value, Number(el.min) || 1)));
    });
  });

  randomExercise();
  syncTeacherEquationControls();
  syncAppModeUI();
})();
</script>
</body>
</html>
