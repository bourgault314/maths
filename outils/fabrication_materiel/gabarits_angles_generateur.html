<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de gabarits d’angles</title>
  <style>
    :root {
      --ui-bg: #f3f4f6;
      --ui-card: #ffffff;
      --ui-border: #d1d5db;
      --ui-text: #111827;
      --accent: #2563eb;
      --page-w: 210mm;
      --page-h: 297mm;
      --page-pad-x: 8mm;
      --page-pad-y: 8mm;
      --cell-gap: 6mm;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--ui-bg);
      color: var(--ui-text);
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: var(--ui-card);
      border-right: 1px solid var(--ui-border);
      padding: 14px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }

    .help {
      margin: 0 0 10px;
      font-size: 0.88rem;
      line-height: 1.3;
      color: #4b5563;
    }

    fieldset {
      border: 1px solid var(--ui-border);
      border-radius: 12px;
      padding: 10px;
      margin: 0 0 10px;
    }

    legend {
      font-weight: 700;
      padding: 0 6px;
    }

    .row { margin: 8px 0; }

    .row label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    input[type="text"], select {
      width: 100%;
      padding: 8px 10px;
      border-radius: 10px;
      border: 1px solid var(--ui-border);
      background: white;
      font-size: 0.95rem;
    }

    input[type="text"]:focus,
    input[type="range"]:focus,
    button:focus {
      outline: none;
    }

    input[type="range"] { width: 100%; }

    .compact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .segmented {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .segmented input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .segmented label {
      border: 1px solid var(--ui-border);
      background: white;
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 0.92rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .segmented span {
      display: inline;
    }

    .segmented label.active-pill {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .check-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px 10px;
    }

    .inline-check {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      margin: 4px 0;
    }

    .btns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
    }

    .primary { background: var(--accent); color: white; }
    .secondary { background: #e5e7eb; color: #111827; }

    .preview-wrap {
      padding: 18px;
      overflow: auto;
    }

    .sheet {
      width: var(--page-w);
      height: var(--page-h);
      background: white;
      margin: 0 auto 20px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.10);
      padding: var(--page-pad-y) var(--page-pad-x);
      page-break-after: always;
    }

    .sheet:last-child { page-break-after: auto; }

    .grid {
      width: 100%;
      height: 100%;
      display: grid;
    }

    .grid.one {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
      row-gap: 0;
    }

    .grid.two {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
      row-gap: var(--cell-gap);
    }

    .cell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0;
    }

    .angle-svg {
      width: 100%;
      height: 100%;
      display: block;
      overflow: hidden;
    }

    .summary {
      margin-top: 10px;
      font-size: 0.88rem;
      color: #4b5563;
      line-height: 1.3;
    }

    @media (max-width: 980px) {
      .app {
        grid-template-columns: 1fr;
      }

      .panel {
        position: static;
        height: auto;
        overflow: visible;
        border-right: none;
        border-bottom: 1px solid var(--ui-border);
      }

      .preview-wrap {
        padding: 10px;
      }
    }

    @media (max-width: 560px) {
      .check-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .compact-grid,
      .btns {
        grid-template-columns: 1fr;
      }
    }

    @page {
      size: A4 portrait;
      margin: 0;
    }

    @media print {
      body { background: white; }
      .app { display: block; }
      .panel { display: none !important; }
      .preview-wrap { padding: 0; }
      .sheet {
        margin: 0;
        box-shadow: none;
        width: 210mm;
        height: 297mm;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>Générateur de gabarit d’angle</h1>
      <fieldset>
        <legend>Valeurs d’angles</legend>
        <div class="check-grid" id="presetAngles"></div>
        <div class="row">
          <label for="customAngles">Autres valeurs (séparées par des virgules)</label>
          <input id="customAngles" type="text" placeholder="Ex. 75, 120, 135" />
        </div>
      </fieldset>

      <fieldset>
        <legend>Format des gabarits</legend>
        <div class="row">
          <label for="scale">Longueur des côtés : <strong><span id="scaleValue"></span>%</strong></label>
          <input id="scale" type="range" min="40" max="108" step="1" value="100" />
        </div>

        <div class="compact-grid">
          <div class="row">
            <label>Nombre de gabarits par page</label>
            <div class="segmented" id="perPageGroup">
              <label><input type="radio" name="perPage" value="1"><span>1</span></label>
              <label><input type="radio" name="perPage" value="2" checked><span>2</span></label>
            </div>
          </div>

          <div class="row">
            <label>Épaisseur des traits</label>
            <div class="segmented" id="lineWidthGroup">
              <label><input type="radio" name="lineWidth" value="0.45" checked><span>fin</span></label>
              <label><input type="radio" name="lineWidth" value="0.68"><span>moyen</span></label>
            </div>
          </div>
        </div>
      </fieldset>

      <fieldset>
        <legend>Affichage</legend>
        <label class="inline-check"><input id="singleSheet" type="checkbox" /> Mettre tous les angles sur une seule page</label>
        <label class="inline-check"><input id="showArc" type="checkbox" checked /> Afficher l’arc de l’angle</label>
        <label class="inline-check"><input id="showLabel" type="checkbox" checked /> Afficher la mesure de l’angle</label>
        <label class="inline-check"><input id="useColors" type="checkbox" /> Mode couleur pédagogique</label>
      </fieldset>

      <div class="btns">
        <button class="primary" id="printBtn">Imprimer / PDF</button>
        <button class="secondary" id="resetBtn">Réinitialiser</button>
      </div>

      <div class="summary" id="summary"></div>
    </aside>

    <main class="preview-wrap">
      <div id="pages"></div>
    </main>
  </div>

  <script>
    const presetValues = [15, 30, 45, 60, 90];

    const colors = {
      normalStroke: '#111827',
      byAngle: {
        15: { fill: '#e9ddff', stroke: '#b08cff', text: '#6d28d9' },
        30: { fill: '#dff0ff', stroke: '#8cc8ff', text: '#2563eb' },
        40: { fill: '#e2f7e7', stroke: '#9fdcab', text: '#16a34a' },
        45: { fill: '#e2f7e7', stroke: '#9fdcab', text: '#16a34a' },
        60: { fill: '#fff3cf', stroke: '#f6d67d', text: '#b7791f' },
        90: { fill: '#ffe3e3', stroke: '#f5a3a3', text: '#dc2626' }
      },
      extras: [
        { fill: '#ffe9d6', stroke: '#f6b98a', text: '#c96a1a' },
        { fill: '#dff7f3', stroke: '#8dd9cf', text: '#0f766e' },
        { fill: '#fde7f2', stroke: '#f3abc9', text: '#be185d' },
        { fill: '#e8f7ef', stroke: '#a8ddbf', text: '#15803d' },
        { fill: '#ece9ff', stroke: '#b8acf6', text: '#5b21b6' },
        { fill: '#fff0dd', stroke: '#f2c48d', text: '#b45309' },
        { fill: '#e2f5fb', stroke: '#9ad7ea', text: '#0c4a6e' },
        { fill: '#f3ebe3', stroke: '#d9c0a8', text: '#7c4a21' }
      ]
    };

    const pageMm = {
      width: 210,
      height: 297,
      padX: 8,
      padY: 8,
      gapY: 6
    };

    const els = {
      presetAngles: document.getElementById('presetAngles'),
      customAngles: document.getElementById('customAngles'),
      scale: document.getElementById('scale'),
      scaleValue: document.getElementById('scaleValue'),
      perPageGroup: document.getElementById('perPageGroup'),
      lineWidthGroup: document.getElementById('lineWidthGroup'),
      singleSheet: document.getElementById('singleSheet'),
      showArc: document.getElementById('showArc'),
      showLabel: document.getElementById('showLabel'),
      useColors: document.getElementById('useColors'),
      pages: document.getElementById('pages'),
      printBtn: document.getElementById('printBtn'),
      resetBtn: document.getElementById('resetBtn'),
      summary: document.getElementById('summary')
    };

    function buildPresetCheckboxes() {
      els.presetAngles.innerHTML = '';
      presetValues.forEach(v => {
        const label = document.createElement('label');
        label.className = 'inline-check';
        label.innerHTML = `<input type="checkbox" value="${v}" checked> ${v}°`;
        els.presetAngles.appendChild(label);
      });
    }

    function bindPresetCheckboxes() {
      [...els.presetAngles.querySelectorAll('input')].forEach(input => {
        input.addEventListener('change', render);
      });
    }

    function getSelectedRadioValue(groupEl) {
      const input = groupEl.querySelector('input:checked');
      return input ? input.value : '';
    }

    function syncSegmentedUI() {
      [els.perPageGroup, els.lineWidthGroup].forEach(group => {
        [...group.querySelectorAll('label')].forEach(label => {
          const input = label.querySelector('input');
          label.classList.toggle('active-pill', input.checked);
        });
      });
    }

    function setRadioGroupValue(groupEl, value) {
      const found = [...groupEl.querySelectorAll('input')].find(input => input.value === String(value));
      if (found) found.checked = true;
      syncSegmentedUI();
    }

    function getAngles() {
      const selected = [...els.presetAngles.querySelectorAll('input:checked')].map(i => Number(i.value));
      const customs = els.customAngles.value
        .split(',')
        .map(s => s.trim())
        .filter(Boolean)
        .map(Number)
        .filter(n => Number.isFinite(n) && n > 0 && n < 180);

      const all = [...new Set([...selected, ...customs])].sort((a, b) => a - b);
      return all.length ? all : [90];
    }

    function fmt(n) {
      return Number(n.toFixed(3));
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function getCellSizeMm(perPage) {
      const usableW = pageMm.width - (2 * pageMm.padX);
      const usableH = pageMm.height - (2 * pageMm.padY);
      if (perPage === 1) {
        return { width: usableW, height: usableH };
      }
      return {
        width: usableW,
        height: (usableH - pageMm.gapY) / 2
      };
    }

    function getGridForCount(count) {
      const usableW = pageMm.width - (2 * pageMm.padX);
      const usableH = pageMm.height - (2 * pageMm.padY);
      let best = { cols: 1, rows: count, score: Infinity };
      for (let cols = 1; cols <= count; cols++) {
        const rows = Math.ceil(count / cols);
        const gapX = cols > 1 ? pageMm.gapY * (cols - 1) : 0;
        const gapY = rows > 1 ? pageMm.gapY * (rows - 1) : 0;
        const cellW = (usableW - gapX) / cols;
        const cellH = (usableH - gapY) / rows;
        const aspect = cellW / cellH;
        const score = Math.abs(aspect - 0.78) + Math.abs(cols - rows) * 0.08;
        if (cellW > 26 && cellH > 26 && score < best.score) {
          best = { cols, rows, score };
        }
      }
      return best;
    }

    function getGeometryConstraints(angleDeg, orientation, cell) {
      const halfRad = (angleDeg / 2) * Math.PI / 180;
      const downward = orientation === 'single' || orientation === 'up';
      const largeCell = cell.height > 180;
      const sideMargin = largeCell ? 8 : 4.5;
      const apexMargin = orientation === 'single' ? (largeCell ? 8 : 5) : (largeCell ? 6 : 4.5);
      const farMargin = orientation === 'single' ? (largeCell ? 7 : 4.5) : (largeCell ? 5 : 4);
      const cx = cell.width / 2;
      const cy = downward ? apexMargin : (cell.height - apexMargin);
      const sinHalf = Math.max(Math.sin(halfRad), 0.001);
      const cosHalf = Math.max(Math.cos(halfRad), 0.001);
      const maxByWidth = ((cell.width / 2) - sideMargin) / sinHalf;
      const maxByEndpoints = (cell.height - apexMargin - farMargin) / cosHalf;
      const maxBySector = cell.height - apexMargin - farMargin;

      return {
        halfRad,
        downward,
        largeCell,
        sideMargin,
        apexMargin,
        farMargin,
        cx,
        cy,
        sinHalf,
        cosHalf,
        maxLenSidesOnly: Math.min(maxByWidth, maxByEndpoints),
        maxLenWithSector: Math.min(maxByWidth, maxByEndpoints, maxBySector)
      };
    }

    function getSafeScalePercent(angles, perPage, singleSheet, fillSector) {
      if (!angles.length) return 108;
      if (!fillSector) return 108;

      // En mode pédagogique, getGeometry() utilise déjà maxLenWithSector.
      // Le plafond précédent appliquait une deuxième fois la marge de sécurité,
      // ce qui rendait surtout le mode 2 par page inutilement petit.
      // Ici, 100% = plus grande taille propre qui reste dans la zone utile.
      return 100;
    }

    function getGeometry(angleDeg, orientation, scalePercent, cell, keepSectorInside = false) {
      const constraints = getGeometryConstraints(angleDeg, orientation, cell);
      const { halfRad, downward, largeCell, cx, cy, sinHalf, cosHalf } = constraints;
      const maxLen = keepSectorInside ? constraints.maxLenWithSector : constraints.maxLenSidesOnly;
      const len = maxLen * (scalePercent / 100);
      const dir = downward ? 1 : -1;

      const left = {
        x: cx - len * sinHalf,
        y: cy + dir * len * cosHalf
      };
      const right = {
        x: cx + len * sinHalf,
        y: cy + dir * len * cosHalf
      };

      const arcR = clamp(len * 0.18, largeCell ? 18 : 8, largeCell ? 42 : 20);
      const labelFont = clamp(
        (largeCell ? 10 : 6.4) + (angleDeg >= 75 ? 1.1 : 0) - (angleDeg <= 20 ? 1.0 : 0),
        largeCell ? 8 : 5.4,
        largeCell ? 12.5 : 8.2
      );
      const estimatedLabelWidth = labelFont * 1.8;
      const labelMinRForWidth = estimatedLabelWidth / (2 * Math.max(sinHalf, 0.05)) + 1.5;
      const labelR = clamp(Math.max(arcR + 7, labelMinRForWidth), arcR + 7, len * 0.58);
      const label = {
        x: cx,
        y: cy + dir * labelR
      };

      return {
        cell,
        cx,
        cy,
        downward,
        halfRad,
        len,
        maxLen,
        left,
        right,
        arcR,
        label,
        labelFont,
        lineWidth: Number(getSelectedRadioValue(els.lineWidthGroup))
      };
    }

    function arcPoints(cx, cy, r, halfRad, downward, segments = 28) {
      const pts = [];
      for (let i = 0; i <= segments; i++) {
        const t = -halfRad + (2 * halfRad * i / segments);
        const x = cx + r * Math.sin(t);
        const y = downward ? (cy + r * Math.cos(t)) : (cy - r * Math.cos(t));
        pts.push({ x, y });
      }
      return pts;
    }

    function pointsToPath(points) {
      return points.map((p, idx) => `${idx === 0 ? 'M' : 'L'} ${fmt(p.x)} ${fmt(p.y)}`).join(' ');
    }

    function makeAngleSVG(angleDeg, orientation, options, cell) {
      const scalePercent = Number(els.scale.value);
      const geo = getGeometry(angleDeg, orientation, scalePercent, cell, options.fillSector);
      const sectorPoints = arcPoints(geo.cx, geo.cy, geo.len, geo.halfRad, geo.downward, 40);
      const smallArcPoints = arcPoints(geo.cx, geo.cy, geo.arcR, geo.halfRad, geo.downward, 30);
      const sectorPath = `M ${fmt(geo.cx)} ${fmt(geo.cy)} L ${fmt(geo.left.x)} ${fmt(geo.left.y)} ${smallArcOrLargeArcPath(sectorPoints)} Z`;
      const arcPath = pointsToPath(smallArcPoints);
      const labelTransform = orientation === 'down' ? ` transform="rotate(180 ${fmt(geo.label.x)} ${fmt(geo.label.y)})"` : '';

      return `
        <svg class="angle-svg" viewBox="0 0 ${geo.cell.width} ${geo.cell.height}" width="${geo.cell.width}mm" height="${geo.cell.height}mm" aria-label="Gabarit ${angleDeg} degrés">
          ${options.fillSector ? `<path d="${sectorPath}" fill="${options.fill}" stroke="none" />` : ''}
          <line x1="${fmt(geo.cx)}" y1="${fmt(geo.cy)}" x2="${fmt(geo.left.x)}" y2="${fmt(geo.left.y)}" stroke="${options.stroke}" stroke-width="${fmt(geo.lineWidth)}" stroke-linecap="round" />
          <line x1="${fmt(geo.cx)}" y1="${fmt(geo.cy)}" x2="${fmt(geo.right.x)}" y2="${fmt(geo.right.y)}" stroke="${options.stroke}" stroke-width="${fmt(geo.lineWidth)}" stroke-linecap="round" />
          ${options.showArc ? `<path d="${arcPath}" fill="none" stroke="${options.arcColor}" stroke-width="${fmt(Math.max(0.45, geo.lineWidth * 0.82))}" stroke-linecap="round" stroke-linejoin="round" />` : ''}
          ${options.showLabel ? `<text x="${fmt(geo.label.x)}" y="${fmt(geo.label.y)}" text-anchor="middle" dominant-baseline="middle" font-size="${fmt(geo.labelFont)}" font-weight="700" font-family="Arial, Helvetica, sans-serif" fill="${options.textColor}"${labelTransform}>${angleDeg}°</text>` : ''}
        </svg>`;
    }

    function smallArcOrLargeArcPath(points) {
      return points.map(p => `L ${fmt(p.x)} ${fmt(p.y)}`).join(' ');
    }

    function buildPedagogicPaletteMap(angles) {
      const map = new Map();
      const extras = angles.filter(angle => !colors.byAngle[angle]);
      extras.forEach((angle, index) => {
        map.set(angle, colors.extras[index % colors.extras.length]);
      });
      return map;
    }

    function getPedagogicPalette(angle, extraMap) {
      return colors.byAngle[angle] || extraMap.get(angle) || colors.extras[0];
    }

    function makePage(angle, extraMap) {
      const perPage = Number(getSelectedRadioValue(els.perPageGroup));
      const pedagogic = els.useColors.checked;
      const palette = getPedagogicPalette(angle, extraMap);

      const options = {
        showArc: els.showArc.checked,
        showLabel: els.showLabel.checked,
        fillSector: pedagogic,
        fill: palette.fill,
        stroke: pedagogic ? palette.stroke : colors.normalStroke,
        arcColor: pedagogic ? palette.text : colors.normalStroke,
        textColor: pedagogic ? palette.text : colors.normalStroke
      };

      const page = document.createElement('section');
      page.className = 'sheet';
      page.innerHTML = `<div class="grid ${perPage === 1 ? 'one' : 'two'}"></div>`;
      const grid = page.querySelector('.grid');

      if (perPage === 1) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.innerHTML = makeAngleSVG(angle, 'single', options, getCellSizeMm(1));
        grid.appendChild(cell);
      } else {
        const top = document.createElement('div');
        top.className = 'cell';
        top.innerHTML = makeAngleSVG(angle, 'up', options, getCellSizeMm(2));

        const bottom = document.createElement('div');
        bottom.className = 'cell';
        bottom.innerHTML = makeAngleSVG(angle, 'down', options, getCellSizeMm(2));

        grid.appendChild(top);
        grid.appendChild(bottom);
      }

      return page;
    }

    function makeCombinedPage(angles, extraMap) {
      const page = document.createElement('section');
      page.className = 'sheet';
      const gridInfo = getGridForCount(angles.length);
      const usableW = pageMm.width - (2 * pageMm.padX);
      const usableH = pageMm.height - (2 * pageMm.padY);
      const gapX = gridInfo.cols > 1 ? pageMm.gapY : 0;
      const gapY = gridInfo.rows > 1 ? pageMm.gapY : 0;
      const cell = {
        width: (usableW - gapX * (gridInfo.cols - 1)) / gridInfo.cols,
        height: (usableH - gapY * (gridInfo.rows - 1)) / gridInfo.rows
      };

      page.innerHTML = `<div class="grid" style="grid-template-columns: repeat(${gridInfo.cols}, 1fr); grid-template-rows: repeat(${gridInfo.rows}, 1fr); column-gap: ${pageMm.gapY}mm; row-gap: ${pageMm.gapY}mm;"></div>`;
      const grid = page.querySelector('.grid');

      angles.forEach(angle => {
        const pedagogic = els.useColors.checked;
        const palette = getPedagogicPalette(angle, extraMap);
        const options = {
          showArc: els.showArc.checked,
          showLabel: els.showLabel.checked,
          fillSector: pedagogic,
          fill: palette.fill,
          stroke: pedagogic ? palette.stroke : colors.normalStroke,
          arcColor: pedagogic ? palette.text : colors.normalStroke,
          textColor: pedagogic ? palette.text : colors.normalStroke
        };

        const cellEl = document.createElement('div');
        cellEl.className = 'cell';
        cellEl.innerHTML = makeAngleSVG(angle, 'single', options, cell);
        grid.appendChild(cellEl);
      });

      return page;
    }

    function applyUrlConfig() {
      const params = new URLSearchParams(window.location.search);
      const angles = params.get('angles');
      const custom = params.get('custom');
      const scale = params.get('scale');
      const perPage = params.get('perPage');
      const lineWidth = params.get('lineWidth');
      const singleSheet = params.get('singleSheet');
      const pedagogic = params.get('pedagogic');
      const showArc = params.get('showArc');
      const showLabel = params.get('showLabel');

      if (scale) els.scale.value = String(clamp(Number(scale), 40, 108));
      if (perPage === '1' || perPage === '2') setRadioGroupValue(els.perPageGroup, perPage);
      if (lineWidth && ['0.45', '0.68'].includes(lineWidth)) setRadioGroupValue(els.lineWidthGroup, lineWidth);
      if (singleSheet !== null) els.singleSheet.checked = singleSheet === '1' || singleSheet === 'true';
      if (pedagogic !== null) els.useColors.checked = pedagogic === '1' || pedagogic === 'true';
      if (showArc !== null) els.showArc.checked = showArc === '1' || showArc === 'true';
      if (showLabel !== null) els.showLabel.checked = showLabel === '1' || showLabel === 'true';

      if (angles) {
        const wanted = new Set(angles.split(',').map(s => Number(s.trim())).filter(Number.isFinite));
        [...els.presetAngles.querySelectorAll('input')].forEach(input => {
          input.checked = wanted.has(Number(input.value));
        });
      }

      if (custom) {
        els.customAngles.value = custom;
      }
    }

    function render() {
      syncSegmentedUI();
      const angles = getAngles();
      const perPage = Number(getSelectedRadioValue(els.perPageGroup));
      const safeScaleMax = getSafeScalePercent(angles, perPage, els.singleSheet.checked, els.useColors.checked);
      els.scale.max = String(safeScaleMax);
      if (Number(els.scale.value) > safeScaleMax) {
        els.scale.value = String(safeScaleMax);
      }
      els.scaleValue.textContent = els.scale.value;
      const extraMap = buildPedagogicPaletteMap(angles);
      els.pages.innerHTML = '';

      if (els.singleSheet.checked) {
        els.pages.appendChild(makeCombinedPage(angles, extraMap));
        els.summary.textContent = `1 page • ${angles.length} angle(s) réparti(s) automatiquement sur la feuille.`;
      } else {
        angles.forEach(angle => els.pages.appendChild(makePage(angle, extraMap)));
        els.summary.textContent = `${angles.length} page(s) • ${perPage === 1 ? '1 grand gabarit' : '2 gabarits tête-bêche'} par page.`;
      }
    }

    function resetAll() {
      buildPresetCheckboxes();
      bindPresetCheckboxes();
      els.customAngles.value = '';
      els.scale.value = '100';
      setRadioGroupValue(els.perPageGroup, '2');
      setRadioGroupValue(els.lineWidthGroup, '0.45');
      els.singleSheet.checked = false;
      els.showArc.checked = true;
      els.showLabel.checked = true;
      els.useColors.checked = false;
      render();
    }

    buildPresetCheckboxes();
    bindPresetCheckboxes();
    setRadioGroupValue(els.perPageGroup, '2');
    setRadioGroupValue(els.lineWidthGroup, '0.45');
    applyUrlConfig();

    [els.customAngles, els.scale, els.singleSheet, els.showArc, els.showLabel, els.useColors].forEach(el => {
      el.addEventListener('input', render);
      el.addEventListener('change', render);
    });

    [els.perPageGroup, els.lineWidthGroup].forEach(group => {
      [...group.querySelectorAll('input')].forEach(input => {
        input.addEventListener('change', render);
      });
    });

    els.printBtn.addEventListener('click', () => window.print());
    els.resetBtn.addEventListener('click', resetAll);

    render();
  </script>
</body>
</html>
