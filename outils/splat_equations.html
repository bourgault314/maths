}

function formatSignedIntegerLabel(value){
  let v = Number(value);
  if(!Number.isFinite(v)) v = 0;
  if(Math.abs(v - Math.round(v)) < 1e-9) v = Math.round(v);
  if(Object.is(v, -0)) v = 0;
  return v < 0 ? `−${Math.abs(v)}` : String(v);
}

function formatSignedCoeffLabel(coeff, varChar = xChar){
  let c = Number(coeff);
  if(!Number.isFinite(c)) c = 0;
  if(Math.abs(c - Math.round(c)) < 1e-9) c = Math.round(c);
  if(Object.is(c, -0)) c = 0;
  if(c === 0) return "0";
  const abs = Math.abs(c);
  const label = abs === 1 ? varChar : `${abs}${varChar}`;
  return c < 0 ? `−${label}` : label;
}

function formatSignedLinearExpression(coeff, constant, varChar = xChar){
  let c = Number(coeff);
  let k = Number(constant);
  if(!Number.isFinite(c)) c = 0;
  if(!Number.isFinite(k)) k = 0;
  if(Math.abs(c - Math.round(c)) < 1e-9) c = Math.round(c);
  if(Math.abs(k - Math.round(k)) < 1e-9) k = Math.round(k);
  if(Object.is(c, -0)) c = 0;
  if(Object.is(k, -0)) k = 0;

  const terms = [];
  if(c !== 0){
    const abs = Math.abs(c);
    terms.push({ sign: c < 0 ? -1 : 1, text: abs === 1 ? varChar : `${abs}${varChar}` });
  }
  if(k !== 0){
    terms.push({ sign: k < 0 ? -1 : 1, text: String(Math.abs(k)) });
  }
  if(!terms.length) return "0";

  let out = "";
  terms.forEach((term, idx)=>{
    if(idx === 0){
      out += term.sign < 0 ? `−${term.text}` : term.text;
    }else{
      out += term.sign < 0 ? ` − ${term.text}` : ` + ${term.text}`;
    }
  });
  return out;
}



function eqSignedCoeff(side){
  const tasks = Math.max(0, Number(side && side.tasks) || 0);
  const flags = Array.isArray(side && side.opposeFlags) ? side.opposeFlags : [];
  let coeff = 0;
  for(let i=0; i<tasks; i++){
    coeff += flags[i] ? -1 : 1;
  }
  return coeff;
}

function buildEquationSignedSolveLines(eq, varChar = xChar){
  if(!eq) return [];
  const a = eqSignedCoeff(eq.left);
  const b = eqSignedCoeff(eq.right);
  const vl = sumArray(eq.left && eq.left.visible);
  const vr = sumArray(eq.right && eq.right.visible);
  const xVal = Number(eq.x) || 0;
  const lines = [];

  function pushUnique(line){
    if(line && (!lines.length || lines[lines.length - 1] !== line)) lines.push(line);
  }

  // 1) Equation de départ : on lit exactement les deux plateaux.
  pushUnique(`${formatSignedLinearExpression(a, vl, varChar)} = ${formatSignedLinearExpression(b, vr, varChar)}`);

  const diff = a - b;
  if(diff === 0) return lines;

  // 2) Lettres d'abord : on enlève les lettres du côté où il y en a le moins,
  //    afin d'obtenir un coefficient positif pour l'inconnue.
  if(diff > 0){
    const d = diff;
    const afterLetters = `${formatSignedLinearExpression(d, vl, varChar)} = ${formatSignedIntegerLabel(vr)}`;
    pushUnique(afterLetters);

    // 3) Puis seulement les constantes.
    const isolated = vr - vl;
    if(vl !== 0){
      pushUnique(`${formatSignedCoeffLabel(d, varChar)} = ${formatSignedIntegerLabel(isolated)}`);
    }
  }else{
    const d = -diff;
    const afterLetters = `${formatSignedLinearExpression(d, vr, varChar)} = ${formatSignedIntegerLabel(vl)}`;
    pushUnique(afterLetters);

    // 3) Puis seulement les constantes.
    const isolated = vl - vr;
    if(vr !== 0){
      pushUnique(`${formatSignedCoeffLabel(d, varChar)} = ${formatSignedIntegerLabel(isolated)}`);
    }
  }

  // 4) Valeur de l'inconnue. pushUnique évite les doublons quand le coefficient vaut 1.
  pushUnique(`${varChar} = ${formatSignedIntegerLabel(xVal)}`);
  return lines;
}

function formatSignedAbsIntegerLabel(value){
  let v = Math.abs(Number(value));
  if(!Number.isFinite(v)) v = 0;
  if(Math.abs(v - Math.round(v)) < 1e-9) v = Math.round(v);
  return String(v);
}

function joinSignedTerms(terms){
  const clean = (Array.isArray(terms) ? terms : []).filter(t => t && t.text !== "" && t.sign !== 0);
  if(!clean.length) return "0";
  let out = "";
  clean.forEach((term, idx)=>{
    const sign = Number(term.sign) < 0 ? -1 : 1;
    const txt = String(term.text);
    if(idx === 0){
      out += sign < 0 ? `−${txt}` : txt;
    }else{
      out += sign < 0 ? ` − ${txt}` : ` + ${txt}`;
    }
  });
  return out;
}

function formatVarCoeffAbs(coeff, varChar = xChar){
  const c = Math.abs(Math.round(Number(coeff) || 0));
  if(c <= 0) return "";
  return c === 1 ? varChar : `${c}${varChar}`;
}





function buildEquationSignedStructuredExpressionSide(side, varChar = xChar){
  const tasks = Math.max(0, Number(side && side.tasks) || 0);
  const flags = Array.isArray(side && side.opposeFlags) ? side.opposeFlags : [];

  let positiveTasks = 0;
  let opposedCount = 0;
  for(let i=0; i<tasks; i++){
    if(flags[i]) opposedCount++;
    else positiveTasks++;
  }

  const terms = [];
  if(positiveTasks > 0){
    terms.push({ sign: 1, text: formatVarCoeffAbs(positiveTasks, varChar) });
  }
  if(opposedCount > 0){
    terms.push({ sign: -1, text: formatVarCoeffAbs(opposedCount, varChar) });
  }

  const visible = Array.isArray(side && side.visible) ? side.visible : [];
  visible.forEach(v=>{
    let n = Number(v);
    if(!Number.isFinite(n) || n === 0) return;
    if(Math.abs(n - Math.round(n)) < 1e-9) n = Math.round(n);
    terms.push({ sign: n < 0 ? -1 : 1, text: formatSignedAbsIntegerLabel(n) });
  });

  return joinSignedTerms(terms);
}

function buildEquationSignedStructuredEquation(eq, varChar = xChar){
  if(!eq) return "";
  return `${buildEquationSignedStructuredExpressionSide(eq.left, varChar)} = ${buildEquationSignedStructuredExpressionSide(eq.right, varChar)}`;
}

function buildEquationSignedPrintCorrectionLines(eq, varChar = xChar){
  const structuredLine = buildEquationSignedStructuredEquation(eq, varChar);
  const simplifiedLines = buildEquationSignedSolveLines(eq, varChar);
  const lines = [];
  function pushUnique(line){
    if(line && (!lines.length || lines[lines.length - 1] !== line)) lines.push(line);
  }
  pushUnique(structuredLine);
  simplifiedLines.forEach(pushUnique);
  return lines;
}

function drawPrintEquationLinesLikeProjection(targetGroup, lines, opts = {}){
  if(!Array.isArray(lines) || !lines.length) return;
  const mkText = opts.text || text;
  const centerX = Number(opts.centerX) || 800;
  const fontSize = Number(opts.fontSize) || 64;
  const equalFontSize = Number(opts.equalFontSize) || fontSize;
  const gap = Number(opts.gap) || 92;
  const eqGap = Number(opts.eqGap) || 40;
  const centerY = Number(opts.centerY) || 1020;
  const startY = centerY - ((lines.length - 1) * gap / 2);

  lines.forEach((line, i)=>{
    const raw = String(line == null ? "" : line);
    const eqIndex = raw.indexOf("=");
    const cy = startY + i * gap;
    if(eqIndex >= 0){
      const lhs = raw.slice(0, eqIndex).trim();
      const rhs = raw.slice(eqIndex + 1).trim();
      drawProjectionEquationLine(targetGroup, centerX, cy, lhs, rhs, {
        text: mkText,
        fill: opts.fill || "#000",
        fontSize,
        equalFontSize,
        eqGap
      });
    }else{
      targetGroup.appendChild(mkText(centerX, cy, raw, {
        "text-anchor":"middle",
        "font-size":String(fontSize),
        "fill": opts.fill || "#000",
        "font-weight":"normal",
        "font-family":"'Times New Roman', Times, serif",
        "font-style":"italic",
        "dominant-baseline":"middle"
      }));
    }
  });
}






function isProgressiveRevealCard(card){
  return !!card && (card.family === "U" || card.family === "N" || card.family === "NPM" || card.family === "EQ" || card.family === "EQPM" || card.family === "EQSTEP");
}

function getMaxRevealState(card){
  if(!card) return 0;
  if(card.family === "EQSTEP") return getEquationStepStates(card._eq, getCardVarChar(card)).length;
  if(isProgressiveRevealCard(card)) return 2;
  return 2;
}

function shouldRevealEquationAnswers(card, revealState){
  if(!card) return false;
  if(card.family === "EQSTEP") return revealState >= getMaxRevealState(card);
  return revealState >= 2;
}





function makeEqStepGroupedParts(coeff, vis, xVal, varChar = xChar, opts = {}){
  const out = [];
  const c = Math.max(0, Number(coeff) || 0);
  const v = Math.max(0, Number(vis) || 0);
  const xSafe = Math.max(1, Number(xVal) || 1);
  const removeX = Math.max(0, Number(opts.removeX) || 0);
  const hiddenStartIndex = Math.max(0, Math.round(Number(opts.hiddenStartIndex) || 0));
  const visiblePosIndex = Math.max(0, Math.round(Number(opts.visiblePosIndex) || 0));

  for(let i=0;i<c;i++){
    out.push({
      value:xSafe,
      label:varChar,
      measureLabel:String(xSafe),
      hidden:true,
      kind:"x",
      removed:i<removeX,
      posIndex:hiddenStartIndex + i
    });
  }

  if(Array.isArray(opts.visibleSplit) && opts.visibleSplit.length){
    opts.visibleSplit.forEach((p, idx)=>{
      const val=Math.max(0, Number(p.value)||0);
      if(val>0){
        const rawPos = Number(p.posIndex);
        out.push({
          value:val,
          label:String(val),
          measureLabel:String(val),
          hidden:false,
          kind:"v",
          removed:!!p.removed,
          posIndex:Number.isFinite(rawPos) ? Math.max(0, Math.round(rawPos)) : idx
        });
      }
    });
  }else if(v>0){
    out.push({
      value:v,
      label:String(v),
      measureLabel:String(v),
      hidden:false,
      kind:"v",
      removed:!!opts.removeVisible,
      posIndex:visiblePosIndex
    });
  }

  if(!out.length) out.push({value:1,label:"",measureLabel:"",hidden:false,kind:"empty",posIndex:0});
  return out;
}

function formatEqStepDecomposedSide(coeff, splitParts, varChar = xChar){
  const terms=[];
  const c=Math.max(0, Number(coeff)||0);
  if(c>0) terms.push(c===1 ? varChar : String(c)+varChar);
  (splitParts||[]).forEach(p=>{ const v=Math.max(0, Number(p && p.value)||0); if(v>0) terms.push(String(v)); });
  return terms.length ? terms.join(" + ") : "0";
}
function getEquationStepStates(eq, varChar = xChar){
  if(!eq) return [];
  const xVal = Math.max(1, Number(eq.x) || 1);
  const a = Math.max(0, Number(eq.left && eq.left.tasks) || 0);
  const b = Math.max(0, Number(eq.right && eq.right.tasks) || 0);
  const vl = Math.max(0, eqVisibleSum(eq.left));
  const vr = Math.max(0, eqVisibleSum(eq.right));
  const states=[];

  function push(kind,leftParts,rightParts,equation,extra={}){
    states.push({kind,leftParts,rightParts,equation,...extra});
  }

  // 1) Premier clic : on affiche déjà l'écriture combinée.
  push(
    "combined",
    makeEqStepGroupedParts(a, vl, xVal, varChar),
    makeEqStepGroupedParts(b, vr, xVal, varChar),
    formatEqSideFromCoeffVis(a, vl, varChar) + " = " + formatEqSideFromCoeffVis(b, vr, varChar)
  );

  // 2) On hachure uniquement les lettres communes.
  const commonX = Math.min(a, b);
  const a2 = a - commonX;
  const b2 = b - commonX;
  if(commonX > 0){
    push(
      "hatchX",
      makeEqStepGroupedParts(a, vl, xVal, varChar, {removeX: commonX}),
      makeEqStepGroupedParts(b, vr, xVal, varChar, {removeX: commonX}),
      formatEqSideFromCoeffVis(a, vl, varChar) + " = " + formatEqSideFromCoeffVis(b, vr, varChar),
      { commonX }
    );
    push(
      "afterX",
      makeEqStepGroupedParts(a2, vl, xVal, varChar, {hiddenStartIndex: commonX}),
      makeEqStepGroupedParts(b2, vr, xVal, varChar, {hiddenStartIndex: commonX}),
      formatEqSideFromCoeffVis(a2, vl, varChar) + " = " + formatEqSideFromCoeffVis(b2, vr, varChar)
    );
  }

  // 3) Puis on hachure les constantes communes.
  const commonV = Math.min(vl, vr);
  const vl2 = vl - commonV;
  const vr2 = vr - commonV;
  if(commonV > 0){
    const leftSplit = [];
    const rightSplit = [];
    if(commonV > 0) leftSplit.push({value: commonV, removed: true, posIndex: 0});
    if(vl2 > 0) leftSplit.push({value: vl2, removed: false, posIndex: 1});
    if(commonV > 0) rightSplit.push({value: commonV, removed: true, posIndex: 0});
    if(vr2 > 0) rightSplit.push({value: vr2, removed: false, posIndex: 1});
    push(
      "hatchV",
      makeEqStepGroupedParts(a2, vl, xVal, varChar, {hiddenStartIndex: commonX, visibleSplit: leftSplit}),
      makeEqStepGroupedParts(b2, vr, xVal, varChar, {hiddenStartIndex: commonX, visibleSplit: rightSplit}),
      formatEqStepDecomposedSide(a2, leftSplit, varChar) + " = " + formatEqStepDecomposedSide(b2, rightSplit, varChar),
      { commonV }
    );
    push(
      "afterV",
      makeEqStepGroupedParts(a2, vl2, xVal, varChar, {hiddenStartIndex: commonX, visiblePosIndex: vl2 > 0 ? 1 : 0}),
      makeEqStepGroupedParts(b2, vr2, xVal, varChar, {hiddenStartIndex: commonX, visiblePosIndex: vr2 > 0 ? 1 : 0}),
      formatEqSideFromCoeffVis(a2, vl2, varChar) + " = " + formatEqSideFromCoeffVis(b2, vr2, varChar)
    );
  }

  // 4) Dernière étape :
  // on ne fait plus disparaître les tâches restantes.
  // Exemple : si on arrive à 4C = 16, on garde les 4 tâches et on révèle
  // la valeur cachée sous chacune d'elles.
  // Important : on garde aussi le côté naturel de l'équation.
  // Si la variable restante est à gauche, on écrit C = 4 ;
  // si elle est à droite, on écrit 4 = C.
  const varIsOnLeft = a2 > 0 || (a > b);
  const finalEq = varIsOnLeft ? (varChar + " = " + xVal) : (xVal + " = " + varChar);
  if(varIsOnLeft){
    const remainingCoeff = Math.max(1, a2);
    const remainingValue = Math.max(0, vr2);
    push("final",
      makeEqStepGroupedParts(remainingCoeff, 0, xVal, varChar, {hiddenStartIndex: commonX}),
      makeEqStepGroupedParts(0, remainingValue, xVal, varChar, {visiblePosIndex: remainingValue > 0 ? 1 : 0}),
      finalEq,
      {final:true, variableSide:"left", remainingCoeff, remainingValue}
    );
  }else{
    const remainingCoeff = Math.max(1, b2);
    const remainingValue = Math.max(0, vl2);
    push("final",
      makeEqStepGroupedParts(0, remainingValue, xVal, varChar, {visiblePosIndex: remainingValue > 0 ? 1 : 0}),
      makeEqStepGroupedParts(remainingCoeff, 0, xVal, varChar, {hiddenStartIndex: commonX}),
      finalEq,
      {final:true, variableSide:"right", remainingCoeff, remainingValue}
    );
  }
  return states;
}
function getEquationStepState(eq, revealState, varChar = xChar){
  const states=getEquationStepStates(eq,varChar);
  if(!states.length) return null;
  return states[clamp(Math.round(Number(revealState)||1)-1,0,states.length-1)];
}
function getEquationStepTableMetricsFromInitial(eq, varChar = xChar){
  const xVal = Math.max(1, Number(eq && eq.x) || 1);
  // On reprend la grammaire du schéma du mode E classique : même hauteur,
  // même police, mêmes minima de cases. La seule différence est que le schéma
  // est centré, puisqu'en E pas à pas il est affiché seul.
  const baseW = 700;
  const rowH = 66;
  const fontSize = 58;
  const pad = 26;
  const minHiddenCellW = 78;
  const minVisibleCellW = 98;
  const minHiddenCellWValue1 = 78;
  const minVisibleCellWValue1 = 98;
  const total = Math.max(1, Number(eq && eq.total) || 1);
  const fixedUnit = baseW / total;

  const hiddenCellW = Math.max(
    xVal * fixedUnit,
    xVal === 1 ? minHiddenCellWValue1 : minHiddenCellW
  );
  const variableFontSize = Math.min(fontSize * 1.16, hiddenCellW * 0.70);

  return {
    baseW,
    fixedUnit,
    rowH,
    fontSize,
    pad,
    variableFontSize,
    minHiddenCellW,
    minVisibleCellW,
    minHiddenCellWValue1,
    minVisibleCellWValue1
  };
}



function cloneEqStepPart(part){
  return Object.assign({}, part || {});
}

function buildEqStepRepeatedVisibleParts(count, value){
  const n = Math.max(1, Number(count) || 1);
  const v = Math.max(0, Number(value) || 0);
  const out = [];
  for(let i=0;i<n;i++){
    out.push({
      value: v,
      label: String(v),
      measureLabel: String(v),
      hidden: false,
      kind: "v",
      removed: false
    });
  }
  return out;
}

function getEquationStepSchemaParts(eq, state, varChar = xChar){
  if(!eq || !state){
    return {
      leftParts: state && state.leftParts ? state.leftParts : [],
      rightParts: state && state.rightParts ? state.rightParts : []
    };
  }

  const xVal = Math.max(1, Number(eq && eq.x) || 1);
  const leftParts = Array.isArray(state.leftParts) ? state.leftParts.map(cloneEqStepPart) : [];
  const rightParts = Array.isArray(state.rightParts) ? state.rightParts.map(cloneEqStepPart) : [];

  const leftHiddenCount = leftParts.filter(p => p && p.hidden).length;
  const rightHiddenCount = rightParts.filter(p => p && p.hidden).length;
  const variableSide = leftHiddenCount > 0 ? "left" : (rightHiddenCount > 0 ? "right" : (state.variableSide || "left"));

  if(state.kind === "hatchV"){
    function reorderOppositeRow(parts, rowName){
      const hasHidden = parts.some(p => p && p.hidden);
      if(hasHidden) return parts;

      const removed = parts.filter(p => p && !p.hidden && p.kind !== "empty" && !!p.removed);
      const kept = parts.filter(p => p && !p.hidden && p.kind !== "empty" && !p.removed);
      const empties = parts.filter(p => p && p.kind === "empty");

      if(variableSide === "left"){
        // Variable restante sur la ligne du haut/gauche :
        // le reste numérique doit être du même côté que la variable.
        return (rowName === "right")
          ? [...kept, ...removed, ...empties]
          : [...removed, ...kept, ...empties];
      }else{
        // Variable restante sur la ligne du bas/droite :
        // même logique, mais symétrique. Le morceau utile passe AVANT le morceau hachuré
        // pour rester aligné avec la variable.
        return (rowName === "left")
          ? [...kept, ...removed, ...empties]
          : [...removed, ...kept, ...empties];
      }
    }

    return {
      leftParts: reorderOppositeRow(leftParts, "left"),
      rightParts: reorderOppositeRow(rightParts, "right")
    };
  }

  if(state.kind === "final" && state.final){
    const remainingCoeff = Math.max(
      1,
      Number(state.remainingCoeff) ||
      (variableSide === "left" ? leftHiddenCount : rightHiddenCount) ||
      1
    );
    const repeatedValues = buildEqStepRepeatedVisibleParts(remainingCoeff, xVal);

    if(variableSide === "left"){
      const hiddenRow = leftHiddenCount ? leftParts : makeEqStepGroupedParts(remainingCoeff, 0, xVal, varChar);
      return {
        leftParts: hiddenRow,
        rightParts: repeatedValues
      };
    }else{
      const hiddenRow = rightHiddenCount ? rightParts : makeEqStepGroupedParts(remainingCoeff, 0, xVal, varChar);
      return {
        leftParts: repeatedValues,
        rightParts: hiddenRow
      };
    }
  }

  return { leftParts, rightParts };
}

function visibleIndexForSchemaParts(parts){
  return (Array.isArray(parts) ? parts : []).findIndex(part => part && !part.hidden && part.kind !== "empty");
}

function hiddenPrefixWidthForSchema(widths, count){
  return (Array.isArray(widths) ? widths : [])
    .slice(0, Math.max(0, Number(count) || 0))
    .reduce((sum, w) => sum + Math.max(0, Number(w) || 0), 0);
}

function fallbackEqStepSchemaWidth(part, metrics){
  const value = Math.max(1, Number(part && part.value) || 1);
  const fixedUnit = Math.max(1, Number(metrics && metrics.fixedUnit) || 1);
  const proportional = Math.max(1, value * fixedUnit);
  if(part && part.hidden){
    const hiddenMin = (value === 1) ? metrics.minHiddenCellWValue1 : metrics.minHiddenCellW;
    return Math.max(proportional, hiddenMin);
  }
  const visibleMin = (value === 1) ? metrics.minVisibleCellWValue1 : metrics.minVisibleCellW;
  return Math.max(proportional, visibleMin);
}

function fitEqStepSchemaWidthsToParts(parts, widths, metrics){
  const safeParts = Array.isArray(parts) ? parts : [];
  const safeWidths = Array.isArray(widths) ? widths.map(w => Math.max(1, Number(w) || 1)) : [];
  if(safeParts.length === safeWidths.length) return safeWidths.slice();
  return safeParts.map((part, idx)=>{
    if(idx < safeWidths.length) return safeWidths[idx];
    return fallbackEqStepSchemaWidth(part, metrics);
  });
}

function getHiddenWidthsFromSchemaRow(parts, widths, metrics){
  const safeParts = Array.isArray(parts) ? parts : [];
  const safeWidths = fitEqStepSchemaWidthsToParts(safeParts, widths, metrics);
  const out = [];
  safeParts.forEach((part, idx)=>{
    if(part && part.hidden) out.push(Math.max(1, Number(safeWidths[idx]) || 1));
  });
  return out;
}

function buildEquationStepInitialSchemaLayout(eq, varChar, metrics){
  const initialState = getEquationStepState(eq, 1, varChar);
  const initialParts = getEquationStepSchemaParts(eq, initialState, varChar);
  const y = getEquationStepSchemaMidY() - metrics.rowH;
  const dummy = el("g", {id:"eqStepSingaporeTableMeasure"});
  const layout = drawEquationSingaporeTable(dummy, {
    cx: 1190,
    y,
    total: Math.max(1, Number(eq && eq.total) || 1),
    row1: initialParts.leftParts,
    row2: initialParts.rightParts,
    rect:(a)=>el("rect", a),
    line:(a)=>el("line", a),
    text:(x,y,t,a)=>text(x,y,t,a),
    compactEquation: false,
    fixedUnit: metrics.fixedUnit,
    disableLabelInflation: true,
    fitLabelToCell: true,
    forceCommonHiddenCellW: true,
    baseW: metrics.baseW,
    maxW: 740,
    minHiddenCellW: metrics.minHiddenCellW,
    minVisibleCellW: metrics.minVisibleCellW,
    minHiddenCellWValue1: metrics.minHiddenCellWValue1,
    minVisibleCellWValue1: metrics.minVisibleCellWValue1,
    rowH: metrics.rowH,
    fontSize: metrics.fontSize,
    variableFontSize: metrics.variableFontSize,
    pad: metrics.pad,
    stroke: "#000",
    strokeWidth: 4,
    hiddenFill: "rgba(0,0,0,0.10)",
    visibleFill: "rgba(255,255,255,0)",
    textColor: "#000"
  });
  return {
    x: layout.x,
    y,
    row1Parts: initialParts.leftParts.slice(),
    row2Parts: initialParts.rightParts.slice(),
    row1Widths: layout.rows[0].segments.map(seg => Math.max(1, Number(seg.w) || 1)),
    row2Widths: layout.rows[1].segments.map(seg => Math.max(1, Number(seg.w) || 1))
  };
}

function applyEquationStepCommonXRemoval(layout, commonX){
  const n = Math.max(0, Number(commonX) || 0);
  if(n <= 0) return Object.assign({}, layout, {
    row1Parts: layout.row1Parts.slice(),
    row2Parts: layout.row2Parts.slice(),
    row1Widths: layout.row1Widths.slice(),
    row2Widths: layout.row2Widths.slice()
  });

  const shiftWidth = Math.max(
    hiddenPrefixWidthForSchema(layout.row1Widths, n),
    hiddenPrefixWidthForSchema(layout.row2Widths, n)
  );
  return {
    x: layout.x + shiftWidth,
    y: layout.y,
    row1Parts: layout.row1Parts.slice(n),
    row2Parts: layout.row2Parts.slice(n),
    row1Widths: layout.row1Widths.slice(n),
    row2Widths: layout.row2Widths.slice(n)
  };
}

function getEquationStepSharedVisibleWidth(layout){
  const idx1 = visibleIndexForSchemaParts(layout.row1Parts);
  const idx2 = visibleIndexForSchemaParts(layout.row2Parts);
  const w1 = idx1 >= 0 ? Math.max(0, Number(layout.row1Widths[idx1]) || 0) : 0;
  const w2 = idx2 >= 0 ? Math.max(0, Number(layout.row2Widths[idx2]) || 0) : 0;
  if(w1 <= 0 || w2 <= 0) return 0;
  return Math.min(w1, w2);
}

function widthsForEquationStepVisibleSplit(prevParts, prevWidths, currentParts, sharedVisibleW, metrics){
  const safePrevParts = Array.isArray(prevParts) ? prevParts : [];
  const safePrevWidths = fitEqStepSchemaWidthsToParts(safePrevParts, prevWidths, metrics);
  const safeCurrentParts = Array.isArray(currentParts) ? currentParts : [];

  const hiddenWidths = getHiddenWidthsFromSchemaRow(safePrevParts, safePrevWidths, metrics);
  let hiddenCursor = 0;
  const visibleIdx = visibleIndexForSchemaParts(safePrevParts);
  const originalVisibleW = visibleIdx >= 0 ? Math.max(0, Number(safePrevWidths[visibleIdx]) || 0) : 0;
  const removedW = Math.min(Math.max(0, Number(sharedVisibleW) || 0), originalVisibleW);
  const keptW = Math.max(0, originalVisibleW - removedW);

  return safeCurrentParts.map(part => {
    if(part && part.hidden){
      const w = hiddenWidths[hiddenCursor++];
      return Math.max(1, Number(w) || fallbackEqStepSchemaWidth(part, metrics));
    }
    if(part && part.kind === "empty"){
      return fallbackEqStepSchemaWidth(part, metrics);
    }
    return Math.max(1, part && part.removed ? removedW : keptW);
  });
}

function buildEquationStepSchemaLayoutForState(eq, state, varChar, metrics){
  const currentParts = getEquationStepSchemaParts(eq, state, varChar);
  const initialLayout = buildEquationStepInitialSchemaLayout(eq, varChar, metrics);

  const a = Math.max(0, Number(eq && eq.left && eq.left.tasks) || 0);
  const b = Math.max(0, Number(eq && eq.right && eq.right.tasks) || 0);
  const commonX = Math.min(a, b);
  const vl = Math.max(0, eqVisibleSum(eq.left));
  const vr = Math.max(0, eqVisibleSum(eq.right));
  const commonV = Math.min(vl, vr);

  let baseLayout = initialLayout;
  if(state && (state.kind === "afterX" || state.kind === "hatchV" || state.kind === "afterV" || state.kind === "final")){
    baseLayout = applyEquationStepCommonXRemoval(initialLayout, commonX);
  }

  let row1Widths = baseLayout.row1Widths.slice();
  let row2Widths = baseLayout.row2Widths.slice();

  if(state && state.kind === "hatchV" && commonV > 0){
    const sharedVisibleW = getEquationStepSharedVisibleWidth(baseLayout);
    row1Widths = widthsForEquationStepVisibleSplit(baseLayout.row1Parts, baseLayout.row1Widths, currentParts.leftParts, sharedVisibleW, metrics);
    row2Widths = widthsForEquationStepVisibleSplit(baseLayout.row2Parts, baseLayout.row2Widths, currentParts.rightParts, sharedVisibleW, metrics);
  }else if(state && (state.kind === "afterV" || state.kind === "final") && commonV > 0){
    const sharedVisibleW = getEquationStepSharedVisibleWidth(baseLayout);
    row1Widths = widthsForEquationStepVisibleSplit(baseLayout.row1Parts, baseLayout.row1Widths, currentParts.leftParts, sharedVisibleW, metrics);
    row2Widths = widthsForEquationStepVisibleSplit(baseLayout.row2Parts, baseLayout.row2Widths, currentParts.rightParts, sharedVisibleW, metrics);
  }

  if(state && state.kind === "final" && state.final){
    const leftHasHidden = currentParts.leftParts.some(part => part && part.hidden);
    const hiddenParts = leftHasHidden ? baseLayout.row1Parts : baseLayout.row2Parts;
    const hiddenWidthsSource = leftHasHidden ? baseLayout.row1Widths : baseLayout.row2Widths;
    let hiddenWidths = getHiddenWidthsFromSchemaRow(hiddenParts, hiddenWidthsSource, metrics);
    const needed = Math.max(
      currentParts.leftParts.length,
      currentParts.rightParts.length,
      Math.max(1, Number(state.remainingCoeff) || 1)
    );
    if(hiddenWidths.length < needed){
      const fallbackPart = (leftHasHidden ? currentParts.leftParts : currentParts.rightParts).find(part => part && part.hidden) || {hidden:true, value:Math.max(1, Number(eq && eq.x) || 1)};
      while(hiddenWidths.length < needed) hiddenWidths.push(fallbackEqStepSchemaWidth(fallbackPart, metrics));
    }
    hiddenWidths = hiddenWidths.slice(0, needed).map(w => Math.max(1, Number(w) || 1));
    row1Widths = hiddenWidths.slice(0, currentParts.leftParts.length);
    row2Widths = hiddenWidths.slice(0, currentParts.rightParts.length);
  }

  return {
    x: baseLayout.x,
    y: baseLayout.y,
    row1Parts: currentParts.leftParts,
    row2Parts: currentParts.rightParts,
    row1Widths: fitEqStepSchemaWidthsToParts(currentParts.leftParts, row1Widths, metrics),
    row2Widths: fitEqStepSchemaWidthsToParts(currentParts.rightParts, row2Widths, metrics)
  };
}

function drawEquationStepSingaporeTable(targetGroup, card, revealState, extraOpts = {}){
  const eq = card && card._eq;
  if(!eq) return null;

  const varChar = getCardVarChar(card);
  const schemaRevealState = Math.max(1, Math.round(Number(revealState) || 0));
  const state = getEquationStepState(eq, schemaRevealState, varChar);
  if(!state) return null;

  const metrics = getEquationStepTableMetricsFromInitial(eq, varChar);
  const gTable = el("g", {id:"eqStepSingaporeTable"});

  const schemaMode = getEquationStepView() === "schema";
  const stableLayout = schemaMode
    ? buildEquationStepSchemaLayoutForState(eq, state, varChar, metrics)
    : null;

  const tableLeftParts = stableLayout ? stableLayout.row1Parts : state.leftParts;
  const tableRightParts = stableLayout ? stableLayout.row2Parts : state.rightParts;
  const tableTotal = Math.max(
    1,
    tableLeftParts.reduce((sum, p)=>sum + Math.max(0, Number(p && p.value) || 0), 0),
    tableRightParts.reduce((sum, p)=>sum + Math.max(0, Number(p && p.value) || 0), 0)
  );

  const tableOpts = {
    x: stableLayout ? stableLayout.x : undefined,
    cx: stableLayout ? undefined : (schemaMode ? 1190 : 800),
    y: stableLayout ? stableLayout.y : (schemaMode ? (getEquationStepSchemaMidY() - metrics.rowH) : 34),
    total: tableTotal,
    row1: tableLeftParts,
    row2: tableRightParts,
    rect:(a)=>el("rect", a),
    line:(a)=>el("line", a),
    text:(x,y,t,a)=>text(x,y,t,a),
    compactEquation: false,
    fixedUnit: stableLayout ? undefined : metrics.fixedUnit,
    disableLabelInflation: true,
    fitLabelToCell: true,
    baseW: metrics.baseW,
    maxW: stableLayout ? undefined : (schemaMode ? 740 : undefined),
    row1Widths: stableLayout ? stableLayout.row1Widths : undefined,
    row2Widths: stableLayout ? stableLayout.row2Widths : undefined,
    forceCommonHiddenCellW: schemaMode && !stableLayout,
    minHiddenCellW: metrics.minHiddenCellW,
    minVisibleCellW: metrics.minVisibleCellW,
    minHiddenCellWValue1: metrics.minHiddenCellWValue1,
    minVisibleCellWValue1: metrics.minVisibleCellWValue1,
    rowH: metrics.rowH,
    fontSize: metrics.fontSize,
    variableFontSize: metrics.variableFontSize,
    pad: metrics.pad,
    stroke: "#000",
    strokeWidth: 4,
    hiddenFill: "rgba(0,0,0,0.10)",
    visibleFill: "rgba(255,255,255,0)",
    textColor: "#000"
  };

  Object.assign(tableOpts, extraOpts || {});

  const layout = drawEquationSingaporeTable(gTable, tableOpts);
  targetGroup.appendChild(gTable);
  return layout;
}

function drawEquationStepEquation(targetGroup, card, revealState){
  const eq = card && card._eq;
  if(!eq || revealState <= 0) return;
  const varChar = getCardVarChar(card);
  const lines = getEquationStepVisibleLines(eq, revealState, varChar);
  if(!lines.length) return;

  const n = Math.max(1, lines.length);
  let eqFontSize = (n >= 4) ? 38 : (n >= 3 ? 42 : 46);
  let eqGap = (n >= 4) ? 36 : (n >= 3 ? 40 : 46);

  const topLimit = 44;
  const bottomLimit = 164;
  const available = Math.max(0, bottomLimit - topLimit);
  const wantedHeight = (n - 1) * eqGap;
  if(wantedHeight > available && n > 1){
    eqGap = Math.max(30, Math.floor(available / (n - 1)));
    eqFontSize = Math.min(eqFontSize, Math.max(34, eqGap + 4));
  }
  const blockHeight = (n - 1) * eqGap;
  const startY = Math.round(topLimit + Math.max(0, (available - blockHeight) / 2));

  drawEquationLines(targetGroup, lines, 800, startY, {
    text:(x,y,t,a)=>text(x,y,t,a),
    fill:"#000",
    fontSize: eqFontSize,
    gap: eqGap,
    anchor:"start",
    alignEquals: true,
    eqGap: 22,
    fontFamily:"'Times New Roman', Times, serif",
    fontStyle:"italic"
  });
}

function drawEquationStepAid(targetGroup, card, revealState){
  const eq = card && card._eq;
  if(!eq) return;

  if(getEquationStepView() === "schema"){
    if(revealState <= 0){
      drawEquationStepSchemaIntro(targetGroup, card);
      return;
    }
    drawEquationStepSingaporeTable(targetGroup, card, revealState);
    return;
  }

  if(revealState <= 0) return;
  drawEquationStepEquation(targetGroup, card, revealState);
}

function renderCardEquation(card, revealState, useTokens){
  const eq = card._eq;
  const trays = card._eqTrays;
  const pos = card._eqPos;
  if(!eq || !trays || !pos) return;
  const layer = svg;

  const cover = "rgba(0,0,0,0.95)";
  const revealCol = "rgba(220,220,220,0.35)";
  const hasAidTable = (card.family === "EQ" && revealState > 0);
  const useEqStepSchemaLayout = (card.family === "EQSTEP" && getEquationStepView() === "schema");
  const schemaGeometry = useEqStepSchemaLayout ? buildEquationStepSchemaColumnGeometry(card) : null;
  const activeTrays = schemaGeometry ? schemaGeometry.trays : trays;
  const activePos = schemaGeometry ? schemaGeometry.pos : pos;
  const hasEquationStepAid = (card.family === "EQSTEP" && (revealState > 0 || useEqStepSchemaLayout));
  const hasEquationSignedAid = (card.family === "EQPM" && revealState > 0);
  const varChar = getCardVarChar(card);
  const revealAnswers = shouldRevealEquationAnswers(card, revealState);

  layer.appendChild(el("rect",{
    x:activeTrays.left.x, y:activeTrays.left.y, width:activeTrays.left.w, height:activeTrays.left.h,
    rx:30, fill:"rgba(0,0,0,0.03)", stroke:"rgba(0,0,0,0.20)", "stroke-width":"5"
  }));
  layer.appendChild(el("rect",{
    x:activeTrays.right.x, y:activeTrays.right.y, width:activeTrays.right.w, height:activeTrays.right.h,
    rx:30, fill:"rgba(0,0,0,0.03)", stroke:"rgba(0,0,0,0.20)", "stroke-width":"5"
  }));

  if(activeTrays.vertical){
    layer.appendChild(el("line",{
      x1:activeTrays.left.x-10, y1:activeTrays.midY,
      x2:activeTrays.left.x+activeTrays.left.w+10, y2:activeTrays.midY,
      stroke:"#000", "stroke-width":"10", "stroke-linecap":"round"
    }));
  }else{
    layer.appendChild(el("line",{
      x1:activeTrays.midX, y1:activeTrays.left.y-10,
      x2:activeTrays.midX, y2:activeTrays.left.y+activeTrays.left.h+10,
      stroke:"#000", "stroke-width":"10", "stroke-linecap":"round"
    }));
  }

  if(!hasAidTable && !hasEquationStepAid && !hasEquationSignedAid){
    layer.appendChild(text(800, 78, "Même quantité à gauche qu'à droite",{
      "text-anchor":"middle", "font-size":"44", "fill":"rgba(0,0,0,0.92)", "font-weight":"900"
    }));

    if ((eq.left.tasks + eq.right.tasks) > 1) {
      const isSigned = (card.family === "EQPM");
      const ruleText = isSigned
          ? "Sous chaque tache se cache le même nombre."
          : "Sous chaque tache, il y a le même nombre de billes.";
      layer.appendChild(text(800, 130, ruleText,{
        "text-anchor":"middle", "font-size":"32", "fill":"rgba(0,0,0,0.70)", "font-weight":"700"
      }));
    }
  }

  function drawSide(side, metaSide, sideName){
    const beadR = side.beadR ?? 26;
    const font = Math.max(18, Math.round(beadR * 0.95));
    const isEqStep = (card.family === "EQSTEP" && revealState > 0);
    const stepState = isEqStep ? getEquationStepState(eq, revealState, varChar) : null;
    const stepDisplayParts = (stepState && stepState.kind === "final" && stepState.final)
      ? getEquationStepSchemaParts(eq, stepState, varChar)
      : null;
    const stepParts = stepState
      ? ((sideName === "left")
          ? (stepDisplayParts ? stepDisplayParts.leftParts : stepState.leftParts)
          : (stepDisplayParts ? stepDisplayParts.rightParts : stepState.rightParts))
      : null;

    function drawHatchOverlayPath(d){
      addHatchPath(layer, d);
    }

    function drawHatchOverlayCircle(cx, cy, r){
      addHatchCircle(layer, cx, cy, r);
    }

    function drawVisibleBead(p, val, removed=false){
      const col = beadColorForValue(val);
      layer.appendChild(el("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:col.fill, stroke:col.stroke, "stroke-width":"5"}));
      if(removed) drawHatchOverlayCircle(p.cx, p.cy, beadR);
      layer.appendChild(text(p.cx, p.cy + Math.round(font*0.32), String(val),{
        "text-anchor":"middle", "font-size":String(font), fill: removed ? "rgba(0,0,0,0.45)" : "#000", "font-weight":"900"
      }));
    }

    if(isEqStep && Array.isArray(stepParts)){
      const hiddenParts = stepParts.filter(p => p && p.hidden);
      const visibleParts = stepParts.filter(p => p && !p.hidden && p.kind !== "empty");
      const currentKind = stepState ? stepState.kind : "";

      function drawHiddenRevealedBead(p, val){
        let f = "var(--beadH-fill)";
        let s = "var(--beadH-stroke)";
        if(useTokens){
          const col = beadColorForValue(val);
          f = col.fill;
          s = col.stroke;
        }
        layer.appendChild(el("circle",{
          cx:p.cx, cy:p.cy, r:beadR,
          fill:f, stroke:s, "stroke-width":"5"
        }));
        layer.appendChild(text(
          p.cx,
          p.cy + Math.round(font * 0.32),
          String(val),
          {
            "text-anchor":"middle",
            "font-size":String(font),
            fill:"#000",
            "font-weight":"900"
          }
        ));
      }

      hiddenParts.forEach((part, idx)=>{
        const rawPosIndex = Number(part && part.posIndex);
        const posIndex = Number.isFinite(rawPosIndex) ? Math.max(0, Math.round(rawPosIndex)) : idx;
        const s = side.splats?.[posIndex] || side.splats?.[idx] || {cx:820, cy:610, r:74};
        const pHidden = side.posH?.[posIndex] || side.posH?.[idx] || {cx:s.cx, cy:s.cy};
        const d = blobPath(s.cx, s.cy, s.r);

        const isRemoved = !!part.removed;
        const isFinalReveal = (currentKind === "final" && !isRemoved);

        // E bis — pas à pas :
        // - les tâches supprimées deviennent claires et hachurées ;
        // - les tâches encore inconnues restent noires ;
        // - à la dernière étape, la tâche restante devient claire et laisse apparaître sa valeur.
        if(isFinalReveal){
          drawHiddenRevealedBead(pHidden, part.value);
        }

        const fillCol = (isRemoved || isFinalReveal) ? revealCol : cover;
        const strokeCol = (isRemoved || isFinalReveal)
          ? "rgba(0,0,0,0.14)"
          : "rgba(0,0,0,0.18)";

        layer.appendChild(el("path",{
          d,
          fill: fillCol,
          stroke: strokeCol,
          "stroke-width":"5"
        }));

        if(isRemoved){
          drawHatchOverlayPath(d);
        }
      });

      visibleParts.forEach((part, idx)=>{
        const rawPosIndex = Number(part && part.posIndex);
        const posIndex = Number.isFinite(rawPosIndex) ? Math.max(0, Math.round(rawPosIndex)) : idx;
        const p = side.posV?.[posIndex] || side.posV?.[idx] || {cx:450+idx*80, cy:580};
        drawVisibleBead(p, part.value, !!part.removed);
      });

      return;
    }

    let hIndex = 0;
    for(const taskArr of metaSide.hiddenByTask){
      for(const val of taskArr){
        const p = side.posH?.[hIndex] || {cx:820, cy:610};
        let f = "var(--beadH-fill)";
        let s = "var(--beadH-stroke)";
        if(useTokens){
            const col = beadColorForValue(val);
            f = col.fill; s = col.stroke;
        }
        layer.appendChild(el("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:f, stroke:s, "stroke-width":"5"}));
        layer.appendChild(text(p.cx, p.cy + Math.round(font*0.32), String(val),{
          "text-anchor":"middle", "font-size":String(font), fill:"#000", "font-weight":"900"
        }));
        hIndex++;
      }
    }

    const oppFlags = Array.isArray(metaSide.opposeFlags) ? metaSide.opposeFlags : null;
    (side.splats || []).forEach((s, idx)=>{
      const pSplat = el("path",{
        d: blobPath(s.cx, s.cy, s.r),
        fill: revealAnswers ? revealCol : cover,
        stroke:"rgba(0,0,0,0.18)",
        "stroke-width":"5"
      });
      layer.appendChild(pSplat);

      if(oppFlags && oppFlags[idx]){
        const fs = clamp(Math.round(s.r*0.28), 16, 44);
        const yy = revealAnswers ? (s.cy - s.r*0.65) : (s.cy);
        layer.appendChild(text(s.cx, yy, "opposé", {
          "text-anchor":"middle",
          "dominant-baseline":"middle",
          "font-size": String(fs),
          "font-weight":"900",
          "fill": (revealAnswers ? "rgba(0,0,0,0.92)" : "rgba(255,255,255,0.95)"),
          "stroke": (revealAnswers ? "rgba(255,255,255,0.78)" : "rgba(0,0,0,0)"),
          "stroke-width": (revealAnswers ? "5" : "0"),
          "paint-order":"stroke fill"
        }));
      }

      if(revealAnswers){
        const pCov = el("path",{
          d: blobPath(s.cx, s.cy, s.r),
          fill: cover,
          stroke: "none",
          "class": "anim-fade-out"
        });
        layer.appendChild(pCov);
      }
    });

    for(let i=0;i<metaSide.visible.length;i++){
      const p = side.posV?.[i] || {cx:450+i*40, cy:360};
      const val = metaSide.visible[i];
      drawVisibleBead(p, val, false);
    }
  }

  drawSide(activePos.left, eq.left, "left");
  drawSide(activePos.right, eq.right, "right");

  if(hasAidTable){
    const visL = eqVisibleSum(eq.left);
    const visR = eqVisibleSum(eq.right);
    const tableMode = (revealState === 1) ? "symbolic" : "filled";
    const row1Parts = buildEquationTableParts(eq.total, eq.left.tasks, visL, eq.x, tableMode, varChar);
    const row2Parts = buildEquationTableParts(eq.total, eq.right.tasks, visR, eq.x, tableMode, varChar);
    const gTable = el("g", {id:"eqSingaporeTable"});
    const projTableW = 640;
    const layout = drawEquationSingaporeTable(gTable, {
      cx: 520,
      y: 34,
      total: eq.total,
      row1: row1Parts,
      row2: row2Parts,
      rect:(a)=>el("rect", a),
      line:(a)=>el("line", a),
      text:(x,y,t,a)=>text(x,y,t,a),
      compactEquation: false,
      baseW: projTableW,
      maxW: projTableW,
      forceCommonHiddenCellW: true,
      disableLabelInflation: true,
      minHiddenCellW: 68,
      minVisibleCellW: 84,
      rowH: 56,
      fontSize: 50,
      pad: 24,
      stroke: "#000",
      strokeWidth: 4,
      hiddenFill: "rgba(0,0,0,0.10)",
      visibleFill: "rgba(255,255,255,0)",
      textColor: "#000"
    });
    layer.appendChild(gTable);

    const lines = (revealState === 1) ? [buildEquationSolveLines(eq, varChar)[0]] : buildEquationSolveLines(eq, varChar);
    const eqFontSize = revealState === 1 ? 40 : 38;
    const eqAlignGap = 18;
    const longestLhs = Math.max(0, ...lines.map(line => {
      const raw = String(line == null ? "" : line);
      const idx = raw.indexOf("=");
      if(idx < 0) return 0;
      return approxTextWidthForLabel(raw.slice(0, idx).trim(), eqFontSize);
    }));
    const eqLeftPad = 36;
    const eqX = Math.max(1085, Math.round(layout.right + eqLeftPad + longestLhs + eqAlignGap));
    const eqY = (revealState === 1)
      ? 96
      : (lines.length >= 4 ? 58 : 82);
    const eqGap = (revealState === 1)
      ? 44
      : (lines.length >= 4 ? 34 : 40);
    drawEquationLines(layer, lines, eqX, eqY, {
      text:(x,y,t,a)=>text(x,y,t,a),
      fill:"#000",
      fontSize: eqFontSize,
      gap: eqGap,
      anchor:"start",
      alignEquals: true,
      eqGap: eqAlignGap
    });
  }


  if(hasEquationStepAid){
    drawEquationStepAid(layer, card, revealState);
  }

  if(hasEquationSignedAid){
    const allLines = buildEquationSignedSolveLines(eq, varChar);
    const lines = (revealState === 1) ? allLines.slice(0, 1) : allLines;

    let eqFontSize, eqGap, startY;
    if(revealState === 1){
      // Aide seule : on garde une grande equation, lisible et centrée au-dessus de la balance.
      eqFontSize = 54;
      eqGap = 62;
      startY = 96;
    }else{
      // Correction complète : police un peu plus compacte et lignes rapprochées
      // pour que la première ligne ne parte jamais hors de l'écran.
      const n = Math.max(1, lines.length);
      eqFontSize = (n >= 5) ? 38 : (n >= 4 ? 42 : 46);
      eqGap = (n >= 5) ? 34 : (n >= 4 ? 38 : 44);

      const topLimit = 48;
      const bottomLimit = Math.max(topLimit, activeTrays.left.y - 26);
      const available = Math.max(0, bottomLimit - topLimit);
      const wantedHeight = (n - 1) * eqGap;

      if(wantedHeight > available && n > 1){
        eqGap = Math.max(30, Math.floor(available / (n - 1)));
        eqFontSize = Math.min(eqFontSize, Math.max(34, eqGap + 4));
      }

      const blockHeight = (n - 1) * eqGap;
      startY = Math.round(topLimit + Math.max(0, (available - blockHeight) / 2));
    }

    drawEquationLines(layer, lines, activeTrays.midX, startY, {
      text:(x,y,t,a)=>text(x,y,t,a),
      fill:"#000",
      fontSize: eqFontSize,
      gap: eqGap,
      anchor:"start",
      alignEquals: true,
      eqGap: 22,
      fontFamily:"'Times New Roman', Times, serif",
      fontStyle:"italic"
    });
  }
}



function renderCardEquationStepPrintScene(targetGroup, card, revealState, opts = {}){
  const eq = card && card._eq;
  if(!eq) return;

  const layoutMode = opts.layoutMode === "schema" ? "schema" : "equation";
  const showIntroText = !!opts.showIntroText;
  const showAid = !!opts.showAid;
  const forceStepEquationLine = !!opts.forceStepEquationLine;

  const basePos = card._eqPos;
  if(!baseTrays || !basePos) return;

  const schemaGeometry = (layoutMode === "schema") ? buildEquationStepSchemaColumnGeometry(card) : null;
  const trays = schemaGeometry ? schemaGeometry.trays : baseTrays;
  const pos = schemaGeometry ? schemaGeometry.pos : basePos;

  const cover = "rgba(0,0,0,0.95)";
  const revealCol = "rgba(220,220,220,0.35)";
  const varChar = getCardVarChar(card);
  const stepState = revealState > 0 ? getEquationStepState(eq, revealState, varChar) : null;

  targetGroup.appendChild(el("rect",{
    x:trays.left.x, y:trays.left.y, width:trays.left.w, height:trays.left.h,
    rx:30, fill:"rgba(0,0,0,0.025)", stroke:"rgba(0,0,0,0.18)", "stroke-width":"5"
  }));
  targetGroup.appendChild(el("rect",{
    x:trays.right.x, y:trays.right.y, width:trays.right.w, height:trays.right.h,
    rx:30, fill:"rgba(0,0,0,0.025)", stroke:"rgba(0,0,0,0.18)", "stroke-width":"5"
  }));

  if(trays.vertical){
    targetGroup.appendChild(el("line",{
      x1:trays.left.x-10, y1:trays.midY,
      x2:trays.left.x+trays.left.w+10, y2:trays.midY,
      stroke:"#000", "stroke-width":"10", "stroke-linecap":"round"
    }));
  }else{
    targetGroup.appendChild(el("line",{
      x1:trays.midX, y1:trays.left.y-10,
      x2:trays.midX, y2:trays.left.y+trays.left.h+10,
      stroke:"#000", "stroke-width":"10", "stroke-linecap":"round"
    }));
  }

  if(showIntroText && revealState <= 0){
    targetGroup.appendChild(text(800, 78, "Même quantité à gauche qu'à droite",{
      "text-anchor":"middle", "font-size":"44", "fill":"rgba(0,0,0,0.92)", "font-weight":"900"
    }));
    if((eq.left.tasks + eq.right.tasks) > 1){
      targetGroup.appendChild(text(800, 130, "Sous chaque tache, il y a le même nombre de billes.",{
        "text-anchor":"middle", "font-size":"32", "fill":"rgba(0,0,0,0.70)", "font-weight":"700"
      }));
    }
  }

  function drawVisibleBead(p, val, beadR, removed=false){
    const col = beadColorForValue(val);
    targetGroup.appendChild(el("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:col.fill, stroke:col.stroke, "stroke-width":"5"}));
    if(removed) addHatchCirclePrint(targetGroup, p.cx, p.cy, beadR);
    const font = Math.max(18, Math.round(beadR * 0.95));
    targetGroup.appendChild(text(p.cx, p.cy + Math.round(font*0.32), String(val),{
      "text-anchor":"middle", "font-size":String(font), fill: removed ? "rgba(0,0,0,0.45)" : "#000", "font-weight":"900"
    }));
  }

  function drawHiddenRevealedBead(p, val, beadR){
    let f = "rgba(0,0,0,0.055)";
    let st = "rgba(0,0,0,0.24)";
    if(useTokens){
      const col = beadColorForValue(val);
      f = col.fill;
      st = col.stroke;
    }
    targetGroup.appendChild(el("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:f, stroke:st, "stroke-width":"5"}));
    const font = Math.max(18, Math.round(beadR * 0.95));
    targetGroup.appendChild(text(p.cx, p.cy + Math.round(font*0.32), String(val),{
      "text-anchor":"middle", "font-size":String(font), fill:"#000", "font-weight":"900"
    }));
  }

  function drawSide(side, metaSide, sideName){
    const beadR = side.beadR || 30;

    if(stepState){
      const stepDisplayParts = (stepState.kind === "final" && stepState.final)
        ? getEquationStepSchemaParts(eq, stepState, varChar)
        : null;
      const stepParts = sideName === "left"
        ? (stepDisplayParts ? stepDisplayParts.leftParts : stepState.leftParts)
        : (stepDisplayParts ? stepDisplayParts.rightParts : stepState.rightParts);
      const hiddenParts = (stepParts || []).filter(p => p && p.hidden);
      const visibleParts = (stepParts || []).filter(p => p && !p.hidden && p.kind !== "empty");
      const currentKind = stepState.kind || "";

      hiddenParts.forEach((part, idx)=>{
        const rawPosIndex = Number(part && part.posIndex);
        const posIndex = Number.isFinite(rawPosIndex) ? Math.max(0, Math.round(rawPosIndex)) : idx;
        const s = side.splats?.[posIndex] || side.splats?.[idx] || {cx:820, cy:610, r:74};
        const pHidden = side.posH?.[posIndex] || side.posH?.[idx] || {cx:s.cx, cy:s.cy};
        const d = blobPath(s.cx, s.cy, s.r);
        const isRemoved = !!part.removed;
        const isFinalReveal = (currentKind === "final" && !isRemoved);

        if(isFinalReveal) drawHiddenRevealedBead(pHidden, part.value, beadR);

        targetGroup.appendChild(el("path",{
          d,
          fill:(isRemoved || isFinalReveal) ? revealCol : cover,
          stroke:(isRemoved || isFinalReveal) ? "rgba(0,0,0,0.14)" : "rgba(0,0,0,0.18)",
          "stroke-width":"5"
        }));
        if(isRemoved) addHatchPathPrint(targetGroup, d);
      });

      visibleParts.forEach((part, idx)=>{
        const rawPosIndex = Number(part && part.posIndex);
        const posIndex = Number.isFinite(rawPosIndex) ? Math.max(0, Math.round(rawPosIndex)) : idx;
        const p = side.posV?.[posIndex] || side.posV?.[idx] || {cx:450+idx*80, cy:580};
        drawVisibleBead(p, part.value, beadR, !!part.removed);
      });
      return;
    }

    (side.splats || []).forEach(s=>{
      targetGroup.appendChild(el("path",{d:blobPath(s.cx, s.cy, s.r), fill:cover, stroke:"rgba(0,0,0,0.18)", "stroke-width":"5"}));
    });
    (metaSide.visible || []).forEach((val, i)=>{
      const p = side.posV?.[i] || {cx:450+i*80, cy:580};
      drawVisibleBead(p, val, beadR, false);
    });
  }

  drawSide(pos.left, eq.left, "left");
  drawSide(pos.right, eq.right, "right");

  if(showAid){
    if(layoutMode === "schema"){
      if(revealState > 0) drawEquationStepSingaporeTable(targetGroup, card, revealState, {addHatchRectFn:addHatchRectPrint});
    }else{
      const line = stepState && stepState.equation ? stepState.equation : (getEquationStepVisibleLines(eq, revealState, varChar).slice(-1)[0] || "");
      if(line){
        drawPrintEquationLinesLikeProjection(targetGroup, [line], {
          text:(x,y,t,a)=>text(x,y,t,a),
          centerX:trays.midX || 800,
          centerY: forceStepEquationLine ? 106 : 104,
          fontSize:54,
          equalFontSize:54,
          gap:0,
          eqGap:28,
          fill:"#000"
        });
      }
    }
  }
}

function renderCardEquationStepPrint(targetSvg, card, printMode, tEl, tText, useTokens){
  const eq = card && card._eq;
  if(!eq) return;
  ensureHatchDefs(targetSvg);
  ensurePrintHatchDefs(targetSvg);
  const view = getEquationStepView();
  const isSchema = view === "schema";
  const varChar = getCardVarChar(card);
  const states = getEquationStepStates(eq, varChar);

  function drawFramedStep(revealState, slotY, slotH, label){
    const gFrame = tEl("g", {id:"eqStepPrintFrame"});
    gFrame.appendChild(tEl("rect",{x:28, y:slotY+8, width:1544, height:slotH-16, rx:18, fill:"rgba(0,0,0,0.00)", stroke:"rgba(0,0,0,0.10)", "stroke-width":"3"}));
    if(label){
      gFrame.appendChild(tText(58, slotY+52, label, {"text-anchor":"start", "font-size":"34", "fill":"rgba(0,0,0,0.62)", "font-weight":"900"}));
    }
    const scale = Math.min(0.98, (slotH - 28) / 1000);
    const tx = (1600 - 1600 * scale) / 2;
    const ty = slotY + (slotH - 1000 * scale) / 2 + 10;
    const gScene = tEl("g", {transform:"translate("+tx+" "+ty+") scale("+scale+")"});
    renderCardEquationStepPrintScene(gScene, card, revealState, {
      layoutMode: isSchema ? "schema" : "equation",
      showIntroText:false,
      showAid:true,
      forceStepEquationLine:true,
      useTokens
    });
    gFrame.appendChild(gScene);
    targetSvg.appendChild(gFrame);
  }

  if(printMode === "statement"){
    const g = tEl("g", {id:"eqStepPrintStatement"});

    /* En vue Schéma, les plateaux verticaux commencent très haut :
       on réserve donc un vrai bandeau de consigne, puis on descend
       uniquement la scène pour qu'elle ne chevauche jamais le texte. */
    if(isSchema){
      g.appendChild(tText(800, 82, "Même quantité en haut et en bas",{
        "text-anchor":"middle", "font-size":"44", "fill":"rgba(0,0,0,0.92)", "font-weight":"900"
      }));
      if((eq.left.tasks + eq.right.tasks) > 1){
        g.appendChild(tText(800, 134, "Sous chaque tache, il y a le même nombre de billes.",{
          "text-anchor":"middle", "font-size":"32", "fill":"rgba(0,0,0,0.70)", "font-weight":"700"
        }));
      }

      const gScene = tEl("g", {transform:"translate(0 150)"});
      renderCardEquationStepPrintScene(gScene, card, 0, {
        layoutMode:"schema",
        showIntroText:false,
        showAid:false,
        useTokens
      });
      g.appendChild(gScene);
    }else{
      renderCardEquationStepPrintScene(g, card, 0, {
        layoutMode:"equation",
        showIntroText:true,
        showAid:false,
        useTokens
      });
    }

    targetSvg.appendChild(g);
    return;
  }

  if(printMode === "worksheet"){
    const g = tEl("g", {id:"eqStepPrintWorksheet"});
    renderCardEquationStepPrintScene(g, card, 1, {
      layoutMode: isSchema ? "schema" : "equation",
      showIntroText:false,
      showAid:true,
      forceStepEquationLine:true,
      useTokens
    });
    targetSvg.appendChild(g);
    return;
  }

  const n = Math.max(1, states.length);
  const top = 26;
  const bottom = 2174;
  const gap = 14;
  const slotH = (bottom - top - gap * (n - 1)) / n;
  for(let i=0;i<n;i++){
    const y = top + i * (slotH + gap);
    drawFramedStep(i+1, y, slotH, "Étape " + (i+1));
  }
}

function renderCardEquationPrint(targetSvg, card, printMode, tEl, tText, useTokens){
  if(card && card.family === "EQSTEP"){
    renderCardEquationStepPrint(targetSvg, card, printMode, tEl, tText, useTokens);
    return;
  }
  const revealAnswers = (printMode === "correction");
  const eq = card._eq;
  const trays = card._eqTrays;
  const pos = card._eqPos;
  if(!eq || !trays || !pos) return;

  const cover = "rgba(0,0,0,0.95)";
  const revealCol = "rgba(220,220,220,0.35)";
  const usePrintTables = (card.family === "EQ" && (printMode === "worksheet" || printMode === "correction"));
  const varChar = getCardVarChar(card);

  targetSvg.appendChild(tEl("rect",{x:trays.left.x, y:trays.left.y, width:trays.left.w, height:trays.left.h, rx:30, fill:"rgba(0,0,0,0.02)", stroke:"rgba(0,0,0,0.15)","stroke-width":"6"}));
  targetSvg.appendChild(tEl("rect",{x:trays.right.x, y:trays.right.y, width:trays.right.w, height:trays.right.h, rx:30, fill:"rgba(0,0,0,0.02)", stroke:"rgba(0,0,0,0.15)","stroke-width":"6"}));

  targetSvg.appendChild(tEl("line",{x1:trays.midX, y1:trays.left.y-10, x2:trays.midX, y2:trays.left.y+trays.left.h+10, stroke:"#000","stroke-width":"10","stroke-linecap":"round"}));

  targetSvg.appendChild(tText(800, 78, "Même quantité à gauche qu'à droite", {"text-anchor":"middle","font-size":"44","fill":"rgba(0,0,0,0.92)","font-weight":"900"}));

  if ((eq.left.tasks + eq.right.tasks) > 1) {
    const isSigned = (card.family === "EQPM");
    const ruleText = isSigned
        ? "Sous chaque tache se cache le même nombre."
        : "Sous chaque tache, il y a le même nombre de billes.";
    targetSvg.appendChild(tText(800, 130, ruleText, {
      "text-anchor":"middle",
      "font-size":"32",
      "fill":"rgba(0,0,0,0.70)",
      "font-weight":"700"
    }));
  }

  function drawSide(side, metaSide){
    const beadR = side.beadR ?? 26;
    const font = Math.max(18, Math.round(beadR * 0.95));

    let hIndex = 0;
    for(const taskArr of metaSide.hiddenByTask){
      for(const val of taskArr){
        const p = side.posH?.[hIndex] || {cx:820, cy:610};
        let f = "rgba(0,0,0,0.06)";
        let s = "rgba(0,0,0,0.22)";
        if(useTokens){
            const col = beadColorForValue(val);
            f = col.fill; s = col.stroke;
        }
        targetSvg.appendChild(tEl("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:f, stroke:s, "stroke-width":"5"}));
        targetSvg.appendChild(tText(p.cx, p.cy + Math.round(font*0.32), String(val), {"text-anchor":"middle","font-size":String(font),"fill":"#000","font-weight":"900"}));
        hIndex++;
      }
    }

    const oppFlags = Array.isArray(metaSide.opposeFlags) ? metaSide.opposeFlags : null;
    (side.splats || []).forEach((s, idx)=>{
      targetSvg.appendChild(tEl("path",{d: blobPath(s.cx, s.cy, s.r), fill: revealAnswers ? revealCol : cover, stroke:"rgba(0,0,0,0.18)","stroke-width":"5"}));
      if(oppFlags && oppFlags[idx]){
        const fs = clamp(Math.round(s.r*0.28), 16, 44);
        const yy = revealAnswers ? (s.cy - s.r*0.65) : (s.cy);
        targetSvg.appendChild(tText(s.cx, yy, "opposé", {
          "text-anchor":"middle",
          "dominant-baseline":"middle",
          "font-size": String(fs),
          "font-weight":"900",
          "fill": (revealAnswers ? "rgba(0,0,0,0.92)" : "rgba(255,255,255,0.95)"),
          "stroke": (revealAnswers ? "rgba(255,255,255,0.78)" : "rgba(0,0,0,0)"),
          "stroke-width": (revealAnswers ? "5" : "0"),
          "paint-order":"stroke fill"
        }));
      }
    });

    for(let i=0;i<metaSide.visible.length;i++){
      const p = side.posV?.[i] || {cx:450+i*40, cy:360};
      const val = metaSide.visible[i];
      const col = beadColorForValue(val);
      targetSvg.appendChild(tEl("circle",{cx:p.cx, cy:p.cy, r:beadR, fill:col.fill, stroke:col.stroke, "stroke-width":"5"}));
      targetSvg.appendChild(tText(p.cx, p.cy + Math.round(font*0.32), String(val), {"text-anchor":"middle","font-size":String(font),"fill":"#000","font-weight":"900"}));
    }
  }

  drawSide(pos.left, eq.left, "left");
  drawSide(pos.right, eq.right, "right");

  if(card.family === "EQPM" && (printMode === "worksheet" || printMode === "correction")){
    const gEqPm = tEl("g", {id:"eqSignedPrintSteps"});
    const simplifiedLines = buildEquationSignedSolveLines(eq, varChar);
    const lines = (printMode === "worksheet")
      ? (simplifiedLines.length ? [simplifiedLines[0]] : [])
      : buildEquationSignedPrintCorrectionLines(eq, varChar);

    if(lines.length){
      const longest = lines.reduce((m, line)=>Math.max(m, String(line).length), 0);
      const isHelpOnly = printMode === "worksheet";
      // Mise en page spéciale E± : comme pour B±, la zone basse de la carte imprimée
      // est largement disponible. On agrandit et on descend l’aide / la correction
      // pour éviter une trace écrite trop discrète.
      const fontSize = isHelpOnly
        ? (longest > 54 ? 72 : (longest > 44 ? 80 : (longest > 34 ? 88 : 96)))
        : (longest > 68 ? 50 : (longest > 58 ? 56 : (longest > 48 ? 62 : (longest > 38 ? 68 : 74))));
      const gap = isHelpOnly ? 0 : (fontSize + 20);
      const centerY = isHelpOnly ? 1225 : 1280;

      drawPrintEquationLinesLikeProjection(gEqPm, lines, {
        text:(x,y,t,a)=>tText(x,y,t,a),
        centerX:800,
        centerY,
        fontSize,
        equalFontSize:fontSize,
        gap,
        eqGap:isHelpOnly ? 40 : 36,
        fill:"#000"
      });
      targetSvg.appendChild(gEqPm);
    }
    return;
  }

  if(!usePrintTables) return;

  const gEq = tEl("g", {id:"eqPrintSteps"});
  let currentY = 920;
  const visL = eqVisibleSum(eq.left);
  const visR = eqVisibleSum(eq.right);
  const vl = visL;
  const vr = visR;

  if(printMode === "worksheet"){
    drawEquationSingaporeTable(gEq, {
      cx: 800,
      y: currentY,
      total: eq.total,
      row1: buildEquationTableParts(eq.total, eq.left.tasks, visL, eq.x, "blank", varChar),
      row2: buildEquationTableParts(eq.total, eq.right.tasks, visR, eq.x, "blank", varChar),
      rect:(a)=>tEl("rect", a),
      line:(a)=>tEl("line", a),
      text:(x,y,t,a)=>tText(x,y,t,a),
      baseW: 980,
      rowH: 100,
      fontSize: 86,
      pad: 38,
      stroke: "#000",
      strokeWidth: 5,
      hiddenFill: "rgba(0,0,0,0.10)",
      visibleFill: "rgba(255,255,255,0)",
      textColor: "#000"
    });
  } else {
    const fullW = 1040;
    const maxTableW = 1040;
    const minHiddenPrintW = 76;
    const minVisiblePrintW = 94;
    const minHiddenPrintWValue1 = 104;
    const minVisiblePrintWValue1 = 118;
    const startX = 800 - fullW / 2;
    const unit = fullW / Math.max(1, Number(eq.total) || 1);

    function partsFor(coeff, vis){
      return buildEquationTableParts(Math.max(1, coeff * Math.max(1, Number(eq.x) || 1) + vis), coeff, vis, eq.x, "symbolic", varChar);
    }
    function cloneState(state){
      return {
        x: state.x,
        row1Parts: state.row1Parts.slice(),
        row2Parts: state.row2Parts.slice(),
        row1Widths: state.row1Widths.slice(),
        row2Widths: state.row2Widths.slice()
      };
    }
    function trimZeroSegments(parts, widths){
      const outParts = [];
      const outWidths = [];
      for(let i=0;i<parts.length;i++){
        const w = Math.max(0, Number(widths[i]) || 0);
        if(w <= 0.01) continue;
        outParts.push(parts[i]);
        outWidths.push(w);
      }
      return { parts: outParts, widths: outWidths };
    }
    function hiddenPrefixWidth(widths, count){
      return widths.slice(0, Math.max(0, count)).reduce((sum, w) => sum + Math.max(0, Number(w) || 0), 0);
    }
    function visibleIndex(parts){
      return parts.findIndex(part => part && !part.hidden);
    }
    function subtractSharedVisible(parts, widths, sharedW){
      const outParts = parts.slice();
      const outWidths = widths.slice();
      const idx = visibleIndex(outParts);
      if(idx >= 0){
        outWidths[idx] = Math.max(0, (Number(outWidths[idx]) || 0) - sharedW);
        if(outWidths[idx] <= 0.01){
          outParts.splice(idx, 1);
          outWidths.splice(idx, 1);
        } else if(outParts[idx]) {
          outParts[idx] = { ...outParts[idx], value: Math.max(0, Number(outParts[idx].value) || 0) };
        }
      }
      return trimZeroSegments(outParts, outWidths);
    }

    const states = [];
    const initialRow1 = partsFor(eq.left.tasks, visL);
    const initialRow2 = partsFor(eq.right.tasks, visR);
    const initialLayout = drawEquationSingaporeTable(gEq, {
      x: startX,
      y: currentY,
      total: eq.total,
      row1: initialRow1,
      row2: initialRow2,
      rect:(a)=>tEl("rect", a),
      line:(a)=>tEl("line", a),
      text:(x,y,t,a)=>tText(x,y,t,a),
      fixedUnit: unit,
      baseW: fullW,
      maxW: maxTableW,
      disableLabelInflation: true,
      rowH: 100,
      fontSize: 86,
      pad: 34,
      stroke: "#000",
      strokeWidth: 5,
      hiddenFill: "rgba(0,0,0,0.10)",
      visibleFill: "rgba(255,255,255,0)",
      textColor: "#000",
      minHiddenCellW: minHiddenPrintW,
      minVisibleCellW: minVisiblePrintW,
      minHiddenCellWValue1: minHiddenPrintWValue1,
      minVisibleCellWValue1: minVisiblePrintWValue1,
      forceCommonHiddenCellW: true,
      variableFontSize: 60,
      fitLabelToCell: true
    });
    states.push({
      x: startX,
      row1Parts: initialRow1,
      row2Parts: initialRow2,
      row1Widths: initialLayout.rows[0].segments.map(seg => Math.max(1, Number(seg.w) || 1)),
      row2Widths: initialLayout.rows[1].segments.map(seg => Math.max(1, Number(seg.w) || 1))
    });
    currentY += 250;

    const a = Math.max(0, Number(eq.left?.tasks) || 0);
    const b = Math.max(0, Number(eq.right?.tasks) || 0);
    const xVal = Math.max(1, Number(eq?.x) || 1);
    const commonX = Math.min(a, b);
    const a2 = a - commonX;
    const b2 = b - commonX;
    const commonV = Math.min(vl, vr);
    const vl2 = vl - commonV;
    const vr2 = vr - commonV;
    const currentState = () => states[states.length - 1];

    if(commonX > 0){
      const prev = currentState();
      const shiftWidth = Math.max(hiddenPrefixWidth(prev.row1Widths, commonX), hiddenPrefixWidth(prev.row2Widths, commonX));
      const nextState = {
        x: prev.x + shiftWidth,
        row1Parts: partsFor(a2, vl),
        row2Parts: partsFor(b2, vr),
        row1Widths: prev.row1Widths.slice(commonX),
        row2Widths: prev.row2Widths.slice(commonX)
      };
      states.push(nextState);
      drawEquationSingaporeTable(gEq, {
        x: nextState.x,
        y: currentY,
        total: Math.max(1, eq.total - commonX * xVal),
        row1: nextState.row1Parts,
        row2: nextState.row2Parts,
        row1Widths: nextState.row1Widths,
        row2Widths: nextState.row2Widths,
        rect:(a)=>tEl("rect", a),
        line:(a)=>tEl("line", a),
        text:(x,y,t,a)=>tText(x,y,t,a),
        rowH: 100,
        fontSize: 86,
        pad: 34,
        stroke: "#000",
        strokeWidth: 5,
        hiddenFill: "rgba(0,0,0,0.10)",
        visibleFill: "rgba(255,255,255,0)",
        textColor: "#000",
        variableFontSize: 60,
        fitLabelToCell: true
      });
      currentY += 250;
    }

    if(commonV > 0){
      const prev = currentState();
      const idx1 = visibleIndex(prev.row1Parts);
      const idx2 = visibleIndex(prev.row2Parts);
      const w1 = idx1 >= 0 ? Math.max(0, Number(prev.row1Widths[idx1]) || 0) : 0;
      const w2 = idx2 >= 0 ? Math.max(0, Number(prev.row2Widths[idx2]) || 0) : 0;
      const sharedVisibleW = Math.min(w1, w2);
      const nextRow1 = subtractSharedVisible(prev.row1Parts, prev.row1Widths, sharedVisibleW);
      const nextRow2 = subtractSharedVisible(prev.row2Parts, prev.row2Widths, sharedVisibleW);
      const nextState = {
        x: prev.x,
        row1Parts: partsFor(a2, vl2),
        row2Parts: partsFor(b2, vr2),
        row1Widths: nextRow1.widths,
        row2Widths: nextRow2.widths
      };
      states.push(nextState);
      drawEquationSingaporeTable(gEq, {
        x: nextState.x,
        y: currentY,
        total: Math.max(1, (eq.total - commonX * xVal) - commonV),
        row1: nextState.row1Parts,
        row2: nextState.row2Parts,
        row1Widths: nextState.row1Widths,
        row2Widths: nextState.row2Widths,
        rect:(a)=>tEl("rect", a),
        line:(a)=>tEl("line", a),
        text:(x,y,t,a)=>tText(x,y,t,a),
        rowH: 100,
        fontSize: 86,
        pad: 34,
        stroke: "#000",
        strokeWidth: 5,
        hiddenFill: "rgba(0,0,0,0.10)",
        visibleFill: "rgba(255,255,255,0)",
        textColor: "#000",
        variableFontSize: 60,
        fitLabelToCell: true
      });
      currentY += 250;
    }

    const alreadySolvedUnit = (a2 === 1 && b2 === 0 && vl2 === 0 && vr2 > 0) ||
                              (b2 === 1 && a2 === 0 && vr2 === 0 && vl2 > 0);
    const diffCoeff = Math.abs(a - b);
    if(diffCoeff >= 1 && !alreadySolvedUnit){
      const prev = currentState();
      const row1HiddenCount = prev.row1Parts.filter(part => part && part.hidden).length;
      const row2HiddenCount = prev.row2Parts.filter(part => part && part.hidden).length;
      const hiddenSide = row1HiddenCount > 0 ? 'left' : (row2HiddenCount > 0 ? 'right' : null);
      const coeffRemain = hiddenSide === 'left' ? row1HiddenCount : row2HiddenCount;
      if(hiddenSide && coeffRemain > 1){
        const hiddenWidths = hiddenSide === 'left' ? prev.row1Widths : prev.row2Widths;
        const visibleParts = hiddenSide === 'left' ? prev.row2Parts : prev.row1Parts;
        const visibleWidths = hiddenSide === 'left' ? prev.row2Widths : prev.row1Widths;
        const visibleIdx = visibleIndex(visibleParts);
        const totalHiddenW = hiddenWidths.slice(0, coeffRemain).reduce((sum, w) => sum + Math.max(0, Number(w) || 0), 0);
        const totalVisibleW = visibleIdx >= 0 ? Math.max(0, Number(visibleWidths[visibleIdx]) || 0) : totalHiddenW;
        const oneHiddenW = totalHiddenW / coeffRemain;
        const oneVisibleW = totalVisibleW / coeffRemain;
        const nextState = {
          x: prev.x,
          row1Parts: hiddenSide === 'left' ? partsFor(1, 0) : partsFor(0, xVal),
          row2Parts: hiddenSide === 'left' ? partsFor(0, xVal) : partsFor(1, 0),
          row1Widths: hiddenSide === 'left' ? [oneHiddenW] : [oneVisibleW],
          row2Widths: hiddenSide === 'left' ? [oneVisibleW] : [oneHiddenW]
        };
        states.push(nextState);
        drawEquationSingaporeTable(gEq, {
          x: nextState.x,
          y: currentY,
          total: xVal,
          row1: nextState.row1Parts,
          row2: nextState.row2Parts,
          row1Widths: nextState.row1Widths,
          row2Widths: nextState.row2Widths,
          rect:(a)=>tEl("rect", a),
          line:(a)=>tEl("line", a),
          text:(x,y,t,a)=>tText(x,y,t,a),
          rowH: 100,
          fontSize: 86,
          pad: 34,
          stroke: "#000",
          strokeWidth: 5,
          hiddenFill: "rgba(0,0,0,0.10)",
          visibleFill: "rgba(255,255,255,0)",
          textColor: "#000",
          variableFontSize: 60,
          fitLabelToCell: true
        });
        currentY += 250;
      }
    }

    currentY += 40;
    const lines = buildEquationSolveLines(eq, varChar);
    const eqFontSize = (lines.length >= 4) ? 58 : 68;
    const eqGap = (lines.length >= 4) ? 74 : 88;
    drawEquationLines(gEq, lines, 800, currentY, {
      text:(x,y,t,a)=>tText(x,y,t,a),
      fill:"#000",
      fontSize: eqFontSize,
      gap: eqGap,
      anchor:"start",
      alignEquals: true,
      eqGap: 24,
      fontFamily: "'Times New Roman', Times, serif",
      fontStyle: "italic"
    });
  }

  targetSvg.appendChild(gEq);
}


/* Render impression */
function renderCardIntoSvg(targetSvg, card, printMode){
  while(targetSvg.firstChild) targetSvg.removeChild(targetSvg.firstChild);
  printMode = ["statement","worksheet","correction"].includes(printMode) ? printMode : "statement";
  const actEl = document.getElementById("activity");
  const act = actEl ? actEl.value : "";
  const colorModeEl = document.getElementById("numColorMode");
  const useTokens = (act === "EQPM") && colorModeEl && colorModeEl.checked;
  function tEl(name, attrs={}){
    const n = document.createElementNS("http://www.w3.org/2000/svg", name);
    for(const k in attrs) n.setAttribute(k, attrs[k]);
    return n;
  }
  function tText(x,y,txt,attrs={}){
    const t = tEl("text",{x,y,...attrs}); t.textContent=txt; return t;
  }
  targetSvg.appendChild(tEl("rect",{x:0,y:0,width:1600,height:2200,rx:26,fill:"#fff"}));
  renderCardEquationPrint(targetSvg, card, printMode, tEl, tText, useTokens);
}



function printSheet(){
  if(cards.length===0) return;
  const printModeEl = document.getElementById("printMode");
  const printDuplexEl = document.getElementById("printDuplex");
  const printMode = printModeEl ? printModeEl.value : "statement";
  const printDuplex = !!(printDuplexEl && printDuplexEl.checked);
  const printArea = document.getElementById("printArea");
  printArea.innerHTML = "";
  const perSheet = 4;
  const sheets = Math.ceil(cards.length / perSheet);

  function appendSheet(slotCards, mode){
    const sheet = document.createElement("div");
    sheet.className = "sheet";
    const grid = document.createElement("div");
    grid.className = "grid";

    for(let i=0;i<perSheet;i++){
      const holder = document.createElement("div");
      holder.className = "pCard";
      const card = slotCards[i] || null;
      if(card){
        const sv = document.createElementNS("http://www.w3.org/2000/svg","svg");
        sv.setAttribute("viewBox","0 0 1600 2200");
        sv.style.width = "100%";
        renderCardIntoSvg(sv, card, mode);
        holder.appendChild(sv);
      } else {
        holder.classList.add("empty");
      }
      grid.appendChild(holder);
    }

    sheet.appendChild(grid);

    const footer = document.createElement("div");
    footer.className = "print-footer";
    footer.textContent = "aca.re/maths/splat";
    sheet.appendChild(footer);

    printArea.appendChild(sheet);
  }

  for(let s=0;s<sheets;s++){
    const frontSlots = Array(perSheet).fill(null);
    for(let i=0;i<perSheet;i++){
      const k = s*perSheet + i;
      if(k < cards.length) frontSlots[i] = cards[k];
    }

    appendSheet(frontSlots, printDuplex ? "statement" : printMode);

    if(printDuplex){
      const backSlots = [frontSlots[1], frontSlots[0], frontSlots[3], frontSlots[2]];
      appendSheet(backSlots, printMode);
    }
  }
  window.print();
}

let cards = [];

function renderEmpty(){
  clearSvg();
  svg.appendChild(el("rect",{x:0,y:0,width:1600,height:1000,rx:26,fill:"rgba(255,255,255,0.03)"}));
  svg.appendChild(text(800, 520, "Génère une série pour commencer", {"text-anchor":"middle","font-size":"54","fill":"rgba(0,0,0,0.35)"}));
}

function generate(){
  const act = activityEl.value;
  const n = clamp(numberOr(countEl.value, 30), 1, 300);
  const seedValue = getSeedForCurrentMode();
  const rng = makeRng(seedValue);
  const out = [];
  for(let i=0;i<n;i++){
    let c;
    if(act === "EQSTEP") c = genEquationStep(rng);
    else if(act === "EQPM") c = genEquationSigned(rng);
    else c = genEquation(rng);
    assignPositionsEquation(c, rng);
    out.push(c);
  }
  cards = out;
  idx = 0;
  revealState = 0;
  updateUI();
}



function shuffleCards(){
  if(cards.length<=1) return;
  const seedValue = getSeedForCurrentMode();
  const rng = makeRng(seedValue);
  shuffleInPlace(cards, rng);
  idx = 0;
  revealState = 0;
  updateUI();
}

async function toggleFullscreen(){
  try{
    if(!document.fullscreenElement) await fsHost.requestFullscreen();
    else await document.exitFullscreen();
  }catch(e){ console.warn("Fullscreen non dispo:", e); }
}

document.getElementById("btnGen").addEventListener("click", generate);
document.getElementById("btnClear").addEventListener("click", ()=>{ cards=[]; idx=0; revealState=0; updateUI(); });
document.getElementById("btnPrev").addEventListener("click", ()=>{
  if(cards.length===0) return;
  if(revealState > 0){ revealState = 0; updateUI(); return; }
  if(idx>0){ idx--; revealState=0; updateUI(); }
});
document.getElementById("btnNext").addEventListener("click", ()=>{
  if(cards.length===0) return;
  const isProgressive = isProgressiveRevealCard(cards[idx]);
  const maxState = getMaxRevealState(cards[idx]);
  if(isProgressive && revealState < maxState) {
      revealState++;
      updateUI();
      return;
  } else if (!isProgressive && revealState === 0) {
      revealState = maxState;
      updateUI();
      return;
  }
  if(idx<cards.length-1){ idx++; revealState=0; updateUI(); }
});
document.getElementById("btnPrint").addEventListener("click", printSheet);
if(btnEqStepViewEquationEl){
  btnEqStepViewEquationEl.addEventListener("click", ()=>{
    equationStepView = "equation";
    syncEquationStepViewButton();
    updateUI();
  });
}
if(btnEqStepViewSchemaEl){
  btnEqStepViewSchemaEl.addEventListener("click", ()=>{
    equationStepView = "schema";
    syncEquationStepViewButton();
    updateUI();
  });
}
document.getElementById("btnFullscreen").addEventListener("click", toggleFullscreen);
window.addEventListener("keydown",(e)=>{
  const _ae = document.activeElement;
  if((_ae && _ae.id==="activity") && (e.key==="ArrowLeft" || e.key==="ArrowRight")){
    e.preventDefault();
    try{ _ae.blur(); }catch(_e){}
    const _ms = document.getElementById("mainSvg");
    if(_ms && typeof _ms.focus==="function"){ _ms.focus(); }
  }
  if(e.key==="ArrowLeft"){
    if(cards.length===0) return;
    if(revealState > 0){ revealState=0; updateUI(); return; }
    if(idx>0){ idx--; revealState=0; updateUI(); }
  }
  if(e.key==="ArrowRight"){
    if(cards.length===0) return;
    const isProgressive = isProgressiveRevealCard(cards[idx]);
    const maxState = getMaxRevealState(cards[idx]);
    if(isProgressive && revealState < maxState) {
        revealState++;
        updateUI();
        return;
    } else if (!isProgressive && revealState === 0) {
        revealState = maxState;
        updateUI();
        return;
    }
    if(idx<cards.length-1){ idx++; revealState=0; updateUI(); }
  }
  if(e.key===" "){
    e.preventDefault();
    if(cards.length){ 
        const isProgressive = isProgressiveRevealCard(cards[idx]);
        const maxState = getMaxRevealState(cards[idx]);
        if (isProgressive) {
            revealState = (revealState + 1) % (maxState + 1);
        } else {
            revealState = revealState === 0 ? maxState : 0;
        }
        updateUI(); 
    }
  }
  if(e.key==="f" || e.key==="F"){ toggleFullscreen(); }
});
syncSettingsUI();
syncPrintModeUI();
generate();

</script>
</body>
