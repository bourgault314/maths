<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Splat! Équations</title>
<style>
  :root{
    /* THEME (light default) */
    --bg:#f3f4f6;
    --panel:rgba(255,255,255,.96);
    --card:rgba(255,255,255,.80);
    --ink:#111827;
    --muted:#6b7280;

    --field-bg:#ffffff;
    --field-border:rgba(17,24,39,.15);

    --btn:#ffffff;
    --btn2:#f3f4f6;
    --btn-border:rgba(17,24,39,.15);

    --tray-fill:rgba(0,0,0,0.03);
    --tray-stroke:rgba(0,0,0,0.10);

    /* Retour au gris léger pour l'écran */
    --totalbox-fill:rgba(0,0,0,0.04);
    --totalbox-stroke:rgba(0,0,0,0.16);

    --beadH-fill:rgba(0,0,0,0.05);
    --beadH-stroke:rgba(0,0,0,0.25);

    --total-label: rgba(17,24,39,0.70);

    /* SPLAT COLORS */
    --splat-cover: rgb(0,0,0);              
    --splat-reveal: rgba(210,210,210,0.35); 
    --splat-stroke: rgba(0,0,0,0.18);

    /* MODE C/D COLORS (Opaque) */
    --splat-black: rgb(20,20,20);
    --splat-purple: #9d4edd;
    --splat-orange: #f97316;

    /* MODE C/D COLORS (Reveal - Semi-transparent) */
    --splat-black-rev: rgba(40,40,40, 0.15);
    --splat-purple-rev: rgba(157, 78, 221, 0.20);
    --splat-orange-rev: rgba(249, 115, 22, 0.20);

    /* UNIT BEADS */
    --unit-fill: rgba(106,167,255,0.20);
    --unit-stroke: rgba(106,167,255,0.55);

    --danger:#ff6a6a;
    --accent:#6aa7ff;
  }

  *{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
  body{margin:0;background:var(--bg);color:var(--ink);}

  header{
    padding:14px 16px;
    border-bottom:1px solid rgba(255,255,255,0.08);
    display:flex;align-items:center;justify-content:flex-start;gap:12px;flex-wrap:wrap
  }
  header h1{font-size:16px;margin:0;font-weight:900;letter-spacing:.2px}
  .headerTitle{display:flex;align-items:center;gap:10px}

  .home{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:52px;
    height:52px;
    border-radius:999px;
    border:1px solid rgba(17,24,39,.12);
    background:rgba(255,255,255,.75);
    box-shadow:0 10px 24px rgba(17,24,39,.08);
    text-decoration:none;
    color:var(--ink);
    line-height:1;
    user-select:none;
    transition:transform .08s ease, border-color .2s ease, box-shadow .2s ease;
  }
  .home:hover{
    transform:translateY(-1px);
    border-color:rgba(27,102,255,.30);
    box-shadow:0 14px 30px rgba(17,24,39,.10);
  }
  .home:active{transform:translateY(0)}
  .home svg{width:22px;height:22px;display:block}

  .wrap{display:flex;flex-direction:row;flex-wrap:nowrap;gap:14px;padding:14px;align-items:flex-start}
  .wrap > .panel{flex:0 0 340px;max-width:340px}
  .wrap > .stage{flex:1 1 auto;min-width:0}

  .panel{
    background:var(--panel);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25)
  }

  label{font-size:12px;color:var(--muted);display:block;margin:8px 0 4px}
  select,input{
    width:100%;padding:10px 10px;border-radius:10px;
    border:1px solid var(--field-border);
    background:var(--field-bg);
    color:var(--ink);
    outline:none
  }
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}

  
  input[type="number"]{appearance:textfield}

  .btn{
    padding:10px 12px;border-radius:10px;
    border:1px solid var(--btn-border);
    background:var(--btn);
    color:var(--ink);cursor:pointer;font-weight:650;
    transition: transform .08s ease, background .12s ease, box-shadow .12s ease;
  }
  .btn:hover{background:var(--btn2)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:rgba(106,167,255,0.18);border-color:rgba(106,167,255,0.35)}
  .btn.danger{background:rgba(255,106,106,0.14);border-color:rgba(255,106,106,0.35)}
  .btn:disabled{opacity:.45;cursor:not-allowed}

  .iconbtn{
    display:inline-grid;place-items:center;
    width:42px;height:42px;padding:0;border-radius:12px;
    border:1px solid var(--btn-border);
    background: linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.04));
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  }
  .iconbtn:hover{transform:translateY(-1px); box-shadow: 0 10px 22px rgba(0,0,0,0.22);}
  .iconbtn:active{transform:translateY(0px); box-shadow: 0 6px 18px rgba(0,0,0,0.18);}
  .iconbtn svg{width:20px;height:20px;opacity:.95}

  .hint{
    font-size:12px;color:var(--muted);line-height:1.35;margin-top:10px
  }
  .hr{
    height:1px;background:rgba(255,255,255,0.08);margin:10px 0;
  }
  .smallnote{
    font-size:12px;color:var(--muted);line-height:1.35;
    border:1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    border-radius:12px;
    padding:10px;
    margin-top:10px;
  }
  .pill{
    display:inline-block;
    padding:2px 8px;
    border-radius:999px;
    border:1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.04);
    font-size:12px;
    color: var(--muted);
  }

  .stage{display:flex;flex-direction:column;gap:12px}
  .cardbox{
    background:var(--card);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:14px;padding:10px
  }
  .nav{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:space-between}
  .counter{font-size:12px;color:var(--muted)}

  #svgWrap{width:100%;aspect-ratio: 16/10;display:grid;place-items:center}
  #mainSvg{width:100%;height:100%}
  #mainSvg:focus{outline:none}

  .printArea{display:none}

  .checkInline{
    display:flex;gap:8px;align-items:center;
    padding:8px 10px;border-radius:10px;
    border:1px solid var(--btn-border);
    background: rgba(255,255,255,0.04);
    user-select:none;
    cursor:pointer;
  }
  .checkInline input{width:auto;margin:0}
  .checkInline span{font-size:12px;color:var(--muted);white-space:nowrap}

  /* Animations CSS */
  @keyframes fadeOutSplat {
    from { opacity: 1; }
    to { opacity: 0; }
  }
  .anim-fade-out {
    animation: fadeOutSplat 0.5s ease-in-out forwards;
    pointer-events: none;
  }

  /* MODE CLAIR */
  body.light{
    --bg:#f5f7fb;
    --panel:rgba(255,255,255,0.94);
    --card:rgba(255,255,255,0.94);
    --ink:#0b1220;
    --muted:#4b5567;

    --field-bg:#ffffff;
    --field-border:rgba(0,0,0,0.14);

    --btn:#eef2f8;
    --btn2:#e3e9f4;
    --btn-border:rgba(0,0,0,0.14);

    --tray-fill:rgba(0,0,0,0.03);
    --tray-stroke:rgba(0,0,0,0.12);

    --totalbox-fill:rgba(0,0,0,0.04);
    --totalbox-stroke:rgba(0,0,0,0.22);

    --beadH-fill:rgba(0,0,0,0.04);
    --beadH-stroke:rgba(0,0,0,0.22);

    --total-label: rgba(0,0,0,0.92);

    --splat-cover: rgb(0,0,0);
    --splat-reveal: rgba(220,220,220,0.40);
    --splat-stroke: rgba(0,0,0,0.18);

    --unit-fill: rgba(27,102,255,0.14);
    --unit-stroke: rgba(27,102,255,0.50);

    --danger:#e11d48;
    --accent:#1b66ff;
  }

  body.light header{border-bottom:1px solid rgba(0,0,0,0.08)}
  body.light .panel{box-shadow:0 10px 30px rgba(0,0,0,0.06)}
  body.light .cardbox{border-color:rgba(0,0,0,0.10)}
  body.light .iconbtn{
    background: linear-gradient(180deg, rgba(0,0,0,0.05), rgba(0,0,0,0.02));
    box-shadow: 0 6px 18px rgba(0,0,0,0.10);
  }
  body.light .iconbtn:hover{box-shadow: 0 10px 22px rgba(0,0,0,0.14);}
  body.light .home{
    border-color:rgba(17,24,39,.12);
    background:rgba(255,255,255,.82);
    box-shadow:0 10px 24px rgba(17,24,39,.08);
  }
  body.light .checkInline{background: rgba(0,0,0,0.03);}
  body.light .smallnote{border-color:rgba(0,0,0,0.12);background: rgba(0,0,0,0.02);}
  body.light .pill{border-color:rgba(0,0,0,0.14);background: rgba(0,0,0,0.03);}

  /* Impression */
  @media print{
    @page{ size: A4; margin: 8mm; }
    body{background:#fff;color:#000}
    header,.wrap{display:none !important}
    .printArea{display:block}
    .sheet{page-break-after:always;padding:6mm}
    /* 2 colonnes (4 cartes / page : 2 x 2) */
    .grid{display:grid;grid-template-columns:repeat(2, 1fr);gap:5mm}
    .pCard{border:1px solid #ddd;border-radius:6mm;padding:2mm;box-sizing:border-box}
    .pCard svg{width:100%;height:auto}
    .pCard.empty{border:none;background:transparent;padding:0;min-height:0}
    .print-footer { text-align: center; font-size: 10pt; color: #666; margin-top: 6mm; }
  }

  /* Plein écran */
  .fsHost:fullscreen{background:var(--bg)}
  .fsHost:fullscreen #svgWrap{width:100vw;height:100vh;aspect-ratio:auto;padding:10px}
  .fsHost:fullscreen .cardbox{width:100vw;height:100vh;border-radius:0;padding:10px}
</style>
</head>

<script>

/* Le véritable X mathématique unicode ! */
const xChar = "𝑥"; 
const variableChars = [xChar, "𝑎", "𝑏", "𝑐", "𝑚", "𝑛", "𝑡"];
const variableCharSet = new Set([...variableChars, "x", "a", "b", "c", "m", "n", "t"]);

function pickVariableChar(rng){
  return variableChars[rInt(rng, 0, variableChars.length - 1)];
}
function getCardVarChar(card){
  if(card && typeof card.varChar === "string" && card.varChar.trim()) return card.varChar;
  return xChar;
}
function isVariableLabel(label){
  return variableCharSet.has(String(label == null ? "" : label));
}


/* RNG */
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^(t>>>15),t|1);t^=t+Math.imul(t^(t>>>7),t|61);return((t^(t>>>14))>>>0)/4294967296;};}
function makeRng(seed){
  if(seed===null||seed===undefined||seed==="") return Math.random;
  const s = Number(seed);
  if(!Number.isFinite(s)) return Math.random;
  return mulberry32(s|0);
}
function rInt(rng,a,b){return a+Math.floor(rng()*(b-a+1));}

function shuffleInPlace(arr,rng){for(let i=arr.length-1;i>0;i--){const j=Math.floor(rng()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}}

function beadColorForValue(v){
  const isLight = document.body.classList.contains("light");
  const actEl = document.getElementById("activity");
  const act = actEl ? actEl.value : "";
  const colorModeEl = document.getElementById("numColorMode");

  const isSignedMode = (act === "NPM" || act === "EQPM");
  const useTokens = isSignedMode && colorModeEl && colorModeEl.checked;

  let hue, s, lFill, lStroke, fillA, strokeA;

  if(useTokens){
    hue = (v >= 0) ? 142 : 348;
    s = "80%";
    lFill = isLight ? "50%" : "55%";
    lStroke = isLight ? "40%" : "45%";
    fillA = isLight ? 0.25 : 0.30;
    strokeA = isLight ? 0.70 : 0.80;
  } else {
    const mag = Math.abs(v);
    hue = (((mag * 37) % 360) + 360) % 360;
    if(v < 0) hue = (hue + 180) % 360;
    s = "78%";
    lFill = "54%";
    lStroke = "48%";
    fillA = isLight ? 0.18 : 0.24;
    strokeA = isLight ? 0.55 : 0.65;
  }

  return {
    fill: `hsla(${hue}, ${s}, ${lFill}, ${fillA})`,
    stroke: `hsla(${hue}, ${s}, ${lStroke}, ${strokeA})`
  };
}

/* UI refs */
const activityEl = document.getElementById("activity");
const countEl = document.getElementById("count");
const diffEl = document.getElementById("difficulty");
const seedEl = document.getElementById("seed");
const seedUEl = document.getElementById("seedU");

const classicSettingsEl = document.getElementById("classicSettings");
const unitSettingsEl = document.getElementById("unitSettings");

const numberedSettingsEl = document.getElementById("numberedSettings");
const nineSettingsEl = document.getElementById("nineSettings");
const nineOpEl = document.getElementById("nineOp");
const nineTasksEl = document.getElementById("nineTasks");
const nineTotalMinEl = document.getElementById("nineTotalMin");
const nineTotalMaxEl = document.getElementById("nineTotalMax");
const nineVisibleMaxEl = document.getElementById("nineVisibleMax");
const seedCEl = document.getElementById("seedC");

const eightSettingsEl = document.getElementById("eightSettings");
const eightOpEl = document.getElementById("eightOp");
const eightTasksEl = document.getElementById("eightTasks");
const eightVisibleMaxEl = document.getElementById("eightVisibleMax");
const eightTotalMinEl = document.getElementById("eightTotalMin");
const eightTotalMaxEl = document.getElementById("eightTotalMax");
const seedDEl = document.getElementById("seedD");

const investigateSettingsEl = document.getElementById("investigateSettings");
const invTaskCountEl = document.getElementById("invTaskCount");
const invClueTypeEl = document.getElementById("invClueType");
const invStructureRow = document.getElementById("invStructureRow");
const invStructure3El = document.getElementById("invStructure3");
const invOpMulEl = document.getElementById("invOpMul");
const invOpDivEl = document.getElementById("invOpDiv");
const invOpAddEl = document.getElementById("invOpAdd");
const invOpSubEl = document.getElementById("invOpSub");
const invMaxAddEl = document.getElementById("invMaxAdd");
const invVisibleMinEl = document.getElementById("invVisibleMin");

/* Helpers */
function clamp(n, a, b){ return Math.max(a, Math.min(b, n)); }
function numberOr(x, fallback){ const n = Number(x); return Number.isFinite(n) ? n : fallback; }

function sanitizeIntegerInput(el){
  if(!el) return false;
  const raw = (el.value ?? "").toString().trim();
  if(raw === "") return false;
  let v = Number(raw);
  if(!Number.isFinite(v)) return false;

  v = Math.round(v);
  if(Object.is(v, -0)) v = 0;

  const minAttr = (el.min ?? "").toString().trim();
  const maxAttr = (el.max ?? "").toString().trim();
  const hasMin = minAttr !== "" && Number.isFinite(Number(minAttr));
  const hasMax = maxAttr !== "" && Number.isFinite(Number(maxAttr));
  if(hasMin) v = Math.max(v, Number(minAttr));
  if(hasMax) v = Math.min(v, Number(maxAttr));

  const newVal = String(v);
  if(el.value !== newVal){
    el.value = newVal;
    return true;
  }
  return false;
}

function hookNumberInputClamps(){
  const all = Array.from(document.querySelectorAll('input[type="number"]'));
  all.forEach(el=>{
    if(el.id === "seed" || (el.id && el.id.startsWith("seed"))) return;
    const minAttr = (el.min ?? "").toString().trim();
    const maxAttr = (el.max ?? "").toString().trim();
    if(minAttr === "" && maxAttr === "") return;
    const handler = ()=>{
      const changed = sanitizeIntegerInput(el);
      if(changed) scheduleAutoGenerate();
    };
    el.addEventListener("blur", handler);
    el.addEventListener("change", handler);
  });
}
function hookMinMaxPairs(){
  const pairs = [
    [unitTotalMinEl, unitTotalMaxEl],
    [unitTasksMinEl, unitTasksEl],
    [numTasksMinEl, numTasksEl], 
    [numVisibleMinEl, numVisibleMaxEl],
    [numTotalMinEl, numTotalMaxEl],
    [nineTotalMinEl, nineTotalMaxEl],
    [eightTotalMinEl, eightTotalMaxEl],
    [invVisibleMinEl, invVisibleMaxEl],
    [invTotalMinEl, invTotalMaxEl],
    [sysVisibleMinEl, sysVisibleMaxEl],
    [sysTotalMinEl, sysTotalMaxEl],
  ];

  pairs.forEach(([minEl, maxEl])=>{
    if(!minEl || !maxEl) return;

    const handler = ()=>{
      if(minEl.offsetParent === null || maxEl.offsetParent === null) return;
      let changed = false;
      changed = sanitizeIntegerInput(minEl) || changed;
      changed = sanitizeIntegerInput(maxEl) || changed;

      const minV = Number(minEl.value);
      const maxV = Number(maxEl.value);
      if(Number.isFinite(minV) && Number.isFinite(maxV) && minV > maxV){
        maxEl.value = String(minV);
        sanitizeIntegerInput(maxEl);
        changed = true;
      }
      if(changed) scheduleAutoGenerate();
    };

    minEl.addEventListener("blur", handler);
    minEl.addEventListener("change", handler);
    maxEl.addEventListener("blur", handler);
    maxEl.addEventListener("change", handler);
  });
}

function blobPath(cx, cy, r){
  const n = 40;
  const lobes = 5;
  const pts = [];
  for(let i=0;i<n;i++){
    const a = (Math.PI * 2 * i) / n;
    const k = 0.90 + 0.16 * Math.sin(lobes*a) + 0.04 * Math.sin(2*lobes*a);
    const rr = r * k;
    pts.push([cx + Math.cos(a)*rr, cy + Math.sin(a)*rr]);
  }
  function cr2bz(p0,p1,p2,p3){
    const t = 1/6;
    const c1x = p1[0] + (p2[0]-p0[0]) * t;
    const c1y = p1[1] + (p2[1]-p0[1]) * t;
    const c2x = p2[0] - (p3[0]-p1[0]) * t;
    const c2y = p2[1] - (p3[1]-p1[1]) * t;
    return [c1x,c1y,c2x,c2y,p2[0],p2[1]];
  }
  let d = `M ${pts[0][0]} ${pts[0][1]}`;
  for(let i=0;i<n;i++){
    const p0 = pts[(i-1+n)%n];
    const p1 = pts[i];
    const p2 = pts[(i+1)%n];
    const p3 = pts[(i+2)%n];
    const [c1x,c1y,c2x,c2y,x,y] = cr2bz(p0,p1,p2,p3);
    d += ` C ${c1x} ${c1y}, ${c2x} ${c2y}, ${x} ${y}`;
  }
  d += " Z";
  return d;
}

function randomSignedCompositionNonZero(rng, sum, parts, maxAbs){
  if(parts <= 0) return [];
  if(parts === 1){
    if(sum === 0) return null;
    if(Math.abs(sum) > maxAbs) return null;
    return [sum];
  }
  for(let tries=0; tries<4000; tries++){
    const out = [];
    let rem = sum;
    let ok = true;
    for(let i=0; i<parts-1; i++){
      const remainParts = parts - i;
      const minRem = -(remainParts-1) * maxAbs;
      const maxRem =  (remainParts-1) * maxAbs;

      let vMin = Math.max(-maxAbs, rem - maxRem);
      let vMax = Math.min( maxAbs, rem - minRem);
      if(vMax < vMin){ ok = false; break; }

      let v = null;
      for(let k=0; k<60; k++){
        const candidate = rInt(rng, vMin, vMax);
        if(candidate === 0) continue;
        if(remainParts-1 === 1){
          const last = rem - candidate;
          if(last === 0) continue;
          if(Math.abs(last) > maxAbs) continue;
        }
        v = candidate;
        break;
      }
      if(v === null){ ok = false; break; }
      out.push(v);
      rem -= v;
    }
    if(!ok) continue;
    const last = rem;
    if(last === 0) continue;
    if(Math.abs(last) > maxAbs) continue;
    out.push(last);
    if(out.some(x => x === 0)) continue;
    return out;
  }
  return null;
}

function assignPositionsEquation(card, rng){
  const eq = card._eq;
  if(!eq) return;

  const leftTray  = { x:120, y:190, w:680, h:650 };
  const rightTray = { x:800, y:190, w:680, h:650 };
  const midX = 800;

  const beadR = 34;         
  const splatR = 74;        

  function layoutSplats(tray, n){
    if(n <= 0) return [];
    const area = { x: tray.x + 70, y: tray.y + 75, w: tray.w - 140, h: 330 };

    let rows = [];
    if(n === 1) rows = [1];
    else if(n === 2) rows = [2];
    else if(n === 3) rows = [2,1];
    else if(n === 4) rows = [2,2];
    else rows = [3, n-3]; 

    const out = [];
    const rowCount = rows.length;

    for(let r=0; r<rowCount; r++){
      const cols = rows[r];
      const cellW = area.w / cols;
      const cy = area.y + area.h * ((r + 0.5) / rowCount);

      for(let c=0; c<cols; c++){
        const cx = area.x + cellW * (c + 0.5);
        out.push({ cx, cy, r: splatR });
      }
    }

    for(let i=out.length-1;i>0;i--){
      const j = rInt(rng, 0, i);
      [out[i], out[j]] = [out[j], out[i]];
    }

    return out;
  }

  function layoutVisible(tray, n){
    const area = { x: tray.x + 70, y: tray.y + 450, w: tray.w - 140, h: 160 };
    if(n <= 0) return [];

    const cellW = area.w / n;
    const baseY = area.y + area.h / 2;
    const jitterX = Math.max(2, Math.floor(cellW * 0.18));
    const jitterY = Math.max(2, Math.floor(area.h * 0.18));

    const out = [];
    for(let i=0;i<n;i++){
      let cx = area.x + cellW * (i + 0.5) + rInt(rng, -jitterX, jitterX);
      let cy = baseY + rInt(rng, -jitterY, jitterY);
      out.push({ cx, cy });
    }
    return out;
  }

  const splatsL = layoutSplats(leftTray, eq.left.tasks);
  const splatsR = layoutSplats(rightTray, eq.right.tasks);

  card._eqTrays = { left:leftTray, right:rightTray, midX };
  card._eqPos = {
    left: {
      beadR,
      posV: layoutVisible(leftTray, eq.left.visible.length),
      posH: splatsL.map(s=>({cx:s.cx, cy:s.cy})),
      splats: splatsL
    },
    right: {
      beadR,
      posV: layoutVisible(rightTray, eq.right.visible.length),
      posH: splatsR.map(s=>({cx:s.cx, cy:s.cy})),
      splats: splatsR
    }
  };
}


/* PATCH E bis — vue Schéma uniquement.
   Disposition en deux colonnes :
   - à gauche, les deux plateaux empilés verticalement et collés au trait central ;
   - à droite, le schéma en barres ;
   - la séparation des plateaux est alignée avec la séparation des deux lignes du tableau.
   La taille des taches est commune aux deux plateaux pour ne jamais suggérer
   qu'une même inconnue change de valeur. */
function getEquationStepSchemaMidY(){
  return 500;
}

function buildEquationStepSchemaColumnGeometry(card){
  const eq = card && card._eq;
  if(!eq || !eq.left || !eq.right) return null;

  const midY = getEquationStepSchemaMidY();
  const topTray = { x:60, y:76, w:720, h:424 };
  const bottomTray = { x:60, y:500, w:720, h:424 };
  const beadR = 30;

  const maxTasks = Math.max(
    0,
    Math.round(Number(eq.left.tasks) || 0),
    Math.round(Number(eq.right.tasks) || 0)
  );
  const commonSplatR = maxTasks <= 1 ? 88 : (maxTasks <= 2 ? 80 : 68);

  function rowsFor(n){
    if(n <= 1) return [1];
    if(n === 2) return [2];
    if(n === 3) return [2,1];
    if(n === 4) return [2,2];
    return [3, n - 3];
  }

  function layoutSplats(tray, n){
    n = Math.max(0, Math.round(Number(n) || 0));
    if(n <= 0) return [];

    const rows = rowsFor(n);
    const twoRows = rows.length > 1;
    const r = commonSplatR;
    const rowGap = twoRows ? Math.max(136, Math.min(148, Math.round(r * 2.08))) : 0;
    const visibleTopLimit = tray.y + tray.h - 92;
    const availableTop = tray.y + r + 18;
    const availableBottom = visibleTopLimit - r - (twoRows ? rowGap : 0) - 14;
    const topY = twoRows
      ? Math.round((availableTop + availableBottom) / 2)
      : Math.round(tray.y + (visibleTopLimit - tray.y) / 2);

    const areaX = tray.x + 88;
    const areaW = tray.w - 176;
    const out = [];
    rows.forEach((cols, rowIndex)=>{
      const cellW = areaW / cols;
      const cy = topY + rowIndex * rowGap;
      for(let c=0; c<cols; c++){
        out.push({ cx: areaX + cellW * (c + 0.5), cy, r });
      }
    });
    return out;
  }

  function layoutVisible(tray, n){
    n = Math.max(0, Math.round(Number(n) || 0));
    if(n <= 0) return [];
    const areaX = tray.x + 86;
    const areaW = tray.w - 172;
    const y = tray.y + tray.h - 56;
    const cellW = areaW / n;
    return Array.from({length:n}, (_, i)=>({ cx: areaX + cellW * (i + 0.5), cy: y }));
  }

  const leftSplats = layoutSplats(topTray, eq.left.tasks);
  const rightSplats = layoutSplats(bottomTray, eq.right.tasks);

  const leftVisibleSlots = Math.max(6, (eq.left.visible || []).length, eq.left.tasks || 0);
  const rightVisibleSlots = Math.max(6, (eq.right.visible || []).length, eq.right.tasks || 0);

  return {
    trays: {
      left: topTray,
      right: bottomTray,
      midX: topTray.x + topTray.w / 2,
      midY,
      vertical: true
    },
    pos: {
      left: {
        beadR,
        posV: layoutVisible(topTray, leftVisibleSlots),
        posH: leftSplats.map(s=>({cx:s.cx, cy:s.cy})),
        splats: leftSplats
      },
      right: {
        beadR,
        posV: layoutVisible(bottomTray, rightVisibleSlots),
        posH: rightSplats.map(s=>({cx:s.cx, cy:s.cy})),
        splats: rightSplats
      }
    }
  };
}

function randomCompositionBounded(rng, sum, parts, maxPart=99){
  if(parts === 0) return (sum === 0) ? [] : null;
  if(parts === 1) return (sum <= maxPart) ? [sum] : null;
  if(sum < parts) return null;
  if(sum > parts*maxPart) return null;

  const arr = new Array(parts).fill(1);
  let rem = sum - parts;

  for(let i=0;i<parts;i++){
    const cap = Math.min(maxPart - arr[i], rem);
    if(cap <= 0) continue;
    const add = rInt(rng, 0, cap);
    arr[i] += add;
    rem -= add;
  }

  let safety = 2000;
  while(rem > 0 && safety-- > 0){
    const i = rInt(rng, 0, parts-1);
    const cap = maxPart - arr[i];
    if(cap <= 0) continue;
    const add = Math.min(rem, rInt(rng, 1, cap));
    arr[i] += add;
    rem -= add;
  }
  if(rem !== 0) return null;

  for(let i=arr.length-1;i>0;i--){
    const j = rInt(rng, 0, i);
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function genEquation(rng){
  const maxTasksUser = clamp(numberOr(numTasksEl.value, 6), 1, 6);
  const maxTasksEq = Math.max(2, maxTasksUser);

  let vMin = clamp(numberOr(numVisibleMinEl.value, 1), 0, 6);
  let vMax = clamp(numberOr(numVisibleMaxEl.value, 3), 0, 6);
  if(vMax < vMin) [vMin, vMax] = [vMax, vMin];

  let userMin = numberOr(numTotalMinEl ? numTotalMinEl.value : 20, 20);
  let userMax = numberOr(numTotalMaxEl ? numTotalMaxEl.value : 50, 50);
  if(userMax < userMin) [userMin, userMax] = [userMax, userMin];
  userMin = clamp(userMin, 1, 999);
  userMax = clamp(userMax, 1, 999);

  const unknownModeSetting = eqUnknownModeEl ? eqUnknownModeEl.value : "MIX";

  const MAX_TRIES = 8000;

  for(let tries=0; tries<MAX_TRIES; tries++){
    let mode = unknownModeSetting;
    if(mode === "MIX") mode = (rng() < 0.5) ? "ONE_SIDE" : "BOTH";

    let a, b;
    if(mode === "ONE_SIDE") {
        if(rng() < 0.5) {
            a = 0;
            b = rInt(rng, 1, maxTasksEq);
        } else {
            a = rInt(rng, 1, maxTasksEq);
            b = 0;
        }
    } else {
        a = rInt(rng, 1, maxTasksEq);
        b = rInt(rng, 1, maxTasksEq);
        if(b === a) b = (b % maxTasksEq) + 1; 
    }
    
    if(a === b) continue;

    const vCountL = rInt(rng, vMin, vMax);
    const vCountR = rInt(rng, vMin, vMax);
    
    if(vCountL === 0 && vCountR === 0) continue; 
    if(a === 0 && vCountL === 0) continue;
    if(b === 0 && vCountR === 0) continue;

    const minVisAny = Math.min(vCountL > 0 ? vCountL : 1, vCountR > 0 ? vCountR : 1);
    const denom = Math.max(1, Math.min(a, b));
    let xMax = Math.floor((userMax - minVisAny) / denom);
    xMax = Math.max(1, Math.min(99, xMax));
    if(xMax < 1) continue;
    const x = rInt(rng, 1, xMax);

    let tLow = userMin;
    let tHigh = userMax;

    const lMinT = a*x + (vCountL * 1);
    const lMaxT = a*x + (vCountL * 99);
    const rMinT = b*x + (vCountR * 1);
    const rMaxT = b*x + (vCountR * 99);

    tLow = Math.max(tLow, lMinT, rMinT);
    tHigh = Math.min(tHigh, lMaxT, rMaxT);

    if(tHigh < tLow) continue;

    const total = (tLow === tHigh) ? tLow : rInt(rng, tLow, tHigh);
    const VL = total - a*x;
    const VR = total - b*x;

    const leftVisible  = (vCountL === 0) ? [] : randomCompositionBounded(rng, VL, vCountL, 99);
    const rightVisible = (vCountR === 0) ? [] : randomCompositionBounded(rng, VR, vCountR, 99);
    if(leftVisible === null || rightVisible === null) continue;

    const leftHiddenByTask  = Array.from({length:a}, ()=>[x]);
    const rightHiddenByTask = Array.from({length:b}, ()=>[x]);

    return {
      family: "EQ",
      total: total,
      visible: leftVisible.concat(rightVisible),
      hidden: leftHiddenByTask.flat().concat(rightHiddenByTask.flat()),
      varChar: pickVariableChar(rng),
      _eq: {
        total,
        x,
        left:  { tasks:a, visible:leftVisible,  hiddenByTask:leftHiddenByTask },
        right: { tasks:b, visible:rightVisible, hiddenByTask:rightHiddenByTask }
      }
    };
  }

  const a = 2, b = 1, x = 2;
  const vCountL = Math.max(1, vMin), vCountR = Math.max(1, vMin);
  const total = Math.max(userMin, a*x + vCountL);
  const VL = total - a*x;
  const VR = total - b*x;
  const leftVisible  = randomCompositionBounded(rng, VL, vCountL, 99) || Array.from({length:vCountL}, ()=>1);
  const rightVisible = randomCompositionBounded(rng, VR, vCountR, 99) || Array.from({length:vCountR}, ()=>1);
  const leftHiddenByTask  = Array.from({length:a}, ()=>[x]);
  const rightHiddenByTask = Array.from({length:b}, ()=>[x]);

  return {
    family: "EQ",
    total: total,
    visible: leftVisible.concat(rightVisible),
    hidden: leftHiddenByTask.flat().concat(rightHiddenByTask.flat()),
    varChar: pickVariableChar(rng),
    _eq: {
      total,
      x,
      left:  { tasks:a, visible:leftVisible,  hiddenByTask:leftHiddenByTask },
      right: { tasks:b, visible:rightVisible, hiddenByTask:rightHiddenByTask }
    }
  };
}


function genEquationStep(rng){
  const card = genEquation(rng);
  card.family = "EQSTEP";
  return card;
}



function genEquationSigned(rng){
  const maxTasksUser = clamp(numberOr(numTasksEl.value, 6), 1, 6);
  const maxTasksEq = Math.max(2, maxTasksUser);

  let vMin = clamp(numberOr(numVisibleMinEl.value, 1), 0, 6);
  let vMax = clamp(numberOr(numVisibleMaxEl.value, 3), 0, 6);
  if(vMax < vMin) [vMin, vMax] = [vMax, vMin];

  let userMin = clamp(numberOr(numTotalMinEl.value, -20), -99, 99);
  let userMax = clamp(numberOr(numTotalMaxEl.value, 20), -99, 99);
  if(userMax < userMin) [userMax, userMin];

  const maxAbs = clamp(numberOr(numBeadAbsMaxEl?.value, 30), 1, 99);
  const opposeSetting = (numOpposeModeEl && numOpposeModeEl.value) ? String(numOpposeModeEl.value).toLowerCase() : "off";
  const autoPick = (opposeSetting === "auto") ? "auto" : null;
  const unknownModeSetting = eqUnknownModeEl ? eqUnknownModeEl.value : "MIX";

  function sumArr(a){ let s=0; for(const x of a) s+=x; return s; }
  function hasBothSigns(arr){
    let pos=false, neg=false;
    for(const s of arr){ if(s>0) pos=true; else if(s<0) neg=true; if(pos && neg) return true; }
    return false;
  }

  function chooseUniformSigns(n){
    if(n === 0) return [];
    const s = (rng() < 0.5) ? 1 : -1;
    return new Array(n).fill(s);
  }
  function chooseMixedSignsNonZero(n){
    if(n === 0) return [];
    if(n < 3) return chooseUniformSigns(n);
    const candidates = [];
    for(let k=1; k<=n-1; k++){
      if(n % 2 === 0 && k === (n/2)) continue; 
      candidates.push(k);
    }
    if(candidates.length === 0) return new Array(n).fill(1);
    const k = candidates[rInt(rng, 0, candidates.length-1)];
    const out = new Array(n).fill(1);
    for(let i=0;i<k;i++) out[i] = -1;
    shuffleInPlace(out, rng);
    return out;
  }
  function chooseSignsPair(nL, nR, mode){
    if(mode === "off"){
      return { L:new Array(nL).fill(1), R:new Array(nR).fill(1) };
    }
    if(mode === "all"){
      return { L:new Array(nL).fill(-1), R:new Array(nR).fill(-1) };
    }
    if(mode === "auto"){
      const r = rng();
      if(r < 0.60){
        if(rng() < 0.5) return { L:new Array(nL).fill(1),  R:new Array(nR).fill(-1) };
        else return { L:new Array(nL).fill(-1), R:new Array(nR).fill(1) };
      }else if(r < 0.80){
        return { L:new Array(nL).fill(1),  R:new Array(nR).fill(1) };
      }else{
        return { L:new Array(nL).fill(-1), R:new Array(nR).fill(-1) };
      }
    }

    const canMixL = (nL >= 3);
    const canMixR = (nR >= 3);
    const patterns = [0];
    if(canMixR) patterns.push(1);
    if(canMixL) patterns.push(2);
    if(canMixL && canMixR) patterns.push(3);

    const pattern = patterns[rInt(rng, 0, patterns.length-1)];
    let L, R;
    if(pattern === 0){ L = chooseUniformSigns(nL); R = chooseUniformSigns(nR); }
    else if(pattern === 1){ L = chooseUniformSigns(nL); R = chooseMixedSignsNonZero(nR); }
    else if(pattern === 2){ L = chooseMixedSignsNonZero(nL); R = chooseUniformSigns(nR); }
    else { L = chooseMixedSignsNonZero(nL); R = chooseMixedSignsNonZero(nR); }
    return { L, R };
  }

  for(let tries=0; tries<6000; tries++){
    let modeUnk = unknownModeSetting;
    if(modeUnk === "MIX") modeUnk = (rng() < 0.5) ? "ONE_SIDE" : "BOTH";

    let tasksL, tasksR;
    if(modeUnk === "ONE_SIDE") {
        if(rng() < 0.5) { tasksL = 0; tasksR = rInt(rng, 1, maxTasksEq); }
        else { tasksL = rInt(rng, 1, maxTasksEq); tasksR = 0; }
    } else {
        tasksL = rInt(rng, 1, maxTasksEq);
        tasksR = rInt(rng, 1, maxTasksEq);
        if(tasksR === tasksL) tasksR = (tasksR % maxTasksEq) + 1;
    }

    let modeOpp = opposeSetting;
    if(modeOpp === "auto") modeOpp = autoPick;

    const pair = chooseSignsPair(tasksL, tasksR, modeOpp);
    if(!pair) continue;
    const signsL = pair.L;
    const signsR = pair.R;

    if(modeOpp === "mix"){
      if(!(hasBothSigns(signsL) || hasBothSigns(signsR))) continue;
    }

    const a = sumArr(signsL);
    const b = sumArr(signsR);

    if(a === b) continue;

    const vCountL = rInt(rng, vMin, vMax);
    const vCountR = rInt(rng, vMin, vMax);

    if(vCountL === 0 && vCountR === 0) continue;
    if(tasksL === 0 && vCountL === 0) continue;
    if(tasksR === 0 && vCountR === 0) continue;

    const maxCoeff = Math.max(Math.abs(a), Math.abs(b), 1);
    const maxTotalAbs = Math.max(Math.abs(userMin), Math.abs(userMax));
    let xAbsMax = Math.floor((maxTotalAbs + Math.max(vCountL, vCountR) * maxAbs) / maxCoeff);
    xAbsMax = clamp(xAbsMax, 1, maxAbs);
    const absX = rInt(rng, 1, xAbsMax);
    const x = ((rng() < 0.5) ? -1 : 1) * absX;

    let tLow = userMin;
    let tHigh = userMax;

    function applyRange(coef, vCount){
      if(vCount === 0){
        const t = coef * x;
        tLow = Math.max(tLow, t);
        tHigh = Math.min(tHigh, t);
        return;
      }
      const lo = (coef * x) - (vCount * maxAbs);
      const hi = (coef * x) + (vCount * maxAbs);
      tLow = Math.max(tLow, Math.min(lo, hi));
      tHigh = Math.min(tHigh, Math.max(lo, hi));
    }
    applyRange(a, vCountL);
    applyRange(b, vCountR);

    if(tHigh < tLow) continue;

    let total;
    if(rng() < 0.25) total = tLow;
    else if(rng() < 0.50) total = tHigh;
    else total = (tLow === tHigh) ? tLow : rInt(rng, tLow, tHigh);

    const VL = total - a*x;
    const VR = total - b*x;

    const leftVisible  = (vCountL === 0) ? [] : randomSignedCompositionNonZero(rng, VL, vCountL, maxAbs);
    const rightVisible = (vCountR === 0) ? [] : randomSignedCompositionNonZero(rng, VR, vCountR, maxAbs);
    if(leftVisible === null || rightVisible === null) continue;

    const leftHiddenByTask  = Array.from({length:tasksL}, ()=>[x]);
    const rightHiddenByTask = Array.from({length:tasksR}, ()=>[x]);

    return {
      family: "EQPM",
      total: total,
      visible: leftVisible.concat(rightVisible),
      hidden: leftHiddenByTask.flat().concat(rightHiddenByTask.flat()),
      varChar: pickVariableChar(rng),
      _eq: {
        total,
        x,
        left:  { tasks:tasksL, visible:leftVisible,  hiddenByTask:leftHiddenByTask,  opposeFlags: signsL.map(s=>s<0) },
        right: { tasks:tasksR, visible:rightVisible, hiddenByTask:rightHiddenByTask, opposeFlags: signsR.map(s=>s<0) }
      }
    };
  }

  return genEquation(rng);
}

function approxTextWidthForLabel(label, fontSize){
  const s = String(label == null ? "" : label);
  const n = Math.max(1, s.length);
  return n * (Number(fontSize) || 0) * 0.56;
}
function minCellWidthForLabel(label, fontSize, pad){
  const p = (pad == null) ? 22 : Number(pad) || 22;
  if(label == null || label === "") return Math.max(54, p * 2);
  return approxTextWidthForLabel(label, fontSize) + p;
}
function eqVisibleSum(side){
  return sumArray(side && side.visible);
}
function coeffXLabel(n, varChar = xChar){
  const c = Math.abs(Number(n) || 0);
  if(c <= 0) return "0";
  return c === 1 ? varChar : `${c}${varChar}`;
}
function formatEqSideFromCoeffVis(coeff, vis, varChar = xChar){
  const c = Math.abs(Number(coeff) || 0);
  const v = Math.abs(Number(vis) || 0);
  if(c === 0 && v === 0) return "0";
  if(c === 0) return String(v);
  if(v === 0) return coeffXLabel(c, varChar);
  return `${coeffXLabel(c, varChar)} + ${v}`;
}
function buildEquationSolveLines(eq, varChar = xChar){
  const a = Math.max(0, Number(eq?.left?.tasks) || 0);
  const b = Math.max(0, Number(eq?.right?.tasks) || 0);
  const vl = Math.max(0, eqVisibleSum(eq?.left));
  const vr = Math.max(0, eqVisibleSum(eq?.right));
  const xVal = Number(eq?.x) || 0;

  const lines = [];
  function pushLine(leftCoeff, leftVis, rightCoeff, rightVis){
    const line = `${formatEqSideFromCoeffVis(leftCoeff, leftVis, varChar)} = ${formatEqSideFromCoeffVis(rightCoeff, rightVis, varChar)}`;
    if(!lines.length || lines[lines.length - 1] !== line) lines.push(line);
  }

  pushLine(a, vl, b, vr);

  const commonX = Math.min(a, b);
  const a2 = a - commonX;
  const b2 = b - commonX;
  if(commonX > 0){
    pushLine(a2, vl, b2, vr);
  }

  const commonV = Math.min(vl, vr);
  const vl2 = vl - commonV;
  const vr2 = vr - commonV;
  if(commonV > 0){
    pushLine(a2, vl2, b2, vr2);
  }

  if(a2 > 1 && b2 === 0 && vl2 === 0 && vr2 > 0){
    const finalLine = `${varChar} = ${xVal}`;
    if(lines[lines.length - 1] !== finalLine) lines.push(finalLine);
  } else if(b2 > 1 && a2 === 0 && vr2 === 0 && vl2 > 0){
    const finalLine = `${xVal} = ${varChar}`;
    if(lines[lines.length - 1] !== finalLine) lines.push(finalLine);
  }

  return lines.filter(Boolean);
}





function getEquationStepVisibleLines(eq, revealState, varChar = xChar){
  if(revealState <= 0) return [];
  const states = getEquationStepStates(eq, varChar);
  const max = clamp(Math.round(Number(revealState) || 0), 1, states.length);
  const out = [];
  for(let i=0;i<max;i++){
    const line = states[i] && states[i].equation;
    if(line && (!out.length || out[out.length - 1] !== line)) out.push(line);
  }
  return out;
}

function buildEquationTableParts(total, coeff, visSum, xVal, mode, varChar = xChar){
  const totalSafe = Math.max(1, Number(total) || 1);
  const coeffSafe = Math.max(0, Number(coeff) || 0);
  const visSafe = Math.max(0, Number(visSum) || 0);
  const xSafe = Math.max(1, Number(xVal) || 1);
  const parts = [];

  for(let i=0;i<coeffSafe;i++){
    let label = "";
    let measureLabel = "";
    if(mode === "symbolic"){
      label = varChar;
      measureLabel = String(xSafe);
    } else if(mode === "filled") {
      label = String(xSafe);
      measureLabel = label;
    }
    parts.push({ value:xSafe, label, measureLabel, hidden:true });
  }
  if(visSafe > 0){
    const label = (mode === "blank") ? "" : String(visSafe);
    parts.push({ value:visSafe, label, measureLabel: label, hidden:false });
  }

  if(parts.length === 0){
    parts.push({ value:totalSafe, label:"", measureLabel:"", hidden:false });
  }
  return parts;
}

function drawEquationSingaporeTable(targetGroup, opts){

  const explicitRow2Widths = Array.isArray(opts.row2Widths) ? opts.row2Widths.map(v => Math.max(1, Number(v) || 1)) : null;
  const hasExplicitWidths = !!(explicitRow1Widths && explicitRow2Widths && explicitRow1Widths.length === row1.length && explicitRow2Widths.length === row2.length);
  const minHiddenCellW = Math.max(0, Number(opts.minHiddenCellW) || 0);
  const minVisibleCellW = Math.max(0, Number(opts.minVisibleCellW) || 0);
  const minHiddenCellWValue1 = Math.max(minHiddenCellW, Number(opts.minHiddenCellWValue1) || 0);
  const minVisibleCellWValue1 = Math.max(minVisibleCellW, Number(opts.minVisibleCellWValue1) || 0);
  const maxWOpt = Number(opts.maxW);

  function minWidthForPart(part){
    const value = Math.max(0, Number(part && part.value) || 0);
    if(part && part.hidden){
      return (value === 1) ? minHiddenCellWValue1 : minHiddenCellW;
    }
    return (value === 1) ? minVisibleCellWValue1 : minVisibleCellW;
  }
  const hasMaxW = Number.isFinite(maxWOpt) && maxWOpt > 0;
  let unit = hasFixedUnit ? fixedUnitOpt : (baseW / total);
  if(!compactEquation && !hasFixedUnit && !disableLabelInflation){
    [...row1, ...row2].forEach(part => {
      const val = Math.max(1, Number(part && part.value) || 1);
      const widthLabel = (part && part.measureLabel != null) ? part.measureLabel : (part && part.label);
      const minW = minCellWidthForLabel(widthLabel, fontSize, pad);
      unit = Math.max(unit, minW / val);
    });
  }

  let w = total * unit;
  let rowMetrics = null;

  if(hasExplicitWidths){
    function buildExplicitMetrics(parts, widths){
      const safeWidths = parts.map((_, idx) => Math.max(1, Number(widths[idx]) || 1));
      const totalW = safeWidths.reduce((a,b)=>a+b, 0);
      const hiddenCount = parts.filter(part => part && part.hidden).length;
      const visibleIndex = parts.findIndex(part => part && !part.hidden);
      return { widths: safeWidths, totalW, visibleIndex, hiddenCount };
    }

    const m1 = buildExplicitMetrics(row1, explicitRow1Widths);
    const m2 = buildExplicitMetrics(row2, explicitRow2Widths);
    rowMetrics = [m1, m2];
    w = Math.max(m1.totalW, m2.totalW);
  } else if(compactEquation){
    const hiddenCellW = Math.max(48, Number(opts.hiddenCellW) || 66);
    const visibleMinW = Math.max(96, Number(opts.visibleMinW) || 150);
    const visibleMaxW = Math.max(visibleMinW, Number(opts.visibleMaxW) || 220);
    const tableMinW = Math.max(360, Number(opts.tableMinW) || 540);

    function buildRowMetrics(parts){
      const hiddenCount = parts.filter(p => p && p.hidden).length;
      const visiblePart = parts.find(p => p && !p.hidden) || null;
      const visibleLabel = visiblePart ? ((visiblePart.measureLabel != null) ? visiblePart.measureLabel : visiblePart.label) : "";
      const visibleNeed = visiblePart ? clamp(minCellWidthForLabel(visibleLabel, fontSize, pad), visibleMinW, visibleMaxW) : 0;
      return { hiddenCount, visiblePart, visibleNeed };
    }

    const m1 = buildRowMetrics(row1);
    const m2 = buildRowMetrics(row2);
    rowMetrics = [m1, m2];
    w = Math.max(
      tableMinW,
      m1.hiddenCount * hiddenCellW + (m1.visiblePart ? m1.visibleNeed : 0),
      m2.hiddenCount * hiddenCellW + (m2.visiblePart ? m2.visibleNeed : 0)
    );

    rowMetrics = rowMetrics.map(m => ({
      ...m,
      visibleW: m.visiblePart ? Math.max(m.visibleNeed, w - m.hiddenCount * hiddenCellW) : 0,
      hiddenCellW
    }));
  } else {
    function buildLinearMetrics(parts){
      const mins = parts.map(part => minWidthForPart(part));
      const widths = parts.map((part, idx) => {
        const baseSegW = Math.max(1, (Number(part && part.value) || 0) * unit);
        return Math.max(baseSegW, mins[idx]);
      });

      let totalW = widths.reduce((a,b)=>a+b, 0);
      if(hasMaxW && totalW > maxWOpt){
        let surplus = totalW - maxWOpt;
        const reducibles = widths.map((w, idx) => Math.max(0, w - mins[idx]));
        let reducibleTotal = reducibles.reduce((a,b)=>a+b, 0);
        if(reducibleTotal > 0){
          for(let i=0;i<widths.length;i++){
            const reducible = reducibles[i];
            if(reducible <= 0) continue;
            const cut = Math.min(reducible, surplus * (reducible / reducibleTotal));
            widths[i] = Math.max(mins[i], widths[i] - cut);
          }
          totalW = widths.reduce((a,b)=>a+b, 0);
          if(totalW > maxWOpt + 0.5){
            for(let i=widths.length-1;i>=0 && totalW > maxWOpt + 0.5;i--){
              const extra = Math.max(0, widths[i] - mins[i]);
              if(extra <= 0) continue;
              const cut = Math.min(extra, totalW - maxWOpt);
              widths[i] -= cut;
              totalW -= cut;
            }
          }
        }
      }
      const hiddenCount = parts.filter(part => part && part.hidden).length;
      const visibleIndex = parts.findIndex(part => part && !part.hidden);
      const visiblePart = (visibleIndex >= 0) ? parts[visibleIndex] : null;
      const visibleNeed = (visibleIndex >= 0) ? Math.max(minWidthForPart(visiblePart), Math.max(1, (Number(visiblePart && visiblePart.value) || 0) * unit)) : 0;
      const hiddenNeed = hiddenCount > 0
        ? Math.max(...parts.filter(part => part && part.hidden).map(part => Math.max(minWidthForPart(part), Math.max(1, (Number(part && part.value) || 0) * unit))))
        : 0;
      return { widths, totalW, visibleIndex, hiddenCount, visibleNeed, hiddenNeed };
    }

    const m1 = buildLinearMetrics(row1);
    const m2 = buildLinearMetrics(row2);
    const forceCommonHiddenCellW = !!opts.forceCommonHiddenCellW;

    if(forceCommonHiddenCellW){
      const targetW = hasMaxW ? maxWOpt : Math.max(w, m1.totalW, m2.totalW);
      let commonHiddenCellW = Math.max(m1.hiddenNeed || 0, m2.hiddenNeed || 0, minHiddenCellW);
      [m1, m2].forEach(m => {
        if((m.hiddenCount || 0) > 0 && (m.visibleIndex || m.visibleIndex === 0)){
          const fitHiddenW = (targetW - (m.visibleNeed || minVisibleCellW)) / m.hiddenCount;
          if(Number.isFinite(fitHiddenW) && fitHiddenW > 0){
            commonHiddenCellW = Math.min(commonHiddenCellW, fitHiddenW);
          }
        }
      });
      commonHiddenCellW = Math.max(minHiddenCellW, commonHiddenCellW);

      function buildCommonMetrics(parts){
        const hiddenCount = parts.filter(part => part && part.hidden).length;
        const visibleIndex = parts.findIndex(part => part && !part.hidden);
        const widths = parts.map(part => (part && part.hidden) ? commonHiddenCellW : 0);
        let usedW = hiddenCount * commonHiddenCellW;
        if(visibleIndex >= 0){
          const visibleW = Math.max(minVisibleCellW, targetW - usedW);
          widths[visibleIndex] = visibleW;
          usedW += visibleW;
        } else if(widths.length){
          const equalHiddenW = targetW / Math.max(1, widths.length);
          for(let i=0;i<widths.length;i++) widths[i] = equalHiddenW;
          usedW = targetW;
        }
        return { widths, totalW: usedW, visibleIndex, hiddenCount, hiddenCellW: commonHiddenCellW };
      }
      rowMetrics = [buildCommonMetrics(row1), buildCommonMetrics(row2)];
      w = targetW;
    } else {
      w = Math.max(w, m1.totalW, m2.totalW);
      if(hasMaxW) w = Math.min(w, maxWOpt);

      [m1, m2].forEach(m => {
        const extra = w - m.totalW;
        if(extra > 0){
          const idx = (m.visibleIndex >= 0) ? m.visibleIndex : (m.widths.length - 1);
          if(idx >= 0) m.widths[idx] += extra;
        }
      });

      rowMetrics = [m1, m2];
    }
  }

  const x0 = (opts.cx != null) ? (Number(opts.cx) - w / 2) : (Number(opts.x) || 160);
  const y0 = Number(opts.y) || 36;
  const totalH = rowH * 2;

  targetGroup.appendChild(mkRect({
    x:x0, y:y0, width:w, height:totalH,
    fill:"rgba(255,255,255,0)", stroke, "stroke-width":strokeWidth
  }));
  targetGroup.appendChild(mkLine({
    x1:x0, y1:y0 + rowH, x2:x0 + w, y2:y0 + rowH,
    stroke, "stroke-width":strokeWidth
  }));

  function drawRow(parts, rowIndex){
    let x = x0;
    const y = y0 + rowIndex * rowH;
    const metrics = rowMetrics ? rowMetrics[rowIndex] : null;
    for(let i=0;i<parts.length;i++){
      const part = parts[i] || {};
      let segW;
      if(metrics){
        if(Array.isArray(metrics.widths)){
          segW = Math.max(1, Number(metrics.widths[i]) || 0);
        } else {
          segW = part.hidden ? metrics.hiddenCellW : metrics.visibleW;
        }
      } else {
        segW = Math.max(1, (Number(part.value) || 0) * unit);
      }
      const label = (part.label == null) ? "" : String(part.label);
      const fill = part.hidden ? hiddenFill : visibleFill;
      const isRemoved = !!part.removed;
      targetGroup.appendChild(mkRect({x, y, width:segW, height:rowH, fill}));
      if(isRemoved){
        const hatchRectFn = opts.addHatchRectFn || addHatchRect;
        hatchRectFn(targetGroup, x, y, segW, rowH);
      }
      if(label){
        const isVar = isVariableLabel(label);
        let fs = fontSize;
        if(isVar){
          if(hasVariableFontSize){
            fs = variableFontSizeOpt;
          } else {
            const varTargetFs = fontSize * 1.16;
            const varMaxFs = Math.max(20, segW * 0.70);
            fs = Math.min(varTargetFs, varMaxFs);
          }
        }
        if(fitLabelToCell){
          const unitLabelW = Math.max(0.56, approxTextWidthForLabel(label, 1));
          const fitPad = Math.min(pad * 0.60, Math.max(8, segW * 0.22));
          const fitFs = Math.max(18, (Math.max(8, segW - fitPad)) / unitLabelW);
          fs = Math.min(fs, fitFs);
        }
        targetGroup.appendChild(mkText(x + segW/2, y + rowH/2, label, {
          "text-anchor":"middle",
          "dominant-baseline":"middle",
          "alignment-baseline":"middle",
          "dy": isVar ? variableTextDy : numberTextDy,
          "font-size": String(fs),
          "fill": isRemoved ? "rgba(0,0,0,0.45)" : textColor,
          "font-weight": isVar ? "normal" : "900",
          "font-family": isVar ? variableFontFamily : "inherit",
          "font-style": isVar ? "italic" : "normal"
        }));
      }
      x += segW;
      if(i < parts.length - 1){
        targetGroup.appendChild(mkLine({
          x1:x, y1:y, x2:x, y2:y + rowH,
          stroke, "stroke-width":strokeWidth
        }));
      }
    }
  }

  drawRow(row1, 0);
  drawRow(row2, 1);

  function buildRowLayout(parts, rowIndex){
    const metrics = rowMetrics ? rowMetrics[rowIndex] : null;
    let x = x0;
    const segments = [];
    for(let i=0;i<parts.length;i++){
      const part = parts[i] || {};
      let segW;
      if(metrics){
        if(Array.isArray(metrics.widths)){
          segW = Math.max(1, Number(metrics.widths[i]) || 0);
        } else {
          segW = part.hidden ? metrics.hiddenCellW : metrics.visibleW;
        }
      } else {
        segW = Math.max(1, (Number(part.value) || 0) * unit);
      }
      segments.push({
        x,
        w: segW,
        hidden: !!part.hidden,
        label: (part.label == null) ? "" : String(part.label),
        value: Math.max(0, Number(part.value) || 0)
      });
      x += segW;
    }
    return { x:x0, right:x, w:x - x0, segments };
  }

  return {
    x:x0,
    y:y0,
    w,
    h:totalH,
    right:x0 + w,
    rows:[buildRowLayout(row1, 0), buildRowLayout(row2, 1)]
  };
}
function drawEquationLines(targetGroup, lines, x, y, api){
  const mkText = api.text;
  const fill = api.fill || "#000";
  const fontSize = Number(api.fontSize) || 54;
  const gap = Number(api.gap) || 72;
  const anchor = api.anchor || "start";
  const fontFamily = api.fontFamily || "'Times New Roman', Times, serif";
  const fontStyle = api.fontStyle || "italic";
  const alignEquals = !!api.alignEquals;
  const eqGap = Number(api.eqGap) || 18;
  let cy = y;
  for(const line of lines){
    if(alignEquals){
      const raw = String(line == null ? "" : line);
      const eqIndex = raw.indexOf("=");
      if(eqIndex >= 0){
        const lhs = raw.slice(0, eqIndex).trim();
        const rhs = raw.slice(eqIndex + 1).trim();
        targetGroup.appendChild(mkText(x - eqGap, cy, lhs, {
          "text-anchor": "end",
          "font-size": String(fontSize),
          "fill": fill,
          "font-weight": "normal",
          "font-family": fontFamily,
          "font-style": fontStyle
        }));
        targetGroup.appendChild(mkText(x, cy, "=", {
          "text-anchor": "middle",
          "font-size": String(fontSize),
          "fill": fill,
          "font-weight": "normal",
          "font-family": fontFamily,
          "font-style": fontStyle
        }));
        targetGroup.appendChild(mkText(x + eqGap, cy, rhs, {
          "text-anchor": "start",
          "font-size": String(fontSize),
          "fill": fill,
          "font-weight": "normal",
          "font-family": fontFamily,
          "font-style": fontStyle
        }));
        cy += gap;
        continue;
      }
    }
    targetGroup.appendChild(mkText(x, cy, line, {
      "text-anchor": anchor,
      "font-size": String(fontSize),
      "fill": fill,
      "font-weight": "normal",
      "font-family": fontFamily,
      "font-style": fontStyle
    }));
    cy += gap;
  }
  return cy;
}

function drawProjectionEquationLine(targetGroup, centerX, cy, lhs, rhs, opts = {}){
