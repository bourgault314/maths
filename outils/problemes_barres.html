<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Problèmes en barres</title>
<style>
:root{
  --bg:#f5f7fb;
  --ink:#0f172a;
  --muted:#64748b;
  --blue:#2563eb;
  --blue-soft:#dbeafe;
  --orange:#f97316;
  --orange-soft:#ffedd5;
  --green:#16a34a;
  --line:rgba(15,23,42,.44);
  --shadow:0 18px 50px rgba(15,23,42,.10);
  --radius:22px;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  background:
    radial-gradient(circle at top left, rgba(37,99,235,.12), transparent 34rem),
    radial-gradient(circle at bottom right, rgba(22,163,74,.10), transparent 34rem),
    var(--bg);
  color:var(--ink);
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
}
main{
  width:min(1360px, calc(100vw - 28px));
  margin:18px auto 32px;
  display:grid;
  grid-template-columns:320px minmax(0,1fr);
  gap:18px;
  align-items:start;
}
@media(max-width:900px){main{grid-template-columns:1fr}}
.panel,.stage{
  background:rgba(255,255,255,.92);
  border:1px solid rgba(15,23,42,.08);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  backdrop-filter:blur(10px);
}
.panel{padding:16px;position:sticky;top:14px}
@media(max-width:900px){.panel{position:static}}
.title{
  text-align:center;
  font-size:33px;
  font-weight:950;
  line-height:1;
  letter-spacing:-.055em;
  margin:4px 0 8px;
}
.subtitle{display:none;}
label{
  display:block;
  margin:12px 0 5px;
  font-size:12px;
  color:var(--muted);
  font-weight:850;
  text-transform:uppercase;
  letter-spacing:.06em;
}
select,input{
  width:100%;
  border:1px solid rgba(15,23,42,.14);
  border-radius:14px;
  padding:11px 12px;
  background:white;
  color:var(--ink);
  font-size:15px;
  font-weight:750;
  outline:none;
}
button{
  border:0;
  border-radius:14px;
  padding:11px 13px;
  font-size:14px;
  font-weight:900;
  color:var(--ink);
  background:#eef2f7;
  cursor:pointer;
  transition:transform .08s ease, filter .12s ease, opacity .12s ease;
}
button:hover{filter:brightness(.98)}
button:active{transform:translateY(1px)}
button.primary{background:linear-gradient(180deg,#60a5fa,#2563eb);color:white}
button.green{background:linear-gradient(180deg,#22c55e,#16a34a);color:white}
button.orange{background:linear-gradient(180deg,#fb923c,#f97316);color:white}
button.ghost{background:transparent;border:1px solid rgba(15,23,42,.12)}
button:disabled{opacity:.45;cursor:not-allowed}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.mini{
  color:var(--muted);
  font-size:12px;
  font-weight:650;
  line-height:1.35;
  margin-top:12px;
}
.mixBox{
  margin:14px 0 4px;
  padding:12px;
  border:1px solid rgba(15,23,42,.12);
  border-radius:16px;
  background:#f8fafc;
}
.mixTitle{
  font-size:12px;
  color:#64748b;
  font-weight:900;
  text-transform:uppercase;
  letter-spacing:.06em;
  margin-bottom:8px;
}
.checkLine{
  display:flex;
  align-items:center;
  gap:8px;
  margin:7px 0;
  font-size:14px;
  color:#0f172a;
  font-weight:800;
  text-transform:none;
  letter-spacing:0;
}
.checkLine input{
  width:auto;
  transform:scale(1.12);
}

.stage{
  position:relative;
  padding:18px;
  min-height:740px;
}
.stage:fullscreen{
  width:100vw;
  height:100vh;
  border-radius:0;
  padding:24px;
  display:flex;
  flex-direction:column;
  background:var(--bg);
}
.stage:fullscreen .screen{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding:14px 22px 18px;
  overflow:auto;
}
.stage:fullscreen .steps{
  margin:0 56px 10px;
}
.stage:fullscreen .statement{
  margin-top:0;
}
.stage:fullscreen .statement.compact{
  max-width:min(1280px, calc(100vw - 120px));
  font-size:clamp(19px,1.55vw,28px);
  padding:12px 18px;
  margin-bottom:8px;
}
.stage:fullscreen .section{
  max-width:min(1320px, calc(100vw - 86px));
  margin:8px auto;
  padding:14px 18px;
}
/* Étape Comprendre : vraies questions de structure + phrase réponse incomplète. */
.understandBox{
  width:min(980px,100%);
  margin:0 auto;
  display:grid;
  gap:12px;
}
.understandGrid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:12px;
}
@media(max-width:900px){.understandGrid{grid-template-columns:1fr}}
.understandCard{
  border:1px solid rgba(15,23,42,.10);
  background:rgba(255,255,255,.88);
  border-radius:18px;
  padding:14px 16px;
  text-align:left;
}
.understandQuestion{
  color:#475569;
  font-size:clamp(19px,1.45vw,25px);
  font-weight:950;
  text-transform:none;
  letter-spacing:-.01em;
  line-height:1.18;
  margin-bottom:8px;
}
.understandAnswer{
  color:#0f172a;
  font-size:clamp(23px,1.9vw,34px);
  font-weight:950;
  line-height:1.22;
}
.responseFrame{
  border:2px dashed rgba(34,197,94,.32);
  background:linear-gradient(180deg,#f0fdf4,#ffffff);
  border-radius:18px;
  padding:14px 16px;
  text-align:center;
}
.responseFrame .understandQuestion{text-align:center;color:#15803d}
.responseSentence{
  font-size:clamp(25px,2.15vw,40px);
  font-weight:950;
  color:#0f172a;
  line-height:1.22;
}
.stage:fullscreen .understandBox{width:min(1120px,100%)}
.stage:fullscreen .understandCard{padding:16px 18px}
.stage:fullscreen .understandQuestion{font-size:clamp(23px,1.75vw,31px)}
.stage:fullscreen .understandAnswer{font-size:clamp(27px,2.15vw,39px)}
.stage:fullscreen .responseSentence{font-size:clamp(30px,2.55vw,46px)}

.understandBox.answersHidden .understandAnswer,
.understandBox.answersHidden .responseSentence{
  visibility:hidden;
}
.understandActions{
  display:flex;
  justify-content:center;
  margin:2px 0 0;
}
.understandToggleBtn{
  background:linear-gradient(180deg,#60a5fa,#2563eb);
  color:white;
  border-radius:999px;
  padding:11px 20px;
  font-size:16px;
  font-weight:950;
}


.stage:fullscreen .barArea{
  width:min(1120px, calc(100vw - 150px));
  padding:18px 18px;
}
.stage:fullscreen .schemaBoard,
.stage:fullscreen .compareBoard{
  width:min(1040px, 100%);
}
.stage:fullscreen .barLine{
  min-height:112px;
}
.stage:fullscreen .part{
  font-size:clamp(32px,3.1vw,56px);
}
.stage:fullscreen .part.empty{
  font-size:clamp(24px,2vw,36px);
}
.stage:fullscreen .compareSegment{
  min-height:112px;
  font-size:clamp(30px,2.9vw,52px);
}
/* Regrouper — comparer deux quantités :
   l'aperçu Équabarre utilise le même gabarit visuel que le schéma de situation. */
.compareGroupStage{
  width:min(980px,100%);
  margin:0 auto;
}
.compareGroupStage .situationMini{
  margin-bottom:0;
}
/* Quand le schéma de situation et le schéma regroupé sont affichés ensemble,
   ils partagent le même cadre visuel. La résolution manipulable garde son format propre. */
.compareGroupStage .compareSituationBoard,
.compareGroupStage .compareRegroupPreview{
  width:100%;
  margin-left:auto;
  margin-right:auto;
}
.compareGroupStage .compareRegroupPreview{
  margin-top:34px;
}
.stage:fullscreen .compareGroupStage{
  width:min(1040px,96vw);
}


/* Résolution : le tableau reste en haut ; l'historique se déroule en dessous. */
.equabarSolve{
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.equabarSolve .schemaBoard{
  margin:0 auto;
}
.equabarSolve .equationHistory{
  margin:18px auto 0;
  min-height:0;
  height:auto;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
}
.stage:fullscreen .equabarSolve .equationHistory{
  margin-top:18px;
}
/* Regrouper — comparer deux quantités :
   le schéma regroupé reprend exactement la même grille que le schéma de situation. */
.compareRegroupPreview{
  width:min(980px,100%);
  margin:34px auto 0;
}
.compareRegroupPreview .compareGrid{
  margin:0 auto;
  row-gap:0;
  /* Même grille que le schéma de situation : étiquette + quantité commune + écart. */
  grid-template-columns:120px minmax(260px,var(--xFr)) minmax(90px,var(--dFr));
}
.compareRegroupTop{
  grid-column:2 / 4;
  grid-row:1;
  min-height:86px;
  display:flex;
  align-items:center;
  justify-content:center;
  border:2px solid var(--line);
  border-bottom:0;
  background:linear-gradient(180deg,#fff,#f8fafc);
  color:#0f172a;
  font-size:clamp(28px,2.6vw,44px);
  font-weight:950;
}
.compareRegroupX{
  grid-column:2;
  grid-row:2;
}
.compareRegroupD{
  grid-column:3;
  grid-row:2;
}
.stage:fullscreen .compareRegroupTop{
  min-height:112px;
  font-size:clamp(32px,3.1vw,56px);
}
.stage:fullscreen .compareRegroupPreview{
  width:100%;
  margin-top:42px;
}

.compareLabel{
  font-size:clamp(22px,1.8vw,32px);
}
.stage:fullscreen .equationHistory{
  font-size:clamp(30px,3.2vw,56px);
  margin-bottom:8px;
}
.quickActions{
  position:absolute;
  top:14px;
  right:14px;
  z-index:10;
  display:flex;
  gap:8px;
}
.quickBtn{
  width:44px;
  height:44px;
  padding:0;
  display:grid;
  place-items:center;
  border-radius:14px;
  font-size:21px;
  background:rgba(255,255,255,.94);
  border:1px solid rgba(15,23,42,.14);
  box-shadow:0 10px 24px rgba(15,23,42,.14);
}
.steps{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
  margin:4px 56px 18px;
}
.stepBtn{
  border:1px solid rgba(15,23,42,.12);
  background:#f8fafc;
  color:#334155;
  min-width:104px;
}
.stepBtn.active{
  background:linear-gradient(180deg,#60a5fa,#2563eb);
  color:#fff;
}
.screen{
  border-radius:24px;
  background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.42));
  border:1px solid rgba(15,23,42,.08);
  padding:22px;
}
.statement{
  max-width:1020px;
  margin:0 auto 18px;
  padding:22px 26px;
  border-radius:24px;
  background:white;
  border:1px solid rgba(15,23,42,.08);
  box-shadow:0 10px 28px rgba(15,23,42,.08);
  font-size:clamp(24px,2.35vw,38px);
  font-weight:920;
  letter-spacing:-.035em;
  line-height:1.32;
  text-align:center;
}
mark{
  padding:.02em .18em;
  border-radius:.28em;
  background:linear-gradient(180deg,rgba(254,243,199,.92),rgba(253,230,138,.92));
  color:#0f172a;
  -webkit-box-decoration-break:clone;
  box-decoration-break:clone;
  position:relative;
}
mark.relation{
  background:linear-gradient(180deg,rgba(254,215,170,.90),rgba(253,186,116,.90));
  color:#0f172a;
}
mark.question{
  background:linear-gradient(180deg,rgba(220,252,231,.96),rgba(187,247,208,.96));
  color:#0f172a;
}
.section{
  max-width:1020px;
  margin:14px auto;
  padding:18px 20px;
  border-radius:22px;
  background:rgba(255,255,255,.84);
  border:1px solid rgba(15,23,42,.08);
}
.sectionTitle{font-size:18px;font-weight:950;color:#0f172a;margin-bottom:10px}
.helperText{
  text-align:center;
  color:#334155;
  font-size:18px;
  font-weight:780;
  line-height:1.45;
}
.barArea{
  margin:10px auto 0;
  width:min(1060px,100%);
  padding:20px 16px;
  border-radius:24px;
  background:#ffffff;
  border:1px solid rgba(15,23,42,.08);
}
.schemaBoard{
  width:min(980px,100%);
  margin:0 auto;
}
.contextTag{
  text-align:center;
  font-size:17px;
  color:#334155;
  font-weight:900;
  margin-bottom:10px;
}
.barLine{
  display:flex;
  min-height:86px;
  border-left:2px solid var(--line);
  border-right:2px solid var(--line);
  background:#fff;
}
.barLine.top{
  border-top:2px solid var(--line);
  border-bottom:2px solid var(--line);
}
.barLine.bottom{
  border-bottom:2px solid var(--line);
}
.part{
  min-width:60px;
  display:grid;
  place-items:center;
  border-right:2px solid rgba(15,23,42,.36);
  background:linear-gradient(180deg,#fff,#f8fafc);
  font-size:clamp(24px,2.4vw,37px);
  font-weight:950;
  letter-spacing:-.035em;
  cursor:default;
  user-select:none;
  text-align:center;
  padding:0 8px;
}
.part:last-child{border-right:0}
.part.unknown{
  background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  color:#1d4ed8;
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;
}
.part.diff{
  background:linear-gradient(180deg,var(--orange-soft),#fff7ed);
  color:#9a3412;
}
.part.empty{
  color:#94a3b8;
  background:#fff;
  font-size:clamp(19px,1.75vw,27px);
  letter-spacing:-.02em;
}
.part.selected{
  box-shadow:inset 0 0 0 4px rgba(249,115,22,.50);
  background:
    repeating-linear-gradient(135deg, rgba(249,115,22,.20) 0 8px, rgba(255,255,255,.52) 8px 15px),
    linear-gradient(180deg,var(--orange-soft),#fff7ed);
}
.part.selectedAdd{
  box-shadow:inset 0 0 0 4px rgba(22,163,74,.50);
  background:
    repeating-linear-gradient(135deg, rgba(22,163,74,.16) 0 8px, rgba(255,255,255,.62) 8px 15px),
    linear-gradient(180deg,#dcfce7,#f0fdf4);
}
.part.selectedAdd.plusAfter{
  overflow:visible;
}
.part.selectedAdd.plusAfter::after{
  content:"+";
  position:absolute;
  right:-14px;
  top:50%;
  transform:translate(50%,-50%);
  z-index:6;
  width:26px;
  height:26px;
  border-radius:999px;
  display:grid;
  place-items:center;
  background:#ffffff;
  border:2px solid rgba(22,163,74,.55);
  color:#166534;
  font-size:20px;
  font-weight:950;
  line-height:1;
  box-shadow:0 4px 10px rgba(15,23,42,.16);
}
.part.removed{
  opacity:.23;
  background:
    repeating-linear-gradient(135deg, rgba(15,23,42,.30) 0 7px, rgba(255,255,255,.10) 7px 14px),
    #e5e7eb;
}
.part.clickable{cursor:pointer}
.compareBoard{
  width:min(980px,100%);
  margin:0 auto;
}
.compareGrid{
  display:grid;
  grid-template-columns:120px minmax(260px,var(--xFr)) minmax(90px,var(--dFr)) minmax(80px,auto);
  grid-template-rows:auto auto auto;
  gap:6px 0;
  align-items:stretch;
}
.compareBrace{
  grid-column:2 / 4;
  grid-row:1;
  min-height:34px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  position:relative;
  color:#0f172a;
  font-size:clamp(22px,2vw,34px);
  font-weight:950;
  padding-bottom:8px;
}
.compareBrace::after{
  content:"";
  position:absolute;
  left:-10px;
  right:0;
  bottom:0;
  height:10px;
  border-top:3px solid rgba(15,23,42,.52);
  border-left:3px solid rgba(15,23,42,.52);
  border-right:3px solid rgba(15,23,42,.52);
  border-radius:12px 12px 0 0;
}
.compareBrace.empty{
  visibility:hidden;
}
.countBoard{
  width:min(820px,100%);
  margin:0 auto;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.countStack{
  display:inline-flex;
  flex-direction:column;
  align-items:stretch;
  max-width:100%;
}
.countLine{
  min-height:76px;
  display:flex;
  align-items:stretch;
  justify-content:flex-start;
  gap:0;
  background:#fff;
}
.countCell{
  width:clamp(104px,9.5vw,150px);
  display:grid;
  place-items:center;
  border:2px solid rgba(15,23,42,.44);
  border-right:0;
  background:linear-gradient(180deg,#fff,#f8fafc);
  font-size:clamp(24px,2.4vw,37px);
  font-weight:950;
  letter-spacing:-.035em;
  min-width:0;
}
.countCell.last{border-right:2px solid rgba(15,23,42,.44)}
.countDots{
  width:clamp(86px,7.4vw,120px);
  font-size:clamp(30px,3vw,48px);
  color:#64748b;
  background:#fff;
}
.countBrace{
  width:100%;
  min-height:50px;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  position:relative;
  color:#1d4ed8;
  font-size:clamp(25px,2.3vw,40px);
  font-weight:950;
  padding-top:13px;
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;
}
.countBrace::before{
  content:"";
  position:absolute;
  top:0;
  left:4px;
  right:0;
  height:11px;
  border-bottom:3px solid rgba(15,23,42,.52);
  border-left:3px solid rgba(15,23,42,.52);
  border-right:3px solid rgba(15,23,42,.52);
  border-radius:0 0 12px 12px;
}
.countTop{
  display:flex;
  min-height:86px;
  margin-bottom:0;
}
.countTop .part{
  width:100%;
  border:2px solid var(--line);
  border-bottom:0;
  border-right:2px solid var(--line);
}
.countComplete{
  display:flex;
  align-items:stretch;
  justify-content:center;
  background:#fff;
}
.countComplete .countCell{
  width:clamp(88px,7.2vw,126px);
}
.unequalBoard{
  width:min(980px,100%);
  margin:0 auto;
}
.unequalWrap{
  display:grid;
  grid-template-rows:auto auto;
  gap:10px 0;
  align-items:stretch;
}
.unequalLabel{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  font-size:20px;
  font-weight:950;
  color:#334155;
  padding-right:12px;
}
.unequalPart{
  min-height:76px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(26px,2.4vw,40px);
  font-weight:950;
  letter-spacing:-.04em;
  background:#fff;
}
.unequalTopX{
  border:2px solid var(--line);
  border-right-width:1px;
}
.unequalTopDiff{
  border:2px solid var(--line);
  border-left-width:1px;
}
.unequalBottomX{
  border:2px solid var(--line);
}
.unequalTotal{
  grid-column:4;
  grid-row:1 / 3;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  color:#0f172a;
  font-size:clamp(25px,2.4vw,40px);
  font-weight:950;
  padding-left:20px;
  margin-left:2px;
}
.unequalTotal::before{
  content:"";
  position:absolute;
  left:2px;
  top:0;
  bottom:0;
  width:12px;
  border-right:3px solid rgba(15,23,42,.52);
  border-top:3px solid rgba(15,23,42,.52);
  border-bottom:3px solid rgba(15,23,42,.52);
  border-radius:0 14px 14px 0;
}
.unequalPart.unknown{
  background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  color:#1d4ed8;
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;
}
.unequalPart.diff{
  background:linear-gradient(180deg,var(--orange-soft),#fff7ed);
  color:#9a3412;
}
.unequalPart.empty{
  background:#fff;
  color:transparent;
  font-family:inherit;
  font-style:normal;
}
.ratioBoard{
  width:min(980px,100%);
  margin:0 auto;
}
.ratioWrap{
  display:grid;
  grid-template-rows:auto auto;
  gap:10px 0;
  align-items:stretch;
}
.ratioLabel{
  display:flex;
  align-items:center;
  justify-content:flex-end;
  font-size:20px;
  font-weight:950;
  color:#334155;
  padding-right:12px;
}
.ratioPart{
  min-height:76px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(26px,2.4vw,40px);
  font-weight:950;
  letter-spacing:-.04em;
  background:linear-gradient(180deg,var(--blue-soft),#eff6ff);
  color:#1d4ed8;
  font-family:Georgia,"Times New Roman",serif;
  font-style:italic;
  border:2px solid var(--line);
  border-right-width:1px;

<body>
<main>
  <section class="panel">
    <div class="title">Problèmes en barres</div>

<script>
(function(){
  "use strict";

  const names = [
    "Lina","Noé","Sami","Jade","Maya","Tom","Nora","Eden","Anna","Basile",
    "Inaya","Léo","Nina","Maël","Zoé","Ilyan","Sarah","Adam","Lou","Naël"
  ];

  const objects = [
    "billes","cartes","jetons","images","autocollants","gommettes",
    "perles","figurines","coquillages","tickets","crayons","feutres",
    "mangues","letchis"
  ];

  const objectGrammar = {
    billes:{gender:"f"},
    cartes:{gender:"f"},
    images:{gender:"f"},
    gommettes:{gender:"f"},
    perles:{gender:"f"},
    figurines:{gender:"f"},
    mangues:{gender:"f"},
    autocollants:{gender:"m"},
    coquillages:{gender:"m"},
    jetons:{gender:"m"},
    letchis:{gender:"m"},
    tickets:{gender:"m"},
    crayons:{gender:"m"},
    feutres:{gender:"m"}
  };

  const colorBases = ["rouge","bleu","vert","jaune","violet","noir","blanc","rose","orange"];

  function isFeminineObject(obj){
    return objectGrammar[obj] && objectGrammar[obj].gender === "f";
  }

  function colorLabel(base, obj){
    const feminine = isFeminineObject(obj);
    if(base === "bleu") return feminine ? "bleues" : "bleus";
    if(base === "vert") return feminine ? "vertes" : "verts";
    if(base === "violet") return feminine ? "violettes" : "violets";
    if(base === "noir") return feminine ? "noires" : "noirs";
    if(base === "blanc") return feminine ? "blanches" : "blancs";
    if(base === "orange") return "orange";
    if(base === "rouge") return "rouges";
    if(base === "jaune") return "jaunes";
    if(base === "rose") return "roses";
    return base;
  }

  function colorLabelsFor(obj){
    const bases = [...colorBases];
    const labels = [];
    while(labels.length < 3 && bases.length){
      const base = bases.splice(Math.floor(Math.random() * bases.length), 1)[0];
      labels.push(colorLabel(base, obj));
    }
    return labels;
  }

  function pastParticiplePlural(verb, obj){
    const feminine = isFeminineObject(obj);
    if(verb === "perdre") return feminine ? "perdues" : "perdus";
    if(verb === "gagner") return feminine ? "gagnées" : "gagnés";
    return feminine ? "faites" : "faits";
  }

  function possessVerb(){
    return pick(["a", "possède"]);
  }

  function totalIntroTwo(a, b, total, obj){
    return pick([
      a + " et " + b + " ont " + total + " " + obj + " en tout.",
      "À eux deux, " + a + " et " + b + " ont " + total + " " + obj + ".",
      "Ensemble, " + a + " et " + b + " possèdent " + total + " " + obj + ".",
      "La collection de " + a + " et celle de " + b + " réunies contiennent " + total + " " + obj + "."
    ]);
  }

  function totalIntroThree(a, b, c, total, obj){
    return pick([
      a + ", " + b + " et " + c + " ont " + total + " " + obj + " en tout.",
      "À eux trois, " + a + ", " + b + " et " + c + " ont " + total + " " + obj + ".",
      "Ensemble, " + a + ", " + b + " et " + c + " possèdent " + total + " " + obj + ".",
      "Les collections de " + a + ", " + b + " et " + c + " réunies contiennent " + total + " " + obj + "."
    ]);
  }

  const el = {
    category: document.getElementById("category"),
    customMixBox: document.getElementById("customMixBox"),
    mixChecks: Array.from(document.querySelectorAll(".mixCheck")),
    btnMixAll: document.getElementById("btnMixAll"),
    btnMixNone: document.getElementById("btnMixNone"),
    partWholeStructure: document.getElementById("partWholeStructure"),
    partWholeStructureLabel: document.getElementById("partWholeStructureLabel"),
    partWholeMode: document.getElementById("partWholeMode"),
    partWholeModeLabel: document.getElementById("partWholeModeLabel"),
    comparisonType: document.getElementById("comparisonType"),
    comparisonTypeLabel: document.getElementById("comparisonTypeLabel"),
    comparisonRelation: document.getElementById("comparisonRelation"),
    comparisonRelationLabel: document.getElementById("comparisonRelationLabel"),
    comparisonMode: document.getElementById("comparisonMode"),
    comparisonModeLabel: document.getElementById("comparisonModeLabel"),
    transformationKind: document.getElementById("transformationKind"),
    transformationKindLabel: document.getElementById("transformationKindLabel"),
    transformationMode: document.getElementById("transformationMode"),
    transformationModeLabel: document.getElementById("transformationModeLabel"),
    equalGroupsMode: document.getElementById("equalGroupsMode"),
    equalGroupsModeLabel: document.getElementById("equalGroupsModeLabel"),
    unequalTotalMode: document.getElementById("unequalTotalMode"),
    unequalTotalModeLabel: document.getElementById("unequalTotalModeLabel"),
    ratioMode: document.getElementById("ratioMode"),
    ratioModeLabel: document.getElementById("ratioModeLabel"),
    level: document.getElementById("level"),
    unknownMode: document.getElementById("unknownMode"),
    equationDisplay: document.getElementById("equationDisplay"),
    btnGenerate: document.getElementById("btnGenerate"),
    btnReset: document.getElementById("btnReset"),
    btnFullscreen: document.getElementById("btnFullscreen"),
    stage: document.getElementById("stage"),
    statement: document.getElementById("statement"),
    explainSection: document.getElementById("explainSection"),
    explainTitle: document.getElementById("explainTitle"),
    explainText: document.getElementById("explainText"),
    schemaSection: document.getElementById("schemaSection"),
    schemaTitle: document.getElementById("schemaTitle"),
    barArea: document.getElementById("barArea"),
    equationBelowTools: document.getElementById("equationBelowTools"),
    toolBar: document.getElementById("toolBar"),
    message: document.getElementById("message"),
    answerSection: document.getElementById("answerSection"),
    answer: document.getElementById("answer"),
    stepBtns: Array.from(document.querySelectorAll(".stepBtn")),
    toolBtns: Array.from(document.querySelectorAll(".toolBtn")),
    toolDecompose: document.getElementById("toolDecompose"),
    toolAdd: document.getElementById("toolAdd"),
    toolDelete: document.getElementById("toolDelete"),
    toolShare: document.getElementById("toolShare"),
    toolUndo: document.getElementById("toolUndo"),
    dialog: document.getElementById("decomposeDialog"),
    dialogText: document.getElementById("dialogText"),
    decomposeInput: document.getElementById("decomposeInput"),
    btnShowSuggestions: document.getElementById("btnShowSuggestions"),
    suggestions: document.getElementById("suggestions"),
    btnApplyDecompose: document.getElementById("btnApplyDecompose"),
    btnCancelDialog: document.getElementById("btnCancelDialog"),
    shareDialog: document.getElementById("shareDialog"),
    shareDialogText: document.getElementById("shareDialogText"),
    shareChoices: document.getElementById("shareChoices"),
    btnCancelShareDialog: document.getElementById("btnCancelShareDialog"),
    addDialog: document.getElementById("addDialog"),
    addDialogText: document.getElementById("addDialogText"),
    addInput: document.getElementById("addInput"),
    addSuggestions: document.getElementById("addSuggestions"),
    btnShowAddSuggestions: document.getElementById("btnShowAddSuggestions"),
    btnApplyAdd: document.getElementById("btnApplyAdd"),
    btnCancelAddDialog: document.getElementById("btnCancelAddDialog")
  };

  let problem = null;
  let step = "read";
  let actionMode = "decompose";
  let state = null;
  let history = [];
  let selected = [];
  let decomposeTarget = null;
  let selectedShareRef = null;
  let pendingAddInfo = null;
  let understandAnswersVisible = false;

  function rint(a,b){ return a + Math.floor(Math.random() * (b - a + 1)); }
  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
  function uid(){ return Math.random().toString(36).slice(2,10); }
  function clone(x){ return JSON.parse(JSON.stringify(x)); }
  function chooseUnknownSymbol(){
    if(!el.unknownMode || el.unknownMode.value === "question") return "?";
    return "𝑥";
  }

  function unknown(){
    if(problem && problem.unknownSymbol) return problem.unknownSymbol;
    return chooseUnknownSymbol();
  }

  function xTerm(count){
    const u = unknown();
    if(u === "?"){
      return count === 1 ? "?" : count + " × ?";
    }
    if(el.unknownMode && el.unknownMode.value === "explicit"){
      return count === 1 ? u : count + " × " + u;
    }
    return count === 1 ? u : count + u;
  }

  function countGroupsUnknownTerm(){
    return unknown() + " × " + problem.perGroup;
  }

  function countGroupsBraceLabel(){
    return unknown() + "&nbsp;fois&nbsp;" + problem.perGroup;
  }

  function comparisonRatioUnknownTerm(){
    return unknown() + " × " + problem.small;
  }

  function comparisonRatioBraceLabel(filled=true){
    return filled ? (unknown() + "&nbsp;fois&nbsp;" + problem.small) : (unknown() + "&nbsp;fois&nbsp;…");
  }


  function countUnknownStackStyle(columns){
    const safeColumns = Math.max(3, Number(columns) || 3);
    return countStackStyle(safeColumns, false);
  }

  function countUnknownGridColumns(columns){
    const safeColumns = Math.max(3, Number(columns) || 3);
    return "repeat(" + safeColumns + ", 1fr)";
  }

  function countUnknownCells(cellLabel, columns=3){
    const safeColumns = Math.max(3, Number(columns) || 3);
    const dotEnd = Math.max(3, safeColumns);
    return "<div class='countCell' style='grid-column:1'>" + cellLabel + "</div>" +
      "<div class='countCell countDots' style='grid-column:2 / " + dotEnd + "'>…</div>" +
      "<div class='countCell last' style='grid-column:" + safeColumns + "'>" + cellLabel + "</div>";
  }

  function range(){
    if(el.level.value === "easy") return {known:[5,18], x:[4,12], diff:[2,8], groups:[2,4]};
    if(el.level.value === "hard") return {known:[30,120], x:[18,70], diff:[10,45], groups:[4,9]};
    return {known:[10,38], x:[7,24], diff:[4,18], groups:[3,6]};
  }

  function currentLevel(){
    return el.level.value || "medium";
  }

  function currentPartWholeStructure(){
    let structure = el.partWholeStructure ? el.partWholeStructure.value : "two";
    if(structure === "mix"){
      structure = pick(["two", "three", "equal_unknowns"]);
    }
    return structure;
  }

  function partWholeModeForStructure(structure, modeOverride){
    let mode = modeOverride || el.partWholeMode.value;
    if(structure === "equal_unknowns") return "equal_unknowns";
    if(mode === "mix") return pick(["missing_part", "whole"]);
    return mode;
  }

  function partWholeKnownCountForStructure(structure){
    return structure === "three" ? 2 : 1;
  }

  function partWholeWholeCountForStructure(structure){
    return structure === "three" ? 3 : 2;
  }

  function partWholeEqualUnknownCount(){
    // Pour l’instant, on garde majoritairement deux parties égales inconnues.
    // Trois parties égales apparaissent parfois pour varier, sans passer par un niveau flou.
    return Math.random() < 0.75 ? 2 : 3;
  }

  function makeProblem(){
    let cat = el.category.value;

    if(cat === "custom_mix"){
      const checked = el.mixChecks.filter(cb => cb.checked).map(cb => cb.value);
      const pool = checked.length ? checked : ["part_whole"];
      cat = pool[Math.floor(Math.random() * pool.length)];
    }

    if(cat === "transformation") return generateTransformation(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "comparison") return generateComparison(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "comparison_additive") return generateComparisonAdditive(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "comparison_multiplicative") return generateComparisonMultiplicative(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "equal_groups") return generateEqualGroups(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "unequal_total") return generateUnequalTotal(el.category.value === "custom_mix" ? "mix" : undefined);
    if(cat === "unequal_total_diff") return generateUnequalTotalDiff();
    if(cat === "unequal_total_ratio") return generateUnequalTotalRatio();
    if(cat === "ratio") return generateRatio(el.category.value === "custom_mix" ? "mix" : undefined);
    // Compatibilité avec d'anciennes versions / liens éventuels.
    if(cat === "ratio_total") return generateRatioTotal();
    if(cat === "ratio_total_three") return generateRatioTotalThree();
    if(cat === "ratio_find") return generateRatioFind();
    if(cat === "ratio_missing") return generateRatioMissing();
    if(cat === "multi_linked") return generateMultiLinked();
    if(cat === "two_sided_linear") return generateTwoSidedLinear();
    return generatePartWhole(el.category.value === "custom_mix" ? "mix" : undefined);
  }

  function generateComparison(modeOverride){
    let type = modeOverride || (el.comparisonType ? el.comparisonType.value : "additive");
    if(type === "mix") type = pick(["additive", "multiplicative"]);
    if(type === "multiplicative") return generateComparisonMultiplicative(el.category.value === "custom_mix" ? "mix" : undefined);
    return generateComparisonAdditive(el.category.value === "custom_mix" ? "mix" : undefined);
  }

  function generateUnequalTotal(modeOverride){
    let type = modeOverride || (el.unequalTotalMode ? el.unequalTotalMode.value : "diff");
    if(type === "mix") type = pick(["diff", "rapport"]);
    if(type === "rapport") return generateUnequalTotalRatio();
    return generateUnequalTotalDiff();
  }

  function generatePartWhole(modeOverride){
    const rg = range();
    const structure = currentPartWholeStructure();
    let mode = partWholeModeForStructure(structure, modeOverride);

    const obj = pick(objects);
    const person = pick(names);

    if(mode === "whole"){
      const partCount = partWholeWholeCountForStructure(structure);
      const values = Array.from({length:partCount}, () => rint(rg.x[0], rg.known[1]));
      const total = values.reduce((sum,v) => sum + v, 0);
      const places = ["une boîte", "un sac", "une trousse"];
      const pieces = values.map(v => ({type:"number", value:v}));
      const rawParts = values.map((v,i) => v + " " + obj + " dans " + places[i]);
      const highlightedParts = values.map((v,i) => "<mark>" + v + " " + obj + "</mark> dans " + places[i]);
      const contextParts = values.map((v,i) => "partie " + (i + 1) + " = " + v).join(" ; ");
      const checkExpr = values.join(" + ");

      return {
        type:"part_whole",
        subType:"whole",
        family:"Tout et parties",
        known:values[0],
        x:total,
        total,
        pieces,
        emptyPartCount:partCount,
        rawStatement: person + " a " + rawParts.join(", ") + ". Combien y a-t-il de " + obj + " en tout ?",
        highlightedStatement:
          person + " a " + highlightedParts.join(", ") + ". " +
          "<mark class='question'>Combien y a-t-il de " + obj + " en tout ?</mark>",
        emptyText:"On prépare plusieurs parties qui formeront un tout.",
        fillText:"Toutes les parties sont connues. On cherche le tout.",
        context:contextParts,
        answer:"Il y a " + total + " " + obj + " en tout.",
        check: checkExpr + " = " + total + "."
      };
    }

    if(mode === "equal_unknowns"){
      const equalCount = partWholeEqualUnknownCount();
      const known = rint(rg.known[0], rg.known[1]);
      const x = rint(rg.x[0], rg.x[1]);
      const total = known + equalCount * x;
      const eqColors = colorLabelsFor(obj);
      const yellowLabel = colorLabel("jaune", obj);
      const equalText = equalCount === 2
        ? "autant de " + obj + " " + eqColors[0] + " que de " + obj + " " + eqColors[1]
        : "autant de " + obj + " " + eqColors[0] + ", de " + obj + " " + eqColors[1] + " et de " + obj + " " + eqColors[2];
      const unknownQuestion = "Combien y a-t-il de " + obj + " " + eqColors[0] + " ?";
      const pieces = [{type:"number", value:known}];
      for(let i = 0; i < equalCount; i++) pieces.push({type:"x", value:"x"});
      const checkExpr = [known].concat(Array(equalCount).fill(x)).join(" + ");

      return {
        type:"part_whole",
        subType:"equal_unknowns",
        family:"Tout et parties",
        known,
        x,
        total,
        pieces,
        emptyPartCount:equalCount + 1,

          "Il y a <mark class='relation'>" + equalText + "</mark>. " +
          "<mark class='question'>" + unknownQuestion + "</mark>",
        emptyText:"On prépare une barre du tout, avec une partie connue et plusieurs parties égales inconnues.",
        fillText:"Le tout est connu. Une partie est connue. Les autres parties sont égales.",
        context:"Tout = " + total + " ; partie connue = " + known + " ; les autres parties sont égales",
        answer:"Il y a " + x + " " + obj + " rouges.",
        check: checkExpr + " = " + total + "."
      };
    }

    // Chercher une partie : la structure règle directement le nombre de parties.
    const knownCount = partWholeKnownCountForStructure(structure);
    const knownValues = Array.from({length:knownCount}, () => rint(rg.x[0], rg.known[1]));
    const missing = rint(rg.x[0], rg.x[1]);
    const total = knownValues.reduce((sum,v) => sum + v, 0) + missing;
    const colors = colorLabelsFor(obj);
    const missingColor = colors[knownCount] || colorLabel("vert", obj);
    const knownSentence = knownValues.map((v,i) => "Il y a " + v + " " + obj + " " + colors[i] + ".").join(" ");
    const highlightedKnown = knownValues.map((v,i) => "Il y a <mark>" + v + " " + obj + " " + colors[i] + "</mark>.").join(" ");
    const pieces = knownValues.map(v => ({type:"number", value:v}));
    pieces.push({type:"x", value:"x"});
    const checkExpr = knownValues.concat([missing]).join(" + ");

    return {
      type:"part_whole",
      subType:"missing_part",
      family:"Tout et parties",
      known:knownValues[0],
      x:missing,
      total,
      pieces,
      emptyPartCount:knownCount + 1,
      rawStatement: "Dans une boîte, il y a " + total + " " + obj + ". " + knownSentence + " Les autres sont " + missingColor + ". Combien y a-t-il de " + obj + " " + missingColor + " ?",
      highlightedStatement:

        highlightedKnown + " Les autres sont " + missingColor + ". " +
        "<mark class='question'>Combien y a-t-il de " + obj + " " + missingColor + " ?</mark>",
      emptyText:"On prépare une barre du tout et une barre découpée en plusieurs parties.",
      fillText: knownValues.length === 1

        : "Le tout est connu. Deux parties sont connues. La partie restante est cherchée.",
      context:"Tout = " + total + " ; " + (knownValues.length === 1 ? "partie connue = " : "parties connues = ") + knownValues.join(" + "),
      answer:"Il y a " + missing + " " + obj + " " + missingColor + ".",
      check: checkExpr + " = " + total + "."
    };
  }

  function generateTransformation(modeOverride){
    const rg = range();
    let mode = modeOverride || el.transformationMode.value;
    if(mode === "mix"){
      mode = pick(["change", "after", "before"]);
    }

    let kind = el.transformationKind ? el.transformationKind.value : "gain";
    if(kind === "mix") kind = pick(["gain", "loss"]);

    const change = rint(rg.x[0], rg.x[1]);
    let before, after;
    if(kind === "gain"){
      before = rint(rg.known[0], rg.known[1]);
      after = before + change;
    }else{
      after = rint(rg.known[0], rg.known[1]);
      before = after + change;
    }

    const obj = pick(objects);
    const person = pick(names);
    const isGain = kind === "gain";
    const actionVerb = isGain ? "gagne" : "perd";
    const actionNoun = isGain ? "gain" : "perte";
    const changeLabel = isGain ? "changement" : "perte";
    const changeQuestion = isGain ? "Combien de " + obj + " ont été " + pastParticiplePlural("gagner", obj) + " ?" : "Combien de " + obj + " ont été " + pastParticiplePlural("perdre", obj) + " ?";
    const changeAnswer = isGain ? person + " a gagné " + change + " " + obj + "." : person + " a perdu " + change + " " + obj + ".";
    const decomp = isGain ? (before + " + " + change) : (after + " + " + change);

    function base(extra){
      return Object.assign({
        type:"transformation",
        subType:mode,
        changeKind:kind,
        family:"Transformation",
        before,
        change,
        after,
        decomposition:decomp
      }, extra);
    }

    if(mode === "after"){
      if(isGain){
        return base({
          known: before,
          x: after,
          total: after,
          unknownOnTop:true,
          topEmptyLabel:"après ?",
          pieces:[{type:"number",value:before},{type:"number",value:change}],
          rawStatement: person + " avait " + before + " " + obj + " au départ. Ensuite, " + person + " en " + actionVerb + " " + change + ". Combien de " + obj + " possède " + person + " maintenant ?",

            "<mark class='question'>Combien de " + obj + " possède " + person + " maintenant ?</mark>",

          fillText:"L’avant et le changement sont connus. On cherche l’après.",
          context:"Avant = " + before + " ; changement = " + change,
          answer: person + " possède " + after + " " + obj + " maintenant.",
          check: before + " + " + change + " = " + after + "."
        });
      }
      return base({
        known: before,
        x: after,
        total: before,
        topEmptyLabel:"avant",
        pieces:[{type:"x",value:"x"},{type:"number",value:change}],
        rawStatement: person + " avait " + before + " " + obj + " au départ. Ensuite, " + person + " en " + actionVerb + " " + change + ". Combien de " + obj + " reste-t-il à " + person + " maintenant ?",
        highlightedStatement:
          person + " avait <mark class='relation'>" + before + " " + obj + "</mark> au départ. " +
          "Ensuite, " + person + " en " + actionVerb + " <mark>" + change + "</mark>. " +
          "<mark class='question'>Combien de " + obj + " reste-t-il à " + person + " maintenant ?</mark>",

        fillText:"L’avant et la perte sont connus. On cherche l’après, c’est-à-dire ce qui reste.",
        context:"Avant = " + before + " ; perte = " + change,
        answer:"Il reste " + after + " " + obj + " à " + person + ".",
        check: after + " + " + change + " = " + before + "."
      });
    }

    if(mode === "before"){
      if(isGain){
        return base({
          known: change,
          x: before,
          total: after,
          topEmptyLabel:"après",
          pieces:[{type:"x",value:"x"},{type:"number",value:change}],
          rawStatement: person + " gagne " + change + " " + obj + ". Maintenant, " + person + " en possède " + after + ". Combien de " + obj + " possédait " + person + " au départ ?",
          highlightedStatement:
            person + " gagne <mark>" + change + " " + obj + "</mark>. " +
            "Maintenant, " + person + " en possède <mark class='relation'>" + after + "</mark>. " +
            "<mark class='question'>Combien de " + obj + " possédait " + person + " au départ ?</mark>",
          emptyText:"On prépare une barre de l’après, composée de l’avant et du changement.",
          fillText:"L’après et le changement sont connus. On cherche l’avant.",
          context:"Après = " + after + " ; changement = " + change,
          answer: person + " possédait " + before + " " + obj + " au départ.",
          check: before + " + " + change + " = " + after + "."
        });
      }
      return base({
        known: change,
        x: before,
        total: before,
        unknownOnTop:true,
        topEmptyLabel:"avant ?",
        pieces:[{type:"number",value:after},{type:"number",value:change}],
        rawStatement: person + " perd " + change + " " + obj + ". Maintenant, il reste " + after + " " + obj + ". Combien de " + obj + " possédait " + person + " au départ ?",
        highlightedStatement:
          person + " perd <mark>" + change + " " + obj + "</mark>. " +
          "Maintenant, il reste <mark class='relation'>" + after + " " + obj + "</mark>. " +
          "<mark class='question'>Combien de " + obj + " possédait " + person + " au départ ?</mark>",
        emptyText:"On prépare une barre de l’avant, composée de ce qui reste et de ce qui a été retiré.",
        fillText:"L’après et la perte sont connus. On cherche l’avant.",
        context:"Après = " + after + " ; perte = " + change,
        answer: person + " possédait " + before + " " + obj + " au départ.",
        check: after + " + " + change + " = " + before + "."
      });
    }

    if(isGain){
      return base({
        known: before,
        x: change,
        total: after,
        topEmptyLabel:"après",
        pieces:[{type:"number",value:before},{type:"x",value:"x"}],
        rawStatement: person + " avait " + before + " " + obj + " au départ. Maintenant, " + person + " en possède " + after + ". " + changeQuestion,
        highlightedStatement:
          person + " avait <mark>" + before + " " + obj + "</mark> au départ. " +
          "Maintenant, " + person + " en possède <mark class='relation'>" + after + "</mark>. " +
          "<mark class='question'>" + changeQuestion + "</mark>",

        fillText:"L’avant et l’après sont connus. On cherche le changement.",
        context:"Après = " + after + " ; avant = " + before,
        answer:changeAnswer,
        check: before + " + " + change + " = " + after + "."
      });
    }

    return base({
      known: after,
      x: change,
      total: before,
      topEmptyLabel:"avant",
      pieces:[{type:"number",value:after},{type:"x",value:"x"}],
      rawStatement: person + " avait " + before + " " + obj + " au départ. Maintenant, il reste " + after + " " + obj + ". " + changeQuestion,
      highlightedStatement:
        person + " avait <mark class='relation'>" + before + " " + obj + "</mark> au départ. " +
        "Maintenant, il reste <mark>" + after + " " + obj + "</mark>. " +
        "<mark class='question'>" + changeQuestion + "</mark>",
      emptyText:"On prépare une barre de l’avant, composée de ce qui reste et de ce qui a été retiré.",
      fillText:"L’avant et l’après sont connus. On cherche la perte.",
      context:"Avant = " + before + " ; après = " + after,
      answer:changeAnswer,
      check: after + " + " + change + " = " + before + "."
    });
  }

  function generateComparisonAdditive(modeOverride){
    const rg = range();
    let mode = modeOverride || el.comparisonMode.value;
    if(mode === "mix") mode = pick(["big", "small", "difference"]);

    let relation = el.comparisonRelation ? el.comparisonRelation.value : "more";

    const small = rint(rg.x[0], rg.x[1]);
    const diff = rint(rg.diff[0], rg.diff[1]);
    const big = small + diff;
    const obj = pick(objects);
    let bigName = pick(names), smallName = pick(names);
    while(smallName === bigName) smallName = pick(names);

    const plusSentence = bigName + " a " + diff + " " + obj + " de plus que " + smallName + ".";
    const lessSentence = smallName + " a " + diff + " " + obj + " de moins que " + bigName + ".";
    const relationSentence = relation === "more" ? plusSentence : lessSentence;

    if(mode === "big"){
      return {
        type:"comparison_additive",
        subType:"big",
        family:"Comparer — écart",
        bigName,
        smallName,
        known: diff,
        x: big,
        total: big,
        diff,
        small,
        big,
        unknownOnTop:true,
        pieces:[{type:"number",value:small},{type:"number",value:diff}],

        answer: bigName + " a " + big + " " + obj + ".",
        check: small + " + " + diff + " = " + big + "."
      };
    }

    if(mode === "difference"){
      const question = relation === "more"
        ? "Combien de " + obj + " de plus possède " + bigName + " ?"
        : "Combien de " + obj + " de moins possède " + smallName + " ?";

        : smallName + " a " + diff + " " + obj + " de moins que " + bigName + ".";
      return {

        known: small,
        x: diff,
        total: big,
        diff,
        small,

          bigName + " a <mark class='relation'>" + big + " " + obj + "</mark>. " +
          smallName + " a <mark>" + small + " " + obj + "</mark>. " +
          "<mark class='question'>" + question + "</mark>",
        emptyText:"On prépare deux barres alignées. L’écart est la partie en plus sur la grande quantité.",
        fillText:"Les deux quantités sont connues. On cherche l’écart entre les deux.",
        context:bigName + " = " + big + " ; " + smallName + " = " + small,

        check: small + " + " + diff + " = " + big + "."
      };
    }

    return {
      type:"comparison_additive",
      subType:"small",

      smallName,
      known: diff,
      x: small,
      total: big,
      diff,
      small,
      big,
      pieces:[{type:"x",value:"x"},{type:"number",value:diff}],
      rawStatement: bigName + " a " + big + " " + obj + ". " + relationSentence + " Combien de " + obj + " possède " + smallName + " ?",
      highlightedStatement:
        bigName + " a <mark class='relation'>" + big + " " + obj + "</mark>. " +
        "<mark>" + relationSentence + "</mark> " +
        "<mark class='question'>Combien de " + obj + " possède " + smallName + " ?</mark>",
      emptyText:"On prépare deux barres alignées. La grande quantité contient la petite quantité et l’écart.",
      fillText:"La grande quantité est connue. L’écart est connu. On cherche la petite quantité.",
      context:bigName + " = " + big + " ; écart = " + diff,
      answer: smallName + " a " + small + " " + obj + ".",
      check: small + " + " + diff + " = " + big + "."
    };
  }

  function gcd(a,b){
    a = Math.abs(Number(a));
    b = Math.abs(Number(b));
    while(b){
      const t = b;
      b = a % b;
      a = t;
    }
    return a || 1;
  }

    }

    check = a + " × " + sol + " + " + b + " = " + leftValue +
      " et " + c + " × " + sol + " + " + d + " = " + rightValue + ".";

    return {
      type:"two_sided_linear",
      subType:"ax_b_cx_d",
      family:"Équation composée",
      a,
      b,
      c,
      d,
      x: sol,
      total:leftValue,
      topPieces:[
        ...Array.from({length:a}, () => ({type:"x",value:"x"})),
        {type:"number",value:b}
      ],
      bottomPieces:[
        ...Array.from({length:c}, () => ({type:"x",value:"x"})),
        {type:"number",value:d}
      ],
      pieces:[
        ...Array.from({length:c}, () => ({type:"x",value:"x"})),
        {type:"number",value:d}
      ],
      rawStatement,
      highlightedStatement,
      emptyText,
      fillText,
      context:"Haut : " + a + unknown() + " + " + b + " ; bas : " + c + unknown() + " + " + d,
      answer,
      check
    };
  }

  function makePiece(type, value){
    return {id:uid(), type, value, removed:false};
  }

  function shouldShowUnknownOnTop(){
    return problem.unknownOnTop ||
      (problem.type === "part_whole" && problem.subType === "whole") ||
      (problem.type === "equal_groups" && problem.subType === "total");
  }

  function initEquabar(){
    if(problem.topPieces && problem.bottomPieces){
      state = {
        top: problem.topPieces.map(p => makePiece(p.type, p.value)),
        bottom: problem.bottomPieces.map(p => makePiece(p.type, p.value)),
        steps: []
      };
    }else if(shouldShowUnknownOnTop()){
      state = {
        top: [makePiece("x", "x")],
        bottom: problem.pieces.map(p => makePiece(p.type, p.value)),
        steps: []
      };
    }else{
      state = {
        top: [makePiece("number", problem.total)],
        bottom: problem.pieces.map(p => makePiece(p.type, p.value)),
        steps: []
      };
    }
    history = [];
    selected = [];
    recordStep();
  }

  function active(side){
    return state[side].filter(p => !p.removed);
  }

  function sideExpr(side){
    const pieces = active(side);
    if(!pieces.length) return "0";

    if(pieces.length >= 2 && pieces.every(p => p.type === "x")){
      return xTerm(pieces.length);
    }

    if(pieces.length >= 2 && pieces.every(p => p.type === "number")){
      const sameValue = pieces.every(p => Number(p.value) === Number(pieces[0].value));
      if(sameValue) return pieces.length + " × " + pieces[0].value;
    }

    // On respecte l'ordre visuel des briques dans le tableau.
    // Exemple : si la ligne du bas montre 37 puis x, l'équation affiche 37 + x,
    // et non x + 37. On regroupe seulement les inconnues consécutives.
    const terms = [];
    let xRun = 0;

    function flushXRun(){
      if(xRun > 0){
        terms.push(xTerm(xRun));
        xRun = 0;
      }
    }

    pieces.forEach(p => {
      if(p.type === "x"){
        xRun++;
      }else{
        flushXRun();
        terms.push(String(p.value));
      }
    });
    flushXRun();

    return terms.join(" + ");
  }

  function solvedValue(){
    const top = active("top");
    const bottom = active("bottom");
    if(!top.length || !bottom.length) return null;

    const isAllNumbers = arr => arr.every(p => p.type === "number");
    const isAllX = arr => arr.every(p => p.type === "x");
    const allSameNumber = arr => isAllNumbers(arr) && arr.every(p => Number(p.value) === Number(arr[0].value));

    if(allSameNumber(top) && isAllX(bottom) && top.length === bottom.length) return top[0].value;
    if(allSameNumber(bottom) && isAllX(top) && top.length === bottom.length) return bottom[0].value;
    return null;
  }

  function currentEquation(){
    // L'équation suit toujours la lecture du schéma :
    // la barre du haut est égale à la barre du bas.
    if(problem && problem.type === "equal_groups" && problem.subType === "count"){
      return sideExpr("top") + " = " + countGroupsUnknownTerm();
    }
    if(problem && problem.type === "comparison_multiplicative" && problem.subType === "ratio"){
      return sideExpr("top") + " = " + comparisonRatioUnknownTerm();
    }
    return sideExpr("top") + " = " + sideExpr("bottom");
  }

  function recordStep(){
    const eq = currentEquation();
    if(!state.steps.length || state.steps[state.steps.length - 1] !== eq){
      state.steps.push(eq);
    }

    if(problem && problem.type === "equal_groups" && problem.subType === "count"){
      const top = active("top");
      const solvedCount = top.length >= 2 &&
        top.every(p => p.type === "number" && Number(p.value) === Number(problem.perGroup))
          ? top.length
          : null;
      if(solvedCount !== null){
        const solvedEq = unknown() + " = " + solvedCount;
        if(state.steps[state.steps.length - 1] !== solvedEq){
          state.steps.push(solvedEq);
        }
      }
      return;
    }

    if(problem && problem.type === "comparison_multiplicative" && problem.subType === "ratio"){
      const top = active("top");
      const solvedRatio = top.length >= 2 &&
        top.every(p => p.type === "number" && Number(p.value) === Number(problem.small))
          ? top.length
          : null;
      if(solvedRatio !== null){
        const solvedEq = unknown() + " = " + solvedRatio;
        if(state.steps[state.steps.length - 1] !== solvedEq){
          state.steps.push(solvedEq);
        }
      }
      return;
    }

    const value = solvedValue();
    if(value !== null && value !== undefined){
      const solvedEq = unknown() + " = " + value;
      if(state.steps[state.steps.length - 1] !== solvedEq){
        state.steps.push(solvedEq);
      }
    }
  }

  function pushHistory(){
    history.push(clone(state));
    if(history.length > 50) history.shift();
  }

  function newProblem(){
    problem = makeProblem();
    problem.unknownSymbol = chooseUnknownSymbol();
    understandAnswersVisible = false;
    initEquabar();
    setAction("decompose");
    setStep("read");
  }

  function resetSameProblem(){
    initEquabar();
    setAction("decompose");
    setStep("read");
  }

  function needsGrouping(){
    return problem && (
      problem.type === "comparison_additive" ||
      problem.type === "unequal_total_diff" ||
      problem.type === "unequal_total_ratio" ||
      problem.type === "multi_linked"
    );
  }

  function effectiveOrder(){
    return needsGrouping()
      ? ["read","understand","empty","fill","group","solve","answer"]
      : ["read","understand","empty","fill","solve","answer"];
  }

  function updateStepVisibility(){
    const complex = needsGrouping();
    el.stepBtns.forEach(btn => {
      if(btn.dataset.step === "group"){
        btn.style.display = complex ? "" : "none";
      }
      const labelsComplex = {
        read:"1. Lire", understand:"2. Comprendre", empty:"3. Schéma vide",
        fill:"4. Remplir", group:"5. Regrouper", solve:"6. Résoudre", answer:"7. Répondre"
      };
      const labelsSimple = {
        read:"1. Lire", understand:"2. Comprendre", empty:"3. Schéma vide",
        fill:"4. Remplir", solve:"5. Résoudre", answer:"6. Répondre"
      };
      const map = complex ? labelsComplex : labelsSimple;
      if(map[btn.dataset.step]) btn.textContent = map[btn.dataset.step];
    });
  }


  function stripTags(html){
    const tmp = document.createElement("div");
    tmp.innerHTML = html || "";
    return tmp.textContent || tmp.innerText || "";
  }

  function blankNumbers(sentence){
    return String(sentence || "")
      .replace(/\b\d+\b/g, "___")
      .replace(/\s+/g, " ")
      .trim();
  }

  function answerTemplate(){
    return blankNumbers(stripTags(problem.answer || ""));
  }

  function withCurrentUnknown(text){
    let out = String(text || "");
    if(problem && problem.unknownSymbol && problem.unknownSymbol !== unknown()){
      out = out.split(problem.unknownSymbol).join(unknown());
    }
    return out;
  }

  function contextHtml(){
    return withCurrentUnknown(problem.context || "").replace(/;\s*/g,"<br>");
  }

  function searched(label){
    return label + " (" + unknown() + ")";
  }

  function understandCard(question, answer){
    return "<div class='understandCard'>" +
      "<div class='understandQuestion'>" + question + "</div>" +
      "<div class='understandAnswer'>" + answer + "</div>" +
    "</div>";
  }

  function renderUnderstanding(){
    const cards = [];

    if(problem.type === "part_whole"){
      const search = problem.subType === "whole" ? searched("le tout") : searched("une partie");
      const equality = problem.subType === "equal_unknowns" ? "Les parties inconnues sont égales." : "Les parties ne sont pas forcément égales.";
      cards.push(understandCard("Que cherche-t-on ?", search));
      cards.push(understandCard("Les parties sont-elles égales ou inégales ?", equality));
      cards.push(understandCard("Quelles informations sont connues ?", contextHtml()));
    }else if(problem.type === "transformation"){
      const search = problem.subType === "before" ? searched("l’avant") : (problem.subType === "after" ? searched("l’après") : searched("le changement"));
      const beforeAfter = problem.kind === "loss" ? "Il y en avait plus avant qu’après." : "Il y en a plus après qu’avant.";
      cards.push(understandCard("Que cherche-t-on ?", search));
      cards.push(understandCard("Avait-on plus avant ou après ?", beforeAfter));
      cards.push(understandCard("Quelles informations sont connues ?", contextHtml()));
    }else if(problem.type === "comparison_additive"){
      const search = problem.subType === "difference" ? searched("l’écart") : (problem.subType === "big" ? searched("la grande quantité") : searched("la petite quantité"));
      const bigger = problem.bigName ? (problem.bigName + " a la plus grande quantité.") : "On repère la plus grande quantité.";
      const diffKnown = problem.subType === "difference" ? "L’écart est inconnu." : "L’écart est connu.";
      cards.push(understandCard("Que cherche-t-on ?", search));
      cards.push(understandCard("Qui en a le plus ?", bigger));
      cards.push(understandCard("L’écart est-il connu ?", diffKnown));
    }else if(problem.type === "comparison_multiplicative"){
      const search = problem.subType === "ratio" ? searched("le rapport") : (problem.subType === "big" ? searched("la grande quantité") : searched("la petite quantité"));
      cards.push(understandCard("Que cherche-t-on ?", search));
      cards.push(understandCard("Qui en a le plus ?", problem.bigName + " a la plus grande quantité."));
      cards.push(understandCard("Quel est le rapport ?", "La grande quantité vaut " + problem.ratio + " fois la petite."));
    }else if(problem.type === "equal_groups"){
      const search = problem.subType === "total" ? searched("le total") : (problem.subType === "count" ? searched("le nombre de groupes") : searched("la valeur d’un groupe"));
      cards.push(understandCard("Que cherche-t-on ?", search));
      cards.push(understandCard("Que sait-on des groupes ?", "Les groupes sont égaux."));
      cards.push(understandCard("Quelles informations sont connues ?", contextHtml()));
    }else if(problem.type === "unequal_total_diff"){
      cards.push(understandCard("Que cherche-t-on ?", "la quantité de chacun"));
      cards.push(understandCard("Les deux parts sont-elles égales ?", "Non : elles sont inégales, avec un écart connu."));
      cards.push(understandCard("Qui a la plus grande quantité ?", problem.bigName + " a la plus grande quantité."));
    }else if(problem.type === "unequal_total_ratio"){
      cards.push(understandCard("Que cherche-t-on ?", "la quantité de chacun"));
      cards.push(understandCard("Les deux parts sont-elles égales ?", "Non : une quantité vaut plusieurs fois l’autre."));
      cards.push(understandCard("Quelle est la part de référence ?", problem.smallName + " correspond à une part."));
    }else if(problem.type === "ratio_total"){
      cards.push(understandCard("Que cherche-t-on ?", "les deux quantités"));
      cards.push(understandCard("Que signifie le ratio ?", problem.firstName + " a " + problem.a + " part(s) et " + problem.secondName + " a " + problem.b + " part(s)."));
      cards.push(understandCard("Quelle idée utiliser ?", "Partager le total en " + (problem.a + problem.b) + " parts égales."));
    }else if(problem.type === "ratio_total_three"){
      cards.push(understandCard("Que cherche-t-on ?", "les trois quantités"));
      cards.push(understandCard("Que signifie le ratio ?", problem.people[0] + " a " + problem.ratioParts[0] + " part(s), " + problem.people[1] + " a " + problem.ratioParts[1] + " part(s), " + problem.people[2] + " a " + problem.ratioParts[2] + " part(s)."));
      cards.push(understandCard("Quelle idée utiliser ?", "Partager le total en " + problem.ratioParts.reduce((s,v)=>s+v,0) + " parts égales."));
    }else if(problem.type === "ratio_find"){
      cards.push(understandCard("Que cherche-t-on ?", "un ratio simplifié"));
      cards.push(understandCard("Dans quel ordre écrire le ratio ?", problem.firstName + " : " + problem.secondName));
      cards.push(understandCard("Quelle idée utiliser ?", "Diviser les deux quantités par le même nombre."));
    }else if(problem.type === "ratio_missing"){
      cards.push(understandCard("Que cherche-t-on ?", "une quantité manquante"));
      cards.push(understandCard("Que signifie le ratio ?", problem.firstName + " a " + problem.a + " part(s) et " + problem.secondName + " a " + problem.b + " part(s)."));
      cards.push(understandCard("Quelle idée utiliser ?", "Trouver d’abord la valeur d’une part."));
    }else if(problem.type === "multi_linked"){
      cards.push(understandCard("Que cherche-t-on ?", "la quantité de référence"));
      const dependency = problem.subType === "chain_mixed"
        ? "Non : on suit une chaîne de relations entre les quantités."
        : "Non : elles sont toutes liées à la même quantité de référence.";
      cards.push(understandCard("Les quantités sont-elles indépendantes ?", dependency));
      cards.push(understandCard("Quelle est la référence ?", problem.refLabel + " correspond à la quantité cherchée."));
    }else if(problem.type === "two_sided_linear"){
      cards.push(understandCard("Que cherche-t-on ?", "la valeur d’un paquet identique"));
      cards.push(understandCard("Que sait-on des deux barres ?", "Elles représentent la même quantité."));
      cards.push(understandCard("Quelle idée utiliser ?", "Supprimer les mêmes éléments dans chaque membre, puis partager."));
    }

    if(!cards.length){
      cards.push(understandCard("Que cherche-t-on ?", "l’inconnue du problème (" + unknown() + ")"));
    }

    const response = answerTemplate();
    el.explainSection.style.display = "";
    el.explainTitle.textContent = "Comprendre le problème";
    const boxClass = understandAnswersVisible ? "understandBox" : "understandBox answersHidden";
    const buttonLabel = understandAnswersVisible ? "Masquer les réponses" : "Afficher les réponses";
    el.explainText.innerHTML =
      "<div class='" + boxClass + "'>" +
        "<div class='understandGrid'>" + cards.join("") + "</div>" +
        "<div class='responseFrame'>" +
          "<div class='understandQuestion'>À quoi doit ressembler la phrase réponse ?</div>" +
          "<div class='responseSentence'>" + response + "</div>" +
        "</div>" +
        "<div class='understandActions'>" +
          "<button type='button' class='understandToggleBtn' id='btnToggleUnderstandAnswers'>" + buttonLabel + "</button>" +
        "</div>" +
      "</div>";
  }

  function setStep(next){
    updateStepVisibility();
    if(next === "group" && !needsGrouping()) next = "solve";
    const previousStep = step;
    if(next === "understand" && previousStep !== "understand") understandAnswersVisible = false;
    step = next;
    el.stepBtns.forEach(btn => btn.classList.toggle("active", btn.dataset.step === step));
    el.statement.classList.toggle("compact", ["empty","fill","group","solve","answer"].includes(step));
    el.explainSection.style.display = "none";
    el.schemaSection.style.display = "none";
    el.answerSection.style.display = "none";
    el.toolBar.style.display = "none";
    if(el.equationBelowTools) el.equationBelowTools.innerHTML = "";
    el.message.textContent = "";

    if(step === "read"){
      el.statement.textContent = problem.rawStatement;
    }

    if(step === "understand"){
      el.statement.innerHTML = problem.highlightedStatement;
      renderUnderstanding();
    }

    if(step === "empty"){
      el.statement.innerHTML = problem.highlightedStatement;
      el.schemaSection.style.display = "";
      el.schemaTitle.textContent = "Structure du schéma";
      renderEmpty();
    }

    if(step === "fill"){
      el.statement.innerHTML = problem.highlightedStatement;
      el.schemaSection.style.display = "";
      el.schemaTitle.textContent = "Schéma rempli";
      renderFilled();
    }

    if(step === "group"){
      el.statement.innerHTML = problem.highlightedStatement;
      el.explainSection.style.display = "none";
      el.explainTitle.textContent = "";
      el.explainText.textContent = "";
      el.schemaSection.style.display = "";
      el.schemaTitle.textContent = "Schéma de situation puis schéma regroupé";
      renderGroupingStep();
    }

    if(step === "solve"){
      el.statement.innerHTML = problem.highlightedStatement;
      el.schemaSection.style.display = "";
      el.schemaTitle.textContent = "Schéma en barre manipulable";
      el.toolBar.style.display = (problem.type === "ratio_find" || problem.type === "ratio_missing") ? "none" : "";
      renderEquabar();
    }

    if(step === "answer"){
      el.statement.innerHTML = problem.highlightedStatement;
      el.schemaSection.style.display = "";
      el.schemaTitle.textContent = "Tableau final";
      renderEquabar();
      el.answerSection.style.display = "";
      el.answer.innerHTML = problem.answer + "<br><span style='font-size:.72em;color:#334155'>" + problem.check + "</span>";
    }
  }

  function renderUnequalSchema(filled){
    const xLabel = filled ? unknown() : "&nbsp;";
    const diffLabel = filled ? problem.diff : "&nbsp;";
    const totalLabel = filled ? problem.total : "total";
    const xFlex = Math.max(1, problem.small || problem.x || 1);
    const diffFlex = Math.max(1, problem.diff || problem.known || 1);

    const bottomLabel = filled ? problem.smallName : "Petite";

      "grid-template-columns:110px minmax(210px," + xFlex + "fr) minmax(88px," + diffFlex + "fr) 112px;";

        "<div class='unequalPart unequalTopX unknown' style='grid-column:2;grid-row:1'>" + xLabel + "</div>" +

        "<div class='unequalLabel' style='grid-column:1;grid-row:2'>" + bottomLabel + "</div>" +

        "<div class='unequalTotal'>" + totalLabel + "</div>" +

  function renderRatioSchema(filled){
    const xLabel = filled ? unknown() : "&nbsp;";
    const totalLabel = filled ? problem.total : "total";

    const topLabel = filled ? problem.bigName : "Grande";
    const bottomLabel = filled ? problem.smallName : "Petite";

        "<div class='ratioLabel' style='grid-column:1;grid-row:2'>" + bottomLabel + "</div>" +
        "<div class='ratioPart first last' style='grid-column:2;grid-row:2'>" + xLabel + "</div>" +
        "<div class='ratioTotal'>" + totalLabel + "</div>" +

  function renderUnequalSchemaForGroupingFrame(filled=true){
    const xLabel = filled ? unknown() : "&nbsp;";
    const diffLabel = filled ? problem.diff : "&nbsp;";
    const totalLabel = filled ? problem.total : "total";
    const xFlex = Math.max(1, problem.small || problem.x || 1);
    const diffFlex = Math.max(1, problem.diff || problem.known || 1);

    // Même largeur totale que le schéma regroupé : x + écart + x.
    // Dans le schéma de situation, les barres restent alignées à gauche :
    // grande quantité = x + écart ; petite quantité = x.
    const columns = "110px minmax(110px," + xFlex + "fr) minmax(72px," + diffFlex + "fr) minmax(110px," + xFlex + "fr) 72px";

    return "<div class='groupAlignedBoard'>" +

  function renderMultiLinkedSchema(filled, showGrouped){
    const xLabel = filled ? unknown() : "&nbsp;";
    const diffLabel = filled ? problem.diff : "&nbsp;";
    const totalLabel = filled ? problem.total : "total";
    const multiplier = problem.multiplier || 2;
    const plusMultiplier = problem.plusMultiplier || 1;

    const totalUnits = ((1 + multiplier + plusMultiplier) * problem.ref) + problem.diff;
    const refUnits = problem.ref;
    const relationUnits = multiplier * problem.ref;
    const plusUnits = plusMultiplier * problem.ref + problem.diff;
    const maxUnits = Math.max(refUnits, relationUnits, plusUnits);

    const rowsCoef = (maxUnits / totalUnits).toFixed(6);
    const refPct = (100 * refUnits / maxUnits).toFixed(4);
    const relationPct = (100 * relationUnits / maxUnits).toFixed(4);
    const plusPct = (100 * plusUnits / maxUnits).toFixed(4);

    let relationParts = "";
    for(let i = 0; i < multiplier; i++){
      relationParts += "<div class='multiPart unknown " + (i === 0 ? "joinRight" : "joinLeft") + "' style='flex:" + problem.ref + "'>" + xLabel + "</div>";
    }

    let plusParts = "";
    for(let i = 0; i < plusMultiplier; i++){
      plusParts += "<div class='multiPart unknown " + (i === 0 ? "joinRight" : "joinLeft") + "' style='flex:" + problem.ref + "'>" + xLabel + "</div>";
    }
    plusParts += "<div class='multiPart diff joinLeft' style='flex:" + problem.diff + "'>" + diffLabel + "</div>";

    const thirdLabel = problem.subType === "chain_mixed"
      ? ((filled ? problem.plusLabel : "Chaîne") + " = " + (filled ? problem.doubleLabel : "précédent") + " + écart")
      : (filled ? problem.plusLabel : "Réf. + écart");

    return "<div class='multiBoard' style='--rowsW:calc(var(--refW) * " + rowsCoef + ")'>" +
      "<div class='multiSituation'>" +
        "<div class='multiLabels'>" +
          "<div class='multiLabel'>" + (filled ? problem.refLabel : "Référence") + "</div>" +

          "<div class='multiLabel'>" + thirdLabel + "</div>" +

            "</div>" +
            "<div class='multiRow' style='width:" + relationPct + "%'>" + relationParts + "</div>" +
            "<div class='multiRow' style='width:" + plusPct + "%'>" + plusParts + "</div>" +

        "</div>" +

    const diffFlex = Math.max(1, problem.diff || problem.known || 1);

    const bigIsUnknown = problem.subType === "big";
    const smallIsUnknown = problem.subType === "small";

    const bigLabel = filled ? (bigIsUnknown ? unknown() : problem.big) : "&nbsp;";

    const diffLabel = filled ? (diffIsUnknown ? unknown() : problem.diff) : "&nbsp;";

    const bigClass = filled && bigIsUnknown ? " unknown" : (filled ? "" : " empty");
    const smallClass = filled && smallIsUnknown ? " unknown" : (filled ? "" : " empty");
    const diffClass = filled && diffIsUnknown ? " unknown" : (filled ? "" : " empty");

    return "<div class='compareSituationBoard'>" +
      "<div class='compareSituationGrid' style='--smallFr:" + smallFlex + "fr;--diffFr:" + diffFlex + "fr'>" +
        "<div class='compareSituationLabel' style='grid-column:1;grid-row:1'>" + problem.bigName + "</div>" +
        "<div class='compareSituationBar" + bigClass + "' style='grid-column:2 / 4;grid-row:1'>" + bigLabel + "</div>" +
        "<div class='compareSituationLabel' style='grid-column:1;grid-row:2'>" + problem.smallName + "</div>" +
        "<div class='compareSituationBar" + smallClass + "' style='grid-column:2;grid-row:2'>" + smallLabel + "</div>" +
        "<div class='compareSituationDiff" + diffClass + "' style='grid-column:3;grid-row:2'><span>" + diffLabel + "</span></div>" +
      "</div>" +
    "</div>";

  function renderComparisonFilledSchema(){
    return renderComparisonSituationSchema(true);

  function renderFilled(){
    if(problem.type === "comparison_additive"){
      el.barArea.innerHTML = renderComparisonFilledSchema();
      return;
    }

    if(problem.type === "comparison_multiplicative"){
      el.barArea.innerHTML = problem.subType === "ratio"
        ? renderComparisonRatioSchema(true)
        : renderComparisonMultiplicativeSchema(true);
      return;
    }

    if(problem.type === "multi_linked"){
      el.barArea.innerHTML = renderMultiLinkedSchema(true, false);
      return;
    }

    if(problem.type === "unequal_total_ratio"){
      // Remplir reprend exactement le même gabarit que le schéma de situation affiché dans Regrouper.
      el.barArea.innerHTML = "<div class='groupStage'><div class='situationMini'>" + renderRatioSchemaForGroupingFrame() + "</div></div>";
      return;
    }

    if(problem.type === "ratio_total"){
      el.barArea.innerHTML = renderRatioTotalSchema(true);
      return;
    }

    if(problem.type === "ratio_total_three"){
      el.barArea.innerHTML = renderRatioTotalThreeSchema(true);
      return;
    }

    if(problem.type === "ratio_find"){
      el.barArea.innerHTML = renderRatioFindSchema(true);
      return;
    }

    if(problem.type === "ratio_missing"){
      el.barArea.innerHTML = renderRatioMissingSchema(true);
      return;
    }

    if(problem.type === "unequal_total_diff"){
      // Remplir reprend exactement le même gabarit que le schéma de situation affiché dans Regrouper.
      el.barArea.innerHTML = "<div class='groupStage'><div class='situationMini'>" + renderUnequalSchemaForGroupingFrame() + "</div></div>";
      return;
    }

    if(problem.type === "two_sided_linear"){
      el.barArea.innerHTML = renderEquabarPreview();
      return;
    }

    if(problem.type === "equal_groups" && problem.subType === "count"){
      el.barArea.innerHTML = renderCountGroups(true);
      return;
    }

    el.barArea.innerHTML = renderFilledEquabarPreview();
  }

  function partHtml(p, flex){
    let cls = "part";
    if(p.type === "x") cls += " unknown";
    if(problem.type === "comparison_additive" && problem.subType !== "difference" && p.type === "number") cls += " diff";
    if(problem.type === "unequal_total_diff" && p.type === "number" && p.role === "diff") cls += " diff";
    const label = p.type === "x" ? unknown() : p.value;
    return "<div class='" + cls + "' style='flex:" + flex + "'>" + label + "</div>";
  }

  function countStackStyle(displayedCells, hasDots){
    // Widths match the CSS countCell/countDots clamp values approximately.
    // This avoids the top bar taking a different width from the visible cells.
    const normal = "clamp(104px,9.5vw,150px)";
    const dots = "clamp(86px,7.4vw,120px)";
    if(hasDots){
      return "width:calc(" + normal + " * 3 + " + dots + ")";
    }
    return "width:calc(" + normal + " * " + displayedCells + ")";
  }

  function countSolvedStackStyle(displayedCells){
    const normal = "clamp(88px,7.2vw,126px)";
    return "width:calc(" + normal + " * " + displayedCells + ")";
  }

  function renderCountGroups(filled){
    const topLabel = filled ? problem.total : "total";
    const cellLabel = filled ? problem.perGroup : "&nbsp;";
    const braceLabel = filled ? countGroupsBraceLabel() : (unknown() + "&nbsp;fois&nbsp;…");
    const columns = Math.max(3, problem.groupCount || 3);
    const stackStyle = countUnknownStackStyle(columns);
    const cells = countUnknownCells(cellLabel, columns);

    return "<div class='countBoard'>" +
      "<div class='contextTag'>Groupes égaux</div>" +
      "<div class='countStack' style='" + stackStyle + "'>" +
        "<div class='countTop'><div class='part' style='flex:1'>" + topLabel + "</div></div>" +
        "<div class='countLine unknownCount' style='grid-template-columns:" + countUnknownGridColumns(columns) + "'>" + cells + "</div>" +
        "<div class='countBrace'>" + braceLabel + "</div>" +
      "</div>" +
    "</div>";
  }

  function renderCountGroupsSolved(){
    const top = active("top");
    const topIsSplit = top.length >= 2 && top.every(p => p.type === "number" && Number(p.value) === Number(problem.perGroup));
    const displayColumns = Math.max(3, topIsSplit ? top.length : (problem.groupCount || 3));
    const stackStyle = countStackStyle(displayColumns, false);

    let topBrace = "<div class='countTopBrace empty'>&nbsp;</div>";
    let topHtml = "";

    if(topIsSplit){
      topBrace = "<div class='countTopBrace'>" + top.length + " fois " + problem.perGroup + "</div>";
      topHtml = top.map((p,i) => {
        const cls = "countCell clickable" + (i === top.length - 1 ? " last" : "");
        return "<div class='" + cls + "' data-ref='top:" + p.id + "'>" + p.value + "</div>";
      }).join("");
    }else{
      const p = top[0];
      topHtml = "<div class='countCell clickable last' style='grid-column:1 / " + (displayColumns + 1) + "' data-ref='top:" + p.id + "'>" + p.value + "</div>";
    }

    const bottomCells = countUnknownCells(problem.perGroup, displayColumns);
    const cols = countUnknownGridColumns(displayColumns);

    return "<div class='countBoard countSolveBoard'>" +
      "<div class='countStack' style='" + stackStyle + "'>" +
        topBrace +
        "<div class='countTop unknownCount' style='grid-template-columns:" + cols + "'>" + topHtml + "</div>" +
        "<div class='countLine unknownCount' style='grid-template-columns:" + cols + "'>" + bottomCells + "</div>" +
        "<div class='countBrace'>" + countGroupsBraceLabel() + "</div>" +
      "</div>" +
    "</div>";
