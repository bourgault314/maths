  function renderSidePreview(pieces){
    return pieces.map(p => {
      const flex = p.type === "x" ? Math.max(1, problem.x) : Math.max(1, p.value);
      return partHtml(p, flex);
    }).join("");
  }

  function renderCompareRegroupPreview(){
    const xFlex = Math.max(1, problem.small || problem.x || 4);
    const diffFlex = Math.max(1, problem.diff || problem.known || 1);
    const xKnown = problem.subType === "difference" || problem.subType === "big";
    const diffKnown = problem.subType !== "difference";
    const xLabel = xKnown ? problem.small : unknown();
    const diffLabel = diffKnown ? problem.diff : unknown();
    const xClass = xKnown ? "" : "unknown";
    const diffClass = diffKnown ? "diff" : "unknown";
    const topLabel = problem.subType === "big" ? unknown() : problem.total;

    return "<div class='compareRegroupPreview'>" +
      "<div class='compareGrid' style='--xFr:" + xFlex + "fr;--dFr:" + diffFlex + "fr'>" +
        "<div class='compareRegroupTop'>" + topLabel + "</div>" +
        "<div class='compareSegment compareRegroupX " + xClass + "'>" + xLabel + "</div>" +
        "<div class='compareSegment compareRegroupD " + diffClass + " end'>" + diffLabel + "</div>" +
      "</div>" +
    "</div>";
  }

  function pieceMeasureForGrid(piece){
    if(piece.type === "x") return Math.max(1, Number(problem.x) || 1);
    return Math.max(1, Math.abs(Number(piece.value) || 1));
  }

  function pieceWidthPercentForGrid(piece){
    const total = Math.max(1, Number(problem.total) || 1);
    return (pieceMeasureForGrid(piece) / total) * 100;
  }

  function gridLineData(pieces, commonLineWidth=null){
    const widths = pieces.map(piece => pieceWidthPercentForGrid(piece));
    const naturalLineWidth = widths.reduce((sum,w) => sum + w, 0);
    const lineWidth = commonLineWidth == null ? naturalLineWidth : commonLineWidth;
    const safeLineWidth = Math.max(0.0001, lineWidth);
    const cols = widths.map(w => ((w / safeLineWidth) * 100).toFixed(6) + "%").join(" ") || "1fr";
    return {cols, lineWidth: Math.max(0, Math.min(100, lineWidth))};
  }

  function hasSelectedAddAfter(side, id){
    if(actionMode !== "add") return false;
    const arr = state[side] || [];
    const selectedIds = new Set(selected.filter(s => s.side === side).map(s => s.id));
    const idx = arr.findIndex(p => p.id === id);
    if(idx < 0 || !selectedIds.has(id)) return false;
    for(let i = idx + 1; i < arr.length; i++){
      if(selectedIds.has(arr[i].id)) return true;
      // Si les cases sélectionnées ne sont pas voisines, on ne dessine pas de + dans l'espace.
      if(!arr[i].removed) return false;
    }
    return false;
  }

  function pieceHtmlForGrid(p, side, clickable){
    let cls = "part";
    if(clickable) cls += " clickable";
    if(p.type === "x") cls += " unknown";
    // En résolution manipulable, seules les inconnues restent colorées : les nombres connus restent neutres.
    // Les aperçus non manipulables peuvent conserver la couleur pédagogique de l'écart.
    if(!clickable && ((problem.type === "comparison_additive" && problem.subType !== "difference") || problem.type === "unequal_total_diff" || problem.type === "multi_linked") && p.type === "number" && side === "bottom") cls += " diff";
    if(p.removed) cls += " removed";
    if(clickable && selected.some(s => s.side === side && s.id === p.id)){
      cls += actionMode === "add" ? " selectedAdd" : " selected";
      if(actionMode === "add" && hasSelectedAddAfter(side, p.id)) cls += " plusAfter";
    }
    const label = p.type === "x" ? unknown() : p.value;
    const ref = clickable ? " data-ref='" + side + ":" + p.id + "'" : "";
    return "<div class='" + cls + "'" + ref + ">" + label + "</div>";
  }

  function renderGridLine(side, pieces, commonLineWidth, clickable){
    const meta = gridLineData(pieces, commonLineWidth);
    const html = pieces.map(p => pieceHtmlForGrid(p, side, clickable)).join("");
    return {
      style:"--cols:" + meta.cols + ";--lineWidth:" + meta.lineWidth.toFixed(6) + "%",
      html
    };
  }

  function visiblePiecesForGrid(side){
    return state[side];
  }

  function renderFilledEquabarPreview(){
    const topPieces = shouldShowUnknownOnTop() ? [makePiece("x", "x")] : [makePiece("number", problem.total)];
    const bottomPieces = problem.pieces.map(p => makePiece(p.type, p.value));
    const topW = topPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const bottomW = bottomPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const commonW = Math.max(topW, bottomW);
    const topLine = renderGridLine("top", topPieces, commonW, false);
    const bottomLine = renderGridLine("bottom", bottomPieces, commonW, false);

    return "<div class='filledEquabarPreview'>" +
      "<div class='schemaBoard'>" +
        "<div class='barLine top' style='" + topLine.style + "'>" + topLine.html + "</div>" +
        "<div class='barLine bottom' style='" + bottomLine.style + "'>" + bottomLine.html + "</div>" +
      "</div>" +
    "</div>";
  }

  function renderEquabarPreview(){
    const topPieces = problem.topPieces
      ? problem.topPieces.map(p => makePiece(p.type, p.value))
      : (shouldShowUnknownOnTop() ? [makePiece("x", "x")] : [makePiece("number", problem.total)]);
    const bottomPieces = problem.bottomPieces
      ? problem.bottomPieces.map(p => makePiece(p.type, p.value))
      : problem.pieces.map(p => makePiece(p.type, p.value));
    const topW = topPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const bottomW = bottomPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const commonW = Math.max(topW, bottomW);
    const topLine = renderGridLine("top", topPieces, commonW, false);
    const bottomLine = renderGridLine("bottom", bottomPieces, commonW, false);

    let ownerBraces = "";
    if(problem.type === "unequal_total_diff"){
      ownerBraces = "<div class='unequalOwnerBraces' style='" + bottomLine.style + "'>" +
          "<div class='ownerBrace' style='grid-column:1'>" + problem.smallName + "</div>" +
          "<div class='ownerBrace' style='grid-column:2 / 4'>" + problem.bigName + "</div>" +
        "</div>";
    }else if(problem.type === "ratio_total"){
      const n = problem.a + problem.b;
      ownerBraces = "<div class='unequalOwnerBraces' style='" + bottomLine.style + "'>" +
          "<div class='ownerBrace' style='grid-column:1 / " + (problem.a + 1) + "'>" + problem.firstName + "</div>" +
          "<div class='ownerBrace' style='grid-column:" + (problem.a + 1) + " / " + (n + 1) + "'>" + problem.secondName + "</div>" +
        "</div>";
    }else if(problem.type === "ratio_total_three"){
      const n = problem.ratioParts.reduce((s,v)=>s+v,0);
      const p0 = problem.ratioParts[0], p1 = problem.ratioParts[1];
      ownerBraces = "<div class='unequalOwnerBraces' style='" + bottomLine.style + "'>" +
          "<div class='ownerBrace' style='grid-column:1 / " + (p0 + 1) + "'>" + problem.people[0] + "</div>" +
          "<div class='ownerBrace' style='grid-column:" + (p0 + 1) + " / " + (p0 + p1 + 1) + "'>" + problem.people[1] + "</div>" +
          "<div class='ownerBrace' style='grid-column:" + (p0 + p1 + 1) + " / " + (n + 1) + "'>" + problem.people[2] + "</div>" +
        "</div>";
    }

    return "<div class='equabarPreview'>" +
      "<div class='schemaBoard'>" +
        "<div class='barLine top' style='" + topLine.style + "'>" + topLine.html + "</div>" +
        "<div class='barLine bottom' style='" + bottomLine.style + "'>" + bottomLine.html + "</div>" +
        ownerBraces +
      "</div>" +
    "</div>";

  function renderGroupingStep(){
    let situation = "";

    if(problem.type === "comparison_additive"){
      situation = renderComparisonFilledSchema();
      el.barArea.innerHTML =
        "<div class='compareGroupStage'>" +
          "<div class='situationMini'>" + situation + "</div>" +

    if(problem.type === "unequal_total_diff"){

      renderEquabar();
      return;

      "<div class='groupStage'>" +
        "<div class='situationMini'>" + situation + "</div>" +

  function renderEquabar(){
    if(problem.type === "ratio_find"){
      el.barArea.innerHTML = renderRatioFindSchema(true, true);
      if(el.equationBelowTools){
        el.equationBelowTools.innerHTML = el.equationDisplay.value === "yes"
          ? "<div class='equationHistory'><div>" + problem.first + ":" + problem.second + " = " + problem.a + ":" + problem.b + "</div></div>"
          : "";
      }
      return;
    }

    if(problem.type === "ratio_missing"){
      el.barArea.innerHTML = renderRatioMissingSchema(true, true);
      if(el.equationBelowTools){

          ? "<div class='equationHistory'><div>" + problem.knownParts + " parts = " + problem.knownValue + "</div><div>1 part = " + problem.unit + "</div><div>" + problem.missingParts + " parts = " + problem.missingValue + "</div></div>"
          : "";
      }
      return;
    }

    if(problem.type === "comparison_multiplicative" && problem.subType === "ratio"){
      const equation = state.steps.map((s,i) => "<div class='" + (i < state.steps.length - 1 ? "old" : "") + "'>" + s + "</div>").join("");
      const equationBlock = el.equationDisplay.value === "yes"
        ? "<div class='equationHistory'>" + equation + "</div>"

      el.barArea.querySelectorAll("[data-ref]").forEach(node => {
        node.addEventListener("click", () => onPieceClick(node.dataset.ref));
      });
      updateActionMessage();
      return;
    }

    if(problem.type === "equal_groups" && problem.subType === "count"){
      const equation = state.steps.map((s,i) => "<div class='" + (i < state.steps.length - 1 ? "old" : "") + "'>" + s + "</div>").join("");
      const equationBlock = el.equationDisplay.value === "yes"
        ? "<div class='equationHistory'>" + equation + "</div>"
        : "";
      el.barArea.innerHTML = "<div class='equabarSolve'>" + renderCountGroupsSolved() + "</div>";
      if(el.equationBelowTools) el.equationBelowTools.innerHTML = equationBlock;

      el.barArea.querySelectorAll("[data-ref]").forEach(node => {
        node.addEventListener("click", () => onPieceClick(node.dataset.ref));
      });
      updateActionMessage();
      return;
    }

    const equation = state.steps.map((s,i) => "<div class='" + (i < state.steps.length - 1 ? "old" : "") + "'>" + s + "</div>").join("");
    const equationBlock = el.equationDisplay.value === "yes"
      ? "<div class='equationHistory'>" + equation + "</div>"
      : "";
    const solveClass = problem.type === "comparison_additive" ? "equabarSolve compareSolve" : "equabarSolve";
    const topPieces = visiblePiecesForGrid("top");
    const bottomPieces = visiblePiecesForGrid("bottom");
    const topW = topPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const bottomW = bottomPieces.reduce((sum,p)=>sum + pieceWidthPercentForGrid(p), 0);
    const commonW = Math.max(topW, bottomW);
    const topLine = renderGridLine("top", topPieces, commonW, true);
    const bottomLine = renderGridLine("bottom", bottomPieces, commonW, true);

    el.barArea.innerHTML =
      "<div class='" + solveClass + "'>" +
        "<div class='schemaBoard'>" +
          "<div class='barLine top' style='" + topLine.style + "'>" + topLine.html + "</div>" +
          "<div class='barLine bottom' style='" + bottomLine.style + "'>" + bottomLine.html + "</div>" +
        "</div>" +
      "</div>";
    if(el.equationBelowTools) el.equationBelowTools.innerHTML = equationBlock;

    el.barArea.querySelectorAll("[data-ref]").forEach(node => {
      node.addEventListener("click", () => onPieceClick(node.dataset.ref));
    });

    updateActionMessage();

    // La valeur trouvée apparaît dans l'équation et sera formulée à l'étape Répondre.
  }

  function renderSide(side){
    return state[side].map(p => {
      let cls = "part clickable";
      if(p.type === "x") cls += " unknown";
      if(((problem.type === "comparison_additive" && problem.subType !== "difference") || problem.type === "unequal_total_diff") && p.type === "number" && side === "bottom") cls += " diff";
      if(p.removed) cls += " removed";
      if(selected.some(s => s.side === side && s.id === p.id)){
        cls += actionMode === "add" ? " selectedAdd" : " selected";
        if(actionMode === "add" && hasSelectedAddAfter(side, p.id)) cls += " plusAfter";
      }
      const label = p.type === "x" ? unknown() : p.value;
      const flex = p.type === "number" ? Math.max(1, Number(p.value)||1) : Math.max(1, problem.x);
      return "<div class='" + cls + "' style='flex:" + flex + "' data-ref='" + side + ":" + p.id + "'>" + label + "</div>";
    }).join("");
  }

  function setAction(mode){
    actionMode = mode;
    selected = [];
    selectedShareRef = null;
    pendingAddInfo = null;
    el.toolBtns.forEach(b => b.classList.remove("active"));
    if(mode === "decompose") el.toolDecompose.classList.add("active");
    if(mode === "add" && el.toolAdd) el.toolAdd.classList.add("active");
    if(mode === "delete") el.toolDelete.classList.add("active");
    if(mode === "share") el.toolShare.classList.add("active");
    el.message.textContent = "";
    if(step === "solve" || step === "answer") renderEquabar();
  }

  function refToPiece(ref){
    const parts = ref.split(":");
    const side = parts[0], id = parts[1];
    return {side, id, piece: state[side].find(p => p.id === id)};
  }

  function onPieceClick(ref){
    if(step !== "solve") return;
    const item = refToPiece(ref);
    if(!item.piece || item.piece.removed) return;

    if(actionMode === "decompose"){
      if(item.piece.type !== "number"){
        el.message.textContent = "On décompose un nombre, pas une inconnue.";
        return;
      }
      openDecompose(item);
      return;
    }

    if(actionMode === "add"){
      if(item.piece.type !== "number"){
        el.message.textContent = "On regroupe des nombres, pas une inconnue.";
        return;
      }
      toggleSelectForAdd(item);
      renderEquabar();
      return;
    }

    if(actionMode === "delete"){
      toggleSelect(item);
      renderEquabar();
      return;
    }

    if(actionMode === "share"){
      if(item.piece.type !== "number"){
        el.message.textContent = "En mode Partager, clique sur un nombre à couper en parts égales.";
        return;
      }
      openShareDialog(item);
      return;
    }
  }

  function shuffle(arr){
    const out = arr.slice();
    for(let i=out.length-1; i>0; i--){
      const j = Math.floor(Math.random()*(i+1));
      [out[i], out[j]] = [out[j], out[i]];
    }
    return out;
  }

  function shuffleUnique(arr){
    return shuffle(Array.from(new Set(arr)));
  }

  function usefulDecomposition(value){
    if(problem.type === "equal_groups"){
      return Array.from({length:problem.groupCount}, () => problem.x).join(" + ");
    }
    if(problem.type === "comparison_additive"){
      return problem.small + " + " + problem.diff;
    }
    if(problem.type === "transformation"){
      return problem.decomposition || (problem.before + " + " + problem.change);
    }
    if(problem.type === "unequal_total_diff"){
      return (2 * problem.small) + " + " + problem.diff;
    }
    if(problem.type === "unequal_total_ratio"){
      return Array.from({length:problem.ratio + 1}, () => problem.small).join(" + ");
    }
    if(problem.type === "multi_linked"){
      const xCount = 1 + (problem.multiplier || 2) + (problem.plusMultiplier || 1);
      return (xCount * problem.ref) + " + " + problem.diff;
    }
    return problem.known + " + " + problem.x;
  }

  function buildSuggestions(value){
    const suggestions = [];
    const good = usefulDecomposition(value);
    if(good && good.includes("+")){
      const goodNums = good.split("+").map(x => Number(String(x).trim())).filter(Number.isFinite);
      const goodTotal = goodNums.reduce((a,b)=>a+b,0);
      if(goodNums.length >= 2 && goodTotal === value) suggestions.push(good);
    }

    const x = Math.max(1, Number(problem.x) || Math.floor(value/2));
    const knowns = [
      Number(problem.diff), Number(problem.known), Number(problem.before),
      Number(problem.change), Number(problem.small), Number(problem.ref), 10, x
    ].filter(n => Number.isFinite(n) && n > 0 && n < value);

    const candidates = [];
    for(const n of knowns){
      candidates.push((value - n) + " + " + n);
      candidates.push(n + " + " + (value - n));
    }

    for(let left=1; left<=value-1; left++){
      const right = value - left;
      if(left === right) candidates.push(left + " + " + right);
      if(left === 10 || right === 10) candidates.push(left + " + " + right);
      if(left === x || right === x) candidates.push(left + " + " + right);
    }

    const simpleSplits = [
      [1, value-1],
      [2, value-2],
      [Math.floor(value/2), value-Math.floor(value/2)],
      [Math.max(1, value-5), value-Math.max(1, value-5)],
      [Math.max(1, value-10), value-Math.max(1, value-10)]
    ];
    for(const [u,v] of simpleSplits){
      if(u > 0 && v > 0 && u + v === value) candidates.push(u + " + " + v);
    }

    for(const c of shuffleUnique(candidates)){
      if(!suggestions.includes(c)) suggestions.push(c);
      if(suggestions.length >= 4) break;
    }
    return shuffle(suggestions.slice(0,4));
  }

  function openDecompose(item){
    decomposeTarget = item;
    el.dialogText.textContent = "Décomposer " + item.piece.value + " en somme.";
    el.decomposeInput.value = "";
    const v = Number(item.piece.value);
    const suggestions = buildSuggestions(v);
    el.suggestions.innerHTML = suggestions.map(s => "<button class='suggestion' data-sug='" + s + "'>" + s + "</button>").join("");
    el.suggestions.classList.add("hidden");
    el.suggestions.querySelectorAll("[data-sug]").forEach(btn => {
      btn.addEventListener("click", () => { el.decomposeInput.value = btn.dataset.sug; });
    });
    el.dialog.showModal();
    setTimeout(() => el.decomposeInput.focus(), 60);
  }

  function applyDecompose(){
    if(!decomposeTarget) return;
    const txt = el.decomposeInput.value.trim().replace(/,/g,".");
    const nums = txt.split("+").map(x => Number(x.trim())).filter(Number.isFinite);
    const total = nums.reduce((a,b)=>a+b,0);
    if(nums.length < 2 || total !== Number(decomposeTarget.piece.value)){
      el.message.textContent = "La somme proposée ne correspond pas au nombre.";
      return;
    }

    pushHistory();
    const arr = state[decomposeTarget.side];
    const index = arr.findIndex(p => p.id === decomposeTarget.id);
    arr.splice(index, 1, ...nums.map(n => makePiece("number", n)));
    decomposeTarget = null;
    el.dialog.close();
    recordStep();
    renderEquabar();
  }


  function additionGroupInfo(){
    const {top, bottom} = selectedPiecesBySide();
    const side = top.length ? "top" : (bottom.length ? "bottom" : null);
    const pieces = side === "top" ? top : bottom;
    if(!side || pieces.length < 2) return {ok:false, reason:"needMore", side, pieces};
    if(top.length && bottom.length) return {ok:false, reason:"oneSide", side:null, pieces:top.concat(bottom)};
    if(pieces.some(p => p.type !== "number")) return {ok:false, reason:"numbersOnly", side, pieces};
    const sum = pieces.reduce((total,p) => total + Number(p.value || 0), 0);
    const expr = pieces.map(p => p.value).join(" + ");
    return {ok:true, side, pieces, sum, expr};
  }

  function toggleSelectForAdd(item){
    const exists = selected.some(s => s.side === item.side && s.id === item.id);
    if(exists){
      selected = selected.filter(s => !(s.side === item.side && s.id === item.id));
      return;
    }

    if(item.piece.type !== "number"){
      selected = [];
      return;
    }

    if(selected.length && selected[0].side !== item.side){
      selected = [];
    }

    selected.push({side:item.side, id:item.id});
  }

  function additionMessageHtml(){
    if(actionMode !== "add" || step !== "solve") return "";
    if(!selected.length) return "Sélectionne plusieurs nombres du même côté pour les regrouper.";

    const info = additionGroupInfo();
    if(info.ok){
      return "<button class='orange' id='btnOpenAddDialog' type='button'>Regrouper</button> " +
        "<button class='ghost' id='btnClearSelection' type='button'>Effacer</button>";
    }

    let reason = "Sélectionne au moins deux nombres du même côté.";
    if(info.reason === "oneSide") reason = "Pour regrouper, les nombres doivent être dans le même membre.";
    if(info.reason === "numbersOnly") reason = "On regroupe seulement des nombres connus.";
    return reason + " <button class='ghost' id='btnClearSelection' type='button'>Effacer la sélection</button>";
  }

  function buildAddSuggestions(info){
    const correct = info.sum;
    const wrongCandidates = [
      correct + 1,
      Math.max(0, correct - 1),
      correct + 10,
      Math.max(0, correct - 10)
    ].filter(n => Number.isFinite(n) && n !== correct && n > 0);
    const wrong = wrongCandidates.length ? wrongCandidates[Math.floor(Math.random() * wrongCandidates.length)] : correct + 1;
    return shuffle([correct, wrong]);
  }

  function renderAddSuggestions(info){
    if(!el.addSuggestions) return;
    const suggestions = buildAddSuggestions(info);
    el.addSuggestions.innerHTML = suggestions.map(v =>
      "<button class='suggestion' data-add-sug='" + v + "'>" + v + "</button>"
    ).join("");
    el.addSuggestions.classList.add("hidden");
    el.addSuggestions.querySelectorAll("[data-add-sug]").forEach(btn => {
      btn.addEventListener("click", () => { el.addInput.value = btn.dataset.addSug; });
    });
  }

  function openAddDialog(){
    const info = additionGroupInfo();
    if(!info.ok){
      renderEquabar();
      return;
    }
    pendingAddInfo = info;
    el.addDialogText.innerHTML = "";
    el.addInput.value = "";
    renderAddSuggestions(info);
    el.addDialog.showModal();
    setTimeout(() => el.addInput.focus(), 60);
  }

  function applyAdd(){
    if(!pendingAddInfo) return;
    const value = Number(String(el.addInput.value).trim().replace(/,/g,"."));
    if(!Number.isFinite(value) || value !== pendingAddInfo.sum){
      el.message.textContent = "La somme proposée ne correspond pas aux nombres sélectionnés.";
      return;
    }

    pushHistory();
    const arr = state[pendingAddInfo.side];
    const ids = new Set(pendingAddInfo.pieces.map(p => p.id));
    const indexes = arr.map((p,i) => ids.has(p.id) ? i : -1).filter(i => i >= 0);
    const firstIndex = Math.min(...indexes);
    const replacement = makePiece("number", pendingAddInfo.sum);
    const next = [];
    for(let i=0; i<arr.length; i++){
      if(i === firstIndex) next.push(replacement);
      if(!ids.has(arr[i].id)) next.push(arr[i]);
    }
    state[pendingAddInfo.side] = next;
    selected = [];
    pendingAddInfo = null;
    el.addDialog.close();
    recordStep();
    renderEquabar();
    el.message.textContent = "Nombres regroupés.";
  }

  function selectedPiecesBySide(){
    const top = [];
    const bottom = [];
    for(const ref of selected){
      const p = state[ref.side].find(piece => piece.id === ref.id);
      if(!p || p.removed) continue;
      if(ref.side === "top") top.push(p);
      if(ref.side === "bottom") bottom.push(p);
    }
    return {top, bottom};
  }

  function deletionGroupInfo(){
    const {top, bottom} = selectedPiecesBySide();
    if(top.length === 0 || bottom.length === 0) return {ok:false, reason:"needBoth", top, bottom};

    const all = top.concat(bottom);
    const firstType = all[0].type;
    if(all.some(p => p.type !== firstType)) return {ok:false, reason:"mixedTypes", top, bottom};

    if(firstType === "x"){
      if(top.length !== bottom.length) return {ok:false, reason:"differentCounts", top, bottom};
      return {ok:true, type:"x", label:xTerm(top.length), top, bottom};
    }

    if(firstType === "number"){
      const topSum = top.reduce((sum,p) => sum + Number(p.value || 0), 0);
      const bottomSum = bottom.reduce((sum,p) => sum + Number(p.value || 0), 0);
      if(topSum !== bottomSum) return {ok:false, reason:"differentSums", top, bottom, topSum, bottomSum};
      return {ok:true, type:"number", label:String(topSum), top, bottom};
    }

    return {ok:false, reason:"unknown", top, bottom};
  }

  function clearSelection(){
    selected = [];
    renderEquabar();
  }

  function deletionMessageHtml(){
    if(actionMode !== "delete" || step !== "solve" || !selected.length) return "";
    const info = deletionGroupInfo();
    const {top, bottom} = selectedPiecesBySide();

    if(top.length === 0 || bottom.length === 0){
      return "Sélectionne maintenant une quantité dans l’autre membre. <button class='ghost' id='btnClearSelection' type='button'>Effacer la sélection</button>";
    }

    if(info.ok){
      return "Même quantité sélectionnée : <strong>" + info.label + "</strong>. " +
        "<button class='orange' id='btnValidateDelete' type='button'>Valider la suppression</button> " +
        "<button class='ghost' id='btnClearSelection' type='button'>Effacer</button>";
    }

    let reason = "Les deux quantités sélectionnées ne sont pas identiques.";
    if(info.reason === "differentCounts") reason = "Il faut le même nombre de lettres de chaque côté.";
    if(info.reason === "differentSums") reason = "Les nombres sélectionnés ne font pas la même somme.";
    if(info.reason === "mixedTypes") reason = "Ne mélange pas lettres et nombres.";
    return reason + " <button class='ghost' id='btnClearSelection' type='button'>Effacer la sélection</button>";
  }

  function attachMessageActions(){
    const clear = document.getElementById("btnClearSelection");
    if(clear) clear.addEventListener("click", clearSelection);
    const validate = document.getElementById("btnValidateDelete");
    if(validate) validate.addEventListener("click", deleteMatchingSelection);
    const add = document.getElementById("btnOpenAddDialog");
    if(add) add.addEventListener("click", openAddDialog);
  }

  function updateActionMessage(defaultText){
    const addHtml = additionMessageHtml();
    const html = addHtml || deletionMessageHtml();
    if(html){
      el.message.innerHTML = html;
      attachMessageActions();
    }else if(defaultText){
      el.message.textContent = defaultText;
    }else if(!selected.length){
      el.message.textContent = "";
    }
  }

  function toggleSelect(item){
    const exists = selected.some(s => s.side === item.side && s.id === item.id);
    if(exists){
      selected = selected.filter(s => !(s.side === item.side && s.id === item.id));
      return;
    }

    const currentPieces = selected.map(ref => state[ref.side].find(p => p.id === ref.id)).filter(Boolean);
    if(currentPieces.length && currentPieces[0].type !== item.piece.type){
      selected = [];
    }

    selected.push({side:item.side, id:item.id});
  }

  function deleteMatchingSelection(){
    const info = deletionGroupInfo();
    if(!info.ok){
      renderEquabar();
      return;
    }

    pushHistory();
    const ids = new Set(selected.map(s => s.id));
    for(const side of ["top","bottom"]){
      for(const p of state[side]){
        if(ids.has(p.id)) p.removed = true;
      }
    }
    selected = [];
    recordStep();
    renderEquabar();
    el.message.textContent = "Même quantité supprimée dans chaque membre.";
  }

  function getOppositeSide(side){
    return side === "top" ? "bottom" : "top";
  }

  function countActiveX(side){
    return active(side).filter(p => p.type === "x").length;
  }

  function possibleShareCounts(value, side){
    const maxParts = 12;
    const out = [];
    const oppositeX = countActiveX(getOppositeSide(side));
    if(oppositeX >= 2 && oppositeX <= maxParts && value % oppositeX === 0) out.push(oppositeX);
    for(let n = 2; n <= maxParts; n++){
      if(value % n === 0 && !out.includes(n)) out.push(n);
    }
    return shuffle(out);
  }

  function openShareDialog(item){
    const value = Number(item.piece.value);
    const choices = possibleShareCounts(value, item.side);
    selectedShareRef = {side:item.side, id:item.id, value};

    el.shareDialogText.innerHTML = "Tu vas partager <strong>" + value + "</strong> en parts égales.";
    if(!choices.length){
      el.shareChoices.innerHTML = "<div class='message'>Aucun partage entier raisonnable n’est possible pour ce nombre.</div>";
    }else{
      el.shareChoices.innerHTML = choices.map(n =>
        "<button class='suggestion' type='button' data-share='" + n + "'>" + n + " parts de " + (value / n) + "</button>"
      ).join("");
      el.shareChoices.querySelectorAll("[data-share]").forEach(btn => {
        btn.addEventListener("click", () => applyShareChoice(Number(btn.dataset.share)));
      });
    }
    el.shareDialog.showModal();
  }

  function applyShareChoice(count){
    if(!selectedShareRef) return;
    if(selectedShareRef.value % count !== 0){
      el.message.textContent = "Ce partage ne donne pas des parts entières.";
      return;
    }

    const arr = state[selectedShareRef.side];
    const idx = arr.findIndex(p => p.id === selectedShareRef.id);
    if(idx < 0) return;

    pushHistory();
    const part = selectedShareRef.value / count;
    arr.splice(idx, 1, ...Array.from({length:count}, () => makePiece("number", part)));
    selectedShareRef = null;
    el.shareDialog.close();
    recordStep();
    renderEquabar();
    el.message.textContent = "Nombre partagé en parts égales.";
  }

  function undo(){
    if(!history.length){
      el.message.textContent = "Rien à annuler.";
      return;
    }
    state = history.pop();
    selected = [];
    renderEquabar();
  }

  function refreshEquationHistory(){
    if(state){
      state.steps = [currentEquation()];
    }
  }

  el.btnGenerate.addEventListener("click", newProblem);
  el.btnReset.addEventListener("click", resetSameProblem);
  el.category.addEventListener("change", () => {
    updateOptionMenuVisibility();
    newProblem();
  });
  if(el.partWholeStructure) el.partWholeStructure.addEventListener("change", newProblem);
  el.partWholeMode.addEventListener("change", newProblem);
  if(el.comparisonType) el.comparisonType.addEventListener("change", () => {
    updateOptionMenuVisibility();
    newProblem();
  });
  if(el.comparisonRelation) el.comparisonRelation.addEventListener("change", newProblem);
  el.comparisonMode.addEventListener("change", newProblem);
  if(el.transformationKind) el.transformationKind.addEventListener("change", newProblem);
  el.transformationMode.addEventListener("change", newProblem);
  el.equalGroupsMode.addEventListener("change", newProblem);
  if(el.unequalTotalMode) el.unequalTotalMode.addEventListener("change", newProblem);
  if(el.ratioMode) el.ratioMode.addEventListener("change", newProblem);
  el.mixChecks.forEach(cb => cb.addEventListener("change", () => {
    if(el.category.value === "custom_mix") newProblem();
  }));
  el.btnMixAll.addEventListener("click", () => {
    el.mixChecks.forEach(cb => cb.checked = true);
    if(el.category.value === "custom_mix") newProblem();
  });
  el.btnMixNone.addEventListener("click", () => {
    el.mixChecks.forEach(cb => cb.checked = false);
    if(el.category.value === "custom_mix") newProblem();
  });
  el.level.addEventListener("change", newProblem);
  el.unknownMode.addEventListener("change", newProblem);
  el.equationDisplay.addEventListener("change", () => {
    if(step === "solve" || step === "answer") renderEquabar();
  });
  el.stepBtns.forEach(btn => btn.addEventListener("click", () => setStep(btn.dataset.step)));
  el.toolDecompose.addEventListener("click", () => setAction("decompose"));
  if(el.toolAdd) el.toolAdd.addEventListener("click", () => setAction("add"));
  el.toolDelete.addEventListener("click", () => setAction("delete"));
  el.toolShare.addEventListener("click", () => setAction("share"));
  el.toolUndo.addEventListener("click", undo);
  el.btnCancelDialog.addEventListener("click", () => el.dialog.close());
  if(el.btnCancelShareDialog) el.btnCancelShareDialog.addEventListener("click", () => el.shareDialog.close());
  if(el.btnCancelAddDialog) el.btnCancelAddDialog.addEventListener("click", () => el.addDialog.close());
  if(el.btnApplyAdd) el.btnApplyAdd.addEventListener("click", applyAdd);
  if(el.btnShowAddSuggestions && el.addSuggestions) el.btnShowAddSuggestions.addEventListener("click", () => el.addSuggestions.classList.toggle("hidden"));
  el.btnApplyDecompose.addEventListener("click", applyDecompose);
  if(el.btnShowSuggestions) el.btnShowSuggestions.addEventListener("click", () => el.suggestions.classList.toggle("hidden"));
  el.decomposeInput.addEventListener("keydown", ev => { if(ev.key === "Enter") applyDecompose(); });
  if(el.addInput) el.addInput.addEventListener("keydown", ev => { if(ev.key === "Enter") applyAdd(); });
  el.btnFullscreen.addEventListener("click", () => {
    if(!document.fullscreenElement && el.stage.requestFullscreen) el.stage.requestFullscreen();
    else if(document.exitFullscreen) document.exitFullscreen();
  });

  el.explainText.addEventListener("click", ev => {
    if(ev.target && ev.target.id === "btnToggleUnderstandAnswers"){
      understandAnswersVisible = !understandAnswersVisible;
      renderUnderstanding();
    }
  });

  document.addEventListener("keydown", ev => {
    if(ev.target && ["INPUT","TEXTAREA"].includes(ev.target.tagName)) return;
    const order = effectiveOrder();
    const i = order.indexOf(step);
    if(ev.key === "ArrowRight" || ev.key === " "){
      ev.preventDefault();
      if(i < order.length - 1) setStep(order[i+1]);
    }
    if(ev.key === "ArrowLeft"){
      ev.preventDefault();
      if(i > 0) setStep(order[i-1]);
    }
  });

  function updateOptionMenuVisibility(){
    const custom = el.category.value === "custom_mix";
    el.customMixBox.style.display = custom ? "" : "none";

    const showPartWhole = el.category.value === "part_whole";
    if(el.partWholeStructure){
      el.partWholeStructure.style.display = showPartWhole ? "" : "none";
      el.partWholeStructureLabel.style.display = showPartWhole ? "" : "none";
    }
    el.partWholeMode.style.display = showPartWhole ? "" : "none";
    el.partWholeModeLabel.style.display = showPartWhole ? "" : "none";

    const showComparison = el.category.value === "comparison" ||
      el.category.value === "comparison_additive" ||
      el.category.value === "comparison_multiplicative";
    const selectedComparisonType = el.category.value === "comparison_multiplicative"
      ? "multiplicative"
      : (el.category.value === "comparison_additive" ? "additive" : (el.comparisonType ? el.comparisonType.value : "additive"));
    const isMultiplicativeComparison = selectedComparisonType === "multiplicative";
    const isMixedComparison = selectedComparisonType === "mix";

    if(el.comparisonType){
      el.comparisonType.style.display = el.category.value === "comparison" ? "" : "none";
      el.comparisonTypeLabel.style.display = el.category.value === "comparison" ? "" : "none";
    }

    if(el.comparisonRelation){
      el.comparisonRelation.style.display = showComparison ? "" : "none";
      el.comparisonRelationLabel.style.display = showComparison ? "" : "none";
      if(showComparison){
        el.comparisonRelationLabel.textContent = isMixedComparison ? "Relation dans “Comparer”" : (isMultiplicativeComparison ? "Relation dans “Comparer — rapport”" : "Relation dans “Comparer — écart”");
        el.comparisonRelation.options[0].textContent = isMultiplicativeComparison ? "Fois plus" : (isMixedComparison ? "De plus / fois plus" : "De plus");
        el.comparisonRelation.options[1].textContent = isMultiplicativeComparison ? "Fois moins" : (isMixedComparison ? "De moins / fois moins" : "De moins");
      }
    }

    el.comparisonMode.style.display = showComparison ? "" : "none";
    el.comparisonModeLabel.style.display = showComparison ? "" : "none";
    if(showComparison){
      el.comparisonModeLabel.textContent = isMixedComparison ? "Question dans “Comparer”" : (isMultiplicativeComparison ? "Question dans “Comparer — rapport”" : "Question dans “Comparer — écart”");
      el.comparisonMode.options[2].style.display = "";
      el.comparisonMode.options[2].textContent = isMultiplicativeComparison ? "Chercher le rapport" : (isMixedComparison ? "Chercher l’écart / le rapport" : "Chercher l’écart");
    }

    const showTransformation = el.category.value === "transformation";
    if(el.transformationKind){
      el.transformationKind.style.display = showTransformation ? "" : "none";
      el.transformationKindLabel.style.display = showTransformation ? "" : "none";
    }
    el.transformationMode.style.display = showTransformation ? "" : "none";
    el.transformationModeLabel.style.display = showTransformation ? "" : "none";

    const showEqualGroups = el.category.value === "equal_groups";
    el.equalGroupsMode.style.display = showEqualGroups ? "" : "none";
    el.equalGroupsModeLabel.style.display = showEqualGroups ? "" : "none";

    const showUnequalTotal = el.category.value === "unequal_total";
    if(el.unequalTotalMode){
      el.unequalTotalMode.style.display = showUnequalTotal ? "" : "none";
      el.unequalTotalModeLabel.style.display = showUnequalTotal ? "" : "none";
    }

    const showRatios = el.category.value === "ratio";
    if(el.ratioMode){
      el.ratioMode.style.display = showRatios ? "" : "none";
      el.ratioModeLabel.style.display = showRatios ? "" : "none";
    }
  }

  updateOptionMenuVisibility();

  try{ newProblem(); }
  catch(err){
    el.statement.textContent = "Erreur au chargement : " + err.message;
    console.error(err);
  }
})();
</script>
</body>
</html>
