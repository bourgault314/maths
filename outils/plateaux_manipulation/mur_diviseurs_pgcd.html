<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PGCD — murs des diviseurs</title>
<style>
  :root{
    --bg:#f3f4f6;
    --panel:#ffffff;
    --ink:#111827;
    --muted:#6b7280;
    --line:#d1d5db;
    --blue:#2563eb;
    --blue-dark:#1d4ed8;
    --green:#16a34a;
    --orange:#d97706;
    --page-w:297mm;
    --page-h:210mm;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    display:flex;
    flex-direction:column;
  }
  header{
    height:48px;
    flex:0 0 auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    padding:0 18px;
    background:#111827;
    color:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.16);
    z-index:3;
  }
  header a{color:#d1d5db;text-decoration:none;font-size:14px;font-weight:600}
  header a:hover{color:white}
  header .title{font-weight:800;letter-spacing:.02em;font-size:15px}
  header .spacer{width:64px}

  main{flex:1;min-height:0;display:flex;overflow:hidden}
  aside{
    width:340px;
    flex:0 0 340px;
    background:var(--panel);
    border-right:1px solid var(--line);
    display:flex;
    flex-direction:column;
    min-height:0;
  }
  .settings{padding:16px;overflow:auto;flex:1}
  fieldset{
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin:0 0 14px;
    background:#fff;
  }
  legend{padding:0 8px;color:#1f2937;font-size:13px;font-weight:850}
  .hint{font-size:12px;line-height:1.35;color:var(--muted);margin-top:8px}
  .mini-note{
    display:none;
    margin-top:14px;
    border-radius:10px;
    padding:9px 10px;
    background:#fff7ed;
    border:1px solid #fed7aa;
    color:#9a3412;
    font-size:12px;
    font-weight:700;
    line-height:1.35;
  }
  label.basic{display:block;font-size:13px;font-weight:750;margin:12px 0 6px}
  input[type="number"], select{
    width:100%;
    border:1px solid #cbd5e1;
    border-radius:10px;
    padding:9px 10px;
    background:#fff;
    color:#111827;
    font-size:14px;
  }
  input[type="number"]:focus,select:focus,button:focus-visible,input:focus-visible{
    outline:none;
    box-shadow:0 0 0 3px rgba(37,99,235,.18);
    border-color:var(--blue);
  }
  .two-cols{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .stage-row{display:grid;grid-template-columns:1fr;gap:8px}
  .range-row{display:flex;align-items:center;gap:10px}
  input[type="range"]{width:100%;accent-color:var(--blue)}
  .range-value{min-width:42px;text-align:right;color:#374151;font-size:12px;font-weight:850}
  button{
    appearance:none;
    border:none;
    border-radius:10px;
    background:#e5e7eb;
    color:#111827;
    padding:10px 12px;
    font-weight:800;
    font-size:13px;
    cursor:pointer;
  }
  button:hover{filter:brightness(.98)}
  button.primary{background:var(--blue);color:#fff}
  button.primary:hover{background:var(--blue-dark)}
  button.good{background:#dcfce7;color:#166534;border:1px solid #86efac}
  button.warn{background:#ffedd5;color:#9a3412;border:1px solid #fed7aa}
  button.ghost{background:#f3f4f6;border:1px solid #d1d5db}
  .result-box{
    display:none;
    border-radius:12px;
    border:1px solid #e5e7eb;
    background:#f9fafb;
    padding:10px 11px;
    min-height:42px;
    font-size:13px;
    line-height:1.35;
    font-weight:750;
  }
  .result-box.revealed{
    display:block;
    background:#ecfdf5;
    border-color:#86efac;
    color:#166534;
  }
  .actions{
    flex:0 0 auto;
    padding:14px 16px;
    background:#fff;
    border-top:1px solid var(--line);
    box-shadow:0 -2px 12px rgba(0,0,0,.04);
    display:grid;
    grid-template-columns:1fr;
    gap:9px;
  }
  .status{min-height:18px;color:var(--muted);font-size:12px;line-height:1.25}

  .preview-area{
    flex:1;
    min-width:0;
    overflow:auto;
    padding:18px;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:12px;
    background:linear-gradient(135deg,#eef2f7,#e5e7eb);
  }
  .preview-top{
    width:min(100%,1120px);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    background:rgba(255,255,255,.92);
    border:1px solid #e5e7eb;
    border-radius:14px;
    padding:11px 14px;
    box-shadow:0 2px 12px rgba(0,0,0,.06);
  }
  .preview-top strong{font-size:14px}
  .preview-top span{font-size:12px;color:var(--muted);font-weight:650;text-align:right}
  .page-wrap{
    width:min(100%,1120px);
    aspect-ratio:297/210;
    background:white;
    box-shadow:0 10px 30px rgba(17,24,39,.22);
    border-radius:4px;
    overflow:hidden;
  }
  #wallSvg{width:100%;height:100%;display:block;background:#fff}
  .row{transition:opacity .15s}
  .row:hover .axis-bg{fill:#eff6ff;stroke:#60a5fa}
  .row:hover .axis-text{font-weight:850}
  .row.common .axis-bg{fill:#ecfdf5;stroke:#16a34a}
  .row.common .axis-text{fill:#166534;font-weight:850}
  .row.common .common-frame{opacity:0}
  .row.pgcd .axis-bg{fill:#fee2e2;stroke:#dc2626}
  .row.pgcd .axis-text{fill:#991b1b;font-weight:900}
  .row.pgcd .pgcd-frame{opacity:0}
  .row.pgcd .common-frame{opacity:0}
  .common-frame,.pgcd-frame{opacity:0;transition:opacity .15s}


  .fs-toolbar{
    display:none;
    position:fixed;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    z-index:10;
    gap:8px;
    padding:8px;
    border-radius:16px;
    background:rgba(255,255,255,.92);
    border:1px solid rgba(209,213,219,.9);
    box-shadow:0 12px 32px rgba(17,24,39,.16);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
  }
  body.pgcd-fullscreen header,
  body.pgcd-fullscreen aside{
    display:none!important;
  }
  body.pgcd-fullscreen main{
    display:block;
    height:100vh;
    overflow:hidden;
  }
  body.pgcd-fullscreen .fs-toolbar{
    display:flex;
  }
  body.pgcd-fullscreen .preview-area{
    height:100vh;
    padding:86px 10px 10px;
    overflow:hidden;
    background:#f3f4f6;
  }
  body.pgcd-fullscreen .page-wrap{
    width:min(calc(100vw - 20px), calc((100vh - 104px) * 297 / 210));
    max-height:calc(100vh - 104px);
    aspect-ratio:297/210;
    box-shadow:none;
    border-radius:4px;
  }

  @media(max-width:860px){
    main{flex-direction:column;overflow:auto}
    aside{width:100%;flex:0 0 auto;max-height:none;border-right:0;border-bottom:1px solid var(--line)}
    .settings{max-height:none;overflow:visible}
    .preview-area{min-height:420px}
    .actions{position:sticky;bottom:0;z-index:2}
  }

  @media print{
    header,aside,.preview-top{display:none!important}
    body,main,.preview-area{display:block;height:auto;overflow:visible;background:#fff;padding:0;margin:0}
    .page-wrap{
      width:var(--page-w);
      height:var(--page-h);
      aspect-ratio:auto;
      box-shadow:none;
      border-radius:0;
      overflow:hidden;
      page-break-after:always;
      break-after:page;
    }
    #wallSvg{width:var(--page-w);height:var(--page-h)}
    @page{size:A4 landscape;margin:0}
  }
</style>
</head>
<body>
<header>
  <a href="#" onclick="history.back();return false;">← Retour</a>
  <div class="title">PGCD — murs des diviseurs</div>
  <div class="spacer"></div>
</header>

<div class="fs-toolbar" id="fsToolbar">
  <button type="button" class="ghost" id="fsResetStageBtn">Chercher sans aide</button>
  <button type="button" class="warn" id="fsCommonStageBtn">Diviseurs communs</button>
  <button type="button" class="good" id="fsPgcdStageBtn">Révéler le PGCD</button>
  <button type="button" class="ghost" id="fsExitBtn">Quitter</button>
</div>

<main>
  <aside>
    <div class="settings">
      <fieldset>
        <legend>Nombres</legend>
        <div class="two-cols">
          <div>
            <label class="basic" for="n1Input">Nombre A</label>
            <input id="n1Input" type="number" min="1" max="500" step="1" value="24" />
          </div>
          <div>
            <label class="basic" for="n2Input">Nombre B</label>
            <input id="n2Input" type="number" min="1" max="500" step="1" value="36" />
          </div>
        </div>
        <div class="mini-note" id="largeNote">
          Beaucoup de parts : certaines écritures dans les briques sont masquées automatiquement pour rester lisibles.
        </div>
      </fieldset>

      <fieldset>
        <legend>Recherche guidée</legend>
        <div class="stage-row">
          <button type="button" class="ghost" id="resetStageBtn">1. Chercher sans aide</button>
          <button type="button" class="warn" id="commonStageBtn">2. Afficher les diviseurs communs</button>
          <button type="button" class="good" id="pgcdStageBtn">3. Révéler le PGCD</button>
        </div>
        <div class="result-box" id="resultBox"></div>
      </fieldset>

      <fieldset>
        <legend>Affichage</legend>

        <label class="basic" for="cellMode">Dans les briques</label>
        <select id="cellMode">
          <option value="auto" selected>Auto : écrire quand ça rentre</option>
          <option value="all">Écrire dans toutes les briques</option>
          <option value="first">Écrire seulement dans la première brique</option>
          <option value="none">Sans écriture dans les briques</option>
        </select>

        <label class="basic" for="textScale">Taille de l’écriture</label>
        <div class="range-row">
          <input id="textScale" type="range" min="70" max="180" step="5" value="115" />
          <span class="range-value" id="textScaleValue">115%</span>
        </div>

        <label class="basic" for="colorMode">Couleurs</label>
        <select id="colorMode">
          <option value="soft" selected>Couleurs douces</option>
          <option value="bw">Noir et blanc</option>
        </select>
      </fieldset>
    </div>

    <div class="actions">
      <button type="button" class="primary" id="fullscreenBtn">Plein écran</button>
      <button type="button" class="ghost" id="copyBtn">Copier</button>
      <button type="button" class="ghost" id="downloadBtn">Télécharger</button>
      <button type="button" class="ghost" id="printBtn">Imprimer</button>
      <div class="status" id="status" aria-live="polite"></div>
    </div>
  </aside>

  <section class="preview-area">
    <div class="page-wrap">
      <svg id="wallSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 297 210" role="img" aria-label="Outil visuel pour chercher un PGCD"></svg>
    </div>
  </section>
</main>

<script>
(function(){
  'use strict';

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const PAGE = { w:297, h:210, mx:6.5, my:7.5 };
  const EXPORT_PX_PER_MM = 10;

  const paletteA = ['#dbeafe','#bfdbfe','#e0f2fe','#cffafe','#e0e7ff'];
  const paletteB = ['#dcfce7','#bbf7d0','#ccfbf1','#f0fdf4','#d9f99d'];

  const svg = document.getElementById('wallSvg');
  const n1Input = document.getElementById('n1Input');
  const n2Input = document.getElementById('n2Input');
  const cellModeEl = document.getElementById('cellMode');
  const textScaleEl = document.getElementById('textScale');
  const textScaleValueEl = document.getElementById('textScaleValue');
  const colorModeEl = document.getElementById('colorMode');
  const summaryEl = null;
  const statusEl = document.getElementById('status');
  const resultBox = document.getElementById('resultBox');
  const largeNote = document.getElementById('largeNote');

  let stage = 0; // 0 recherche, 1 communs, 2 PGCD

  function make(tag, attrs){
    const el = document.createElementNS(SVG_NS, tag);
    for(const [k,v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    return el;
  }

  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  function setStatus(message){
    statusEl.textContent = message || '';
    if(message) window.setTimeout(() => {
      if(statusEl.textContent === message) statusEl.textContent = '';
    }, 3200);
  }

  function textScale(){
    return Number(textScaleEl.value || 100) / 100;
  }

  function updateScaleLabel(){
    textScaleValueEl.textContent = `${textScaleEl.value}%`;
  }

  function normalizedInput(input){
    const raw = Number(input.value);
    const n = Math.max(1, Math.min(500, Math.round(raw || 1)));
    input.value = String(n);
    return n;
  }

  function divisorsOf(n){
    const small = [];
    const large = [];
    for(let d=1; d*d<=n; d++){
      if(n % d === 0){
        small.push(d);
        if(d !== n/d) large.push(n/d);
      }
    }
    return small.concat(large.reverse());
  }

  function gcd(a,b){
    a = Math.abs(a);
    b = Math.abs(b);
    while(b){
      const t = b;
      b = a % b;
      a = t;
    }
    return a || 1;
  }

  function clearSvg(){
    while(svg.firstChild) svg.removeChild(svg.firstChild);
  }

  function appendPageBackground(){
    svg.appendChild(make('rect', {x:0,y:0,width:PAGE.w,height:PAGE.h,fill:'#ffffff'}));
  }

  function estimateTextWidthAtOne(text){
    let w = 0;
    for(const ch of String(text)){
      if(ch === ' ') w += 0.28;
      else if(ch === '-' || ch === '–') w += 0.34;
      else if('ilI1.,:%'.includes(ch)) w += 0.30;
      else if('×='.includes(ch)) w += 0.58;
      else if('mwMW'.includes(ch)) w += 0.78;
      else if('éèêëàâùûîïôöç'.includes(ch.toLowerCase())) w += 0.57;
      else w += 0.55;
    }
    return Math.max(w, 0.5);
  }

  function appendText(group, text, x, y, options = {}){
    const fs = options.fs ?? 4;
    const fill = options.fill ?? '#111827';
    const weight = options.weight ?? 700;
    const anchor = options.anchor ?? 'middle';
    const maxW = options.maxW ?? null;
    const maxH = options.maxH ?? null;
    const lines = Array.isArray(text) ? text.map(String) : [String(text)];
    const lineGap = options.lineGap ?? 1.12;
    let finalFs = fs;

    if(maxW){
      const widest = Math.max(...lines.map(line => estimateTextWidthAtOne(line)));
      finalFs = Math.min(finalFs, maxW / widest);
    }
    if(maxH){
      finalFs = Math.min(finalFs, maxH / (lines.length * lineGap));
    }
    finalFs = Math.max(1.0, finalFs);

    const t = make('text', {
      x, y,
      'font-size':finalFs,
      'font-weight':weight,
      'font-family':'system-ui, -apple-system, Segoe UI, Arial, sans-serif',
      'text-anchor':anchor,
      'dominant-baseline':'middle',
      fill
    });
    if(options.class) t.setAttribute('class', options.class);

    if(lines.length === 1){
      t.textContent = lines[0];
    }else{
      const firstY = y - ((lines.length - 1) * finalFs * lineGap) / 2;
      lines.forEach((line, index) => {
        const span = make('tspan', {
          x,
          y:firstY + index * finalFs * lineGap,
          'dominant-baseline':'middle'
        });
        span.textContent = line;
        t.appendChild(span);
      });
    }
    group.appendChild(t);
    return t;
  }

  function fillForColumn(col, index){
    if(colorModeEl.value === 'bw') return '#ffffff';
    const palette = col === 1 ? paletteA : paletteB;
    return palette[index % palette.length];
  }

  function appendHighlightFrame(group, x, y, w, h, isCommon, isPgcd){
    // Cadres individuels désactivés : les cadres sont dessinés par blocs
    // à la fin du rendu, ce qui évite les doubles bordures internes.
  }

  function appendRunFrame(group, x, y, w, h, kind, rowStep){
    const inset = kind === 'pgcd' ? 0.26 : 0.36;
    const color = kind === 'pgcd' ? '#dc2626' : '#16a34a';
    const strokeW = kind === 'pgcd' ? 1.25 : 0.86;

    // Un seul contour extérieur pour éviter les doubles traits,
    // puis des séparations internes pour que chaque ligne reste encadrée.
    group.appendChild(make('rect', {
      x:x + inset,
      y:y + inset,
      width:Math.max(0, w - 2*inset),
      height:Math.max(0, h - 2*inset),
      fill:'none',
      stroke:color,
      'stroke-width':strokeW,
      'stroke-linejoin':'miter',
      'pointer-events':'none'
    }));

    if(rowStep && h > rowStep * 1.5){
      const count = Math.round(h / rowStep);
      for(let k=1; k<count; k++){
        const yy = y + k * rowStep;
        group.appendChild(make('line', {
          x1:x + inset,
          x2:x + w - inset,
          y1:yy,
          y2:yy,
          stroke:color,
          'stroke-width':strokeW,
          'stroke-linecap':'butt',
          'pointer-events':'none'
        }));
      }
    }
  }

  function drawWallCell(group, opts){
    const {x, y, w, h, parts, value, possible, fill, rowIndex, col, isCommon, isPgcd} = opts;
    if(!possible){
      group.appendChild(make('rect', {
        x, y:y+h*0.18, width:w, height:h*0.64,
        rx:0, ry:0,
        fill:'#f9fafb',
        stroke:'#e5e7eb',
        'stroke-width':0.16,
        'stroke-dasharray':'1.4 1.2'
      }));
      return;
    }

    group.appendChild(make('rect', {
      x, y, width:w, height:h,
      rx:0, ry:0,
      fill,
      stroke:'#1f2937',
      'stroke-width':clamp(h * 0.026, 0.14, 0.30)
    }));

    const frameColor = isPgcd ? '#16a34a' : '#f97316';
    const frameClass = isPgcd ? 'pgcd-frame' : 'common-frame';
    group.appendChild(make('rect', {
      class:frameClass,
      x:x-0.5, y:y-0.5, width:w+1, height:h+1,
      fill:'none',
      stroke:frameColor,
      'stroke-width':0.85
    }));

    const segW = w / parts;
    const sepW = clamp(h * 0.02, 0.10, 0.24);
    if(parts > 1){
      let step = 1;
      if(parts > 160) step = 10;
      else if(parts > 90) step = 5;
      else if(parts > 60) step = 2;
      for(let k=step; k<parts; k+=step){
        const sx = x + segW * k;
        group.appendChild(make('line', {
          x1:sx, x2:sx, y1:y, y2:y+h,
          stroke:'#1f2937',
          'stroke-width':sepW,
          opacity: step === 1 ? 1 : 0.55
        }));
      }
    }

    const mode = cellModeEl.value;
    const baseFs = clamp(Math.min(h * 0.33, segW * 0.46), 1.45, 4.9) * textScale();
    const txt = String(value);
    const needed = estimateTextWidthAtOne(txt) * baseFs;
    let writingMode = mode;

    if(mode === 'auto'){
      if(segW > needed + 2.1 && h > 4.3 && baseFs >= 1.85) writingMode = 'all';
      else if(w > 24 && h > 4.3) writingMode = 'summary';
      else writingMode = 'none';
    }

    if((writingMode === 'all' || writingMode === 'first') && (baseFs < 1.55 || segW < 2.8)){
      writingMode = 'summary';
    }

    if(writingMode === 'all'){
      for(let k=0; k<parts; k++){
        appendText(group, txt, x + segW*(k+.5), y + h/2, {
          fs:baseFs,
          maxW:segW * 0.82,
          maxH:h * 0.70,
          fill:'#111827',
          weight:720,
          class:'cell-text'
        });
      }
    }else if(writingMode === 'first'){
      appendText(group, txt, x + segW*.5, y + h/2, {
        fs:baseFs,
        maxW:segW * 0.82,
        maxH:h * 0.70,
        fill:'#111827',
        weight:720,
        class:'cell-text'
      });
    }else if(writingMode === 'summary'){
      appendText(group, `${parts} parts de ${txt}`, x + w/2, y + h/2, {
        fs:clamp(h * 0.26, 1.6, 3.8) * textScale(),
        maxW:w * 0.86,
        maxH:h * 0.66,
        fill:'#111827',
        weight:760,
        class:'cell-text'
      });
    }

    appendHighlightFrame(group, x, y, w, h, isCommon, isPgcd);
  }

  function updateResult(n1, n2, pgcd){
    resultBox.classList.toggle('revealed', stage === 2);
    resultBox.textContent = stage === 2 ? `PGCD(${n1} ; ${n2}) = ${pgcd}` : '';
  }

  function render(){
    const n1 = normalizedInput(n1Input);
    const n2 = normalizedInput(n2Input);
    const d1 = divisorsOf(n1);
    const d2 = divisorsOf(n2);
    const s1 = new Set(d1);
    const s2 = new Set(d2);
    const union = Array.from(new Set(d1.concat(d2))).sort((a,b)=>a-b);
    const pgcd = gcd(n1,n2);

    clearSvg();
    appendPageBackground();
    updateResult(n1,n2,pgcd);

    const rows = union.length;
    const usableW = PAGE.w - 2*PAGE.mx;
    const titleH = 12;
    const rowAreaY = PAGE.my + titleH;
    const rowAreaH = PAGE.h - PAGE.my*2 - titleH;
    const rowH = rowAreaH / rows;

    const axisW = 24;
    const gap = 4;
    const wallW = (usableW - axisW - 2*gap) / 2;
    const axisX = PAGE.mx;
    const wall1X = axisX + axisW + gap;
    const wall2X = wall1X + wallW + gap;

    const tooDense = Math.max(...union) > 80 || rowH < 5.5;
    largeNote.style.display = tooDense ? 'block' : 'none';

    appendText(svg, `${n1}`, wall1X + wallW/2, PAGE.my + titleH/2 - 1, {
      fs:7,
      maxW:wallW,
      maxH:titleH,
      weight:900,
      fill:'#1d4ed8'
    });
    appendText(svg, `${n2}`, wall2X + wallW/2, PAGE.my + titleH/2 - 1, {
      fs:7,
      maxW:wallW,
      maxH:titleH,
      weight:900,
      fill:'#15803d'
    });
    appendText(svg, 'parts', axisX + axisW/2, PAGE.my + titleH/2 - 1, {
      fs:3.3,
      maxW:axisW,
      maxH:titleH,
      weight:800,
      fill:'#6b7280'
    });

    const highlightLayer = make('g', {'pointer-events':'none'});

    function appendCommonRunFrames(){
      if(stage < 1) return;

      let runStart = null;
      for(let i=0; i<=union.length; i++){
        const parts = union[i];
        const isCommon =
          i < union.length &&
          s1.has(parts) &&
          s2.has(parts) &&
          !(stage >= 2 && parts === pgcd);

        if(isCommon && runStart === null) runStart = i;

        if((!isCommon || i === union.length) && runStart !== null){
          const y0 = rowAreaY + runStart * rowH;
          const h0 = (i - runStart) * rowH;
          appendRunFrame(highlightLayer, axisX, y0, axisW, h0, 'common', rowH);
          runStart = null;
        }
      }

      if(stage >= 2){
        const pgcdIndex = union.indexOf(pgcd);
        if(pgcdIndex >= 0){
          const y0 = rowAreaY + pgcdIndex * rowH;
          appendRunFrame(highlightLayer, axisX, y0, axisW, rowH, 'pgcd', rowH);
        }
      }
    }

    union.forEach((parts, index) => {
      const y = rowAreaY + index * rowH;
      const possible1 = s1.has(parts);
      const possible2 = s2.has(parts);
      const isCommon = possible1 && possible2;
      const isPgcd = parts === pgcd && isCommon;
      const showCommon = stage >= 1 && isCommon;
      const showPgcd = stage >= 2 && isPgcd;

      const rowClass = ['row'];
      if(showCommon) rowClass.push('common');
      if(showPgcd) rowClass.push('pgcd');

      const row = make('g', {
        class:rowClass.join(' '),
        'data-parts':parts
      });

      row.appendChild(make('rect', {
        class:'axis-bg',
        x:axisX, y:y, width:axisW, height:rowH,
        fill:'#ffffff',
        stroke:'#e5e7eb',
        'stroke-width':0.16
      }));
      appendText(row, String(parts), axisX + axisW/2, y + rowH/2, {
        fs:clamp(rowH * 0.32, 1.8, 4.2) * textScale(),
        maxW:axisW-2,
        maxH:rowH*0.76,
        weight:760,
        fill:'#111827',
        class:'axis-text'
      });

      appendHighlightFrame(row, axisX, y, axisW, rowH, showCommon, showPgcd);

      drawWallCell(row, {
        x:wall1X, y, w:wallW, h:rowH,
        parts,
        value:possible1 ? n1 / parts : '',
        possible:possible1,
        fill:fillForColumn(1,index),
        rowIndex:index,
        col:1,
        isCommon:showCommon,
        isPgcd:showPgcd
      });

      drawWallCell(row, {
        x:wall2X, y, w:wallW, h:rowH,
        parts,
        value:possible2 ? n2 / parts : '',
        possible:possible2,
        fill:fillForColumn(2,index),
        rowIndex:index,
        col:2,
        isCommon:showCommon,
        isPgcd:showPgcd
      });

      svg.appendChild(row);
    });

    appendCommonRunFrames();
    svg.appendChild(highlightLayer);
  }

  function svgToString(){
    const clone = svg.cloneNode(true);
    clone.setAttribute('xmlns', SVG_NS);
    clone.setAttribute('width', '297mm');
    clone.setAttribute('height', '210mm');
    clone.setAttribute('viewBox', '0 0 297 210');
    return new XMLSerializer().serializeToString(clone);
  }

  function svgToPngBlob(){
    const svgText = svgToString();
    const svgBlob = new Blob([svgText], {type:'image/svg+xml;charset=utf-8'});
    const url = URL.createObjectURL(svgBlob);
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => {
        try{
          const canvas = document.createElement('canvas');
          canvas.width = Math.round(PAGE.w * EXPORT_PX_PER_MM);
          canvas.height = Math.round(PAGE.h * EXPORT_PX_PER_MM);
          const ctx = canvas.getContext('2d');
          ctx.fillStyle = '#ffffff';
          ctx.fillRect(0,0,canvas.width,canvas.height);
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          URL.revokeObjectURL(url);
          canvas.toBlob(blob => {
            if(blob) resolve(blob);
            else reject(new Error('Conversion impossible.'));
          }, 'image/png');
        }catch(err){
          URL.revokeObjectURL(url);
          reject(err);
        }
      };
      img.onerror = () => {
        URL.revokeObjectURL(url);
        reject(new Error('Image impossible à générer.'));
      };
      img.src = url;
    });
  }

  function downloadBlob(blob, filename){
    const a = document.createElement('a');
    const url = URL.createObjectURL(blob);
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    window.setTimeout(() => URL.revokeObjectURL(url), 500);
  }

  async function copyImage(){
    try{
      const blob = await svgToPngBlob();
      if(navigator.clipboard && window.ClipboardItem){
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        setStatus('Image copiée. Tu peux la coller dans un document.');
      }else{
        downloadBlob(blob, 'pgcd-murs.png');
        setStatus('Copie non disponible ici : l’image a été téléchargée.');
      }
    }catch(err){
      console.error(err);
      setStatus('Impossible de copier automatiquement dans ce navigateur. Utilise Télécharger.');
    }
  }

  async function downloadImage(){
    try{
      const blob = await svgToPngBlob();
      downloadBlob(blob, 'pgcd-murs.png');
      setStatus('Image téléchargée.');
    }catch(err){
      console.error(err);
      setStatus('Téléchargement impossible pour le moment.');
    }
  }


  function enterFullscreenMode(){
    document.body.classList.add('pgcd-fullscreen');
    const el = document.documentElement;
    if(el.requestFullscreen) el.requestFullscreen().catch(() => {});
  }

  function exitFullscreenMode(){
    document.body.classList.remove('pgcd-fullscreen');
    if(document.fullscreenElement && document.exitFullscreen) document.exitFullscreen().catch(() => {});
  }

  document.addEventListener('fullscreenchange', () => {
    if(!document.fullscreenElement) document.body.classList.remove('pgcd-fullscreen');
  });

  function setStage(nextStage){
    stage = nextStage;
    render();
  }

  document.getElementById('resetStageBtn').addEventListener('click', () => setStage(0));
  document.getElementById('commonStageBtn').addEventListener('click', () => setStage(1));
  document.getElementById('pgcdStageBtn').addEventListener('click', () => setStage(2));
  document.getElementById('fsResetStageBtn').addEventListener('click', () => setStage(0));
  document.getElementById('fsCommonStageBtn').addEventListener('click', () => setStage(1));
  document.getElementById('fsPgcdStageBtn').addEventListener('click', () => setStage(2));
  document.getElementById('fullscreenBtn').addEventListener('click', enterFullscreenMode);
  document.getElementById('fsExitBtn').addEventListener('click', exitFullscreenMode);

  n1Input.addEventListener('change', () => setStage(0));
  n2Input.addEventListener('change', () => setStage(0));
  [n1Input,n2Input].forEach(input => {
    input.addEventListener('keydown', (event) => {
      if(event.key === 'Enter') setStage(0);
    });
  });

  cellModeEl.addEventListener('change', render);
  colorModeEl.addEventListener('change', render);
  textScaleEl.addEventListener('input', () => { updateScaleLabel(); render(); });

  document.getElementById('copyBtn').addEventListener('click', copyImage);
  document.getElementById('downloadBtn').addEventListener('click', downloadImage);
  document.getElementById('printBtn').addEventListener('click', () => window.print());

  updateScaleLabel();
  render();
})();
</script>
</body>
</html>
