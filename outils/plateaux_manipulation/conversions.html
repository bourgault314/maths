<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glisse unité - Virgule Parfaite V3</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#1283ff; --accent-dark:#0b67c6; --bg:#fbfbfe; --panel:#fff; --ink:#1b1b1b; --border:#d5d7de }
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,Segoe UI,Roboto,Arial,sans-serif}
  .app{max-width:1100px;margin:16px auto;padding:0 12px}
  .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px; font-size:1.05rem}
  .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select{padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-weight:700; font-size:1rem}
  .btn{border:none;background:var(--accent);color:#fff;font-weight:700;padding:9px 12px;border-radius:10px;cursor:pointer;box-shadow:0 6px 14px color-mix(in srgb, var(--accent) 30%, transparent)}
  .btn.secondary{background:#6b7280}
  .btn.small{padding:7px 10px;border-radius:10px}
  .zoomLabel{font-weight:700;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#fff}
  .btn:active{transform:translateY(1px)}

  .board{background:var(--panel);border:2px solid var(--accent);border-radius:14px;padding:16px 10px 14px;box-shadow:0 10px 26px rgba(0,0,0,.08)}
  .title{font-weight:900;color:color-mix(in srgb, var(--accent-dark) 90%, black);margin:0 0 20px 2px; font-size:1.6rem}

  .inner{position:relative;padding-top:100px; padding-bottom:100px;} 
  .head{display:grid;grid-template-columns:repeat(var(--cols, 7),1fr);gap:8px;margin-bottom:6px;position:relative;z-index:2}
  .grid{display:grid;grid-template-columns:repeat(var(--cols, 7),1fr);gap:8px;user-select:none;position:relative;z-index:1}

  .cursor{
    position:absolute; left:0; 
    top:100px; bottom:100px; /* Le curseur encadre la colonne */
    box-sizing: border-box; 
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border: 3px solid color-mix(in srgb, var(--accent-dark) 60%, transparent);
    border-radius: 8px; 
    pointer-events:none;
    transition:transform .15s ease-out, width .15s ease-out;
    z-index:3;
  }
  
  .cursor::after {
    content: ",";
    position: absolute;
    bottom: 64px; 
    right: 2px; 
    font-family: 'Nunito', Arial, sans-serif;
    font-size: 3.2rem; 
    font-weight: 800;
    color: var(--accent-dark);
    line-height: 0;
  }

  .handle-wrapper {
    position:absolute; left:0; 
    /* AJUSTEMENT MAGIQUE : Le conteneur fait la même taille exacte que le curseur */
    top:100px; bottom:100px; 
    width: 130px; 
    z-index:11;
    display: flex; flex-direction: column;
    pointer-events: none; 
    transition: transform .15s ease-out;
    touch-action: none;
  }
  .handle-wrapper.dragging { z-index:20; }
  .handle-wrapper.dragging .handle-badge { cursor:grabbing; filter: brightness(1.1); }

  .handle-badge {
    position: absolute; left: 0; right: 0;
    pointer-events: auto; 
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border: 2px solid #fff;
    border-radius: 12px;
    color: #fff; font-weight: 900;
    text-align: center;
    user-select: none; cursor: grab;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    box-sizing: border-box;
    padding: 10px 4px;
  }

  /* ON ANCRE LES BADGES EXACTEMENT SUR LA BORDURE AVEC LA BONNE MARGE POUR LA FLÈCHE */
  .handle-top { 
    bottom: 100%; 
    margin-bottom: 12px; /* Laisse pile 12px de place pour la flèche */
  } 
  .handle-bottom { 
    top: 100%; 
    margin-top: 12px; /* Pareil en bas */
  }

  .handle-top::after {
    content: ""; position: absolute; bottom: -12px; left: 50%; transform: translateX(-50%);
    border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 12px solid var(--accent-dark);
  }
  .handle-bottom::before {
    content: ""; position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
    border-left: 12px solid transparent; border-right: 12px solid transparent; border-bottom: 12px solid var(--accent);
  }

  .h-text { font-size: 1.1rem; line-height: 1.15; text-transform: uppercase; }

  .unitBtn{
    background:color-mix(in srgb, var(--accent) 12%, #fff);
    border:2px solid var(--accent);
    border-radius:8px;
    cursor:pointer; 
    font-size:1.15rem; 
    display:grid; 
    align-items:center;
    min-height: 44px;
    padding:0;
  }
  .unitBtn span { font-weight:700; display:flex; justify-content:center; }
  .unitBtn:hover{background:color-mix(in srgb, var(--accent) 18%, #fff)}

  .cell{position:relative;background:#fff;border:2px solid var(--accent);border-radius:8px;min-height:92px;display:flex;align-items:center;justify-content:center}
  .slots{margin-top:0;display:flex;gap:0;width:calc(100% - 12px);}
  
  .digit{
    box-sizing:border-box; width:calc(100% / var(--S)); text-align:center;
    font-weight:600; font-size:2.8rem; 
    line-height:2.8rem; border:none; outline:none; background:transparent; color:#000; padding:0 4px; transition: color 0.2s, font-weight 0.2s;
  }
  
  .slots[data-slots="2"] .digit:nth-child(2),
  .slots[data-slots="3"] .digit:nth-child(2),
  .slots[data-slots="3"] .digit:nth-child(3){border-left:1px solid #000}

  .unit-highlight { color: var(--accent-dark); font-weight: 900 !important; }

  .result{
    display:flex; flex-direction: column; align-items: center; justify-content: center;
    width:fit-content; max-width:100%; margin:10px auto 12px; padding:12px 24px;
    border-radius:12px; background:#f5f9ff; border:1px solid #cfe0ff; text-align:center; min-height: 105px;
  }
  .result .mainLine{ display:block; font-weight:500; font-size:2.75rem; color:#000; line-height:1.12; }
  .result .eqLine{ display:block; margin-top:8px; font-weight:500; font-size:1.05rem; color:#000; opacity:.8; }

  .subhead{position:relative;height:22px;margin:2px 0 8px;display:none;z-index:4;pointer-events:none}
  .sub-lab{position:absolute;top:0;transform:translateX(-50%);white-space:nowrap;font-weight:900;color:color-mix(in srgb, var(--accent-dark) 90%, black)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left">
      <label for="kind"><strong>Grandeur :</strong></label>
      <select id="kind">
        <option value="length" selected>Longueur (m)</option>
        <option value="mass">Masse (g)</option>
        <option value="massT">Masse complète (t ↔ mg)</option>
        <option value="volL">Volume (L)</option>
        <option value="area">Aire (m²)</option>
        <option value="volM3">Volume (m³)</option>
        <option value="cross">L ↔ m³</option>
      </select>
      <button class="btn" id="toggleShow">Masquer</button>
      <button class="btn secondary" id="reset">Remise à zéro</button>
    </div>
    <div class="right">
      <button class="btn secondary small" id="fsBtn">⛶</button>
      <button class="btn secondary small" id="zoomOut">−</button>
      <span class="zoomLabel" id="zoomLabel">100%</span>
      <button class="btn secondary small" id="zoomIn">+</button>
      <button class="btn secondary small" id="zoomReset">⟲</button>
    </div>
  </div>

  <div class="board">
    <div class="title" id="title">CONVERSIONS</div>
    <div class="result" id="result"></div>

    <div class="inner" id="inner">
      <div class="cursor" id="cursor"></div>
      
      <div class="handle-wrapper" id="handle">
        <div class="handle-badge handle-top">
          <div class="h-text">UNITÉ de<br>mesure</div>
        </div>
        <div class="handle-badge handle-bottom">
          <div class="h-text">Chiffre des<br>unités</div>
        </div>
      </div>

      <div class="head" id="head"></div>
      <div class="subhead" id="subhead">
        <div class="sub-lab" id="lab1"></div>
        <div class="sub-lab" id="lab2"></div>
        <div class="sub-lab" id="lab3"></div>
      </div>
      <div class="grid" id="grid"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const THEMES = {
    length:['#1283ff','#0b67c6'], mass:['#16a34a','#0e7a36'], massT:['#16a34a','#0e7a36'],
    volL:['#06b6d4','#0a8aa3'], area:['#f59e0b','#b77207'], volM3:['#7c3aed','#5a27b0'], cross:['#db2777','#a81d5a'],
  };
  const SCHEMAS = {
    length:{label:'Longueur (m)', units:['km','hm','dam','m','dm','cm','mm'], base:'m', slots:1},
    mass:  {label:'Masse (g)', units:['kg','hg','dag','g','dg','cg','mg'], base:'g', slots:1},
    massT: {label:'Masse complète (t)', units:['t','q','-','kg','hg','dag','g','dg','cg','mg'], base:'g', slots:1},
    volL:  {label:'Volume (L)', units:['kL','hL','daL','L','dL','cL','mL'], base:'L', slots:1},
    area:  {label:'Aire (m²)', units:['km²','hm²','dam²','m²','dm²','cm²','mm²'], base:'m²', slots:2},
    volM3: {label:'Volume (m³)', units:['km³','hm³','dam³','m³','dm³','cm³','mm³'], base:'m³', slots:3},
    cross: {label:'Litres ↔ mètres cubes', units:['km³','hm³','dam³','m³','dm³','cm³','mm³'], base:'m³', slots:3},
  };

  const kindSel = document.getElementById('kind'), titleEl = document.getElementById('title'), head = document.getElementById('head'), grid = document.getElementById('grid'), inner = document.getElementById('inner'), board = document.querySelector('.board'), cursor = document.getElementById('cursor'), handle = document.getElementById('handle'), btnTog = document.getElementById('toggleShow'), btnRst = document.getElementById('reset'), result = document.getElementById('result'), zoomOut = document.getElementById('zoomOut'), zoomIn = document.getElementById('zoomIn'), zoomReset = document.getElementById('zoomReset'), zoomLabel = document.getElementById('zoomLabel'), fsBtn = document.getElementById('fsBtn'), subhead = document.getElementById('subhead'), lab1 = document.getElementById('lab1'), lab2 = document.getElementById('lab2'), lab3 = document.getElementById('lab3');

  let schema = SCHEMAS.length, targetIdx = 3, isShown = true, inputs = [], savedStudent = null, zoomScale = 1;

  function applyZoom(){
    board.style.transform = `scale(${zoomScale})`;
    board.style.transformOrigin = 'top center';
    zoomLabel.textContent = `${Math.round(zoomScale*100)}%`;
    requestAnimationFrame(() => { positionCoupleLabels(); setTarget(targetIdx, false); });
  }

  function setTheme(kind){
    const [c,cd] = THEMES[kind];
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--accent-dark', cd);
  }

  function rebuild(){
    const kind = kindSel.value; schema = SCHEMAS[kind]; setTheme(kind);
    titleEl.textContent = `CONVERSIONS – ${schema.label}`;
    head.style.setProperty('--cols', schema.units.length);
    grid.style.setProperty('--cols', schema.units.length);
    head.innerHTML=''; grid.innerHTML=''; inputs=[];

    schema.units.forEach((u,i)=>{
      const b=document.createElement('div'); b.className='unitBtn'; 
      b.style.gridTemplateColumns = `repeat(${schema.slots}, 1fr)`;
      const span = document.createElement('span'); span.textContent = u;
      span.style.gridColumn = schema.slots; b.appendChild(span);
      b.addEventListener('click', ()=>{
        if(document.activeElement && document.activeElement.classList.contains('digit')) {
           document.activeElement.blur();
        }
        setTarget(i,true);
      });
      head.appendChild(b);
    });

    if (kind === 'cross') { subhead.style.display = 'block'; lab1.textContent = 'kL'; lab2.textContent = 'L'; lab3.textContent = 'mL'; }
    else if (kind === 'area') { subhead.style.display = 'block'; lab1.textContent = 'ha'; lab2.textContent = 'a'; lab3.textContent = ''; }
    else { subhead.style.display = 'none'; }

    schema.units.forEach((u,i)=>{
      const cell=document.createElement('div'); cell.className='cell';
      const wrap=document.createElement('div'); wrap.className='slots'; wrap.dataset.slots=String(schema.slots);
      wrap.style.setProperty('--S', schema.slots);
      const slots=[];
      for(let s=0;s<schema.slots;s++){
        const inp=document.createElement('input'); inp.className='digit'; inp.maxLength=1; inp.inputMode='numeric';
        inp.addEventListener('input', ()=>{
          const m=inp.value.match(/[0-9]/); inp.value=m?m[0]:'';
          if(isShown){ completeZerosInTable(); updateResult(); }
          if(inp.value){ const [ci,si]=findIndex(inp); focusNext(ci,si); }
        });
        inp.addEventListener('keydown',(e)=>{
          const [ci,si]=findIndex(inp);
          if(e.key==='ArrowLeft'){ e.preventDefault(); focusPrev(ci,si); }
          else if(e.key==='ArrowRight'){ e.preventDefault(); focusNext(ci,si); }
          else if(e.key==='Backspace' && inp.value===''){ e.preventDefault(); focusPrev(ci,si); }
          else if(/^[0-9]$/.test(e.key)){ e.preventDefault(); inp.value=e.key; focusNext(ci,si); if(isShown){ completeZerosInTable(); updateResult(); } }
        });
        inp.addEventListener('focus', ()=>inp.select());
        wrap.appendChild(inp); slots.push(inp);
      }
      cell.appendChild(wrap); grid.appendChild(cell); inputs.push(slots);
    });

    let defaultIdx = schema.units.indexOf(schema.base);
    if(defaultIdx === -1) defaultIdx = 3; 
    requestAnimationFrame(() => { setTarget(defaultIdx, false); positionCoupleLabels(); if(isShown){ completeZerosInTable(); updateResult(); } });
  }

  function getSlotMetrics(ci) {
    const cell = grid.children[ci]; if(!cell) return { x: 0, w: 0, cx: 0 };
    const innerRect = inner.getBoundingClientRect();
    const cellRect = cell.getBoundingClientRect();
    const realCellW = cellRect.width / zoomScale;
    const realCellLeft = (cellRect.left - innerRect.left) / zoomScale;
    const subW = realCellW / schema.slots;
    const x = realCellLeft + (schema.slots - 1) * subW;
    return { x, w: subW, cx: x + subW / 2 };
  }

  function positionCoupleLabels(){
    const kind = kindSel.value; if(kind !== 'cross' && kind !== 'area') return;
    const setLabelPos = (lab, ci) => { const metrics = getSlotMetrics(ci); lab.style.left = `${metrics.cx}px`; };
    if (kind === 'cross') { setLabelPos(lab1, 3); setLabelPos(lab2, 4); setLabelPos(lab3, 5); }
    else if (kind === 'area') { setLabelPos(lab1, 1); setLabelPos(lab2, 2); }
  }

  function findIndex(inp){
    for(let ci=0;ci<inputs.length;ci++){
      const si=inputs[ci].indexOf(inp); if(si!==-1) return [ci,si];
    } return [-1,-1];
  }
  function focusNext(ci,si){ if(si<schema.slots-1) inputs[ci][si+1].focus(); else if(ci<inputs.length-1) inputs[ci+1][0].focus(); }
  function focusPrev(ci,si){ if(si>0) inputs[ci][si-1].focus(); else if(ci>0) inputs[ci-1][schema.slots-1].focus(); }

  function setTarget(i,refresh){
    targetIdx = i; const metrics = getSlotMetrics(i);
    const padding = 6;
    cursor.style.width = `${metrics.w + padding}px`;
    cursor.style.transform = `translateX(${metrics.x - padding/2}px)`;
    if(handle) handle.style.transform = `translateX(calc(${metrics.cx}px - 50%))`;
    
    inputs.forEach(col => col.forEach(inp => inp.classList.remove('unit-highlight')));
    if(inputs[targetIdx] && inputs[targetIdx][schema.slots - 1]) inputs[targetIdx][schema.slots - 1].classList.add('unit-highlight');
    positionCoupleLabels();
    if(isShown && refresh){ completeZerosInTable(); updateResult(); }
  }

  let isDragging = false;
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  if(handle){
    handle.addEventListener('pointerdown', (e)=>{
      e.preventDefault(); 
      if(document.activeElement && document.activeElement.classList.contains('digit')) {
         document.activeElement.blur();
      }
      isDragging = true; handle.classList.add('dragging');
      cursor.style.transition = 'none'; handle.style.transition = 'none';
      handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener('pointermove', (e)=>{
      if(!isDragging) return;
      const innerRect = inner.getBoundingClientRect();
      const relativeX = (e.clientX - innerRect.left) / zoomScale;
      const clampedX = clamp(relativeX, 0, innerRect.width / zoomScale);
      
      cursor.style.transform = `translateX(calc(${clampedX}px - 50%))`;
      handle.style.transform = `translateX(calc(${clampedX}px - 50%))`;
    });

    const endDrag = (e) => {
      if(!isDragging) return; isDragging = false;
      handle.classList.remove('dragging'); handle.releasePointerCapture(e.pointerId);
      cursor.style.transition = 'transform .15s ease-out, width .15s ease-out';
      handle.style.transition = 'transform .15s ease-out';
      
      const innerRect = inner.getBoundingClientRect();
      const relativeX = (e.clientX - innerRect.left) / zoomScale;
      const totalWidth = innerRect.width / zoomScale;
      const colWidth = totalWidth / schema.units.length;
      const i = clamp(Math.floor(relativeX / colWidth), 0, schema.units.length - 1);
      setTarget(i, true);
    };
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
  }

  function completeZerosInTable(){
    const S = schema.slots, total = schema.units.length * S;
    const slot = (k)=> inputs[Math.floor(k/S)][k%S];
    for(let k=0;k<total;k++){ const el = slot(k); if(el.classList.contains('ghost0')){ el.value=''; el.classList.remove('ghost0'); } }
    let first=-1, last=-1;
    for(let k=0;k<total;k++){ const v = slot(k).value.trim(); if(/^[0-9]$/.test(v)){ if(first===-1) first=k; last=k; } }
    if(first===-1) return;
    if (document.activeElement && document.activeElement.classList.contains('digit')) return;
    const targetRightSlot = targetIdx * S + (S - 1);
    const lastUserCol = Math.floor(last / S), userNumberEnd = lastUserCol * S + (S - 1);
    const start = Math.min(first, targetRightSlot), end = Math.max(userNumberEnd, targetRightSlot);
    for(let k=start; k<=end; k++){ const el = slot(k); if(el.value===''){ el.value='0'; el.classList.add('ghost0'); } }
  }

  function saveStudent(){ savedStudent = inputs.map(col=>col.map(inp=>inp.value)); }
  function restoreStudent(){
    if(!savedStudent) return;
    for(let i=0;i<inputs.length;i++)
      for(let s=0;s<inputs[i].length;s++){ inputs[i][s].value=savedStudent[i][s]; inputs[i][s].classList.remove('ghost0'); }
  }

  function valueInTarget(){
    const S=schema.slots, baseIdx=schema.units.indexOf(schema.base); let sum=0;
    for(let ci=0;ci<schema.units.length;ci++){
      let colVal=0; for(let si=0;si<S;si++){ const ch=inputs[ci][si].value.trim(); colVal = colVal*10 + (/^[0-9]$/.test(ch)? ch.charCodeAt(0)-48 : 0); }
      sum += colVal * Math.pow(10, (baseIdx-ci)*S);
    }
    return sum * Math.pow(10, -(baseIdx-targetIdx)*S);
  }

  function minFractionDigitsForTarget(){
    const S = schema.slots; let minFrac = 0;
    for(let ci=0; ci<inputs.length; ci++){
      let hasUserDigit = false; for(let si=0; si<S; si++){ const el = inputs[ci][si]; if(/^[0-9]$/.test(el.value.trim()) && !el.classList.contains('ghost0')){ hasUserDigit = true; break; } }
      if(hasUserDigit){ const delta = (ci - targetIdx) * S; if(delta > minFrac) minFrac = delta; }
    }
    return minFrac;
  }

  function updateResult(){
    const u = schema.units[targetIdx], val = valueInTarget(), minFrac = minFractionDigitsForTarget();
    const raw = val.toLocaleString('fr-FR', { minimumFractionDigits: minFrac, maximumFractionDigits: Math.max(minFrac, 12) });
    const compact = raw.split(',').length > 1 ? raw.replace(/0+$/, '').replace(/,$/, '') : raw;
    result.innerHTML = '';
    const main = document.createElement('span'); main.className = 'mainLine';
    let displayU = (u === '-') ? 'dizaines de kg' : u;
    main.innerHTML = `${highlightUnitDigit(compact)} <span class="unit-highlight">${displayU}</span>`;
    result.appendChild(main);
    const kind = kindSel.value;
    if(kind === 'area' && (u === 'hm²' || u === 'dam²')){
      const alt = (u === 'hm²') ? 'ha' : 'a'; addEqLine(`${compact} ${u} = ${compact} ${alt}`);
    }
    if(kind === 'cross'){
      if(u === 'm³') addEqLine(`${compact} m³ = ${formatFR(val * 1000)} L`);
      else if(u === 'dm³') addEqLine(`${compact} dm³ = ${compact} L`);
      else if(u === 'cm³') addEqLine(`${compact} cm³ = ${compact} mL`);
    }
  }

  function highlightUnitDigit(s) {
    const p = s.split(','); if(p[0].length > 0){ p[0] = p[0].slice(0,-1) + `<span class="unit-highlight">${p[0].slice(-1)}</span>`; } return p.join(',');
  }
  function addEqLine(t){ const e = document.createElement('span'); e.className = 'eqLine'; e.innerHTML = t; result.appendChild(e); }
  function formatFR(x){ return x.toLocaleString('fr-FR'); }

  btnTog.addEventListener('click', ()=>{ if(!isShown){ saveStudent(); completeZerosInTable(); updateResult(); result.style.display='flex'; btnTog.textContent='Masquer'; isShown=true; } else { restoreStudent(); result.style.display='none'; btnTog.textContent='Afficher'; isShown=false; } });
  btnRst.addEventListener('click', ()=>{ inputs.forEach(col=>col.forEach(inp=>{ inp.value=''; inp.classList.remove('ghost0'); })); setTarget(schema.units.indexOf(schema.base),true); });
  zoomIn.addEventListener('click', ()=>{ zoomScale = Math.min(1.6, zoomScale + 0.1); applyZoom(); });
  zoomOut.addEventListener('click', ()=>{ zoomScale = Math.max(0.8, zoomScale - 0.1); applyZoom(); });
  zoomReset.addEventListener('click', ()=>{ zoomScale = 1; applyZoom(); });
  fsBtn.addEventListener('click', ()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
  kindSel.addEventListener('change', rebuild);

  rebuild(); applyZoom();
})();
</script>
</body>
</html>
