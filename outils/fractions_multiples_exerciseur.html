<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de Fractions et Multiples</title>
  <style>
    :root {
      --bg: #f4f7fc; --panel: #ffffff; --panel-border: #dbe4f3;
      --text: #1f2a44; --muted: #5a6784; --accent: #3f7cff;
      --success: #10b981; --inverse: #9c27b0; --totalkey: #ff9800;
      --evo: #e91e63; --var: #00bcd4; --shadow: 0 10px 30px rgba(31,42,68,0.08);
      --c-50: rgb(255, 230, 100); /* Moitié / Double (Jaune) */
      --c-33: rgb(255, 180, 200); /* Tiers / Triple (Rose) */
      --c-25: rgb(150, 220, 150); /* Quart / Quadruple (Vert) */
      --c-20: rgb(150, 200, 235); /* Cinquième / Quintuple (Bleu) */
      --c-10: rgb(250, 180, 100); /* Dixième / Décuple (Orange) */
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

    .config-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 16px 20px; width: 100%; max-width: 1100px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .config-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--panel-border); }
    .config-header h2 { margin: 0; font-size: 1.25rem; color: #1f2a44; }
    
    .theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
    
    .theme-col { background: #fbfdff; border: 1px solid #e7edf8; border-radius: 8px; padding: 12px; }
    .theme-col h3 { margin: 0 0 10px 0; font-size: 0.95rem; color: var(--accent); border-bottom: 2px solid #eef4ff; padding-bottom: 4px;}
    .theme-col.comp h3 { color: var(--evo); border-bottom-color: #fce4ec; }
    .theme-col.inverse h3 { color: var(--inverse); border-bottom-color: #f3e5f5; }
    .theme-col.totalkey h3 { color: var(--totalkey); border-bottom-color: #fff3e0; }
    .theme-col.var h3 { color: var(--var); border-bottom-color: #e0f7fa; }
    
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .cb-row { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.85rem; line-height: 1.3;}
    .cb-row input { margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
    .theme-col.comp .cb-row input { accent-color: var(--evo); }
    .theme-col.inverse .cb-row input { accent-color: var(--inverse); }
    .theme-col.totalkey .cb-row input { accent-color: var(--totalkey); }
    .theme-col.var .cb-row input { accent-color: var(--var); }
    .cb-desc { color: var(--muted); font-size: 0.75rem; display: block; margin-top: 1px;}

    .bottom-config { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: #f4f7fc; padding: 12px 16px; border-radius: 8px; border: 1px solid #dbe4f3; }
    .config-options { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .config-block { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
    .config-block select, .config-block input[type="text"] { padding: 6px 10px; border-radius: 6px; border: 1px solid #cfd8ea; font-size: 0.95rem; outline: none; }
    
    .btn-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-main { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.1s; }
    .btn-main.print { background: var(--inverse); }
    .btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

    /* LAYOUT DIAPORAMA */
    .diapo-container { background: white; border-radius: 18px; box-shadow: var(--shadow); width: 100%; max-width: 1000px; display: none; flex-direction: column; overflow: hidden; border: 1px solid var(--panel-border); margin-top: 20px; }
    .diapo-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #f8fafc; border-bottom: 1px solid #e7edf8; }
    .slide-counter { font-weight: bold; color: var(--muted); font-size: 1.1rem; }
    .btn-nav { background: white; border: 1px solid #dbe4f3; border-radius: 8px; padding: 8px 16px; font-weight: bold; cursor: pointer; color: var(--text); min-width: 130px; transition: background 0.1s; }
    .btn-nav:hover:not(:disabled) { background: #f1f5f9; }
    .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-icon { min-width: 40px; padding: 8px 12px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    
    #btnNext { min-width: 220px; text-align: center; }

    .question-box { padding: 25px 40px 0px 40px; text-align: center; }
    .question-text { font-size: 2.8rem; font-weight: bold; color: #1f2a44; line-height: 1.4; margin: 0; }

    .hint-box { padding: 0px 40px; display: none; justify-content: center; }
    .correction-box { padding: 0px 40px 10px 40px; text-align: center; display: none; margin-top: -15px; }
    .correction-text { font-size: 2.8rem; font-weight: bold; margin: 0; }
    
    .stage-wrap { display: flex; justify-content: center; align-items: flex-start; width: 100%; }
    svg { width: 100%; max-width: 950px; height: auto; max-height: 50vh; }

    .thumbnails-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 15px; background: #f8fafc; border-top: 1px solid #e7edf8; margin-top: auto; }
    .thumb-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #cfd8ea; background: white; color: var(--muted); cursor: pointer; transition: 0.2s; text-align: center; line-height: 1.2; }
    .thumb-btn .th-q { font-weight: bold; font-size: 0.95rem; margin-bottom: 3px; display: block; color: inherit; }
    .thumb-btn .th-txt { font-size: 0.75rem; opacity: 0.9; }
    .thumb-btn:hover { background: #eef4ff; }
    .thumb-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }
    .thumb-btn.done { background: var(--success); color: white; border-color: var(--success); }

    /* CSS PLEIN ECRAN STABLE */
    #diapoContainer:fullscreen { max-width: none; width: 100vw; height: 100vh; border-radius: 0; border: none; justify-content: flex-start; overflow-y: auto; background: white;}
    #diapoContainer:-webkit-full-screen { max-width: none; width: 100vw; height: 100vh; border-radius: 0; border: none; justify-content: flex-start; overflow-y: auto; background: white;}
    #diapoContainer:fullscreen .thumbnails-bar { display: none !important; }
    #diapoContainer:-webkit-full-screen .thumbnails-bar { display: none !important; }
    #diapoContainer:fullscreen svg { max-height: 60vh; max-width: 1200px; }
    #diapoContainer:-webkit-full-screen svg { max-height: 60vh; max-width: 1200px; }

    /* LAYOUT IMPRESSION */
    #printContainer { display: none; width: 100%; max-width: 850px; background: white; }
    @media print {
      body { background: white; padding: 0; margin: 0; align-items: flex-start; justify-content: center; }
      .config-panel, .diapo-container, svg.defs-only { display: none !important; }
      #printContainer { display: block !important; margin: 0 auto; }
      .print-page { page-break-after: always; padding: 10px 0; }
      .print-page:last-child { page-break-after: auto; }
      
      .print-header { display: flex; justify-content: flex-start; gap: 30px; font-size: 0.95rem; color: #333; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #ccc; position: relative;}
      .print-seed { position: absolute; right: 0; top: 0; font-weight: bold; color: var(--muted); }
      .print-title { text-align: center; font-size: 1.2rem; margin: 5px 0 20px 0; color: #1f2a44; font-weight: bold; }
      
      .print-q { margin-bottom: 15px; page-break-inside: avoid; }
      .print-q-text { font-size: 1.15rem; margin-bottom: 5px; line-height: 1.4; }
      .print-q svg { width: 100%; max-width: 580px; display: block; margin: 0 auto; } 
      .print-c-text { color: var(--text); font-weight: bold; font-size: 1.1rem; margin-top: 5px; margin-bottom: 10px; }
      .spacer-reponse { height: 60px; } 
    }
  </style>
</head>
<body>

  <svg class="defs-only" width="0" height="0" style="position:absolute;">
    <defs>
      <marker id="arrowHead" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f2a44" />
      </marker>
      <pattern id="hatch" width="10" height="10" patternTransform="rotate(45 0 0)" patternUnits="userSpaceOnUse">
        <line x1="0" y1="0" x2="0" y2="10" stroke="#1f2a44" stroke-width="2" opacity="0.3" />
      </pattern>
      <pattern id="dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
        <circle cx="2" cy="2" r="1.5" fill="#1f2a44" opacity="0.2" />
      </pattern>
    </defs>
  </svg>

  <div class="config-panel">
    <div class="config-header">
      <h2>🍰 Générateur : Fractions et Multiples d'une quantité</h2>
    </div>
    
    <div class="theme-grid">
      <div class="theme-col">
        <h3>🧊 1. Les Parts</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="unit_2"> <div><strong>Moitié (1/2)</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="unit_3"> <div><strong>Tiers (1/3)</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="unit_4"> <div><strong>Quart (1/4)</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="unit_5"> <div><strong>Cinquième (1/5)</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="unit_10"> <div><strong>Dixième (1/10)</strong></div></label>
        </div>
      </div>

      <div class="theme-col comp">
        <h3>🔥 3. Fractions Composées</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="comp_less_1"> <div><strong>Fractions &lt; 1</strong><span class="cb-desc">ex: 2/3, 3/4, 2/5...</span></div></label>
          <label class="cb-row"><input type="checkbox" value="comp_greater_1"> <div><strong>Fractions &gt; 1</strong><span class="cb-desc">ex: 3/2, 5/4, 7/3...</span></div></label>
        </div>
      </div>

      <div class="theme-col inverse">
        <h3>🎯 5. Trouver la fraction</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="find_frac_unit"> <div><strong>Fractions simples</strong><span class="cb-desc">Trouver 1/3, 1/4...</span></div></label>
          <label class="cb-row"><input type="checkbox" value="find_frac_comp"> <div><strong>Fractions composées</strong><span class="cb-desc">Trouver 2/5, 3/4...</span></div></label>
          <label class="cb-row"><input type="checkbox" value="find_mult"> <div><strong>Trouver un multiple</strong><span class="cb-desc">Trouver double, triple...</span></div></label>
        </div>
      </div>

      <div class="theme-col">
        <h3>🥞 2. Les Multiples</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="mult_2"> <div><strong>Le Double</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_3"> <div><strong>Le Triple</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_4"> <div><strong>Le Quadruple</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_5"> <div><strong>Le Quintuple</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_10"> <div><strong>Le Décuple</strong></div></label>
        </div>
      </div>

      <div class="theme-col var">
        <h3>🎢 4. Variations</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="var_reste"> <div><strong>Calcul du Reste</strong><span class="cb-desc">J'ai dépensé 1/4. Reste = ?</span></div></label>
          <label class="cb-row"><input type="checkbox" value="var_dim"> <div><strong>Diminution</strong><span class="cb-desc">Le prix baisse d'1/3.</span></div></label>
          <label class="cb-row"><input type="checkbox" value="var_aug"> <div><strong>Augmentation</strong><span class="cb-desc">Le trajet est rallongé d'1/5.</span></div></label>
        </div>
      </div>

      <div class="theme-col totalkey">
        <h3>🔑 6. Trouver le TOUT</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="find_tot_unit"> <div><strong>À partir d'une part</strong><span class="cb-desc">ex: 1/4 = 15, Tout = ?</span></div></label>
          <label class="cb-row"><input type="checkbox" value="find_tot_comp"> <div><strong>À partir d'une fr. &lt; 1</strong><span class="cb-desc">ex: 2/3 = 40, Tout = ?</span></div></label>
          <label class="cb-row"><input type="checkbox" value="find_tot_great"> <div><strong>À partir d'une fr. &gt; 1</strong><span class="cb-desc">ex: 5/4 = 100, Tout = ?</span></div></label>
        </div>
      </div>
    </div>

    <div class="bottom-config">
      <div class="config-options">
        <div class="config-block">
          <label>Niveau :</label>
          <select id="selLevel">
            <option value="0" selected>Niveau 0 (Objets / Manipulation)</option>
            <option value="1">Niveau 1 (Tables & Réflexes)</option>
            <option value="2">Niveau 2 (Astuces & Intermédiaires)</option>
            <option value="3">Niveau 3 (Grands nombres)</option>
          </select>
        </div>
        <div class="config-block">
          <label>Questions :</label>
          <select id="selCount">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
          </select>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label>Format d'écriture :</label>
          <select id="selFormat">
            <option value="lettres" selected>📝 En lettres (ex: un tiers)</option>
            <option value="chiffres">🔢 En chiffres (ex: 1/3)</option>
          </select>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label style="cursor: pointer;"><input type="checkbox" id="cbEmptyGabarits" checked style="accent-color: var(--success); transform: scale(1.2);"> 📝 Gabarits</label>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label>Seed :</label>
          <input type="text" id="inputSeed" placeholder="Auto" style="width: 80px; text-align: center;">
        </div>
      </div>
      
      <div class="btn-wrap" style="margin-top:10px;">
        <button class="btn-main" onclick="generateQuiz()">💻 Générer le diapo</button>
        <button class="btn-main print" onclick="generatePrint()">🖨️ Fiche PDF/Papier</button>
      </div>
    </div>
  </div>

  <div class="diapo-container" id="diapoContainer">
    <div class="diapo-header">
      <button class="btn-nav" id="btnPrev" onclick="prevSlide()">◄ Précédent</button>
      <div class="slide-counter" id="slideCounter">Question 1 / 5</div>
      <div style="display: flex; gap: 8px;">
        <button class="btn-nav btn-icon" onclick="toggleFullscreen()" title="Passer en plein écran">⛶</button>
        <button class="btn-nav" id="btnNext" onclick="nextAction()" style="background-color: var(--accent); color: white;">Indice (Schéma) 💡 ►</button>
      </div>
    </div>
    <div class="question-box"><p class="question-text" id="qText"></p></div>
    <div class="hint-box" id="hBox"><div class="stage-wrap"><svg id="svgStage" viewBox="0 0 1000 300"></svg></div></div>
    <div class="correction-box" id="cBox"><div class="correction-text" id="cText"></div></div>
    <div class="thumbnails-bar" id="thumbBar"></div>
  </div>

  <div id="printContainer"></div>

  <script>
    const svgNS = "http://www.w3.org/2000/svg";
    let quizData = [];
    let currentIndex = 0;
    let quizSeed = 1; 
    let currentSeed = 1;
    let questionHistory = new Set(); 

    function setSeed(s) { currentSeed = s; }
    function seededRandom() {
        currentSeed = (currentSeed * 9301 + 49297) % 233280;
        return currentSeed / 233280;
    }
    function rand(min, max) { return Math.floor(seededRandom() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(seededRandom() * arr.length)]; }
    function fmt(n) { return n.toString().replace('.', ','); }
    function frPlural(n, singular, plural) { return Math.abs(Number(n)) === 1 ? singular : plural; }

    function initSeed() {
        let seedInput = document.getElementById('inputSeed').value.trim();
        let s;
        if (!seedInput || isNaN(seedInput)) {
            s = Math.floor(Math.random() * 9999) + 1;
            document.getElementById('inputSeed').value = ""; 
            document.getElementById('inputSeed').placeholder = s; 
        } else { s = parseInt(seedInput, 10); }
        setSeed(s); return s;
    }

    function toggleFullscreen() {
      let elem = document.getElementById("diapoContainer");
      if (!document.fullscreenElement) {
        elem.requestFullscreen().catch(err => alert(`Erreur: ${err.message}`));
      } else { document.exitFullscreen(); }
    }

    const colors = { 2: "var(--c-50)", 3: "var(--c-33)", 4: "var(--c-25)", 5: "var(--c-20)", 10: "var(--c-10)" };

    document.addEventListener("keydown", (e) => {
      if (document.getElementById('diapoContainer').style.display !== "none") {
        if (e.key === "ArrowRight") { if (!document.getElementById('btnNext').disabled) nextAction(); } 
        else if (e.key === "ArrowLeft") { if (!document.getElementById('btnPrev').disabled) prevSlide(); }
      }
    });

    function getFractionNaturalText(num, den) {
        const dens = { 2: "demi", 3: "tiers", 4: "quart", 5: "cinquième", 10: "dixième" };
        const nums = { 1: "un", 2: "deux", 3: "trois", 4: "quatre", 5: "cinq", 6: "six", 7: "sept", 8: "huit", 9: "neuf", 10: "dix", 11: "onze", 12: "douze", 13: "treize", 14: "quatorze", 15: "quinze", 20: "vingt" };
        const mults = { 2: "le double", 3: "le triple", 4: "le quadruple", 5: "le quintuple", 10: "le décuple" };

        if (den === 1) return mults[num];
        
        let wordDen = dens[den];
        if (num === 1) {
            if (den === 2) return "la moitié";
            return `un ${wordDen}`;
        }
        let pluralDen = wordDen.endsWith('s') ? wordDen : wordDen + "s";
        return `${nums[num]} ${pluralDen}`;
    }

    function getFractionSymbolicText(num, den, format, isHTML = false) {
        if (format === 'chiffres') {
            if (den === 1) return `&times; ${num}`; 
            if (isHTML) {
                return `<span style="display:inline-flex; flex-direction:column; align-items:center; vertical-align:middle; line-height:1; font-size:0.85em; margin:0 4px;"><span style="border-bottom:0.1em solid; padding:0 2px;">${num}</span><span>${den}</span></span>`;
            } else {
                return `${num}/${den}`; 
            }
        }
        return getFractionNaturalText(num, den);
    }

    function getDePrefix(fs, qNum, qDen, formatSetting) {
        if (fs.startsWith("un ") || fs.startsWith("1/") || fs.includes(">1<") || fs.includes(">1/<")) {
            if (qNum === 1 && qDen === 2 && formatSetting === 'lettres') return "de "; 
            return "d'";
        }
        return "de ";
    }

    function buildText(q) {
      let cType = pick(['brut', 'argent', 'distance', 'poids', 'capacite', 'ecole', 'temps']);
      if (q.forcedTheme) cType = q.forcedTheme;

      let qHtml = "", unit = "";
      
      if (cType && cType.startsWith('niveau0|')) {
          let parts = cType.split('|');
          unit = " " + parts[1] + " " + parts[2]; 
          q.emoji = parts[2];
          cType = 'brut'; 
      } else {
          q.emoji = '⬛'; 
      }
      
      if (cType === 'brut' && q.level > 0) {
          unit = pick([" €", " kg", " L", " min", " km", ""]);
      }

      const t = q.totalVal; 
      const ecoleLieu = t < 40 ? "une classe" : "une école";
      const ecoleLieuCap = ecoleLieu.charAt(0).toUpperCase() + ecoleLieu.slice(1);
      
      const distLieu = t < 10 ? "une randonnée à pied" : (t <= 100 ? "une balade à vélo" : "un voyage");
      const poidsObjet = t < 10 ? "un colis" : (t <= 50 ? "une valise" : "un chargement");
      const capObjet = t < 5 ? "Une bouteille" : (t <= 50 ? "Un seau" : "Une cuve");
      const argentObjet = t < 20 ? "un livre" : (t <= 150 ? "un vêtement" : "un appareil");

      let formatSetting = document.getElementById('selFormat').value;
      let fracStr = "";
      let fracMathStr = getFractionSymbolicText(q.num, q.den, formatSetting, true);
      
      if (formatSetting === 'chiffres' && q.den !== 1) {
          fracStr = fracMathStr; 
      } else {
          fracStr = getFractionNaturalText(q.num, q.den);
      }

      let dePrefix = getDePrefix(fracStr, q.num, q.den, formatSetting);
      let mathLine = "";
      let sentenceLine = "";
      let cleanUnit = unit.replace(q.emoji, '').trim();
      let unitWithEmoji = cleanUnit ? cleanUnit + " " + q.emoji : q.emoji;

      if (q.level === 0) {
          if (q.num > q.den && q.den !== 1) {
              qHtml = `Une recette demande <strong>${fmt(t)} ${unitWithEmoji}</strong>.<br>Je veux préparer <strong>${fracStr}</strong> de cette recette.<br>Combien me faut-il de ${cleanUnit} ?`;
              sentenceLine = `Il me faut ${fmt(q.calcVal)} ${cleanUnit}.`;
          } else if (q.mode === 'var_reste' || q.mode === 'var_dim') {
              qHtml = `J'avais <strong>${fmt(t)} ${unitWithEmoji}</strong>.<br>J'en ai perdu (ou mangé) <strong>${fracStr}</strong>.<br>Combien m'en reste-t-il ?`;
              sentenceLine = `Il m'en reste ${fmt(q.calcVal)} ${cleanUnit}.`;
          } else if (q.mode === 'var_aug') {
              qHtml = `J'ai <strong>${fmt(t)} ${unitWithEmoji}</strong>.<br>Mon ami m'en donne <strong>${fracStr}</strong> en plus.<br>Combien en ai-je maintenant ?`;
              sentenceLine = `J'ai maintenant ${fmt(q.calcVal)} ${cleanUnit}.`;
          } else if (q.mode === 'find_total') {
              if (q.den === 1) {

    function getBaseData(den, num, level) {
      let val, forcedTheme = null;
      let roll = seededRandom();

      if (level === 0) {
          let maxVal = Math.floor(20 / Math.max(den, num));
          if(maxVal < 1) maxVal = 1;
          val = rand(1, maxVal);
          
          let items = [
            {n:'pommes', e:'🍎'}, {n:'bonbons', e:'🍬'}, {n:'ballons', e:'⚽'}, 
            {n:'billes', e:'🔵'}, {n:'étoiles', e:'⭐️'}, {n:'cookies', e:'🍪'}
          ];
          let it = pick(items);
          forcedTheme = 'niveau0|' + it.n + '|' + it.e;
      }
      else if (level === 1) {
          if (roll > 0.3) { 
              val = rand(2, 10);
          } else { 
              if (den === 2 || num === 2) { 
                  let opts = [{v:50, t:'argent'}, {v:30, t:'temps'}, {v:10, t:'brut'}, {v:20, t:'brut'}];
                  let choice = pick(opts); val = choice.v; forcedTheme = choice.t; 
              }
              else if (den === 3 || num === 3) { val = 20; forcedTheme = 'temps'; }
              else if (den === 4 || num === 4) { 
                  let opts = [{v:25, t:'argent'}, {v:15, t:'temps'}];
                  let choice = pick(opts); val = choice.v; forcedTheme = choice.t; 
              }
              else if (den === 5 || num === 5) { 
                  let opts = [{v:20, t:'argent'}, {v:12, t:'temps'}];
                  let choice = pick(opts); val = choice.v; forcedTheme = choice.t; 
              }
              else if (den === 10 || num === 10) { 
                  let opts = [{v:10, t:'argent'}, {v:6, t:'temps'}];
                  let choice = pick(opts); val = choice.v; forcedTheme = choice.t; 
              }
              else { val = rand(2, 10); }
          }
      }
      else if (level === 2) {
          if (seededRandom() > 0.5) {
              val = rand(2, 10) * pick([10, 100]); 
              if (val * Math.max(den, num) > 1500) val = rand(2, 10) * 10;
          } else {
              let limit = Math.floor(300 / Math.max(den, num));
              if(limit < 11) limit = 11;
              val = rand(11, Math.max(limit, 25));
          }
      }
      else { 
          let maxVal = Math.floor(1000 / Math.max(den, num));
          if(maxVal < 51) maxVal = 51;
          do { val = rand(31, maxVal); } while (val % 10 === 0);
      }
      
      let totalVal = val * den; 
      return { totalVal, forcedTheme };
    }

    function createUniqueQuestion(type, level, typeIndex) {
      let attempts = 0;
      let q = null;
      while (attempts < 100) {
          q = buildQuestionLogic(type, level, typeIndex);
          let key = `${q.den}-${q.num}-${q.totalVal}-${q.mode}`;
          if (!questionHistory.has(key)) {
              questionHistory.add(key);
              return q;
          }
          attempts++;
      }
      return null; 
    }

    function buildQuestionLogic(type, level, typeIndex) {
      let num, den, mode = 'direct';

      if (type.startsWith('unit_')) { den = parseInt(type.split('_')[1], 10); num = 1; }
      else if (type.startsWith('mult_')) { den = 1; num = parseInt(type.split('_')[1], 10); }
      else if (type === 'comp_less_1') {
          let dens = [3, 4, 5, 10]; den = dens[typeIndex % dens.length];
          if (den === 3) num = 2; else if (den === 4) num = 3; else if (den === 5) num = pick([2, 3, 4]); else if (den === 10) num = pick([3, 7, 9]);
      }
      else if (type === 'comp_greater_1') {
          let dens = [2, 3, 4, 5]; den = dens[typeIndex % dens.length];
          if (den === 2) num = pick([3, 5]); else if (den === 3) num = pick([4, 5, 7]); else if (den === 4) num = pick([5, 7]); else if (den === 5) num = pick([6, 7, 8]);
      }
      else if (type === 'find_frac_unit') { 
          mode = 'find_frac'; 
          let dens = [2, 3, 4, 5, 10]; den = dens[typeIndex % dens.length]; num = 1; 
      }
      else if (type === 'find_frac_comp') {
          mode = 'find_frac'; 
          let dens = [3, 4, 5, 10]; den = dens[typeIndex % dens.length];
          if (den === 3) num = 2; else if (den === 4) num = 3; else if (den === 5) num = pick([2,3,4]); else num = pick([3,7,9]);
      }
      else if (type === 'find_mult') { mode = 'find_frac'; den = 1; num = pick([2, 3, 4, 5, 10]); }
      else if (type.startsWith('find_tot_')) {
          mode = 'find_total';
          if (type === 'find_tot_unit') { let dens = [2, 3, 4, 5, 10]; den = dens[typeIndex % dens.length]; num = 1; } 
          else if (type === 'find_tot_comp') { let dens = [3, 4, 5]; den = dens[typeIndex % dens.length]; if (den===3) num=2; else if (den===4) num=3; else num=pick([2,3,4]); } 
          else if (type === 'find_tot_great') { let dens = [2, 3, 4]; den = dens[typeIndex % dens.length]; if (den===2) num=3; else if (den===3) num=pick([4,5]); else num=5; }
      }
      else if (type.startsWith('var_')) {
          mode = type; 
          let dens = [2, 3, 4, 5, 10]; den = dens[typeIndex % dens.length];
          num = rand(1, den - 1); 
      }

      let data = getBaseData(den, num, level);
      
      if (den !== 1 && num > den && level !== 0) {
          data.forcedTheme = data.forcedTheme || 'brut';
      }

      let totalVal = data.totalVal;
      let partVal = (totalVal / den) * num;
      
      let calcVal;
      if (mode === 'var_aug') {
          calcVal = totalVal + partVal;
      } else if (mode === 'var_dim' || mode === 'var_reste') {
          calcVal = totalVal - partVal;
      } else {
          calcVal = partVal;
      }

      let q = { num, den, totalVal, calcVal, mode, phase: 0, forcedTheme: data.forcedTheme, level: level };
      let texts = buildText(q);
      q.qHtml = texts.qHtml; q.cHtml = texts.cHtml; q.unit = texts.unit;
      return q;
    }

    function getQuizData() {
      const checkboxes = document.querySelectorAll('.theme-grid input[type="checkbox"]:checked');
      if (checkboxes.length === 0) { alert("⚠️ Cochez au moins un type de question !"); return false; }
      
      quizSeed = initSeed();
      let types = Array.from(checkboxes).map(cb => cb.value);
      let targetCount = parseInt(document.getElementById('selCount').value, 10);
      const level = parseInt(document.getElementById('selLevel').value, 10); 
      
      let distributedTypes = [];
      for (let i = 0; i < targetCount; i++) { distributedTypes.push(types[i % types.length]); }
      for (let i = distributedTypes.length - 1; i > 0; i--) {
          const j = Math.floor(seededRandom() * (i + 1));
          [distributedTypes[i], distributedTypes[j]] = [distributedTypes[j], distributedTypes[i]];
      }

      quizData = [];
      questionHistory.clear();
      let typeCounters = {};

      for (let i = 0; i < targetCount; i++) {
        let t = distributedTypes[i];
        if (typeCounters[t] === undefined) typeCounters[t] = 0;
        let q = createUniqueQuestion(t, level, typeCounters[t]);
        if (q !== null) {
            quizData.push(q);
            typeCounters[t]++;
        }
      }

      if (quizData.length === 0) {
          alert("Impossible de générer des questions avec ces paramètres.");
          return false;
      }
      
      return true;
    }

    function emptyElement(el) { while (el.firstChild) el.removeChild(el.firstChild); }
    function createSVG(tag, attrs) { const el = document.createElementNS(svgNS, tag); for (let k in attrs) el.setAttribute(k, attrs[k]); return el; }

    function getReqW(q) {
        if (q.mode === 'var_aug') {
            let baseParts = q.den === 1 ? q.num : q.den;
            let wPart = 600 / baseParts;
            return Math.max(1000, 600 + (q.num * wPart) + 150); 
        } else if (q.den !== 1 && q.num > q.den) {
            let wPart = 600 / q.den;
            let extraBoxes = q.num - q.den;
            return Math.max(1000, 600 + (extraBoxes * wPart) + 150);
        }
        return 1000;
    }

    function drawBrace(svg, x, y, width, text, isUp, color="#1f2a44", forceFontSize=null) {
      if(width <= 0) return;
      const h = 12; const dir = isUp ? -1 : 1; const yTip = y + (h * dir);
      const d = `M ${x} ${y} Q ${x} ${yTip}, ${x + Math.min(10, width/3)} ${yTip} L ${x + width/2 - Math.min(8, width/4)} ${yTip} Q ${x + width/2} ${yTip}, ${x + width/2} ${yTip + (4*dir)} Q ${x + width/2} ${yTip}, ${x + width/2 + Math.min(8, width/4)} ${yTip} L ${x + width - Math.min(10, width/3)} ${yTip} Q ${x + width} ${yTip}, ${x + width} ${y} `;
      svg.appendChild(createSVG("path", { d: d, fill: "none", stroke: color, "stroke-width": "3" }));

      let fSize = forceFontSize || (width < 50 ? "16" : "24");
      let yOffset = isUp ? -12 : 38; 
      let txt = createSVG("text", { x: x + width/2, y: yTip + yOffset, "text-anchor": "middle", "font-weight": "bold", "font-size": fSize, fill: color });
      txt.textContent = text; svg.appendChild(txt);
    }

    function drawEmojiGroup(svg, x, y, w, h, count, emoji, op=1, clustered=false) {
        if(count === 0) return;
        let cy = y + h/2 + 8; 
        
        if (clustered) {
            let sp = 28; 
            let totalW = count * sp;
            let startX = x + w/2 - totalW/2 + sp/2;
            for(let i=0; i<count; i++) {
                let txt = createSVG("text", { x: startX + i*sp, y: cy, "text-anchor": "middle", "font-size": "26", "opacity": op });
                txt.textContent = emoji;
                svg.appendChild(txt);
            }
        } else {
            let sp = w / count; 
            for(let i=0; i<count; i++) {
                let cx = x + (sp / 2) + i * sp;
                let txt = createSVG("text", { x: cx, y: cy, "text-anchor": "middle", "font-size": "26", "opacity": op });
                txt.textContent = emoji;
                svg.appendChild(txt);
            }
        }
    }

    function drawSVGFraction(q, isCorrection, svgContainer, yOffset = 0, reqW = 1000, forceX = null, isPrint = false) {
      let wTop = 600; 
      let baseParts = q.den === 1 ? q.num : q.den;
      let wPart = wTop / baseParts; 
      
      let maxBoxes = q.den === 1 ? q.num : Math.max(q.den, q.num);
      if (q.mode === 'var_aug') maxBoxes = baseParts + q.num; 

      let xStart;
      let totalW = wPart * maxBoxes;
      
      if (forceX !== null) {
          xStart = forceX;
      } else if (q.mode === 'var_aug' || (q.den !== 1 && q.num > q.den)) {
          xStart = (reqW - totalW) / 2;
      } else {
          xStart = (reqW - wTop) / 2; 
      }

      const hBar = 60;
      const yTop = 60 + yOffset;
      const yBot = yTop + hBar;
      const familyNumber = q.den === 1 ? q.num : q.den;
      const baseColor = colors[familyNumber] || "var(--c-10)";

      // 1. TOP BAR (Le Tout)
      svgContainer.appendChild(createSVG("rect", { x: xStart, y: yTop, width: wTop, height: hBar, fill: baseColor, stroke: "#1f2a44", "stroke-width": "2.5", "fill-opacity": "0.15" }));

      if (!isPrint) {
          if (q.level === 0) {
              let showTopEmojis = false;
              let drawQuestionMark = false;

              if (q.mode === 'find_total' && !isCorrection) {
                  drawQuestionMark = true;
              } else if (q.den === 1 && q.mode !== 'find_frac' && !isCorrection) {
                  drawQuestionMark = true;
              } else {
                  showTopEmojis = true;
              }

              if (drawQuestionMark) {
                  let txtTopSVG = createSVG("text", { x: xStart + wTop/2, y: yTop + hBar/2 + 8, "text-anchor": "middle", "font-weight": "bold", "font-size": "36", fill: "#1f2a44" });
                  txtTopSVG.textContent = "?";
                  svgContainer.appendChild(txtTopSVG);
              }
              if (showTopEmojis) {
                  let count = (q.den === 1) ? q.calcVal : q.totalVal;
                  drawEmojiGroup(svgContainer, xStart, yTop, wTop, hBar, count, q.emoji, 1, true);
              }
          } else {
              const mults_names = { 2: "DOUBLE", 3: "TRIPLE", 4: "QUADRUPLE", 5: "QUINTUPLE", 10: "DÉCUPLE" };
              let textTop = "";
              if (isCorrection) {
                  textTop = q.den === 1 ? fmt(q.calcVal) : fmt(q.totalVal);
              } else {
                  if (q.mode === 'find_total') {
                      textTop = "?";
                  } else if (q.den === 1) {
                      if (q.mode === 'find_frac') {
                          textTop = fmt(q.calcVal); // Affiche la valeur cible pour les multiples en recherche
                      } else {
                          textTop = "LE " + mults_names[q.num];
                      }
                  } else {
                      textTop = "LE TOUT";
                  }
              }
              let txtTopSVG = createSVG("text", { x: xStart + wTop/2, y: yTop + hBar/2 + 8, "text-anchor": "middle", "font-weight": "bold", "font-size": wTop < 100 ? "18" : "26", fill: "#1f2a44" });
              txtTopSVG.textContent = textTop;
              svgContainer.appendChild(txtTopSVG);
          }
      }

      // 2. BOTTOM BAR (Les Cases)
      // ASTUCE GENIALE : Le Bloc Neutre unique pour chercher la fraction !
      if (q.mode === 'find_frac' && !isCorrection) {
          let knownBoxes = q.den === 1 ? 1 : q.num;
          let blockW = wPart * knownBoxes;
          let knownVal = q.den === 1 ? q.totalVal : q.calcVal;
          let frameW = Math.max(wTop, totalW); 

          // Cadre global pointillé pour montrer l'espace vide
          svgContainer.appendChild(createSVG("rect", {
              x: xStart, y: yBot, width: frameW, height: hBar,
              fill: "none", stroke: "#1f2a44", "stroke-width": "2.5", "stroke-dasharray": "6,4", opacity: "0.4"
          }));

          // Bloc neutre de la part connue (gris clair pour ne pas donner la couleur de la famille)
          let fillCol = isPrint ? "none" : "#e2e8f0";
          svgContainer.appendChild(createSVG("rect", {
              x: xStart, y: yBot, width: blockW, height: hBar,
              fill: fillCol, stroke: "#1f2a44", "stroke-width": "2.5" 
          }));

          // Contenu du bloc neutre
          if (q.level === 0 && !isPrint) {
              drawEmojiGroup(svgContainer, xStart, yBot, blockW, hBar, knownVal, q.emoji, 1, false);
          } else {
              let fSizeBot = blockW < 65 ? "16" : (blockW < 100 ? "20" : "30");
              let txtBotSVG = createSVG("text", {
                  x: xStart + blockW/2, y: yBot + hBar/2 + 10,
                  "text-anchor": "middle", "font-weight": "bold", "font-size": fSizeBot, fill: "#1f2a44", opacity: isPrint ? "0.3" : "1"
              });
              txtBotSVG.textContent = fmt(knownVal);
              svgContainer.appendChild(txtBotSVG);
          }

          // Le gros "?" dans l'espace vide restant
          let remainW = frameW - blockW;
          if (remainW > 0 && !isPrint) {
              let remainX = xStart + blockW;
              let txtBotBg = createSVG("text", { x: remainX + remainW/2, y: yBot + hBar/2 + 12, "text-anchor": "middle", "font-weight": "bold", "font-size": "36", stroke: "white", "stroke-width": "6", "paint-order": "stroke" });
              txtBotBg.textContent = "?"; svgContainer.appendChild(txtBotBg);
              let txtBotSVG = createSVG("text", { x: remainX + remainW/2, y: yBot + hBar/2 + 12, "text-anchor": "middle", "font-weight": "bold", "font-size": "36", fill: "#1f2a44" });
              txtBotSVG.textContent = "?"; svgContainer.appendChild(txtBotSVG);
          }

      } else {
          // BOUCLE CLASSIQUE
          for (let i = 0; i < maxBoxes; i++) {
            let xPart = xStart + (i * wPart);
            let partVal = q.den === 1 ? q.totalVal : q.totalVal / q.den;

            let fillOpacity = "1";
            let useHatch = false;
            let useDots = false;
            let isDashed = false;

            if (q.mode === 'var_reste' || q.mode === 'var_dim') {
                if (i < q.num) { useHatch = true; fillOpacity = "0"; }
            } else if (q.mode === 'var_aug') {
                if (i >= baseParts) { useDots = true; isDashed = true; fillOpacity = "0.2"; }
            } else {
                if (i >= q.num && q.den !== 1) fillOpacity = "0.4";
            }

            let rectAttrs = { x: xPart, y: yBot, width: wPart, height: hBar, fill: baseColor, stroke: "#1f2a44", "stroke-width": "2.5", "fill-opacity": fillOpacity };
            if (isDashed) rectAttrs["stroke-dasharray"] = "6,4";
            svgContainer.appendChild(createSVG("rect", rectAttrs));

            if (isPrint) {
                svgContainer.appendChild(createSVG("line", { x1: xPart + wPart/2 - 12, y1: yBot + hBar/2, x2: xPart + wPart/2 + 12, y2: yBot + hBar/2, stroke: "#1f2a44", "stroke-width": "3", "stroke-dasharray": "4,4", "opacity": "0.3" }));
            } else {
                if (useHatch) {
                    svgContainer.appendChild(createSVG("rect", { x: xPart, y: yBot, width: wPart, height: hBar, fill: "url(#hatch)" }));
                } else if (useDots) {
                    svgContainer.appendChild(createSVG("rect", { x: xPart, y: yBot, width: wPart, height: hBar, fill: "url(#dots)" }));
                }

                if (q.level === 0) {
                    let showEmojis = false;
                    let drawText = false;
                    
                    if (isCorrection) {
                        if (q.den === 1) showEmojis = true; 
                        else if (i < q.num) showEmojis = true; 
                    } else {
                        if (q.mode === 'find_total' && i < q.num) {
                            showEmojis = true;
                        } else if (q.den === 1 && i === 0) {
                            showEmojis = true;
                        } else {
                            drawText = false; // Plus aucun texte dans les boites vides (Niveau 0)
                        }
                    }
                    
                    if (showEmojis) {
                        let op = fillOpacity;
                        if (useHatch) op = "0.2";
                        if (useDots) op = "0.5";
                        drawEmojiGroup(svgContainer, xPart, yBot, wPart, hBar, partVal, q.emoji, op, false);
                    }
                } else {
                    if (isCorrection) {
                        let fSizeBot = wPart < 65 ? "16" : (wPart < 100 ? "20" : "30");
                        let txtBotSVG = createSVG("text", { x: xPart + wPart/2, y: yBot + hBar/2 + 10, "text-anchor": "middle", "font-weight": "bold", "font-size": fSizeBot, fill: "#1f2a44" });
                        txtBotSVG.textContent = fmt(partVal);
                        svgContainer.appendChild(txtBotSVG);
                    } else {
                        if (q.den === 1) { 
                            let fSizePart = wPart < 65 ? "14" : "20";
                            let txtPref = createSVG("text", { x: xPart + wPart/2, y: yBot + (wPart<65?22:26), "text-anchor": "middle", "font-weight": "bold", "font-size": fSizePart, fill: "#1f2a44" });
                            txtPref.textContent = "une"; svgContainer.appendChild(txtPref);
                            let txtWord = createSVG("text", { x: xPart + wPart/2, y: yBot + (wPart<65?42:48), "text-anchor": "middle", "font-weight": "bold", "font-size": fSizePart, fill: "#1f2a44" });
                            txtWord.textContent = "part"; svgContainer.appendChild(txtWord);
                        } else {
                            let prefix = q.den === 2 ? "la" : "un";
                            let word = { 2: "moitié", 3: "tiers", 4: "quart", 5: "cinquième", 10: "dixième" }[q.den];
                            let fSizeLettres = wPart < 65 ? "14" : "20";
                            let txtPref = createSVG("text", { x: xPart + wPart/2, y: yBot + (wPart<65?22:24), "text-anchor": "middle", "font-weight": "bold", "font-size": fSizeLettres, fill: "#1f2a44" });
                            txtPref.textContent = prefix; svgContainer.appendChild(txtPref);
                            let txtWord = createSVG("text", { x: xPart + wPart/2, y: yBot + (wPart<65?42:46), "text-anchor": "middle", "font-weight": "bold", "font-size": fSizeLettres, fill: "#1f2a44" });
                            txtWord.textContent = word; svgContainer.appendChild(txtWord);
                        }
                    }
                }
            }
          }
      }

      // 3. ACCOLADES 
      if (!isPrint) {
          if (q.mode === 'var_reste' || q.mode === 'var_dim') {
              let remainBoxes = q.den - q.num;
              let label = isCorrection ? fmt(q.calcVal) : "?";
              let color = isCorrection ? "var(--success)" : "#1f2a44";
              drawBrace(svgContainer, xStart + (q.num * wPart), yBot + hBar + 10, remainBoxes * wPart, label, false, color, "32");
          }
          else if (q.mode === 'var_aug') {
              let totalBoxes = baseParts + q.num;
              let label = isCorrection ? fmt(q.calcVal) : "?";
              let color = isCorrection ? "var(--success)" : "#1f2a44";
              drawBrace(svgContainer, xStart, yBot + hBar + 10, totalBoxes * wPart, label, false, color, "32");
          }
          else {
              let shouldDraw = false;
              let color = "var(--accent)";
              let label = fmt(q.calcVal);
              
              if (isCorrection) {
                  if (q.level === 0 || q.num > 1 || q.den === 1 || q.mode === 'find_frac' || q.mode === 'find_total') { 
                      shouldDraw = true;
                      color = "var(--success)";
                  }
              } else if (q.mode === 'find_total') {
                  if (q.level === 0 || q.num > 1 || q.den === 1) {
                      shouldDraw = true;
                      color = "var(--accent)";
                      label = fmt(q.calcVal);
                  }
              }
              // Pour find_frac à l'indice, l'accolade reste cachée exprès !
              
              if (shouldDraw) {
                  drawBrace(svgContainer, xStart, yBot + hBar + 10, q.num * wPart, label, false, color, "32");
              }
          }
      }
    }

    function buildThumbnails() {
      const tb = document.getElementById('thumbBar'); tb.innerHTML = '';
      quizData.forEach((q, idx) => {
        let btn = document.createElement('button'); btn.className = 'thumb-btn';
        let txt = "";
        
        if (q.den === 1) { 
            if (q.mode === 'direct') txt = `${q.num} &times; ${fmt(q.totalVal)}`;
            else if (q.mode === 'find_frac') txt = `${fmt(q.calcVal)} = ? &times; ${fmt(q.totalVal)}`;
            else if (q.mode === 'find_total') txt = `${q.num} &times; ? = ${fmt(q.calcVal)}`;
        } else {
            let fStr = getFractionSymbolicText(q.num, q.den, document.getElementById('selFormat').value, true);
            if (q.mode === 'direct') txt = `${fStr} de ${fmt(q.totalVal)}`;
            else if (q.mode === 'find_frac') txt = `${fmt(q.calcVal)} sur ${fmt(q.totalVal)}`;
            else if (q.mode === 'find_total') txt = `${fStr} ➔ ${fmt(q.calcVal)}`;
            else if (q.mode === 'var_reste' || q.mode === 'var_dim') txt = `${fmt(q.totalVal)} - ${fStr}`;
            else if (q.mode === 'var_aug') txt = `${fmt(q.totalVal)} + ${fStr}`;
        }

        btn.innerHTML = `<span class="th-q">Q${idx + 1}</span><span class="th-txt">${txt}</span>`;
        btn.onclick = () => loadSlide(idx, q.phase); 
        tb.appendChild(btn);
      });
    }

    function updateThumbnails() {
      const btns = document.getElementById('thumbBar').children;
      for(let i=0; i<btns.length; i++) {
        btns[i].className = 'thumb-btn';
        if (quizData[i].phase === 2) btns[i].classList.add('done');
        if (i === currentIndex) btns[i].classList.add('active');
      }
    }

    function generateQuiz() {
      if(!getQuizData()) return;
      document.getElementById('diapoContainer').style.display = 'flex';
      buildThumbnails(); loadSlide(0, 0);
      document.getElementById('diapoContainer').scrollIntoView({ behavior: "smooth" });
    }

    function updateUI() {
      const q = quizData[currentIndex]; const btnNext = document.getElementById('btnNext');
      document.getElementById('slideCounter').textContent = `Question ${currentIndex + 1} / ${quizData.length}`;
      document.getElementById('qText').innerHTML = q.qHtml;
      document.getElementById('btnPrev').disabled = (currentIndex === 0 && q.phase === 0);
      
      let stage = document.getElementById('svgStage');
      emptyElement(stage);

      if (q.phase === 0) {
        document.getElementById('hBox').style.display = 'none'; document.getElementById('cBox').style.display = 'none';
        btnNext.innerHTML = "Indice (Schéma) 💡 ►";
      } else {
        let isCorr = (q.phase === 2);
        if(isCorr) {
            document.getElementById('cBox').style.display = 'block';
            document.getElementById('cText').innerHTML = q.cHtml;
            if (currentIndex === quizData.length - 1) { btnNext.innerHTML = "Terminé ✓"; btnNext.disabled = true; } 
            else { btnNext.innerHTML = "Question suiv. ►"; btnNext.disabled = false; }
        } else {
            document.getElementById('cBox').style.display = 'none';
            btnNext.innerHTML = "Correction 👀 ►"; 
        }
        document.getElementById('hBox').style.display = 'flex'; 

        let reqW = getReqW(q);

        if (q.level === 0) {
            stage.setAttribute("viewBox", `0 0 ${reqW} 300`); 
            drawSVGFraction(q, isCorr, stage, 0, reqW);
        } else if (q.mode === 'direct' && q.den === 4) { 
            stage.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qHalf = { ...q, den: 2, num: 1, calcVal: q.totalVal / 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(qHalf, isCorr, stage, 0, reqW, alignX);
            drawSVGFraction(q, isCorr, stage, 220, reqW, alignX);
        } else if (q.mode === 'direct' && q.den === 5) { 
            stage.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qDix = { ...q, den: 10, num: 2, calcVal: (q.totalVal / 10) * 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(q, isCorr, stage, 0, reqW, alignX); 
            drawSVGFraction(qDix, isCorr, stage, 220, reqW, alignX); 
        } else {
            stage.setAttribute("viewBox", `0 0 ${reqW} 300`); 
            drawSVGFraction(q, isCorr, stage, 0, reqW);
        }
      }
      updateThumbnails();
    }

    function loadSlide(index, startPhase = 0) { currentIndex = index; quizData[currentIndex].phase = startPhase; document.getElementById('btnNext').disabled = false; updateUI(); }
    function nextAction() { const q = quizData[currentIndex]; if (q.phase === 0) q.phase = 1; else if (q.phase === 1) q.phase = 2; else if (q.phase === 2 && currentIndex < quizData.length - 1) loadSlide(currentIndex + 1, 0); updateUI(); }
    function prevSlide() { const q = quizData[currentIndex]; if (q.phase === 2) q.phase = 1; else if (q.phase === 1) q.phase = 0; else if (q.phase === 0 && currentIndex > 0) loadSlide(currentIndex - 1, 2); updateUI(); }

    function generatePrint() {
      if (quizData.length === 0) { alert("⚠️ Veuillez d'abord cliquer sur '💻 Générer le diapo' pour créer la série !"); return; }
      
      const withGabarits = document.getElementById('cbEmptyGabarits').checked;
      const container = document.getElementById('printContainer');
      container.innerHTML = ''; 

      let page1 = document.createElement('div');
      page1.className = 'print-page';
      page1.innerHTML = `
        <div class="print-header">
          <div>Nom : ........................................</div>
          <div>Prénom : ........................................</div>
          <div>Classe : ....................</div>
          <div class="print-seed">Fiche n° ${quizSeed}</div>
        </div>
        <h2 class="print-title">Exercices : Fractions et Multiples</h2>
      `;
      
      quizData.forEach((q, i) => {
        let qDiv = document.createElement('div');
        qDiv.className = 'print-q';
        qDiv.innerHTML = `<div class="print-q-text"><strong>Question ${i+1} :</strong> ${q.qHtml}</div>`;
        
        if (withGabarits) {
          let svgWrap = document.createElement('div'); svgWrap.className = "stage-wrap";
          let svg = document.createElementNS(svgNS, "svg"); 
          let reqW = getReqW(q);
          
          if (q.level === 0) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 300`);
            drawSVGFraction(q, false, svg, 0, reqW, null, true);
          } else if (q.mode === 'direct' && q.den === 4) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qHalf = { ...q, den: 2, num: 1, calcVal: q.totalVal / 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(qHalf, false, svg, 0, reqW, alignX, true); 
            drawSVGFraction(q, false, svg, 220, reqW, alignX, true);
          } else if (q.mode === 'direct' && q.den === 5) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qDix = { ...q, den: 10, num: 2, calcVal: (q.totalVal / 10) * 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(q, false, svg, 0, reqW, alignX, true); 
            drawSVGFraction(qDix, false, svg, 220, reqW, alignX, true);
          } else {
            svg.setAttribute("viewBox", `0 0 ${reqW} 300`);
            drawSVGFraction(q, false, svg, 0, reqW, null, true);
          }
          
          svgWrap.appendChild(svg); qDiv.appendChild(svgWrap);
        } else {
          qDiv.innerHTML += `<div class="spacer-reponse"></div>`;
        }
        page1.appendChild(qDiv);
      });
      container.appendChild(page1);

      let page2 = document.createElement('div');
      page2.className = 'print-page';
      page2.innerHTML = `
        <div class="print-header">
          <div class="print-seed">CORRIGÉ — Fiche n° ${quizSeed}</div>
        </div>
        <h2 class="print-title">Correction Détaillée</h2>`;
      
      quizData.forEach((q, i) => {
        let qDiv = document.createElement('div');
        qDiv.className = 'print-q';
        qDiv.innerHTML = `
          <div class="print-q-text"><strong>Question ${i+1} :</strong> ${q.qHtml}</div>
          <div class="print-c-text">✅ ${q.cHtml}</div>
        `;
        
        let svgWrap = document.createElement('div'); svgWrap.className = "stage-wrap";
        let svg = document.createElementNS(svgNS, "svg"); 
        let reqW = getReqW(q);
        
        if (q.level === 0) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 300`);
            drawSVGFraction(q, true, svg, 0, reqW);
        } else if (q.mode === 'direct' && q.den === 4) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qHalf = { ...q, den: 2, num: 1, calcVal: q.totalVal / 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(qHalf, true, svg, 0, reqW, alignX); drawSVGFraction(q, true, svg, 220, reqW, alignX);
        } else if (q.mode === 'direct' && q.den === 5) {
            svg.setAttribute("viewBox", `0 0 ${reqW} 520`);
            let qDix = { ...q, den: 10, num: 2, calcVal: (q.totalVal / 10) * 2 };
            let alignX = (reqW - (600 / q.den) * Math.max(q.den, q.num)) / 2;
            drawSVGFraction(q, true, svg, 0, reqW, alignX); drawSVGFraction(qDix, true, svg, 220, reqW, alignX);
        } else {
            svg.setAttribute("viewBox", `0 0 ${reqW} 300`);
            drawSVGFraction(q, true, svg, 0, reqW);
        }
        
        svgWrap.appendChild(svg); qDiv.appendChild(svgWrap);
        
        page2.appendChild(qDiv);
      });
      container.appendChild(page2);

      setTimeout(() => { window.print(); }, 300);
    }
  </script>
