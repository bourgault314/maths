<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fraction d’une fraction — lignes et grille V8</title>
  <style>
    :root {
      --bg: #fbfaee;
      --ink: #111;
      --grid: #7b7b7b;
      --blue: #75c4ee;
      --blue-soft: rgba(117, 196, 238, 0.25);
      --blue-mid: rgba(117, 196, 238, 0.45);
      --blue-strong: rgba(117, 196, 238, 0.90);
      --cell: #dddddd;
      --white: #fff;
      --focus: #0b79d0;
      --active-red: #e53935;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    .app {
      width: 100vw;
      height: 100vh;
      padding: clamp(10px, 1.5vw, 20px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board {
      width: min(96vw, 1180px);
      height: min(94vh, 780px);
      display: grid;
      grid-template-columns: clamp(92px, 12vw, 138px) minmax(0, 1fr);
      grid-template-rows: clamp(86px, 13vh, 112px) minmax(0, 1fr);
      gap: clamp(14px, 2.4vw, 30px);
      align-items: stretch;
      justify-items: stretch;
    }

    .equation-zone {
      grid-column: 1;
      grid-row: 1;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      min-width: 0;
      min-height: 0;
      padding-top: 0;
      padding-left: 0;
    }

    .equation-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.72);
      border: 2px solid rgba(0, 0, 0, 0.08);
      font-size: clamp(17px, 1.65vw, 23px);
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
    }

    .equation-line {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
    }


    .equation-card .mini-fraction {
      min-width: 26px;
      font-weight: 700;
    }

    .equation-card .mini-fraction .bar {
      height: 2px;
      margin: 2px 0;
    }

    .equation-symbol {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .question-mark {
      font-size: 1.15em;
      line-height: 1;
      min-width: 18px;
      text-align: center;
    }


    .top-control {
      grid-column: 2;
      grid-row: 1;
      display: grid;
      grid-template-rows: auto 1fr;
      align-items: end;
      justify-items: stretch;
      gap: 8px;
      padding: 0 2px;
    }

    .top-fraction-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
    }

    .left-control {
      grid-column: 1;
      grid-row: 2;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: stretch;
      justify-items: end;
      gap: 12px;
      padding: 2px 0;
    }

    .left-fraction-zone {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 66px;
    }

    .grid-zone {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
      min-height: 0;
      display: flex;
    }

    .fraction-input {
      display: inline-grid;
      grid-template-rows: 35px 3px 35px;
      align-items: center;
      justify-items: center;
      width: 58px;
      user-select: none;
    }

    .fraction-input input {
      width: 48px;
      height: 32px;
      padding: 0;
      margin: 0;
      border: 2px solid #b7b7b7;
      border-radius: 11px;
      background: var(--white);
      color: var(--ink);
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      line-height: 32px;
      outline: none;
      appearance: textfield;
      -moz-appearance: textfield;
    }

    .fraction-input input::-webkit-outer-spin-button,
    .fraction-input input::-webkit-inner-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }

    .fraction-input input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(11, 121, 208, 0.16);
    }

    .fraction-bar {
      width: 52px;
      height: 3px;
      background: var(--ink);
      border-radius: 999px;
    }

    .axis-wrap {
      position: relative;
      min-width: 0;
      min-height: 0;
    }

    .axis-horizontal {
      height: 42px;
      width: 100%;
    }

    .axis-vertical {
      width: 42px;
      height: 100%;
    }

    .axis-line {
      position: absolute;
      background: var(--ink);
      border-radius: 999px;
    }

    .axis-horizontal .axis-line {
      left: 0;
      right: 0;
      top: 50%;
      height: 5px;
      transform: translateY(-50%);
    }

    .axis-vertical .axis-line {
      top: 0;
      bottom: 0;
      left: 50%;
      width: 5px;
      transform: translateX(-50%);
    }

    .selection-line {
      position: absolute;
      background: var(--blue-strong);
      border-radius: 999px;
      z-index: 2;
      pointer-events: none;
    }

    .axis-wrap {
      touch-action: none;
      cursor: pointer;
    }

    .drag-handle {
      position: absolute;
      z-index: 4;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--blue-strong);
      border: 3px solid var(--white);
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.25);
      pointer-events: none;
    }

    .axis-horizontal .drag-handle {
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .axis-vertical .drag-handle {
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .denom-handle {
      position: absolute;
      z-index: 5;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: grab;
      touch-action: none;
      border-radius: 50%;
      background: transparent;
      transform-origin: center;
    }

    .denom-handle::before {
      content: "";
      width: 0;
      height: 0;
      filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.28));
      transition: transform 90ms ease, filter 90ms ease;
    }

    .denom-handle.active {
      cursor: grabbing;
      background: rgba(229, 57, 53, 0.10);
    }

    .denom-handle.active::before {
      transform: scale(1.22);
      filter: drop-shadow(0 3px 3px rgba(0, 0, 0, 0.35));
    }

    .axis-horizontal .denom-handle {
      top: calc(50% + 21px);
      transform: translate(-50%, -50%);
    }

    .axis-horizontal .denom-handle::before {
      border-left: 9px solid transparent;
      border-right: 9px solid transparent;
      border-bottom: 15px solid var(--ink);
    }

    .axis-horizontal .denom-handle.active::before {
      border-bottom-color: var(--active-red);
    }

    .axis-vertical .denom-handle {
      left: calc(50% + 21px);
      transform: translate(-50%, -50%);
    }

    .axis-vertical .denom-handle::before {
      border-top: 9px solid transparent;
      border-bottom: 9px solid transparent;
      border-right: 15px solid var(--ink);
    }

    .axis-vertical .denom-handle.active::before {
      border-right-color: var(--active-red);
    }

    .drag-handle.active {
      background: var(--active-red);
      transform: translate(-50%, -50%) scale(1.12);
    }

    .axis-horizontal .selection-line {
      left: 0;
      top: 50%;
      height: 11px;
      transform: translateY(-50%);
    }

    .axis-vertical .selection-line {
      top: 0;
      left: 50%;
      width: 11px;
      transform: translateX(-50%);
    }

    .tick {
      position: absolute;
      background: var(--ink);
      z-index: 3;
      border-radius: 999px;
    }

    .axis-horizontal .tick {
      width: 3px;
      height: 28px;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .axis-vertical .tick {
      height: 3px;
      width: 28px;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .main-grid {
      width: 100%;
      height: 100%;
      border: 5px solid var(--ink);
      display: grid;
      background: var(--cell);
      user-select: none;
      min-width: 0;
      min-height: 0;
    }

    .grid-cell {
      border-right: 1px solid var(--grid);
      border-bottom: 1px solid var(--grid);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      font-size: clamp(13px, 2.3vw, 29px);
    }

    .grid-cell::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 0;
    }

    .grid-cell.column-selected::before { background: var(--blue-soft); }
    .grid-cell.row-selected::before { background: var(--blue-soft); }
    .grid-cell.column-selected.row-selected::before { background: var(--blue-strong); }

    .grid-cell.last-col { border-right: 0; }
    .grid-cell.last-row { border-bottom: 0; }

    .cell-label {
      position: relative;
      z-index: 1;
    }

    .mini-fraction {
      display: inline-grid;
      grid-template-rows: auto 2px auto;
      align-items: center;
      justify-items: center;
      line-height: 0.9;
      min-width: 32px;
      font-weight: 500;
    }

    .mini-fraction .bar {
      width: 100%;
      height: 2px;
      background: currentColor;
      margin: 3px 0;
    }

    .toolbar {
      position: fixed;
      right: 14px;
      bottom: 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
      flex-wrap: wrap;
      max-width: min(720px, calc(100vw - 28px));
      z-index: 20;
    }

    .tool-btn {
      border: 0;
      border-radius: 999px;
      padding: 8px 13px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: rgba(31, 146, 208, 0.95);
      color: white;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
      white-space: nowrap;
    }

    .tool-btn.secondary {
      background: rgba(30, 30, 30, 0.82);
    }

    .tool-btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 rgba(0, 0, 0, 0.18);
    }

    .tool-btn:disabled {
      transform: none;
      box-shadow: none;
    }

    .tool-btn:focus-visible {
      outline: 3px solid rgba(11, 121, 208, 0.35);
      outline-offset: 3px;
    }

    .equation-zone.hidden-calc .equation-card {
      opacity: 1;
      pointer-events: auto;
    }

    @media (max-width: 760px), (max-height: 560px) {
      .app { padding: 8px; }
      .board {
        width: 98vw;
        height: 96vh;
        grid-template-columns: 82px minmax(0, 1fr);
        grid-template-rows: 78px minmax(0, 1fr);
        gap: 10px 14px;
      }
      .left-fraction-zone { width: 48px; }
      .fraction-input {
        width: 46px;
        grid-template-rows: 27px 2px 27px;
      }
      .fraction-input input {
        width: 38px;
        height: 25px;
        border-radius: 8px;
        font-size: 17px;
        line-height: 25px;
      }
      .fraction-bar { width: 40px; height: 2px; }
      .axis-horizontal { height: 34px; }
      .axis-vertical { width: 34px; }
      .grid-cell { font-size: clamp(10px, 2.1vw, 22px); }
      .drag-handle { width: 20px; height: 20px; border-width: 2px; }
      .denom-handle { width: 32px; height: 32px; }
      .axis-horizontal .denom-handle { top: calc(50% + 18px); }
      .axis-horizontal .denom-handle::before {
        border-left-width: 8px;
        border-right-width: 8px;
        border-bottom-width: 13px;
      }
      .axis-vertical .denom-handle { left: calc(50% + 18px); }
      .axis-vertical .denom-handle::before {
        border-top-width: 8px;
        border-bottom-width: 8px;
        border-right-width: 13px;
      }
      .equation-card {
        gap: 3px;
        padding: 6px 8px;
        border-radius: 12px;
        font-size: 15px;
      }
      .equation-line { gap: 5px; }
      .equation-card .mini-fraction { min-width: 22px; }
      .toolbar {
        right: 8px;
        bottom: 8px;
        gap: 6px;
      }
      .tool-btn {
        padding: 7px 9px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="board" aria-label="Modèle visuel de multiplication de fractions">
      <div id="equationZone" class="equation-zone" aria-label="Produit des fractions"></div>

      <div class="top-control">
        <div class="top-fraction-zone">
          <div class="fraction-input" aria-label="Fraction du haut">
            <input id="topNum" type="text" inputmode="numeric" value="1" aria-label="Numérateur de la fraction du haut" />
            <div class="fraction-bar"></div>
            <input id="topDen" type="text" inputmode="numeric" value="1" aria-label="Dénominateur de la fraction du haut" />
          </div>
        </div>
        <div id="topAxis" class="axis-wrap axis-horizontal" aria-label="Segment horizontal gradué"></div>
      </div>

      <div class="left-control">
        <div class="left-fraction-zone">
          <div class="fraction-input" aria-label="Fraction de gauche">
            <input id="leftNum" type="text" inputmode="numeric" value="1" aria-label="Numérateur de la fraction de gauche" />
            <div class="fraction-bar"></div>
            <input id="leftDen" type="text" inputmode="numeric" value="1" aria-label="Dénominateur de la fraction de gauche" />
          </div>
        </div>
        <div id="leftAxis" class="axis-wrap axis-vertical" aria-label="Segment vertical gradué"></div>
      </div>

      <div class="grid-zone">
        <div id="mainGrid" class="main-grid" aria-label="Grille centrale"></div>
      </div>
    </section>

    <div class="toolbar" aria-label="Commandes">
      <button class="tool-btn secondary" id="calcToggleBtn" type="button">Afficher le résultat</button>
      <button class="tool-btn" id="newBtn" type="button">Nouvelle situation</button>
      <button class="tool-btn" id="resetBtn" type="button">Réinitialiser</button>
      <button class="tool-btn secondary" id="fullscreenBtn" type="button">Plein écran</button>
    </div>
  </main>

  <script>
    const MIN_DEN = 1;
    const MAX_DEN = 12;

    const state = {
      topNum: 1,
      topDen: 1,
      leftNum: 1,
      leftDen: 1,
      showResult: false
    };

    const interaction = {
      active: null
    };

    const els = {
      topNum: document.getElementById('topNum'),
      topDen: document.getElementById('topDen'),
      leftNum: document.getElementById('leftNum'),
      leftDen: document.getElementById('leftDen'),
      equationZone: document.getElementById('equationZone'),
      topAxis: document.getElementById('topAxis'),
      leftAxis: document.getElementById('leftAxis'),
      mainGrid: document.getElementById('mainGrid'),
      calcToggleBtn: document.getElementById('calcToggleBtn'),
      newBtn: document.getElementById('newBtn'),
      resetBtn: document.getElementById('resetBtn'),
      fullscreenBtn: document.getElementById('fullscreenBtn')
    };

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function gcd(a, b) {
      a = Math.abs(a);
      b = Math.abs(b);
      while (b !== 0) {
        const r = a % b;
        a = b;
        b = r;
      }
      return a || 1;
    }

    function normalizeFraction(obj, prefix) {
      obj[`${prefix}Den`] = clamp(Math.abs(Math.round(obj[`${prefix}Den`] || MIN_DEN)), MIN_DEN, MAX_DEN);
      obj[`${prefix}Num`] = clamp(Math.round(obj[`${prefix}Num`] || 0), 0, obj[`${prefix}Den`]);
    }

    function normalizeState() {
      normalizeFraction(state, 'top');
      normalizeFraction(state, 'left');
    }

    function syncInputs(options = {}) {
      const preserveActive = options.preserveActive === true;
      const active = document.activeElement;

      if (!preserveActive || active !== els.topNum) els.topNum.value = state.topNum;
      if (!preserveActive || active !== els.topDen) els.topDen.value = state.topDen;
      if (!preserveActive || active !== els.leftNum) els.leftNum.value = state.leftNum;
      if (!preserveActive || active !== els.leftDen) els.leftDen.value = state.leftDen;
    }

    function denominatorPositionPercent(den) {
      // Le triangle représente la première graduation après 0.
      return (1 / den) * 100;
    }

    function denominatorFromRatio(ratio) {
      const safeRatio = clamp(ratio, 0, 1);
      let bestDen = MIN_DEN;
      let bestDistance = Number.POSITIVE_INFINITY;

      for (let den = MIN_DEN; den <= MAX_DEN; den++) {
        const target = 1 / den;
        const distance = Math.abs(safeRatio - target);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestDen = den;
        }
      }
      return bestDen;
    }

    function makeMiniFraction(num, den) {
      const fraction = document.createElement('span');
      fraction.className = 'mini-fraction';

      const top = document.createElement('span');
      top.textContent = num;

      const bar = document.createElement('span');
      bar.className = 'bar';

      const bottom = document.createElement('span');
      bottom.textContent = den;

      fraction.append(top, bar, bottom);
      return fraction;
    }


    function renderHorizontalAxis() {
      els.topAxis.innerHTML = '';

      const base = document.createElement('div');
      base.className = 'axis-line';
      els.topAxis.appendChild(base);

      const selection = document.createElement('div');
      selection.className = 'selection-line';
      selection.style.width = `${(state.topNum / state.topDen) * 100}%`;
      els.topAxis.appendChild(selection);

      for (let i = 0; i <= state.topDen; i++) {
        const tick = document.createElement('div');
        tick.className = 'tick';
        tick.style.left = `${(i / state.topDen) * 100}%`;
        els.topAxis.appendChild(tick);
      }

      const handle = document.createElement('div');
      handle.className = `drag-handle${interaction.active === 'topNum' ? ' active' : ''}`;
      handle.style.left = `${(state.topNum / state.topDen) * 100}%`;
      els.topAxis.appendChild(handle);

      const denomHandle = document.createElement('div');
      denomHandle.className = `denom-handle${interaction.active === 'topDen' ? ' active' : ''}`;
      denomHandle.title = 'Faire glisser pour changer le partage';
      denomHandle.setAttribute('aria-hidden', 'true');
      denomHandle.style.left = `${denominatorPositionPercent(state.topDen)}%`;
      els.topAxis.appendChild(denomHandle);
    }

    function renderVerticalAxis() {
      els.leftAxis.innerHTML = '';

      const base = document.createElement('div');
      base.className = 'axis-line';
      els.leftAxis.appendChild(base);

      const selection = document.createElement('div');
      selection.className = 'selection-line';
      selection.style.height = `${(state.leftNum / state.leftDen) * 100}%`;
      els.leftAxis.appendChild(selection);

      for (let i = 0; i <= state.leftDen; i++) {
        const tick = document.createElement('div');
        tick.className = 'tick';
        tick.style.top = `${(i / state.leftDen) * 100}%`;
        els.leftAxis.appendChild(tick);
      }

      const handle = document.createElement('div');
      handle.className = `drag-handle${interaction.active === 'leftNum' ? ' active' : ''}`;
      handle.style.top = `${(state.leftNum / state.leftDen) * 100}%`;
      els.leftAxis.appendChild(handle);

      const denomHandle = document.createElement('div');
      denomHandle.className = `denom-handle${interaction.active === 'leftDen' ? ' active' : ''}`;
      denomHandle.title = 'Faire glisser pour changer le partage';
      denomHandle.setAttribute('aria-hidden', 'true');
      denomHandle.style.top = `${denominatorPositionPercent(state.leftDen)}%`;
      els.leftAxis.appendChild(denomHandle);
    }

    function appendProduct(card, leftNum, leftDen, topNum, topDen) {
      const productNum = leftNum * topNum;
      const productDen = leftDen * topDen;
      const divisor = gcd(productNum, productDen);
      const simplifiedNum = productNum / divisor;
      const simplifiedDen = productDen / divisor;

      card.appendChild(makeMiniFraction(productNum, productDen));

      if (divisor > 1) {
        const equalsSimple = document.createElement('span');
        equalsSimple.className = 'equation-symbol';
        equalsSimple.textContent = '=';
        card.appendChild(equalsSimple);
        card.appendChild(makeMiniFraction(simplifiedNum, simplifiedDen));
      }
    }

    function renderEquation() {
      els.equationZone.innerHTML = '';
      els.calcToggleBtn.textContent = state.showResult ? 'Masquer le résultat' : 'Afficher le résultat';
      els.calcToggleBtn.disabled = false;
      els.calcToggleBtn.style.opacity = '1';
      els.calcToggleBtn.style.cursor = 'pointer';

      const card = document.createElement('div');
      card.className = 'equation-card';

      const line = document.createElement('div');
      line.className = 'equation-line';

      line.appendChild(makeMiniFraction(state.leftNum, state.leftDen));

      const times = document.createElement('span');
      times.className = 'equation-symbol';
      times.textContent = '×';
      line.appendChild(times);

      line.appendChild(makeMiniFraction(state.topNum, state.topDen));

      const equals = document.createElement('span');
      equals.className = 'equation-symbol';
      equals.textContent = '=';
      line.appendChild(equals);

      if (state.showResult) {
        appendProduct(line, state.leftNum, state.leftDen, state.topNum, state.topDen);
      } else {
        const question = document.createElement('span');
        question.className = 'question-mark';
        question.textContent = '?';
        line.appendChild(question);
      }

      card.appendChild(line);
      els.equationZone.appendChild(card);
    }

    function renderGrid() {
      els.mainGrid.innerHTML = '';
      els.mainGrid.style.gridTemplateColumns = `repeat(${state.topDen}, 1fr)`;
      els.mainGrid.style.gridTemplateRows = `repeat(${state.leftDen}, 1fr)`;

      const cellDen = state.topDen * state.leftDen;

      for (let row = 0; row < state.leftDen; row++) {
        for (let col = 0; col < state.topDen; col++) {
          const cell = document.createElement('div');
          cell.className = 'grid-cell';

          if (col < state.topNum) cell.classList.add('column-selected');
          if (row < state.leftNum) cell.classList.add('row-selected');
          if (col === state.topDen - 1) cell.classList.add('last-col');
          if (row === state.leftDen - 1) cell.classList.add('last-row');

          const label = document.createElement('span');
          label.className = 'cell-label';
          label.appendChild(makeMiniFraction(1, cellDen));
          cell.appendChild(label);

          els.mainGrid.appendChild(cell);
        }
      }
    }

    function render(options = {}) {
      normalizeState();
      syncInputs({ preserveActive: options.preserveActive === true });
      renderEquation();
      renderHorizontalAxis();
      renderVerticalAxis();
      renderGrid();
    }

    function getInputNumber(input) {
      const cleaned = String(input.value).replace(/[^0-9]/g, '');
      if (input.value !== cleaned) input.value = cleaned;
      if (cleaned === '') return null;
      const n = Number.parseInt(cleaned, 10);
      return Number.isFinite(n) ? n : null;
    }

    function commitInputs(options = {}) {
      const topNum = getInputNumber(els.topNum);
      const topDen = getInputNumber(els.topDen);
      const leftNum = getInputNumber(els.leftNum);
      const leftDen = getInputNumber(els.leftDen);

      if (topNum !== null) state.topNum = topNum;
      if (topDen !== null) state.topDen = topDen;
      if (leftNum !== null) state.leftNum = leftNum;
      if (leftDen !== null) state.leftDen = leftDen;

      render({ preserveActive: options.preserveActive === true });
    }

    let inputTimer = null;

    function handleInput() {
      clearTimeout(inputTimer);
      inputTimer = setTimeout(() => {
        commitInputs({ preserveActive: true });
      }, 180);
    }

    function handleBlur() {
      clearTimeout(inputTimer);
      commitInputs({ preserveActive: false });
    }

    [els.topNum, els.topDen, els.leftNum, els.leftDen].forEach(input => {
      input.addEventListener('input', handleInput);
      input.addEventListener('change', handleBlur);
      input.addEventListener('blur', handleBlur);
      input.addEventListener('keydown', event => {
        if (event.key === 'Enter') input.blur();
      });
    });

    function updateTopNumFromPointer(event) {
      const rect = els.topAxis.getBoundingClientRect();
      const ratio = clamp((event.clientX - rect.left) / rect.width, 0, 1);
      state.topNum = clamp(Math.round(ratio * state.topDen), 0, state.topDen);
      render();
    }

    function updateLeftNumFromPointer(event) {
      const rect = els.leftAxis.getBoundingClientRect();
      const ratio = clamp((event.clientY - rect.top) / rect.height, 0, 1);
      state.leftNum = clamp(Math.round(ratio * state.leftDen), 0, state.leftDen);
      render();
    }

    function updateTopDenFromPointer(event) {
      const rect = els.topAxis.getBoundingClientRect();
      const ratio = clamp((event.clientX - rect.left) / rect.width, 0, 1);
      state.topDen = denominatorFromRatio(ratio);
      if (state.topNum > state.topDen) state.topNum = state.topDen;
      render();
    }

    function updateLeftDenFromPointer(event) {
      const rect = els.leftAxis.getBoundingClientRect();
      const ratio = clamp((event.clientY - rect.top) / rect.height, 0, 1);
      state.leftDen = denominatorFromRatio(ratio);
      if (state.leftNum > state.leftDen) state.leftNum = state.leftDen;
      render();
    }

    function safeReleasePointerCapture(axis, pointerId) {
      try {
        if (axis.hasPointerCapture(pointerId)) axis.releasePointerCapture(pointerId);
      } catch (error) {
        // Certains navigateurs peuvent déjà avoir libéré la capture.
      }
    }

    function startNumeratorDrag(axis, updater, activeName) {
      return function(event) {
        if (event.button !== undefined && event.button !== 0) return;
        if (event.target.closest('.denom-handle')) return;
        event.preventDefault();
        interaction.active = activeName;
        axis.setPointerCapture(event.pointerId);
        updater(event);

        function move(moveEvent) { updater(moveEvent); }
        function end(endEvent) {
          safeReleasePointerCapture(axis, endEvent.pointerId);
          interaction.active = null;
          render();
          axis.removeEventListener('pointermove', move);
          axis.removeEventListener('pointerup', end);
          axis.removeEventListener('pointercancel', end);
        }

        axis.addEventListener('pointermove', move);
        axis.addEventListener('pointerup', end);
        axis.addEventListener('pointercancel', end);
      };
    }

    function startDenominatorDrag(axis, updater, activeName) {
      return function(event) {
        if (event.button !== undefined && event.button !== 0) return;
        if (!event.target.closest('.denom-handle')) return;
        event.preventDefault();
        event.stopPropagation();
        interaction.active = activeName;
        axis.setPointerCapture(event.pointerId);
        updater(event);

        function move(moveEvent) { updater(moveEvent); }
        function end(endEvent) {
          safeReleasePointerCapture(axis, endEvent.pointerId);
          interaction.active = null;
          render();
          axis.removeEventListener('pointermove', move);
          axis.removeEventListener('pointerup', end);
          axis.removeEventListener('pointercancel', end);
        }

        axis.addEventListener('pointermove', move);
        axis.addEventListener('pointerup', end);
        axis.addEventListener('pointercancel', end);
      };
    }

    els.topAxis.addEventListener('pointerdown', startDenominatorDrag(els.topAxis, updateTopDenFromPointer, 'topDen'));
    els.leftAxis.addEventListener('pointerdown', startDenominatorDrag(els.leftAxis, updateLeftDenFromPointer, 'leftDen'));
    els.topAxis.addEventListener('pointerdown', startNumeratorDrag(els.topAxis, updateTopNumFromPointer, 'topNum'));
    els.leftAxis.addEventListener('pointerdown', startNumeratorDrag(els.leftAxis, updateLeftNumFromPointer, 'leftNum'));

    function randomInteger(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function makeRandomFraction() {
      const den = randomInteger(2, 8);
      const num = randomInteger(1, den - 1);
      return { num, den };
    }

    function setToUnitFractions() {
      state.topNum = 1;
      state.topDen = 1;
      state.leftNum = 1;
      state.leftDen = 1;
      state.showResult = false;
      interaction.active = null;
      render();
    }


    function newRandomSituation() {
      const top = makeRandomFraction();
      const left = makeRandomFraction();

      state.topNum = top.num;
      state.topDen = top.den;
      state.leftNum = left.num;
      state.leftDen = left.den;
      state.showResult = false;
      interaction.active = null;
      render();
    }

    els.calcToggleBtn.addEventListener('click', () => {
      state.showResult = !state.showResult;
      render();
    });

    els.newBtn.addEventListener('click', newRandomSituation);
    els.resetBtn.addEventListener('click', setToUnitFractions);

    function updateFullscreenButton() {
      els.fullscreenBtn.textContent = document.fullscreenElement ? 'Quitter plein écran' : 'Plein écran';
    }

    els.fullscreenBtn.addEventListener('click', async () => {
      try {
        if (!document.fullscreenElement) {
          await document.documentElement.requestFullscreen();
        } else {
          await document.exitFullscreen();
        }
      } catch (error) {
        // Le plein écran peut être refusé selon le navigateur ou le contexte d'ouverture du fichier.
      }
      updateFullscreenButton();
    });

    document.addEventListener('fullscreenchange', updateFullscreenButton);

    render();
    updateFullscreenButton();
  </script>
</body>
</html>
