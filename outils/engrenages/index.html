<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratoire d'Engrenages</title>
  <style>
    :root {
      --bg: #eef4ff;
      --text: #1f2a44;
      --muted: #5a6784;
      --accent: #3f7cff;
      --card-bg: rgba(255, 255, 255, 0.95);
      --shadow: 0 15px 35px rgba(31, 42, 68, 0.08);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden; 
      position: relative;
    }

    /* --- ENGRENAGES DÉCORATIFS DE FOND --- */
    body::before, body::after {
      content: "⚙";
      position: absolute;
      opacity: 0.06;
      font-size: 25rem;
      color: var(--accent);
      z-index: 0;
      pointer-events: none;
      animation: tourner 60s linear infinite;
    }

    body::before {
      top: -100px;
      left: -100px;
    }

    body::after {
      bottom: -150px;
      right: -100px;
      animation-duration: 45s;
      animation-direction: reverse;
    }

    @keyframes tourner {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* --- BOUTON MAISON CENTRÉ EN HAUT --- */
    .home-btn {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%); /* Centrage horizontal parfait */
      width: 60px;
      height: 60px;
      background: white;
      border: 1px solid #dbe4f3;
      border-radius: 20px;
      display: grid;
      place-items: center;
      text-decoration: none;
      font-size: 1.8rem;
      box-shadow: 0 10px 25px rgba(31, 42, 68, 0.1);
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 20;
    }
    .home-btn:hover {
      transform: translateX(-50%) scale(1.1);
      border-color: var(--accent);
      box-shadow: 0 15px 30px rgba(63, 124, 255, 0.2);
    }

    .container {
      max-width: 850px;
      width: 100%;
      padding: 40px 20px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    header { margin-bottom: 60px; margin-top: 40px; }

    h1 {
      font-size: 3rem;
      margin: 0;
      color: var(--text);
      font-weight: 800;
      letter-spacing: -1.5px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 35px;
      width: 100%;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid #dbe4f3;
      border-radius: var(--radius);
      padding: 50px 30px;
      text-decoration: none;
      color: inherit;
      transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(10px);
    }

    .card:hover {
      transform: translateY(-12px);
      border-color: var(--accent);
      box-shadow: 0 25px 50px rgba(63, 124, 255, 0.18);
    }

    .icon-box {
      width: 90px;
      height: 90px;
      background: #f0f5ff;
      border-radius: 24px;
      display: grid;
      place-items: center;
      font-size: 2.8rem;
      margin-bottom: 30px;
      transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .card:hover .icon-box {
      transform: rotate(15deg) scale(1.1);
      background: var(--accent);
      color: white;
    }
    
    .card:hover .icon-box span {
      transform: rotate(-15deg);
      display: block;
    }

    h2 { margin: 0 0 15px 0; font-size: 1.7rem; }
    p { color: var(--muted); line-height: 1.6; margin: 0 0 35px 0; font-size: 1.05rem; }

    .btn {
      padding: 15px 35px;
      background: #f0f5ff;
      color: var(--accent);
      border-radius: 16px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .card:hover .btn {
      background: var(--accent);
      color: white;
    }

    @media (max-width: 600px) {
      h1 { font-size: 2.2rem; }
      .home-btn { top: 15px; width: 50px; height: 50px; font-size: 1.5rem; }
      body::before, body::after { font-size: 15rem; }
      header { margin-top: 60px; }
    }
  </style>
</head>
<body>

  <a href="#" class="home-btn" title="Retour au menu principal">🏠</a>

  <div class="container">
    <header>
      <h1>Laboratoire d'Engrenages</h1>
    </header>

    <nav class="grid">
      <a href="engrenages_plateau.html" class="card">
        <div class="icon-box"><span>⚙️</span></div>
        <h2>Le Plateau</h2>
        <p>Espace de manipulation libre. Construisez vos systèmes et observez les mouvements.</p>
        <div class="btn">Ouvrir le plateau</div>
      </a>

      <a href="engrenages_exerciseur.html" class="card">
        <div class="icon-box"><span>📝</span></div>
        <h2>L'Exerciseur</h2>
        <p>Série de défis et d'exercices pour s'entraîner aux calculs de rapports de transmission.</p>
        <div class="btn">Lancer les exercices</div>
      </a>
    </nav>
  </div>

</body>
</html>
