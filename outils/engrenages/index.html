<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laboratoire d'Engrenages</title>
  <style>
    :root {
      --bg: #e2eaf5;
      --text: #1f2a44;
      --muted: #5a6784;
      --accent: #3f7cff;
      --steel: #b0c4de;
      --card-bg: rgba(255, 255, 255, 0.95);
      --radius: 24px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* --- MÉCANISME DE FOND --- */
    .bg-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 0;
      pointer-events: none;
      color: var(--accent);
      opacity: 0.07;
      font-size: 30rem;
    }

    .gear-deco {
      position: absolute;
      display: inline-block;
      animation: rotate linear infinite;
      line-height: 1;
    }

    /* Engrenage 1 (Haut Gauche - Le Géant) */
    .g1 {
      top: -10%; left: -5%;
      animation-duration: 60s;
    }

    /* Engrenage 2 (Le Petit - Maintenant déplacé pour être visible) */
    .g2 {
      top: 40%; 
      left: 8%;          /* Centré horizontalement pour être vu sous la maison */
      font-size: 14rem;   /* Taille réduite pour le contraste */
      animation-duration: 25s;
      animation-direction: reverse;
    }

    /* Engrenage 3 (Bas Droite) */
    .g3 {
      bottom: -10%; right: -5%;
      font-size: 25rem;
      animation-duration: 45s;
    }

    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* --- INTERFACE --- */
    .home-btn {
      position: absolute;
      top: 30px; left: 50%; transform: translateX(-50%);
      width: 60px; height: 60px;
      background: white; border: 1px solid #dbe4f3; border-radius: 20px;
      display: grid; place-items: center;
      text-decoration: none; font-size: 1.8rem;
      box-shadow: 0 10px 25px rgba(31, 42, 68, 0.1);
      z-index: 20; transition: 0.3s;
    }
    .home-btn:hover { transform: translateX(-50%) scale(1.1); border-color: var(--accent); }

    .container {
      max-width: 850px; width: 100%;
      padding: 40px 20px; text-align: center;
      position: relative; z-index: 1;
    }

    header { margin-bottom: 60px; }
    h1 { font-size: 3.2rem; margin: 0; font-weight: 900; letter-spacing: -2px; }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 35px; }

    .card {
      background: var(--card-bg);
      border: 1px solid #dbe4f3; border-radius: var(--radius);
      padding: 50px 30px; text-decoration: none; color: inherit;
      box-shadow: 0 15px 35px rgba(31, 42, 68, 0.08);
      display: flex; flex-direction: column; align-items: center;
      backdrop-filter: blur(10px); transition: 0.4s;
    }
    .card:hover { transform: translateY(-12px); border-color: var(--accent); background: white; }

    .icon-box {
      width: 90px; height: 90px; background: #f0f5ff; border-radius: 24px;
      display: grid; place-items: center; font-size: 2.8rem; margin-bottom: 30px;
      transition: 0.5s;
    }
    .card:hover .icon-box { transform: rotate(15deg) scale(1.1); background: var(--accent); color: white; }

    h2 { margin: 0 0 15px; font-size: 1.7rem; }
    p { color: var(--muted); line-height: 1.6; margin: 0 0 35px; font-size: 1.05rem; }
    
    .btn { padding: 15px 35px; background: #f0f5ff; color: var(--accent); border-radius: 16px; font-weight: 700; transition: 0.3s; }
    .card:hover .btn { background: var(--accent); color: white; }
  </style>
</head>
<body>

  <div class="bg-layer">
    <div class="gear-deco g1">⚙</div>
    <div class="gear-deco g2">⚙</div>
    <div class="gear-deco g3">⚙</div>
  </div>

  <a href="../" class="home-btn" title="Retour">🏠</a>

  <div class="container">
    <header>
      <h1>Laboratoire d'Engrenages</h1>
    </header>

    <nav class="grid">
      <a href="engrenages_plateau.html" class="card">
        <div class="icon-box"><span>⚙️</span></div>
        <h2>Le Plateau</h2>
        <p>Espace de manipulation libre. Construisez vos systèmes et observez les mouvements.</p>
        <div class="btn">Explorer</div>
      </a>

      <a href="engrenages_exerciseur.html" class="card">
        <div class="icon-box"><span>📝</span></div>
        <h2>L'Exerciseur</h2>
        <p>Série de défis et d'exercices pour s'entraîner aux rapports de transmission.</p>
        <div class="btn">S'entraîner</div>
      </a>
    </nav>
  </div>

</body>
</html>
