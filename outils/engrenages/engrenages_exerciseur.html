<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur d'Exercices — Engrenages</title>
  <style>
    :root{
      --bg:#f4f7fc;
      --panel:#ffffff;
      --panel-border:#dbe4f3;
      --text:#1f2a44;
      --muted:#5a6784;
      --accent:#3f7cff;
      --success:#10b981;
      --gearA:#79a6ff;
      --gearB:#f5b35f;
      --gearC:#8ce071;
      --marker:#ff4d6d;
      --shadow:0 10px 30px rgba(31,42,68,0.08);
    }

    *{box-sizing:border-box}
    body{
      margin:0; font-family:Arial, Helvetica, sans-serif;
      color:var(--text); background:var(--bg);
      min-height:100vh; display: flex; flex-direction: column;
      align-items: center; padding: 20px;
    }

    /* --- ZONE CONFIGURATION PROF --- */
    .config-panel {
      background: var(--panel); border: 1px solid var(--panel-border);
      border-radius: 12px; padding: 16px 20px; width: 100%; max-width: 800px;
      box-shadow: var(--shadow); margin-bottom: 12px;
    }
    
    .config-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--panel-border); }
    .config-header h2 { margin: 0 0 4px 0; font-size: 1.25rem; }
    .config-header p { margin: 0; color: var(--muted); font-size: 0.9rem; }
    
    .theme-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px;
    }
    .theme-col {
      background: #fbfdff; border: 1px solid #e7edf8; border-radius: 8px; padding: 12px;
    }
    .theme-col h3 { margin: 0 0 10px 0; font-size: 1rem; color: var(--accent); border-bottom: 2px solid #eef4ff; padding-bottom: 4px;}
    
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .cb-row { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.85rem; line-height: 1.2;}
    .cb-row input { margin-top: 1px; cursor: pointer; accent-color: var(--accent); }
    .cb-desc { color: var(--muted); font-size: 0.75rem; display: block; margin-top: 1px;}
    
    .cb-sub-option { margin-left: 24px; margin-top: -2px; margin-bottom: 4px; font-size: 0.8rem; color: var(--muted); display: flex; gap: 12px; }
    .cb-sub-option label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

    .bottom-config {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
      background: #f4f7fc; padding: 12px 16px; border-radius: 8px; border: 1px solid #dbe4f3;
    }
    
    .config-left { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }

    .config-block { display: flex; align-items: center; gap: 8px; }
    .config-block label { font-weight: bold; font-size: 0.9rem; }
    .config-block select {
      padding: 6px 10px; border-radius: 6px; border: 1px solid #cfd8ea; font-size: 0.95rem; outline: none; cursor: pointer;
    }
    
    .btn-main {
      background: var(--accent); color: white; border: none; border-radius: 8px;
      padding: 10px 24px; font-size: 1rem; font-weight: bold; cursor: pointer;
      box-shadow: 0 4px 10px rgba(63, 124, 255, 0.25); transition: transform 0.1s; white-space: nowrap;
    }
    .btn-main:hover { opacity: 0.95; }
    .btn-main:active { transform: translateY(2px); }

    /* --- ZONE DIAPORAMA --- */
    .diapo-container {
      background: white; border-radius: 18px; box-shadow: var(--shadow);
      width: 100%; max-width: 1200px; display: none; flex-direction: column;
      overflow: hidden; border: 1px solid var(--panel-border);
    }
    
    .diapo-container:fullscreen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; border: none; }
    .diapo-container:-webkit-full-screen { width: 100vw; height: 100vh; max-width: none; border-radius: 0; border: none; }
    
    .diapo-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 24px; background: #f8fafc; border-bottom: 1px solid #e7edf8;
    }
    .slide-counter { font-weight: bold; color: var(--muted); font-size: 1.1rem; }
    .header-group { display: flex; gap: 10px; align-items: center; }
    
    .btn-nav {
      background: white; border: 1px solid #dbe4f3; border-radius: 8px; padding: 8px 16px;
      font-weight: bold; cursor: pointer; color: var(--text); transition: background 0.1s; min-width: 110px;
    }
    .btn-nav:hover:not(:disabled) { background: #f1f5f9; }
    .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }

    #btnPlay { min-width: 200px; text-align: center; }

    .question-box { padding: 24px 40px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: center; }
    .question-text { font-size: 1.6rem; font-weight: bold; color: #1f2a44; line-height: 1.4; margin: 0; }

    .stage-wrap {
      position: relative; flex-grow: 1; min-height: 420px;
      background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f6f9ff 48%, #edf3ff 100%);
      border-top: 1px solid #e7edf8; border-bottom: 1px solid #e7edf8;
      display: flex; justify-content: center; align-items: center;
    }
    svg { width: 100%; height: 100%; display: block; max-height: 65vh; }

    .correction-box {
      padding: 20px 40px; background: #fdfdfd; min-height: 120px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    
    .correction-text {
      font-size: 1.4rem; font-weight: bold; color: var(--success); display: none;
      text-align: center; line-height: 1.5; margin: 0;
    }
    .correction-detail { font-size: 1.05rem; color: var(--muted); font-weight: normal; margin-top: 8px; }

  </style>
</head>
<body>

  <div class="config-panel" id="configPanel">
    <div class="config-header">
      <div>
        <h2>⚙️ Générateur d'Exercices</h2>
        <p>Sélectionnez les types de questions à mélanger dans votre série.</p>
      </div>
    </div>
    
    <div class="theme-grid">
      <div class="theme-col">
        <h3>👀 Observer & Prévoir</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="obs_1" id="lvl1_obs" class="q-type"> 
            <div><strong>Niv 1 : Sens & Vitesse (2 roues)</strong><span class="cb-desc">Qui tourne le plus vite ? Dans quel sens ?</span></div>
          </label>
          <div class="cb-sub-option">
            <label><input type="checkbox" id="cbShowArrowHelp"> Aide visuelle (Flèche de sens)</label>
          </div>
          
          <label class="cb-row"><input type="checkbox" value="obs_2" class="q-type"> 
            <div><strong>Niv 2 : Sens & Vitesse (3 roues)</strong><span class="cb-desc">Analyse de sens et vitesse avec 3 roues.</span></div>
          </label>
          
          <label class="cb-row"><input type="checkbox" value="obs_3" class="q-type"> 
            <div><strong>Niv 3 : Estimation</strong><span class="cb-desc">Fera-t-il plus, moins, ou exactement 1 tour ?</span></div>
          </label>
          
          <label class="cb-row"><input type="checkbox" value="obs_4" class="q-type"> 
            <div><strong>Niv 4 : Vrai / Faux</strong><span class="cb-desc">Logique et proportionnalité.</span></div>
          </label>

          <label class="cb-row"><input type="checkbox" value="prev_1" id="lvl5_prev" class="q-type"> 
            <div><strong>Niv 5 : Nombre de tours (Entiers)</strong><span class="cb-desc">Observation du ratio de tours exacts.</span></div>
          </label>
          <div class="cb-sub-option">
            <label><input type="checkbox" id="cbPrev1Qcm"> QCM</label>
            <label><input type="checkbox" id="cbPrev1Open"> Question Ouverte</label>
          </div>

          <label class="cb-row"><input type="checkbox" value="prev_2" id="lvl6_prev" class="q-type"> 
            <div><strong>Niv 6 : Fractions & Demi-tours</strong><span class="cb-desc">Lecture visuelle (1/2, 1/4, 1.5 tour...).</span></div>
          </label>
          <div class="cb-sub-option">
            <label><input type="checkbox" id="cbPrev2Qcm"> QCM</label>
            <label><input type="checkbox" id="cbPrev2Open"> Question Ouverte</label>
          </div>
        </div>
      </div>

      <div class="theme-col">
        <h3>✍️ Calculer</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="calc_1" class="q-type"> 
            <div><strong>Niv 1 : Entiers purs</strong><span class="cb-desc">Calcul mathématique direct sans virgule.</span></div>
          </label>
          <label class="cb-row"><input type="checkbox" value="calc_2" class="q-type"> 
            <div><strong>Niv 2 : Avec demi-tours</strong><span class="cb-desc">Calculs aboutissant sur x,5.</span></div>
          </label>
          <label class="cb-row"><input type="checkbox" value="calc_3" class="q-type"> 
            <div><strong>Niv 3 : Quarts de tours</strong><span class="cb-desc">Calculs aboutissant sur 0,25 ou 0,75.</span></div>
          </label>
          <label class="cb-row"><input type="checkbox" value="calc_4" class="q-type"> 
            <div><strong>Niv 4 : Le piège (3 roues)</strong><span class="cb-desc">Comprendre que la roue du milieu ne compte pas.</span></div>
          </label>
          <label class="cb-row"><input type="checkbox" value="calc_inv" class="q-type"> 
            <div><strong>Niv 5 : Problème Inverse !</strong><span class="cb-desc">Trouver le nombre de dents d'une roue.</span></div>
          </label>
          <label class="cb-row"><input type="checkbox" value="calc_5" class="q-type"> 
            <div><strong>Niv 6 : Le PPCM</strong><span class="cb-desc">Alignement cyclique des repères.</span></div>
          </label>
        </div>
      </div>
    </div>

    <div class="bottom-config">
      <div class="config-left">
        <div class="config-block">
          <label>Série de :</label>
          <select id="selCount">
            <option value="3">3 questions</option>
            <option value="5" selected>5 questions</option>
            <option value="10">10 questions</option>
            <option value="20">20 questions</option>
          </select>
        </div>
      </div>
      <button class="btn-main" onclick="generateQuiz()">🚀 Générer la série</button>
    </div>
  </div>

  <div class="diapo-container" id="diapoContainer">
    <div class="diapo-header">
      <button class="btn-nav" id="btnPrev" onclick="prevSlide()">◄ Précédente</button>
      <div class="slide-counter" id="slideCounter">Question 1 / 5</div>
      <div class="header-group">
        <button class="btn-nav" id="btnReset" onclick="resetToZero()" style="display:none;">🔄 Remettre à zéro</button>
        <button class="btn-nav" id="btnPlay" onclick="togglePlay()" style="display:none;">▶ Lancer l'expérience</button>
        <button class="btn-nav" id="btnFs" onclick="toggleDiapoFullscreen()" title="Projeter en plein écran">⛶ Plein écran</button>
        <button class="btn-nav" id="btnNext" onclick="nextSlide()" style="background-color: var(--accent); color: white;">Animer ►</button>
      </div>
    </div>

    <div class="question-box">
      <p class="question-text" id="qText"></p>
    </div>

    <div class="stage-wrap">
      <svg id="svgStage" viewBox="0 0 1400 820">
        <defs>
          <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.14"/>
          </filter>
        </defs>
        <g id="gearAGroup"></g>
        <g id="gearCGroup"></g>
        <g id="gearBGroup"></g>
      </svg>
    </div>

    <div class="correction-box">
      <p class="correction-text" id="cText"></p>
    </div>
  </div>

  <script>
    const svgNS = "http://www.w3.org/2000/svg";
    
    // Logique d'auto-coche pour l'UX du prof
    document.getElementById('lvl1_obs').addEventListener('change', function() {
      if(this.checked) document.getElementById('cbShowArrowHelp').checked = true;
    });
    document.getElementById('lvl5_prev').addEventListener('change', function() {
      if(this.checked) {
        document.getElementById('cbPrev1Qcm').checked = true;
        document.getElementById('cbPrev1Open').checked = true;
      }
    });
    document.getElementById('lvl6_prev').addEventListener('change', function() {
      if(this.checked) {
        document.getElementById('cbPrev2Qcm').checked = true;
        document.getElementById('cbPrev2Open').checked = true;
      }
    });

    // UI Elements
    const diapoContainer = document.getElementById('diapoContainer');
    const slideCounter = document.getElementById('slideCounter');
    const qText = document.getElementById('qText');
    const cText = document.getElementById('cText');
    const btnPlay = document.getElementById('btnPlay');
    const btnReset = document.getElementById('btnReset');
    const btnPrev = document.getElementById('btnPrev');
    const btnNext = document.getElementById('btnNext');
    const btnFs = document.getElementById('btnFs');
    
    const gearAGroup = document.getElementById('gearAGroup');
    const gearBGroup = document.getElementById('gearBGroup');
    const gearCGroup = document.getElementById('gearCGroup');

    const COLOR_A = "#79a6ff", STROKE_A = "#4968b8";
    const COLOR_B = "#f5b35f", STROKE_B = "#7c5a22";
    const COLOR_C = "#8ce071", STROKE_C = "#4b9c32";

    let quizData = [];
    let currentIndex = 0;
    
    let animationState = {
      playing: false, angleA: 0, targetAngleA: 0, omegaA: 60, 
      teethA: 12, teethB: 24, teethC: 16, hasGearC: false, layout: {}
    };
    let lastTime = null; let reqAnimFrame = null;

    // --- MATHS & GÉOMÉTRIE --- //
    function polar(r, aDeg){ const a = aDeg * Math.PI / 180; return { x: r * Math.cos(a), y: r * Math.sin(a) }; }
    function cartesian(cx, cy, r, deg){ const a = (deg - 90) * Math.PI / 180; return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) }; }
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    function lcm(a, b) { return (a * b) / gcd(a, b); }
    function simplifyFrac(n, d) { const g = gcd(n, d); return { n: n/g, d: d/g }; }
    
    // FORMATAGE MAGIQUE : "1,75 (soit 1 tour et 3/4)"
    function formatDual(val) {
      if (Number.isInteger(val)) return String(val);
      
      let decStr = String(val).replace('.', ',');
      let whole = Math.floor(val);
      let fracDec = val - whole;
      fracDec = Math.round(fracDec * 1000) / 1000; 
      
      let fracStr = "";
      if (Math.abs(fracDec - 0.5) < 0.01) fracStr = "1/2";
      else if (Math.abs(fracDec - 0.25) < 0.01) fracStr = "1/4";
      else if (Math.abs(fracDec - 0.75) < 0.01) fracStr = "3/4";
      else {
         let f = simplifyFrac(Math.round(fracDec*1000), 1000);
         fracStr = f.n + "/" + f.d;
      }
      
      if (whole === 0) {
        return `${decStr} <span style="font-size:0.85em; color:var(--muted); font-weight:normal;">(soit ${fracStr} de tour)</span>`;
      } else {
        let tourTxt = whole > 1 ? "tours" : "tour";
        if (fracStr === "1/2") {
            return `${decStr} <span style="font-size:0.85em; color:var(--muted); font-weight:normal;">(soit ${whole} ${tourTxt} et demi)</span>`;
        } else {
            return `${decStr} <span style="font-size:0.85em; color:var(--muted); font-weight:normal;">(soit ${whole} ${tourTxt} et ${fracStr})</span>`;
        }
      }
    }

    // FORMATAGE SIMPLE (Pour le svg et menus QCM)
    function formatFractionOrDecimal(val) {
      if (Number.isInteger(val)) return String(val);
      let whole = Math.floor(val);
      let fracDec = val - whole;
      if (whole === 0) {
          let f = simplifyFrac(Math.round(fracDec*1000), 1000);
          if(f.d <= 4) return `${f.n}/${f.d}`; 
      }
      return String(Math.round(val*100)/100).replace('.', ',');
    }

    function getGearPolygonPoints(geom){
      const { teeth, toothAngle, rootRadius, outerRadius, pitchRadius } = geom;
      const pts = [];
      for(let i = 0; i < teeth; i++){
        const c = i * toothAngle;
        pts.push(
          polar(rootRadius, c - toothAngle * 0.32),
          polar(pitchRadius, c - toothAngle * 0.245),
          polar(outerRadius, c - toothAngle * 0.15),
          polar(outerRadius, c + toothAngle * 0.15),
          polar(pitchRadius, c + toothAngle * 0.245),
          polar(rootRadius, c + toothAngle * 0.32)
        );
      }
      return pts;
    }

    function getMarkerBoundaryRadius(geom, markerRotationDeg){
      const rayAngle = markerRotationDeg * Math.PI / 180;
      const dx = Math.cos(rayAngle);
      const dy = Math.sin(rayAngle);
      const pts = getGearPolygonPoints(geom);
      let bestT = geom.rootRadius;

      for(let i = 0; i < pts.length; i++){
        const p1 = pts[i];
        const p2 = pts[(i + 1) % pts.length];
        const sx = p2.x - p1.x;
        const sy = p2.y - p1.y;
        const denom = dx * sy - dy * sx;
        if (Math.abs(denom) < 1e-9) continue;

        const t = (p1.x * sy - p1.y * sx) / denom;
        const u = (p1.x * dy - p1.y * dx) / denom;
        if (t >= 0 && u >= 0 && u <= 1) {
          bestT = Math.max(bestT, t);
        }
      }
      return bestT;
    }

    // --- LE GÉNÉRATEUR DYNAMIQUE DE ROUES ---
    // Finies les listes manuelles ! L'ordinateur construit tous les rapports possibles (x2 à x5) de 7 à 40 dents.
    const allValidPairs = [];
    for(let t1=7; t1<=40; t1++) {
        for(let t2=7; t2<=40; t2++) {
            if(t1 === t2) continue;
            let r = Math.max(t1, t2) / Math.min(t1, t2);
            if(Number.isInteger(r) && r >= 2 && r <= 5) {
                allValidPairs.push([t1, t2]);
            }
        }
    }
    
    // PPCM requiert des rapports non entiers pour être intéressant
    const pairsPPCM = [
      [12, 18], [15, 20], [16, 24], [14, 21], [10, 25], [20, 30], [18, 24]
    ]; 

    // --- MOTEUR DE GÉNÉRATION --- //
    
    function createQuestion(type) {
      let baseType = type;
      if (type.startsWith('obs_1_') || type.startsWith('obs_2_')) {
        baseType = type.split('_').slice(0, 2).join('_');
      }

      let tA, tB, tC, turnsA, turnsB;
      let qHtml = "", cHtml = "", hasC = false;
      let isSpeedQ = false;
      let hideTurnsText = false;
      let hideArrows_val = false; 
      let omegaA_val = 60; 
      let givenGear_val = 'A';
      let markerType_val = 'dot'; 
      let isInverseProblem = false;

      switch(type) {
        
        // --- OBSERVER ---
        case 'obs_1_sens':
        case 'obs_1_vit':
        case 'obs_1': 
          let isSens1 = type === 'obs_1_sens' || (type === 'obs_1' && Math.random() > 0.5);

          if (Math.random() < 0.2) {
            tA = tB = Math.floor(Math.random() * 17 + 4) * 2; 
          } else {
            tA = Math.floor(Math.random() * 17 + 4) * 2;
            tB = Math.floor(Math.random() * 17 + 4) * 2;
            while(tA === tB) tB = Math.floor(Math.random() * 17 + 4) * 2;
          }
          turnsA = 1; turnsB = tA/tB;
          
          if (isSens1) {
            hideTurnsText = true;
            let isClockwise = Math.random() > 0.5;
            omegaA_val = isClockwise ? 60 : -60; 
            givenGear_val = 'A';
            
            let dirA_txt = isClockwise ? "<strong>sens horaire ↻</strong>" : "<strong>sens anti-horaire ↺</strong>";
            let dirB_txt = isClockwise ? "<strong>sens anti-horaire ↺</strong>" : "<strong>sens horaire ↻</strong>";
            
            qHtml = `La roue A (bleue) tourne dans le ${dirA_txt}.<br>Dans quel sens va tourner la roue B (orange) ?`;
            cHtml = `La roue B tourne dans le ${dirB_txt}.<br><div class="correction-detail">Deux roues qui s'engrènent tournent toujours en sens inverse.</div>`;
          } else {
            hideTurnsText = false;
            isSpeedQ = true; 
            omegaA_val = 60; 
            
            qHtml = `Observe bien ces deux roues.<br>Laquelle va tourner <strong>le plus vite</strong> ?`;
            if (tA === tB) {
              cHtml = `<strong>Aucune des deux !</strong><br><div class="correction-detail">Elles ont le même nombre de dents (${tA}), elles tournent donc exactement à la même vitesse.</div>`;
            } else {
              let faster = tA < tB ? "A (bleue)" : "B (orange)";
              let smaller = tA < tB ? "A" : "B";
              cHtml = `La roue <strong>${faster}</strong> tourne le plus vite.<br><div class="correction-detail">La roue ${smaller} a moins de dents, elle doit tourner plus vite pour suivre le rythme.</div>`;
            }
          }
          break;

        case 'obs_2_sens':
        case 'obs_2_vit':
        case 'obs_2': 
          let isSens2 = type === 'obs_2_sens' || (type === 'obs_2' && Math.random() > 0.5);
          hasC = true;
          tA = Math.floor(Math.random() * 15 + 4) * 2; 
          tB = Math.floor(Math.random() * 15 + 4) * 2; 
          tC = Math.floor(Math.random() * 15 + 4) * 2; 
          
          while (tA === tB && tB === tC) {
            tC = Math.floor(Math.random() * 15 + 4) * 2;
          }
          
          turnsA = 1; turnsB = tA/tB;
          
          if (isSens2) {
            hideTurnsText = true;
            let isGivenClockwise = Math.random() > 0.5;
            let givenWheel = Math.floor(Math.random() * 3); 
            
            let dirGiven_txt = isGivenClockwise ? "<strong>sens horaire ↻</strong>" : "<strong>sens anti-horaire ↺</strong>";
            let dirOpposite_txt = isGivenClockwise ? "<strong>sens anti-horaire ↺</strong>" : "<strong>sens horaire ↻</strong>";
            
            let symGiven = isGivenClockwise ? "↻" : "↺";
            let symOpposite = isGivenClockwise ? "↺" : "↻";

            if (givenWheel === 0) {
                givenGear_val = 'A';
                omegaA_val = isGivenClockwise ? 60 : -60;
                qHtml = `La roue <strong>A (bleue)</strong> tourne dans le ${dirGiven_txt}.<br>Dans quels sens vont tourner les roues C (verte) et B (orange) ?`;
                cHtml = `La roue C tourne dans le ${dirOpposite_txt} et la roue B dans le ${dirGiven_txt}.<br><div class="correction-detail">Le mouvement s'inverse à chaque contact : A(${symGiven}) ➔ C(${symOpposite}) ➔ B(${symGiven}).</div>`;
            } else if (givenWheel === 1) {
                givenGear_val = 'B';
                omegaA_val = isGivenClockwise ? 60 : -60;

          tA = p_c2[0]; tB = p_c2[1];
          
          let valids_c2 = [];
          for(let a=0.5; a<=8; a+=0.5) {
              let b = a * (tA/tB);
              if ((a % 0.5 === 0) && (b % 0.5 === 0) && (!Number.isInteger(a) || !Number.isInteger(b))) {
                  valids_c2.push({a:a, b:b});
              }
          }
          if (valids_c2.length === 0) valids_c2.push({a: 1, b: tA/tB}); // Fallback sécu
          let choice_c2 = valids_c2[Math.floor(Math.random() * valids_c2.length)];
          turnsA = choice_c2.a; turnsB = choice_c2.b;
          
          qHtml = `La roue A (bleue) effectue <strong>${formatDual(turnsA)}</strong>.<br>Calcule combien de tours effectue la roue B (orange).`;
          cHtml = `La roue B effectue <strong>${formatDual(turnsB)}</strong>.<br><div class="correction-detail">Calcul : ${formatFractionOrDecimal(turnsA)} × (${tA} / ${tB}) = ${formatFractionOrDecimal(turnsB)}.</div>`;
          break;

        // NIVEAU 3 : LES QUARTS DE TOURS (Filtre strict ,25 ou ,75)
        case 'calc_3': 
          hideTurnsText = false; omegaA_val = 60; markerType_val = 'line';
          let p_c3 = allValidPairs[Math.floor(Math.random() * allValidPairs.length)];
          tA = p_c3[0]; tB = p_c3[1];
          
          let valids_c3 = [];
          for(let a=0.25; a<=5; a+=0.25) {
              let b = a * (tA/tB);
              if ((a % 0.25 === 0) && (b % 0.25 === 0) && (a % 0.5 !== 0 || b % 0.5 !== 0)) {
                  valids_c3.push({a:a, b:b});
              }
          }
          // Si le ratio ne permet pas les quarts (ex: ratio x3), on relance
          if (valids_c3.length === 0) {
              tA = 10; tB = 40; turnsA = 1; turnsB = 0.25; // Force fallback sûr
          } else {
              let choice_c3 = valids_c3[Math.floor(Math.random() * valids_c3.length)];
              turnsA = choice_c3.a; turnsB = choice_c3.b;
          }
          
          qHtml = `La roue A (bleue) effectue <strong>${formatDual(turnsA)}</strong>.<br>Calcule combien de tours effectue la roue B (orange).`;
          let f3 = simplifyFrac(tA, tB);
          cHtml = `La roue B effectue <strong>${formatDual(turnsB)}</strong>.<br><div class="correction-detail">Calcul : ${formatFractionOrDecimal(turnsA)} × (${f3.n}/${f3.d}) = ${formatFractionOrDecimal(turnsB)}.</div>`;
          break;
          
        // NIVEAU 4 : LE PIÈGE DES 3 ROUES
        case 'calc_4': 
          hasC = true; hideTurnsText = false; omegaA_val = 60; markerType_val = 'line';
          let p_c4 = allValidPairs[Math.floor(Math.random() * allValidPairs.length)];
          tA = p_c4[0]; tB = p_c4[1]; 
          tC = Math.floor(Math.random() * 15 + 4) * 2;
          while(tC === tA || tC === tB) tC = Math.floor(Math.random() * 15 + 4) * 2;
          
          let valids_c4 = [];
          for(let a=1; a<=6; a+=0.5) {
              let b = a * (tA/tB);
              if (b % 0.5 === 0) valids_c4.push({a:a, b:b});
          }
          let choice_c4 = valids_c4[Math.floor(Math.random() * valids_c4.length)];
          turnsA = choice_c4.a; turnsB = choice_c4.b;
          
          qHtml = `La roue A (bleue) effectue <strong>${formatDual(turnsA)}</strong>.<br>Calcule combien de tours effectue la roue B (orange).`;
          cHtml = `La roue B effectue <strong>${formatDual(turnsB)}</strong>.<br><div class="correction-detail"><strong>Piège !</strong> La roue centrale (verte) ne modifie pas la vitesse. Il suffit de faire le calcul direct entre A et B : ${formatFractionOrDecimal(turnsA)} × (${tA} / ${tB}) = ${formatFractionOrDecimal(turnsB)}.</div>`;
          break;
          
        // NIVEAU 5 : LE PROBLÈME INVERSE (Trouver le nombre de dents)
        case 'calc_inv':
          hideTurnsText = false; omegaA_val = 60; markerType_val = 'line';
          let pi = allValidPairs[Math.floor(Math.random() * allValidPairs.length)];
          tA = pi[0]; tB = pi[1];
          let vi = [];
          for(let a=1; a<=6; a++) { 
              let b = a * (tA/tB);
              if(Number.isInteger(b)) vi.push({a:a, b:b}); 
          }
          let choice_i = vi[Math.floor(Math.random() * vi.length)];
          turnsA = choice_i.a; turnsB = choice_i.b;
          isInverseProblem = true;
          
          qHtml = `La roue A (bleue) possède <strong>${tA} dents</strong> et effectue <strong>${turnsA} tour${turnsA>1?'s':''}</strong>.<br>La roue B (orange) effectue <strong>${turnsB} tour${turnsB>1?'s':''}</strong>.<br>Combien de dents possède la roue B ?`;
          cHtml = `La roue B possède <strong>${tB} dents</strong> !<br><div class="correction-detail">La roue A fait passer ${tA} × ${turnsA} = ${tA*turnsA} dents.<br>La roue B a donc fait passer le même nombre de dents en ${turnsB} tour(s) : ${tA*turnsA} ÷ ${turnsB} = ${tB}.</div>`;
          break;

        // NIVEAU 6 : LE PPCM (Repères alignés)
        case 'calc_5': 
          hideTurnsText = false; omegaA_val = 60; markerType_val = 'line';
          let p9 = pairsPPCM[Math.floor(Math.random() * pairsPPCM.length)];
          tA = p9[0]; tB = p9[1];
          let ppcm = lcm(tA, tB);
          turnsA = ppcm / tA; 
          turnsB = ppcm / tB;
          qHtml = `Les repères rouges sont alignés.<br>Combien de tours <strong>au minimum</strong> doit faire la roue A pour que les deux repères se retrouvent exactement dans leur position de départ ?`;
          cHtml = `La roue A doit faire <strong>${turnsA} tours</strong>.<br><div class="correction-detail">Le multiple commun de ${tA} et ${tB} est ${ppcm} dents. Pour passer ${ppcm} dents, A doit faire ${turnsA} tours, et B fera ${turnsB} tours entiers.</div>`;
          break;

        default: 
          tA = 12; tB = 24; turnsA = 2; turnsB = 1; omegaA_val = 60;
          qHtml = "Erreur de génération."; cHtml = "Oups.";
      }

      let teethPerSecond = 2.0; 
      let currentSign = Math.sign(omegaA_val) || 1;
      omegaA_val = currentSign * (teethPerSecond * 360 / tA);

      return {
        qType: baseType,
        isSpeedQuestion: isSpeedQ, 
        hideTurns: hideTurnsText, 
        hideArrows: hideArrows_val,
        givenGear: givenGear_val, 
        omegaA: omegaA_val, 
        teethA: tA, teethB: tB, teethC: tC || 16, hasGearC: hasC,
        turnsA: turnsA, expectedTurnsB: turnsB,
        questionHtml: qHtml, correctionHtml: cHtml,
        phase: 0,
        marker: markerType_val,
        isInverse: isInverseProblem
      };
    }


    // --- CONTRÔLEURS DE L'INTERFACE --- //

    function generateQuiz() {
      const checkboxes = document.querySelectorAll('.q-type:checked');
      let selectedTypes = Array.from(checkboxes).map(cb => cb.value);
      
      if(selectedTypes.length === 0) {
        alert("⚠️ Vous devez sélectionner au moins un type de question !");
        return;
      }

      const count = parseInt(document.getElementById('selCount').value, 10);
      let questionsToGenerate = [];
      
      let baseCount = Math.floor(count / selectedTypes.length);
      let remainder = count % selectedTypes.length;
      
      let shuffledTypes = [...selectedTypes].sort(() => Math.random() - 0.5);
      
      shuffledTypes.forEach((type, index) => {
        let c = baseCount + (index < remainder ? 1 : 0);
        
        if (type === 'obs_1' || type === 'obs_2') {
            let half = Math.floor(c / 2);
            let otherHalf = c - half;
            let sensCount = Math.random() > 0.5 ? half : otherHalf;
            let vitCount = c - sensCount;
            
            for(let i=0; i<sensCount; i++) questionsToGenerate.push(type + '_sens');
            for(let i=0; i<vitCount; i++) questionsToGenerate.push(type + '_vit');
        } else {
            for(let i=0; i<c; i++) questionsToGenerate.push(type);
        }
      });

      questionsToGenerate.sort(() => Math.random() - 0.5);
      quizData = questionsToGenerate.map(t => createQuestion(t));
      
      currentIndex = 0;
      diapoContainer.style.display = "flex";
      diapoContainer.scrollIntoView({ behavior: "smooth" });
      loadSlide(currentIndex, 0);
    }

    function updatePlayButtonUI() {
        if (animationState.playing) {
            btnPlay.textContent = "⏸ Pause";
            btnPlay.style.backgroundColor = "#fff1f2";
            btnPlay.style.color = "#ff4d6d";
            btnPlay.style.borderColor = "#ffd6dd";
        } else {
            let q = quizData[currentIndex];
            const isContinuous = ['obs_1', 'obs_2', 'obs_4'].includes(q.qType);
            if (!isContinuous && Math.abs(animationState.angleA) >= Math.abs(animationState.targetAngleA)) {
                btnPlay.textContent = "▶ Rejouer";
            } else {
                btnPlay.textContent = "▶ Reprendre";
            }
            btnPlay.style.backgroundColor = "#eef4ff";
            btnPlay.style.color = "var(--accent)";
            btnPlay.style.borderColor = "#acc4ff";
        }
    }

    function setPhase(newPhase) {
        let q = quizData[currentIndex];
        let oldPhase = q.phase;
        let isCalc = q.qType.startsWith('calc');
        
        if (oldPhase === 1 && newPhase === 2) {
            animationState.angleA = 0;
            animationState.playing = true;
            lastTime = null;
            if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
            reqAnimFrame = requestAnimationFrame(animate);
        }
        
        q.phase = newPhase;

        cText.style.display = (q.phase === 2) ? "block" : "none";
        const isContinuous = ['obs_1', 'obs_2', 'obs_4'].includes(q.qType);

        if (q.phase === 0) {
            btnReset.style.display = "none";
            btnPlay.style.display = "none"; 
            
            animationState.playing = false;
            if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
            animationState.angleA = 0;

            btnNext.innerHTML = isCalc ? "Correction 👀" : "Animer ►";
            
        } else {
            btnReset.style.display = "inline-block";
            btnPlay.style.display = "inline-block";

            if (q.phase === 1) {
                btnNext.innerHTML = "Correction 👀";
                if (oldPhase === 2) {
                    animationState.angleA = 0;
                    animationState.playing = false;
                    if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                }
            } else if (q.phase === 2) {
                btnNext.innerHTML = "Question suiv. ►";
                if (currentIndex === quizData.length - 1) btnNext.innerHTML = "Terminé ✓";
                
                if (oldPhase === undefined || oldPhase === 0) {
                    if (!isContinuous) {
                        if (isCalc && oldPhase !== 2) {
                            animationState.angleA = 0;
                            animationState.playing = true;
                            lastTime = null;
                            if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                            reqAnimFrame = requestAnimationFrame(animate);
                        } else {
                            animationState.angleA = animationState.targetAngleA;
                            animationState.playing = false;
                        }
                    } else {
                        animationState.playing = true;
                        lastTime = null;
                        if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                        reqAnimFrame = requestAnimationFrame(animate);
                    }
                }
            }

            if (q.phase === 1 && oldPhase === 0) {
                 animationState.angleA = 0;
                 animationState.playing = true;
                 lastTime = null;
                 if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
                 reqAnimFrame = requestAnimationFrame(animate);
            }

            updatePlayButtonUI();
        }

        btnPrev.disabled = (currentIndex === 0 && q.phase === 0);
        btnNext.disabled = (currentIndex === quizData.length - 1 && q.phase === 2);

        renderStatic();
    }

    function loadSlide(index, startPhase = 0) {
      slideCounter.textContent = `Question ${index + 1} / ${quizData.length}`;
      currentIndex = index;
      let q = quizData[index];
      
      qText.innerHTML = q.questionHtml;
      cText.innerHTML = q.correctionHtml;
      
      animationState.playing = false;
      if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
      
      animationState.teethA = q.teethA;
      animationState.teethB = q.teethB;
      animationState.teethC = q.teethC;
      animationState.hasGearC = q.hasGearC;

      animationState.omegaA = q.omegaA || 60;
      animationState.angleA = 0; 
      animationState.targetAngleA = (q.turnsA || 1) * 360 * Math.sign(animationState.omegaA); 
      
      setPhase(startPhase);
    }

    function nextSlide() { 
      let q = quizData[currentIndex];
      let isCalc = q.qType.startsWith('calc');
      
      if (q.phase === 0) {
          setPhase(isCalc ? 2 : 1); 
      } else if (q.phase === 1) {
          setPhase(2); 
      } else if (currentIndex < quizData.length - 1) {
          loadSlide(currentIndex + 1, 0); 
      }
    }

    function prevSlide() { 
      let q = quizData[currentIndex];
      let isCalc = q.qType.startsWith('calc');
      
      if (q.phase === 2) {
          setPhase(isCalc ? 0 : 1);
      } else if (q.phase === 1) {
          setPhase(0); 
      } else if (currentIndex > 0) {
          loadSlide(currentIndex - 1, 2); 
      }
    }

    document.addEventListener("keydown", (e) => {
      if (diapoContainer.style.display !== "none") {
        if (e.key === "ArrowRight") {
          if (!btnNext.disabled) nextSlide();
        } else if (e.key === "ArrowLeft") {
          if (!btnPrev.disabled) prevSlide();
        }
      }
    });

    function toggleDiapoFullscreen() {
      if (!document.fullscreenElement) {
        diapoContainer.requestFullscreen().catch(err => console.error(err));
      } else { document.exitFullscreen(); }
    }
    document.addEventListener("fullscreenchange", () => {
      btnFs.innerHTML = document.fullscreenElement ? "🗗 Quitter plein écran" : "⛶ Plein écran";
    });

    // --- LE SYSTÈME D'ANIMATION --- //

    function togglePlay() {
      let q = quizData[currentIndex];
      if (q.phase === 0) {
          setPhase(1);
          return;
      }

      const isContinuous = ['obs_1', 'obs_2', 'obs_4'].includes(q.qType);

      if (animationState.playing) {
        animationState.playing = false;
        if (reqAnimFrame) cancelAnimationFrame(reqAnimFrame);
        updatePlayButtonUI();
      } else {
        if (!isContinuous && Math.abs(animationState.angleA) >= Math.abs(animationState.targetAngleA)) {
          animationState.angleA = 0; 
        }
        animationState.playing = true;
        lastTime = null; 
        reqAnimFrame = requestAnimationFrame(animate);
        updatePlayButtonUI();
      }
    }

    function resetToZero() {
      animationState.angleA = 0;
      renderStatic();
      
      if (!animationState.playing) {
        updatePlayButtonUI();
      }
    }

    function animate(timestamp) {
      if (!animationState.playing) return;
      if (!lastTime) lastTime = timestamp;
      
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      animationState.angleA += animationState.omegaA * dt;

      const q = quizData[currentIndex];
      const isContinuous = ['obs_1', 'obs_2', 'obs_4'].includes(q.qType);

      if (!isContinuous && Math.abs(animationState.angleA) >= Math.abs(animationState.targetAngleA)) {
        animationState.angleA = animationState.targetAngleA; 
        animationState.playing = false;
        updatePlayButtonUI();
        renderStatic();
        return; 
      }

      renderStatic();
      
      if (animationState.playing) {
        reqAnimFrame = requestAnimationFrame(animate);
      }
    }


    // --- MOTEUR DE DESSIN SVG --- //

    function emptyElement(el) { while (el.firstChild) { el.removeChild(el.firstChild); } }

    function computeDynamicModule(tA, tB, tC, hasC) {
      const targetTotalWidth = 1200;
      const teethWidth = hasC ? (2*tA + 2*tC + 2*tB + 10) : (2*tA + 2*tB + 10);
      const modW = targetTotalWidth / teethWidth;
      
      const maxTeeth = hasC ? Math.max(tA, tB, tC) : Math.max(tA, tB);
      const targetMaxRadius = 330; 
      const modH = targetMaxRadius / (maxTeeth + 1.25);
      
      return Math.max(Math.min(modW, modH, 24), 4);
    }

    function buildGearGeometry(teeth, modulePx){
      const pitchRadius = teeth * modulePx;
      const addendum = modulePx * 1.0; 
      const dedendum = modulePx * 1.25; 
      const outerRadius = pitchRadius + addendum;
      const rootRadius = pitchRadius - dedendum;
      const innerRadius = pitchRadius * 0.55; 
      const holeRadius = Math.max(16, pitchRadius * 0.12);
      return { teeth, toothAngle: 360 / teeth, pitchRadius, outerRadius, rootRadius, innerRadius, holeRadius, modulePx };
    }

    function gearPath(geom){
      const { teeth, toothAngle, rootRadius, outerRadius, pitchRadius } = geom;
      let d = "";
      for(let i = 0; i < teeth; i++){
        const c = i * toothAngle;
        const p_root1 = polar(rootRadius, c - toothAngle * 0.32);
        const p_pitch1= polar(pitchRadius, c - toothAngle * 0.245);
        const p_top1  = polar(outerRadius, c - toothAngle * 0.15);
        const p_top2  = polar(outerRadius, c + toothAngle * 0.15);
        const p_pitch2= polar(pitchRadius, c + toothAngle * 0.245);
        const p_root2 = polar(rootRadius, c + toothAngle * 0.32);

        if(i === 0) d += `M ${p_root1.x.toFixed(2)} ${p_root1.y.toFixed(2)} `;
        else d += `L ${p_root1.x.toFixed(2)} ${p_root1.y.toFixed(2)} `;
        d += `L ${p_pitch1.x.toFixed(2)} ${p_pitch1.y.toFixed(2)} L ${p_top1.x.toFixed(2)} ${p_top1.y.toFixed(2)} L ${p_top2.x.toFixed(2)} ${p_top2.y.toFixed(2)} L ${p_pitch2.x.toFixed(2)} ${p_pitch2.y.toFixed(2)} L ${p_root2.x.toFixed(2)} ${p_root2.y.toFixed(2)} `;
      }
      return d + "Z";
    }

    function createSVG(tag, attrs = {}){
      const el = document.createElementNS(svgNS, tag);
      for(const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }

    function buildGearGroup(target, cx, cy, geom, visualAngleDeg, fillColorCSS, label, strokeColorCSS, rawAngleDeg, direction, showArrow, markerType, showTurns, isHiddenLabel){
      emptyElement(target); 
      
      const group = createSVG("g", { transform: `translate(${cx} ${cy}) rotate(${visualAngleDeg})` });

      group.appendChild(createSVG("path", { d: gearPath(geom), fill: fillColorCSS, stroke: strokeColorCSS, "stroke-width": "2.4", filter: "url(#softShadow)" }));

      const markerRotation = -90 + rawAngleDeg - visualAngleDeg;
      const markerGroup = createSVG("g", { transform: `rotate(${markerRotation})` });
      
      const boundaryRadius = getMarkerBoundaryRadius(geom, markerRotation);
      const markerTipGap = Math.max(2.8, geom.modulePx * 0.16);
      
      const markerStart = geom.holeRadius - 0.5;
      const markerEnd = boundaryRadius - markerTipGap; 

      const dotRadius = Math.max(7, Math.min(12, geom.modulePx * 0.45)); 
      const lineThickness = Math.max(6, Math.min(12, geom.modulePx * 0.62)); 
      const innerLineThickness = Math.max(3, Math.min(6, geom.modulePx * 0.34));

      if (markerType === 'dot') {
        let dotCenter = geom.rootRadius - dotRadius - 3; 
        markerGroup.appendChild(createSVG("circle", {
          cx: dotCenter.toFixed(2), cy: "0",
          r: dotRadius.toFixed(2),
          fill: "var(--marker)",
          stroke: "#ffffff",
          "stroke-width": "2.5"
        }));
      } else {
        markerGroup.appendChild(createSVG("line", {
          x1: markerStart.toFixed(2), y1: "0",
          x2: markerEnd.toFixed(2), y2: "0",
          stroke: "#ffffff",
          "stroke-width": lineThickness.toFixed(2),
          "stroke-linecap": "round"
        }));
        markerGroup.appendChild(createSVG("line", {
          x1: markerStart.toFixed(2), y1: "0",
          x2: markerEnd.toFixed(2), y2: "0",
          stroke: "var(--marker)",
          "stroke-width": innerLineThickness.toFixed(2),
          "stroke-linecap": "round"
        }));
      }
      
      group.appendChild(markerGroup);

      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: geom.innerRadius.toFixed(2), fill: "rgba(255,255,255,0.20)", stroke: strokeColorCSS, "stroke-width": "1.8" }));
      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: geom.holeRadius.toFixed(2), fill: "#ffffff", stroke: strokeColorCSS, "stroke-width": "2.2" }));
      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: "4.2", fill: strokeColorCSS }));
      target.appendChild(group);

      if (showArrow) {
        const r = (geom.innerRadius + geom.rootRadius) / 2;
        const bandWidth = geom.rootRadius - geom.innerRadius;
        const hSize = Math.max(6, Math.min(14, bandWidth * 0.25)); 
        let dArrow = "";
        
        if (direction === 1) { 
          dArrow = `M ${cx - r} ${cy} A ${r} ${r} 0 0 1 ${cx + r} ${cy} M ${cx + r} ${cy} l -${hSize} -${hSize*1.2} M ${cx + r} ${cy} l ${hSize} -${hSize*1.2}`;
        } else if (direction === -1) { 
          dArrow = `M ${cx + r} ${cy} A ${r} ${r} 0 0 0 ${cx - r} ${cy} M ${cx - r} ${cy} l -${hSize} -${hSize*1.2} M ${cx - r} ${cy} l ${hSize} -${hSize*1.2}`;
        }

        const arrowPath = createSVG("path", {
          d: dArrow, fill: "none", stroke: "var(--text)", "stroke-width": "4",
          "stroke-linecap": "round", "stroke-linejoin": "round", opacity: "0.85"
        });
        target.appendChild(arrowPath);
      }

      let textY = cy + geom.outerRadius + 40;
      
      let finalLabel = isHiddenLabel ? `${label} : ? dents` : `${label} : ${geom.teeth} dents`;
      
      const labelText = createSVG("text", { x: cx, y: textY, "text-anchor": "middle", "font-size": "28", "font-weight": "700", fill: "#23304a" });
      labelText.innerHTML = finalLabel.replace("?", '<tspan fill="#ff4d6d">?</tspan>');
      target.appendChild(labelText);
      
      if (showTurns) {
        textY += 34;
        const turns = Math.abs(rawAngleDeg / 360);
        const formattedTurns = formatFractionOrDecimal(turns);
        const turnsText = createSVG("text", { x: cx, y: textY, "text-anchor": "middle", "font-size": "24", "font-weight": "800", fill: "#3f7cff" });
        turnsText.textContent = `Tours : ${formattedTurns}`;
        target.appendChild(turnsText);
      }
    }

    function computeLayout(geomA, geomB, geomC){
      const totalWidth = animationState.hasGearC 
        ? (geomA.pitchRadius*2 + geomC.pitchRadius*2 + geomB.pitchRadius*2)
        : (geomA.pitchRadius*2 + geomB.pitchRadius*2);
      
      const cy = 360; 
      const cxA = (1400 - totalWidth) / 2 + geomA.pitchRadius;
      
      if(animationState.hasGearC) {
        const cxC = cxA + geomA.pitchRadius + geomC.pitchRadius;
        const cxB = cxC + geomC.pitchRadius + geomB.pitchRadius;
        return { cxA, cyA: cy, cxB, cyB: cy, cxC, cyC: cy };
      } else {
        const cxB = cxA + geomA.pitchRadius + geomB.pitchRadius;
        return { cxA, cyA: cy, cxB, cyB: cy };
      }
    }

    function computePhaseOffsets(tA, tB, tC, hasC) {
      let phaseA = 0; let phaseB = 0; let phaseC = 0;
      if (!hasC) { phaseB = 180 + 180/tB; } 
      else { phaseC = 180 + 180/tC; phaseB = -phaseC * (tC/tB) + 180 + 180/tB; }
      return { phaseA, phaseB, phaseC };
    }

    function renderStatic(){
      const mod = computeDynamicModule(animationState.teethA, animationState.teethB, animationState.teethC, animationState.hasGearC);
      const geomA = buildGearGeometry(animationState.teethA, mod);
      const geomB = buildGearGeometry(animationState.teethB, mod);
      const geomC = animationState.hasGearC ? buildGearGeometry(animationState.teethC, mod) : null;
      
      const phases = computePhaseOffsets(animationState.teethA, animationState.teethB, animationState.teethC, animationState.hasGearC);
      animationState.layout = computeLayout(geomA, geomB, geomC);

      const angleA = animationState.angleA;
      let angleB, angleC;
      if (animationState.hasGearC) {
        angleC = angleA * (-animationState.teethA / animationState.teethC);
        angleB = angleC * (-animationState.teethC / animationState.teethB); 
      } else {
        angleB = angleA * (-animationState.teethA / animationState.teethB);
      }

      const q = quizData[currentIndex];
      
      const dirA = Math.sign(animationState.omegaA); 
      const dirC = animationState.hasGearC ? -dirA : 0; 
      const dirB = animationState.hasGearC ? dirA : -dirA; 

      const helpEnabled = document.getElementById('cbShowArrowHelp').checked;
      let showArrowA = false, showArrowB = false, showArrowC = false;

      if (!q.hideArrows && !q.isSpeedQuestion) {
          if (q.phase === 2) {
              showArrowA = true;
              showArrowB = true;
              showArrowC = animationState.hasGearC;
          } else {
              if (helpEnabled) {
                  if (q.givenGear === 'A') showArrowA = true;
                  if (q.givenGear === 'B') showArrowB = true;
                  if (q.givenGear === 'C') showArrowC = true;
              }
          }
      }

      const shouldShowTurns = (q.phase === 2) ? !q.hideTurns : false;
      const hideBLabel = q.isInverse && q.phase !== 2;

      buildGearGroup(gearAGroup, animationState.layout.cxA, animationState.layout.cyA, geomA, angleA + phases.phaseA, COLOR_A, "A", STROKE_A, angleA, dirA, showArrowA, q.marker, shouldShowTurns, false);
      buildGearGroup(gearBGroup, animationState.layout.cxB, animationState.layout.cyB, geomB, angleB + phases.phaseB, COLOR_B, "B", STROKE_B, angleB, dirB, showArrowB, q.marker, shouldShowTurns, hideBLabel);
      
      if(animationState.hasGearC) {
        gearCGroup.style.display = "block";
        buildGearGroup(gearCGroup, animationState.layout.cxC, animationState.layout.cyC, geomC, angleC + phases.phaseC, COLOR_C, "C", STROKE_C, angleC, dirC, showArrowC, q.marker, shouldShowTurns, false);
      } else {
        gearCGroup.style.display = "none";
      }
    }
  </script>
</body>
