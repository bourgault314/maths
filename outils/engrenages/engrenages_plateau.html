<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engrenages</title>
  <style>
    :root{
      --bg:#eef4ff;
      --panel:#ffffff;
      --panel-border:#dbe4f3;
      --text:#1f2a44;
      --muted:#5a6784;
      --accent:#3f7cff;
      --gearA:#79a6ff;
      --gearB:#f5b35f;
      --gearC:#8ce071;
      --marker:#ff4d6d;
      --shadow:0 10px 28px rgba(31,42,68,0.10);
      --stage-h:740px;
      --control-w:400px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Arial, Helvetica, sans-serif;
      color:var(--text);
      background:linear-gradient(180deg,#f7faff 0%, var(--bg) 100%);
      min-height:100vh;
      overflow-x:hidden;
    }

    header{ padding:16px 18px 12px; }
    h1{ margin:0; font-size:1.55rem; color: #1f2a44; }

    .app{
      display:grid;
      grid-template-columns: var(--control-w) 1fr;
      gap:16px;
      padding:0 16px 18px;
    }
    .panel{
      background:var(--panel);
      border:1px solid var(--panel-border);
      border-radius:18px;
      box-shadow:var(--shadow);
    }
    .controls{
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }
    .block{
      border:1px solid #e7edf8;
      border-radius:14px;
      padding:12px;
      background:#fbfdff;
    }
    .block h2{ margin:0 0 10px; font-size:1rem; }
    
    .control-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .control-row:last-child { margin-bottom: 0; }
    
    .input-group {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .val-input { 
      width: 46px; 
      text-align: center; 
      border: 1px solid #cfd8ea; 
      border-radius: 8px; 
      padding: 6px 2px; 
      font-size: 1rem; 
      font-weight: bold; 
      color: var(--text);
      background: white;
    }
    .val-input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
    .val-input::-webkit-outer-spin-button, .val-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .val-input[type=number] { -moz-appearance: textfield; }

    .btn-pm {
      width: 30px; height: 30px; border-radius: 8px; border: 1px solid #d7e3ff;
      background: #eef4ff; color: #29406b; cursor: pointer; font-size: 1.1rem;
      font-weight: bold; display: flex; align-items: center; justify-content: center;
      padding: 0; transition: background 0.1s;
    }
    .btn-pm:hover { background: #dbe7ff; }
    .btn-pm:active { transform: translateY(1px); }

    .speed-buttons{ display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .mini-btn{
      padding:6px 10px; border-radius:10px; border:1px solid #d7e3ff;
      background:#eef4ff; color:#29406b; cursor:pointer; font-size:0.9rem;
      font-weight: bold; flex-grow: 1; text-align: center;
    }
    .mini-btn:hover{ background:#dbe7ff; }
    
    .buttons{ display:flex; flex-wrap:wrap; gap:10px; }
    button{
      border:none; border-radius:12px; padding:10px 14px; cursor:pointer; font-size:0.95rem;
      transition:transform 0.08s ease, opacity 0.18s ease;
    }
    button:hover{ opacity:0.96; }
    button:active{ transform:translateY(1px); }
    .primary{ background:var(--accent); color:white; font-weight:bold; }
    .secondary{ background:#edf3ff; color:var(--text); border:1px solid #d9e5ff; font-weight:bold; }
    .ghost{ background:#fff7ec; color:#7a4b00; border:1px solid #ffe0b0; font-weight:bold; }
    .action-btn { background:#fff0f3; color:#a61d37; border:1px solid #ffd1d9; font-weight:bold; }
    .action-btn:hover { background:#ffe0e6; }

    .play-btn {
      width: 44px; height: 44px; padding: 0; font-size: 1.2rem;
      display: flex; align-items: center; justify-content: center;
    }

    .stage-panel{
      display:grid; grid-template-rows: 1fr auto; min-height:var(--stage-h); overflow:hidden;
    }
    .stage-wrap{ 
      padding:10px; position:relative; background: white; border-radius: 18px 18px 0 0;
    }
    
    .stage-wrap:fullscreen {
      padding: 0; border-radius: 0; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      background: radial-gradient(circle at 50% 50%, #ffffff 0%, #f6f9ff 48%, #edf3ff 100%);
    }
    .stage-wrap:fullscreen svg { border-radius: 0; height: 100vh; width: 100vw; }

    .fullscreen-ui {
      position: absolute; top: 20px; left: 20px; display: none; flex-direction: column; gap: 10px; z-index: 10;
    }
    .stage-wrap:fullscreen .fullscreen-ui { display: flex; }
    
    .fs-main-bar {
      display: flex; gap: 12px; background: rgba(255, 255, 255, 0.94);
      padding: 8px 12px; border-radius: 14px; border: 1px solid #d6dfef; box-shadow: 0 4px 16px rgba(31,42,68,0.12);
    }
    
    .fs-settings-panel {
      display: none; 
      flex-direction: column; gap: 14px; background: rgba(255, 255, 255, 0.96);
      padding: 16px; border-radius: 14px; border: 1px solid #d6dfef; box-shadow: 0 8px 24px rgba(31,42,68,0.15);
      width: max-content;
    }
    .fs-settings-panel.open { display: flex; }

    .fs-row { display: flex; justify-content: space-between; align-items: center; gap: 20px; }
    .fs-label { font-weight: bold; color: #5a6784; font-size: 0.95rem; }

    .checkbox-row {
      display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.92rem; color: #384665;
      font-weight: 500; margin-bottom: 0;
    }
    .checkbox-row input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; accent-color: var(--accent); margin:0; }

    .float-btn{
      width:44px; height:44px; border-radius:12px; border:none;
      background:#edf3ff; color:#3f7cff; cursor:pointer; font-size:1.3rem;
      display: flex; align-items: center; justify-content: center; padding: 0;
    }
    .float-btn:hover { background: #dbe7ff; }

    svg{
      width:100%; height:100%; min-height:560px; display:block; border-radius:12px;
      background:radial-gradient(circle at 50% 35%, #ffffff 0%, #f6f9ff 48%, #edf3ff 100%);
      touch-action:none; 
    }
    #gearAGroup, #gearBGroup, #gearCGroup { cursor: grab; }
    #gearAGroup:active, #gearBGroup:active, #gearCGroup:active { cursor: grabbing; }

    .infos{
      padding:14px 16px 16px; border-top:1px solid var(--panel-border); background:#fcfdff;
    }
    .info-grid{
      display:grid; grid-template-columns: repeat(2, minmax(220px,1fr)); gap:10px;
    }
    .card{
      border:1px solid #e7edf8; border-radius:14px; background:white; padding:12px;
    }
    .small{ font-size:0.86rem; color:var(--muted); margin-bottom:6px; }
    .big{ font-size:1.04rem; font-weight:700; line-height:1.35; }
    .formula{ font-size:0.98rem; line-height:1.45; }
    
    .hidden { display: none !important; }

    @media (max-width: 1050px){
      .app{ grid-template-columns: 1fr; }
      svg{ min-height:440px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ Engrenages</h1>
  </header>

  <main class="app">
    <section class="panel controls">
      
      <div class="block">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <h2 style="margin:0;">Mécanisme</h2>
          <label class="checkbox-row" style="font-size:0.9rem; font-weight:bold; color:var(--accent);">
            <input type="checkbox" id="panelHasGearC"> + Roue centrale
          </label>
        </div>
        
        <div class="control-row">
          <label>Moteur bleu (A)</label>
          <div class="input-group">
            <button class="btn-pm" onclick="changeTeeth('A', -1)">−</button>
            <input type="number" id="teethA" class="val-input" value="12" min="8" max="60" step="1">
            <button class="btn-pm" onclick="changeTeeth('A', 1)">+</button>
          </div>
        </div>

        <div class="control-row hidden" id="rowGearC">
          <label>Roue verte (C)</label>
          <div class="input-group">
            <button class="btn-pm" onclick="changeTeeth('C', -1)">−</button>
            <input type="number" id="teethC" class="val-input" value="16" min="8" max="60" step="1">
            <button class="btn-pm" onclick="changeTeeth('C', 1)">+</button>
          </div>
        </div>

        <div class="control-row">
          <label>Sortie orange (B)</label>
          <div class="input-group">
            <button class="btn-pm" onclick="changeTeeth('B', -1)">−</button>
            <input type="number" id="teethB" class="val-input" value="24" min="8" max="60" step="1">
            <button class="btn-pm" onclick="changeTeeth('B', 1)">+</button>
          </div>
        </div>
      </div>

      <div class="block">
        <h2>Animation</h2>
        <div class="control-row" style="margin-bottom: 6px;">
          <label>Vitesse <span id="panelDirText" style="color:var(--accent); font-weight:normal; font-size:0.85em;"></span></label>
          <div class="input-group">
            <button class="btn-pm" onclick="changeSpeed(-10)">−</button>
            <input type="number" id="speedNumber" class="val-input" value="20" min="0" max="360" step="10">
            <button class="btn-pm" onclick="changeSpeed(10)">+</button>
          </div>
        </div>
        <div class="speed-buttons">
          <button class="mini-btn" id="reverseBtn">⇄ Inverser</button>
          <button class="mini-btn" data-speed-step="-10">−10</button>
          <button class="mini-btn" data-speed-step="10">+10</button>
          <button class="mini-btn" id="speedZeroBtn">Stop</button>
        </div>
      </div>

      <div class="block">
        <h2>Affichage sur le plateau</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
          <label class="checkbox-row"><input type="checkbox" id="panelShowArrows"> 🔄 Flèches</label>
          <label class="checkbox-row"><input type="checkbox" id="panelShowMarker"> 🔴 Repère</label>
          <label class="checkbox-row"><input type="checkbox" id="panelShowLabels" checked> 🏷️ Dents</label>
          <label class="checkbox-row"><input type="checkbox" id="panelShowPitch"> ⭕ Contact</label>
          <label class="checkbox-row"><input type="checkbox" id="panelShowTurns"> ⏱️ Tours</label>
          <label class="checkbox-row"><input type="checkbox" id="panelShowSpeed"> ⚡ Vitesse</label>
        </div>
        <div style="margin-top: 10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
          <label for="panelMarkerMode" style="font-weight:600; color:#20304b;">Position du repère</label>
          <select id="panelMarkerMode" class="val-input" style="width:auto; min-width:170px;">
            <option value="top">Repères à midi</option>
            <option value="facing" id="panelMarkerFacingOption">Repères en face</option>
          </select>
          <label for="panelMarkerReference" style="font-weight:600; color:#20304b; margin-left:8px;">Repère vertical piloté par</label>
          <select id="panelMarkerReference" class="val-input" style="width:auto; min-width:90px;">
            <option value="A">A</option>
            <option value="B">B</option>
            <option value="C" id="panelMarkerReferenceCOption">C</option>
          </select>
        </div>
        <div style="margin-top: 10px; border-top: 1px solid #dbe4f3; padding-top: 10px;">
          <label class="checkbox-row"><input type="checkbox" id="panelShowInfos"> 📝 Explications texte</label>
        </div>
      </div>

      <div class="block">
        <h2>Commandes</h2>
        <div class="buttons">
          <button id="playPauseBtn" class="primary play-btn" title="Lecture/Pause">▶</button>
          <button id="resetBtn" class="secondary" style="flex-grow:1;">⏮ Départ</button>
          <button id="fullscreenBtn" class="ghost" style="flex-grow:1;">⛶ Plein écran</button>
        </div>
        <div class="buttons" style="margin-top: 10px;">
          <button id="panelOneTurnABtn" class="action-btn" style="flex-grow:1;">1 tour A</button>
          <button id="panelOneTurnBBtn" class="action-btn" style="flex-grow:1;">1 tour B</button>
        </div>
      </div>
    </section>

    <section class="panel stage-panel">
      <div class="stage-wrap" id="stageWrap">
        
        <div class="fullscreen-ui">
          <div class="fs-main-bar">
            <button id="fsMenuBtn" class="secondary" style="font-weight:bold; padding: 0 16px;">⚙️ Menu</button>
            <button id="fsPlayPauseBtn" class="primary play-btn">▶</button>
            <button id="fsResetBtn" class="float-btn" title="Remettre au départ">⏮</button>
            <button id="fsFullscreenBtn" class="float-btn" title="Quitter le Plein écran">🗗</button>
          </div>

          <div id="fsSettingsPanel" class="fs-settings-panel">
            
            <label class="checkbox-row" style="padding-bottom:10px; border-bottom:1px solid #dbe4f3; color:var(--accent); font-weight:bold;">
              <input type="checkbox" id="fsHasGearC"> + Insérer une roue centrale
            </label>

            <div class="fs-row">
              <span class="fs-label">Dents A (Bleu)</span>
              <div class="input-group">
                <button class="btn-pm" onclick="changeTeeth('A', -1)">−</button>
                <input type="number" id="fsTeethA" class="val-input" min="8" max="60" step="1">
                <button class="btn-pm" onclick="changeTeeth('A', 1)">+</button>
              </div>
            </div>

            <div class="fs-row hidden" id="fsRowGearC">
              <span class="fs-label">Dents C (Vert)</span>
              <div class="input-group">
                <button class="btn-pm" onclick="changeTeeth('C', -1)">−</button>
                <input type="number" id="fsTeethC" class="val-input" min="8" max="60" step="1">
                <button class="btn-pm" onclick="changeTeeth('C', 1)">+</button>
              </div>
            </div>
            
            <div class="fs-row">
              <span class="fs-label">Dents B (Orange)</span>
              <div class="input-group">
                <button class="btn-pm" onclick="changeTeeth('B', -1)">−</button>
                <input type="number" id="fsTeethB" class="val-input" min="8" max="60" step="1">
                <button class="btn-pm" onclick="changeTeeth('B', 1)">+</button>
              </div>
            </div>

            <div class="fs-row" style="border-top: 1px solid #dbe4f3; padding-top: 10px;">
              <span class="fs-label">Vitesse <span id="fsDirText" style="color:var(--accent); font-weight:normal; font-size:0.85em;"></span></span>
              <div class="input-group">
                <button class="btn-pm" onclick="changeSpeed(-10)">−</button>
                <input type="number" id="fsSpeed" class="val-input" value="20" min="0" max="360" step="10">
                <button class="btn-pm" onclick="changeSpeed(10)">+</button>
              </div>
            </div>

            <div class="fs-row">
              <button id="fsOneTurnABtn" class="action-btn" style="flex-grow:1; padding:8px;">1 tour A</button>
              <button id="fsOneTurnBBtn" class="action-btn" style="flex-grow:1; padding:8px; margin-left:8px;">1 tour B</button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-top: 1px solid #dbe4f3; padding-top: 10px;">
              <label class="checkbox-row"><input type="checkbox" id="fsShowArrows"> 🔄 Flèches</label>
              <label class="checkbox-row"><input type="checkbox" id="fsShowMarker"> 🔴 Repère</label>
              <label class="checkbox-row"><input type="checkbox" id="fsShowLabels" checked> 🏷️ Dents</label>
              <label class="checkbox-row"><input type="checkbox" id="fsShowTurns"> ⏱️ Tours</label>
              <label class="checkbox-row"><input type="checkbox" id="fsShowSpeed"> ⚡ Vitesse</label>
            </div>
            <div style="margin-top: 10px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
              <label for="fsMarkerMode" style="font-weight:600; color:#20304b;">Position du repère</label>
              <select id="fsMarkerMode" class="val-input" style="width:auto; min-width:170px;">
                <option value="top">Repères à midi</option>
                <option value="facing" id="fsMarkerFacingOption">Repères en face</option>
              </select>
              <label for="fsMarkerReference" style="font-weight:600; color:#20304b; margin-left:8px;">Repère vertical piloté par</label>
              <select id="fsMarkerReference" class="val-input" style="width:auto; min-width:90px;">
                <option value="A">A</option>
                <option value="B">B</option>
                <option value="C" id="fsMarkerReferenceCOption">C</option>
              </select>
            </div>
            
          </div>
        </div>

        <svg id="svgStage" viewBox="0 0 1400 820" aria-label="Simulation d'engrenages">
          <defs>
            <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
              <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.14"/>
            </filter>
          </defs>
          <g id="gearAGroup" data-id="A"></g>
          <g id="gearCGroup" data-id="C"></g>
          <g id="gearBGroup" data-id="B"></g>
          <g id="overlayGroup"></g>
        </svg>
      </div>

      <div class="infos" id="infosPanel" style="display: none;">
        <div class="info-grid">
          <div class="card">
            <div class="small">Rapport de transmission</div>
            <div id="ratioText" class="big"></div>
          </div>
          <div class="card">
            <div class="small">Sens de rotation</div>
            <div id="directionText" class="big"></div>
          </div>
          <div class="card" style="grid-column: 1 / -1;">
            <div class="small">Principe mathématique & Exemple</div>
            <div id="formulaText" class="formula"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const svgNS = "http://www.w3.org/2000/svg";
    const svgStage = document.getElementById("svgStage");
    const stageWrap = document.getElementById("stageWrap");

    const COLOR_A = "#79a6ff", STROKE_A = "#4968b8";
    const COLOR_B = "#f5b35f", STROKE_B = "#7c5a22";
    const COLOR_C = "#8ce071", STROKE_C = "#4b9c32";

    const state = {
      teethA: 12,
      teethB: 24,
      teethC: 16,
      hasGearC: false,
      angleA: 0,
      
      // Séparation de la valeur absolue (magnitude) et de la direction (1 ou -1)
      speedMagnitude: 20, 
      speedDirection: 1,  
      omegaA: 20, 
      
      playing: false,
      oneTurnMode: false,
      oneTurnTarget: 0,
      layout: { cxA: 0, cyA: 0, cxB: 0, cyB: 0, cxC: 0, cyC: 0 },
      showArrows: false,
      showMarker: false,
      markerMode: "top",
      markerReference: "A",
      showLabels: true,
      showPitch: false,
      showTurns: false,
      showSpeed: false,
      fsMenuOpen: false
    };

    const ui = {
      teethA: document.getElementById("teethA"),
      teethB: document.getElementById("teethB"),
      teethC: document.getElementById("teethC"),
      fsTeethA: document.getElementById("fsTeethA"),
      fsTeethB: document.getElementById("fsTeethB"),
      fsTeethC: document.getElementById("fsTeethC"),
      rowGearC: document.getElementById("rowGearC"),
      fsRowGearC: document.getElementById("fsRowGearC"),
      
      panelHasGearC: document.getElementById("panelHasGearC"),
      fsHasGearC: document.getElementById("fsHasGearC"),

      speedNumber: document.getElementById("speedNumber"),
      fsSpeed: document.getElementById("fsSpeed"),
      panelDirText: document.getElementById("panelDirText"),
      fsDirText: document.getElementById("fsDirText"),
      
      playPauseBtn: document.getElementById("playPauseBtn"),
      fsPlayPauseBtn: document.getElementById("fsPlayPauseBtn"),
      resetBtn: document.getElementById("resetBtn"),
      fsResetBtn: document.getElementById("fsResetBtn"),
      
      panelOneTurnABtn: document.getElementById("panelOneTurnABtn"),
      panelOneTurnBBtn: document.getElementById("panelOneTurnBBtn"),
      fsOneTurnABtn: document.getElementById("fsOneTurnABtn"),
      fsOneTurnBBtn: document.getElementById("fsOneTurnBBtn"),
      
      reverseBtn: document.getElementById("reverseBtn"),
      fullscreenBtn: document.getElementById("fullscreenBtn"),
      fsFullscreenBtn: document.getElementById("fsFullscreenBtn"),
      
      panelShowArrows: document.getElementById("panelShowArrows"),
      panelShowMarker: document.getElementById("panelShowMarker"),
      panelMarkerMode: document.getElementById("panelMarkerMode"),
      panelMarkerFacingOption: document.getElementById("panelMarkerFacingOption"),
      panelMarkerReference: document.getElementById("panelMarkerReference"),
      panelMarkerReferenceCOption: document.getElementById("panelMarkerReferenceCOption"),
      panelShowLabels: document.getElementById("panelShowLabels"),
      panelShowPitch: document.getElementById("panelShowPitch"),
      panelShowTurns: document.getElementById("panelShowTurns"),
      panelShowSpeed: document.getElementById("panelShowSpeed"),
      panelShowInfos: document.getElementById("panelShowInfos"),
      infosPanel: document.getElementById("infosPanel"),
      
      fsShowArrows: document.getElementById("fsShowArrows"),
      fsShowMarker: document.getElementById("fsShowMarker"),
      fsMarkerMode: document.getElementById("fsMarkerMode"),
      fsMarkerFacingOption: document.getElementById("fsMarkerFacingOption"),
      fsMarkerReference: document.getElementById("fsMarkerReference"),
      fsMarkerReferenceCOption: document.getElementById("fsMarkerReferenceCOption"),
      fsShowLabels: document.getElementById("fsShowLabels"),
      fsShowTurns: document.getElementById("fsShowTurns"),
      fsShowSpeed: document.getElementById("fsShowSpeed"),
      
      fsMenuBtn: document.getElementById("fsMenuBtn"),
      fsSettingsPanel: document.getElementById("fsSettingsPanel"),

      gearAGroup: document.getElementById("gearAGroup"),
      gearBGroup: document.getElementById("gearBGroup"),
      gearCGroup: document.getElementById("gearCGroup"),
      overlayGroup: document.getElementById("overlayGroup"),
      
      ratioText: document.getElementById("ratioText"),
      directionText: document.getElementById("directionText"),
      formulaText: document.getElementById("formulaText")
    };

    function updateMarkerModeAvailability(){
      const lockToTop = state.hasGearC;
      const canUseCReference = state.hasGearC;
      const referenceRelevant = state.markerMode === "top";
      if (ui.panelMarkerFacingOption) {
        ui.panelMarkerFacingOption.hidden = lockToTop;
        ui.panelMarkerFacingOption.disabled = lockToTop;
      }
      if (ui.fsMarkerFacingOption) {
        ui.fsMarkerFacingOption.hidden = lockToTop;
        ui.fsMarkerFacingOption.disabled = lockToTop;
      }
      if (ui.panelMarkerReferenceCOption) {
        ui.panelMarkerReferenceCOption.hidden = !canUseCReference;
        ui.panelMarkerReferenceCOption.disabled = !canUseCReference;
      }
      if (ui.fsMarkerReferenceCOption) {
        ui.fsMarkerReferenceCOption.hidden = !canUseCReference;
        ui.fsMarkerReferenceCOption.disabled = !canUseCReference;
      }
      if (lockToTop && state.markerMode !== "top") {
        state.markerMode = "top";
      }
      if (!canUseCReference && state.markerReference === "C") {
        state.markerReference = "A";
      }
      ui.panelMarkerMode.value = state.markerMode;
      ui.fsMarkerMode.value = state.markerMode;
      ui.panelMarkerReference.value = state.markerReference;
      ui.fsMarkerReference.value = state.markerReference;
      ui.panelMarkerReference.disabled = !referenceRelevant;
      ui.fsMarkerReference.disabled = !referenceRelevant;
    }

    ui.fsTeethA.value = state.teethA;
    ui.fsTeethB.value = state.teethB;
    ui.fsTeethC.value = state.teethC;
    ui.fsSpeed.value = state.speedMagnitude;
    ui.panelMarkerMode.value = state.markerMode;
    ui.fsMarkerMode.value = state.markerMode;
    ui.panelMarkerReference.value = state.markerReference;
    ui.fsMarkerReference.value = state.markerReference;
    updateMarkerModeAvailability();

    ui.panelShowInfos.addEventListener("change", (e) => {
      ui.infosPanel.style.display = e.target.checked ? "block" : "none";
    });

    ui.fsMenuBtn.addEventListener("click", () => {
      state.fsMenuOpen = !state.fsMenuOpen;
      if(state.fsMenuOpen) ui.fsSettingsPanel.classList.add("open");
      else ui.fsSettingsPanel.classList.remove("open");
    });

    function clamp(v, min, max){ return Math.max(min, Math.min(max, v)); }
    function createSVG(tag, attrs = {}){
      const el = document.createElementNS(svgNS, tag);
      for(const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
      return el;
    }
    function polar(r, aDeg){
      const a = aDeg * Math.PI / 180;
      return { x: r * Math.cos(a), y: r * Math.sin(a) };
    }
    function cartesian(cx, cy, r, deg){
      const a = (deg - 90) * Math.PI / 180;
      return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
    }
    function formatNumber(x){ return String((Math.round(x * 100) / 100)).replace(".", ","); }
    function gcd(a, b){ return b === 0 ? a : gcd(b, a % b); }
    function simplifiedFraction(n, d){ const g = gcd(n, d); return { n: n / g, d: d / g }; }

    function getDirectionText(dir) {
      if (state.speedMagnitude === 0) return "";
      return dir > 0 ? "(Horaire ↻)" : "(Anti-horaire ↺)";
    }

    function updateInfo(){
      const ratio = state.teethA / state.teethB;
      const frac = simplifiedFraction(state.teethA, state.teethB);
      
      ui.ratioText.innerHTML = `B tourne à <strong>${formatNumber(Math.abs(ratio))}</strong> fois la vitesse de A.`;
      
      let formulaHTML = "";
      if (state.hasGearC) {
        ui.directionText.innerHTML = `La roue C (verte) inverse le mouvement.<br>A et B tournent dans le <strong>MÊME SENS</strong>.`;
        formulaHTML = `<strong>Le rapport final ne dépend que de A et B !</strong><br>Vitesse B = Vitesse A × (Dents A / Dents C) × (Dents C / Dents B) = Vitesse A × (${state.teethA}/${state.teethB})<br><br><strong>Exemple :</strong> Si A fait <strong>1 tour</strong>, B fait <strong>${formatNumber(Math.abs(ratio))}</strong> tour(s). (Fraction simplifiée A/B : <strong>${frac.n}/${frac.d}</strong>)`;
      } else {
        ui.directionText.innerHTML = `Les deux roues tournent en <strong>SENS INVERSES</strong>.`;
        // Formule purement absolue (sans le moins) pour éviter la confusion
        formulaHTML = `Vitesse Sortie (B) = Vitesse Moteur (A) × (Dents A / Dents B)<br><br><strong>Exemple :</strong> Si A fait <strong>1 tour</strong>, B fait <strong>${formatNumber(Math.abs(ratio))}</strong> tour(s). (Fraction simplifiée : <strong>${frac.n}/${frac.d}</strong>)`;
      }
      ui.formulaText.innerHTML = formulaHTML;

      // Mise à jour des textes Horaire / Anti-horaire dans les menus
      const dirTxt = getDirectionText(state.speedDirection);
      ui.panelDirText.textContent = dirTxt;
      ui.fsDirText.textContent = dirTxt;
    }

    function computeDynamicModule(tA, tB, tC, hasC) {
      const targetTotalWidth = 1100;
      const teethWidth = hasC ? (2*tA + 2*tC + 2*tB + 6) : (2*tA + 2*tB + 6);
      return clamp(targetTotalWidth / teethWidth, 4, 22);
    }

    function buildGearGeometry(teeth, modulePx){
      const pitchRadius = teeth * modulePx;
      const addendum = modulePx * 1.0; 
      const dedendum = modulePx * 1.25; 
      const outerRadius = pitchRadius + addendum;
      const rootRadius = pitchRadius - dedendum;
      const innerRadius = pitchRadius * 0.55; 
      const holeRadius = Math.max(16, pitchRadius * 0.12);
      return { teeth, toothAngle: 360 / teeth, pitchRadius, outerRadius, rootRadius, innerRadius, holeRadius, modulePx };
    }

    function gearPath(geom){
      const { teeth, toothAngle, rootRadius, outerRadius, pitchRadius } = geom;
      let d = "";
      for(let i = 0; i < teeth; i++){
        const c = i * toothAngle;
        const a_root1 = c - toothAngle * 0.32; 
        const a_pitch1= c - toothAngle * 0.245; 
        const a_top1  = c - toothAngle * 0.15; 
        const a_top2  = c + toothAngle * 0.15;
        const a_pitch2= c + toothAngle * 0.245;
        const a_root2 = c + toothAngle * 0.32;

        const p_root1 = polar(rootRadius, a_root1);
        const p_pitch1= polar(pitchRadius, a_pitch1);
        const p_top1  = polar(outerRadius, a_top1);
        const p_top2  = polar(outerRadius, a_top2);
        const p_pitch2= polar(pitchRadius, a_pitch2);
        const p_root2 = polar(rootRadius, a_root2);

        if(i === 0) d += `M ${p_root1.x.toFixed(2)} ${p_root1.y.toFixed(2)} `;
        else d += `L ${p_root1.x.toFixed(2)} ${p_root1.y.toFixed(2)} `;
        d += `L ${p_pitch1.x.toFixed(2)} ${p_pitch1.y.toFixed(2)} `;
        d += `L ${p_top1.x.toFixed(2)} ${p_top1.y.toFixed(2)} `;
        d += `L ${p_top2.x.toFixed(2)} ${p_top2.y.toFixed(2)} `;
        d += `L ${p_pitch2.x.toFixed(2)} ${p_pitch2.y.toFixed(2)} `;
        d += `L ${p_root2.x.toFixed(2)} ${p_root2.y.toFixed(2)} `;
      }
      d += "Z";
      return d;
    }

    function singleToothPath(geom, toothIndex){
      const { toothAngle, rootRadius, outerRadius, pitchRadius } = geom;
      const c = toothIndex * toothAngle;
      const p_root1 = polar(rootRadius, c - toothAngle * 0.32);
      const p_pitch1= polar(pitchRadius, c - toothAngle * 0.245);
      const p_top1  = polar(outerRadius, c - toothAngle * 0.15);
      const p_top2  = polar(outerRadius, c + toothAngle * 0.15);
      const p_pitch2= polar(pitchRadius, c + toothAngle * 0.245);
      const p_root2 = polar(rootRadius, c + toothAngle * 0.32);

      return `M 0 0 L ${p_root1.x} ${p_root1.y} L ${p_pitch1.x} ${p_pitch1.y} L ${p_top1.x} ${p_top1.y} L ${p_top2.x} ${p_top2.y} L ${p_pitch2.x} ${p_pitch2.y} L ${p_root2.x} ${p_root2.y} Z`;
    }

    function describeArcArrow(cx, cy, r, startDeg, endDeg, positive){
      const start = cartesian(cx, cy, r, startDeg);
      const end = cartesian(cx, cy, r, endDeg);
      const largeArc = Math.abs(endDeg - startDeg) > 180 ? 1 : 0;
      const sweep = positive ? 1 : 0;
      return `M ${start.x} ${start.y} A ${r} ${r} 0 ${largeArc} ${sweep} ${end.x} ${end.y}`;
    }

    function drawArrowGroup(cx, cy, r, startDeg, sweepDeg, isCW, color) {
        if(state.speedMagnitude === 0) return createSVG("g");
        const endDeg = isCW ? startDeg + sweepDeg : startDeg - sweepDeg;
        const arcEndOffset = isCW ? -6 : 6; 
        const pathData = describeArcArrow(cx, cy, r, startDeg, endDeg + arcEndOffset, isCW);
        const endPt = cartesian(cx, cy, r, endDeg);
        const headDir = isCW ? endDeg : endDeg - 180; 
        const headLen = 16;
        const flare = 145; 
        const a1 = (headDir + flare) * Math.PI / 180;
        const a2 = (headDir - flare) * Math.PI / 180;
        
        const p1x = endPt.x + headLen * Math.cos(a1);
        const p1y = endPt.y + headLen * Math.sin(a1);
        const p2x = endPt.x + headLen * Math.cos(a2);
        const p2y = endPt.y + headLen * Math.sin(a2);
        
        const headPath = `M ${endPt.x} ${endPt.y} L ${p1x} ${p1y} L ${p2x} ${p2y} Z`;
        
        const g = createSVG("g");
        g.appendChild(createSVG("path", { d: pathData, fill: "none", stroke: color, "stroke-width": "4.5", "stroke-linecap": "butt" }));
        g.appendChild(createSVG("path", { d: headPath, fill: color, stroke: color, "stroke-linejoin": "round", "stroke-width": "2" }));
        return g;
    }

    function getReferenceAlignmentPhase(teeth) {
      const toothAngle = 360 / teeth;
      const nearestTooth = Math.round(-90 / toothAngle) * toothAngle;
      const snapDelta = nearestTooth + 90;
      return -snapDelta;
    }

    function computePhaseOffsets(tA, tB, tC, hasC) {
      const meshOffset = (drivenTeeth) => 180 + 180 / drivenTeeth;
      const propagateForward = (driverPhase, driverTeeth, drivenTeeth) => {
        return -driverPhase * (driverTeeth / drivenTeeth) + meshOffset(drivenTeeth);
      };
      const propagateBackward = (drivenPhase, driverTeeth, drivenTeeth) => {
        return -(drivenPhase - meshOffset(drivenTeeth)) * (drivenTeeth / driverTeeth);
      };

      let phaseA = 0;
      let phaseB = 0;
      let phaseC = 0;

      if (!hasC) {
        if (state.markerReference === "B") {
          phaseB = getReferenceAlignmentPhase(tB);
          phaseA = propagateBackward(phaseB, tA, tB);
        } else {
          phaseA = getReferenceAlignmentPhase(tA);
          phaseB = propagateForward(phaseA, tA, tB);
        }
      } else {
        if (state.markerReference === "B") {
          phaseB = getReferenceAlignmentPhase(tB);
          phaseC = propagateBackward(phaseB, tC, tB);
          phaseA = propagateBackward(phaseC, tA, tC);
        } else if (state.markerReference === "C") {
          phaseC = getReferenceAlignmentPhase(tC);
          phaseA = propagateBackward(phaseC, tA, tC);
          phaseB = propagateForward(phaseC, tC, tB);
        } else {
          phaseA = getReferenceAlignmentPhase(tA);
          phaseC = propagateForward(phaseA, tA, tC);
          phaseB = propagateForward(phaseC, tC, tB);
        }
      }
      return { phaseA, phaseB, phaseC };
    }

    function getMarkerBaseAngle(label){
      if (state.markerMode !== "facing") return 0;
      if (!state.hasGearC) {
        if (label === "A") return 90;
        if (label === "B") return -90;
        return 0;
      }
      if (label === "A") return 90;
      if (label === "B") return -90;
      return 0;
    }

    function getGearPolygonPoints(geom){
      const { teeth, toothAngle, rootRadius, outerRadius, pitchRadius } = geom;
      const pts = [];
      for(let i = 0; i < teeth; i++){
        const c = i * toothAngle;
        pts.push(
          polar(rootRadius, c - toothAngle * 0.32),
          polar(pitchRadius, c - toothAngle * 0.245),
          polar(outerRadius, c - toothAngle * 0.15),
          polar(outerRadius, c + toothAngle * 0.15),
          polar(pitchRadius, c + toothAngle * 0.245),
          polar(rootRadius, c + toothAngle * 0.32)
        );
      }
      return pts;
    }

    function getMarkerBoundaryRadius(geom, markerRotationDeg){
      const rayAngle = (markerRotationDeg - 90) * Math.PI / 180;
      const dx = Math.cos(rayAngle);
      const dy = Math.sin(rayAngle);
      const pts = getGearPolygonPoints(geom);
      let bestT = geom.rootRadius;

      for(let i = 0; i < pts.length; i++){
        const p1 = pts[i];
        const p2 = pts[(i + 1) % pts.length];
        const sx = p2.x - p1.x;
        const sy = p2.y - p1.y;
        const denom = dx * sy - dy * sx;
        if (Math.abs(denom) < 1e-9) continue;

        const t = (p1.x * sy - p1.y * sx) / denom;
        const u = (p1.x * dy - p1.y * dx) / denom;
        if (t >= 0 && u >= 0 && u <= 1) {
          bestT = Math.max(bestT, t);
        }
      }
      return bestT;
    }

  function buildGearGroup(target, cx, cy, geom, visualAngleDeg, rawAngleDeg, currentSpeed, fillColorCSS, label, strokeColorCSS){
      target.innerHTML = "";
      const group = createSVG("g", { transform: `translate(${cx} ${cy}) rotate(${visualAngleDeg})` });

      group.appendChild(createSVG("path", { d: gearPath(geom), fill: fillColorCSS, stroke: strokeColorCSS, "stroke-width": "2.4", filter: "url(#softShadow)" }));

      // Variables partagées pour les repères (rouge et fantôme)
      let markerRotation = 0;
      let markerStart = 0;
      let markerEnd = 0;
      let lineThickness = 0;
      let innerLineThickness = 0;

      if (state.showMarker) {
        const markerBaseAngle = getMarkerBaseAngle(label);
        markerRotation = markerBaseAngle + rawAngleDeg - visualAngleDeg;

        if (state.markerMode === "top" && label !== state.markerReference) {
          const toothAngle = 360 / geom.teeth;
          const absoluteMarkerAngle = -90 + markerRotation;
          const nearestTooth = Math.round(absoluteMarkerAngle / toothAngle) * toothAngle;
          markerRotation = nearestTooth + 90;
        }

        const markerGroup = createSVG("g", { transform: `rotate(${markerRotation})` });
        const markerTipGap = Math.max(2.8, geom.modulePx * 0.16);
        markerStart = -(geom.holeRadius - 0.5);
        const boundaryRadius = getMarkerBoundaryRadius(geom, markerRotation);
        const markerEndRadius = Math.max(geom.holeRadius + 6, boundaryRadius - markerTipGap);
        markerEnd = -markerEndRadius;
        
        lineThickness = (geom.modulePx * 0.62).toFixed(2);
        innerLineThickness = (geom.modulePx * 0.34).toFixed(2);

        markerGroup.appendChild(createSVG("line", {
          x1: "0", y1: markerStart.toFixed(2), x2: "0", y2: markerEnd.toFixed(2),
          stroke: "#ffffff", "stroke-width": lineThickness, "stroke-linecap": "round"
        }));
        markerGroup.appendChild(createSVG("line", {
          x1: "0", y1: markerStart.toFixed(2), x2: "0", y2: markerEnd.toFixed(2),
          stroke: "var(--marker)", "stroke-width": innerLineThickness, "stroke-linecap": "round"
        }));
        group.appendChild(markerGroup);
      }

      if (state.showPitch) {
        group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: geom.pitchRadius.toFixed(2), fill: "none", stroke: "rgba(93,104,135,0.25)", "stroke-width": "2", "stroke-dasharray": "6 6" }));
      }

      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: geom.innerRadius.toFixed(2), fill: "rgba(255,255,255,0.20)", stroke: strokeColorCSS, "stroke-width": "1.8" }));
      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: geom.holeRadius.toFixed(2), fill: "#ffffff", stroke: strokeColorCSS, "stroke-width": "2.2" }));
      group.appendChild(createSVG("circle", { cx: "0", cy: "0", r: "4.2", fill: strokeColorCSS }));
      
      // On attache la roue qui tourne au SVG
      target.appendChild(group);

      // --- AJOUT DU REPÈRE FANTÔME (GHOST MARKER) ---
      if (state.showMarker) {
        // Le décalage de base de la roue est constant (phaseOffset)
        const phaseOffset = visualAngleDeg - rawAngleDeg;
        
        // On crée un conteneur indépendant qui ne tourne pas avec le moteur, fixé à sa rotation de départ
        const ghostContainer = createSVG("g", { transform: `translate(${cx} ${cy}) rotate(${phaseOffset + markerRotation})` });

        ghostContainer.appendChild(createSVG("line", {
          x1: "0", y1: markerStart.toFixed(2), x2: "0", y2: markerEnd.toFixed(2),
          stroke: "rgba(255,255,255,0.4)", "stroke-width": lineThickness, "stroke-linecap": "round"
        }));
        ghostContainer.appendChild(createSVG("line", {
          x1: "0", y1: markerStart.toFixed(2), x2: "0", y2: markerEnd.toFixed(2),
          stroke: "rgba(0,0,0,0.15)", "stroke-width": innerLineThickness, "stroke-linecap": "round"
        }));
        
        // On l'ajoute par-dessus la roue !
        target.appendChild(ghostContainer);
      }

      let textY = cy + geom.outerRadius + (document.fullscreenElement ? 40 : 34);

      if (state.showLabels) {
        const labelText = createSVG("text", {
          x: cx, y: textY, "text-anchor": "middle", "font-size": document.fullscreenElement ? "30" : "24",
          "font-weight": "700", fill: "#23304a", "pointer-events": "none"
        });
        labelText.textContent = `${label} : ${geom.teeth} dents`;
        target.appendChild(labelText);
        textY += (document.fullscreenElement ? 34 : 26);
      }

      if (state.showTurns) {
        const turns = Math.abs(rawAngleDeg / 360).toFixed(2);
        const turnsText = createSVG("text", {
          x: cx, y: textY, "text-anchor": "middle", "font-size": document.fullscreenElement ? "28" : "24",
          "font-weight": "800", fill: "#3f7cff", "pointer-events": "none"
        });
        turnsText.textContent = `Tours : ${turns}`;
        target.appendChild(turnsText);
        textY += (document.fullscreenElement ? 34 : 30);
      }

      if (state.showSpeed) {
        const speedText = createSVG("text", {
          x: cx, y: textY, "text-anchor": "middle", "font-size": document.fullscreenElement ? "22" : "18",
          "font-weight": "600", fill: "#5a6784", "pointer-events": "none"
        });
        const speedAbs = Math.round(Math.abs(currentSpeed));
        let dirString = "";
        if (speedAbs > 0) {
            dirString = currentSpeed > 0 ? " (Horaire ↻)" : " (Anti-horaire ↺)";
        }
        speedText.textContent = `Vitesse : ${speedAbs} °/s ${dirString}`;
        target.appendChild(speedText);
      }
    }

    function drawOverlay(layout, geomA, omegaA, geomB, omegaB, geomC, omegaC){
      ui.overlayGroup.innerHTML = "";
      if (!state.showArrows) return;

      const drawArrowsFor = (cx, cy, geom, omega) => {
        const rad = (geom.holeRadius + geom.innerRadius) / 2;
        for(let i=0; i<3; i++) {
          ui.overlayGroup.appendChild(drawArrowGroup(cx, cy, rad, i*120 + (omega>=0?0:90), 90, omega>=0, "#4a5a80"));
        }
      };

      drawArrowsFor(layout.cxA, layout.cyA, geomA, omegaA);
      if(state.hasGearC) drawArrowsFor(layout.cxC, layout.cyC, geomC, omegaC);
      drawArrowsFor(layout.cxB, layout.cyB, geomB, omegaB);
    }

    function computeLayout(geomA, geomB, geomC){
      const totalWidth = state.hasGearC 
        ? (geomA.pitchRadius*2 + geomC.pitchRadius*2 + geomB.pitchRadius*2)
        : (geomA.pitchRadius*2 + geomB.pitchRadius*2);
      
      const cy = document.fullscreenElement ? 360 : 390; 
      const cxA = (1400 - totalWidth) / 2 + geomA.pitchRadius;
      
      if(state.hasGearC) {
        const cxC = cxA + geomA.pitchRadius + geomC.pitchRadius;
        const cxB = cxC + geomC.pitchRadius + geomB.pitchRadius;
        return { cxA, cyA: cy, cxB, cyB: cy, cxC, cyC: cy };
      } else {
        const cxB = cxA + geomA.pitchRadius + geomB.pitchRadius;
        return { cxA, cyA: cy, cxB, cyB: cy };
      }
    }

    function render(){
      const dynamicModule = computeDynamicModule(state.teethA, state.teethB, state.teethC, state.hasGearC);
      const geomA = buildGearGeometry(state.teethA, dynamicModule);
      const geomB = buildGearGeometry(state.teethB, dynamicModule);
      const geomC = state.hasGearC ? buildGearGeometry(state.teethC, dynamicModule) : null;
      
      const phases = computePhaseOffsets(state.teethA, state.teethB, state.teethC, state.hasGearC);
      state.layout = computeLayout(geomA, geomB, geomC);
      
      const angleA = state.angleA;
      const omegaA = state.omegaA; // Ceci contient déjà le sens (positif ou négatif)
      
      let angleB, omegaB, angleC, omegaC;
      if (state.hasGearC) {
        angleC = angleA * (-state.teethA / state.teethC);
        omegaC = omegaA * (-state.teethA / state.teethC);
        angleB = angleC * (-state.teethC / state.teethB); 
        omegaB = omegaC * (-state.teethC / state.teethB);
      } else {
        angleB = angleA * (-state.teethA / state.teethB);
        omegaB = omegaA * (-state.teethA / state.teethB);
        angleC = 0; omegaC = 0;
      }

      buildGearGroup(ui.gearAGroup, state.layout.cxA, state.layout.cyA, geomA, angleA + phases.phaseA, angleA, omegaA, COLOR_A, "A", STROKE_A);
      buildGearGroup(ui.gearBGroup, state.layout.cxB, state.layout.cyB, geomB, angleB + phases.phaseB, angleB, omegaB, COLOR_B, "B", STROKE_B);
      
      if(state.hasGearC) {
        ui.gearCGroup.style.display = "block";
        buildGearGroup(ui.gearCGroup, state.layout.cxC, state.layout.cyC, geomC, angleC + phases.phaseC, angleC, omegaC, COLOR_C, "C", STROKE_C);
      } else {
        ui.gearCGroup.style.display = "none";
      }

      drawOverlay(state.layout, geomA, omegaA, geomB, omegaB, geomC, omegaC);
      updateInfo();
    }

    function resetAngles(){
      state.angleA = 0;
      state.oneTurnMode = false;
      render();
    }

    window.changeTeeth = function(gear, delta) {
      if(gear === 'A') updateTeeth(state.teethA + delta, state.teethB, state.teethC);
      else if(gear === 'B') updateTeeth(state.teethA, state.teethB + delta, state.teethC);
      else if(gear === 'C') updateTeeth(state.teethA, state.teethB, state.teethC + delta);
    };

    function updateTeeth(valA, valB, valC){
      state.teethA = clamp(valA || 12, 8, 60);
      state.teethB = clamp(valB || 24, 8, 60);
      state.teethC = clamp(valC || 16, 8, 60);
      ui.teethA.value = state.teethA; ui.fsTeethA.value = state.teethA;
      ui.teethB.value = state.teethB; ui.fsTeethB.value = state.teethB;
      ui.teethC.value = state.teethC; ui.fsTeethC.value = state.teethC;
      resetAngles(); 
    }

    ui.teethA.addEventListener("input", (e) => updateTeeth(parseInt(e.target.value, 10), state.teethB, state.teethC));
    ui.teethB.addEventListener("input", (e) => updateTeeth(state.teethA, parseInt(e.target.value, 10), state.teethC));
    ui.teethC.addEventListener("input", (e) => updateTeeth(state.teethA, state.teethB, parseInt(e.target.value, 10)));
    ui.fsTeethA.addEventListener("input", (e) => updateTeeth(parseInt(e.target.value, 10), state.teethB, state.teethC));
    ui.fsTeethB.addEventListener("input", (e) => updateTeeth(state.teethA, parseInt(e.target.value, 10), state.teethC));
    ui.fsTeethC.addEventListener("input", (e) => updateTeeth(state.teethA, state.teethB, parseInt(e.target.value, 10)));

    function toggleGearC(checked) {
      state.hasGearC = checked;
      ui.panelHasGearC.checked = checked;
      ui.fsHasGearC.checked = checked;
      if(checked) {
        ui.rowGearC.classList.remove("hidden");
        ui.fsRowGearC.classList.remove("hidden");
      } else {
        ui.rowGearC.classList.add("hidden");
        ui.fsRowGearC.classList.add("hidden");
      }
      updateMarkerModeAvailability();
      resetAngles();
    }
    ui.panelHasGearC.addEventListener("change", (e) => toggleGearC(e.target.checked));
    ui.fsHasGearC.addEventListener("change", (e) => toggleGearC(e.target.checked));

    // NOUVELLE LOGIQUE DE VITESSE ABSOLUE (0 à 360)
    window.changeSpeed = function(delta) { setSpeed(state.speedMagnitude + delta); };
    
    function setSpeed(v){
      state.speedMagnitude = clamp(Math.abs(Math.round(v)), 0, 360);
      state.omegaA = state.speedMagnitude * state.speedDirection;
      ui.speedNumber.value = state.speedMagnitude;
      ui.fsSpeed.value = state.speedMagnitude; 
      render();
    }

    ui.speedNumber.addEventListener("input", (e) => { let val = parseInt(e.target.value, 10); if(!isNaN(val)) setSpeed(val); });
    ui.fsSpeed.addEventListener("input", (e) => { let val = parseInt(e.target.value, 10); if(!isNaN(val)) setSpeed(val); });
    
    document.querySelectorAll("[data-speed-step]").forEach(btn => {
      btn.addEventListener("click", () => setSpeed(state.speedMagnitude + parseInt(btn.dataset.speedStep, 10)));
    });
    
    document.getElementById("speedZeroBtn").addEventListener("click", () => setSpeed(0));
    
    // Le bouton Inverser ne fait que changer le signe du sens
    ui.reverseBtn.addEventListener("click", () => {
      state.speedDirection *= -1;
      state.omegaA = state.speedMagnitude * state.speedDirection;
      render();
    });

    function syncCheckboxes(stateKey, id1, id2) {
      ui[id1].addEventListener("change", (e) => { state[stateKey] = e.target.checked; ui[id2].checked = e.target.checked; render(); });
      ui[id2].addEventListener("change", (e) => { state[stateKey] = e.target.checked; ui[id1].checked = e.target.checked; render(); });
    }
    syncCheckboxes("showArrows", "panelShowArrows", "fsShowArrows");
    syncCheckboxes("showMarker", "panelShowMarker", "fsShowMarker");
    function syncSelects(stateKey, id1, id2) {
      ui[id1].addEventListener("change", (e) => {
        state[stateKey] = (state.hasGearC && e.target.value === "facing") ? "top" : e.target.value;
        updateMarkerModeAvailability();
        render();
      });
      ui[id2].addEventListener("change", (e) => {
        state[stateKey] = (state.hasGearC && e.target.value === "facing") ? "top" : e.target.value;
        updateMarkerModeAvailability();
        render();
      });
    }
    syncSelects("markerMode", "panelMarkerMode", "fsMarkerMode");
    syncSelects("markerReference", "panelMarkerReference", "fsMarkerReference");
    syncCheckboxes("showLabels", "panelShowLabels", "fsShowLabels");
    syncCheckboxes("showTurns", "panelShowTurns", "fsShowTurns");
    syncCheckboxes("showSpeed", "panelShowSpeed", "fsShowSpeed");
    ui.panelShowPitch.addEventListener("change", (e) => { state.showPitch = e.target.checked; render(); });

    function togglePlay() {
      state.playing = !state.playing;
      const icon = state.playing ? "⏸" : "▶";
      ui.playPauseBtn.textContent = icon;
      ui.fsPlayPauseBtn.textContent = icon;
    }
    ui.playPauseBtn.addEventListener("click", togglePlay);
    ui.fsPlayPauseBtn.addEventListener("click", togglePlay);

    ui.resetBtn.addEventListener("click", resetAngles);
    ui.fsResetBtn.addEventListener("click", resetAngles);

    function doOneTurn(gear) {
      // Sens de rotation calculé sur la direction actuelle
      const direction = state.speedDirection; 
      const turnsOfA = gear === 'A' ? 1 : (state.teethB / state.teethA); 
      state.oneTurnMode = true;
      state.oneTurnTarget = state.angleA + direction * 360 * turnsOfA;
      state.playing = true;
      ui.playPauseBtn.textContent = "⏸";
      ui.fsPlayPauseBtn.textContent = "⏸";
    }

    ui.panelOneTurnABtn.addEventListener("click", () => doOneTurn('A'));
    ui.fsOneTurnABtn.addEventListener("click", () => doOneTurn('A'));
    ui.panelOneTurnBBtn.addEventListener("click", () => doOneTurn('B'));
    ui.fsOneTurnBBtn.addEventListener("click", () => doOneTurn('B'));

    function toggleFullscreen() {
      if (!document.fullscreenElement) { stageWrap.requestFullscreen().catch(err => console.error(err)); } 
      else { document.exitFullscreen(); }
    }
    ui.fullscreenBtn.addEventListener("click", toggleFullscreen);
    ui.fsFullscreenBtn.addEventListener("click", toggleFullscreen);

    document.addEventListener("fullscreenchange", () => {
      if(!document.fullscreenElement) {
        state.fsMenuOpen = false;
        ui.fsSettingsPanel.classList.remove("open");
      }
      render(); 
    });

    let isDragging = false; let draggedGear = null; let lastMouseAngle = 0; let wasPlayingBeforeDrag = false;

    function getMouseCoords(e) {
      let cx = e.clientX, cy = e.clientY;
      if (e.touches && e.touches.length > 0) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      const pt = svgStage.createSVGPoint(); pt.x = cx; pt.y = cy;
      return pt.matrixTransform(svgStage.getScreenCTM().inverse());
    }

    function calculateAngle(x, y, cx, cy) { return Math.atan2(y - cy, x - cx) * 180 / Math.PI; }

    function onPointerDown(e, gearId) {
      e.preventDefault();
      isDragging = true; draggedGear = gearId; wasPlayingBeforeDrag = state.playing; state.playing = false; 
      ui.playPauseBtn.textContent = "▶"; ui.fsPlayPauseBtn.textContent = "▶";
      const coords = getMouseCoords(e);
      let cx, cy;
      if(gearId === 'A') { cx = state.layout.cxA; cy = state.layout.cyA; }
      else if(gearId === 'B') { cx = state.layout.cxB; cy = state.layout.cyB; }
      else { cx = state.layout.cxC; cy = state.layout.cyC; }
      lastMouseAngle = calculateAngle(coords.x, coords.y, cx, cy);
    }

    function onPointerMove(e) {
      if (!isDragging) return;
      e.preventDefault();
      const coords = getMouseCoords(e);
      let cx, cy;
      if(draggedGear === 'A') { cx = state.layout.cxA; cy = state.layout.cyA; }
      else if(draggedGear === 'B') { cx = state.layout.cxB; cy = state.layout.cyB; }
      else { cx = state.layout.cxC; cy = state.layout.cyC; }
      
      const currentMouseAngle = calculateAngle(coords.x, coords.y, cx, cy);
      let deltaAngle = currentMouseAngle - lastMouseAngle;

      if (deltaAngle > 180) deltaAngle -= 360;
      if (deltaAngle < -180) deltaAngle += 360;

      let newOmega = Math.round((draggedGear === "A" ? deltaAngle : -deltaAngle * (state.teethB / state.teethA)) * 10);
      
      // On met à jour la direction selon le glissement de la souris, sans que la vitesse n'affiche de moins.
      if (newOmega !== 0) state.speedDirection = newOmega > 0 ? 1 : -1;
      state.speedMagnitude = clamp(Math.abs(newOmega), 0, 360);
      state.omegaA = state.speedMagnitude * state.speedDirection;
      
      ui.speedNumber.value = state.speedMagnitude; 
      ui.fsSpeed.value = state.speedMagnitude;

      if (draggedGear === "A") { state.angleA += deltaAngle; state.angleB -= deltaAngle * (state.teethA / state.teethB); } 
      else { state.angleB += deltaAngle; state.angleA -= deltaAngle * (state.teethB / state.teethA); }

      lastMouseAngle = currentMouseAngle; render(); 
    }

    function onPointerUp() {
      if (!isDragging) return;
      isDragging = false; draggedGear = null;
      if (wasPlayingBeforeDrag) { state.playing = true; ui.playPauseBtn.textContent = "⏸"; ui.fsPlayPauseBtn.textContent = "⏸"; }
    }

    ui.gearAGroup.addEventListener("mousedown", (e) => onPointerDown(e, "A"));
    ui.gearBGroup.addEventListener("mousedown", (e) => onPointerDown(e, "B"));
    ui.gearCGroup.addEventListener("mousedown", (e) => onPointerDown(e, "C"));
    ui.gearAGroup.addEventListener("touchstart", (e) => onPointerDown(e, "A"), {passive: false});
    ui.gearBGroup.addEventListener("touchstart", (e) => onPointerDown(e, "B"), {passive: false});
    ui.gearCGroup.addEventListener("touchstart", (e) => onPointerDown(e, "C"), {passive: false});

    window.addEventListener("mousemove", onPointerMove); window.addEventListener("mouseup", onPointerUp);
    window.addEventListener("touchmove", onPointerMove, {passive: false}); window.addEventListener("touchend", onPointerUp);

    let previousTime = null;

    function animate(timestamp){
      if(previousTime === null) previousTime = timestamp;
      const dt = (timestamp - previousTime) / 1000;
      previousTime = timestamp;

      if(state.playing && !isDragging){
        state.angleA += state.omegaA * dt;

        if(state.oneTurnMode){
          // Vérification selon le sens de rotation actuel
          if((state.speedDirection >= 0 && state.angleA >= state.oneTurnTarget) || (state.speedDirection < 0 && state.angleA <= state.oneTurnTarget)){
            state.angleA = state.oneTurnTarget;
            state.oneTurnMode = false; state.playing = false;
            ui.playPauseBtn.textContent = "▶"; ui.fsPlayPauseBtn.textContent = "▶";
          }
        }
        render(); 
      }
      requestAnimationFrame(animate);
    }

    render(); 
    requestAnimationFrame(animate);

  </script>
</body>
</html>
