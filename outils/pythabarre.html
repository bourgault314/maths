  }

  function chooseMissingMode(exampleIndex){
    const mode = missingModeInput.value;
    if(mode === "hyp") return "hyp";
    if(mode === "leg") return exampleIndex % 2 === 0 ? "leg1" : "leg2";
    return ["hyp", "leg1", "leg2"][exampleIndex % 3];
  }

  function setSideInput(side, value, sideNames){
    const index = sideNames.findIndex(s => sameSide(s, side));
    if(index >= 0) inputEls[index].value = value;
  }

  function applySelectedExample(){
    updateSideLabels();
    const list = currentExampleList();
    if(!list.length) return;
    const idx = Math.max(0, Math.min(list.length-1, Number(exampleIndexInput.value || 0)));
    const ex = list[idx];
    const [a,b,c] = ex.triplet.map(n => n * ex.coeff);
    const letters = normalizeName(triangleNameInput.value);
    const right = rightAngleInput.value || letters[0];
    const sideNames = sidesFromLetters(letters);
    const hyp = sideInInputOrder(hypotenuseForRightAngle(letters,right), sideNames);
    const legs = otherLegs(letters,right).map(s => sideInInputOrder(s, sideNames));
    inputEls.forEach(input => input.value = "");
    const missing = chooseMissingMode(idx);
    setSideInput(legs[0], missing === "leg1" ? "?" : fmt(a), sideNames);
    setSideInput(legs[1], missing === "leg2" ? "?" : fmt(b), sideNames);
    setSideInput(hyp, missing === "hyp" ? "?" : fmt(c), sideNames);
    renderMenuPreview();
  }

  function nextExample(step=1){
    const list = currentExampleList();
    if(!list.length) return;
    const current = Number(exampleIndexInput.value || 0);
    const next = (current + step + list.length) % list.length;
    exampleIndexInput.value = String(next);
    nextRotation = Math.floor(Math.random()*4);
    applySelectedExample();
  }

  function normalizeName(raw){
    const clean = String(raw || "ABC").toUpperCase().replace(/[^A-ZÀ-ÖØ-Ý]/g, "");
    const padded = (clean + "ABC").slice(0,3);
    const arr = padded.split("");
    if(new Set(arr).size !== 3) return ["A","B","C"];
    return arr;
  }

  function updateSideLabels(){
    const letters = normalizeName(triangleNameInput.value);
    const names = sidesFromLetters(letters);
    names.forEach((name,i) => labelEls[i].textContent = name);
    [...rightAngleInput.options].forEach((opt,i) => { opt.textContent = letters[i]; opt.value = letters[i]; });
    if(!letters.includes(rightAngleInput.value)) rightAngleInput.value = letters[0];
  }

  function parseLength(text){
    const raw = String(text ?? "").trim().replace(",", ".");
    if(raw === "" || raw === "?" || raw.toLowerCase() === "x") return {unknown:true, value:null};
    const n = Number(raw);
    if(!Number.isFinite(n) || n <= 0) return {error:true, raw};
    return {unknown:false, value:n};
  }

  function parseAnswer(text){
    const n = Number(String(text ?? "").trim().replace(",", "."));
    return Number.isFinite(n) ? n : null;
  }

  function parseDecomposeAnswer(text, h, k, expected){
    let raw = String(text ?? "").trim().replace(/,/g, ".").replace(/×/g, "*").replace(/−/g, "-");
    if(!raw) return null;
    const direct = parseAnswer(raw);
    if(direct !== null) return direct;
    raw = raw.replace(/\s+/g, "");
    const parts = raw.split("=");
    const expr = parts.length === 2 ? parts[1] : parts[0];
    const nums = expr.split("+").map(v => Number(v)).filter(Number.isFinite);
    if(nums.length === 2){
      const hasKnown = nums.some(n => approxEqual(n, k));
      const comp = nums.find(n => !approxEqual(n, k));
      if(hasKnown && Number.isFinite(comp)) return comp;
      if(approxEqual(nums[0] + nums[1], h)) return nums.find(n => approxEqual(n, expected)) ?? null;
    }
    return null;
  }

  function approxEqual(a,b){ return Math.abs(a-b) < 1e-9; }
  function square(n){ return Math.round(n*n*1000000000)/1000000000; }
  function fmt(n){
    if(!Number.isFinite(n)) return "";
    if(Math.abs(n - Math.round(n)) < 1e-10) return String(Math.round(n));
    return String(Math.round(n * 1000) / 1000).replace(".", ",");
  }
  function lengthAnswer(squareValue){
    const r = Math.sqrt(squareValue);
    if(Math.abs(r - Math.round(r)) < 1e-10) return fmt(r);
    return `${fmt(r)} environ`;
  }

  function normalizeUnit(raw){
    return String(raw ?? "").trim();
  }

  function unitSuffix(){
    const unit = normalizeUnit(model?.unit ?? unitInput?.value ?? "");
    return unit ? ` ${unit}` : "";
  }

  function lengthWithUnit(value){
    return `${fmt(value)}${unitSuffix()}`;
  }

  function lengthAnswerWithUnit(squareValue){
    const answer = lengthAnswer(squareValue);
    const suffix = unitSuffix();
    if(!suffix) return answer;
    return answer.endsWith(" environ")
      ? `${answer.slice(0, -8)}${suffix} environ`
      : `${answer}${suffix}`;
  }

  function reverseSide(s){ return s.split("").reverse().join(""); }
  function normalizeSideName(name){ return name.split("").sort().join(""); }
  function sameSide(a,b){ return normalizeSideName(a) === normalizeSideName(b); }
  function sidesFromLetters(letters){ return [letters[0]+letters[1], letters[0]+letters[2], letters[1]+letters[2]]; }
  function hypotenuseForRightAngle(letters,right){ return letters.filter(l => l !== right).join(""); }
  function otherLegs(letters,right){ return letters.filter(l => l !== right).map(l => right + l); }
  function sideInInputOrder(side, sideNames){ return sideNames.find(s => sameSide(s, side)) || side; }
  function plainSq(side){ return `${side}²`; }
  function valueSq(value){ return `${fmt(value)}²`; }
  function fmtOrRaw(v){ return typeof v === "number" ? fmt(v) : v; }

  function sideValue(side){
    const v = model.values[side] || model.values[reverseSide(side)];
    return v && !v.unknown ? v.value : null;
  }

  function showError(message){ buildError.textContent = message; buildError.classList.add("show"); }
  function hideError(){ buildError.classList.remove("show"); buildError.textContent = ""; }

  function buildModel(){
    hideError();
    updateSideLabels();
    const letters = normalizeName(triangleNameInput.value);
    const right = rightAngleInput.value || letters[0];
    const sideNames = sidesFromLetters(letters);
    const unit = normalizeUnit(unitInput.value);
    const values = {};
    sideNames.forEach((s,i) => values[s] = parseLength(inputEls[i].value));

    for(const s of sideNames){
      if(values[s].error){
        showError(`La longueur ${s} doit être un nombre positif, ou bien ? si elle est inconnue.`);
        return null;
      }
    }

    const unknownSides = sideNames.filter(s => values[s].unknown);
    if(unknownSides.length !== 1){
      showError("Il faut exactement une longueur inconnue : écris ? ou laisse une seule case vide.");
      return null;
    }

    const hyp = sideInInputOrder(hypotenuseForRightAngle(letters,right), sideNames);
    const legs = otherLegs(letters,right).map(s => sideInInputOrder(s, sideNames));
    const unknown = unknownSides[0];
    const unknownIsHyp = sameSide(unknown,hyp);

    if(unknownIsHyp){
      const leg1 = {side:legs[0], value:values[legs[0]]?.value ?? values[reverseSide(legs[0])]?.value};
      const leg2 = {side:legs[1], value:values[legs[1]]?.value ?? values[reverseSide(legs[1])]?.value};
      if(!Number.isFinite(leg1.value) || !Number.isFinite(leg2.value)){
        showError("Si on cherche l’hypoténuse, les deux côtés de l’angle droit doivent être connus.");
        return null;
      }
      return {letters,right,sideNames,values,unit,hyp,legs,unknown,unknownIsHyp,leg1,leg2, relationMode:relationModeInput.value, rotation:nextRotation, colorMap:makeColorMap()};
    }

    const unknownLeg = legs.find(l => sameSide(l,unknown));
    const knownLegName = legs.find(l => !sameSide(l,unknown));
    const hypValue = values[hyp]?.value ?? values[reverseSide(hyp)]?.value;
    const knownLegValue = values[knownLegName]?.value ?? values[reverseSide(knownLegName)]?.value;
    if(!unknownLeg || !Number.isFinite(hypValue) || !Number.isFinite(knownLegValue)){
      showError("Si on cherche un côté de l’angle droit, il faut connaître l’hypoténuse et l’autre côté de l’angle droit.");
      return null;
    }
    if(square(hypValue) <= square(knownLegValue)){
      showError("L’hypoténuse doit être la plus grande longueur. Ici, les données ne sont pas cohérentes pour un triangle rectangle.");
      return null;
    }
    return {letters,right,sideNames,values,unit,hyp,legs,unknown:unknownLeg,unknownIsHyp:false,knownHyp:{side:hyp,value:hypValue},knownLeg:{side:knownLegName,value:knownLegValue}, relationMode:relationModeInput.value, rotation:nextRotation, colorMap:makeColorMap()};
  }

  function correctSlots(){
    if(model.unknownIsHyp){
      return {lhs:model.hyp, rhs1:model.leg1.side, rhs2:model.leg2.side};
    }
    return {lhs:model.knownHyp.side, rhs1:model.knownLeg.side, rhs2:model.unknown};
  }

  function initialWork(){
    // Le guidage automatique concerne les étapes, pas le pré-remplissage de la relation.
    // La relation de Pythagore reste à construire par l’élève au démarrage.
    const auto = false;
    const slots = auto ? correctSlots() : {lhs:null, rhs1:null, rhs2:null};
    const w = {
      relationComplete:auto,
      relationSlots:slots,
      replaced:false,
      replacements:{},
      squares:{},
      regrouped:false,
      decomposed:false,
      removed:false,
      sqrt:false,
      concluded:false,
      operationChosen:false,
      operation:null,
      operationComputed:false,
      started:false,
      result:null
    };
    if(model.unknownIsHyp){
      w.result = square(model.leg1.value) + square(model.leg2.value);
    }else{
      w.result = square(model.knownHyp.value) - square(model.knownLeg.value);
    }
    return w;
  }

  function snapshot(){
    history.push(JSON.stringify({work, selectedSlot, activeChoiceMode, selectedChoiceSide, selectedCalcValue, message}));
    if(history.length > 50) history.shift();
  }
  function restore(){
    if(!history.length) return;
    const old = JSON.parse(history.pop());
    work = old.work;
    selectedSlot = old.selectedSlot;
    activeChoiceMode = old.activeChoiceMode || null;
    selectedChoiceSide = old.selectedChoiceSide || null;
    selectedCalcValue = old.selectedCalcValue ?? null;
    flashCell = null;
    message = old.message || "";
    render();
  }
  function mutate(fn){ snapshot(); fn(); render(); }

  function displaySettingsFromMenu(){
    // Les éléments essentiels restent toujours affichés : triangle, moulin, équation et tableau.
    // Seul l'œil peut masquer temporairement l'équation pendant la projection.
    display = { equation:true, bars:true, triangle:true, moulin:true };
  }

  function relationRows(){
    const rows = [];
    if(!work.started || !work.relationComplete) return rows;
    const op = work.operation || correctPartWholeOperation();
    if(model.unknownIsHyp){
      const l1 = model.leg1, l2 = model.leg2;
      rows.push({lhs:coloredTerm(model.hyp, plainSq(model.hyp)), rhs:`${coloredTerm(l1.side, plainSq(l1.side))} + ${coloredTerm(l2.side, plainSq(l2.side))}`});
      if(anyReplaced()) rows.push({lhs:coloredTerm(model.hyp, plainSq(model.hyp)), rhs:`${coloredTerm(l1.side, isReplaced(l1.side) ? valueSq(l1.value) : plainSq(l1.side))} + ${coloredTerm(l2.side, isReplaced(l2.side) ? valueSq(l2.value) : plainSq(l2.side))}`});
      if(work.squares[l1.side] || work.squares[l2.side]) rows.push({lhs:coloredTerm(model.hyp, plainSq(model.hyp)), rhs:`${coloredTerm(l1.side, displayKnownSquare(l1.side, l1.value))} + ${coloredTerm(l2.side, displayKnownSquare(l2.side, l2.value))}`});
      if(work.regrouped) rows.push({lhs:coloredTerm(model.hyp, plainSq(model.hyp)), rhs:coloredTerm(model.hyp, fmt(work.result))});
      if(work.sqrt) rows.push({lhs:model.hyp, rhs:`√${fmt(work.result)}`});
      if(work.concluded) rows.push({lhs:model.hyp, rhs:lengthAnswerWithUnit(work.result)});
    }else{
      const h = model.knownHyp, k = model.knownLeg, u = model.unknown;
      const useColor = !work.operationChosen;
      const rhs1 = work.relationSlots.rhs1 || k.side;
      const rhs2 = work.relationSlots.rhs2 || u;
      const rhsTerm = (side) => sameSide(side, k.side)
        ? maybeColoredTerm(k.side, plainSq(k.side), useColor)
        : maybeColoredTerm(u, plainSq(u), useColor);
      const rhsReplaced = (side) => sameSide(side, k.side)
        ? maybeColoredTerm(k.side, isReplaced(k.side) ? valueSq(k.value) : plainSq(k.side), useColor)
        : maybeColoredTerm(u, plainSq(u), useColor);
      const rhsSquared = (side) => sameSide(side, k.side)
        ? maybeColoredTerm(k.side, displayKnownSquare(k.side, k.value), useColor)
        : maybeColoredTerm(u, plainSq(u), useColor);
      rows.push({lhs:maybeColoredTerm(h.side, plainSq(h.side), useColor), rhs:`${rhsTerm(rhs1)} + ${rhsTerm(rhs2)}`});
      if(anyReplaced()) rows.push({lhs:maybeColoredTerm(h.side, isReplaced(h.side) ? valueSq(h.value) : plainSq(h.side), useColor), rhs:`${rhsReplaced(rhs1)} + ${rhsReplaced(rhs2)}`});
      if(work.squares[h.side] || work.squares[k.side]) rows.push({lhs:maybeColoredTerm(h.side, displayKnownSquare(h.side, h.value), useColor), rhs:`${rhsSquared(rhs1)} + ${rhsSquared(rhs2)}`});
      if(work.operationChosen) rows.push({lhs:operationLabel(op), rhs:plainSq(u)});
      if(work.decomposed) rows.push({lhs:plainSq(u), rhs:fmt(work.result)});
      if(work.sqrt) rows.push({lhs:u, rhs:`√${fmt(work.result)}`});
      if(work.concluded) rows.push({lhs:u, rhs:lengthAnswerWithUnit(work.result)});
    }
    return rows;
  }

  function maybeColoredTerm(side, text, active){
    return active ? coloredTerm(side, text) : text;
  }

  function coloredTerm(side, text){
    const cls = sideColorClass(side);
    if(!cls) return text;
    return `<span class="coloredTerm ${cls}">${text}</span>`;
  }

  function replaceTargets(){
    return squareTargets();
  }

  function isReplaced(side){
    if(!work) return false;
    return !!work.replaced || !!(work.replacements && work.replacements[side]);
  }

  function anyReplaced(){
    return replaceTargets().some(t => isReplaced(t.side));
  }

  function allReplaced(){
    return replaceTargets().every(t => isReplaced(t.side));
  }

  function displayKnownSquare(side, value){
    if(work.squares[side]) return fmt(work.squares[side]);
    if(isReplaced(side)) return valueSq(value);
    return plainSq(side);
  }

  function resetChoice(){
    activeChoiceMode = null;
    selectedChoiceSide = null;
    selectedCalcValue = null;
  }

  function setChoiceMode(mode){
    activeChoiceMode = mode;
    selectedChoiceSide = null;
    selectedCalcValue = null;
    choiceSeed = Math.floor(Math.random() * 1000000000);
    message = "";
    render();
  }

  function problemStatementHtml(){
    if(!model) return "";
    const triangleName = model.letters.join("");
    const unknownSide = model.unknownIsHyp ? model.hyp : model.unknown;
    const knownParts = model.sideNames
      .filter(side => !(model.values[side] && model.values[side].unknown))
      .map(side => `<span class="nowrap">${side} = ${lengthWithUnit(model.values[side].value)}</span>`);
    const knownText = knownParts.length ? `${knownParts.join(" et ")}. ` : "";
    return `Dans le triangle ${triangleName} rectangle en ${model.right}, ${knownText}Calculer <span class="nowrap">${unknownSide}</span>.`;
  }

  function proofIntroHtml(){
    if(!model) return "";
    const triangleName = model.letters.join("");
    return `Le triangle ${triangleName} est rectangle en ${model.right}, donc d’après le théorème de Pythagore, on a :`;
  }

  function guidedMode(){
    if(!work.started) return "start";
    if(!work.relationComplete) return null;
    if(!work.replaced) return "replace";
    const targets = squareTargets();
    if(!allSquaresDone(targets)) return "calculate";
    if(!work.operationChosen) return "operation";
    if(!work.operationComputed) return "operationResult";
    if(!work.sqrt || !work.concluded) return "sqrt";
    return null;
  }

  function syncGuidedMode(){
    const mode = guidedMode();
    if(activeChoiceMode === mode) return;
    activeChoiceMode = mode;
    selectedChoiceSide = null;
    selectedCalcValue = null;
    choiceSeed = Math.floor(Math.random() * 1000000000);
  }

  function stepPrefix(n, text){
    return `<div class="instructionPill"><span class="stepNumber">${n}.</span><span class="stepText">${text}</span></div>`;
  }

  function currentInstruction(){
    if(!work.started) return "";
    if(!work.relationComplete){
      if(selectedSlot) return stepPrefix(1, "Clique sur l’aire d’un carré du moulin pour compléter la relation.");
      return stepPrefix(1, "Complète la relation de Pythagore : clique sur une case, puis sur l’aire d’un carré.");
    }
    if(!work.replaced){
      if(selectedChoiceSide) return stepPrefix(2, `Clique sur la case du tableau où placer ${valueSq(sideValue(selectedChoiceSide))}.`);
      return stepPrefix(2, "Remplace les longueurs connues par leurs valeurs.");
    }
    const targets = squareTargets();
    const missing = targets.filter(t => !work.squares[t.side]);
    if(missing.length){
      if(selectedCalcValue !== null) return stepPrefix(3, `Clique sur le carré qui vaut ${fmt(selectedCalcValue)}.`);
      return stepPrefix(3, "Calcule les carrés connus.");
    }
    if(!work.operationChosen) return stepPrefix(4, "Schéma partie-tout : choisis l’opération.");
    if(!work.operationComputed) return stepPrefix(5, "Calcule l’opération choisie.");
    if(!work.sqrt || !work.concluded) return stepPrefix(6, "Choisis le résultat de la racine carrée.");
    return "";
  }

  function render(){
    if(!model || !work) return;
    stage.classList.toggle("hideEquations", !display.equation);
    stage.classList.toggle("notStarted", !work.started);
    stage.classList.toggle("isConcluded", !!work.concluded);
    stage.classList.remove("hideBars", "hideVisual");
    workArea.classList.remove("onlyVisual", "onlyBars");
    syncEyeButton();
    syncGuidedMode();
    problemStatement.innerHTML = problemStatementHtml();
    proofIntro.innerHTML = work.started ? proofIntroHtml() : "";
    renderEquations();
    instructionZone.innerHTML = currentInstruction();
    renderSidePalette();
    renderTriangle();
    renderBars();
    renderActions();
    solution.textContent = "";
    actionZone.innerHTML = message ? `<div class="note${message.includes("pas") || message.includes("n’est") ? " errorNote" : ""}">${message}</div>` : "";
    setTimeout(() => equationHistory.scrollTop = equationHistory.scrollHeight, 0);
  }

  function renderEquations(){
    if(!work.started){
      equationHistory.innerHTML = "";
      return;
    }
    if(!work.relationComplete){
      equationHistory.innerHTML = relationEditorHtml();
      bindRelationSlotButtons(equationHistory);
      return;
    }
    const rows = relationRows();
    let html = `<table class="equationTable" aria-label="Historique d'équations"><tbody>`;
    rows.forEach((row,i) => {
      const classes = [i === rows.length - 1 ? "currentStep" : "historyStep"];
      if(work.concluded && i === rows.length - 1) classes.push("finalConclusion");
      html += `<tr class="${classes.join(" ")}"><td class="lhs">${row.lhs}</td><td class="eq">=</td><td class="rhs">${row.rhs}</td></tr>`;
    });
    html += `</tbody></table>`;
    equationHistory.innerHTML = html;
  }

  function relationEditorHtml(){
    const s = work.relationSlots;
    return `<div class="relationEditor" aria-label="Relation de Pythagore à compléter">
      ${slotButton("lhs", s.lhs)}
      <span class="equalsSign">=</span>
      ${slotButton("rhs1", s.rhs1)}
      <span class="plusSign">+</span>
      ${slotButton("rhs2", s.rhs2)}
    </div>`;
  }

  function slotButton(slot, side){
    const label = side ? plainSq(side) : "…²";
    const classes = ["slotBtn"];
    if(!side) classes.push("empty");
    if(side) classes.push(sideColorClass(side));
    if(selectedSlot === slot) classes.push("selected");
    return `<button type="button" class="${classes.join(" ")}" data-slot="${slot}">${label}</button>`;
  }

  function bindRelationSlotButtons(root){
    root.querySelectorAll("[data-slot]").forEach(btn => {
      btn.addEventListener("click", () => selectSlot(btn.dataset.slot));
    });
  }

  function selectSlot(slot){
    selectedSlot = slot;
    message = "";
    render();
  }

  function chooseSideForSlot(side){
    if(!work.started) return;
    if(!selectedSlot && !work.relationComplete){
      const firstEmpty = ["lhs","rhs1","rhs2"].find(k => !work.relationSlots[k]);
      selectedSlot = firstEmpty || "lhs";
    }
    if(!selectedSlot || work.relationComplete) return;
    mutate(() => {
      work.relationSlots[selectedSlot] = side;
      const filled = !!(work.relationSlots.lhs && work.relationSlots.rhs1 && work.relationSlots.rhs2);
      if(filled){
        if(relationSlotsAreCorrect(work.relationSlots)){
          work.relationComplete = true;
          selectedSlot = null;
          resetChoice();
          message = "";
        }else{
          selectedSlot = null;
          message = "La relation n’est pas correcte : clique sur une case pour la corriger.";
        }
      }else{
        const nextEmpty = ["lhs","rhs1","rhs2"].find(k => !work.relationSlots[k]);
        selectedSlot = nextEmpty || null;
        message = "";
      }
    });
  }

  function relationSlotsAreCorrect(s){
    return !!(s.lhs && s.rhs1 && s.rhs2)
      && sameSide(s.lhs, model.hyp)
      && !sameSide(s.rhs1, s.rhs2)
      && model.legs.some(l => sameSide(l, s.rhs1))
      && model.legs.some(l => sameSide(l, s.rhs2));
  }

  function validateRelation(){
    const s = work.relationSlots;
    if(!s.lhs || !s.rhs1 || !s.rhs2){
      message = "Il manque encore un côté.";
      render();
      return;
    }
    const good = relationSlotsAreCorrect(s);
    if(!good){
      message = "La relation n’est pas correcte.";
      render();
      return;
    }
    mutate(() => {
      work.relationComplete = true;
      selectedSlot = null;
      resetChoice();
      message = "";
    });
  }

  function clearRelation(){
    mutate(() => {
      work.relationSlots = {lhs:null, rhs1:null, rhs2:null};
      selectedSlot = null;
      resetChoice();
      message = "";
    });
  }

  function renderSidePalette(){
    sidePalette.classList.remove("show");
    sidePalette.innerHTML = "";

    if(!work.started){
      sidePalette.innerHTML = `<button type="button" class="startGuidedBtn" id="btnStartGuided">Commencer</button>`;
      sidePalette.classList.add("show");
      const startBtn = sidePalette.querySelector("#btnStartGuided");
      if(startBtn){
        startBtn.addEventListener("click", () => mutate(() => { work.started = true; message = ""; }));
      }
      return;
    }

    if(!work.relationComplete || !activeChoiceMode) return;

    if(activeChoiceMode === "replace"){
      const rawChoices = replaceTargets()
        .filter(t => !isReplaced(t.side))
        .map(t => ({label:valueSq(t.value), side:t.side}));
      const choices = seededShuffle(rawChoices, "replace:" + rawChoices.map(c => c.side + ":" + c.label).join("|"));
      sidePalette.innerHTML = choices.map(c => {
        const selected = sameSide(c.side, selectedChoiceSide || "") ? " selectedChoiceToken" : "";
        return `<button type="button" class="sideChoice${selected}" data-replace-choice="${c.side}">${c.label}</button>`;
      }).join("");
      sidePalette.classList.add("show");
      sidePalette.querySelectorAll("[data-replace-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedChoiceSide = btn.dataset.replaceChoice;
          selectedCalcValue = null;
          message = "";
          render();
        });
      });
      return;
    }

    if(activeChoiceMode === "calculate"){
      const choices = globalSquareResultChoices();
      sidePalette.innerHTML = choices.map(v => {
        const selected = selectedCalcValue !== null && approxEqual(v, selectedCalcValue) ? " selectedChoiceToken" : "";
        return `<button type="button" class="sideChoice${selected}" data-calc-choice="${v}">${fmt(v)}</button>`;
      }).join("");
      sidePalette.classList.add("show");
      sidePalette.querySelectorAll("[data-calc-choice]").forEach(btn => {
        btn.addEventListener("click", () => {
          selectedCalcValue = Number(btn.dataset.calcChoice);
          selectedChoiceSide = null;
          message = "";
          render();
        });
      });
      return;
    }

    if(activeChoiceMode === "operation"){
      const choices = partWholeOperationChoices();
      sidePalette.innerHTML = choices.map(op => `<button type="button" class="sideChoice" data-op-key="${op.key}">${operationLabel(op)}</button>`).join("");
      sidePalette.classList.add("show");
      sidePalette.querySelectorAll("[data-op-key]").forEach(btn => {
        btn.addEventListener("click", () => applyPartWholeOperation(btn.dataset.opKey));
      });
      return;
    }

    if(activeChoiceMode === "operationResult"){
      const op = work.operation || correctPartWholeOperation();
      const choices = operationResultChoices(op);
      sidePalette.innerHTML = `<div class="operationPrompt">${operationLabel(op)} =</div>` + choices.map(v => `<button type="button" class="sideChoice" data-op-result="${v}">${fmt(v)}</button>`).join("");
      sidePalette.classList.add("show");
      sidePalette.querySelectorAll("[data-op-result]").forEach(btn => {
        btn.addEventListener("click", () => applyPartWholeResult(Number(btn.dataset.opResult)));
      });
      return;
    }

    if(activeChoiceMode === "sqrt"){
      const rootText = `√${fmt(work.result)}`;
      const choices = sqrtResultChoices();
      sidePalette.innerHTML = `<div class="operationPrompt">${rootText} =</div>` + choices.map(v => {
        const label = sqrtChoiceLabel(v);
        return `<button type="button" class="sideChoice" data-sqrt-choice="${v}">${label}</button>`;
      }).join("");
      sidePalette.classList.add("show");
      sidePalette.querySelectorAll("[data-sqrt-choice]").forEach(btn => {
        btn.addEventListener("click", () => applySqrtChoice(Number(btn.dataset.sqrtChoice)));
      });
    }
  }

  function renderBars(){
    if(!display.bars || !work.started){ barPair.innerHTML = ""; return; }
    if(!work.relationComplete){
      const s = work.relationSlots;
      const top = [{slot:"lhs", side:s.lhs, main:s.lhs ? plainSq(s.lhs) : "…²"}];
      const bottom = [
        {slot:"rhs1", side:s.rhs1, main:s.rhs1 ? plainSq(s.rhs1) : "…²"},
        {slot:"rhs2", side:s.rhs2, main:s.rhs2 ? plainSq(s.rhs2) : "…²"}
      ];
      barPair.innerHTML = renderBarLine(top,"top", true) + renderBarLine(bottom,"bottom", true);
      bindRelationSlotButtons(barPair);
      return;
    }
    const bar = model.unknownIsHyp ? hypBar() : legBar();
    barPair.innerHTML = renderBarLine(bar.top,"top", false) + renderBarLine(bar.bottom,"bottom", false);
    [...barPair.querySelectorAll("[data-replace]")].forEach(el => {
      el.addEventListener("click", () => selectReplaceSide(el.dataset.replace));
    });
    [...barPair.querySelectorAll("[data-compute]")].forEach(el => {
      el.addEventListener("click", () => selectComputeSide(el.dataset.compute));
    });
  }

  function renderBarLine(pieces, pos, relationSlots=false){
    const minCell = relationSlots ? 120 : 92;
    const cols = pieces.map(p => `minmax(${minCell}px, ${Math.max(0.7, Number(p.weight) || 1)}fr)`).join(" ");
    const draftClass = relationSlots ? " relationDraft" : "";
    let html = `<div class="barLine ${pos}${draftClass}" style="--cols:${cols}">`;
    pieces.forEach(p => {
      if(relationSlots){
        const classes = ["barPiece","barSlot"];
        if(!p.side) classes.push("empty");
        if(p.side) classes.push(sideColorClass(p.side));
        if(selectedSlot === p.slot) classes.push("selected");
        html += `<button type="button" class="${classes.join(" ")}" data-slot="${p.slot}"><span class="pieceMain">${p.main}</span></button>`;
      }else{
        const classes = ["barPiece", p.kind || "known"];
        if(p.colorClass) classes.push(p.colorClass);
        const pSide = p.side || p.replace || p.compute || null;
        if(flashCell && pSide && sameSide(flashCell.side, pSide)) classes.push(flashCell.kind === "bad" ? "clickWrong" : "clickFlash");
        if(p.solved) classes.push("solved");
        const attrs = `${p.replace ? ` data-replace="${p.replace}"` : ""}${p.compute ? ` data-compute="${p.compute}"` : ""}`;
        html += `<div class="${classes.join(" ")}"${attrs}><div class="pieceContent"><div class="pieceMain">${p.main}</div></div></div>`;
      }
    });
    html += `</div>`;
    return html;
  }

  function piece(kind, main, extra={}){ return {kind, main, weight:1, ...extra}; }

  function sideColorClass(side){
    if(!model || !side) return "";
    const map = model.colorMap || {hyp:"barColor1", leg1:"barColor2", leg2:"barColor3"};
    if(sameSide(side, model.hyp)) return map.hyp || "barColor1";
    if(sameSide(side, model.legs[0])) return map.leg1 || "barColor2";
    if(sameSide(side, model.legs[1])) return map.leg2 || "barColor3";
    return "";
  }

  function hypBar(){
    const l1 = model.leg1, l2 = model.leg2;
    const w1 = square(l1.value), w2 = square(l2.value);
    const total = w1 + w2;
    if(work.regrouped){
      return {top:[piece("unknown", plainSq(model.hyp), {weight:total, colorClass:sideColorClass(model.hyp)})], bottom:[piece("result", fmt(work.result), {weight:total, colorClass:sideColorClass(model.hyp)})]};
    }
    return {
      top:[piece("unknown", plainSq(model.hyp), {weight:total, colorClass:sideColorClass(model.hyp)})],
      bottom:[squarePieceForKnown(l1.side, l1.value, w1), squarePieceForKnown(l2.side, l2.value, w2)]
    };
  }

  function legBar(){
    const h = model.knownHyp, k = model.knownLeg, u = model.unknown;
    const hSq = square(h.value);
    const kSq = square(k.value);
    const rest = work.result ?? (hSq - kSq);
    const unknownPiece = (opts={}) => piece("unknown", plainSq(u), {weight:rest, colorClass:sideColorClass(u), ...opts});
    const knownPiece = (neutral=false) => squarePieceForKnown(k.side, k.value, kSq, neutral);
    function orderedBottom(known, unknown){
      const r1 = work.relationSlots.rhs1;
      const r2 = work.relationSlots.rhs2;
      if(r1 && r2 && sameSide(r1, u) && sameSide(r2, k.side)) return [unknown, known];
      return [known, unknown];
    }
    if(work.removed){
      const knownRemoved = piece("removed", fmt(kSq), {weight:kSq});
      const unknownAfter = piece("unknown", plainSq(u), {weight:rest, solved:work.concluded, colorClass:"focusUnknown"});
      return {
        top:orderedBottom(piece("removed", fmt(kSq), {weight:kSq}), piece("result", fmt(rest), {weight:rest, colorClass:"neutralAfterDecompose"})),
        bottom:orderedBottom(knownRemoved, unknownAfter)
      };
    }
    if(work.decomposed){
      return {
        top:orderedBottom(piece("decomposed", fmt(kSq), {weight:kSq, colorClass:"neutralAfterDecompose"}), piece("result", fmt(rest), {weight:rest, colorClass:"neutralAfterDecompose"})),
        bottom:orderedBottom(knownPiece(true), piece("unknown", plainSq(u), {weight:rest, colorClass:"focusUnknown"}))
      };
    }
    return {
      top:[squarePieceForKnown(h.side, h.value, hSq)],
      bottom:orderedBottom(knownPiece(false), unknownPiece())
    };
  }

  function squarePieceForKnown(side, value, weight=null, neutral=false){
    const w = Number.isFinite(weight) ? weight : square(value);
    const colorClass = neutral ? "neutralAfterDecompose" : sideColorClass(side);
    if(!isReplaced(side)) return piece("known", plainSq(side), {side, replace:side, weight:w, colorClass});
    if(work.squares[side]) return piece("known", fmt(work.squares[side]), {side, weight:w, colorClass});
    return piece("known", valueSq(value), {side, compute:side, weight:w, colorClass});
  }

  function renderActions(){
    // Mode guidé : les anciens boutons d’étapes disparaissent.
    // L’étape active est indiquée dans la consigne, et les choix/action du moment
    // apparaissent dans la bande de propositions.
    mainActions.innerHTML = "";
  }

  function squareTargets(){
    return model.unknownIsHyp ? [model.leg1, model.leg2] : [model.knownHyp, model.knownLeg];
  }
  function allSquaresDone(targets){ return targets.every(t => !!work.squares[t.side]); }

  function flashTableCell(side, kind="ok"){
    flashCell = {side, kind};
    window.clearTimeout(flashTableCell._timer);
    flashTableCell._timer = window.setTimeout(() => {
      flashCell = null;
      render();
    }, 520);
  }

  function selectReplaceSide(side){
    if(activeChoiceMode !== "replace") return;
    if(work.replaced || !replaceTargets().some(t => sameSide(t.side, side))) return;
    if(!selectedChoiceSide){
      flashTableCell(side, "bad");
      message = "Choisis d’abord une valeur.";
      render();
      return;
    }
    if(!sameSide(selectedChoiceSide, side)){
      flashTableCell(side, "bad");
      message = "Ce n’est pas la bonne case.";
      render();
      return;
    }
    flashTableCell(side, "ok");
    mutate(() => {
      work.replacements[side] = true;
      work.replaced = allReplaced();
      selectedChoiceSide = null;
      selectedCalcValue = null;
      if(work.replaced) activeChoiceMode = null;
      message = "";
    });
  }

  function selectComputeSide(side){
    if(activeChoiceMode !== "calculate") return;
    if(!work.replaced || work.squares[side] || !squareTargets().some(t => sameSide(t.side, side))) return;
    if(selectedCalcValue === null){
      flashTableCell(side, "bad");
      message = "Choisis d’abord un résultat.";
      render();
      return;
    }
    const expected = square(sideValue(side));
    if(!approxEqual(selectedCalcValue, expected)){
      flashTableCell(side, "bad");
      message = "Ce n’est pas la bonne case.";
      render();
      return;
    }
    flashTableCell(side, "ok");
    mutate(() => {
      work.squares[side] = expected;
      selectedCalcValue = null;
      selectedChoiceSide = null;
      if(allSquaresDone(squareTargets())) activeChoiceMode = null;
      message = "";
    });
  }

  function hashString(str){
    let h = 2166136261;
    for(let i=0;i<str.length;i++){
      h ^= str.charCodeAt(i);
      h = Math.imul(h, 16777619);
    }
    return h >>> 0;
  }

  function seededShuffle(values, salt=""){
    const arr = [...values];
    let s = (choiceSeed ^ hashString(salt)) >>> 0;
    function rnd(){
      s = (Math.imul(1664525, s) + 1013904223) >>> 0;
      return s / 4294967296;
    }
    for(let i=arr.length-1;i>0;i--){
      const j = Math.floor(rnd() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function globalSquareResultChoices(){
    const targets = squareTargets().filter(t => !work.squares[t.side]);
    const choices = [];
    function add(v){
      if(Number.isFinite(v) && !choices.some(x => approxEqual(x, v))) choices.push(v);
    }
    function concatSquareConfusion(v){
      if(Number.isInteger(v) && v >= 0 && v < 100){
        return Number(String(Math.round(v)) + "2");
      }
      return NaN;
    }
    if(targets.length >= 2){
      const a = targets[0].value;
      const b = targets[1].value;
      add(a * 2);
      add(square(a));
      add(concatSquareConfusion(a));
      add(concatSquareConfusion(b));
      add(square(b));
      add(b * 2);
      add(square(a) + a);
      add(Math.max(0, square(b) - b));
    }else if(targets.length === 1){
      const a = targets[0].value;
      const c = square(a);
      add(a * 2);
      add(c);
      add(concatSquareConfusion(a));
      add(c + a);
      add(Math.max(0, c - a));
      add(c + 2);
    }
    let guard = 1;
    const base = targets[0] ? square(targets[0].value) : 0;
    while(choices.length < 5 && guard < 20){
      add(base + guard * 3);
      guard++;
    }
    return seededShuffle(choices.slice(0, 5), "calculate:" + targets.map(t => t.side + ":" + t.value).join("|"));
  }

  function operationLabel(op){
    if(!op) return "";
    return `${fmt(op.left)} ${op.sign} ${fmt(op.right)}`;
  }

  function makeOperation(left, sign, right, correct=false){
    const result = sign === "+" ? left + right : left - right;
    return {key:`${fmt(left)}${sign}${fmt(right)}`.replace(/\s+/g,""), left, sign, right, result, correct};
  }

  function correctPartWholeOperation(){
    if(model.unknownIsHyp){
      const a = work.squares[model.leg1.side];
      const b = work.squares[model.leg2.side];
      return makeOperation(a, "+", b, true);
    }
    const h = work.squares[model.knownHyp.side];
    const k = work.squares[model.knownLeg.side];
    return makeOperation(h, "-", k, true);
  }

  function partWholeOperationChoices(){
    const choices = [];
    function add(op){
      if(Number.isFinite(op.result) && !choices.some(x => x.key === op.key)) choices.push(op);
    }
    if(model.unknownIsHyp){
      const a = work.squares[model.leg1.side];
      const b = work.squares[model.leg2.side];
      add(makeOperation(a, "+", b, true));
      add(makeOperation(Math.max(a,b), "-", Math.min(a,b), false));
      add(makeOperation(Math.min(a,b), "-", Math.max(a,b), false));
      add(makeOperation(a, "-", b, false));
    }else{
      const h = work.squares[model.knownHyp.side];
      const k = work.squares[model.knownLeg.side];
      add(makeOperation(h, "-", k, true));
      add(makeOperation(h, "+", k, false));
      add(makeOperation(k, "-", h, false));
      add(makeOperation(k, "+", h, false));
    }
    return seededShuffle(choices.slice(0, 4), "operation:" + choices.map(o => o.key).join("|"));
  }

  function applyPartWholeOperation(key){
    if(activeChoiceMode !== "operation") return;
    const choices = partWholeOperationChoices();
    const chosen = choices.find(op => op.key === key);
    if(!chosen || !chosen.correct){
      message = "Ce n’est pas l’opération adaptée.";
      render();
      return;
    }
    mutate(() => {
      work.operationChosen = true;
      work.operation = chosen;
      selectedChoiceSide = null;
      selectedCalcValue = null;
      message = "";
    });
  }

  function operationResultChoices(op){
    const correct = op.result;
    const choices = [];
    function add(v){
      if(Number.isFinite(v) && !choices.some(x => approxEqual(x, v))) choices.push(v);
    }
    add(correct);
    add(op.left + op.right);
    add(Math.abs(op.left - op.right));
    add(op.left);
    add(op.right);
    add(correct + 10);
    add(correct - 10);
    let guard = 1;
    while(choices.length < 5 && guard < 20){ add(correct + guard * 2); guard++; }
    return seededShuffle(choices.slice(0, 5), "operationResult:" + op.key);
  }

  function sqrtNumericAnswer(){
    return Math.sqrt(work.result);
  }

  function sqrtChoiceLabel(v){
    if(!Number.isFinite(v)) return "";
    if(Math.abs(v - Math.round(v)) < 1e-10) return fmt(v);
    return fmt(v);
  }

  function sqrtResultChoices(){
    const correct = sqrtNumericAnswer();
    const base = work.result;
    const choices = [];
    function add(v){
      if(Number.isFinite(v) && v >= 0 && !choices.some(x => approxEqual(x, v))) choices.push(v);
    }

    // Distracteurs volontaires :
    // - le carré lui-même (confusion √25 = 25),
    // - la moitié du nombre sous la racine, même si elle est décimale (√25 ≠ 12,5),
    // - le double de la racine,
    // - des voisins de la bonne racine.
    add(correct);
    add(base);
    add(base / 2);
    add(correct * 2);
    add(Math.max(0, correct + 1));
    add(Math.max(0, correct - 1));
    add(Math.max(0, base - correct));
    add(Math.round(correct * 10) / 10 + 2);

    let guard = 1;
    while(choices.length < 5 && guard < 20){
      add(Math.max(0, Math.round(correct) + guard));
      guard++;
    }
    return seededShuffle(choices.slice(0, 5), "sqrt:" + base);
  }

  function applySqrtChoice(choice){
    if(activeChoiceMode !== "sqrt") return;
    const expected = sqrtNumericAnswer();
    if(!approxEqual(choice, expected)){
      message = "Ce n’est pas le bon résultat de la racine carrée.";
      render();
      return;
    }
    mutate(() => {
      work.sqrt = true;
      work.concluded = true;
      selectedChoiceSide = null;
      selectedCalcValue = null;
      message = "";
    });
  }

  function applyPartWholeResult(choice){
    if(activeChoiceMode !== "operationResult") return;
    const op = work.operation || correctPartWholeOperation();
    if(!approxEqual(choice, op.result)){
      message = "Ce n’est pas le bon résultat.";
      render();
      return;
    }
    mutate(() => {
      work.result = op.result;
      work.operationComputed = true;
      if(model.unknownIsHyp){
        work.regrouped = true;
      }else{
        work.decomposed = true;
        work.removed = true;
      }
      selectedChoiceSide = null;
      selectedCalcValue = null;
      message = "";
    });
  }

  function regroupChoices(){
    const a = work.squares[model.leg1.side];
    const b = work.squares[model.leg2.side];
    const correct = a + b;
    const choices = [];
    function add(v){
      if(Number.isFinite(v) && v >= 0 && !choices.some(x => approxEqual(x, v))) choices.push(v);
    }
    add(a + b - Math.min(a,b));
    add(correct);
    add(Number(String(Math.round(Math.sqrt(a))) + String(Math.round(Math.sqrt(b)))));
    add(Math.abs(a - b));
    add(a * b);
    add(correct + Math.min(a,b));
    return seededShuffle(choices.slice(0, 4), "regroup:" + a + ":" + b);
  }

  function applyRegroupChoice(choice){
    if(activeChoiceMode !== "regroup") return;
    const a = work.squares[model.leg1.side];
    const b = work.squares[model.leg2.side];
    const expected = a + b;
    if(!approxEqual(choice, expected)){
      message = "Ce n’est pas la bonne somme.";
      render();
      return;
    }
    mutate(() => {
      work.result = expected;
      work.regrouped = true;
      resetChoice();
      message = "";
    });
  }

  function squareResultChoices(side){
    const value = sideValue(side);
    const correct = square(value);
    const candidates = [];
    function add(v){
      if(Number.isFinite(v) && !candidates.some(x => approxEqual(x,v))) candidates.push(v);
    }
    add(value * 2);
    add(correct);
    if(Number.isInteger(value) && value >= 0 && value < 100){
      add(Number(String(Math.round(value)) + "2"));
    }
    add(correct + value);
    add(Math.max(0, correct - value));
    const wrongs = candidates.filter(v => !approxEqual(v, correct)).slice(0,2);
    const choices = [wrongs[0], correct, wrongs[1]].filter(v => Number.isFinite(v));
    return choices;
  }

  function askRegroup(){
    const a = work.squares[model.leg1.side], b = work.squares[model.leg2.side];
    openNumberDialog({
      title:"Regrouper",
      text:`Quelle est la somme ?<br><strong>${fmt(a)} + ${fmt(b)}</strong>`,
      expected:a+b,
      error:"Ce n’est pas la somme des deux carrés.",
      onValid:(answer) => mutate(() => { work.result = answer; work.regrouped = true; message = ""; })
    });
  }

  function askDecomposeHypSquare(){
    const h = work.squares[model.knownHyp.side];
    const k = work.squares[model.knownLeg.side];
    openNumberDialog({
      title:"Décomposer",
      text:`Écris le complément ou la décomposition complète.<br><strong>${fmt(h)} = ${fmt(k)} + ?</strong>`,
      expected:h-k,
      mode:"decompose",
      h,
      k,
      error:"Ce n’est pas la bonne décomposition.",
      onValid:(answer) => mutate(() => { work.result = answer; work.decomposed = true; message = ""; })
    });
  }

  function removeKnownSquareBothSides(){
    if(!work.decomposed || work.removed) return;
    mutate(() => { work.removed = true; message = ""; });
  }

  function openNumberDialog({title,text,expected,error,onValid,mode="number",h=null,k=null}){
    pendingDialog = {expected,error,onValid,mode,h,k};
    calcDialogTitle.innerHTML = title;
    calcDialogText.innerHTML = text;
    calcInput.value = "";
    calcError.classList.remove("show");
    calcError.textContent = "";
    calcDialog.showModal();
    setTimeout(() => calcInput.focus(), 60);
  }

  function validateDialog(){
    if(!pendingDialog) return;
    const answer = pendingDialog.mode === "decompose"
      ? parseDecomposeAnswer(calcInput.value, pendingDialog.h, pendingDialog.k, pendingDialog.expected)
      : parseAnswer(calcInput.value);
    if(answer === null || !approxEqual(answer, pendingDialog.expected)){
      calcError.textContent = pendingDialog.error;
      calcError.classList.add("show");
      return;
    }
    const fn = pendingDialog.onValid;
    pendingDialog = null;
    calcDialog.close();
    fn(answer);
  }

  function finalSolutionText(){
    const side = model.unknownIsHyp ? model.hyp : model.unknown;
    return `${side} = ${lengthAnswerWithUnit(work.result)}`;
  }



  function escapeHtml(text){
    return String(text ?? "")
      .replace(/&/g,"&amp;")
      .replace(/</g,"&lt;")
      .replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;")
      .replace(/'/g,"&#39;");
  }

  function menuPreviewCoords(letters, right){
    const others = letters.filter(l => l !== right);
    return {
      [right]:{x:56,y:142},
      [others[0]]:{x:56,y:38},
      [others[1]]:{x:222,y:142}
    };
  }

  function menuPreviewVertexOffset(coords, l){
    const p = coords[l];
    const cx = 111, cy = 107;
    const dx = p.x - cx, dy = p.y - cy;
    const len = Math.hypot(dx,dy) || 1;
    return {x:dx/len*21, y:dy/len*21};
  }

  function menuPreviewSideValue(side, sideNames){
    const idx = sideNames.findIndex(s => sameSide(s, side));
    if(idx < 0) return "";
    const raw = String(inputEls[idx].value ?? "").trim();
    if(!raw) return `${side} =`;
    const unit = normalizeUnit(unitInput?.value ?? "");
    const suffix = unit && raw !== "?" ? ` ${unit}` : "";
    return `${side} = ${raw}${suffix}`;
  }


  function previewSideLabelPosition(a,b,coords,letters,side,hyp){
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const values = letters.map(l => coords[l]);
    const cx = values.reduce((s,p)=>s+p.x,0)/values.length;
    const cy = values.reduce((s,p)=>s+p.y,0)/values.length;
    const dx = b.x-a.x, dy = b.y-a.y, len = Math.hypot(dx,dy) || 1;
    let nx = -dy/len, ny = dx/len;
    const away = {x:mx-cx, y:my-cy};
    if(nx*away.x + ny*away.y < 0){ nx = -nx; ny = -ny; }
    const amount = sameSide(side,hyp) ? 36 : 30;
    return {x:mx + nx*amount, y:my + ny*amount};
  }

  function renderMenuPreview(){
    if(!menuPreviewSvg) return;
    const letters = normalizeName(triangleNameInput.value);
    let right = rightAngleInput.value || letters[0];
    if(!letters.includes(right)) right = letters[0];
    const sideNames = sidesFromLetters(letters);
    const hyp = sideInInputOrder(hypotenuseForRightAngle(letters,right), sideNames);
    const coords = menuPreviewCoords(letters, right);
    const points = letters.map(l => `${coords[l].x},${coords[l].y}`).join(" ");
    let html = `<polygon class="previewTriangle" points="${points}"/>`;
    html += `<path class="previewRightAngle" d="${rightAnglePath(coords, right, letters)}"/>`;
    for(const side of sideNames){
      const a = coords[side[0]], b = coords[side[1]];
      const mid = previewSideLabelPosition(a,b,coords,letters,side,hyp);
      const label = escapeHtml(menuPreviewSideValue(side, sideNames));
      const raw = String(inputEls[sideNames.findIndex(s => sameSide(s, side))]?.value ?? "").trim();
      const classes = ["previewSideText"];
      if(sameSide(side,hyp)) classes.push("previewHypText");
      if(raw === "?" || raw.toLowerCase() === "x") classes.push("previewUnknownText");
      html += `<text class="${classes.join(" ")}" x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
    }
    for(const l of letters){
      const p = coords[l];
      const off = menuPreviewVertexOffset(coords,l);
      html += `<circle class="previewVertexDot" cx="${p.x}" cy="${p.y}" r="5.5"/>`;
      html += `<text class="previewVertexText" x="${p.x+off.x}" y="${p.y+off.y}" text-anchor="middle" dominant-baseline="middle">${escapeHtml(l)}</text>`;
    }
    menuPreviewSvg.innerHTML = html;

  }

  function renderTriangle(){
    if(!display.triangle && !display.moulin){ triangleSvg.innerHTML = ""; return; }
    const coords = triangleCoordinates(model.letters, model.right);
    const centroid = triangleCentroid(coords, model.letters);
    const squareLabels = squareLabelsForTriangle();
    let html = "";

    if(display.moulin){
      for(const side of model.sideNames){
        const cls = sameSide(side, model.hyp) ? "squareHyp" : (sameSide(side, model.legs[0]) ? "squareLeg1" : "squareLeg2");
        const colorCls = sideColorClass(side);
        const sq = squarePolygon(coords[side[0]], coords[side[1]], centroid);
        const label = squareLabels[side] ?? squareLabels[reverseSide(side)] ?? plainSq(side);
        const canPickSquare = work.started && !work.relationComplete;
        const pickClass = canPickSquare ? " squarePick" : "";
        const pickAttr = canPickSquare ? ` data-square-side="${side}"` : "";
        html += `<polygon class="squareShape ${cls} ${colorCls}${pickClass}" points="${sq.points}"${pickAttr}/>`;
        html += `<text class="squareText" x="${sq.label.x}" y="${sq.label.y}" text-anchor="middle" dominant-baseline="middle">${label}</text>`;
      }
    }

    if(display.triangle){
      const points = model.letters.map(l => `${coords[l].x},${coords[l].y}`).join(" ");
      html += `<polygon class="triangleShape" points="${points}"/>`;
      html += `<path class="rightAngleMark" d="${rightAnglePath(coords, model.right, model.letters)}"/>`;

      const displayVals = displayValuesForTriangle();
      for(const side of model.sideNames){
        const a = side[0], b = side[1];
        const mid = sideLabelPosition(coords[a], coords[b]);
        const value = displayVals[side] ?? displayVals[reverseSide(side)] ?? "";
        const finalCls = (model.values[side]?.unknown || model.values[reverseSide(side)]?.unknown) && work.concluded ? " sideText finalSideText" : "sideText";
        html += `<text class="${finalCls}" x="${mid.x}" y="${mid.y}" text-anchor="middle" dominant-baseline="middle">${side} = ${value}</text>`;
      }

      for(const l of model.letters){
        const p = coords[l];
        const off = vertexOffset(coords,l);
        html += `<circle cx="${p.x}" cy="${p.y}" r="7" fill="#1d4ed8"/>`;
        html += `<text class="vertexText" x="${p.x+off.x}" y="${p.y+off.y}" text-anchor="middle" dominant-baseline="middle">${l}</text>`;
      }
    }

    if(!display.moulin){
      for(const side of model.sideNames){
        const a = coords[side[0]], b = coords[side[1]];
        html += `<line class="sideHit ${selectedSlot ? "activePick" : ""}" x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}" data-side="${side}"/>`;
      }
    }
    triangleSvg.innerHTML = html;
    triangleSvg.querySelectorAll("[data-square-side]").forEach(el => {
      el.addEventListener("click", () => chooseSideForSlot(el.dataset.squareSide));
    });
    triangleSvg.querySelectorAll("[data-side]").forEach(el => {
      el.addEventListener("click", () => chooseSideForSlot(el.dataset.side));
    });
  }

  function squareLabelsForTriangle(){
    const labels = {};
    for(const side of model.sideNames){
      const parsed = model.values[side];
      if(parsed.unknown){
        labels[side] = (work.regrouped || work.removed || work.sqrt || work.concluded) ? fmt(work.result) : plainSq(side);
      }else if(work.squares[side]){
        labels[side] = fmt(work.squares[side]);
      }else if(work.replaced){
        labels[side] = valueSq(parsed.value);
      }else{
        labels[side] = plainSq(side);
      }
    }
    return labels;
  }

  function triangleCoordinates(letters,right){
    const base = {R:{x:240,y:360}, U:{x:240,y:190}, L:{x:450,y:360}};
    const others = letters.filter(l => l !== right);
    const raw = {[right]:base.R, [others[0]]:base.U, [others[1]]:base.L};
    const rot = ((model && Number.isInteger(model.rotation)) ? model.rotation : 0) % 4;
    if(rot === 0) return raw;
    const center = {x:345,y:275};
    const target = {x:345,y:285};
    const rotated = {};
    for(const l of letters){
      const p = raw[l];
      let x = p.x - center.x;
      let y = p.y - center.y;
      let rx = x, ry = y;
      if(rot === 1){ rx = -y; ry = x; }
      else if(rot === 2){ rx = -x; ry = -y; }
      else if(rot === 3){ rx = y; ry = -x; }
      rotated[l] = {x:target.x + rx, y:target.y + ry};
    }
    return rotated;
  }

  function triangleCentroid(coords, letters){
    return {x:letters.reduce((s,l) => s + coords[l].x,0)/3, y:letters.reduce((s,l) => s + coords[l].y,0)/3};
  }

  function squarePolygon(a,b,centroid){
    const dx = b.x-a.x, dy = b.y-a.y;
    let n = {x:-dy, y:dx};
    const mid = {x:(a.x+b.x)/2, y:(a.y+b.y)/2};
    const away = {x:mid.x-centroid.x, y:mid.y-centroid.y};
    if(n.x*away.x + n.y*away.y < 0) n = {x:-n.x, y:-n.y};
    const p3 = {x:b.x+n.x, y:b.y+n.y};
    const p4 = {x:a.x+n.x, y:a.y+n.y};
    const label = {x:mid.x+n.x/2, y:mid.y+n.y/2};
    return {points:`${a.x},${a.y} ${b.x},${b.y} ${p3.x},${p3.y} ${p4.x},${p4.y}`, label};
  }

  function rightAnglePath(coords,right,letters){
    const p = coords[right];
    const others = letters.filter(l => l !== right).map(l => coords[l]);
    const size = 28;
    const v1 = unitVector(p, others[0]);
    const v2 = unitVector(p, others[1]);
    const a = {x:p.x + v1.x*size, y:p.y + v1.y*size};
    const b = {x:a.x + v2.x*size, y:a.y + v2.y*size};
    const c = {x:p.x + v2.x*size, y:p.y + v2.y*size};
    return `M ${a.x} ${a.y} L ${b.x} ${b.y} L ${c.x} ${c.y}`;
  }

  function unitVector(from,to){
    const dx = to.x-from.x, dy = to.y-from.y, d = Math.hypot(dx,dy) || 1;
    return {x:dx/d, y:dy/d};
  }

  function sideLabelPosition(a,b){
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const dx = b.x-a.x, dy = b.y-a.y, len = Math.hypot(dx,dy) || 1;
    let nx = -dy/len, ny = dx/len;
    if(my > 240 && ny > 0){ nx = -nx; ny = -ny; }
    if(Math.abs(dx) < 10){ nx = 1; ny = 0; }
    return {x:mx + nx*28, y:my + ny*28};
  }

  function vertexOffset(coords,l){
    const p = coords[l];
    if(p.x < 260 && p.y > 300) return {x:-26,y:26};
    if(p.x < 260 && p.y < 230) return {x:-26,y:-26};
    return {x:28,y:26};
  }

  function displayValuesForTriangle(){
    const values = {};
    for(const side of model.sideNames){
      const parsed = model.values[side];
      values[side] = parsed.unknown ? (work.concluded ? lengthAnswer(work.result) : "?") : fmt(parsed.value);
    }
    return values;
  }

  function eyeIconSvg(hidden=false){
    if(hidden){
      return `<svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 3l18 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/>
        <path d="M10.7 5.2A9.4 9.4 0 0 1 12 5c5.2 0 8.7 4.5 9.7 6.1.2.3.2.7 0 1.1a16 16 0 0 1-2.6 3.1" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M6.5 6.7A15.8 15.8 0 0 0 2.3 11c-.2.3-.2.7 0 1.1C3.3 13.7 6.8 18 12 18c1.3 0 2.5-.3 3.6-.8" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9.8 9.8a3.1 3.1 0 0 0 4.4 4.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>`;
    }
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M2.3 11.1C3.3 9.5 6.8 5 12 5s8.7 4.5 9.7 6.1c.2.3.2.7 0 1.1C20.7 13.8 17.2 18 12 18S3.3 13.8 2.3 12.2c-.2-.3-.2-.7 0-1.1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="11.7" r="3.2" fill="none" stroke="currentColor" stroke-width="2"/>
    </svg>`;
  }

  function syncEyeButton(){
    btnToggleEq.innerHTML = eyeIconSvg(!display.equation);
    btnToggleEq.title = display.equation ? "Masquer l’équation" : "Afficher l’équation";
    btnToggleEq.classList.toggle("is-hidden", !display.equation);
  }

  function start(){
    displaySettingsFromMenu();
    const built = buildModel();
    if(!built) return;
    model = built;
    work = initialWork();
    selectedSlot = null;
    resetChoice();
    message = "";
    history = [];
    appMain.classList.add("activeMode");
    render();
  }

  async function backToMenu(){
    if(document.fullscreenElement){
      try{ await document.exitFullscreen(); }catch(e){}
    }
    appMain.classList.remove("activeMode");
  }

  function applyRandom(){
    // Ancien bouton hasard : il sert désormais à avancer dans la progression du niveau choisi.
    nextExample(1);
  }

  function revealAll(){
    if(!model || !work) return;
    mutate(() => {
      work.started = true;
      work.relationSlots = correctSlots();
      work.relationComplete = true;
      squareTargets().forEach(t => { work.replacements[t.side] = true; });
      work.replaced = true;
      if(model.unknownIsHyp){
        work.squares[model.leg1.side] = square(model.leg1.value);
        work.squares[model.leg2.side] = square(model.leg2.value);
        work.operationChosen = true;
        work.operation = correctPartWholeOperation();
        work.result = work.squares[model.leg1.side] + work.squares[model.leg2.side];
        work.operationComputed = true;
        work.regrouped = true;
      }else{
        work.squares[model.knownHyp.side] = square(model.knownHyp.value);
        work.squares[model.knownLeg.side] = square(model.knownLeg.value);
        work.operationChosen = true;
        work.operation = correctPartWholeOperation();
        work.result = work.squares[model.knownHyp.side] - work.squares[model.knownLeg.side];
        work.operationComputed = true;
        work.decomposed = true;
        work.removed = true;
      }
      work.sqrt = true;
      work.concluded = true;
      selectedSlot = null;
      resetChoice();
      message = "";
    });
  }

  btnBuild.addEventListener("click", start);
  btnRandom.addEventListener("click", () => { nextExample(1); });
  btnPrevExample.addEventListener("click", () => { nextExample(-1); });
  btnStageRandom.addEventListener("click", () => { nextExample(1); start(); });
  exampleCategoryInput.addEventListener("change", () => { populateExampleIndexes(false); applySelectedExample(); });
  exampleIndexInput.addEventListener("change", () => { applySelectedExample(); });
  missingModeInput.addEventListener("change", () => { applySelectedExample(); renderMenuPreview(); });
  inputEls.forEach(input => input.addEventListener("input", renderMenuPreview));
  if(unitInput) unitInput.addEventListener("change", renderMenuPreview);
  triangleNameInput.addEventListener("input", () => { updateSideLabels(); applySelectedExample(); renderMenuPreview(); });
  rightAngleInput.addEventListener("change", () => { applySelectedExample(); renderMenuPreview(); });
  btnMenu.addEventListener("click", () => { backToMenu(); });
  btnToggleEq.addEventListener("click", () => { display.equation = !display.equation; render(); });
  btnFullscreen.addEventListener("click", async () => {
    if(!document.fullscreenElement){ try{ await stage.requestFullscreen(); }catch(e){} }
    else{ try{ await document.exitFullscreen(); }catch(e){} }
  });
  btnUndo.addEventListener("click", restore);
  btnRestart.addEventListener("click", () => { if(model){ work = initialWork(); selectedSlot = null; resetChoice(); message = ""; history = []; render(); } });
  btnReveal.addEventListener("click", revealAll);
  btnCalcApply.addEventListener("click", validateDialog);
  btnCalcAuto.addEventListener("click", () => {
    if(!pendingDialog) return;
    if(pendingDialog.mode === "decompose" && Number.isFinite(pendingDialog.h) && Number.isFinite(pendingDialog.k)){
      calcInput.value = `${fmt(pendingDialog.h)} = ${fmt(pendingDialog.k)} + ${fmt(pendingDialog.expected)}`;
    }else{
      calcInput.value = fmt(pendingDialog.expected);
    }
    calcInput.focus();
  });
  btnCalcCancel.addEventListener("click", () => { pendingDialog = null; calcDialog.close(); });
  calcInput.addEventListener("keydown", (e) => { if(e.key === "Enter") validateDialog(); });

  updateSideLabels();
  populateExampleCategories();
  applySelectedExample();
  renderMenuPreview();
  syncEyeButton();
})();
</script>
</body>
