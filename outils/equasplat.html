<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ÉquaSplat</title>
<style>
  :root{
    --bg:#f5f7fb;
    --panel:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#d8dee9;
    --blue:#3b82f6;
    --blue-soft:#dbeafe;
    --green:#16a34a;
    --green-soft:#dcfce7;
    --orange:#f97316;
    --orange-soft:#ffedd5;
    --red:#ef4444;
    --shadow:0 18px 50px rgba(15,23,42,.10);
    --radius:22px;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(circle at top left, rgba(59,130,246,.13), transparent 34rem),
      radial-gradient(circle at bottom right, rgba(22,163,74,.10), transparent 34rem),
      var(--bg);
    color:var(--ink);
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  }

  main{
    width:min(1240px, calc(100vw - 28px));
    margin:18px auto 32px;
    display:grid;
    grid-template-columns:310px minmax(0,1fr);
    gap:18px;
    align-items:start;
  }

  @media (max-width:900px){
    main{grid-template-columns:1fr}
  }

  .panel,.stage{
    background:rgba(255,255,255,.88);
    border:1px solid rgba(15,23,42,.08);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    backdrop-filter: blur(10px);
  }

  .panel{
    padding:16px;
    position:sticky;
    top:14px;
  }

  @media (max-width:900px){
    .panel{position:static}
  }

  .appTitle{
    text-align:center;
    font-size:34px;
    line-height:1;
    letter-spacing:-.055em;
    font-weight:950;
    margin:2px 0 16px;
  }

  label{
    display:block;
    margin:12px 0 5px;
    font-size:12px;
    color:var(--muted);
    font-weight:850;
    text-transform:uppercase;
    letter-spacing:.06em;
  }

  label .mathLetter{
    text-transform:none;
    font-style:italic;
    letter-spacing:0;
  }

  input,select{
    width:100%;
    border:1px solid rgba(15,23,42,.14);
    border-radius:14px;
    padding:11px 12px;
    background:white;
    color:var(--ink);
    font-size:15px;
    font-weight:700;
    outline:none;
  }

  input:focus,select:focus{
    border-color:rgba(59,130,246,.55);
    box-shadow:0 0 0 4px rgba(59,130,246,.12);
  }

  .grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
  }

  .grid3{
    display:grid;
    grid-template-columns:1fr 1fr 1fr;
    gap:8px;
  }

  .btnrow{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-top:12px;
  }

  button{
    border:none;
    border-radius:14px;
    padding:11px 13px;
    font-size:14px;
    font-weight:900;
    color:var(--ink);
    background:#eef2f7;
    cursor:pointer;
    transition:transform .08s ease, filter .12s ease, opacity .12s ease;
  }

  button:hover{filter:brightness(.98)}
  button:active{transform:translateY(1px)}
  button.primary{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:white;
  }
  button.green{
    background:linear-gradient(180deg,#22c55e,#16a34a);
    color:white;
  }
  button.orange{
    background:linear-gradient(180deg,#fb923c,#f97316);
    color:white;
  }
  button.ghost{
    background:transparent;
    border:1px solid rgba(15,23,42,.12);
  }
  button:disabled{
    opacity:.42;
    cursor:not-allowed;
    transform:none;
  }

  .infoBox{
    margin-top:12px;
    padding:10px 12px;
    border-radius:14px;
    background:#f8fafc;
    border:1px solid rgba(15,23,42,.08);
    color:#334155;
    font-size:14px;
    font-weight:850;
    text-align:center;
  }

  .infoBox strong{font-weight:950;color:#0f172a}

  .mini{
    color:var(--muted);
    font-size:12px;
    line-height:1.35;
    margin-top:10px;
  }

  .stage{
    padding:16px;
    min-height:660px;
    position:relative;
  }

  .stage:fullscreen{
    background:var(--bg);
    border-radius:0;
    width:100vw;
    height:100vh;
    padding:22px;
    display:flex;
    flex-direction:column;
  }

  .stage:fullscreen .board{
    flex:1;
    min-height:0;
  }

  .stageQuickActions{
    position:absolute;
    top:14px;
    right:14px;
    z-index:5;
    display:flex;
    gap:8px;
    align-items:center;
  }

  .quickBtn{
    width:44px;
    height:44px;
    padding:0;
    display:grid;
    place-items:center;
    border-radius:14px;
    font-size:22px;
    line-height:1;
    background:rgba(255,255,255,.94);
    border:1px solid rgba(15,23,42,.14);
    box-shadow:0 10px 24px rgba(15,23,42,.14);
    backdrop-filter:blur(8px);
  }

  .quickBtn:hover{background:#eef2f7}

  .diceBtn{
    font-family:"Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",system-ui,sans-serif;
    font-style:normal;
    transform:none;
  }

  .topbar{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    padding:4px 64px 16px 4px;
    text-align:center;
  }

  .equationHistory{
    width:min(900px,100%);
    margin:4px auto 0;
    display:flex;
    justify-content:center;
    align-items:flex-start;
    max-height:150px;
    overflow-y:auto;
    overscroll-behavior:contain;
    padding-right:4px;
  }

  .equationTable{
    border-collapse:collapse;
    margin:0 auto;
    font-size:clamp(22px,2.35vw,36px);
    font-weight:950;
    line-height:1.12;
  }

  .equationTable td{
    padding:0 8px;
    white-space:nowrap;
    vertical-align:baseline;
  }

  .equationTable .lhs{text-align:right}
  .equationTable .eq{
    text-align:center;
    color:#64748b;
    padding-left:14px;
    padding-right:14px;
  }
  .equationTable .rhs{text-align:left}
  .equationTable tr.historyStep{color:#64748b;opacity:.86}
  .equationTable tr.currentStep{color:#0f172a;opacity:1}
  .equationTable tr.currentStep .eq{color:#3b82f6}
  .equationTable tr.solvedStep{color:#166534;opacity:1}
  .equationTable tr.solvedStep .eq{color:#16a34a}

  .instructionZone{
    margin:0 auto 12px;
    width:min(880px,100%);
    min-height:46px;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:#334155;
    font-size:18px;
    font-weight:800;
    line-height:1.35;
  }

  .instructionZone strong{font-weight:950}

  .board{
    background:linear-gradient(180deg,rgba(255,255,255,.72),rgba(255,255,255,.36));
    border:1px solid rgba(15,23,42,.08);
    border-radius:24px;
    padding:10px;
    min-height:475px;
    display:grid;
    place-items:center;
  }

  #splatSvg{
    width:100%;
    height:100%;
    min-height:500px;
    display:block;
  }

  .tray{
    fill:rgba(255,255,255,.74);
    stroke:rgba(15,23,42,.20);
    stroke-width:3;
  }

  .trayTitle{
    font-size:24px;
    fill:#64748b;
    font-weight:950;
    text-anchor:middle;
  }

  .eqMiddle{
    font-size:70px;
    fill:#94a3b8;
    font-weight:950;
    text-anchor:middle;
    dominant-baseline:middle;
  }

  .tokenHitArea{
    pointer-events:all;
    cursor:grab;
  }

  .tokenCircle{
    fill:#eff6ff;
    stroke:#3b82f6;
    stroke-width:3;
    cursor:grab;
  }

  .tokenCircle.positive{
    fill:#eff6ff;
    stroke:#3b82f6;
  }

  .tokenCircle.relativePositive{
    fill:#ecfdf5;
    stroke:#16a34a;
  }

  .tokenCircle.negative{
    fill:#fff1f2;
    stroke:#e11d48;
  }

  .tokenCircle.zero{
    fill:#f1f5f9;
    stroke:#64748b;
  }

  .tokenDragGroup{
    cursor:grab;
    touch-action:none;
  }

  .tokenDragGroup.dragging{
    cursor:grabbing;
  }

  .tokenDragGroup.transientZero{
    animation: zeroPulseFade .95s ease-in-out forwards;
  }

  @keyframes zeroPulseFade{
    0%{opacity:1; transform:scale(1);}
    45%{opacity:1; transform:scale(1.08);}
    100%{opacity:0; transform:scale(.82);}
  }

  .tokenText{
    fill:#0f172a;
    font-size:50px;
    font-weight:950;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .splatShape{
    fill:#111827;
    stroke:rgba(0,0,0,.22);
    stroke-width:3;
    cursor:pointer;
  }

  .splatShape.oppositeX{
    fill:#4c1d95;
    stroke:rgba(76,29,149,.42);
  }

  .splatText{
    fill:#ffffff;
    font-size:38px;
    font-weight:950;
    font-family:Georgia,'Times New Roman',serif;
    font-style:italic;
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
  }

  .selectedOutline{
    fill:none;
    stroke:#f97316;
    stroke-width:7;
    opacity:.85;
    pointer-events:none;
  }

  .groupSelectedOutline{
    fill:none;
    stroke:#16a34a;
    stroke-width:7;
    opacity:.90;
    pointer-events:none;
  }

  .removedGroup{opacity:.28}
  .removedOverlay{
    fill:url(#hatch);
    stroke:rgba(15,23,42,.45);
    stroke-width:2;
    pointer-events:none;
  }

  .actionZone{
    margin-top:10px;
    display:flex;
    gap:10px;
    align-items:center;
    justify-content:center;
    flex-wrap:wrap;
    min-height:52px;
  }

  .toolBar{
    margin:14px 0 4px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
  }

  .toolBtn{
    border:1px solid rgba(15,23,42,.12);
    background:#f8fafc;
    color:#334155;
    font-size:16px;
    padding:14px 18px;
    border-radius:17px;
  }

  .toolBtn.active{
    background:linear-gradient(180deg,#60a5fa,#3b82f6);
    color:#fff;
    border-color:rgba(37,99,235,.30);
    box-shadow:0 10px 24px rgba(59,130,246,.18);
  }

  .addBothToolBtn{
    background:#ecfdf5;
    border-color:rgba(22,163,74,.24);
    color:#166534;
  }

  .addBothToolBtn:hover{
    background:#dcfce7;
  }

  .oppositeBothToolBtn{
    background:#f5f3ff;
    border-color:rgba(109,40,217,.24);
    color:#4c1d95;
  }

  .oppositeBothToolBtn:hover{
    background:#ede9fe;
  }

  .undoToolBtn{
    background:#fff7ed;
    border-color:rgba(249,115,22,.28);
    color:#9a3412;
  }

  .solution{
    display:none;
  }

  dialog{
    width:min(620px, calc(100vw - 28px));
    border:1px solid rgba(15,23,42,.10);
    border-radius:24px;
    padding:0;
    box-shadow:0 30px 100px rgba(15,23,42,.24);
  }

  dialog::backdrop{
    background:rgba(15,23,42,.35);
    backdrop-filter:blur(4px);
  }

  .dialogInner{
    padding:32px 36px 30px;
    text-align:center;
  }

  .dialogTitle{
    font-size:34px;
    font-weight:950;
    letter-spacing:-.04em;
    margin:0 0 12px;
    text-align:center;
  }

  .dialogText{
    color:var(--muted);
    font-size:21px;
    font-weight:750;
    line-height:1.42;
    margin-bottom:18px;
    text-align:center;
  }

  dialog label{
    text-align:center;
    margin-top:0;
    font-size:13px;
  }

  #decomposeInput{
    text-align:center;
    font-size:28px;
    font-weight:950;
    padding:17px 14px;
    margin-top:8px;
  }

  .presetChips{
    display:none;
    flex-wrap:wrap;
    justify-content:center;
    gap:12px;
    margin:14px 0 18px;
  }

  .presetChips.open{display:flex}

  .chip{
    padding:13px 17px;
    min-height:48px;
    border-radius:999px;
    background:#f1f5f9;
    border:1px solid rgba(15,23,42,.08);
    font-size:18px;
    font-weight:950;
    cursor:pointer;
  }

  .chip:hover{background:#e2e8f0}

  .helpMiniBtn{
    width:48px;
    height:48px;
    border-radius:999px;
    padding:0;
    display:inline-grid;
    place-items:center;
    margin:14px auto 2px;
    font-size:25px;
    background:#eef2f7;
    border:1px solid rgba(15,23,42,.10);
  }


  /* PATCH 1.2.1 — fenêtre de fusion plus lisible / tablette */
  #fusionDialog{
    width:min(640px, calc(100vw - 28px));
  }

  #fusionDialog .dialogInner{
    padding:34px 38px 32px;
  }

  #fusionDialog .dialogTitle{
    display:none;
  }

  #fusionDialog .dialogText{
    margin:2px 0 22px;
    color:#0f172a;
    font-size:clamp(38px,5vw,62px);
    font-weight:950;
    line-height:1.05;
    letter-spacing:-.05em;
  }

  #fusionDialog label{
    font-size:15px;
    font-weight:900;
    color:#64748b;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  #fusionInput{
    text-align:center;
    font-size:clamp(34px,4.8vw,58px);
    font-weight:950;
    padding:18px 16px;
    border-radius:18px;
    min-height:78px;
  }

  #fusionDialog .fusionFeedback{
    min-height:30px;
    margin-top:10px;
    font-size:18px;
    font-weight:900;
    color:#9a3412;
  }

  #fusionDialog .btnrow button{
    font-size:18px;
    padding:15px 22px;
    border-radius:18px;
  }


  /* PATCH 1.2.4 — fenêtre Ajouter aux deux membres plus lisible / tablette */
  #addBothDialog{
    width:min(600px, calc(100vw - 28px));
  }

  #addBothDialog .dialogInner{
    padding:34px 38px 32px;
  }

  #addBothDialog .dialogTitle{
    font-size:clamp(30px,4vw,44px);
    margin-bottom:14px;
  }

  #addBothDialog .dialogText{
    font-size:clamp(21px,2.5vw,28px);
    font-weight:850;
    line-height:1.28;
    margin-bottom:18px;
  }

  #addBothDialog label{
    font-size:16px;
    font-weight:900;
    color:#64748b;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  #addBothInput{
    text-align:center;
    font-size:clamp(34px,4.6vw,54px);
    font-weight:950;
    padding:18px 16px;
    border-radius:18px;
    min-height:76px;
  }

  #addBothDialog .fusionFeedback{
    min-height:30px;
    margin-top:10px;
    font-size:18px;
    font-weight:900;
    color:#9a3412;
  }

  #addBothDialog .btnrow button{
    font-size:18px;
    padding:15px 22px;
    border-radius:18px;
  }


  .addBothXChoices{
    display:none;
    margin:10px 0 2px;
    padding-top:10px;
    border-top:1px solid rgba(15,23,42,.08);
  }

  .addBothXChoices.open{
    display:block;
  }

  .addBothXTitle{
    margin-bottom:8px;
    color:#64748b;
    font-size:17px;
    font-weight:950;
    text-transform:uppercase;
    letter-spacing:.04em;
  }

  .addBothXCountRow{
    width:min(260px,100%);
    margin:0 auto 12px;
  }

  .addBothXCountRow label{
    margin:0 0 6px;
    text-align:center;
    font-size:13px;
  }

  #addBothXCount{
    text-align:center;
    font-size:26px;
    font-weight:950;
    padding:12px 14px;
    min-height:56px;
  }

  .addBothXButtons{
    display:flex;
    justify-content:center;
    gap:12px;
    flex-wrap:wrap;
  }

  .addBothXBtn{
    min-width:170px;
    min-height:70px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    background:#f5f3ff;
    border:1px solid rgba(91,33,182,.18);
    color:#3b0764;
  }

  .addBothXBtn.positiveX{
    background:#eff6ff;
    border-color:rgba(59,130,246,.20);
    color:#1d4ed8;
  }

  .addBothXBtn.oppositeX{
    background:#f5f3ff;
    border-color:rgba(91,33,182,.22);
    color:#3b0764;
  }

  .miniSplatWrap{
    display:inline-flex;
    align-items:center;
    gap:10px;
    font-weight:950;
  }

  .miniSplatSvg{
    width:50px;
    height:50px;
    flex:0 0 50px;
    display:block;
    filter:drop-shadow(0 5px 9px rgba(15,23,42,.18));
  }

  .miniSplatSvg text{
    font-family:Georgia,'Times New Roman',serif;
    font-style:italic;
    font-size:24px;
    font-weight:950;
    fill:#fff;
    text-anchor:middle;
    dominant-baseline:middle;
  }

  /* PATCH 1.3C — outil Regrouper : dialogue lisible / sélection verte */
  #groupDialog{
    width:min(600px, calc(100vw - 28px));
  }

  #groupDialog .dialogInner{
    padding:34px 38px 32px;
  }

  #groupDialog .dialogTitle{
    font-size:clamp(30px,4vw,44px);
    margin-bottom:14px;
  }

  #groupDialog .dialogText{
    font-size:clamp(23px,3vw,34px);
    font-weight:900;
    line-height:1.22;
    margin-bottom:18px;
    color:#0f172a;
  }

  #groupDialog label{
    font-size:16px;
    font-weight:900;
    color:#64748b;
    letter-spacing:.04em;
    text-transform:uppercase;
    margin-bottom:8px;
  }

  #groupInput{
    text-align:center;
    font-size:clamp(34px,4.6vw,54px);
    font-weight:950;
    padding:18px 16px;
    border-radius:18px;
    min-height:76px;
  }

  #groupDialog .fusionFeedback{
    min-height:30px;
    margin-top:10px;
    font-size:18px;
    font-weight:900;
    color:#9a3412;
  }

  #groupDialog .btnrow button{
    font-size:18px;
    padding:15px 22px;
    border-radius:18px;
  }

  dialog .btnrow{justify-content:center}

</style>
</head>
<body>
<main>
  <section class="panel">
    <div class="appTitle">ÉquaSplat</div>

    <label>Univers de travail</label>
    <select id="workUniverse" title="Choisir le monde de manipulation">
      <option value="positive" selected>Splat positif</option>
      <option value="relative">Splat relatif</option>
    </select>

    <label id="oppositeXModeLabel">Taches opposées</label>
    <select id="oppositeXMode" title="Autoriser les taches −x en Splat relatif">
      <option value="off" selected>Non</option>
      <option value="on">Oui, niveau avancé</option>
    </select>

    <label>Type d’équation</label>
    <select id="mode">
      <option value="xpb">x + b = c</option>
      <option value="axc">ax = c</option>
      <option value="axb" selected>ax + b = c</option>
      <option value="both">ax + b = mx + d</option>
      <option value="mix">Mélange</option>
    </select>

    <label>Affichage de l’inconnue</label>
    <select id="unknownDisplayMode" title="Affichage des inconnues sur les taches">
      <option value="letter" selected>Lettre</option>
      <option value="question">Point d’interrogation</option>
    </select>

    <label>Après suppression</label>
    <select id="removedDisplayMode" title="Affichage des éléments supprimés">
      <option value="keep" selected>Garder hachuré</option>
      <option value="hide">Masquer</option>
    </select>

    <label>Jetons numériques au départ</label>
    <select id="initialTokenCount" title="Nombre de jetons visibles pour représenter chaque constante">
      <option value="1" selected>1 jeton</option>
      <option value="2">2 jetons</option>
      <option value="3">3 jetons</option>
      <option value="mix">Mélange</option>
    </select>

    <div class="grid3" id="abcGrid">
      <div id="coefAWrap">
        <label>Coefficient <span class="mathLetter">a</span></label>
        <input id="coefA" type="number" min="2" max="8" value="2" />
      </div>
      <div id="constBWrap">
        <label>Constante <span class="mathLetter">b</span></label>
        <input id="constB" type="number" min="0" max="40" value="4" />
      </div>
      <div id="coefCWrap">
        <label>Coefficient <span class="mathLetter">m</span></label>
        <input id="coefC" type="number" min="1" max="8" value="1" />
      </div>
      <div id="constCWrap">
        <label>Constante <span class="mathLetter">c</span></label>
        <input id="constC" type="number" min="1" max="200" value="28" />
      </div>
      <div id="constDWrap">
        <label>Constante <span class="mathLetter">d</span></label>
        <input id="constD" type="number" min="1" max="200" value="28" />
      </div>
    </div>


    <div class="infoBox" id="profEquationInfo"></div>

    <div class="btnrow">
      <button class="primary" id="btnBuild" type="button">Créer</button>
      <button id="btnRandom" type="button">Aléatoire</button>
    </div>
