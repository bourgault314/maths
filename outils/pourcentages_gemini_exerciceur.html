<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Générateur de pourcentages</title>
  <style>
    :root {
      --bg: #f4f7fc; --panel: #ffffff; --panel-border: #dbe4f3;
      --text: #1f2a44; --muted: #5a6784; --accent: #3f7cff;
      --success: #10b981; --inverse: #9c27b0; --totalkey: #ff9800;
      --evo: #e91e63; --shadow: 0 10px 30px rgba(31,42,68,0.08);
      --c-100: rgb(235, 100, 100); --c-50: rgb(255, 230, 100);
      --c-25: rgb(150, 220, 150); --c-20: rgb(150, 200, 235);
      --c-10: rgb(250, 180, 100); --c-5: rgb(255, 160, 120); --c-1: rgb(210, 170, 255);
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; color: var(--text); background: var(--bg); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }

    .config-panel { background: var(--panel); border: 1px solid var(--panel-border); border-radius: 12px; padding: 16px 20px; width: 100%; max-width: 1100px; box-shadow: var(--shadow); margin-bottom: 12px; }
    .config-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--panel-border); }
    .config-header h2 { margin: 0; font-size: 1.25rem; color: #1f2a44; }
    
    .theme-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
    .theme-col { background: #fbfdff; border: 1px solid #e7edf8; border-radius: 8px; padding: 12px; }
    .theme-col h3 { margin: 0 0 10px 0; font-size: 0.95rem; color: var(--accent); border-bottom: 2px solid #eef4ff; padding-bottom: 4px;}
    .theme-col.inverse h3 { color: var(--inverse); border-bottom-color: #f3e5f5; }
    .theme-col.totalkey h3 { color: var(--totalkey); border-bottom-color: #fff3e0; }
    .theme-col.evo h3 { color: var(--evo); border-bottom-color: #fce4ec; }
    
    .checkbox-list { display: flex; flex-direction: column; gap: 6px; }
    .cb-row { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; font-size: 0.85rem; line-height: 1.3;}
    .cb-row input { margin-top: 2px; cursor: pointer; accent-color: var(--accent); }
    .theme-col.inverse .cb-row input { accent-color: var(--inverse); }
    .theme-col.totalkey .cb-row input { accent-color: var(--totalkey); }
    .theme-col.evo .cb-row input { accent-color: var(--evo); }
    .cb-desc { color: var(--muted); font-size: 0.75rem; display: block; margin-top: 1px;}

    hr { border: none; border-top: 1px dashed #cfd8ea; margin: 10px 0; }

    .bottom-config { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; background: #f4f7fc; padding: 12px 16px; border-radius: 8px; border: 1px solid #dbe4f3; }
    .config-options { display: flex; gap: 15px; flex-wrap: wrap; align-items: center; }
    .config-block { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 0.9rem; }
    .config-block select, .config-block input[type="text"] { padding: 6px 10px; border-radius: 6px; border: 1px solid #cfd8ea; font-size: 0.95rem; outline: none; }
    
    .btn-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn-main { background: var(--accent); color: white; border: none; border-radius: 8px; padding: 10px 20px; font-size: 0.95rem; font-weight: bold; cursor: pointer; transition: 0.1s; }
    .btn-main.print { background: var(--inverse); }
    .btn-main:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }

    /* LAYOUT DIAPORAMA */
    .diapo-container { background: white; border-radius: 18px; box-shadow: var(--shadow); width: 100%; max-width: 1000px; display: none; flex-direction: column; overflow: hidden; border: 1px solid var(--panel-border); margin-top: 20px; }
    .diapo-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; background: #f8fafc; border-bottom: 1px solid #e7edf8; }
    .slide-counter { font-weight: bold; color: var(--muted); font-size: 1.1rem; }
    .btn-nav { background: white; border: 1px solid #dbe4f3; border-radius: 8px; padding: 8px 16px; font-weight: bold; cursor: pointer; color: var(--text); min-width: 130px; transition: background 0.1s; }
    .btn-nav:hover:not(:disabled) { background: #f1f5f9; }
    .btn-nav:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-icon { min-width: 40px; padding: 8px 12px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; }
    
    #btnNext { min-width: 220px; text-align: center; }

    .question-box { padding: 30px 40px 10px 40px; text-align: center; }
    .question-text { font-size: 2.8rem; font-weight: bold; color: #1f2a44; line-height: 1.4; margin: 0; }

    .hint-box { padding: 10px 40px; display: none; justify-content: center; }
    .correction-box { padding: 10px 40px 30px 40px; text-align: center; display: none; }
    .correction-text { font-size: 2.8rem; font-weight: bold; color: var(--success); margin: 0; }
    
    .stage-wrap { display: flex; justify-content: center; align-items: flex-start; width: 100%; }
    svg { width: 100%; max-width: 950px; height: auto; max-height: 60vh; }

    .thumbnails-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 15px; background: #f8fafc; border-top: 1px solid #e7edf8; margin-top: auto; }
    .thumb-btn { padding: 6px 12px; border-radius: 8px; border: 1px solid #cfd8ea; background: white; color: var(--muted); cursor: pointer; transition: 0.2s; text-align: center; line-height: 1.2; }
    .thumb-btn .th-q { font-weight: bold; font-size: 0.95rem; margin-bottom: 3px; display: block; color: inherit; }
    .thumb-btn .th-txt { font-size: 0.75rem; opacity: 0.9; }
    .thumb-btn:hover { background: #eef4ff; }
    .thumb-btn.active { background: var(--accent); color: white; border-color: var(--accent); transform: scale(1.05); }
    .thumb-btn.done { background: var(--success); color: white; border-color: var(--success); }

    /* CSS PLEIN ECRAN STABLE */
    #diapoContainer:fullscreen { max-width: none; width: 100vw; height: 100vh; border-radius: 0; border: none; justify-content: flex-start; overflow-y: auto; background: white;}
    #diapoContainer:-webkit-full-screen { max-width: none; width: 100vw; height: 100vh; border-radius: 0; border: none; justify-content: flex-start; overflow-y: auto; background: white;}
    #diapoContainer:fullscreen .thumbnails-bar { display: none !important; }
    #diapoContainer:-webkit-full-screen .thumbnails-bar { display: none !important; }
    
    #diapoContainer:fullscreen svg { max-height: 75vh; max-width: 1200px; }
    #diapoContainer:-webkit-full-screen svg { max-height: 75vh; max-width: 1200px; }

    /* LAYOUT IMPRESSION */
    #printContainer { display: none; width: 100%; max-width: 850px; background: white; }
    @media print {
      body { background: white; padding: 0; margin: 0; align-items: flex-start; justify-content: center; }
      .config-panel, .diapo-container, svg.defs-only { display: none !important; }
      #printContainer { display: block !important; margin: 0 auto; }
      .print-page { page-break-after: always; padding: 10px 0; }
      .print-page:last-child { page-break-after: auto; }
      
      .print-header { display: flex; justify-content: flex-start; gap: 30px; font-size: 0.95rem; color: #333; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #ccc; position: relative;}
      .print-seed { position: absolute; right: 0; top: 0; font-weight: bold; color: var(--muted); }
      .print-title { text-align: center; font-size: 1.2rem; margin: 5px 0 20px 0; color: #1f2a44; font-weight: bold; }
      
      .print-q { margin-bottom: 15px; page-break-inside: avoid; }
      .print-q-text { font-size: 1.15rem; margin-bottom: 5px; line-height: 1.4; }
      .print-q svg { width: 100%; max-width: 580px; display: block; margin: 0 auto; } 
      .print-c-text { color: var(--text); font-weight: bold; font-size: 1.1rem; margin-top: 5px; margin-bottom: 10px; }
      .spacer-reponse { height: 60px; } 
    }
  </style>
</head>
<body>

  <svg class="defs-only" width="0" height="0" style="position:absolute;">
    <defs>
      <pattern id="patternHatch" width="15" height="15" patternTransform="rotate(45)" patternUnits="userSpaceOnUse">
        <rect width="15" height="15" fill="#e2e8f0"></rect>
        <line x1="0" y1="0" x2="0" y2="15" stroke="#ff4d6d" stroke-width="3"></line>
      </pattern>
    </defs>
  </svg>

  <div class="config-panel">
    <div class="config-header">
      <h2>📊 Générateur de pourcentages : diaporama et mode fiche papier</h2>
    </div>
    
    <div class="theme-grid">
      <div class="theme-col">
        <h3>🧊 1. Calculer une part</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="base_50"> <div><strong>50 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="base_25"> <div><strong>25 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="base_20"> <div><strong>20 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="base_10"> <div><strong>10 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="base_5"> <div><strong>5 %</strong></div></label>
        </div>
        <hr>
        <h3>🥞 Multiples</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="mult_25"> <div><strong>75 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_10"> <div><strong>20 %, 30 %, 40 %, 60 %...</strong><span class="cb-desc">Multiples de 10 %</span></div></label>
        </div>
      </div>

      <div class="theme-col evo">
        <h3>🔥 2. Le Boss (100 cases)</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="base_1"> <div><strong>1 %</strong><span class="cb-desc">Le centième pur</span></div></label>
          <label class="cb-row"><input type="checkbox" value="mult_1"> <div><strong>13 %, 42 %...</strong></div></label>
        </div>
        <hr>
        <h3>📈 Les Évolutions (4ème)</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="evo_inc"> <div><strong>Augmentations (+ X%)</strong><span class="cb-desc">Loyers, factures...</span></div></label>
          <label class="cb-row"><input type="checkbox" value="evo_dec"> <div><strong>Réductions (- X%)</strong><span class="cb-desc">Soldes, baisses...</span></div></label>
        </div>
      </div>

      <div class="theme-col inverse">
        <h3>🎯 3. Trouver le %</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="inv_50"> <div><strong>Moitié</strong><span class="cb-desc">Trouver 50 %</span></div></label>
          <label class="cb-row"><input type="checkbox" value="inv_25"> <div><strong>Quarts</strong><span class="cb-desc">Trouver 25 % ou 75 %</span></div></label>
          <label class="cb-row"><input type="checkbox" value="inv_20"> <div><strong>Cinquièmes</strong><span class="cb-desc">Trouver 20, 40, 60, 80 %</span></div></label>
          <label class="cb-row"><input type="checkbox" value="inv_10"> <div><strong>Dixièmes</strong><span class="cb-desc">Trouver 10, 20, 30, 40 %...</span></div></label>
        </div>
      </div>

      <div class="theme-col totalkey">
        <h3>🔑 4. Trouver le TOUT</h3>
        <div class="checkbox-list">
          <label class="cb-row"><input type="checkbox" value="tot_50"> <div><strong>À partir de 50 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="tot_25"> <div><strong>À partir de 25 % ou 75 %</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="tot_20"> <div><strong>À partir des cinquièmes</strong></div></label>
          <label class="cb-row"><input type="checkbox" value="tot_10"> <div><strong>À partir des dixièmes</strong></div></label>
        </div>
      </div>
    </div>

    <div class="bottom-config">
      <div class="config-options">
        <div class="config-block">
          <label>Niveau :</label>
          <select id="selLevel">
            <option value="1" selected>Niveau 1 (Facile)</option>
            <option value="2">Niveau 2 (Moyen)</option>
            <option value="3">Niveau 3 (Difficile)</option>
          </select>
        </div>
        <div class="config-block">
          <label>Questions :</label>
          <select id="selCount">
            <option value="3">3</option>
            <option value="5" selected>5</option>
            <option value="10">10</option>
            <option value="15">15</option>
            <option value="20">20</option>
          </select>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label style="cursor: pointer;"><input type="checkbox" id="cbDecimals" style="accent-color: var(--accent); transform: scale(1.2);"> 🧮 Décimaux</label>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label style="cursor: pointer;"><input type="checkbox" id="cbEmptyGabarits" checked style="accent-color: var(--success); transform: scale(1.2);"> 📝 Gabarits</label>
        </div>
        <div class="config-block" style="border-left: 2px solid #dbe4f3; padding-left: 15px; margin-left: 5px;">
          <label>Seed :</label>
          <input type="text" id="inputSeed" placeholder="Auto" style="width: 80px; text-align: center;">
        </div>
      </div>
      
      <div class="btn-wrap">
        <button class="btn-main" onclick="generateQuiz()">💻 Générer le diapo</button>
        <button class="btn-main print" onclick="generatePrint()">🖨️ Fiche PDF/Papier</button>
      </div>
    </div>
  </div>

  <div class="diapo-container" id="diapoContainer">
    <div class="diapo-header">
      <button class="btn-nav" id="btnPrev" onclick="prevSlide()">◄ Précédent</button>
      <div class="slide-counter" id="slideCounter">Question 1 / 5</div>
      
      <div style="display: flex; gap: 8px;">
        <button class="btn-nav btn-icon" onclick="toggleFullscreen()" title="Passer en plein écran">⛶</button>
        <button class="btn-nav" id="btnNext" onclick="nextAction()" style="background-color: var(--accent); color: white;">Indice (Schéma) 💡 ►</button>
      </div>
    </div>

    <div class="question-box"><p class="question-text" id="qText"></p></div>
    <div class="hint-box" id="hBox"><div class="stage-wrap"><svg id="svgStage" viewBox="0 0 1000 320"></svg></div></div>
    <div class="correction-box" id="cBox"><p class="correction-text" id="cText"></p></div>
    
    <div class="thumbnails-bar" id="thumbBar"></div>
  </div>

  <div id="printContainer"></div>

  <script>
    const svgNS = "http://www.w3.org/2000/svg";
    let quizData = [];
    let currentIndex = 0;
    let quizSeed = 1; 

    let currentSeed = 1;
    function setSeed(s) { currentSeed = s; }
    function seededRandom() {
        currentSeed = (currentSeed * 9301 + 49297) % 233280;
        return currentSeed / 233280;
    }
    function rand(min, max) { return Math.floor(seededRandom() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(seededRandom() * arr.length)]; }

    // Fonction magique pour transformer les points en virgules à l'affichage
    function fmt(n) { return n.toString().replace('.', ','); }

    function initSeed() {
        let seedInput = document.getElementById('inputSeed').value.trim();
        let s;
        if (!seedInput || isNaN(seedInput)) {
            s = Math.floor(Math.random() * 9999) + 1;
            document.getElementById('inputSeed').value = ""; 
            document.getElementById('inputSeed').placeholder = s; 
        } else {
            s = parseInt(seedInput, 10);
        }
        setSeed(s);
        return s;
    }

    function toggleFullscreen() {
      let elem = document.getElementById("diapoContainer");
      if (!document.fullscreenElement) {
        elem.requestFullscreen().catch(err => {
          alert(`Erreur : impossible de passer en plein écran (${err.message})`);
        });
      } else {
        document.exitFullscreen();
      }
    }

    const colors = { 2: "var(--c-50)", 4: "var(--c-25)", 5: "var(--c-20)", 10: "var(--c-10)", 20: "var(--c-5)", 100: "var(--c-1)" };

    document.addEventListener("keydown", (e) => {
      if (document.getElementById('diapoContainer').style.display !== "none") {
        if (e.key === "ArrowRight") { if (!document.getElementById('btnNext').disabled) nextAction(); } 
        else if (e.key === "ArrowLeft") { if (!document.getElementById('btnPrev').disabled) prevSlide(); }
      }
    });

    function getFriendlyTotal(multiplier, level) {
      let min = 2, max = 25, scale = 1;
      if (level === 1) {
        if (multiplier === 2) { min = 5; max = 50; } else if (multiplier === 4) { min = 3; max = 25; }
        else if (multiplier === 5) { min = 2; max = 20; } else if (multiplier === 10) { min = 2; max = 10; }
        else if (multiplier === 20) { min = 1; max = 5; } 
      } else if (level === 2) {
        if (multiplier === 2) { min = 10; max = 200; } else if (multiplier === 4) { min = 5; max = 100; }
        else if (multiplier === 5) { min = 5; max = 80; } else if (multiplier === 10) { min = 5; max = 40; }
        else if (multiplier === 20) { min = 2; max = 20; }
      } else {
        if (multiplier === 2) { min = 5; max = 50; } else if (multiplier === 10) { min = 2; max = 30; }
        else if (multiplier === 20) { min = 2; max = 15; }
        scale = pick([1, 10, 100]); 
      }
      return rand(min, max) * multiplier * scale;
    }

    function buildText(q) {
      let cType = pick(['brut', 'argent', 'ecole', 'sport', 'distance', 'poids', 'capacite', 'nourriture']);
      let qHtml = "", cHtml = "", unit = "";
      const t = q.totalVal; // Raccourci pour simplifier le code

      if (q.mode === 'evo_inc') {
        cType = pick(['loyer', 'facture', 'population']);
        if (cType === 'loyer') { 
            unit = " €"; 
            let subject = t < 150 ? "Un abonnement téléphonique" : "Un loyer";
            qHtml = `${subject} de <strong>${fmt(t)} €</strong> augmente de <strong>${fmt(q.percent)} %</strong>.<br>Quel est le nouveau montant ?`; 
        }
        else if (cType === 'facture') { unit = " €"; qHtml = `Une facture de <strong>${fmt(t)} €</strong> s'alourdit de <strong>${fmt(q.percent)} %</strong>.<br>Quel est le nouveau montant à payer ?`; }
        else { 
            unit = " habitants"; 
            let subject = t < 500 ? "Un village" : "Une ville";
            qHtml = `${subject} de <strong>${fmt(t)} habitants</strong> a vu sa population croître de <strong>${fmt(q.percent)} %</strong>.<br>Quelle est la nouvelle population ?`; 
        }
        cHtml = `Le nouveau total est <strong>${fmt(q.calcVal)} ${unit}</strong>.`;
      }
      else if (q.mode === 'evo_dec') {
        cType = pick(['solde', 'jeu', 'population']);
        if (cType === 'solde') { 
            unit = " €"; 
            let subject = t < 50 ? "Un t-shirt" : (t <= 200 ? "Un vélo" : "Un ordinateur");
            qHtml = `${subject} à <strong>${fmt(t)} €</strong> est soldé à <strong>- ${fmt(q.percent)} %</strong>.<br>Quel est le nouveau prix ?`; 
        }
        else if (cType === 'jeu') { unit = " €"; qHtml = `Un jeu vidéo qui coûtait <strong>${fmt(t)} €</strong> baisse de <strong>${fmt(q.percent)} %</strong>.<br>Quel est son nouveau prix ?`; }
        else { 
            unit = " membres"; 
            let subject = t < 50 ? "Un petit club" : "Une association";
            qHtml = `${subject} de <strong>${fmt(t)} membres</strong> perd <strong>${fmt(q.percent)} %</strong> de ses inscrits.<br>Combien reste-t-il de membres ?`; 
        }
        cHtml = `La nouvelle valeur est <strong>${fmt(q.calcVal)} ${unit}</strong>.`;
      }
      else {
        // --- Dictionnaire intelligent selon la valeur totale ---
        let ecoleLieu = t < 40 ? "une classe" : (t <= 200 ? "une école" : "un collège");
        let sportLieu = t < 20 ? "Un minibus" : (t <= 200 ? "Une salle de cinéma" : "Un stade");
        let distLieu = t < 10 ? "une randonnée à pied" : (t <= 100 ? "une balade à vélo" : "un voyage");
        let poidsObjet = t < 10 ? "un colis postal" : (t <= 50 ? "une valise" : "un chargement");
        let capObjet = t < 5 ? "Une grande bouteille" : (t <= 50 ? "Un grand seau" : (t <= 500 ? "Une cuve" : "Une piscine"));
        let nourObjet = t < 50 ? "une barre de chocolat" : "un gâteau";
        let argentObjet = t < 20 ? "un livre" : (t <= 150 ? "un vêtement" : "un ordinateur");

        if (q.mode === 'find_total') {
            if (cType === 'brut') { qHtml = `<strong>${fmt(q.percent)} %</strong> d'un nombre vaut <strong>${fmt(q.calcVal)}</strong>.<br>Quel est ce nombre ?`; } 
            else if (cType === 'argent') { unit = " €"; qHtml = `Une remise de <strong>${fmt(q.percent)} %</strong> sur ${argentObjet} représente <strong>${fmt(q.calcVal)} €</strong>.<br>Quel était le prix initial ?`; } 
            else if (cType === 'ecole') { unit = " élèves"; qHtml = `Dans ${ecoleLieu}, <strong>${fmt(q.percent)} %</strong> des élèves sont externes. Cela représente <strong>${fmt(q.calcVal)} élèves</strong>.<br>Combien y a-t-il d'élèves au total ?`; } 
            else if (cType === 'sport') { unit = " places"; qHtml = `${sportLieu} est rempli(e) à <strong>${fmt(q.percent)} %</strong>, ce qui correspond à <strong>${fmt(q.calcVal)} spectateurs</strong> (ou passagers).<br>Quelle est la capacité totale ?`; } 
            else if (cType === 'distance') { unit = " km"; qHtml = `Lors d'${distLieu}, tu as parcouru <strong>${fmt(q.percent)} %</strong> du trajet, soit <strong>${fmt(q.calcVal)} km</strong>.<br>Quelle est la distance totale ?`; }
            else if (cType === 'poids') { unit = " kg"; qHtml = `<strong>${fmt(q.percent)} %</strong> du poids d'${poidsObjet} correspond à <strong>${fmt(q.calcVal)} kg</strong>.<br>Quel est le poids total ?`; }
            else if (cType === 'capacite') { unit = " L"; qHtml = `${capObjet} est remplie à <strong>${fmt(q.percent)} %</strong>, ce qui représente <strong>${fmt(q.calcVal)} L</strong>.<br>Quelle est la contenance totale ?`; }
            else if (cType === 'nourriture') { unit = " g"; qHtml = `Tu as mangé <strong>${fmt(q.calcVal)} g</strong>, ce qui représente <strong>${fmt(q.percent)} %</strong> d'${nourObjet}.<br>Quel était le poids total ?`; }
            cHtml = `Le total (100 %) est <strong>${fmt(t)} ${unit}</strong>.`;
        }
        else if (q.mode === 'find_percent') {
            if (cType === 'brut') { qHtml = `Quel pourcentage représente <strong>${fmt(q.calcVal)}</strong> par rapport à <strong>${fmt(t)}</strong> ?`; } 
            else if (cType === 'argent') { unit = " €"; qHtml = `${argentObjet.charAt(0).toUpperCase() + argentObjet.slice(1)} coûtait <strong>${fmt(t)} €</strong>. La réduction est de <strong>${fmt(q.calcVal)} €</strong>.<br>Quel est le pourcentage de réduction ?`; } 
            else if (cType === 'ecole') { unit = " élèves"; qHtml = `Dans ${ecoleLieu} de <strong>${fmt(t)} élèves</strong>, <strong>${fmt(q.calcVal)}</strong> mangent à la cantine.<br>Quel pourcentage cela représente-t-il ?`; } 
            else if (cType === 'sport') { unit = " places"; qHtml = `${sportLieu} de <strong>${fmt(t)} places</strong> est occupé(e) par <strong>${fmt(q.calcVal)} personnes</strong>.<br>Quel est le pourcentage de remplissage ?`; }
            else if (cType === 'distance') { unit = " km"; qHtml = `Sur ${distLieu} de <strong>${fmt(t)} km</strong>, <strong>${fmt(q.calcVal)} km</strong> ont été parcourus.<br>Quel pourcentage du trajet a été effectué ?`; }
            else if (cType === 'poids') { unit = " kg"; qHtml = `${poidsObjet.charAt(0).toUpperCase() + poidsObjet.slice(1)} pèse <strong>${fmt(t)} kg</strong>. On en retire <strong>${fmt(q.calcVal)} kg</strong>.<br>Quel pourcentage a été retiré ?`; }
            else if (cType === 'capacite') { unit = " L"; qHtml = `Sur ${capObjet.toLowerCase()} de <strong>${fmt(t)} L</strong>, <strong>${fmt(q.calcVal)} L</strong> ont été utilisés.<br>Quel pourcentage a été vidé ?`; }
            else if (cType === 'nourriture') { unit = " g"; qHtml = `Dans ${nourObjet} de <strong>${fmt(t)} g</strong>, il y a <strong>${fmt(q.calcVal)} g</strong> de sucre.<br>Quel est le pourcentage de sucre ?`; }
            cHtml = `Cela représente <strong>${fmt(q.percent)} %</strong>.`;
        }
        else {
            if (cType === 'brut') { 
                qHtml = `Calcule <strong>${fmt(q.percent)} %</strong> de <strong>${fmt(t)}</strong>.`; 
                cHtml = `Cela fait <strong>${fmt(q.calcVal)}</strong>.`;
            } 
            else if (cType === 'argent') { 
                unit = " €"; 
                qHtml = `${argentObjet.charAt(0).toUpperCase() + argentObjet.slice(1)} coûte <strong>${fmt(t)} €</strong>. Il y a une réduction de <strong>${fmt(q.percent)} %</strong>.<br>Quel est le montant de la réduction ?`; 
                cHtml = `La réduction est de <strong>${fmt(q.calcVal)} €</strong>.`;
            } 
            else if (cType === 'ecole') { 
                unit = " élèves"; 
                qHtml = `Dans ${ecoleLieu} de <strong>${fmt(t)} élèves</strong>, <strong>${fmt(q.percent)} %</strong> mangent à la cantine.<br>Combien d'élèves mangent à la cantine ?`; 
                cHtml = `<strong>${fmt(q.calcVal)} élèves</strong> mangent à la cantine.`;
            } 
            else if (cType === 'sport') { 
                unit = " personnes"; 
                qHtml = `${sportLieu} de <strong>${fmt(t)} places</strong> est rempli(e) à <strong>${fmt(q.percent)} %</strong>.<br>Combien y a-t-il de personnes ?`; 
                cHtml = `Il y a <strong>${fmt(q.calcVal)} personnes</strong>.`;
            }
            else if (cType === 'distance') { 
                unit = " km"; 
                qHtml = `Sur ${distLieu} de <strong>${fmt(t)} km</strong>, tu as parcouru <strong>${fmt(q.percent)} %</strong>.<br>Combien de kilomètres as-tu parcourus ?`; 
                cHtml = `Tu as parcouru <strong>${fmt(q.calcVal)} km</strong>.`;
            }
            else if (cType === 'poids') { 
                unit = " kg"; 
                qHtml = `${poidsObjet.charAt(0).toUpperCase() + poidsObjet.slice(1)} pèse <strong>${fmt(t)} kg</strong>. On doit en retirer <strong>${fmt(q.percent)} %</strong>.<br>Quelle masse cela représente-t-il ?`; 
                cHtml = `Cela représente <strong>${fmt(q.calcVal)} kg</strong>.`;
            }
            else if (cType === 'capacite') { 
                unit = " L"; 
                qHtml = `${capObjet} contient <strong>${fmt(t)} L</strong> d'eau. On la vide de <strong>${fmt(q.percent)} %</strong>.<br>Combien de litres ont été retirés ?`; 
                cHtml = `<strong>${fmt(q.calcVal)} L</strong> ont été retirés.`;
            }
            else if (cType === 'nourriture') { 
                unit = " g"; 
                qHtml = `Pour préparer ${nourObjet} de <strong>${fmt(t)} g</strong>, la recette demande <strong>${fmt(q.percent)} %</strong> de sucre.<br>Quelle quantité vas-tu utiliser ?`; 
                cHtml = `Tu vas utiliser <strong>${fmt(q.calcVal)} g</strong>.`;
            }
        }
      }
      return { qHtml, cHtml, unit };
    }

    function createQuestion(type, level, useDecimals) {
      let percent, parts, activeParts, totalVal, calcVal, mode = 'direct';
      
      if (type.startsWith('evo_')) {
         mode = type; 
         parts = pick([4, 5, 10]); activeParts = pick([1, 2]); 
         percent = (100 / parts) * activeParts; totalVal = getFriendlyTotal(parts, level);
         if (type === 'evo_inc') calcVal = (totalVal / parts) * (parts + activeParts);
         else calcVal = (totalVal / parts) * (parts - activeParts);
      }
      else if (type.startsWith('tot_')) {
         mode = 'find_total'; 
         if (type === 'tot_50') { parts = 2; activeParts = 1; }
         else if (type === 'tot_25') { parts = 4; activeParts = pick([1, 3]); }
         else if (type === 'tot_20') { parts = 5; activeParts = pick([1, 2, 3, 4]); }
         else if (type === 'tot_10') { parts = 10; activeParts = pick([1, 2, 3, 4, 6, 7, 8, 9]); }
         percent = (100 / parts) * activeParts; totalVal = getFriendlyTotal(parts, level);
         calcVal = (totalVal / parts) * activeParts;
      }
      else if (type.startsWith('inv_')) {
         mode = 'find_percent'; 
         if (type === 'inv_50') { parts = 2; activeParts = 1; }
         else if (type === 'inv_25') { parts = 4; activeParts = pick([1, 3]); } 
         else if (type === 'inv_20') { parts = 5; activeParts = pick([1, 2, 3, 4]); }
         else if (type === 'inv_10') { parts = 10; activeParts = pick([1, 2, 3, 4, 6, 7, 8, 9]); }
         totalVal = getFriendlyTotal(parts, level);
         percent = (100 / parts) * activeParts; calcVal = (totalVal / parts) * activeParts;
      } 
      else {
         mode = 'direct';
         if (type === 'base_50') { 
             parts = 2; activeParts = 1; percent = 50; 
             if (useDecimals) {
                 totalVal = (level === 1) ? rand(5, 49) * 2 + 1 : (level === 2 ? rand(50, 199) * 2 + 1 : rand(200, 499) * 2 + 1);
             } else {
                 totalVal = getFriendlyTotal(2, level); 
             }
         }
         else if (type === 'base_25') { 
             parts = 4; activeParts = 1; percent = 25; 
             if (useDecimals) {
                 let k = (level === 1) ? rand(2, 24) : (level === 2 ? rand(25, 99) : rand(100, 249));
                 totalVal = k * 4 + 2;
             } else {
                 totalVal = getFriendlyTotal(4, level); 
             }
         }
         else if (type === 'base_20') { 
             parts = 5; activeParts = 1; percent = 20; 
             if (useDecimals) {
                 let val = 0;
                 do { val = (level === 1) ? rand(11, 99) : (level === 2 ? rand(101, 399) : rand(401, 999)); } while (val % 5 === 0);
                 totalVal = val;
             } else {
                 totalVal = getFriendlyTotal(5, level); 
             }
         }
         else if (type === 'base_10') { 
             parts = 10; activeParts = 1; percent = 10; 
             if (useDecimals) {
                 let val = 0;
                 do { val = (level === 1) ? rand(11, 99) : (level === 2 ? rand(101, 399) : rand(401, 999)); } while (val % 10 === 0);
                 totalVal = val;
             } else {
                 totalVal = getFriendlyTotal(10, level); 
             }
         }
         else if (type === 'base_5') { parts = 20; activeParts = 1; percent = 5; totalVal = getFriendlyTotal(20, level); }
         else if (type === 'mult_25') { parts = 4; activeParts = 3; percent = 75; totalVal = getFriendlyTotal(4, level); }
         else if (type === 'mult_10') { activeParts = pick([2,3,4,6,7,8,9]); percent = activeParts*10; parts = 10; totalVal = getFriendlyTotal(10, level); }
         else if (type === 'base_1') { 
             parts = 100; activeParts = 1; percent = 1; 
             if (level === 1) totalVal = rand(10, 99);
             else if (level === 2) totalVal = rand(100, 399);
             else totalVal = rand(400, 999);
         }
         else if (type === 'mult_1') { 
             parts = 100; activeParts = rand(2, 45); percent = activeParts; 
             totalVal = (level === 1) ? rand(1, 5) * 100 : rand(5, 20) * 100; 
         }
      }

      if (mode !== 'evo_inc' && mode !== 'evo_dec') calcVal = (totalVal / parts) * activeParts;

      calcVal = parseFloat(calcVal.toFixed(2));

      let q = { percent, parts, activeParts, totalVal, calcVal, mode, phase: 0 };
      let texts = buildText(q);
      q.qHtml = texts.qHtml; q.cHtml = texts.cHtml; q.unit = texts.unit;
      return q;
    }

    function getQuizData() {
      const checkboxes = document.querySelectorAll('.theme-grid input[type="checkbox"]:checked');
      if (checkboxes.length === 0) { alert("⚠️ Cochez au moins un type de question !"); return false; }
      
      quizSeed = initSeed();
      
      let types = Array.from(checkboxes).map(cb => cb.value);
      const count = parseInt(document.getElementById('selCount').value, 10);
      const level = parseInt(document.getElementById('selLevel').value, 10); 
      const useDecimals = document.getElementById('cbDecimals').checked;
      
      let distributedTypes = [];
      for (let i = 0; i < count; i++) { distributedTypes.push(types[i % types.length]); }
      
      for (let i = distributedTypes.length - 1; i > 0; i--) {
          const j = Math.floor(seededRandom() * (i + 1));
          [distributedTypes[i], distributedTypes[j]] = [distributedTypes[j], distributedTypes[i]];
      }

      quizData = [];
      for (let i = 0; i < count; i++) { quizData.push(createQuestion(distributedTypes[i], level, useDecimals)); }
      return true;
    }

    function emptyElement(el) { while (el.firstChild) el.removeChild(el.firstChild); }
    function createSVG(tag, attrs) { const el = document.createElementNS(svgNS, tag); for (let k in attrs) el.setAttribute(k, attrs[k]); return el; }

    function drawSVGBar(q, isCorrection, svgContainer) {
      emptyElement(svgContainer);
      let displayParts = (q.mode === 'evo_inc') ? q.parts + q.activeParts : q.parts;
      const wTotalDisplay = (800 / displayParts) * q.parts; 
      const wPart = wTotalDisplay / q.parts;
      const hBar = 60, xStart = 100, yTop = 70, yBot = yTop + hBar;
      const partVal = parseFloat((q.totalVal / q.parts).toFixed(2));
      const partPercent = parseFloat((100 / q.parts).toFixed(2));
      
      svgContainer.appendChild(createSVG("rect", { x: xStart, y: yTop, width: wTotalDisplay, height: hBar, fill: "var(--c-100)", stroke: "#1f2a44", "stroke-width": "2.5", opacity: "0.5" }));
      
      if (q.mode === 'find_total' && !isCorrection) {
          svgContainer.appendChild(createSVG("line", { x1: xStart + wTotalDisplay/2 - 20, y1: yTop + hBar/2, x2: xStart + wTotalDisplay/2 + 20, y2: yTop + hBar/2, stroke: "#1f2a44", "stroke-width": "3", "stroke-dasharray": "5,5" }));
      } else {
          let txtTotal = createSVG("text", { x: xStart + wTotalDisplay/2, y: yTop + hBar/2 + 8, "text-anchor": "middle", "font-weight": "bold", "font-size": "24", fill: "#1f2a44" });
          txtTotal.textContent = fmt(q.totalVal); svgContainer.appendChild(txtTotal);
      }
      drawBrace(svgContainer, xStart, yTop - 5, wTotalDisplay, "100 %", true);

      for (let i = 0; i < displayParts; i++) {
        let xPart = xStart + (i * wPart);
        let isAdded = (q.mode === 'evo_inc' && i >= q.parts); 
        let isRemoved = (q.mode === 'evo_dec' && i >= q.parts - q.activeParts); 
        let fillColor = colors[q.parts];
        if (isRemoved && isCorrection) fillColor = "url(#patternHatch)"; 
        
        let op = "0.5";
        if (isCorrection) {
           if (isRemoved) op = "1"; else if (isAdded) op = "0.9";
           else if (q.mode === 'direct' || q.mode === 'find_percent' || q.mode === 'find_total') op = (i < q.activeParts) ? "0.9" : "0.2";
           else op = "0.9"; 
        } else {
           if (isAdded) op = "0.1"; 
        }

        if (!(isAdded && !isCorrection)) {
            svgContainer.appendChild(createSVG("rect", { x: xPart, y: yBot, width: wPart, height: hBar, fill: fillColor, stroke: "#1f2a44", "stroke-width": "2.5", opacity: op }));
        }

        if (isCorrection || (q.mode === 'find_total' && i < q.activeParts) || (isAdded && isCorrection) || (q.mode.startsWith('evo') && !isAdded)) {
            if (!(isAdded && !isCorrection)) {
                let fSizeVal = wPart < 45 ? "16" : "24"; 
                let yOffsetVal = wPart < 45 ? 5 : 8;
                let txtVal = createSVG("text", { x: xPart + wPart/2, y: yBot + hBar/2 + yOffsetVal, "text-anchor": "middle", "font-weight": "bold", "font-size": fSizeVal, fill: "#1f2a44" });
                txtVal.textContent = fmt(partVal); svgContainer.appendChild(txtVal);
            }
        } else {
            svgContainer.appendChild(createSVG("line", { x1: xPart + wPart/2 - 12, y1: yBot + hBar/2, x2: xPart + wPart/2 + 12, y2: yBot + hBar/2, stroke: "#1f2a44", "stroke-width": "3", "stroke-dasharray": "4,4" }));
        }
        
        if (!(isAdded && !isCorrection)) {
            let label = fmt(partPercent) + " %";
            if (isRemoved && isCorrection) label = "- " + label;
            if (isAdded && isCorrection) label = "+ " + label;
            drawBrace(svgContainer, xPart, yBot + hBar + 5, wPart, label, false, (isRemoved && isCorrection ? "#ff4d6d" : (isAdded ? "var(--accent)" : "#1f2a44")));
        }
      }

      if (isCorrection || (q.mode === 'find_total' && !isCorrection)) {
        if (q.mode === 'evo_inc') { drawBrace(svgContainer, xStart, yBot + hBar + 45, wPart * displayParts, `Nouveau total = ${fmt(q.calcVal)}`, false, "var(--accent)"); } 
        else if (q.mode === 'evo_dec') { drawBrace(svgContainer, xStart, yBot + hBar + 45, wPart * (q.parts - q.activeParts), `Reste = ${fmt(q.calcVal)}`, false, "var(--success)"); } 
        else if (q.mode === 'find_percent') { drawBrace(svgContainer, xStart, yBot + hBar + 45, wPart * q.activeParts, `${fmt(q.calcVal)}  ➔  ${fmt(q.percent)} %`, false, "var(--accent)"); } 
        else if (q.mode === 'find_total' && !isCorrection) { drawBrace(svgContainer, xStart, yBot + hBar + 45, wPart * q.activeParts, `${fmt(q.percent)} % = ${fmt(q.calcVal)}`, false, "var(--accent)"); } 
        else if (q.activeParts > 1) { drawBrace(svgContainer, xStart, yBot + hBar + 45, wPart * q.activeParts, `${fmt(q.percent)} %  ➔  ${fmt(q.calcVal)}`, false, "var(--accent)"); }
      }
    }

    function draw100Parts(q, isCorrection, svgContainer) {
      emptyElement(svgContainer);
      const wTotal = 800, hBar = 60, xStart = 100, yTop = 70, yBot = yTop + hBar;
      const partVal = parseFloat((q.totalVal / 100).toFixed(2));
      
      svgContainer.appendChild(createSVG("rect", { x: xStart, y: yTop, width: wTotal, height: hBar, fill: "var(--c-100)", stroke: "#1f2a44", "stroke-width": "2.5", opacity: "0.5" }));
      let txtTotal = createSVG("text", { x: xStart + wTotal/2, y: yTop + hBar/2 + 8, "text-anchor": "middle", "font-weight": "bold", "font-size": "24", fill: "#1f2a44" });
      txtTotal.textContent = fmt(q.totalVal); svgContainer.appendChild(txtTotal);
      drawBrace(svgContainer, xStart, yTop - 5, wTotal, "100 %", true);

      const wPart = wTotal / 100;
      for (let i = 0; i < 100; i++) {
        let xPart = xStart + (i * wPart);
        let isActive = i < q.activeParts;
        let op = isCorrection ? (isActive ? "1" : "0.2") : "0.5";
        svgContainer.appendChild(createSVG("rect", { x: xPart, y: yBot, width: wPart, height: hBar, fill: "var(--c-1)", stroke: "#1f2a44", "stroke-width": "1.5", opacity: op }));
      }

      if (isCorrection) {
          drawBrace(svgContainer, xStart, yBot + hBar + 5, wPart, "1 % = " + fmt(partVal), false, "var(--text)", 14);
          if (q.activeParts > 1) { drawBrace(svgContainer, xStart, yBot + hBar + 55, wPart * q.activeParts, `${fmt(q.percent)} % = ${fmt(q.calcVal)}`, false, "var(--accent)"); }
      } else {
          drawBrace(svgContainer, xStart, yBot + hBar + 5, wPart, "1 %", false, "var(--text)", 14);
          if (q.activeParts > 1) { drawBrace(svgContainer, xStart, yBot + hBar + 55, wPart * q.activeParts, `${fmt(q.percent)} %`, false, "var(--accent)"); }
      }
    }

    function drawBrace(svg, x, y, width, text, isUp, color="#1f2a44", forceFontSize=null) {
      if(width <= 0) return;
      const h = width < 20 ? 6 : 12; const dir = isUp ? -1 : 1; const yTip = y + (h * dir);
      const d = `M ${x} ${y} Q ${x} ${yTip}, ${x + Math.min(10, width/3)} ${yTip} L ${x + width/2 - Math.min(8, width/4)} ${yTip} Q ${x + width/2} ${yTip}, ${x + width/2} ${yTip + (4*dir)} Q ${x + width/2} ${yTip}, ${x + width/2 + Math.min(8, width/4)} ${yTip} L ${x + width - Math.min(10, width/3)} ${yTip} Q ${x + width} ${yTip}, ${x + width} ${y} `;
      svg.appendChild(createSVG("path", { d: d, fill: "none", stroke: color, "stroke-width": "2.5" }));

      let fSize = forceFontSize || (width < 20 ? "14" : "20");
      let yOffset = isUp ? -12 : (width < 20 ? 18 : 24);
      let txt = createSVG("text", { x: x + width/2, y: yTip + yOffset, "text-anchor": "middle", "font-weight": "bold", "font-size": fSize, fill: color });
      txt.textContent = text; svg.appendChild(txt);
    }

    function buildThumbnails() {
      const tb = document.getElementById('thumbBar'); tb.innerHTML = '';
      quizData.forEach((q, idx) => {
        let btn = document.createElement('button'); btn.className = 'thumb-btn';
        let txt = "";
        if (q.mode === 'evo_inc') txt = `${fmt(q.totalVal)} + ${fmt(q.percent)}%`;
        else if (q.mode === 'evo_dec') txt = `${fmt(q.totalVal)} - ${fmt(q.percent)}%`;
        else if (q.mode === 'direct') txt = `${fmt(q.percent)}% de ${fmt(q.totalVal)}`;
        else if (q.mode === 'find_percent') txt = `${fmt(q.calcVal)} sur ${fmt(q.totalVal)}`;
        else if (q.mode === 'find_total') txt = `${fmt(q.percent)}% = ${fmt(q.calcVal)}`;

        btn.innerHTML = `<span class="th-q">Q${idx + 1}</span><span class="th-txt">${txt}</span>`;
        btn.onclick = () => loadSlide(idx, q.phase); 
        tb.appendChild(btn);
      });
    }

    function updateThumbnails() {
      const btns = document.getElementById('thumbBar').children;
      for(let i=0; i<btns.length; i++) {
        btns[i].className = 'thumb-btn';
        if (quizData[i].phase === 2) btns[i].classList.add('done');
        if (i === currentIndex) btns[i].classList.add('active');
      }
    }

    function generateQuiz() {
      if(!getQuizData()) return;
      document.getElementById('diapoContainer').style.display = 'flex';
      buildThumbnails(); loadSlide(0, 0);
      document.getElementById('diapoContainer').scrollIntoView({ behavior: "smooth" });
    }

    function updateUI() {
      const q = quizData[currentIndex]; const btnNext = document.getElementById('btnNext');
      document.getElementById('slideCounter').textContent = `Question ${currentIndex + 1} / ${quizData.length}`;
      document.getElementById('qText').innerHTML = q.qHtml;
      document.getElementById('btnPrev').disabled = (currentIndex === 0 && q.phase === 0);
      
      let stage = document.getElementById('svgStage');

      if (q.phase === 0) {
        document.getElementById('hBox').style.display = 'none'; document.getElementById('cBox').style.display = 'none';
        btnNext.innerHTML = "Indice (Schéma) 💡 ►";
      } else if (q.phase === 1) {
        document.getElementById('hBox').style.display = 'flex'; document.getElementById('cBox').style.display = 'none';
        btnNext.innerHTML = "Correction 👀 ►"; 
        if(q.parts === 100) draw100Parts(q, false, stage); else drawSVGBar(q, false, stage);
      } else if (q.phase === 2) {
        document.getElementById('hBox').style.display = 'flex'; document.getElementById('cBox').style.display = 'block';
        document.getElementById('cText').innerHTML = q.cHtml; 
        if(q.parts === 100) draw100Parts(q, true, stage); else drawSVGBar(q, true, stage);
        if (currentIndex === quizData.length - 1) { btnNext.innerHTML = "Terminé ✓"; btnNext.disabled = true; } 
        else { btnNext.innerHTML = "Question suiv. ►"; btnNext.disabled = false; }
      }
      updateThumbnails();
    }

    function loadSlide(index, startPhase = 0) { currentIndex = index; quizData[currentIndex].phase = startPhase; document.getElementById('btnNext').disabled = false; updateUI(); }
    function nextAction() { const q = quizData[currentIndex]; if (q.phase === 0) q.phase = 1; else if (q.phase === 1) q.phase = 2; else if (q.phase === 2 && currentIndex < quizData.length - 1) loadSlide(currentIndex + 1, 0); updateUI(); }
    function prevSlide() { const q = quizData[currentIndex]; if (q.phase === 2) q.phase = 1; else if (q.phase === 1) q.phase = 0; else if (q.phase === 0 && currentIndex > 0) loadSlide(currentIndex - 1, 2); updateUI(); }

      page2.className = 'print-page';
      page2.innerHTML = `
        <div class="print-header">
          <div class="print-seed">CORRIGÉ — Fiche n° ${quizSeed}</div>
        </div>
        <h2 class="print-title">Correction Détaillée</h2>`;
      
      quizData.forEach((q, i) => {
        let qDiv = document.createElement('div');
        qDiv.className = 'print-q';
        qDiv.innerHTML = `
          <div class="print-q-text"><strong>Question ${i+1} :</strong> ${q.qHtml}</div>
          <div class="print-c-text">✅ ${q.cHtml}</div>
        `;
        
        let svgWrap = document.createElement('div'); svgWrap.className = "stage-wrap";
        let svg = document.createElementNS(svgNS, "svg"); svg.setAttribute("viewBox", "0 0 1000 320");
        svgWrap.appendChild(svg); qDiv.appendChild(svgWrap);
        if(q.parts === 100) draw100Parts(q, true, svg); else drawSVGBar(q, true, svg);
        
        page2.appendChild(qDiv);
      });
      container.appendChild(page2);

      setTimeout(() => { window.print(); }, 300);
    }
  </script>
</body>
</html>
