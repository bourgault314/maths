<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Glisse unité</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
<style>
  :root{ --accent:#1283ff; --accent-dark:#0b67c6; --bg:#fbfbfe; --panel:#fff; --ink:#1b1b1b; --border:#d5d7de }
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:'Nunito',system-ui,Segoe UI,Roboto,Arial,sans-serif}
  .app{max-width:1100px;margin:16px auto;padding:0 12px}
  .topbar{display:flex;gap:10px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:10px; font-size:1.05rem}
  .left{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .right{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select{padding:8px 10px;border:1px solid var(--border);border-radius:10px;font-weight:700; font-size:1rem}
  .btn{border:none;background:var(--accent);color:#fff;font-weight:700;padding:9px 12px;border-radius:10px;cursor:pointer;box-shadow:0 6px 14px color-mix(in srgb, var(--accent) 30%, transparent)}
  .btn.secondary{background:#6b7280; box-shadow:0 6px 14px color-mix(in srgb, #6b7280 30%, transparent)}
  .btn.small{padding:7px 10px;border-radius:10px}
  .btn.print-btn{background:#10b981; box-shadow:0 6px 14px color-mix(in srgb, #10b981 30%, transparent)}
  .zoomLabel{font-weight:700;padding:6px 10px;border-radius:999px;border:1px solid var(--border);background:#fff}
  .btn:active{transform:translateY(1px)}

  .board{background:var(--panel);border:2px solid var(--accent);border-radius:14px;padding:16px 10px 14px;box-shadow:0 10px 26px rgba(0,0,0,.08)}
  .title{font-weight:900;color:color-mix(in srgb, var(--accent-dark) 90%, black);margin:0 0 20px 2px; font-size:1.6rem}

  .inner{position:relative;padding-top:120px; padding-bottom:120px;} 
  
  .board-columns {
    display: grid;
    grid-template-columns: repeat(var(--cols, 7), 1fr);
    gap: 4px; 
    position: relative;
    z-index: 1;
    user-select: none;
  }

  .family-col {
    display: flex;
    flex-direction: column;
    gap: 6px; 
  }

  .cursor{
    position:absolute; left:0; 
    box-sizing: border-box; 
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    border: 3px solid color-mix(in srgb, var(--accent-dark) 60%, transparent);
    border-radius: 8px; 
    pointer-events:none;
    transition:transform .15s ease-out, width .15s ease-out, top .15s ease-out, height .15s ease-out;
    z-index:3;
  }
  
  .cursor::after {
    content: ",";
    position: absolute;
    bottom: 32px; 
    right: -13px; 
    font-family: 'Nunito', Arial, sans-serif;
    font-size: 3.5rem; 
    font-weight: 800;
    color: var(--accent-dark);
    line-height: 0;
    text-shadow: 2px 2px 0 var(--panel), -2px -2px 0 var(--panel), 2px -2px 0 var(--panel), -2px 2px 0 var(--panel);
    z-index: 10;
  }

  .handle{
    position:absolute; left:0;
    width: 140px; 
    height: 75px; 
    background: linear-gradient(135deg, var(--accent), var(--accent-dark));
    border: 2px solid #fff;
    border-radius: 12px;
    z-index:11;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    color: #fff; text-align: center;
    user-select: none; cursor: grab;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    box-sizing: border-box;
    padding: 6px;
    transition: transform .15s ease-out, top .15s ease-out;
    touch-action: none;
  }
  .handle.dragging{cursor:grabbing; filter: brightness(1.1); z-index:20;}
  
  .h-text { font-size: 1.1rem; font-weight: 900; line-height: 1.15; }

  .handle-top::after {
    content: ""; position: absolute; bottom: -14px; left: 50%; transform: translateX(-50%);
    border-left: 14px solid transparent; border-right: 14px solid transparent; border-top: 14px solid var(--accent-dark);
  }
  .handle-bottom::before {
    content: ""; position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
    border-left: 14px solid transparent; border-right: 14px solid transparent; border-bottom: 14px solid var(--accent);
  }

  .head-group { display: grid; gap: 4px; }

  .unitBtn{
    background:color-mix(in srgb, var(--accent) 12%, #fff);
    border:2px solid var(--accent);
    border-radius:8px;
    cursor:pointer; 
    font-size:1.15rem; 
    display:flex; 
    align-items:center;
    justify-content:center;
    min-height: 44px;
    padding:0;
    transition: background 0.1s;
  }
  .unitBtn span { font-weight:700; }
  .unitBtn:not(.empty-unit):hover{background:color-mix(in srgb, var(--accent) 18%, #fff)}
  
  .unitBtn.empty-unit { cursor: default; background: transparent; border-color: color-mix(in srgb, var(--accent) 30%, transparent); }

  .cell{position:relative;background:transparent;min-height:auto;display:flex;align-items:stretch;justify-content:center}
  
  .slots{margin-top:0;display:grid;gap:4px;width:100%;align-items:stretch;}
  
  .digit{
    box-sizing:border-box; width:100%; text-align:center;
    font-weight:600; font-size:2.8rem; 
    border:2px solid var(--accent); border-radius:8px; background:#fff; color:#000; padding:0 4px; 
    transition: color 0.2s;
    min-height:92px; outline: none;
  }
  .digit:focus { background: #fdfdfd; box-shadow: inset 0 0 0 1px var(--accent); }

  .unit-highlight { 
    color: var(--accent-dark); 
    font-weight: 600 !important; 
    text-shadow: 0 0 1px var(--accent-dark), 0 0 1px var(--accent-dark);
  }

  .result{
    display:flex; flex-direction: column; align-items: center; justify-content: center;
    width:fit-content; max-width:100%; margin:10px auto 12px; padding:12px 24px;
    border-radius:12px; background:#f5f9ff; border:1px solid #cfe0ff; text-align:center; min-height: 105px;
  }
  .result .mainLine{ display:block; font-weight:500; font-size:2.75rem; color:#000; line-height:1.12; }
  .result .eqLine{ display:block; margin-top:8px; font-weight:500; font-size:1.05rem; color:#000; opacity:.8; }

  .subhead-group{ display:grid; gap:4px; height:22px; position:relative; z-index:4; pointer-events:none; }
  .sub-lab-wrapper { display: flex; justify-content: center; align-items: flex-end; }
  .sub-lab{white-space:nowrap;font-weight:900;color:color-mix(in srgb, var(--accent-dark) 90%, black); line-height: 1;}

  #print-container { display: none; }
  
  @media print {
    @page { size: A4 landscape; margin: 12mm; }
    body { background: #fff; }
    .app { display: none !important; } 
    
    #print-container { display: block !important; width: 100%; }
    .print-page {
      display: flex; flex-direction: column; justify-content: space-around;
      height: 185mm; page-break-after: always;
    }
    .print-board {
      box-shadow: none !important; border: 2px solid var(--accent); 
      margin: 0; padding: 10px 10px 20px 10px; border-radius: 10px; transform: none !important;
    }
    .print-inner { padding-top: 0 !important; padding-bottom: 0 !important; }
    .print-title { font-size: 1.6rem; text-align: center; margin-bottom: 15px; color: var(--accent-dark); font-weight: 900; }
    
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="left">
      <label for="kind"><strong>Grandeur :</strong></label>
      <select id="kind">
        <option value="length" selected>Longueur (m)</option>
        <option value="mass">Masse (g)</option>
        <option value="massT">Masse complète (t ↔ mg)</option>
        <option value="volL">Volume (L)</option>
        <option value="area">Aire (m²)</option>
        <option value="volM3">Volume (m³)</option>
        <option value="cross">L ↔ m³</option>
      </select>
      <button class="btn" id="toggleShow">Masquer</button>
      <button class="btn secondary" id="reset">Remise à zéro</button>
      <button class="btn" id="freezeBtn" style="width: 170px;">📌 Figer le départ</button>
    </div>
    <div class="right">
      <button class="btn small print-btn" id="printBtn" title="Imprimer tous les tableaux (2 par page)">🖨️ Tout imprimer</button>
      <button class="btn secondary small" id="fsBtn" title="Plein écran">⛶</button>
      <button class="btn secondary small" id="zoomOut" title="Dézoomer">−</button>
      <span class="zoomLabel" id="zoomLabel">100%</span>
      <button class="btn secondary small" id="zoomIn" title="Zoomer">+</button>
    </div>
  </div>

  <div class="board">
    <div class="title" id="title">CONVERSIONS</div>
    <div class="result" id="result"></div>

    <div class="inner" id="inner">
      <div class="cursor" id="cursor"></div>
      
      <div class="handle handle-top" id="handleTop" title="Glisse pour choisir l'unité">
        <div class="h-text">L'unité de<br>mesure</div>
      </div>

      <div class="handle handle-bottom" id="handleBottom" title="Glisse pour choisir l'unité">
        <div class="h-text">Le chiffre des<br>unités</div>
      </div>

      <div class="board-columns" id="boardColumns"></div>
    </div>
  </div>
</div>

<script>
(function(){
  const THEMES = {
    length:['#1283ff','#0b67c6'], mass:['#16a34a','#0e7a36'], massT:['#16a34a','#0e7a36'],
    volL:['#06b6d4','#0a8aa3'], area:['#f59e0b','#b77207'], volM3:['#7c3aed','#5a27b0'], cross:['#db2777','#a81d5a'],
  };
  const SCHEMAS = {
    length:{label:'Longueur (m)', units:['km','hm','dam','m','dm','cm','mm'], base:'m', slots:1},
    mass:  {label:'Masse (g)', units:['kg','hg','dag','g','dg','cg','mg'], base:'g', slots:1},
    massT: {label:'Masse complète (t)', units:['t','q','-','kg','hg','dag','g','dg','cg','mg'], base:'g', slots:1},
    volL:  {label:'Volume (L)', units:['kL','hL','daL','L','dL','cL','mL'], base:'L', slots:1},
    area:  {label:'Aire (m²)', units:['km²','hm²','dam²','m²','dm²','cm²','mm²'], base:'m²', slots:2},
    volM3: {label:'Volume (m³)', units:['km³','hm³','dam³','m³','dm³','cm³','mm³'], base:'m³', slots:3},
    cross: {label:'Litres ↔ mètres cubes', units:['km³','hm³','dam³','m³','dm³','cm³','mm³'], base:'m³', slots:3},
  };

  const CROSS_LABELS = { '3_2': 'kL', '4_0': 'hL', '4_1': 'daL', '4_2': 'L', '5_0': 'dL', '5_1': 'cL', '5_2': 'mL' };
  const AREA_LABELS = { '1_1': 'ha', '2_1': 'a' };

  const kindSel = document.getElementById('kind'), titleEl = document.getElementById('title'), boardColumns = document.getElementById('boardColumns'), inner = document.getElementById('inner'), board = document.querySelector('.board'), cursor = document.getElementById('cursor');
  const handles = [document.getElementById('handleTop'), document.getElementById('handleBottom')];
  const btnTog = document.getElementById('toggleShow'), btnRst = document.getElementById('reset'), result = document.getElementById('result'), zoomOut = document.getElementById('zoomOut'), zoomIn = document.getElementById('zoomIn'), zoomLabel = document.getElementById('zoomLabel'), fsBtn = document.getElementById('fsBtn');
  const printBtn = document.getElementById('printBtn');
  const freezeBtn = document.getElementById('freezeBtn');

  let schema = SCHEMAS.length, targetIdx = 3, isShown = true, inputs = [], savedStudent = null, zoomScale = 1;
  let isFrozen = false, frozenUnitIdx = -1;

  function applyZoom(){
    board.style.transform = `scale(${zoomScale})`;
    board.style.transformOrigin = 'top center';
    zoomLabel.textContent = `${Math.round(zoomScale*100)}%`;
    requestAnimationFrame(() => setTarget(targetIdx, false));
  }

  function setTheme(kind){
    const [c,cd] = THEMES[kind];
    document.documentElement.style.setProperty('--accent', c);
    document.documentElement.style.setProperty('--accent-dark', cd);
  }

  function rebuild(){
    const kind = kindSel.value; schema = SCHEMAS[kind]; setTheme(kind);
    titleEl.textContent = `CONVERSIONS – ${schema.label}`;
    boardColumns.style.setProperty('--cols', schema.units.length);
    boardColumns.innerHTML=''; inputs=[];
    
    isFrozen = false;
    frozenUnitIdx = -1;
    if(freezeBtn) {
        freezeBtn.innerHTML = '📌 Figer le départ';
        freezeBtn.classList.remove('secondary');
    }

    schema.units.forEach((u,i)=>{
      const col = document.createElement('div');
      col.className = 'family-col';
      
      const headGrp = document.createElement('div');
      headGrp.className = 'head-group';
      headGrp.style.gridTemplateColumns = `repeat(${schema.slots}, 1fr)`;
      
      for(let s=0; s<schema.slots; s++){
        const b = document.createElement('div'); b.className = 'unitBtn'; 
        if (s === schema.slots - 1) {
            const span = document.createElement('span'); 
            span.textContent = u; 
            
            if (u.length >= 4 && schema.slots === 3) {
                span.style.fontSize = '0.82em';
                span.style.letterSpacing = '-0.5px';
            }
            
            b.appendChild(span);
            b.addEventListener('click', ()=>{
              if(document.activeElement && document.activeElement.classList.contains('digit')) document.activeElement.blur();
              setTarget(i,true);
            });
        } else {
            b.classList.add('empty-unit');
        }
        headGrp.appendChild(b);
      }
      col.appendChild(headGrp);

      if (kind === 'cross' || kind === 'area') { 
          const subGrp = document.createElement('div');
          subGrp.className = 'subhead-group';
          subGrp.style.gridTemplateColumns = `repeat(${schema.slots}, 1fr)`;
          const labelsMap = kind === 'cross' ? CROSS_LABELS : AREA_LABELS;
          
          for (let si = 0; si < schema.slots; si++) {
              const w = document.createElement('div'); w.className = 'sub-lab-wrapper';
              const key = `${i}_${si}`;
              if (labelsMap[key]) {
                  const lab = document.createElement('span'); lab.className = 'sub-lab'; lab.textContent = labelsMap[key];
                  w.appendChild(lab);
              }
              subGrp.appendChild(w);
          }
          col.appendChild(subGrp);
      }

      const cell = document.createElement('div'); cell.className='cell';
      const wrap = document.createElement('div'); wrap.className='slots'; wrap.dataset.slots=String(schema.slots);
      wrap.style.gridTemplateColumns = `repeat(${schema.slots}, 1fr)`;
      wrap.style.setProperty('--S', schema.slots);
      
      const slots=[];
      for(let s=0;s<schema.slots;s++){
        const inp=document.createElement('input'); inp.className='digit'; inp.maxLength=1; inp.inputMode='numeric';
        inp.addEventListener('input', ()=>{
          const m=inp.value.match(/[0-9]/); inp.value=m?m[0]:'';
          if(isShown){ completeZerosInTable(); updateResult(); }
          if(inp.value){ const [ci,si]=findIndex(inp); focusNext(ci,si); }
        });
        inp.addEventListener('keydown',(e)=>{
          const [ci,si]=findIndex(inp);
          if(e.key==='ArrowLeft'){ e.preventDefault(); focusPrev(ci,si); }
          else if(e.key==='ArrowRight'){ e.preventDefault(); focusNext(ci,si); }
          else if(e.key==='Backspace' && inp.value===''){ e.preventDefault(); focusPrev(ci,si); }
          else if(/^[0-9]$/.test(e.key)){ e.preventDefault(); inp.value=e.key; focusNext(ci,si); if(isShown){ completeZerosInTable(); updateResult(); } }
        });
        inp.addEventListener('focus', ()=>inp.select());
        wrap.appendChild(inp); slots.push(inp);
      }
      cell.appendChild(wrap); col.appendChild(cell);
      
      boardColumns.appendChild(col);
      inputs.push(slots);
    });

    let defaultIdx = schema.units.indexOf(schema.base);
    if(defaultIdx === -1) defaultIdx = 3; 

    cursor.style.transition = 'none';
    handles.forEach(h => { if(h) h.style.transition = 'none'; });

    requestAnimationFrame(() => { 
      setTarget(defaultIdx, false); 
      if(isShown){ completeZerosInTable(); updateResult(); } 
      void inner.offsetWidth;
      cursor.style.transition = 'transform .15s ease-out, width .15s ease-out, top .15s ease-out, height .15s ease-out';
      handles.forEach(h => { if(h) h.style.transition = 'transform .15s ease-out, top .15s ease-out'; });
    });
  }

  function getSlotMetrics(ci) {
    const targetInput = inputs[ci] && inputs[ci][schema.slots - 1];
    if (!targetInput) return { x: 0, w: 0, cx: 0 };
    
    const innerRect = inner.getBoundingClientRect();
    const inpRect = targetInput.getBoundingClientRect();
    
    let x = (inpRect.left - innerRect.left) / zoomScale;
    let w = inpRect.width / zoomScale;
    
    return { x: x, w: w, cx: x + w / 2 };
  }

  function findIndex(inp){
    for(let ci=0;ci<inputs.length;ci++){
      const si=inputs[ci].indexOf(inp); if(si!==-1) return [ci,si];
    } return [-1,-1];
  }
  function focusNext(ci,si){ if(si<schema.slots-1) inputs[ci][si+1].focus(); else if(ci<inputs.length-1) inputs[ci+1][0].focus(); }
  function focusPrev(ci,si){ if(si>0) inputs[ci][si-1].focus(); else if(ci>0) inputs[ci-1][schema.slots-1].focus(); }

  function setTarget(i,refresh){
    targetIdx = i; const metrics = getSlotMetrics(i);
    
    cursor.style.width = `${metrics.w}px`;
    cursor.style.transform = `translateX(${metrics.x}px)`;
    
    const colDiv = boardColumns.children[i];
    const headBtn = colDiv ? colDiv.querySelector('.unitBtn:not(.empty-unit)') : null;
    const cellTarget = inputs[i] ? inputs[i][schema.slots - 1] : null;

    if (headBtn && cellTarget) {
        const innerRect = inner.getBoundingClientRect();
        const headRect = headBtn.getBoundingClientRect();
        const cellRect = cellTarget.getBoundingClientRect();
        
        const topPx = (headRect.top - innerRect.top) / zoomScale;
        const bottomPx = (cellRect.bottom - innerRect.top) / zoomScale;
        
        cursor.style.top = `${topPx}px`;
        cursor.style.height = `${bottomPx - topPx}px`;
        
        const handleTop = document.getElementById('handleTop');
        const handleBottom = document.getElementById('handleBottom');
        
        if (handleTop) handleTop.style.top = `${topPx - 75 - 14}px`;
        if (handleBottom) handleBottom.style.top = `${bottomPx + 14}px`;
    }

    handles.forEach(h => {
        if(h) h.style.transform = `translateX(calc(${metrics.cx}px - 50%))`;
    });
    
    inputs.forEach(col => col.forEach(inp => inp.classList.remove('unit-highlight')));
    if(inputs[targetIdx] && inputs[targetIdx][schema.slots - 1]) inputs[targetIdx][schema.slots - 1].classList.add('unit-highlight');
    if(isShown && refresh){ completeZerosInTable(); updateResult(); }
  }

  let isDragging = false;
  function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }

  handles.forEach(handle => {
    if(!handle) return;
    
    handle.addEventListener('pointerdown', (e)=>{
      e.preventDefault(); 
      if(document.activeElement && document.activeElement.classList.contains('digit')) {
         document.activeElement.blur();
      }
      isDragging = true; 
      handles.forEach(h => h.classList.add('dragging'));
      cursor.style.transition = 'none'; 
      handles.forEach(h => h.style.transition = 'none');
      handle.setPointerCapture(e.pointerId);
    });

    handle.addEventListener('pointermove', (e)=>{
      if(!isDragging) return;
      const innerRect = inner.getBoundingClientRect();
      const relativeX = (e.clientX - innerRect.left) / zoomScale;
      const clampedX = clamp(relativeX, 0, innerRect.width / zoomScale);
      
      cursor.style.transform = `translateX(calc(${clampedX}px - 50%))`;
      handles.forEach(h => h.style.transform = `translateX(calc(${clampedX}px - 50%))`);
    });

    const endDrag = (e) => {
      if(!isDragging) return; 
      isDragging = false;
      handles.forEach(h => h.classList.remove('dragging')); 
      handle.releasePointerCapture(e.pointerId);
      cursor.style.transition = 'transform .15s ease-out, width .15s ease-out, top .15s ease-out, height .15s ease-out';
      handles.forEach(h => h.style.transition = 'transform .15s ease-out, top .15s ease-out');
      
      const innerRect = inner.getBoundingClientRect();
      const relativeX = (e.clientX - innerRect.left) / zoomScale;
      const totalWidth = innerRect.width / zoomScale;
      const colWidth = totalWidth / schema.units.length;
      const i = clamp(Math.floor(relativeX / colWidth), 0, schema.units.length - 1);
      setTarget(i, true);
    };
    handle.addEventListener('pointerup', endDrag);
    handle.addEventListener('pointercancel', endDrag);
  });

  function completeZerosInTable(){
    const S = schema.slots, total = schema.units.length * S;
    const slot = (k)=> inputs[Math.floor(k/S)][k%S];
    for(let k=0;k<total;k++){ const el = slot(k); if(el.classList.contains('ghost0')){ el.value=''; el.classList.remove('ghost0'); } }
    let first=-1, last=-1;
    for(let k=0;k<total;k++){ const v = slot(k).value.trim(); if(/^[0-9]$/.test(v)){ if(first===-1) first=k; last=k; } }
    if(first===-1) return;
    if (document.activeElement && document.activeElement.classList.contains('digit')) return;
    const targetRightSlot = targetIdx * S + (S - 1);
    const start = Math.min(first, targetRightSlot);
    const end = Math.max(last, targetRightSlot);
    for(let k=start; k<=end; k++){ const el = slot(k); if(el.value===''){ el.value='0'; el.classList.add('ghost0'); } }
  }

  function saveStudent(){ savedStudent = inputs.map(col=>col.map(inp=>inp.value)); }
  function restoreStudent(){
    if(!savedStudent) return;
    for(let i=0;i<inputs.length;i++)
      for(let s=0;s<inputs[i].length;s++){ inputs[i][s].value=savedStudent[i][s]; inputs[i][s].classList.remove('ghost0'); }
  }

  function getFormattedValueInfo(uIdx) {
    const u = schema.units[uIdx];
    const S = schema.slots;
    const targetPos = uIdx * S + (S - 1);
    
    let arr = [];
    for(let ci=0; ci<schema.units.length; ci++){
      for(let si=0; si<S; si++){
        arr.push(inputs[ci][si].value.trim());
      }
    }
    
    let firstIndex = -1, lastIndex = -1;
    for(let i=0; i<arr.length; i++) {
      if(/^[0-9]$/.test(arr[i])) {
        if(firstIndex === -1) firstIndex = i;
        lastIndex = i;
      }
    }
    
    let displayU = (u === '-') ? 'dizaines de kg' : u;

    if(firstIndex === -1) {
      let compact = '0';
      let html = `${highlightUnitDigit(compact)} <span class="unit-highlight">${displayU}</span>`;
      return { html, compact, u };
    }
    
    let start = Math.min(firstIndex, targetPos);
    let end = Math.max(lastIndex, targetPos);
    
    let left = "";
    let right = "";
    
    for(let i = start; i <= end; i++) {
      let char = (/^[0-9]$/.test(arr[i])) ? arr[i] : '0';
      if (i <= targetPos) left += char;
      else right += char;
    }
    
    left = left.replace(/^0+/, '');
    if (left === '') left = '0';
    right = right.replace(/0+$/, '');
    
    left = left.replace(/\B(?=(\d{3})+(?!\d))/g, " ");

    let compact = left + (right.length > 0 ? ',' + right : '');
    let html = `${highlightUnitDigit(compact)} <span class="unit-highlight">${displayU}</span>`;
    
    return { html, compact, u };
  }

  function updateResult(){
    result.innerHTML = '';
    const main = document.createElement('span'); main.className = 'mainLine';

    let liveInfo = getFormattedValueInfo(targetIdx);

    if (isFrozen && frozenUnitIdx !== -1 && frozenUnitIdx !== targetIdx) {
        let frozenInfo = getFormattedValueInfo(frozenUnitIdx);
        main.innerHTML = `${frozenInfo.html} <span style="color:#000; font-weight:900; margin:0 8px;">=</span> ${liveInfo.html}`;
    } else {
        main.innerHTML = liveInfo.html;
    }

    result.appendChild(main);

    const kind = kindSel.value;
    const u = liveInfo.u;
    const compact = liveInfo.compact;

    if(kind === 'area' && (u === 'hm²' || u === 'dam²')){
      const alt = (u === 'hm²') ? 'ha' : 'a'; addEqLine(`${compact} ${u} = ${compact} ${alt}`);
    }
    if(kind === 'cross'){
      if(u === 'm³') addEqLine(`${compact} m³ = ${compact} kL`);
      else if(u === 'dm³') addEqLine(`${compact} dm³ = ${compact} L`);
      else if(u === 'cm³') addEqLine(`${compact} cm³ = ${compact} mL`);
    }
  }

  function highlightUnitDigit(s) {
    const p = s.split(','); 
    if(p[0].length > 0){ 
      p[0] = p[0].slice(0,-1) + `<span class="unit-highlight">${p[0].slice(-1)}</span>`; 
    } 
    return p.join(',');
  }
  
  function addEqLine(t){ const e = document.createElement('span'); e.className = 'eqLine'; e.innerHTML = t; result.appendChild(e); }

  freezeBtn.addEventListener('click', () => {
    if (!isFrozen) {
        isFrozen = true;
        frozenUnitIdx = targetIdx;
        freezeBtn.innerHTML = '🔓 Modifier';
        freezeBtn.classList.add('secondary');
    } else {
        isFrozen = false;
        frozenUnitIdx = -1;
        freezeBtn.innerHTML = '📌 Figer le départ';
        freezeBtn.classList.remove('secondary');
    }
    updateResult();
  });

  btnTog.addEventListener('click', ()=>{ if(!isShown){ saveStudent(); completeZerosInTable(); updateResult(); result.style.display='flex'; btnTog.textContent='Masquer'; isShown=true; } else { restoreStudent(); result.style.display='none'; btnTog.textContent='Afficher'; isShown=false; } });
  
  btnRst.addEventListener('click', ()=>{ 
    inputs.forEach(col=>col.forEach(inp=>{ inp.value=''; inp.classList.remove('ghost0'); })); 
    isFrozen = false;
    frozenUnitIdx = -1;
    if(freezeBtn) {
        freezeBtn.innerHTML = '📌 Figer le départ';
        freezeBtn.classList.remove('secondary');
    }
    setTarget(schema.units.indexOf(schema.base),true); 
  });
  
  zoomIn.addEventListener('click', ()=>{ zoomScale = Math.min(1.6, zoomScale + 0.1); applyZoom(); });
  zoomOut.addEventListener('click', ()=>{ zoomScale = Math.max(0.8, zoomScale - 0.1); applyZoom(); });
  fsBtn.addEventListener('click', ()=>{ if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); });
  kindSel.addEventListener('change', rebuild);
  
  if(printBtn) {
    printBtn.addEventListener('click', () => {
      const printContainer = document.createElement('div');
      printContainer.id = 'print-container';
      
      const kinds = Object.keys(SCHEMAS);
      let pageDiv = null;
      
      kinds.forEach((k, index) => {
        if(index % 2 === 0) {
          pageDiv = document.createElement('div');
          pageDiv.className = 'print-page';
          printContainer.appendChild(pageDiv);
        }
        
        const s = SCHEMAS[k];
        const [c, cd] = THEMES[k];
        
        const boardDiv = document.createElement('div');
        boardDiv.className = 'board print-board';
        boardDiv.style.setProperty('--accent', c);
        boardDiv.style.setProperty('--accent-dark', cd);
        
        const title = document.createElement('div');
        title.className = 'print-title';
        title.textContent = `CONVERSIONS – ${s.label}`;
        boardDiv.appendChild(title);
        
        const innerPrint = document.createElement('div');
        innerPrint.className = 'inner print-inner';
        
        const boardColsPrint = document.createElement('div');
        boardColsPrint.className = 'board-columns';
        boardColsPrint.style.setProperty('--cols', s.units.length);
        
        s.units.forEach((u, ci) => {
          const col = document.createElement('div');
          col.className = 'family-col';
          
          const headGrp = document.createElement('div');
          headGrp.className = 'head-group';
          headGrp.style.gridTemplateColumns = `repeat(${s.slots}, 1fr)`;
          for(let si=0; si < s.slots; si++){
             const b = document.createElement('div');
             b.className = 'unitBtn';
             if(si === s.slots - 1) {
                const span = document.createElement('span'); 
                span.textContent = u; 
                
                if (u.length >= 4 && s.slots === 3) {
                    span.style.fontSize = '0.82em';
                    span.style.letterSpacing = '-0.5px';
                }
                
                b.appendChild(span);
             } else {
                b.classList.add('empty-unit');
             }
             headGrp.appendChild(b);
          }
          col.appendChild(headGrp);
          
          if(k === 'cross' || k === 'area') {
            const subGrp = document.createElement('div');
            subGrp.className = 'subhead-group';
            subGrp.style.gridTemplateColumns = `repeat(${s.slots}, 1fr)`;
            const labelsMap = k === 'cross' ? CROSS_LABELS : AREA_LABELS;
            
            for (let si = 0; si < s.slots; si++) {
                const w = document.createElement('div'); w.className = 'sub-lab-wrapper';
                const key = `${ci}_${si}`;
                if (labelsMap[key]) {
                    const lab = document.createElement('span'); lab.className = 'sub-lab'; lab.textContent = labelsMap[key];
                    w.appendChild(lab);
                }
                subGrp.appendChild(w);
            }
            col.appendChild(subGrp);
          }
          
          const cell = document.createElement('div');
          cell.className = 'cell';
          const wrap = document.createElement('div');
          wrap.className = 'slots';
          wrap.dataset.slots = String(s.slots);
          wrap.style.gridTemplateColumns = `repeat(${s.slots}, 1fr)`;
          for(let i=0; i<s.slots; i++){
            const inp = document.createElement('input');
            inp.className = 'digit';
            inp.disabled = true; 
            wrap.appendChild(inp);
          }
          cell.appendChild(wrap);
          col.appendChild(cell);
          
          boardColsPrint.appendChild(col);
        });
        
        innerPrint.appendChild(boardColsPrint);
        boardDiv.appendChild(innerPrint);
        pageDiv.appendChild(boardDiv);
      });
      
      document.body.appendChild(printContainer);
      window.print();
      document.body.removeChild(printContainer);
    });
  }

  rebuild(); applyZoom();
})();
</script>
</body>
</html>
