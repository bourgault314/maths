<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier : Unités de Volume 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: sans-serif; }
        /* L'endroit où la 3D va s'afficher */
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        /* Une petite UI par-dessus pour tester */
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="bg-white/90 p-4 rounded-xl shadow-lg border border-slate-200 pointer-events-auto">
            <h1 class="text-xl font-bold text-slate-800">1 dm³</h1>
            <p class="text-sm text-slate-500">Clique et glisse pour tourner autour</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        // 1. INITIALISATION DE LA SCÈNE
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        // On met un fond gris très clair pour faire ressortir le cube
        scene.background = new THREE.Color('#f8fafc');

        // 2. LA CAMÉRA (nos "yeux" dans le monde 3D)
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(20, 15, 25); // On se place un peu en hauteur et de biais

        // 3. LE MOTEUR DE RENDU
        const renderer = new THREE.WebGLRenderer({ antialias: true }); // antialias lisse les bords
        renderer.setSize(window.innerWidth, window.innerHeight);
        // On active les ombres pour plus de réalisme
        renderer.shadowMap.enabled = true; 
        container.appendChild(renderer.domElement);

        // 4. LES CONTRÔLES (pour tourner avec la souris)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; // Ajoute de la fluidité dans le mouvement
        controls.dampingFactor = 0.05;

        // 5. LA LUMIÈRE
        // Lumière globale douce
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        
        // Lumière directionnelle (comme un soleil) qui projette des ombres
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // 6. NOTRE PREMIER OBJET : LE CUBE DE 1 dm³ (représenté par 10 unités de large pour préparer la suite)
        const geometry = new THREE.BoxGeometry(10, 10, 10);
        // Un matériau bleu translucide style verre
        const material = new THREE.MeshPhysicalMaterial({ 
            color: 0x3b82f6, 
            metalness: 0.1,
            roughness: 0.2,
            transparent: true,
            opacity: 0.8,
            side: THREE.DoubleSide
        });
        
        const cube = new THREE.Mesh(geometry, material);
        // On ajoute des arêtes noires pour bien voir les contours du cube (style pédagogique)
        const edges = new THREE.EdgesGeometry(geometry);
        const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x1e40af, linewidth: 2 }));
        cube.add(line); // On attache les lignes au cube

        scene.add(cube);

        // 7. BOUCLE D'ANIMATION (essentiel en 3D pour mettre à jour l'image en continu)
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); // Met à jour l'inertie de la caméra
            renderer.render(scene, camera);
        }
        animate();

        // 8. GESTION DU REDIMENSIONNEMENT DE LA FENÊTRE
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
