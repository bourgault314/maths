<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier : Unités de Volume 3D - Centrage Parfait</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: sans-serif; }
        
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        
        /* L'ASTUCE EST ICI : Par défaut le canvas prend tout l'écran... */
        #canvas-container { position: absolute; top: 0; right: 0; bottom: 0; left: 0; }
        
        /* ... Mais sur un écran d'ordinateur ou projecteur, on laisse 420px vides à gauche pour le menu ! */
        @media (min-width: 800px) {
            #canvas-container { left: 420px; }
        }
    </style>
</head>
<body>

    <div id="ui-layer" class="pointer-events-none">
        <div class="bg-white/95 p-5 rounded-xl shadow-xl border border-slate-200 pointer-events-auto flex flex-col w-[380px] max-w-[calc(100vw-40px)]">
            
            <div class="flex gap-2 mb-3">
                <button onclick="changeUnit('m')" id="btn-u-m" class="unit-btn flex-1 py-1.5 rounded bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-colors">m³</button>
                <button onclick="changeUnit('dm')" id="btn-u-dm" class="unit-btn flex-1 py-1.5 rounded bg-blue-500 text-white font-bold shadow-sm transition-colors">dm³</button>
                <button onclick="changeUnit('cm')" id="btn-u-cm" class="unit-btn flex-1 py-1.5 rounded bg-slate-100 text-slate-600 font-bold hover:bg-slate-200 transition-colors">cm³</button>
            </div>

            <div class="mb-3 border-b border-slate-100 pb-4 min-h-[85px]">
                <div class="flex justify-between items-start mb-1">
                    <h1 class="text-2xl font-black text-slate-800" id="main-equation">
                        1 dm³ <span class="text-slate-300">= ?</span>
                    </h1>
                    <button id="btn-reveal" class="shrink-0 text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 py-1.5 px-3 rounded-full font-bold transition-colors ml-2 mt-1">
                        👀 Réponse
                    </button>
                </div>
                
                <p id="sub-text" class="text-sm text-slate-400 font-medium italic">Que représente un petit cube ?</p>
            </div>
            
            <div class="bg-slate-50 p-2 rounded text-xs font-semibold text-slate-600 flex flex-col gap-1 border border-slate-100 mb-4">
                <div>🖱️ <span class="text-slate-400">Clic + Glisser :</span> Tourner la vue</div>
                <div>↕️ <span class="text-slate-400">Molette souris :</span> Zoomer / Dézoomer</div>
            </div>
            
            <div class="flex flex-col gap-2">
                <button id="btn-plaques" class="w-full text-left bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-between items-center">
                    <span>1. Écarter les plaques</span> <span class="text-xs bg-white/20 px-1.5 py-0.5 rounded">x10</span>
                </button>
                
                <button id="btn-barres" class="w-full text-left bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-between items-center">
                    <span>2. Écarter les barres</span> <span class="text-xs bg-white/20 px-1.5 py-0.5 rounded">x100</span>
                </button>

                <button id="btn-cubes" class="w-full text-left bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-lg transition-colors shadow-sm flex justify-between items-center">
                    <span>3. Écarter les unités</span> <span class="text-xs bg-white/20 px-1.5 py-0.5 rounded">x1000</span>
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // 1. SCÈNE, CAMÉRA, RENDU
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        // On rend le fond de la scène transparent pour qu'il fusionne avec le body
        scene.background = null; 

        // On utilise la largeur et hauteur DU CONTENEUR (et non plus de la fenêtre entière)
        let w = container.clientWidth;
        let h = container.clientHeight;

        const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 1000);
        // On recule un tout petit peu la caméra (z:34) car notre zone de dessin est un peu plus étroite
        camera.position.set(28, 20, 34); 

        // Alpha: true permet d'avoir le fond transparent
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        renderer.shadowMap.enabled = true; 
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.zoomSpeed = 1.2;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
        dirLight.position.set(20, 40, 20);
        scene.add(dirLight);

        // 2. LE PAVAGE 
        const unitGeometry = new THREE.BoxGeometry(1, 1, 1);
        const unitEdges = new THREE.EdgesGeometry(unitGeometry);
        const material = new THREE.MeshLambertMaterial({ color: 0x60a5fa }); 
        const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x1e3a8a, linewidth: 1, transparent: true, opacity: 0.5 });

        const mainGroup = new THREE.Group();

        for (let x = 0; x < 10; x++) {
            const plaqueGroup = new THREE.Group();
            plaqueGroup.userData.baseX = x - 4.5; 
            
            for (let y = 0; y < 10; y++) {
                const barreGroup = new THREE.Group();
                barreGroup.userData.baseY = y - 4.5;
                
                for (let z = 0; z < 10; z++) {
                    const cube = new THREE.Mesh(unitGeometry, material);
                    const edges = new THREE.LineSegments(unitEdges, edgeMaterial);
                    cube.add(edges);
                    
                    cube.userData.baseZ = z - 4.5;
                    cube.position.set(0, 0, cube.userData.baseZ); 
                    barreGroup.add(cube);
                }
                barreGroup.position.set(0, barreGroup.userData.baseY, 0);
                plaqueGroup.add(barreGroup);
            }
            plaqueGroup.position.set(plaqueGroup.userData.baseX, 0, 0);
            mainGroup.add(plaqueGroup);
        }
        scene.add(mainGroup);

        // 3. LOGIQUE D'ANIMATION
        let isPlaquesEclatees = false, isBarresEclatees = false, isCubesEclates = false;
        const btnPlaques = document.getElementById('btn-plaques');
        const btnBarres = document.getElementById('btn-barres');
        const btnCubes = document.getElementById('btn-cubes');

        function toggleButtonState(btn, isEclate) {
            if(isEclate) {
                btn.classList.replace('bg-blue-600', 'bg-blue-800');
                btn.classList.replace('hover:bg-blue-700', 'hover:bg-blue-900');
            } else {
                btn.classList.replace('bg-blue-800', 'bg-blue-600');
                btn.classList.replace('hover:bg-blue-900', 'hover:bg-blue-700');
            }
        }

        btnPlaques.addEventListener('click', () => {
            isPlaquesEclatees = !isPlaquesEclatees;
            toggleButtonState(btnPlaques, isPlaquesEclatees);
            mainGroup.children.forEach(plaque => {
                gsap.to(plaque.position, { x: plaque.userData.baseX * (isPlaquesEclatees ? 2.5 : 1), duration: 1, ease: "power2.inOut" });
            });
        });

        btnBarres.addEventListener('click', () => {
            isBarresEclatees = !isBarresEclatees;
            toggleButtonState(btnBarres, isBarresEclatees);
            mainGroup.children.forEach(plaque => {
                plaque.children.forEach(barre => {
                    gsap.to(barre.position, { y: barre.userData.baseY * (isBarresEclatees ? 2.5 : 1), duration: 1, ease: "power2.inOut" });
                });
            });
        });

        btnCubes.addEventListener('click', () => {
            isCubesEclates = !isCubesEclates;
            toggleButtonState(btnCubes, isCubesEclates);
            mainGroup.children.forEach(plaque => {
                plaque.children.forEach(barre => {
                    barre.children.forEach(cube => {
                        gsap.to(cube.position, { z: cube.userData.baseZ * (isCubesEclates ? 2.5 : 1), duration: 1, ease: "power2.inOut" });
                    });
                });
            });
        });

        // 4. LOGIQUE D'AFFICHAGE ET GESTION DES UNITÉS
        const unitData = {
            'm': { left: '1 m³', right: '1000 dm³', subRight: '1 dm³' },
            'dm': { left: '1 dm³', right: '1000 cm³', subRight: '1 cm³' },
            'cm': { left: '1 cm³', right: '1000 mm³', subRight: '1 mm³' }
        };

        let currentUnit = 'dm';
        let isRevealed = false;
        
        const btnReveal = document.getElementById('btn-reveal');
        const eqEl = document.getElementById('main-equation');
        const subEl = document.getElementById('sub-text');

        function updateUI() {
            const data = unitData[currentUnit];
            
            if (isRevealed) {
                eqEl.innerHTML = `${data.left} <span class="text-blue-600">= ${data.right}</span>`;
                subEl.innerHTML = `1 petit cube = <strong class="text-blue-600">${data.subRight}</strong>`;
                subEl.className = "text-sm text-slate-600 font-medium";
                
                btnReveal.innerHTML = "🙈 Cacher";
                btnReveal.className = "shrink-0 text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 py-1.5 px-3 rounded-full font-bold transition-colors ml-2 mt-1";
            } else {
                eqEl.innerHTML = `${data.left} <span class="text-slate-300">= ?</span>`;
                subEl.innerHTML = "Que représente un petit cube ?";
                subEl.className = "text-sm text-slate-400 font-medium italic";
                
                btnReveal.innerHTML = "👀 Réponse";
                btnReveal.className = "shrink-0 text-xs bg-slate-200 hover:bg-slate-300 text-slate-700 py-1.5 px-3 rounded-full font-bold transition-colors ml-2 mt-1";
            }
        }

        btnReveal.addEventListener('click', () => {
            isRevealed = !isRevealed;
            updateUI();
        });

        window.changeUnit = function(unit) {
            currentUnit = unit;
            isRevealed = false; 

            document.querySelectorAll('.unit-btn').forEach(b => {
                b.classList.remove('bg-blue-500', 'text-white', 'shadow-sm');
                b.classList.add('bg-slate-100', 'text-slate-600');
            });
            const activeBtn = document.getElementById('btn-u-' + unit);
            activeBtn.classList.remove('bg-slate-100', 'text-slate-600');
            activeBtn.classList.add('bg-blue-500', 'text-white', 'shadow-sm');

            updateUI();
        };

        updateUI();

        // BOUCLE D'ANIMATION
        function animate() {
            requestAnimationFrame(animate);
            controls.update(); 
            renderer.render(scene, camera);
        }
        animate();

        // GESTION DU REDIMENSIONNEMENT ADAPTÉE
        window.addEventListener('resize', () => {
            w = container.clientWidth;
            h = container.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        });
    </script>
</body>
</html>
