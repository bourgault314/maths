<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atelier Volumes 3D - La Chaîne Complète (Gros plan parfait)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f8fafc; font-family: sans-serif; }
        #ui-layer { position: absolute; top: 20px; left: 20px; z-index: 100; pointer-events: none; }
        #canvas-container { position: absolute; top: 0; right: 0; bottom: 0; left: 0; overflow: hidden; }
        @media (min-width: 800px) { #canvas-container { left: 480px; } }
        
        #volume-title {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            font-size: 24px; font-weight: 900; text-transform: uppercase;
            text-align: center; pointer-events: none; z-index: 50;
            text-shadow: 0 2px 10px rgba(255, 255, 255, 0.9), 0 0 5px rgba(255, 255, 255, 0.5);
            transition: color 0.4s ease;
        }

        #btn-reset-view {
            position: absolute; top: 20px; right: 20px; z-index: 100; pointer-events: auto;
            background: white; border: 2px solid #e2e8f0; padding: 10px 20px; border-radius: 50px;
            font-weight: 800; color: #64748b; cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #btn-reset-view:hover { background: #f1f5f9; transform: translateY(-2px); color: #1e293b; border-color: #cbd5e1; }

        .color-transition { transition: all 0.4s ease; }
    </style>
</head>
<body>

    <button id="btn-reset-view" onclick="flyToUnit('mm')">🏠 REVENIR AU DÉPART</button>

    <div id="ui-layer">
        <div class="bg-white/95 p-6 rounded-2xl shadow-2xl border border-slate-200 pointer-events-auto flex flex-col w-[440px]">
            
            <div class="flex gap-1.5 mb-6" id="unit-indicators">
                <button onclick="flyToUnit('m')" id="ind-m" class="color-transition flex-1 py-2 rounded-xl bg-slate-100 text-slate-400 font-bold text-[15px] border-2 border-transparent hover:bg-slate-200 hover:text-slate-600 cursor-pointer">m³</button>
                <button onclick="flyToUnit('dm')" id="ind-dm" class="color-transition flex-1 py-2 rounded-xl bg-slate-100 text-slate-400 font-bold text-[15px] border-2 border-transparent hover:bg-slate-200 hover:text-slate-600 cursor-pointer">dm³</button>
                <button onclick="flyToUnit('cm')" id="ind-cm" class="color-transition flex-1 py-2 rounded-xl bg-slate-100 text-slate-400 font-bold text-[15px] border-2 border-transparent hover:bg-slate-200 hover:text-slate-600 cursor-pointer">cm³</button>
                <button onclick="flyToUnit('mm')" id="ind-mm" class="color-transition flex-1 py-2 rounded-xl bg-red-500 text-white font-bold text-[15px] border-2 border-red-600 shadow-md cursor-pointer">mm³</button>
            </div>

            <div class="mb-6 border-b border-slate-100 pb-6 min-h-[120px]">
                <h1 class="text-4xl font-black color-transition" id="main-equation">
                    <span class="text-blue-600">1 cm³</span> <span class="text-slate-300">= ?</span>
                </h1>
                <div class="flex justify-between items-center mt-4">
                    <p id="sub-text" class="text-base text-slate-400 font-medium italic">Que représente un petit cube ?</p>
                    <button id="btn-reveal" class="bg-slate-800 text-white text-sm py-2 px-4 rounded-full font-bold hover:bg-black transition-colors">👀 RÉPONSE</button>
                </div>
            </div>
            
            <div class="flex flex-col gap-3">
                <button id="btn-plaques" class="action-btn color-transition w-full text-left hover:brightness-90 text-white font-bold py-4 px-6 rounded-xl shadow-md flex justify-between items-center text-lg bg-blue-500">
                    <span>1. Écarter les plaques</span> <span class="text-xs bg-white/20 px-2 py-1 rounded">x10</span>
                </button>
                <button id="btn-barres" class="action-btn color-transition w-full text-left hover:brightness-90 text-white font-bold py-4 px-6 rounded-xl shadow-md flex justify-between items-center text-lg bg-blue-500">
                    <span>2. Écarter les barres</span> <span class="text-xs bg-white/20 px-2 py-1 rounded">x100</span>
                </button>
                <button id="btn-cubes" class="action-btn color-transition w-full text-left hover:brightness-90 text-white font-bold py-4 px-6 rounded-xl shadow-md flex justify-between items-center text-lg bg-blue-500">
                    <span>3. Écarter les unités</span> <span class="text-xs bg-white/20 px-2 py-1 rounded">x1000</span>
                </button>
            </div>
        </div>
    </div>

    <div id="canvas-container">
        <div id="volume-title" class="text-blue-600">Un centimètre cube</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script>
        // --- 1. INITIALISATION SCÈNE ---
        const scene = new THREE.Scene();
        const container = document.getElementById('canvas-container');
        let w = container.clientWidth, h = container.clientHeight;
        const camera = new THREE.PerspectiveCamera(45, w / h, 0.1, 40000);
        
        // DÉMARRAGE SUR LA VUE MM³ (Légèrement reculée pour bien apprécier le cube)
        camera.position.set(-8, 7.5, 8.5); 
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(w, h);
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.maxDistance = 15000;

        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.3);
        dirLight.position.set(-50, 100, 50); scene.add(dirLight);

        const COLORS = {
            mm: 0xef4444, cm: 0x3b82f6, cmDark: 0x1e3a8a, dm: 0x10b981, m: 0x64748b
        };

        const mainGroup = new THREE.Group(); 
        const l1Group = new THREE.Group();   
        const l2Group = new THREE.Group();   
        scene.add(mainGroup, l1Group, l2Group);

        // --- 2. NIVEAU 0 : LES 1000 PETITS CUBES (999 Bleus + 1 Rouge) ---
        const unitGeo = new THREE.BoxGeometry(1, 1, 1);
        const l0Mat = new THREE.MeshLambertMaterial({ color: COLORS.cm });
        const l0EdgeMat = new THREE.LineBasicMaterial({ color: COLORS.cmDark, transparent: true, opacity: 0.3 });

        for (let x = 0; x < 10; x++) {
            const pGrp = new THREE.Group(); pGrp.userData.baseX = x - 4.5;
            for (let y = 0; y < 10; y++) {
                const bGrp = new THREE.Group(); bGrp.userData.baseY = y - 4.5;
                for (let z = 0; z < 10; z++) {
                    const isMmCube = (x === 0 && y === 9 && z === 9);
                    const mat = isMmCube ? new THREE.MeshLambertMaterial({ color: COLORS.mm }) : l0Mat;
                    const cube = new THREE.Mesh(unitGeo, mat);
                    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(unitGeo), l0EdgeMat);
                    cube.add(edges);
                    cube.userData.baseZ = z - 4.5;
                    cube.position.set(0, 0, cube.userData.baseZ);
                    bGrp.add(cube);
                }
                bGrp.position.set(0, bGrp.userData.baseY, 0); pGrp.add(bGrp);
            }
            pGrp.position.set(pGrp.userData.baseX, 0, 0); mainGroup.add(pGrp);
        }

        // --- 3. STRUCTURES GÉANTES ---
        function createMegaStructure(group, size, colorGrid) {
            const geo = new THREE.BoxGeometry(size, size, size);
            const gridMat = new THREE.LineBasicMaterial({ color: colorGrid, transparent: true, opacity: 0.25 });
            for (let x = 0; x < 10; x++) {
                for (let y = 0; y < 10; y++) {
                    for (let z = 0; z < 10; z++) {
                        if (x === 4 && y === 4 && z === 4) continue;
                        const px = (x - 4.5) * size, py = (y - 4.5) * size, pz = (z - 4.5) * size;
                        const shell = new THREE.LineSegments(new THREE.EdgesGeometry(geo), gridMat);
                        shell.position.set(px, py, pz); group.add(shell);
                    }
                }
            }
            const wrap = new THREE.LineSegments(new THREE.EdgesGeometry(new THREE.BoxGeometry(size*10,size*10,size*10)), new THREE.LineBasicMaterial({ color: colorGrid, transparent: true, opacity: 0.6 }));
            group.add(wrap);
        }
        createMegaStructure(l1Group, 10, COLORS.dm);
        createMegaStructure(l2Group, 100, COLORS.m);

        // --- 4. GESTION DES NIVEAUX ET UI ---
        let currentZoomLevel = -2; // Force la mise à jour à l'initialisation
        let isRevealed = false;

        const levelsData = {
            "-1": { 
                title: 'Un millimètre cube', eqLeft: '1 mm³', eqRight: '?', subText: '', 
                textColorClass: 'text-red-600', bgColorClass: 'bg-red-500', 
                eqLeftColor: 'text-red-600', eqRightColor: 'text-slate-300'
            },
            "0": { 
                title: 'Un centimètre cube', eqLeft: '1 cm³', eqRight: '1000 mm³', subText: '1 mm³', 
                textColorClass: 'text-blue-600', bgColorClass: 'bg-blue-500', 
                eqLeftColor: 'text-blue-600', eqRightColor: 'text-red-500'
            },
            "1": { 
                title: 'UN DÉCIMÈTRE CUBE (1 dm³)', eqLeft: '1 dm³', eqRight: '1000 cm³', subText: '1 cm³', 
                textColorClass: 'text-emerald-600', bgColorClass: 'bg-emerald-500', 
                eqLeftColor: 'text-emerald-600', eqRightColor: 'text-blue-600'
            },
            "2": { 
                title: 'UN MÈTRE CUBE (1 m³)', eqLeft: '1 m³', eqRight: '1000 dm³', subText: '1 dm³', 
                textColorClass: 'text-slate-600', bgColorClass: 'bg-slate-500', 
                eqLeftColor: 'text-slate-600', eqRightColor: 'text-emerald-600'
            }
        };

        function updateUI() {
            const data = levelsData[currentZoomLevel];
            document.getElementById('volume-title').innerText = data.title;
            document.getElementById('volume-title').className = data.textColorClass;
            
            const rCol = isRevealed ? data.eqRightColor : 'text-slate-300';
            const rTxt = isRevealed ? `= ${data.eqRight}` : '= ?';
            
            document.getElementById('main-equation').innerHTML = `<span class="${data.eqLeftColor}">${data.eqLeft}</span> <span class="${rCol}">${rTxt}</span>`;

            if (isRevealed && currentZoomLevel !== -1) {
                document.getElementById('sub-text').innerHTML = `1 petit cube = <strong class="${data.eqRightColor}">${data.subText}</strong>`;
            } else {
                document.getElementById('sub-text').innerHTML = currentZoomLevel === -1 ? "L'unité la plus petite de notre modèle." : "Que représente un petit cube ?";
            }

            // Mémorisation visuelle des Poupées Russes sur les boutons
            ['ind-m', 'ind-dm', 'ind-cm', 'ind-mm'].forEach(id => {
                const el = document.getElementById(id);
                
                let btnLevel; let bgColor;
                if (id === 'ind-mm') { btnLevel = -1; bgColor = 'bg-red-500'; }
                if (id === 'ind-cm') { btnLevel = 0; bgColor = 'bg-blue-500'; }
                if (id === 'ind-dm') { btnLevel = 1; bgColor = 'bg-emerald-500'; }
                if (id === 'ind-m')  { btnLevel = 2; bgColor = 'bg-slate-500'; }

                if (currentZoomLevel >= btnLevel) {
                    el.className = `color-transition flex-1 py-2 rounded-xl text-white text-center font-bold text-[15px] border-2 shadow-md ${bgColor} border-transparent hover:brightness-110 cursor-pointer`;
                } else {
                    el.className = `color-transition flex-1 py-2 rounded-xl bg-slate-100 text-slate-400 text-center font-bold text-[15px] border-2 border-transparent hover:bg-slate-200 hover:text-slate-600 cursor-pointer`;
                }
            });

            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.className = `action-btn color-transition w-full text-left text-white font-bold py-4 px-6 rounded-xl shadow-md flex justify-between items-center text-lg ${data.bgColorClass}`;
            });
        }

        document.getElementById('btn-reveal').onclick = function() {
            isRevealed = !isRevealed; this.innerText = isRevealed ? "🙈 CACHER" : "👀 RÉPONSE"; updateUI();
        };

        window.flyToUnit = function(unit) {
            let target;
            if (unit === 'mm') target = { x: -8, y: 7.5, z: 8.5 }; // Moins collé que la version précédente
            else if (unit === 'cm') target = { x: -24, y: 18, z: 28 };
            else if (unit === 'dm') target = { x: -240, y: 180, z: 280 };
            else if (unit === 'm') target = { x: -2400, y: 1800, z: 2800 };
            
            gsap.to(camera.position, { x: target.x, y: target.y, z: target.z, duration: 1.5, onUpdate: () => controls.update() });
        };

        function checkZoom() {
            const dist = camera.position.length();
            let newLvl;
            if (dist > 1400) newLvl = 2;
            else if (dist > 140) newLvl = 1;
            else if (dist > 25) newLvl = 0; 
            else newLvl = -1; // Vue mm³ au plus proche
            
            if(newLvl !== currentZoomLevel) {
                currentZoomLevel = newLvl;
                isRevealed = false; document.getElementById('btn-reveal').innerText = "👀 RÉPONSE";
                mainGroup.visible = true; 
                l1Group.visible = (currentZoomLevel >= 1); 
                l2Group.visible = (currentZoomLevel >= 2); 
                updateUI();
            }
        }

        function setupAction(id, type) {
            let active = false;
            document.getElementById(id).onclick = function() {
                active = !active; this.classList.toggle('brightness-75'); 
                if(type === 'p') mainGroup.children.forEach(p => gsap.to(p.position, {x: p.userData.baseX * (active ? 2.5 : 1), duration: 0.8}));
                if(type === 'b') mainGroup.children.forEach(p => p.children.forEach(b => gsap.to(b.position, {y: b.userData.baseY * (active ? 2.5 : 1), duration: 0.8})));
                if(type === 'c') mainGroup.children.forEach(p => p.children.forEach(b => b.children.forEach(c => gsap.to(c.position, {z: c.userData.baseZ * (active ? 2.5 : 1), duration: 0.8}))));
            };
        }
        setupAction('btn-plaques', 'p'); setupAction('btn-barres', 'b'); setupAction('btn-cubes', 'c');

        function animate() {
            requestAnimationFrame(animate);
            controls.update(); checkZoom();
            renderer.render(scene, camera);
        }
        animate();
        window.onresize = () => { w = container.clientWidth; h = container.clientHeight; camera.aspect = w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h); };
    </script>
</body>
</html>
